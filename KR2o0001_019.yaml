body:
  text: 邑里第十九昔五經諸子廣書人物雖氏族可驗而邑里難詳逮於太史公始革茲體凡有列傳先述本居至於國有弛張鄉有併省隨時而載用明審實案夏侯孝若撰東方朔贊云朔字曼倩平原厭次人魏建安中分厭次爲樂陵郡故又爲郡人焉夫以身沒之後地名改易猶復追書其事以示後來則知身生之前故宜詳錄者矣異哉晉氏之有天下也自洛陽蕩覆衣冠南渡江左僑立州縣不存桑梓由是斗牛之野郡有青徐吳越之鄉州編冀豫欲使南北不亂淄澠可分得乎繫虛名於本土者雖百代無易既而天長地久文軌大同州郡則廢置無恆名目則古今各異而作者爲人立傳每云某所人也其地皆取舊號施之於今近代史爲王氏傳云瑯琊臨沂人爲李氏傳曰隴西成紀人之類是也非惟王李二族久離本居亦自當時無此郡縣皆是晉魏已前舊名號欲求實錄不亦難乎且人無定質因地而化故生於荊者言皆成楚居於晉者齒便從黃涉魏而東已經七葉歷江而北非唯一世而猶以本國爲是此鄉爲非是則孔父里於昌平陰氏家於新野而系纂微子源承管仲乃爲齊宋之人非關魯鄧之士求諸自古其義無聞時修國史予被配篹李義琰傳琰家於魏州昌樂已經三代因云義琰魏州昌樂人也監修者大笑以爲深乖史體遂依李氏舊望改爲隴西成紀人既言不見從故有此說且自世重高門人輕寒族上竝下見以姓望所出邑里相矜若仲遠之尋鄭玄先云汝南應劭文舉之對曹操自謂魯國孔融是也爰及近古其言多僞至於碑頌所勒茅土定名虛引他邦冒爲己邑若乃稱袁則飾之陳郡言杜則係之京邑姓卯金者咸曰彭城氏禾女者皆云鉅鹿今有姓邴者姓弘者以犯國諱皆改爲李氏如書其邑里必曰隴西趙郡夫以假姓猶且如斯則真姓者斷可知矣又今西域胡人多有姓明及卑者如加五等爵或稱平原公或號東平子爲明氏出於平原卑氏出於東平故也夫邊夷雜種尚竊美名則諸夏士流固無慚德也在諸史傳多與同風如隋史牛弘傳云安定鶉觚人也本姓尞氏至它篇所引皆謂之隴西牛弘唐史謝偃傳本姓庫汗氏續謂陳郡謝偃並其類也此乃尋流俗之常談忘著書之舊體矣又近世有班秩不著者始以州壤自標若楚國龔遂漁陽趙壹是也至於名位既隆則不從此列若蕭何鄧禹賈誼董仲舒是也觀周隋二史每述王庾諸事高楊數公必云瑯琊王褒新野庾信弘農楊素渤海高熲以此成言豈曰省文從而可知也凡此諸失皆由積習相傳寖以成俗迷而不返蓋語曰難與慮始可與樂成夫以千載遵行持爲故事而一朝糾正必驚愚俗此莊生所謂安得忘言之人而與之言斯言已得之矣庶知音君子詳其得失者焉卷五內篇卷六

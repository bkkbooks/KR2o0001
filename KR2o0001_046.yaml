body:
  text: 漢書五行志錯誤第十班氏著志抵牾者多在於五行蕪纍尤甚今輒條其錯繆定為四科一曰引書失宜二曰敘事乖理三曰釋災多濫四曰古學不精又於四科之中疏為雜目一作志非類聚區分一作別編之如後第一科引書失宜者其流有四一曰史記左氏交錯相並二曰春秋史記雜亂難別三曰屢舉春秋言無定體四曰書名去取所記不同其志敘言之不從也先稱史記周單襄公告魯成公曰晉將有亂又稱宣公六年鄭公子曼滿與王子伯廖語欲為卿案宣公六年自左傳所載也夫上論單襄則持史記以標首下列曼滿則遺左氏而無言遂令讀者疑此宣公亦舊作上出史記而不或作下誤云魯後奠定何邦是非難悟進退無準此所謂史記左氏交錯相並也志云史記成公十六年公會諸舊訛作齊侯於周案成公音即魯侯也班氏凡説魯之某公皆以春秋為冠何則春秋者魯史之號言春秋則知公是魯君一作公今引史記居先成公在下書非魯史而公舍魯名膠柱不移守株何甚此所謂春秋史記雜亂難別也案班書為志本以漢為主在於漢時直記其帝號諡耳至於它代則云某書某國君此其大例也至如敘火不炎上具春秋恆公十四年次敘稼穡不成直云嚴公原注嚴公即莊公也漢避明帝諱故改曰嚴注舊在後今移置首見處二十八年而已夫以火稼之間別書漢莽之事年代已隔去魯尤疏洎乎改説異端仍取春秋為始而於嚴公之上不復以春秋建名遂使漢帝魯公同歸一揆必為永例理亦可客在諸異科事又不爾求之畫一其例無恆一作常此所謂屢舉春秋言無定體也案本志敘漢已前事多略其書名至於服妖章初云晉獻公使太子率師佩之金玦續云鄭子臧好為聚鷸之冠此二事之上每加左氏為首夫一言可悉而再列其名省則都捐繁則太甚此所謂書名去取所記不同也第二科敘事乖理者其流有五一曰徒發首端不副徵驗二曰虛編古語討事不終三曰直引時談竟無它述四曰科條不整尋繹難知五曰標舉年號詳略無準志曰左氏昭公十五年晉籍談如周葬穆後既除喪而燕傳作宴下同叔向曰王其不終乎吾聞之所樂必卒焉今王一歲而有三年之喪二焉於是乎與喪賓燕樂憂甚矣禮王之大經也一動而失二禮無大經矣將安用之案其後七年王室終如羊舌所説此即其效也而班氏了不言之此所謂徒發首端不副徵驗也志云左氏襄公二十九年晉女齊語智伯曰齊高子容宋司徒皆將不免子容專司徒侈皆亡家之主也專則速及侈則將以力斃九月高子一作止出奔北燕所載至此更無他説案左氏昭公二十年宋司徒奔陳而班氏採諸本傳直寫片言閲彼全書唯徵半事遂令學者疑丘明之説有是有非女齊之言或得或失此一多明字所謂虛編古語討事不終也志云成帝於鴻嘉永始之載好為微行置私田於民間谷永諫曰諸侯夢得田占為失國而況王者蓄私田財物為庶人之事乎已下弗雲成帝悛與不悛谷永言效與不效諫詞雖具諸一作而事闕如此所謂直引時談竟無它述者也其述庶徵之恆寒也先云釐釐即僖也有原注在雜駁篇公十年冬大雨雹今志作雪疑唐初本作雹隨載劉向之占次云公羊經曰大雨雹續書董生之解案公羊所説與上奚殊而再列其辭俱云大雨雹而已一脫已字又一改作入非此科始一脫始字一作又字言大雪與雹繼言殞霜殺草起自春秋訖一作終乎漢代其事既盡仍重敘雹災分散相離斷絶無趣夫同是一類而限成二條二句指釐十年首尾紛拏而舊脫而字章句錯糅此統指全文此所謂科條不整尋繹難知者也夫人君改元肇自劉氏史官所録須存幾例案斯志之記異也首列元封年號不詳漢代何君次言地節河平具述宣成二帝原注宣帝地節四年成帝河平二年其紀年號如此武稱元鼎每歲皆書原注始雲元鼎二年又續雲元鼎三年案三年宜除元鼎之號也哀曰建平同年必録原注始云哀帝建平三年續復云哀帝建平三年案同是一年宜云是歲而已不當重言其年也此所謂標舉年號詳略無準者也第三科釋災多濫者一脫者字其流有八一曰商榷前世全違故實二曰影響不接牽引相會三曰敷演多端準的無主四曰輕持善政用配妖禍五曰但伸解釋不顯符應六曰考核雖讜義理非精七曰妖祥可知寢默無説八曰不循經典自任胸懷志云史記周威烈王二十三年九鼎震是歲韓魏趙篡晉而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣案周當戰國之世微弱尤甚故君疑竊斧臺名逃債正一有可字比夫泗上諸侯附庸小國者耳至如三晉跋扈欲為諸侯雖假王命實由己出譬夫近代莽稱安漢匪平帝之至誠卓號太師豈獻皇之本願而作者茍責威烈以妄施爵賞坐貽妖孽豈得謂此三字一作謂得二字人之情偽盡知之矣一無矣字者乎此所謂商榷前世全違故實也志云昭公十六年九月大零先是昭母夫人歸氏薨昭不戚而大一無大字下同搜于比蒲又曰定公十二年九月大雩先是公自侵鄭歸而城中城二大夫圍鄆案大舊衍夫字搜于比蒲昭之十一年城中城圍鄆定之六年也其二役去雩皆非一載夫以國家恆一作常事而坐延災告歲月既遙而方聞響一作感應斯豈非烏有成説扣寂為辭者哉此所謂影響不接牽引相會也志云嚴公嚴謂莊原舊注在此七年秋大水董仲舒劉向以為嚴母薑與兄齊侯淫共殺桓公嚴釋父舊訛作公仇復娶齊女未入而先與之淫一年再出會於道逆亂臣下賤之之舊脫一之字應也又云十一年秋宋大水董沖舒以為時魯宋比年有一作為乘丘鄑之戰百姓愁怨陰氣盛故二國俱水原注謂七年魯大水今年宋大水也案此説有三失焉何者嚴公十年十一年公敗宋師於乘丘及口夫以制勝克敵策勛命賞可以歡一無以字歡一作祈榮降福而反愁怨貽災邪其失一也且先是數年嚴遭大水原注亦謂七年校其時月殊在戰前而云與宋交兵故二國大水其失二也況於七年之內已釋水災始以齊女為辭終以宋師為應前後靡定向背何依一作倚其失三也夫以一災示眚而三説竟興此所謂敷演多端準的無主一有者字也其釋厥咎舒厥罰恆燠以為其政弛慢失在舒緩故罰之以燠冬而亡冰尋其解春秋之無冰也皆主內失黎庶外失諸侯不事誅賞不明善惡蠻夷猾夏天子不能討大夫擅權邦君不敢制若斯而已矣次至武帝元狩照志改舊作元封六年冬亡冰而云先是遣衛霍二將軍窮追單于斬首十餘萬級歸而大行慶賞上又閔悔一作恤勤勞遣使巡行天下存賜鰥寡假一多貸字與乏困此二字或作之因舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞於是天下咸喜案漢帝其武功文德也如彼其先猛後寬也如此豈是有懦弱凌遲之失而無刑罰戡定之功哉何得茍以無冰示災便謂與昔人同罪矛盾自己始末相違豈其甚邪此所謂輕持善政用配妖禍也志云孝昭元鳳三年太山有大石立睦孟以為當有庶人為天子者京房易傳云太山之石顛而下聖人受命人君虜又曰石立於山同姓為天下雄案此當是孝宣皇帝即位之祥也夫宣帝出自閭閻坐登宸極所謂庶人受命者也以曾孫血屬上纂皇統所謂同姓一多之字雄者也昌邑見廢謫居遠方所謂人君虜者也班書載此徵祥雖具有剖析而求諸後應曾不縷陳敘事之宜豈其若是茍文有所闕則何以載一作成言者哉此所謂但申解釋不顯符應也志云成帝建始三年小女陳持弓年九歲走入未央宮又云綏和二年男子王褒入北司馬門上前殿班志雖已有證據言多疏闊今聊演而申之案女子九歲者九一脫九字則陽數之極也男子王褒者王則巨君之姓也入北司馬門上前一少前字殿者王莽始為大司馬至哀帝時就國帝崩後仍此官因以篡位夫人一無人字入司馬門而上殿亦由作猶從大一少大字司馬而升一作登極災祥示兆其事甚明忽而不書為略何甚此所謂解釋雖讜義理非精也志云哀帝建平四年山陽女子田無嗇懷妊二字劉補未生二字今依志補二依志改舊作三月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘土收養尋本志雖述此妖災而了無解釋案人從胞至育含靈受氣始末有成一作恆數前後有定準此何待言毋乃纍筆至於一無於字在孕甫爾遽發啼聲者亦由作猶下同物有基業未彰而形象已兆即王氏篡國之徵生而不舉葬而不死者亦由物有期運已定非誅翦所平即王氏受命之應也又案班雲一作志下多以字小女陳持弓者陳即莽之所出此語班志所有如女子田無嗇者田故莽之本宗此意班志未言事既同占言無一概豈非唯知其一而不知其二者乎此所謂妖祥可知寢默無説也當春秋之時諸國賢俊多矣如沙鹿傳作鹿志作麓其壞梁山雲崩鷁退蜚於宋都龍交鬥於鄭水或伯宗子産具述其非妖或卜殭史過傳作周內史叔興盛言其必應蓋於時有識君子以為美談故左氏書之不利貽厥來裔既而古今路阻聞見壤隔至漢代儒者董仲舒劉向之徒始別構異聞輔申它説以茲後學陵彼先賢蓋今諺所謂季與厥昆爭知嫂諱者也知嫂五字一作私嫂者三字謬原注今諺曰弟與兄爭嫂字以其名鄙故稍文飾之一失此注而班志尚舍長用短捐舊習新茍出異同自矜魁博多見其無識者矣此所謂不循經典自任胸懷也第四科古學不精者其流有三一曰博引前書網羅不盡二曰兼採左氏遺逸甚多三曰屢舉舊事不知所出志云庶徵之恆一作常風劉向以為春秋無其應劉歆以為釐十六年左氏傳釋六鶂同鷁退飛是也案舊史稱劉向學穀梁一有劉字歆學左氏既祖習各異而聞見不同信矣而周木斯拔鄭車僨濟風之為害備於尚書春秋向則略而不言歆則知而不傳恐當作博又詳言衆怪歷敘群妖述雨犛為災而不録趙毛生地書異鳥相育而不載宋雀生鸇斯皆見小忘大舉輕略重蓋學有不同識無通鑒故也且當炎漢之代厥異尤奇若景當作武帝承平赤風如血於公在職亢陽為旱惟一作在紀與傳各具其詳在於志中獨無其説者何哉此所謂博引前書網羅不盡也左傳云宋人逐猰志作口狗華臣出奔陳又云宋公子地舊誤作它下同有白馬景公奪而朱其尾鬣地弟辰以蕭叛班志書此二事以為犬馬之禍原注此二事是班生自釋非引諸儒所言案左氏所載斯流實繁如季氏之逆也由鬥雞而傅介衛侯之敗也因養鶴以乘軒曹亡首於獲雁鄭弒舊作殺萌於解黿卻傳作郤至奪豕而家滅華元殺原作煞一作烹羊而卒奔此亦一訛言白黑之祥羽毛之孽何獨舍而不論唯征犬馬而已此所謂兼採左氏遺逸甚多也案太史公書自春秋已前所有國家災眚賢哲占候皆出於左氏國語者也今班志所引上自周之幽厲下終魯之定哀而不云國語唯稱史記豈非忘本詢末逐近棄遠者乎此所謂屢舉舊事不知所出也所定多目凡二十或訛一十九或訛二十九種但其失既衆不可殫論故每目之中或時舉一事庶觸類而長他皆可知又案斯志之作也本欲明吉凶釋休咎懲惡勸善以戒將來至如春秋已還漢代而往其間日蝕地震石隕山崩雨雹雨魚大旱大水犬一作雞與注不應豕為禍桃李冬花多一無多字直敘其災而不言其應原注載春秋時日蝕三十六而二不言其應漢時日蝕五十三而四十不言其應又惠帝二年武帝征和二年宣帝本始四年元帝永光三年綏和二年皆地震隕石凡十一總不言其應又高後二年武都山崩成帝河平二年楚國雨雹大如斧蜚鳥死成帝鴻嘉四年雨魚於信都孝景之時大旱者二昭成二代大雨水三河平元年長安有如人狀被甲持兵弩擊之皆狗也又鴻嘉中狗與豕交惠帝五年十月桃李花棗實皆不言其應也此乃一作皆非魯史之春秋漢書之帝紀耳何用復編之於此志哉昔班叔皮云司馬遷敘相如則舉其郡縣著其字此三字照班傳補舊脫蕭曹陳平之屬陳平之屬四字亦舊脫照傳補否則蕭曹亦馬遷並時矣仲舒並時之人不記其字或縣而不郡蓋有所未暇也若孟堅此志錯繆殊多豈亦刊削未周者邪不然何脫略之甚也亦有穿鑿成文強生異義如蜮之為惑麋之為迷隕五石者齊五子之徵潰舊作崩誤七山者漢七國之象叔服會葬郕舊作成非伯來奔亢陽所以成妖鄭易許田魯謀萊國食苗所以為禍諸如此比一作事其類弘多徒有解釋無足觀採知音君子幸為詳焉

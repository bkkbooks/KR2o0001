body:
  text: 列傳第六夫紀傳之興肇於史漢蓋紀者編年也傳者列事也編年者歷帝王之歲月猶春秋之經列事者録人臣之行狀猶春秋之傳春秋則傳以解經史漢則傳以釋紀尋茲例草創始自子長而朴略猶存區分未盡如項王宜傳而以本紀為名非惟羽僭之盜不可同於天子且推其序事皆作傳言求謂之紀不可得也或曰遷紀五帝夏殷亦皆列事而已子曾不之怪何獨尤於項紀哉對曰不然夫五帝之與夏殷也正朔相承子孫遞及雖無年可著紀亦何傷如項羽者事起秦餘身終漢始殊夏氏之后羿似黃帝之蚩尤譬諸閏位容可列紀方之駢拇難以成編且夏殷之紀不引他事夷齊諫周實當紂日而㭊為列傳不入殷篇項紀則上下同載君臣交雜紀名傳體所以成嗤夫紀傳之不同猶詩賦之有別而後來繼作亦多所未詳案范曄漢書記后妃六宮其實傳也而謂之為紀陳壽國志載孫劉二帝其實紀也而呼之曰傳考數家之所作其未達紀傳之情乎茍上智猶且若斯則中庸故可知矣又傳之為體大抵相同而著作多方有時而異如二人行事首尾相隨則有一傳兼書包括令盡若陳餘張耳合體成篇陳勝吳廣相參並録是也亦有事迹雖寡名行可崇寄在他篇為其標冠若商山四皓事列王陽之首廬江毛義名在劉平之上是也自茲已後史氏相承述作雖多斯道都廢其同於古者唯有附出而已尋附出之為義攀列傳以垂名若紀季之入齊顓臾之事魯皆附庸自托得厠朋流然世之求名者咸以附出為小蓋以其因人成事不足稱多故也竊以書名竹素豈限詳略但問其事竟如何耳借如召平紀信沮授陳容或運一異謀樹一奇節並能傳之不朽人到於今稱之豈假編名作傳然後播其遺烈也嗟乎自班馬以來獲書於國史者多矣其間則有生無令聞死無異迹用使游談者靡徵其事講習者罕記其名而虛班史傳妄占篇目若斯人者可勝紀哉古人以沒而不朽為難蓋為此也卷二內篇卷三

body:
  text: 模擬第二十八夫述者相效自古而然故列御寇之言理也則憑李叟揚子云之草玄也全師孔公符朗晉書作苻朗則比跡于莊周范曄則參蹤于賈誼況史臣注記其言浩博若不仰范前哲何以貽厥后來蓋模擬之體厥途有二一曰貌同而心異二曰貌異而心同何以言之蓋古者列國命官卿與大夫為別必于國史所記則卿亦呼為大夫此春秋之例也當秦有天下地廣殷周變諸侯為帝王目宰輔為丞相而譙周撰古史考一脫考字思欲擯抑馬記師仿孔經其書李斯之棄市也乃云秦殺集內殺多作煞其大夫李斯夫一脫此三字以諸侯之大夫名天子之丞相以此而擬春秋所謂貌同而心異也當春秋之世列國甚多每書他邦皆顯其號至于魯國直云我而已如金行握紀海內大同君靡客主之殊臣無彼此之異而干寶撰晉紀至于天子之葬必云葬我某皇帝且或作但疑當作時無二君何我之有以此而擬春秋又所謂貌同而心異也狄滅二國君死城屠齊桓行霸興亡繼絶左傳云邢遷如歸衛國忘亡言上下安堵不失舊物也如孫皓暴虐人不聊生晉師是討后豫相怨而于寶晉紀云吳國既滅江外忘亡豈江外安一作被典午之善政同歸命之未滅乎以此而擬左氏又所謂貌同而心異也春秋諸國皆用夏正原音征魯以行一作用天子禮樂故獨用周家正朔至如書元年春王正月者年則魯君之年月則周王之月原注考竹書紀年始達此義而自古說春秋者皆妄為解釋也如曹馬受命躬為帝王非是以諸侯守藩行天子班歷而孫盛魏晉二陽秋每書年首必云某年春帝正月夫年既編帝紀而月又列帝名以此而擬春秋又所謂貌同而心異也五始所作是曰春秋三傳并興各釋經義如公羊傳屢云何以書記某舊作其事也此則先引經語而繼以釋辭勢使之然非史體也如吳均齊春秋每書災變亦曰何以書記異也夫事無他議言從己出輒自問而自答者豈是敘事之理者邪以此而擬公羊又所謂貌同而心異也且史漢每于列傳首書人名字至傳內有呼字處則于傳首不據文義刊正詳舊作已非如漢書李陵傳稱隴西任立政此下當有至胸奴招陵五字脫簡也陵字立政曰少公歸易耳夫上下不言立政之字而輒言字立政曰少公者此省文從可知也至令狐德棻周書于伊婁穆傳首云伊婁穆字奴干既而續云太祖字之曰奴干作儀同面向我也夫上書其字而下復曰字豈是事從簡易文去重復者邪以此而擬漢書又所謂貌同而心異也昔一本誤多謝承二字家語有云蒼梧人娶妻而美以讓其兄雖一多則字一多其字為讓非讓道也又揚子法言曰士一脫士字有姓孔字仲尼其文是也其質非也如向之諸子所擬古作其殆蒼梧之讓姓孔一有而字字仲尼者歟蓋語曰世異則事異事異則備異必以先王之道持今世之人一作民此韓子所以著五蠹之篇稱宋人有守株之說也世之述者鋭志于恐矜字之訛奇喜編次古文撰敘今事而一無而字巍然自謂五經再生三史重出多見其無識者矣惟夫明識之士則不然何則其所擬者非如圖畫之寫真熔鑄之象物以此而似也一作彼其所以為似者取其道木相會義理玄一作互同若斯而已亦猶孔父賤為匹夫棲皇舊作惶放逐而能祖述堯舜憲章文武亦何必居九五之位處南面之尊然后謂之連類者哉蓋左氏為書敘事之最自晉已降景慕者多有類效顰彌益其丑然求諸偶中亦可言焉蓋君父見害臣子所恥義當略說不忍斥言故左傳敘恆公在齊遇害而云彭生乘公公舊脫一公字薨于車桓十八如干寶晉紀敘愍帝歿于平陽而云晉人見者多哭賊懼帝崩以此而擬左氏舊多又字所謂貌異而心同也夫當時所記或未盡則先舉其始后詳其末前后相會隔越取同若左氏成七年鄭獲楚鐘議以獻晉至九年晉歸鐘儀于楚以求平其類是也至裴子野宋略敘索虜臨江太子劭使力土排徐湛二字疑衍江湛僵仆于是始與劭有隙其后三年肩舊衍徐字江湛舊無湛字為元凶所殺事以此而擬左氏亦一作又所謂貌異而心同也凡列姓名罕兼其字茍前后互舉則觀者自知如左傳上言羊斟則下曰叔牂一作子減一止作臧并誤前稱子産則次見國當作曰僑其類是也至裴子野宋略亦然何者上書桓玄則下云舊誤作有敬道后敘殷鐵則先著景仁以此而擬左氏又所謂貌異而心同也左氏與論語忽添論語是古文參錯處有敘人酬對茍非煩詞積句但是往復唯諾而已則連續而說去其對曰問曰等字如裴子野宋略云李孝伯問張暢卿何姓曰姓張張長史乎以此而擬左氏論語又所謂貌異而心同也善人君子四字通泛恐有誤功業不書見于應對附彰其美如左傳稱楚武王欲伐隨舊誤作隋熊率且比曰季梁在何益桓六至蕭方等一脫等字三十國春秋說朝廷聞慕容俊死曰中原可圖矣桓溫曰慕容恪在其憂方大以此而擬左氏又所謂貌異而心同也夫將敘其事必預張其本彌縫混說無取眷與眷通回顧之義言如左傳稱叔輒聞日蝕而哭昭子曰子一脫子字叔其將死乎秋八月叔輒卒昭二十一至王劭齊志稱張伯德夢山上掛絲占者曰其為幽州乎秋七月拜為幽州刺史以此而擬左氏又所謂貌異而心同也蓋文雖缺略理甚昭著此丘明之體也至如敘晉敗于邲先濟者賞而云上當作中軍下軍爭舟舟中之指可掬宣十二夫不言攀舟恐脫擾字亂以刃斷指而但曰舟指可掬則讀者自睹其事矣至王劭齊志述高季式破敵于韓陵追奔逐北而云夜半方歸槊血滿袖夫不言奮槊深入擊刺甚多而但稱槊血滿袖則聞者亦知其義矣以此而擬左氏又所謂貌異而心同也大抵作者自魏已前多效三史從晉已降喜學五經夫史才文淺而易摸經文意深而難擬既難易有別故得失亦殊蓋貌異而心同者模擬之上也貌同而心異者摸擬之下也然人皆好貌同而心異不尚貌異而心同者何哉蓋鑒識不明嗜愛多僻悅夫似史而憎夫真史此子張之所以致譏于魯矣有葉公好龍之喻也袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也夫擬古而不類此乃難之極者何為獨闕其目乎嗚呼自子長以還似皆未睹斯義后來明達其鑒之哉

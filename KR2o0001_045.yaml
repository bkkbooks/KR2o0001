body:
  text: 雜説下第九諸史六條夫盛服飾者以珠翠為先工繢事者以丹青為主至若錯綜乖所分布失宜則彩絢雖多巧妙不足者矣觀班氏公孫弘傳贊直言漢之得人盛於武宣二代至於平律善惡寂蔑滅通無睹持論如是其義靡聞必矜其美辭愛而不棄則宜微有改易列於百官公卿表後庶尋文究理頗相附會以茲編録不猶愈乎又沈侯謝靈運傳論全説文體備言音律此正可為翰林之補亡流別之總説耳原注李充撰翰林論摯虞撰文章流別集如次諸史傳實為乖越陸士衡有云離之則雙美合之則兩傷信矣哉其有事可書而不書者不應書而書者至如班固敘事微小必書至高祖破項垓下斬首八萬曾不涉言李齊李百藥北齊書於後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以代奚於邊疆小寇無不畢紀如司馬消難擁數州之地以叛曾不挂言略大舉一作存小其流非一此下舊連後段非昔劉協有云自卿淵舊誤作雲已前多役才而不課學向雄文心作雄向已後頗引書以助文然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典誥良由才乏天然故事資虛飾者矣案宋書稱武帝入關以鎮惡不伐遠方馮異於渭濱遊覽追思一作想太公夫以宋祖無學愚智所委一作悉安能援引古事以酬答群臣者乎斯不然矣此句一本有重句渭濱熟事何人不知以此判宋武亦失平更一作又有甚於此者睹周齊二國俱出陰山必言類互鄉則宇文尤甚原注案王劭齊志宇文公呼高祖曰漢兒夫以獻武音詞未變胡俗王宋所載其鄙甚多矣周帝仍稱之以華夏則知其言不逮於齊遠矣而牛弘作周史王劭作齊志並掌策書其載齊言也則淺俗如彼其載周言也則文雅著此夫如是何哉非兩邦有夷夏之殊由二史有虛實之異故也夫以記宇文之言而動遵經典多依史漢原注周史述太祖論梁元帝曰蕭繹可謂天之所廢誰能興之者乎又宇文測為汾州或譖之太祖怒曰何為間我骨肉生此貝錦此並六經之言也又曰榮權吉士也寡人與之言無二此則三國志之辭也其餘言皆如此豈是宇文之語耶又案裴政梁太清實録稱元帝使王琛聘魏長孫儉謂宇文曰王琛眼睛全不轉公曰瞎奴使癡人來豈得怨我此言與王宋所載相類可謂真宇文之言無愧於實録矣此何異莊子述鮒魚之對而辨類蘇張賈生敘鵩鳥之辭而文同屈朱施於寓言則可求諸實録則否矣世稱近史編語原注謂言語之語也唯周多美辭夫以博採古文而聚成今説是則俗之所傳有雞九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而事悉虛無豈可便謂南董之才宜居班馬之職也舊本此處連下條非自梁室雲季雕蟲道長原注謂太清以後平頭上尾尤忌於時對語儷辭盛行於俗始自江外被於洛中而史之載言亦同於此原注何之元梁典稱議納侯景高祖曰文叔得尹遵之降而隗囂滅安世用羊祜之言而孫皓平夫漢晉之君事殊僭盜梁主必不舍其諡號呼以字名此由須對話儷辭故也又姚最梁後略稱高祖曰得既在我失亦在豫不及子孫知復何恨夫變我稱豫互文成句求諸人語理必不然此由避平頭上尾故也又蕭韶太清記曰溫子升永安故事言爾朱世隆之攻沒建業也怨痛之響上徹天閽酸苦乏極下傷人理此皆語非簡要而徒積字成文並由趨聲對之為患也或聲從流靡或語須偶對此之為害其流甚多尹遵或作王郎或作王遵並非字名舊作姓名皆語舊作語皆趨聲對舊作避聲對今皆刊正假有辨如酈叟吃若周昌子羽修飾而言仲由率爾面對莫不拘以文禁一概而書必求實録多見其妄矣夫晉宋已前帝王傳授始自錫命終於登極其間箋疏款曲詔策頻煩雖事皆偽迹言並飾讓猶能備其威儀陳其文物俾禮容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荊州假稱宣德之令原注江陵之去建業地闊數千餘里宣德皇后下令旬日必至以此而言其偽可見或書成並部虛云孝靖之敕原注北齊文宣帝將受魏禪密撰錫讓勸進斷表文詔入奏請署一時頓盡則知無復前後節文等差降殺也此注舊編在後注之下誤凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要翦截浮辭者哉但二蕭陳隋諸史通多此失原注晉魏及宋自創業後稱公王即帝位皆數十年間事也夫功德日盛稍進纍遷足驗禮容不欺揖遜無失自齊染已降稱公王及即帝位皆不出旬月之中耳夫以迫促如是則於禮儀何有者哉唯王劭所撰齊志獨無是焉舊木此處連下條非夫以暴易暴舊作以暴易古一作以纍易古古人以為嗤如彥淵之改魏收也以非易非彌見其失矣而撰隋舊衍文字史者稱淡大矯收失者何哉且以淡著書方於君懋豈唯其間可容數人而已史臣美淡而譏劭者原注隋史每論皆云史臣曰今故因其成事呼為史臣豈所謂通鑒乎語曰蟬翼為重千鉤為輕其斯之謂矣別傳九條劉向列女傳云夏姬再為夫人三為王後夫為夫人則難以驗也為王後則斷可知矣案其時諸國稱王唯楚而已如巫臣諫莊將納姬氏不言曾入楚宮則其為後當在周室蓋周德雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於吳謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其闕如原注雜記曰夫人之不命於天子自魯昭公始也又以女子一身而作嬪三代求諸人事理必不然尋夫春秋之後國稱王者有七蓋由向誤以夏姬之生當夫戰國之世稱三為王後者謂歷嬪七國諸王校以年代殊為乖刺至於他篇茲例甚衆故論楚也則昭王當云平王與秦穆同時言齊也則晏嬰居宋景之後原注列女傳曰齊傷槐女景公時人謂晏子曰昔宋景公時大旱三年夫謂宋景為昔即居其後矣今粗舉一二其流可知觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鑒者矣及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虛事多構偽辭非其識不周而才不足蓋以世人多可欺故也嗚呼後生可畏何代無人而輒輕忽若斯者哉夫傳聞失真書事失實蓋事有不獲已人所不能免也至於故為異説以惑後來則過之尤甚者矣舊本此處截條非是案蘇秦答燕易王稱有婦人將殺夫令妾進其藥酒妾佯殭而覆之又甘茂謂蘇代或訛作氏云貧人女與富人女會績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用一作因蘇氏之説為二婦人立傳定其邦國加其姓氏以彼烏有持為指實何其妄哉又有甚於此者至如伯奇化鳥對吉甫以哀鳴宿瘤隱形乾齊王而作後此則不附於物理者矣復有懷嬴失節目為貞女劉安覆族定以登仙立一作夫言如是豈顧丘明之有傳孟堅之有史哉揚雄法言好論司馬遷而不及左丘明常稱左氏傳唯有品藻二言而已是其鑒物有所不明者也且雄曬子長愛奇多雜一作新非又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦當云羽獵賦則云鞭宓妃雲云劉協文心已譏一作議之矣然則作然而用文章小道無足致嗤觀其蜀王或作主本紀稱杜魄化而為鵑荊尸變而為鱉其言如是問其鄙哉所謂非言之難而行之難也夫十室之邑必有忠信欲求不朽弘之在人何者交址遠居南裔越裳之俗也士燮所産地敦煌僻處西域昆戎之鄉也劉昺所産地求諸人物自古闕載蓋由地居下國路絶上京史官注記所不能及也既而士燮著録劉昺裁書則磊落英才粲然盈矚者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知一誤作非著述之功其力大矣豈與夫詩賦小技校其優劣者哉自戰國已下詞人屬文皆偽立客主假相酬答至於屈原離騷辭稱遇漁一訛漢父於江渚宋玉高唐賦雲夢神女於陽臺夫言並文章句結音韻以茲敘事足驗憑虛而司馬遷習鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚邪必如是則馬卿遊梁枚乘譖其好色曹植至洛宓妃睹於巖畔撰漢舊脫漢字黃本補魏史者亦宜編為實録矣祕康撰高士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假説而定為實録斯已謬矣況此二漁父者較年則前後別時論地則南北殊壤而輒並之為一豈非惑哉茍如是則蘇代所言雙擒蚌鷸伍胥所遇渡水蘆中斯並漁父善事亦可同歸一録何止揄袂緇帷之林濯纓滄浪之水若斯而已也蘇代至末四十七字舊木作細書其原文別有四十三字大意略同蓋是兩木互異之文非注也舊本此下連後條郭本此處截莊周著書以寓言為主嵇康述高士傳多引其虛辭至若神有混沌編者首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相鄰鸴莊子作學鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記一衍怪字並可引為真事矣夫識理如此何為而薄周孔哉杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也一本下連李陵集非李陵集有與蘇武書詞採壯麗音句流靡觀其文體不類西漢人一無人字殆後來一脫來字所為假稱陵作也遷史舊本此二字誤入以焉之下缺而不載良有以焉編於李集舊誤作傳中斯為謬矣一本無此二句雜識十條夫自古舊有之字學者談稱一作講多矣精於公羊者尤憎左氏習於太史者一多則字偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣一本此處截條又一無又字觀世之學者或耽玩一經或專精一史談春秋者則不知宗周既隕而人有六雄論史漢者則不悟劉氏云亡而地分三國亦猶武陵隱士滅一作遁迹桃源當此晉年猶謂暴秦之地也假有學窮千載書總五車見良直而不覺其善逢抵牾而不知其失葛洪所謂藏書之箱篋五經之主人而夫子有云雖多亦安用為其斯之謂也一本誤會下條夫鄒好長纓齊珍紫眼斯皆一時所尚非百王不易之道也至如漢代公羊擅名三傳晉年莊子高視六經今並挂壁不行綴一作贅非旒無絶二句依郭本所定舊本挂誤作蛙旒誤作緝豈與夫春秋左氏古文尚書雖暫廢於一朝終獨高於千載校其優劣可同年而語哉夫書名竹帛物情所競雖舊作維聖人無私而君子亦黨蓋易之作也本非記事之流而孔子系辭輒盛述顏子稱其殆庶雖言則無愧事非虛美亦由視豫猶父門人日親故非所要言而曲垂編録者矣既而揚雄寂寞師心典誥至於童烏稚子蜀漢諸賢原注謂嚴李鄭司馬之徙太玄二字帶筆玄主數不衡人法言恣加褒賞雖內舉不避而情有所偏者焉夫以宣尼睿哲子雲參聖在於著述不能忘私則自中庸以降抑可知矣如謝承漢書偏黨吳越魏收代史盛誇胡塞復焉足怪哉子曰汝為君子儒無為小人儒儒誠有之史亦宜級蓋左丘明司馬遷君子之史也吳均魏收小人之史也其薰蕕不類何相去之遠哉禮云禮云玉帛云乎哉史云史云文飾云乎哉何則一有修字史者固當以好善為主嫉惡為次若司馬遷班叔皮史之好善者也晉董狐齊南史史之嫉惡者也必兼此二者而重之以文飾其唯左丘明乎自茲已降吾未之見遊夫所謂直筆者不掩惡不虛美書之有益於褒貶不書無損於勸誡但舉其宏綱存其大體而已非謂絲毫必録瑣細無遺者也如宋孝王王劭之徒其所記也喜論人帷簿箔通不修言貌鄙事訐以為直吾無取焉王本連下條夫故立異端喜造奇説漢有劉向晉有葛洪近者沈約又其甚一作比也後來君子幸為詳焉昔魏史二字有疑稱朱異二字亦恐誤有口才摯虞有筆才故知喉舌翰墨其辭本異而近世作者撰彼口語同諸筆文斯皆以元瑜孔璋之才而處丘明子長之任文之與史何相亂之甚乎夫載筆立言名流今古如馬遷史記能成一家揚雄太玄可傳千載此則其事尤大記之於傳可也至於一作如近代則不然其有雕蟲末伎短才小説或為集不過數卷原注如陳書陰鏗傳云有集五卷其類是也或著書才至一篇原注如梁書孝元紀云撰同姓名人録一卷其類是也莫不一一或作一二列名編諸傳末原注如梁書孝元紀云撰研神記陳書姚察傳云撰西征記辨茗酪記後魏書劉芳傳云撰周官音禮記音齊書祖鴻勛傳云撰晉祠記凡此書或一卷兩卷而已自餘人有文集或四卷或五卷者不可勝記故不具列之事同七略巨細必書斯亦煩之甚者子曰齊景公有馬千駟死之日人無德而稱焉伯夷叔齊餓於首陽之下民一諱一不諱筆誤到於今稱之若漢代青翟劉舍位登丞相而班史無録薑詩趙一身止計吏而謝書謝承後漢有傳即其例也今之修史者則不然其有才德闕如而位宦通顯史臣載筆必為立傳其所一無所字記也止具其生前歷官歿後贈諡若斯而已矣雖其間伸以狀迹粗陳一二么麼恆一作常事曾何足觀始自伯起魏書迄乎皇家五史原注五史謂五代史通多此體流蕩忘歸史漢之風忽焉不祀一作嗣者一無者字矣卷十八外篇卷十九

body:
  text: 編次第十三昔尚書記言春秋記事以日月為遠近年世為前後用使閲之者雁行魚貫皎然可尋至馬遷始錯綜成篇區分類聚班固踵武仍加祖述於其間則有統體不一名目相違朱紫以之混淆冠履於焉顛倒蓋可得而言者矣尋子長之列傳也其所編者唯人而已矣至於龜策異物不類肖形而輒與黔首同科俱謂之傳不其怪乎且龜策所記全為志體向若與八書齊列而定以書名庶幾物得其朋同聲相應者矣孟堅每一姓有傳多附出餘親其事迹尤異者則分入它部故博陸去病昆弟非復一篇外戚元后婦姑分為二録至於元王受封於楚至孫戊而亡案其行事所載甚寡而能獨載一卷者實由向歆之助耳但交封漢始地啓列藩向居劉末職才卿士昭穆既疏家國又別適使分楚王子孫於高惠之世與荊代並編析劉向父子於元成之間與王京共列方於諸傳不亦類乎又自古王室雖微天命未改故臺名逃責尚曰周王君未繫頸且云秦國況神璽在握火德猶存而居攝建年不編平紀之末孺子主祭咸書莽傳之中遂令漢餘數歲湮沒無睹求之正朔不亦厚誣當漢氏之中興也更始升壇改元寒暑三易世祖稱臣北面誠節不虧既而兵敗長安祚歸高邑兄亡弟及歷數相承作者乃抑聖公於傳內登文叔於紀首事等躋僖位先不窟夫東觀秉筆容或諂於當時後來所修理當刊革者也蓋逐兔爭捷瞻烏靡定羣雄僭盜為我驅除是以史傳所分真僞有別陳勝項籍見編於高祖之後隗囂孫述不列於光武之前而陳壽蜀書首標二牧次列先主以繼焉璋豈以蜀是僞朝遂乃不遵恆例但鵬鷃一也何大小之異哉春秋嗣子諒暗未逾年而廢者既不成君故不別加篇目是以魯公十二惡視不預其流及秦之子嬰漢之昌邑咸亦因胡亥而得記附孝昭而獲聞而吳均齊春秋乃以鬱林為紀事不師古何滋章之甚與觀梁唐二朝撰齊隋兩史東昏猶在而遽列和年煬帝未終而已編恭紀原其意旨豈不以和為梁主所立恭乃唐氏所承所以黜永元而尊中興顯義寧而隱大業茍欲取悅當代遂乃輕侮前朝行之一時庶叶權道播之千載寧為格言尋夫本紀所書資傳乃顯表志異體不必相涉舊史以表志之帙介於紀傳之間降及蔚宗肇加釐革沈魏繼作相與因循既而子顯齊書穎達隋史不依范例重遵班法蓋擇善而行何有遠近聞義不徙是吾憂也若乃先黃老而後六經後外戚而先夷狄老子與韓非並列賈詡將荀彧同編孫弘傳讚宜居武宣紀末宗廟迭毀枉入玄成傳終如斯舛謬不可勝紀今略其尤甚者耳故不復一一而詳之

body:
  text: 雜説上第七春秋二條案春秋之書弒也稱君君無道稱臣臣之罪如齊之簡公未聞一脫聞字失德陳恆構逆罪莫大焉而哀十四年書齊人弒其君王於舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子迫書其事豈由以索續組不類將聖之能者乎何其乖刺之甚也案春秋左氏傳釋經云滅而下有其地曰入如入陳入衛入鄭入許即其義也至柏舉之役子常之敗庚辰吳入獨書以郢夫諸侯列爵並建國都國謂楚都謂鄒惟取國名不稱都號何為郢之見入遺其楚名比於他例一何乖躇尋二傳所載謂公穀所載之經皆云入楚豈左氏之本本亦謂經獨為謬歟謬猶誤也左氏傳二條左氏之敘事也述行師則簿領盈視哤舊訛作叱聒沸騰論備火則區分在目修飾峻整言勝捷則收獲都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱清詐則欺誣可見談恩惠則煦如春日紀嚴切則凜若秋霜敘興邦則滋味無量陳亡國則淒涼可憫或腴辭潤簡犢或美句入詠歌跌宕而不群縱橫而自得若斯才者殆將工侔造化思涉鬼神著述罕聞古今一衍之字卓絶加二傳之敘事也榛蕪溢句疣贅滿行華多而少實言拙而寡味若必方於左氏也非唯不可為魯衛之政差肩雁行亦有雲泥路阻君臣禮隔者矣左傳稱仲尼曰鮑莊子之智不如葵葵猶能衛其足夫有生而無識有質而無性者其唯草木乎然自古設比興而以草木方人者皆取其善惡薰蕕榮枯貞脆而已必言其含靈畜智隱身違禍則無其義也尋葵之向口傾心本不衛足由人睹其形似強為立名亦由作猶今俗文士謂鳥鳴為啼花發為笑花之與鳥一有又字安有啼笑之情哉必以人無喜怒不知哀樂便云其智不如花花猶善笑其智不如鳥鳥猶善啼可謂之讜言者一無者字哉如鮑莊子之智不如葵葵猶能衛其足即其例也而左氏録夫子一時戲言以為千載篤論成微婉之深纍玷良直之高範不其惜乎公羊傳二條公羊云許世子止弒其君易為加弒譏子道之不盡也其次因言樂正子春之視疾以明許世子之得罪尋子春孝道義感神明固以已通方駕曾閔連蹤丁蘭郭巨茍事親不逮樂正便以弒逆加名斯亦一無亦字擬失其流責非其罪蓋公羊樂正俱出孔父門人思欲更相引重曲加談述所以樂正行事無理輒書無理者擬不於倫之意致使編次不倫比喻非類言之可為嗤怪也語曰彭蠡之濱以魚食大斯則地之所富物不稱珍案齊密邇海隅鱗介惟錯故上客食肉中客食魚一脫食肉中客四子斯即齊之舊俗也然食妨繪鯉詩人所貴必施諸他國是曰珍羞如公羊傳云晉靈公使勇士殺趙盾見其方食魚饗曰子為晉國重卿而食魚饗是子之儉也吾不忍殺子蓋公羊生自齊邦不詳晉物以東土所賤謂西州亦然遂目彼嘉饌呼為菲食著之實録以為格言非惟與左氏有乖亦於物理全爽者矣汲冢紀年一條語曰傳聞不如所見斯則史之所述其謬已甚況乃傳寫舊記而違其本録者乎至如虞夏商周之書春秋所記之説可謂備矣而竹書紀年出於晉代學者始知後啓殺益太甲殺伊尹文丁舊誤作王與疑古同殺季歷共伯名和此四字一本無一本在文丁之上鄭桓公厲王之子句有誤厲王疑本作宣王則與經典所載乖刺甚多又孟子曰晉謂春秋為乘尋汲冢瑣語即乘之流邪其晉春秋篇云平公疾夢朱羆窺屏左氏亦載斯事而云夢黃熊入門必欲舍傳聞而取所見則左傳非而晉文一作史實矣謂左韋晉事是他國傳聞而竹書晉文則出自本國也嗚呼向若二書不出學者為古所惑則代成聾瞽無由覺悟也嗚呼已下二十四字王張諸本多作細書郭本作大書詳嗚呼字非注體起法姑從郭本史記八條夫編年敘事混雜難辨紀傳成體區別異觀昔讀太史公書每怪其所來多是周書謂逸周書國語世本戰國策之流獨未見左氏內傳故云近見皇家所撰晉史其所採亦多是短部小書省功易閲者若語林世説搜神記幽明録之類一作徙是也如曹干兩氏紀孫檀二陽秋則皆不之取故其中所載美事遺略甚多原注劉遺民曹纘皆於檀氏春秋有傳至千今晉書則了無其名若以古方今此處有脫字當然諸本並脫當然二字則知一有太字史公亦同其失矣斯則遷之所録甚為膚淺而班氏稱其勤者何哉舊本此下連孟堅又云非是孟堅又云劉向揚雄博極群書皆服一作伏其善敘事豈時無英秀易為雄霸者乎不然何虛譽之甚也舊本此處分條非史記鄧通傳云文舊脫文字帝崩景帝立向若但雲景帝立不言文帝崩斯亦可知矣何用兼書其事乎又倉公傳稱其傳黃帝扁鵲之脈書五色診病知人死生決嫌疑定可治詔一脫詔字召問其所長對曰傳黃帝扁鵲之脈書以下他文盡同上説夫上既有其事下又載其言言事雖殊委曲何別案遷之所述多有此類而劉揚服其善敘事也何哉太史公撰孔子世家多採論語舊説至管晏列傳則不取其本書原注謂管子晏子也以為時俗所有放不復更載也案論語行於講肆列於學官俗訛作宮重加編勒只覺煩費如管晏者諸子雜家經史外事棄而不録實杜異聞夫以可除而不除宜取而不取以斯著述未睹厥義昔孔子力可翹關不以力稱何則大聖之德具美者衆不可以一介標末此二字一作末事持為百行端首也至如達者七十分以四科而太史公述儒林則不取遊夏之一無之字下同文學著循吏則不言冉季之政事至於貨殖為傳獨以子貢居先掩惡揚善既忘此義成人之美不其闕如司馬遷自一無自字序傳云為太史七年而遭李陵之禍幽於縲紲乃喟然而嘆曰是豫之罪也身虧不用矣自敘如此何其略哉夫云遭李陵之禍幽於縲紲者乍似同陵陷沒以一作遂置於刑又似為陵所間一作陷獲罪於國遂令讀者難得而詳賴班固載其與任安書書中具述被刑所以倘無此録何以克明其事者乎漢書載子長與任少卿書歷説自古述作皆因患而起末云不韋遷蜀世傳呂覽案呂氏之一少之字修撰也廣招俊客比迹春陵此頂招客説下陵一作秋誤共集異聞擬書荀孟此句才説成書思刊一字購以千金則當時宣布為日久矣豈以遷蜀之後方始傳乎且必以身既流移書方見重則又非關作者本因發憤著書之義也而輒引以自喻豈其倫乎若要多舉故事成其博學何不云虞卿窮愁著書八篇而曰不韋遷蜀世傳呂覽斯蓋識有不該思之未審耳昔春秋之時齊有夙沙衛者拒晉殿師郭最稱辱伐魯行唁臧堅抉死此閹官一作宦史記漢書並作閹官見鄙其事尤著者也而太史公與任少卿書論自古刑餘之人為士君子所賤者唯以彌子瑕為始何淺近之甚邪但夙沙出左氏傳漢代其書不行故子長不之見也夫博考前古而舍茲不載至於乘傳車探禹穴亦問為者哉魏世家太史公曰説者皆曰魏以不用信陵君故國削弱至於亡餘以為不然天方令秦平海內其業未成魏雖得阿衡之徒曷益乎夫論成敗者固當以人事為主必推命而言則其理悖矣蓋晉之獲也由夷吾之愎諫秦之滅也由胡亥之無道周之季也由幽王之惑褒姒魯之逐也由稠父之違子家然則敗晉於韓狐突已志其兆亡秦者胡始皇久銘其説口弧箕服彰於宣厲據傳在宣王時之年徵褰與襦顯自文武舊作成之世惡名早著天孽難逃假使彼四君才若桓文德同湯武其若之何茍推此理而言則亡國之君他皆仿此安得於魏無譏舊衍責字者哉夫國之將亡也著斯則其將興也亦然蓋媯後之為公子也其筮曰八世莫之與京畢氏之為大夫也其占曰萬名其後必大姬宗之在水滸也鸑鷟鳴於岐山劉姓之在中陽也蛟龍降於豐澤斯皆瑞表於先而福居其後向若四君德不半古才不逮人終能坐登大寶自致宸極矣乎必如一有太字史公之議也則亦當以其命有必至理無可辭不復嗟其智能頌其神武者矣夫推命而論興滅委運而忘褒貶以之垂誡不其一作其不惑乎自茲以後作者著述往往而然如魚豢魏略議舊脫議字虞世南帝王論或敘遼東公孫之敗原注魚豢魏略議曰當青龍景初之際有彗星出於箕而上徹是為掃除遼東而更置也茍其如此人不能違則德教不設而淫濫首施以取族滅殆天意也或述江左陳氏之亡原注虞世南帝王略論曰永定元年有會稽人支溥為揚州從事夢人著朱衣武冠自天而下手執金版有文字溥看之有文曰陳氏五主三十四年諒知冥數不獨人事其理並以命而言可謂與子長同病者也諸漢史十條漢書孝成紀贊曰成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容貌矣已上皆贊語又五行志曰成帝好微行選期門郎及私奴客一訛作各十餘人皆白衣袒幘自稱富平侯家或乘小豐御者在茵上或皆一作駿非騎出入遠至旁縣故谷永諫曰陛下晝夜在路獨與小人相隨亂眼共坐混淆無別此三句參用疏語志內無公卿百寮不知陛下所在積數年矣一作積有數年由斯而言則成帝魚服嫚遊烏舊作鳥集無度雖外飾威重而內肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者矣觀太史公之創表也於帝王則敘其子孫於公侯則紀其年月列行縈紆以相屬編字戢口而相排雖燕越萬里而於徑寸之內犬牙可接雖昭穆九代而於方尺一作寸之中雁行有敘使讀一衍書字者閲文便睹舉目可詳此其所以為快也如班氏之古今人表者唯以品藻賢愚激揚善惡為務爾既非國家遞襲祿位相承而亦復界重行狹書細字比於他表殆非其類歟蓋人列古今本殊表限必吝而不去則宜以志名篇始自上上終於下下並當明為標榜顯列科條以種類為篇章待優劣為次第仍每於篇後云右一脫右字若干品凡若干人亦猶地理志肇述京華末陳邊塞先列州邵後言戶口也自漢已降作者多門雖新書已行而舊録仍在必校其事一有則字可得而言案劉氏初興書唯陸賈而已子長述楚漢之事專據此書譬夫行不由徑作路字用出不由戶未之聞也然觀遷之所載往往與舊不同如酈生之初謁沛公高祖之長歌鴻鵠非唯文句有別遂乃事理皆殊又韓王名信都而輒去都留信去都留信一作去都字用使稱其名姓全與淮陰不別班氏一準太史曾無弛張一作書無更張靜言恩之深所未了司馬遷之敘傳也始自初生及乎行歷事無巨細莫不備陳可謂審矣而竟不書其字者豈墨生所謂大忘一有也字者乎而班固仍其本傳了無損益此又韓子所以致守株之之説也如固之為遷傳也其初一脫初字宜云遷字子長馮翊陽夏人其序曰雲云至於事終則言其自敘如此此句傳後本有之因論銓敘全法故兼及之著述之體不當如是耶一本連下馬卿條馬卿為自敘傳具在其集中子長因録斯篇郎為列傳班氏仍舊曾無改奪一作作尋一無尋字固於馬揚傳末皆云遷雄之自敘如此至於相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純漢書東方朔傳委瑣一作曲煩碎不類諸篇且不述其亡歿歲時及子孫繼嗣正與司馬相如一脫此四字司馬遷揚雄傳相類尋其傳體必曼倩之自敘也但班氏脫略脫略者謂脫去其自敘如此一句故世莫之知蘇子卿父建行事甚寡韋玄成父賢舊誤作孟德業稍多漢書編蘇氏之傳則先以蘇建標名列韋相之篇疑唐本漢書以玄成名篇則不以韋賢誤孟冠首並其失也班固稱項羽賊一作弒義帝自取滅亡又云於公高門以待封嚴母掃地以持喪如固斯言則深信夫天怨神怒福善禍淫者矣至於其賦幽通也復以天命久定非人理一少理字所移故善惡無征報施多爽斯則同理異説前後自相矛盾者焉或問張輔著班馬優劣論云遷敘三千年事五十萬言固敘二百年事八十萬言是固不如遷也斯言為是乎答曰不然也案太史公書上起黃帝下盡宗周年代雖存事迹殊略至於戰國已下始有可觀然遷雖敘三千年事其間詳備者唯漢興七十餘載而已其省也則如彼其煩也則如此求諸折中未見其宜班氏漢書全取史記仍去其日者倉公等傳以為其事煩蕪不足編次故也若使馬遷舊作遷固後人因易地句竄易耳反使上下不相顧易地而處撰成漢書將恐多言費辭有逾班氏恐當作史安得以此而定其優劣邪漢書斷章事終新室如叔皮存歿時入中興而輒引與前書共編者蓋序傳之恆或作常例者耳荀悅既刪略班史勒成漢紀而彪論王命列在末篇夫以規諷隗囂翼戴光武忽以東部之事擢居西漢之中必如是則賓戲幽通亦宜同載者矣卷十六外篇卷十七

body:
  text: 敍事第二十二夫史之稱美者以敍事為先至若書功過記善惡文而不麗質而非野使人味其滋旨懷其德音三復忘疲百遍無斁自非作者曰聖其孰能與於此乎昔聖人之述作也上自堯典下終獲麟是為屬詞比事之言疏通知遠之旨子夏曰書之論事也昭昭若日月之代明揚雄有云說事者莫辨乎書說理者莫辨乎春秋然則意復深奧訓誥成義微顯闡幽婉而成章雖殊途異轍亦各有美焉諒以師範億載規模萬古為述者之冠冕實後來之龜鏡既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史經史之目於此分焉嘗試言之曰經猶日也史猶星也夫杲日流景則列星寢耀桑榆既夕而辰象粲然故史漢之文當乎尚書春秋之世也則其言淺俗涉乎委巷垂翅不舉懘籥無聞逮於戰國已降去聖彌遠然後能露其鋒穎倜黨不羈故知人才有殊相去若是校其優劣詎可同年自漢已降幾將千載作者相繼非復一家求其善者蓋亦幾矣夫班馬執簡既五經之罪人而晉宋殺青又三史之不若譬夫王霸有別粹駁相懸才難不其甚乎然則人之著述雖同自一手共間則有善惡不均精粗非類若史記之蘇張蔡澤等傳是其美者至於三五本紀日者太倉公龜策傳固無所取焉又漢書之帝紀陳項諸篇是其最也至於淮南王司馬相如東方朔傳又安足道哉豈繪事以丹素成妍帝京以山水為助故言媸者其史亦拙事美者其書亦工必時乏異聞世無奇事英雄不作賢俊不生區區碌碌抑惟恆理而責史臣顯其良直之體申其微婉之才蓋亦難矣故揚子有云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀丘明之記事也當桓文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壞事益縱橫則春秋美辭幾乎翳矣觀子長之敍事也自周以往言所不該其文闊略無復體統洎秦漢已下條貫有倫則煥炳可觀有足稱者至若荀悅漢紀其才盡於十帝陳壽魏書其美窮於三祖觸類而長他皆若斯夫識寶者稀知音蓋寡近有裴子野宋略王劭齊志此二家者并長於敍事無愧古人而世人議者皆雷同舉裴而共詆王氏夫江左事雅裴筆所以專工中原迹穢王文由其屢鄙且幾原務飾虛辭君懋志存實錄此美惡所以為異也設使丘明重出子長再生記言於賀六渾之朝書事於士尼干之代將恐輟毫栖牘無所施其德音而作者安可以今方古一概而論得失夫敍事之體其流甚多非復片言所能覼縷今輒區分類聚定為三篇列之於下夫國史之美者以敍事為工而敍事之工者以簡要為主簡之時義大矣哉歷觀自古作者權輿尚書發蹤所載務於寡事春秋變體其言貴於省文斯蓋澆淳殊致前後異迹然則文約而事豐此述作作之尤美者也始自兩漢迄乎三國國史之文日傷煩富逮晉已降流宕逾遠尋其冗句摘其煩詞一行之間必謬增數字尺紙之內恆虛費數行夫聚蟻成雷羣輕折軸況於章句不節言詞莫限載之兼兩曷足道哉蓋敍事之體其別有四有直紀其才行者有唯書其事蹟者有因言語而可知者有假贊論而自見者至如古文尚書稱帝堯之德標以允恭克讓春秋左傳言子太叔之狀目以美秀而文所稱如此更無他說所謂直紀其才行者又如左氏載申生為驪姬所譖自縊而亡班史稱紀信為項籍所圍代君而死此則不言其節操而忠孝自彰所謂唯書其事迹者又如尚書稱武王之罪紂也其誓曰焚炙忠良刳剔孕婦左傳欒武子之論楚也其詞曰蓽輅藍縷以啓山林此則才行事迹莫不闕如而言有關涉事便顯露所謂因言語而可知者又如史記衛青傳後太史公曰蘇建嘗責大將軍不薦賢待士漢書孝文紀末其贊曰吳王詐病不朝賜以几杖此則傳之與紀並所不書而史臣發言別出其事所謂假贊論而自見者然則才行事迹言語贊論凡此四者皆不相須若兼而畢書則其費尤廣近史紀傳沒言人居哀毀損則先云至性純孝欲言人盡夜觀書則先云篤志好學欲言人赴敵不顧則先云武藝絕倫欲言人下筆成篇則先云文章敏速此則既述才行又彰事迹也如穀梁傳云驪姬以鴆為酒藥脯以毒獻公田來驪姬曰世子已祀故致福於君君將食驪姬跪曰食自外來者不可不試也覆酒於地而地墳以脯與犬犬斃驪姬下堂而啼呼曰天乎天乎國子之國也子何遲乎為君又禮祀云陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也此則既書事迹又載言語也又近代諸史人有行事美惡皆已具其紀傳中續以讚論重述前事此則才行事迹紀傳已書讚論又載也但自古經史通多此纇公梁禮新序說苑戰國策楚漢春秋史記迄於皇家所撰五代史皆有之能獲免者蓋十無一二唯左丘明裴子野王劭無此也又敍事之省其流有二焉一曰省句二曰省字如左傳宋華耦來盟稱其先人得罪於宋魯人以為敏夫以鈍者稱敏魯人謂鈍人也禮記中已有注解則明賢達所嗤此為省句也春秋經曰隕石於宋五夫聞之隕視之石數之五加以一字太詳減其一字太略求諸折中簡要合理此為省字也其有反於是者若穀梁稱郄克眇季孫行父禿孫良夫跛齊使跛者逆跛者禿者逆禿者眇者逆眇者僂者逆僂者蓋宜除跛者已下句但云各以其類逆必事皆再述則於文殊費此為煩句也漢書張蒼傳云年老口中無齒蓋於此一句之內去年及口中可矣夫此六文成句而三字妄加此為煩字也然則省句為易省字為難洞識此心始可言史矣苟句盡餘剩字皆重複史之煩蕪職由於此蓋餌巨魚者垂其千釣而得之在於一筌捕高鳥者張其萬置而獲之由於一目夫敍事者或虛益散辭廣加閑說必取其所要不過一言一句耳苟能同夫獵者漁者既執而置釣必收其所留者唯一筌一目而已則庶幾胼胝盡去而塵垢都捐華逝而實存滓去而瀋在矣嗟乎能損之又損而玄之又玄輪扁所不能語斤伊摯所不能言鼎也夫飾言者為文編文者為句句積而章立章積而篇成篇目既分而一家之言備矣古者行人出境以詞令為宗大夫應對以言文為主況乎列以章句刊之竹帛安可不勵精雕飾傳諸諷誦者哉自聖賢述作是曰經典句皆韶夏言盡琳瑯秩秩德音洋洋盈耳譬夫游滄海者徒驚其浩曠登太山者但嗟其峻極必摘以尤最不知何者為先然章句之言有顯有晦顯也者繁詞縟說理盡於篇中晦也者省字約文事溢於句外然則晦之將顯優劣不同較可知矣夫能略小存大舉重明輕一言而巨細咸該片語而洪纖靡漏此皆用晦之道也昔古文義務却浮詞虞書云帝乃殂落百姓如喪考妣夏書云啓呱呱而泣予不子周書稱前徒倒戈血流漂杵虞書云四罪而天下咸服此皆文如闊略而語實周贍故覽之者初疑其易而為之者方覺其難固非雕蟲小技所能斥苦其說也既而丘明受經師範尼父夫經以數字包義而傳以一句成言雖繁約有殊而隱晦無異故其綱紀而言邦俗也則有士會為政晉國之盜奔秦邢遷如歸衛國忘亡其款曲而言人事也則有犀革裹之比及宋手足皆見三軍之士皆如挾纊斯皆言近而旨遠辭淺而義深雖發語已殫而含義未盡使夫讀者望表而知里捫毛而辨骨覩一事於句中反三隅於字外晦之時義不亦大哉洎班馬二史雖多謝五經必求其所長亦時值斯語至若高祖亡蕭何如失左右手漢兵敗績睢水為之不流董生乘馬三年不知牝牡翟公之門可張雀羅則其例也自茲已降史道陵夷作者蕪音累句雲蒸泉湧其為文也大抵編字不隻捶句皆雙修短取均奇偶相配故應以一言蔽之者輒足為二言應以三句成文者必分為四句彌漫重沓不知所裁是以處道受責於少期魏書鄧哀王傳曰容貌姿美有殊於衆故特見寵異裴松之曰一類之言而分以為三亦敍屬之一病也子昇取譏於君懋王劭齊志曰時議恨刑子才不得掌興魏之書悵怏溫子昇亦若此而撰永安記率是支言非不幸也蓋作者言雖簡略理皆要害故能疏而不遺儉而無闕璧如用奇兵者持一當百能全克敵之功也若才乏儁穎思多昏滯費詞既甚敍事纔周亦猶售鐵錢者以兩當一方成貿遷之價也然則史漢已前省要如彼國晉已降煩碎如此國謂三國志晉謂晉書也必定其妍媸甄其善惡夫讀古史者明其章句皆可詠歌觀近史者悅其緒言直求事意而已是則一貴一賤不言可知無假榷揚而其理自見矣昔文章既作比興由生鳥獸以媲賢愚草木以方男女詩人騷客言之備矣洎乎中代其體稍殊或擬人必以其倫或述事多比於古當漢氏之臨天下也君實稱帝理異殷周子乃封王名非魯衛而作者猶謂帝家為王室公輔為王臣盤石加建侯之言帶河申俾侯之誓而史臣撰錄亦同彼文章假託古詞翻易今語潤色之濫萌於此矣降及近古彌見其甚至如諸子短書雜家小說論逆臣則呼為問鼎稱巨寇則目以長鯨邦國初基皆云草昧帝王兆迹必號龍飛斯並理兼諷諭言非指斥異乎游夏措詞南董顯書之義也如魏收代史吳均齊錄或牢籠一世或苞舉一家自可申不刊之格言弘至公正之說而收稱劉氏納貢則曰來獻百牢均敍元日臨軒必云朝會萬國夫以吳徵魯賦禹計塗山持彼往事用為今說置於文章則可施於簡册則否矣亦有方以類聚譬諸昔人如王隱稱諸葛亮挑戰冀獲曹咎之利崔鴻稱慕容沖見幸為有龍陽之姿其事相符言之讜矣而盧思道稱邢邵喪子不慟自東門吳已來未之有也李百藥稱王琳雅得人心雖李將軍恂恂善誘無以加也斯則虛引古事妄足庸音苟矜其學必辨而非當者矣昔禮記檀弓工言物始夫自我作故首創新儀前史所刊後來取證是以漢初立槥孟堅所書魯始為髽丘明是記河橋可作元凱取驗於毛詩男子有笄伯支遠徵於內則即其事也案裴景仁秦記稱苻堅方食撫盤而詬王劭齊志述洛干感恩脫帽而謝及彥鸞撰以新史重規删其舊錄乃易撫盤以推案變脫帽為免冠夫近世通無案食胡俗不施冠冕直以事不類古改從雅言欲令學者何以考時俗之不同察古今之有異又自雜種稱制充牣神州事異諸華言多醜俗至如翼犍道武原諱黑獺周文本名而伯起革以他語德棻闕而不載蓋厖降蒯瞶字之媸也重耳黑臀名之鄙也舊皆列以三史傳諸五經未聞後進談講別加刊定況齊丘之犢彰於載讖杜臺卿齊記載讖云首牛入西谷逆犢上齊丘也河邊之狗著於謠詠王劭齊志載謠云貛貛頭團圝河中狗子破爾菀也明如日月難為蓋藏此而不書何以示後亦有氏姓本複減省從單或去万紐而留于或止存狄而除厙求諸自古罕聞茲例昔夫子有云文勝質則史故知史之為務必藉於文自五經已降三史而往以文敍事可得言焉而今之所作有異於是其立言也或虛加練飾輕事雕彩或體兼賦頌詞類俳優文非文史非史譬夫龜茲造室雜以漢儀而刻鵠不成反類於鶩者也卷六內篇卷七

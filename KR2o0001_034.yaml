body:
  text: 雜述第三十四在昔舊作昔在三墳五典春秋檮杌即當作皆上代帝王之書中古諸侯之記行諸歷代以為格言其餘外傳則神農嘗藥厥有本草夏禹敷土實著山經世本辨姓著自周室家語載言傳諸孔氏是知偏記小說自成一家而能與正史參行其所由來尚矣愛及近古斯道漸煩史氏流別殊途並騖榷而為論其流有十焉一曰偏紀一作記後同二曰小錄三曰逸事四曰瑣言五曰郡書六曰家史七曰別傳八曰雜記九曰地理書十曰都邑簿夫皇王受命有始有卒作者著述詳略難均有權記當時不終一代若陸賈楚漢春秋樂資山陽一有公字一以偶句從刪載記王韶本名韶之晉安陸當作帝紀姚最舊脫最字梁昭舊脫昭字後略此之謂偏紀者也普天率土人物弘多求其行事罕能周悉則有獨舉所知編為短部若戴逵竹林名士王粲漢末英雄蕭世誠懷舊志盧子行知己傳此之謂小錄者也國史之任記事記言視聽不該必有遺逸於是好奇之士補其所亡若和嶠汲塚紀年葛洪西京雜記顧協瑣語謝綽拾遺此之謂逸事者也街談巷議時有可觀小說厄言猶賢於已故好事君子無所棄諸若劉義慶世說裴榮期語林孔思尚語錄陽玠松或作松玠談藪此之謂瑣言者也汝穎奇士江漢英靈人物所生載光郡國故鄉人學者編而記之若圈稱陳留耆舊周斐一作裴汝南先賢陳壽益部耆舊虞預會稽典錄此之謂郡書者也高門華胄奕世載德才子承家思顯父母由是紀其先烈貽厥後來若揚雄家諜殷敬世傳孫氏譜記陸宗系歷此之謂家史者也賢士貞女類聚區分雖百行殊途而同歸於善則有取其所好各為之錄若劉向列女梁鴻逸民二字恐誤當云高士趙採忠臣徐廣孝子此之謂別傳者也陰陽為炭造化為工流形賦象於何不育求其怪物有廣異聞若祖臺本名臺之志怪干寶搜神劉義慶幽明劉敬叔異苑此之謂雜記者也九州土字萬國山川物產殊宜風化異俗如各志其本國足以明此一方若盛弘之荊州記常璩華陽國志辛氏三秦羅含湘中此之謂地理書者也帝王桑梓列聖遺塵經始之制不恆厥所茍能書其軌則可以龜鏡將來若潘岳關中陸機洛陽三輔黃圖建康宮殿此之謂都邑簿者也大抵偏紀小錄之書皆記即日當時之事求諸國史最為實錄然皆言多鄙樸事罕圓備終不能成其不刊永播來葉徒為後生作者削稿之資焉逸事者皆前史所遺後人所記求諸異說為益實多及妄者為之則茍載傳聞而無銓擇由是真偽不別是非相亂如郭子橫之洞冥王子年之拾遺全構虛詞用驚愚俗此其為弊之甚者也瑣言者多載當時辨對流俗嘲謔俾夫樞機者藉為舌端談話者將為口實及蔽者為之則有詆訐相戲施諸祖宗褻狎鄙言出自床第莫不升之紀錄用為雅言固以無益風規有傷名教者矣郡書者矜其鄉賢美其邦族施於本國頗得流行置於他方罕聞愛異其有如常璩之詳審劉昺或作炳非之該博而能傳諸不朽見美來裔者蓋無幾焉家史者事惟三族言止一門正可行於室家難以播於邦國且箕裘不墮則其錄猶一作雖非存茍薪構已亡則斯文亦喪者矣別傳者不出胸臆非由機杼徒以博採前史聚而成書其有足以新言加之別說者蓋不過十一而已如寡聞末學之流則深所嘉尚至於探幽索隱之士則無所取材雜記者若論神仙之道則服食煉或作練氣可以益壽延年語魑魅之途則福善禍淫可以懲惡勸善斯則可矣及謬者為之則茍談怪異務述妖邪求諸弘益其義無取地理書者若朱贛所採浹於九州闞駰所書殫於四國斯則言皆雅正事無偏黨者矣其有異於此者則人自以為樂土家自以為名都競美所居談過其實又城池舊跡山水得名皆傳諸委巷用為故實鄙哉都邑薄者如宮闕一作闈陵廟街廛郭邑辨其規模明其制度斯則可矣及愚者為之則煩而且濫博而無限一有故字或作於字疑皆衍論榱棟則尺寸皆書記草木則根株必數務求詳審持此為能一訛論遂使學者觀之瞀亂而難紀也於是考茲十品征彼百家則史之雜名其流盡於此矣至於期間礙失紛糅善惡相兼既難為口縷故粗陳梗概且同自鄶無足譏焉又案子之將史本為二說然一脫然字如呂氏淮南玄晏抱樸凡此諸子多以敘事為宗舉而論之抑亦史之雜也但以名目有異不復編於此科蓋語曰眾一作聚星之明不如一月之光歷觀自古作者著述多矣雖復門千戶萬波委雲集而冒皆瑣碎事必從殘固難以接光塵於五傳並輝烈於三史古人以比玉屑滿篋良有旨哉然則作然而用萏蕘之言明王一作主必擇葑菲之體詩人不棄故學者有當作欲博聞舊事多識其恐當作奇物若不窺別錄不討異書專治周孔之章句直守遷固之紀傳亦何能自致於此乎且夫子有云多聞擇其善者而從之知之次也茍如是則書有非聖言多不經學者博聞蓋在擇之而已

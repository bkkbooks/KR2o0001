body:
  text: 表曆第七蓋譜之建名起於周代表之所作因譜象形故桓君山有云太史公三代世表旁行邪上並效周譜此其證歟夫以表爲文用述時事施彼譜牒容或可取載諸史傳未見其宜何者易以六爻窮變化經以一字成褒貶傳包五始詩含六義故知文尚簡要語惡煩蕪何必款曲重沓方稱周備觀馬遷史記則不然矣夫天子有本紀諸侯有世家公卿以下有列傳至於祖孫昭穆年月職官各在其篇具有其說用相考覈居然可知而重列之以表成其煩費豈非謬乎且表次在篇第編諸卷軸得之不爲益失之不爲損用使讀者莫不先看本紀越至世家表在其間緘而不視語其無用可勝道哉既而班東二史東謂東觀漢記各相祖述迷而不悟無異逐狂必曲爲銓擇強加引進則列國年表或可存焉何者當春秋戰國之時天下無主羣雄錯峙各自年表若申之於表以統其時則諸國分年一時盡見如兩漢御曆四海成家公卿既爲臣子王侯才比郡縣何用表其年數以別於天子者哉又有甚於斯者異哉班氏之人表也區別九品網羅千載論世則異時語姓則他族自可方以類聚物以羣分使善惡相從先後爲次何藉而爲表乎且其書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢蔦施松上附生疣贅不知翦截何斷而爲限乎至法盛書載中興改表爲注名目雖巧蕪累亦多當晉氏播遷南據揚越魏宗勃起北雄燕代其間諸僞十有六家不附正朔自相君長崔鴻著表頗有甄明比於史漢羣篇其要爲切者矣若諸子小說編年雜記如韋昭洞紀陶弘景帝代年曆皆因表而作用成其書既非國史之流故存而不述

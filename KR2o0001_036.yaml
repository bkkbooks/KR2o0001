body:
  text: 自敘第三十六予幼奉庭訓早游文學年在紈綺便受古文尚書每苦其辭艱瑣難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聽逮講畢即為諸兄說之因竊嘆曰若使書皆如此吾不復怠矣先君奇其意於是始授以左氏期年而講誦都畢於時年甫十有二矣所講雖未能深解而大義略舉父兄欲令博觀義舊作議疏精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既欲知古今沿革歷數相承於是觸類而觀不假師訓自漢中興已降迄乎皇家實錄年十有七而窺覽略周其所讀書多因假賃雖部帙殘缺篇第有遺至於敘事之紀綱立言之梗概亦粗知之矣但於時將求仕進兼習揣摩至於專心諸史我則未暇洎年登弱冠射策登朝於是思有餘閑獲遂一作遂其本願旅一作旋非游京洛頗積歲年公私借書恣情披閱至如一代之史分為數家其間雜記小書又竟為異說莫不鉆研穿鑿盡其利害加以自小觀書喜談名理其所悟者皆得之襟亦作衿腑非由染習故始在總角讀班謝兩漢便怪前書不應有一脫有字古今人表後書宜為更始立紀當時間者共責以為舊脫為字童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范曄集果以二史疑當作事為非其有暗合於古人者蓋不可勝紀始知流俗之士難與之言凡有異同蓄諸方寸及年以已通過一多而字立言悟日多常恨時無同好可與言者維東海徐堅晚與之遇相得甚歡雖古者伯牙之識鐘期管仲之知鮑叔牙期管鮑倒用有味不是過也復有永城朱敬則沛國劉允濟義舊誤作吳興薛謙光河南元行沖陳留吳兢壽春裴懷古亦以言議見許道術相知所有榷揚得盡懷抱每云德不孤必有鄰四海之內知我者不過數子而已矣昔仲尼以睿聖明哲天縱多能睹史籍之繁文懼覽者之不一刪詩為三百篇約史記以修春秋贊易道以黜八索述職方以除九丘討論墳典斷自唐虞以迄於周其文不刊為後王法自茲厥後史籍逾多茍非命世大才孰能刊正其失嗟予小子敢當此任其於史傳也嘗欲自班馬已降訖於姚一脫姚字李令狐顏孔諸書莫不因其舊義普加厘革但以無夫子之名而輒行夫子之事將恐致一脫致字驚末一作愚俗取咎時人徒有其勞而莫之見賞所以每握管嘆息遲回者久之非欲之而不能實能之而不敢舊作欲誤也既朝廷有知意恐音字乏訛者遂以載筆見推由是三為史臣再入東觀原注則天朝為著作佐郎轉左史今上初即位又除著作長安中以本官兼修國史會遷中書舍人暫罷其任神龍元年又以本官兼修國史迄今不之改今之史館即古之東觀也每惟皇家受命多歷年所史官所編粗惟紀錄起居實錄之類則有之至於紀傳及志則皆未有其書長安中一作年一作中年會奉詔預修唐疑當作國史及今上中宗即位又敕撰則天大聖皇後實錄凡所著述嘗欲行其舊議而當時同作諸士及監修貴臣每與其當有言字鑿枘相違齟齬難入故其恐當作有所載削皆與俗浮沉雖自謂依違茍從然猶大為史官所嫉嗟乎雖任當其職而吾道不行見用於時而美恐當作善善志用左氏邾黑肱傳語志不遂鬱怏孤憤無以寄懷必寢而不言嘿而無述又恐沒世之後誰知予者故退而私撰史通以見其志昔漢世劉安著書號曰淮南子其書牢籠天地博極古今上自太公下至商鞅其錯綜經緯自謂兼於數家無遺力矣然自淮南已後作者無絕一作絕無必商榷而言則其流又眾蓋仲尼既歿微言不行史公著書是非多謬由是百家諸子詭說異辭務為小辨破彼大道故揚雄法言生焉儒者之書博而寡要得其糟粕失其菁華而流俗鄙夫貴遠賤近傳茲恐當作轉滋牴牾自相欺惑故王充論衡生焉民者冥也冥然罔知率彼愚蒙墻面而視或訛音鄙句莫究本源或守誅膠柱動多拘忌故應劭風俗通生焉五常異稟百行殊執一作軌能有兼偏知有長短茍隨才而任使則片善不遺必求備而後用則舉世莫可故劉劭人物志生焉夫開國承家立身行事一文一武或出或處雖賢愚壤隔善惡區分茍時無品藻則理難銓一作錯非綜故陸景典語生焉詞人屬文其體非一譬甘辛殊味丹素異彩後來祖述識昧一訛殊圓通家有詆訶人相掎摭故劉勰文心生焉若史通之為書也蓋傷當時載筆之士其義不純思欲辨其指歸殫其體統夫其書雖以史為主而餘波所及上窮王道下掞人倫總括萬殊包吞千有自法言已降迄於文心而往固一脫固字以納諸胸中曾不口音蠆或誤作蠆芥者矣夫其為義也有與奪焉有褒貶焉有鑒誡焉一脫此四字有諷刺焉其為貫穿者深矣其為網羅者密矣其所商略者遠矣其所發明者多矣蓋談經者惡聞服杜之嗤論史者憎言班馬之失而此書多譏往哲喜述前非獲罪於時固其宜矣猶冀知音君子時有觀焉尼父有云罪我者春秋知我者春秋抑一脫此六字斯之謂也昔梁徵士劉孝標作敘傳其自比於馮敬通者有三而予輒不自揆亦竊比於揚子云者有四焉何者揚雄嘗好雕蟲小技老而悔其少作餘幼喜詩賦而壯都不為恥以文士得名期以述者自命其似一也揚雄草玄累年不就當時聞者莫不哂其徒勞餘撰史通亦屢移寒暑悠悠塵俗共以為愚其似二也揚雄撰法言時人竟尤其妄故作解嘲以酬一訛訓之餘著史通見者亦互言其短故作釋蒙唐書本傳不著以拒之其似三也揚雄少為範踆漢書作逡劉歆所重及聞其撰太玄經則嘲以恐蓋醬瓿然劉範之重雄者蓋貴其文彩若長揚羽獵之流耳如太玄深奧理難理難一作難以探賾既絕窺逾故加譏誚餘初好文筆頗獲譽於當時晚談史傳遂減價於知己其似四也夫才唯下劣而跡類先賢是用銘之於心持一訛特以自慰抑猶有遺恨懼不似揚雄者有一焉何者雄之玄經始成雖為當時所賤而桓譚以為數百年外其書必傳其後張衡陸績果以為絕倫參聖夫以史通方諸太玄今之君山即徐堅朱敬則等數君是也後來張陸則未之知耳嗟乎倘使平子不出公紀陸績不生將恐此書與糞土同捐煙燼俱滅後之識者無得而觀此予所以撫卷漣洏淚盡而繼之以血也卷十外篇卷十一

body:
  text: 世家第五自有王者便置諸侯列以五等疏為萬國當周之東遷王室大壞於是禮樂征伐自諸侯出迄乎秦世分為七雄司馬遷之記諸國也其編次之體與本紀不殊蓋欲抑彼諸侯異乎天子故假以他稱名為世家案世家之為義也豈不以開國承家世代相續至如陳勝起自羣盜稱王六月而死子孫不嗣社稷靡聞無世可傳無家可宅而以世家為稱豈當然乎夫史之篇目皆遷所創豈以自我作故而名實無準且諸侯大夫家國本別三晉之與田氏自未為君而前齒列陪臣屈身藩后而前後一統俱歸世家使君臣相雜升降失序何以責季孫之八佾舞庭管氏之三歸反坫又列號東帝抗衡西秦地方千里高視六國而沒其本號唯以田完制名謂田完世家也求之人情孰謂其可當漢氏之有天下也其諸侯與古不同夫古者諸侯皆即位建元專制一國綿綿瓜瓞卜世長久至於漢代則不然其宗子稱王者皆受制京邑自同州郡異姓封侯者必從宦天朝不臨方域或傳國唯止一身或襲爵方經數世雖名班胙土而禮異人君必編世家實同列傳而馬遷強加別録以類相從雖得畫一之宜詎識隨時之義蓋班漢知其若是釐革前非至如蕭曹茅土之封荊楚葭莩之屬并一概稱傳無復世家事勢當然非矯枉也自茲已降年將四百及魏有中夏而揚益不賓終亦受屈中朝見稱偽主為史者必題之以紀則上通帝王榜之以傳則下同臣妾梁主敕撰通史定為吳蜀世家持彼僭君比諸列國去太去甚其得折中之規乎次有子顯齊書北編魏虜牛弘周史南記蕭察考其傳體宜曰世家但近古著書通無此稱用使馬遷之目湮沒不行班固之名相傳靡易者矣

front:
  text: 跋史通
  hash: sha256:b46e850d7ca49dce056c21a91829529a56e7f7f90bd813062604426af3d94ee0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_022-1a}
body:
  text: 方洲山人楊名撰儼山先生旣正史通使者来緘以示名且委之為說名敬受而讀之至三四過則見夫井井乎如珠之就繩炳炳乎如鑑之脫垢洋洋乎如韶之叶律而琴之定徽也乃起而歎曰邈哉淵乎先生之用心矣夫尚犮則詩書是資畜德則言行有頼故雖塵籍蠧編小辭淺說罔不有至理存焉者聖賢固弗廢哉况知㡬以良史才三爲史官徘徊司籍之曹歲月寖乆其所以沉潜考證之者當不寡薄則其著而爲書固宜兼備諸體網羅百家馳驅列代㡬自成一門户獨惜夫評議狥於意見是非謬於聖哲不䏻使人無遺憾焉雖然作室而先式則羣材無淆織錦而預圖諸様庶百卉之不相雜此其道在我而權存乎心爾夫旣曰尚友矣畜德矣則凢詩書言行之云皆足以輔吾志而助吾力罔見有或病吾事者矧曰辨類考故推時核勢案迹之實係乎然則先生兹刻雅意其在是也已矣若夫徐宋柳子所稱說者見則有異同言則有得失或未足以語此名且將質之於先生云嘉靖丙申歲秋七月朔日䟦
  hash: sha256:60c9955df527660264bc29bac487b2ec2f75560475a9b61f65a20aad60162e22

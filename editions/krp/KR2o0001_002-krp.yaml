front:
  text: 史通卷第二
  hash: sha256:bdff33e5a33d3516245ce0a295bac4c115e1b69589748bc54ea2dbe72c49e309
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_002-1a}
body:
  text: 内篇二體載言本紀世家列傳二體第二三五之代書有典墳悠㦲邈矣不可得而詳自唐虞已下迄于周是為古文尚書然世猶淳質文從簡畧求諸備體固已缺如旣而丘明傳春秋子長著史記載筆之體扵斯備矣後來繼作相與因循假有攺張變其名目區域有限孰能踰此蓋荀悅張璠丘明之黨也班固華嶠子長之流也惟二家各相矜尚必辯其利害可得而言之夫春秋者繫日月而為次列世歳以相續中國外夷同秊共世莫不備載其事形于目前理盡一言語無重出此其所以為長也至扵賢士貞女高才雋德事當衝要者必盰衡而備言跡在沉冥者不枉道而詳說如絳縣之老𣏌梁之妻或以酬晉卿而獲記或以對齊君而見錄其有賢如桞惠仁若顔囬終不得彰其名氏顯其言行故論其細也則纎芥無遺語其麄也則丘山是棄此其所以為異也史記者紀以包舉大端傳以委曲細事表以序其秊爵志以總括遺漏逮扵天文地理國典朝章顯隱必該洪纎靡失此其所以為長也若乃同為一事分在數篇斷續相離前後屡出扵髙紀則云語在項傳扵項傳則云事具髙紀又編次同類不求年月後生而擢居首秩先輩而抑歸末章遂使漢之買誼將楚屈原同列魯之曹沬與燕荆軻並編此其所以為短也考茲勝負互有得失而晉世干寳著書乃盛譽丘明而深抑子長其義云能以三十卷之約括囊二百四十秊之事靡有遺也尋其此說可謂勁挺之詞乎按春秋時事入扵左氏所書者盖三分得其一耳丘明自知其略也故為國語以廣之然國語之外尚多亡逸安得言其括囊靡遺者㦲向使丘明世為史而皆倣左傳也至扵前漢之嚴君平鄭子貞後漢之郭林宗黃叔度眺錯董生之對䇿劉向谷永之上書斯並德冠人倫名馳海内識洞幽顯言窮軍國或以身隱位卑不預朝政或以文煩事慱難為次序皆略而不書斯則可也必情有所恡不加刋削則漢氏之志傳百卷併列扵十二紀中將恐碎璅多蕪䦨單失力者矣故班固知其若此設紀傳以區分使其歷然可觀綱紀有别荀悅猒其迂濶又依左氏成書剪截班史篇才三十歷代保之有踰本傳然則班荀二體角力爭先欲廢其一固亦難矣後來作者不出二途故晉史有王虞而副以于紀宋書有徐沈而分為裴略各有其羙並行扵世異夫令昇之言唯守一家而已載言第三古者言為尚書事為春秋左右二史分尸其職盖桓文作覇紏合同盟春秋之時事之大者也而尚書闕紀秦師敗績繆公誡誓尚書之中言之大者也而春秋靡録此則言事有别斷可知矣逮左氏為書不遵古法言之與事同在傳中然而言事相兼煩省合理故使讀者尋繹不倦覽諷忘疲至扵史漢則不然凡所包舉務存恢慱文辭之記繁富為多是以賈誼晁錯董仲舒東方朔等傳唯尚錄言罕逢載事夫方述一事得其綱紀而隔以大篇分其序叙遂令披閱之者有所懵然後史相承不攺其輙交錯紛擾古今是同按遷固列君臣扵紀傳統遺逸扵表志雖篇名甚廣而言獨無錄愚謂凢為史者冝扵表志之外更立一書若人主之制册誥令群臣之章表移撽收之紀傳悉入書部題為制册章表書以類區别他皆放此亦猶志之有禮樂志刑法志又詩人之什自成一家故風雅比興非三傳所取自六義不作文章生焉若韋孟諷諫之詩楊雄出師之頌馬卿之書封禪賈誼之論過秦諸如此文皆施紀傳切謂冝從古詩例斷入書中亦猶舜典列元首之歌夏書包五子之詠者也夫能使史體如是庻㡬春秋尚書之道備矣晉于寳議撰晋史以為冝准左丘明其臣下委曲仍為譜注于時議者莫不宗之故前史之所未安後史之所冝革是用敢同有識爰立茲篇庻世之作者覩其利害如謂不然請俟來哲本紀第四昔汲冢竹書是曰紀年吕氏春秋肇立紀號盖紀者綱紀庶品網羅萬物考篇目之大者其莫過扵此乎及司馬遷之著史記也又列天子行事以本紀名篇後世因之守而勿失譬夫行夏時之正朔服孔門之教義者雖地遷陵谷時變質文而此道常行終莫之能易也然遷之以天子為本紀諸侯為世家斯誠讜矣但區域旣定而疆理不分遂令後之學者罕詳其義按姬自后稷至扵西伯嬴自伯翳至扵莊王爵乃諸侯而名隷本紀若以西伯莊王以上别作周秦世家持殷紂以對武王㧞秦繆以承周赧使帝王傳授昭然有别豈不善乎必以西伯以前其事簡約别加一目不足成篇則伯翳之至莊王其書先成一卷而不共世家等列輒與本紀同編此尤可恠也項羽僣盗而死未得成君求之扵古則齊無知衛州吁之類也安得諱其名字呼之曰王者乎春秋吳楚僣擬書如列國假使羽竊帝名正可抑同羣盗况其名曰西楚號止霸王者乎霸王者即當時諸侯諸侯而稱本紀求名責實再三乖繆盖紀之為體猶春秋之經繋日月以成歳時書君上以顯國統曹武雖曰人臣實同王者以未登帝位國不建元陳志權假漢年編作魏紀亦猶兩漢書首列秦莽之正朔也後來作者宜准扵斯而陸機晉書列紀三祖直序其事竟不編年年旣不編何紀之有夫位終北面一㮣人臣儻追加大號止入傳阼是以弘嗣其史不紀孫和緬求故實非無往例逮伯起之次魏乃編景穆扵本紀以戾國虚謚間厠武昭𣣔使百世之中若為魚貫又紀者旣以編年為主唯敘天子一人有大事可書者則見之扵年月其書事委曲付之列傳此其義也如近代述者魏著作李安平之徒其撰魏齊二史彦魏百藥撰北齊書淵撰後魏書李扵諸帝篇或雜載臣下或兼言他事巨細畢書洪纎備錄之捷百藥帝紀述淮如彦淵帝紀載沙苑是也南之敗全為傳體有異紀文迷而不悟無乃太甚世之讀者幸為詳焉世家第五自有王者便置諸侯列以五等䟽為萬國周之東遷王室大壞扵是禮樂征伐自諸侯出迄乎秦世分為七雄司馬遷之記諸國也其編次之體與本紀不殊盖𣣔抑彼諸侯異乎天子故假以他稱名為世家其為義也豈不以開國承家世代相續至扵陳勝起自群盗稱王六月而死子孫不嗣社稷靡聞無世可傳無家可宅而以世家為稱豈當然乎夫史之篇目皆遷所創豈以自我作古而名實無凖且諸侯大夫家國本别三晉之與田氏自未為君而前齒列陪臣屈身藩后而前後一統俱歸世家使君臣相雜升降失序何以責季孫之八佾舞庭管氏之三歸反坫又列號東帝抗衡西秦地方千里髙視六國而没其本號唯以田完制名世家也謂田完求之人情孰謂其可當漢氏之有天下也其諸侯與古不同夫古者諸侯皆即位建元專制一國綿綿瓜瓞卜世長乆至扵漢代則不然其宗子稱王者皆受制亰邑自同州郡異姓封侯者必從官天朝不臨方域或傳國唯止一身或襲爵才經𢾗世雖名班爵胙土而禮異人君必編為世家實同列傳而馬遷强加别錄以類相從雖得畫一之冝詎識隨時之義盖班漢知其若是釐革前非至如蕭曹茅土之封荆楚葭莩之屬並一槩稱傳無復世家事勢當然非矯枉也自茲已降年將四百及魏有中夏而楊益不賔終亦受屈中朝見稱偽主為史者必題之以紀則上通帝王牓之以傳則下同臣妾梁主敕撰通史定為吳蜀世家持彼僣君比諸列國去太去甚其得折中之䂓乎次有子顯齊書北編魏虜牛弘周史南記蕭詧考其傳體宜曰世家但今古著書通無此稱用使馬遷之册湮没不行班固之名相傳靡易者矣列傳第六夫紀傳之興肇扵史漢盖紀者編年也傳者列事也編年者曆帝王之歳月猶春秋之經列事者錄人臣之行狀猶春秋之傳春秋則傳以觧經史漢則傳以釋紀尋茲例草創始自子長而朴略猶存區分未盡如項王立傳而以本紀為名非唯羽之僣盗不可同扵天子且推其序皆作傳言求謂之紀不可得也或曰遷紀不可得也或曰遷紀五帝夏殷亦皆列事而已子曽不之恠何獨尤扵項紀㦲對曰不然夫五帝之與殷夏也正朔相承子孫逓及雖無年可著紀亦何傷如項羽者事起秦餘身終漢始殊夏氏之后羿似皇帝之蚩尤譬諸閠位容可列紀方之駢胟難以成編且夏殷之紀不引他事夷齊諫周實當紂日而扸為列傳不入殷篇項紀則上下同載君臣交雜紀名傳體所以成媸夫傳紀之不同猶詩賦之有别而後來繼作亦多所未詳按范曄漢書紀后妃六宫其實傳也而謂之為紀陳夀國志載孫劉二帝其實紀也而呼之曰傳考𢾗家之所作其未逹紀傳之情乎苟上智猶且若斯則中庸故可知矣又傳之為體大抵相同而述者多方有時而異耳如二人行事首尾相隨則有一傳兼書包括令盡若陳餘張耳合體成篇陳勝吳廣相叅並錄是也亦有事跡雖寡名行可崇寄在他篇為其摽冠若啇山四皓事列王陽之首廬江毛義名在劉平之上是也自兹已後史氏相承述作雖多斯道多廢其同扵古者惟有附出而已尋附出之為義攀列傳以垂名若紀季之入齊顓臾之事魯皆附庸自託得厠扵朋流然世之求名者咸以附出為小盖以其因人成事不足稱多故也竊以書名竹素豈限詳略但問其事竟如何耳借如邵平紀信沮授陳容或運一異謀樹一竒節並能傳之不朽人到于今稱之豈假編名作傳然後播其遺烈也嗟乎自班馬以來獲書扵國史者多矣其間則有生無令問死無遺跡用使㳺談者靡徴其事講習者罕記其名而虚班史傳妄占篇目若斯人者可勝紀㦲古人以没而不杇為難盖為此也史通卷第二

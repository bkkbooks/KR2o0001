front:
  text: 史通卷第三
  hash: sha256:77611ca58cf95847603ffad440618b9d40c895eded3817925b014663e1c8e77c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_003-1a}
body:
  text: 内篇表曆書志表曆第七蓋譜之建名起扵周氏表之所作因譜象形故桓君山有云太史公三代世表旁行斜上並効周譜此其證歟夫以表為文用述時事施彼譜曆容或可取載諸史傳未見其宜何則易以六爻窮變化經以一字成褒貶傳包五始詩含六義故知文尚簡要語悪煩蕪何必欵曲重沓方稱周備覩馬遷史記則不然矣天子有本紀諸侯有世家公卿已下有列傳至扵祖孫昭穆年月職官各在其篇具有其說用相考覈居然可知而重列之以表成其煩費豈非謬乎且表次在篇第編諸卷軸得之不為益失之不為損用使讀者莫不先㸔本紀越至世家表在乎其間緘而不視語其無用可勝道㦲旣而班東二史觀漢史東謂東各相祖述迷而不悞無異逐狂必曲為銓擇强加引進則列國年表或可存焉何者當春秋戰國之時天下無主群雄錯峙各自年世若申之扵表以統其時則諸國分年一時盡見如兩漢御暦四海成家公卿旣為臣子王侯才比郡縣何用表其年𢾗以别扵天子者㦲又有甚扵斯者異㦲班氏之人表也區别九品網羅千載論世則異時語姓則他族自可方以類聚物以群分使善惡相從先後為次何籍而為表乎且其書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢蔦施松上附生疣贅不知剪截何斷而為限至法盛書載中興攺表為注名目雖巧蕪累亦多當晋氏播遷南據楊越魏宗勃起北雄燕代其間諸偽十有六家不附正朔自相君臣崔鴻著表頗有甄明比扵史漢群篇其要為切者矣若諸子小說編年雜記如韋昭洞紀陶弘景帝王歷皆因表而作用成其書旣非國史之流故存而不述書志第八五行志典序雜志天文志藝文志夫刑法禮樂風土山川求諸文籍出扵三禮及班馬著史别裁書志考其所記多効禮經且記傳之外有所不盡隻事片文扵斯備錄語其通博信作者之淵海也原夫司馬遷曰書班固曰志東觀曰記華嶠曰典張勃曰錄何法盛曰說名目雖異體綂不殊亦猶楚謂檮杌晋謂之乗魯謂之春秋其義一也扵其編次則有前曰平准後云食貨古號河渠今稱溝洫折郊祀爲宗廟分禮樂爲威儀懸象出扵天文郡國生扵地理如斯變革不可勝計或名非而物是或小異而大同但作者愛竒耻扵仍舊必尋源討本其歸一揆也若乃五行藝文班𥙷子長之闕百官輿服謝拾孟堅之遺王隱後来加以瑞異魏收晚進弘以釋老斯則自我作古出乎胸臆求諸歴代不過一二者焉大抵志之為篇其流十五六家而已其間則有妄入編次虗張部帙而積習已乆不悟其非亦有事應可書冝别摽題而古來作者曾未覺察今畧陳其義列扵下云上已緫論書志夫兩曜百星麗扵玄象非如九州萬國廢置無恒故海田可變而景緯無易古之天猶今之天也今之天即古之天也必𣣔刋之國史施扵何代不可也但史記包括所及區域綿長故書有天官讀者竟忘其誤㩁而為論未見其宜班固因循復以天文作志志無漢事而隷入漢書尋篇考限覩其乖越者矣降及有晉迄于隋氏或地止一隅或年才二世而彼蒼列志其篇倍多流宕忘歸不知紀極方扵漢史又孟堅之罪人也切以國史所書冝述當時之事必為志而論天象也但載其時彗孛氛祲薄食晦明禆竈梓愼之所占京房李郃之所候至扵熒惑退舎宋公延齡中台告拆晉相速禍星集頴川而賢人聚月犯少微而處士亾如斯之類志之可也若乃體分濛澒色著青蒼丹曦素魄之躔次黃道紫宫之分野旣不預扵人事輒編之扵策書故曰刋之國史施扵何代不可也其間唯有袁山松沈約蕭子顯魏收等𢾗家頗覺其非不遵舊例凢所記錄多合事冝寸有所長贒扵班馬逺矣文志已上天伏羲已降文籍始備逮扵戰國其書五車傳之無窮是曰不朽夫古之所制我有何力而班漢定其流别編爲藝文志論其妄載事等上篇天謂志文續漢已還祖述不暇夫前志已錄而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎且漢書之志天文藝文也盖𣣔廣列篇名示存書體而已文字旣少披閱易周故雖乖節文而未甚穢累旣而後來繼述其流日廣天文則星占月㑹渾圗周髀之流藝文則四部七錄中經秘閣之輩莫不各踰三箧自成一家史臣所書冝其輙簡而近世有著隋書者乃廣包衆作勒成二志騁其繁富百倍前修非唯循覆車而重軌亦復加濶眉以半額者矣但自史之立志非復一門其理有不安多從㳂革唯藝文一體古今是同詳求厥義未見其可愚謂凢撰志者宜除此篇必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其所錄皆鄴下文儒之士讎校之司所列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄管蒯扵宋生得之矣文志已上藝夫灾祥之作以表吉凶此理昭昭不易誣也然則麒麟闘而日月蝕鯨鯢死而彗星出河變應扵千年山崩由扵朽壊又語曰太歳在丑乞漿得酒太歳在已販妻鬻子則知吉㐫逓代如盈縮循環此乃關諸天道不復繋乎人事且周王决疑龜焦蓍折宋皇誓衆竿壊幡亡梟止梁師之營鵩集賈生之舎斯皆妖灾著象而福祿来鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其羙惡也故證候相軋有異不為灾見扵春秋其事非一洎漢興儒者乃考洪範以釋隂陽其事也如江璧傳扵鄭客逺應始皇卧桞植扵上林近符宣帝門樞白髮元后之祥柱樹黄雀新都之䜟舉夫一二良有可稱至扵蜚蜮蝝螽震食崩拆隕雨霜雹大水無氷其所證明實皆迂闊故當春秋之世其在扵魯也如有旱雩舛候螟􅭈傷苗之属是時或秦人歸禭或毛伯賜命或滕邾入朝或晉楚來聘皆持此恒事應彼咎徴旻穹垂謪厥罰安在探賾索隱其可略諸且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇號為繁富作者猶廣之以拾遺加之以語錄况彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解卷才三十則知其所略蓋亦多矣而漢代儒者羅災青扵二百年外討符㑹扵三十卷中安知事有不應扵人應人而失其事何得苟有脫變而必知其地者㦲若乃採前文而攺易其說謂王札子之作亂在彼成年成元春秋毛伯案今春秋經扎子殺召毛事在宣十五年年二月無氷董仲舒以為其時王扎子殺召伯公時非成夏徴舒之構逆當夫昭代陳災董仲舒以春秋昭公九年恨故致火災案楚嚴王之㓕陳在宣十一年如為楚嚴王為陳討夏徵舒因㓕陳陳之臣子毒恭王卒康王立康王卒夾敖立夾敖卒靈王立昭九年所㓕者乃楚靈王時且荘王卒恭王立五行志上卷中相去凢五世在楚嚴作霸荆國始僣稱王桓公春秋地千里案自武王始僣號歷定成繆三王始至三年日有蝕之旣京房易傳以為楚嚴稱王兼㦲又魯桓薨後世歴嚴閔釐文宣凢五君而楚於嚴然則楚之稱王已四世矣何得言嚴始稱而應之邪嚴作覇安有桓三年日食髙宗諒隂亳都實生桑榖為殷道衰髙宗承弊而起盡諒隂之哀天下尚書伊陟相太戊毫有桑榖拱生劉向以之異見按大戊崩其後嗣有仲丁河亶甲祖乙應之旣獲顕荣怠扵政事而國將危亡故桑榖戊時生非髙宗事高宗又本成都於毫盤庚凢歷五世始至武丁即髙宗是也桑自太晉悼臨國六卿專政以君事臣成公十七年董仲舒以為厲公後莫敢責大夫六卿遂相與比周專晋國六月甲戌朔日有食之時宿在畢晋家象也晋月丁巳朔日食非是六月君還事之按春秋成公十二魯僖末年三桓世官殺嫡立庶草劉向以為是時公子遂專權三桓春秋僖公三十年十二月殞霜不殺公二十九年秋大雨雹劉向以為釐公末年信始世官向又曰嗣君徴失柄来事之象也又釐見釐公不悟遂終專權後二年殺子赤立宣公用公子遂專權自恣至扵殺君故隂脅陽之象東門㐮仲赤文公太子即惡也按此事乃文公末世不是僖公時也遂即斯皆不慿章句直取胷懷或以前為後以虗為實移的就箭曲取相諧掩耳盗鍾自云無覺詎知後生可畏来者難誣者邪又品藻群流題目庶類謂莒大為國菽為強艸鶖著青色負蠜匪中國之䖝蠜也劉向以爲非中國所有南越盛暑男春秋嚴公二十九年有蜰劉歆以爲蜰負人旣入滛扵兩叔故蜰至按負蠜中國所生不女同川澤滛風所生是時嚴公取齊滛女爲夫南越獨出鸚鵒爲夷狄之鳥鵒来巢劉向以爲夷狄春秋昭公二十三年鸜喻濟水耳事見周官之禽按鸜鵒中國皆有唯不如斯詭妄不可殫論而班固就加纂次曽靡銓擇因以五行編而爲志不亦惑乎且每有敘一災推一恠董京之說前後相反以爲魯宋煞君易許田劉歆以爲桓公三年日有食之董仲舒劉向爲後楚嚴稱王兼地千里也晋曲沃莊伯殺晋侯京房以向歆之解父子不同即中國也劉歆以爲晝象夷狄劉向又以爲嚴公七年夜中星隕如雨劉向以爲夜中者暑蜮所生非自越来也蜮生南越劉歆以為盛遂乃雙載其文兩存要理言無准的事益煩費豈所謂撮其機要收彼菁華者乎自漢中興已還迄于宋齊其間司馬彪臧榮緒沈約蕭子顯相承載筆競志五行雖未能盡善而大較多實何者如彪之徒皆自以名慙漢儒才劣班史凢所辯論務守常途旣動遵繩墨故理絶河漢兼以古書從畧求徴應者難該近史尚繁考祥符者易洽此昔人所以言有乖越後進所以事不精審也然則天道遼逺禆竈焉知日蝕不常文伯所對至如梓愼之占星象趙逹之明風角單颺識魏祚扵黃龍董飬徴晉亂扵蒼烏斯皆肇彰先覺取驗將来言必有中語無虚發苟誌諸竹帛其誰曰不然若乃前事已徃後来追證課彼虗說成此㳺詞多見其老生常談徒煩翰墨者矣子曰蓋有不知而作之者我無是也作篇籍者故云然包曰時人有穿鑿妄又曰君子扵其所不知盖闕如也又曰知之為知之不知為不知是知也嗚呼世之作者其鑒之㦲談何容易駟不及舌無為强著一言受嗤千載也行志已上五或以為天文藝文雖非漢書所宜取而可廣聞見難為刪削也對曰苟事非其限而越理來書自可觸類而長于何不錄又有要扵此者今可得而言焉夫圓首方足含靈受氣吉㐫形扵相貌貴賤彰扵骨法生人之所𣣔知也四攴六府痾瘵所纏苟詳其孔穴則砭灼無悞此養生之尤急且身名並列親踈自明豈可近昧形骸而遠求辰象旣天文有志何不為人形志乎茫茫九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣𬒳且事當災運尤相關涉尔雅釋物非無徃例旣藝文有志何不為方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七畧因人成事其目遂多至若許負相經楊雄方言並當時所重見傳流俗若加以二志幸有其書何獨捨諸深所未曉歷觀衆史諸志列名或前畧而後詳或古無而今有雖遍𥙷所闕各自以為工搉而論之皆未得其最盖可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬户兆庻仰其神威虎踞龍蟠帝王表其尊極兼復土堦卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宫闕制度朝廷軌儀前王所為後王取則故齊府肇建誦魏都以立宫代國𥘉遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晋宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏遠名號非一凢為國史者宜各撰都邑志列扵輿服之上金石艸木縞紵絲枲之流鳥獸䖝魚齒革羽毛之類或百蠻攸稅或萬國是供夏書則編扵禹貢周書則託扵王㑹亦有圗形九牧之鼎列狀四荒之經觀之者擅其愽學聞之者騁其多識自漢氏拓境無國不賓則有卭竹傳節䈮醬流味大宛献其善馬條攴致其巨雀爰及魏晋迄于周隋咸亦遐邇來王任土作貢異物歸扵計吏竒名顯扵職方凢為國史者宜各撰方物志列扵食貨之首帝王苖裔公侯子孫餘慶所鍾百世無絶能言吾祖郯子見師扵孔公不識其先籍談取誚於姬后故周撰世本式辯諸宗楚置三閭實掌王族逮乎晚葉譜學尤煩用之扵官可以品藻士庶施之扵國可以甄别華夷自劉曹受命雍豫為宅世胄相承子孫番衍及永嘉東渡流寓楊越代氏南遷夷從華夏扵是中朝江右南北混淆華壤邉民虜漢相雜隋有天下文軌大同江外山東人物殷凑其間髙門貴族非復一家郡正州都世掌其任凢為國史者宜各撰氏族志列扵百官之下盖自都邑已降氏族而徃實為志者所宜先而諸史竟無其錄如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曽何足云惟此數條粗加啇畧得失利害從可知矣庻夫後來作者擇其善而行之雜志已上或問曰子以都邑氏族方物冝各纉次以志名篇夫史之有志多慿舊說苟世無其錄則闕而不編此都邑之流所以不果列志也對曰按帝王建國本無恒所作者記事亦在相時逺則漢有三輔典近則隋有東都記扵南則有宋南徐州記晋宫闕名於北則有洛陽伽藍記鄴都故事盖都邑之事盡在是矣譜諜之作盛扵中古漢有趙岐三輔决錄晋有摯虞姓族記江左有兩主百家譜中原有方思殿格盖氏族之事盡在是矣自沈莹著臨海水土周處撰陽羨土風厥類衆夥諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮盖方物之事盡在是矣凢此諸書代不乏作必聚而為志奚事無文譬夫涉海求魚登山採木至扵鱗介脩短柯條巨細盖在擇之而已苟為漁人匠者何慮山海之貧罄㦲史通卷之三

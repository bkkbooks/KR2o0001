  text: 史通卷第一
  hash: sha256:0f48e0dfd647efae448df3746b0b21dc21281dbc1dfff649a285933b846580c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_001-1a}
body:
  text: 内篇自古帝王編述文籍史言之備矣古徃今來質文逓變諸史之作不恒厥體㩁而為論其流有六一曰尚書家二曰春秋家三曰左傳家四曰國語家五曰史記家六曰漢書家今略陳其義列之扵後尚書家者其先出扵太古易曰河出圖洛出書聖人則之故知書之所起逺矣至孔子觀書扵周室得虞夏商周四代之典乃刪其善者定為尚書百篇孔安國曰以其上古之書謂之尚書尚書璇璣鈴曰尚者上也上天垂文以布節度如天行也王肅曰上所言下為史所書故曰尚書也推此三說其義不同蓋書之所主本扵號令所以宣王道之正義發話言扵臣下故其所載皆典謨訓誥誓命之文至如堯舜二典直序人事禹貢一篇惟言地理洪範揔述灾祥頋命都陳䘮禮玆亦為例不純者也又有周書者與尚書相類即孔氏刋約百篇之外凢為七十二章上自文武下終靈景甚有明允篤誠典雅高義時亦有淺末恒說滓穢相叅殆似後之好事者所増益也至若職方之言與周官無異時訓之說比月令多同斯百王之正書五經之别録者也自宗周既殞書體遂廢迨乎漢魏無能繼者至晉廣陵相魯國孔衍以為國史所以表言行昭法式至扵人理常事不足備列乃刪漢魏諸史取其羙詞典言足為龜鏡者定以篇第纂成一家由是有漢尚書後漢尚書漢魏尚書凢為二十六卷至隋秘書監太原王邵又録開皇仁壽時事編而次之以類相從各為其目勒成隋書八十卷尋其義例皆准尚書原夫尚書之所記也若君臣相對詞㫖可稱則一時之言累篇咸載如言無足紀語無可述有脫此疑若此故事雖脫略而觀者不以為非爰逮中葉文籍大備必剪截今文摸擬古法事非改轍理涉守株故元舒所撰漢魏等篇不行扵代也若乃帝王無紀公卿缺傳則年月失序爵里難詳斯並昔之所忽而今之所要如君懋隋書雖欲祖述啇周憲章虞夏觀其體制乃似孔氏家語臨川世說可謂畫虎不成反類犬也故其書受嗤當代良有以焉春秋家者其先出扵三代按汲冡璅語記太丁時事目為夏殷春秋孔子曰䟽通知逺書教也屬辭比事春秋之教也知春秋始作與尚書同時璅語又有晉春秋記獻公十七年事國語云晉羊舌盻習扵春秋悼公使傳其太子左傳昭二年晉韓宣子來聘見魯春秋曰周禮盡在魯矣斯則春秋之目事匪一家至扵隱沒無聞者不可勝載又按竹書紀年其所記事皆與魯春秋同孟子曰晉謂之乗楚謂之檮杌而魯謂之春秋其實一也然則乗與紀年檮杌其皆春秋之别名者乎故墨子曰吾見百國春秋蓋皆指此也逮仲尼之修春秋也乃觀周禮之舊法遵魯史之遺文據行事仍人道就敗以明罰因興以立功假日月而定歷數藉朝聘而正禮樂微婉其說隠晦其文為不刋之言著將來之法故能彌歷千載而其書獨行又按儒者之說春秋也以事繫日以日繋月言春以包夏舉秋以兼冬年有四時故錯舉以為所記之名也苟如是則晏子虞卿吕氏陸賈其書篇第本無年月而亦謂之春秋蓋有異扵此者也至太史公著史記始以天子為本紀考其宗㫖如法春秋自是為國史者皆用斯法然時移世異體式不同其所書之事也皆言罕褒諱事無黜陟故馬遷所謂整齊故事耳安得比扵春秋哉左傳家者其先出扵左丘明孔子旣著春秋而丘明授經作傳蓋傳者轉也轉授經㫖以授後人或曰傳者示也所以傳示來世按孔安國注尚書亦謂之傳斯則傳者亦訓釋之義乎觀左傳之釋經也言見經文而事詳傳内或傳無而經有或經闕而傳存其言簡而要其事詳而慱信聖人之羽翮而述者之冠冕也逮孔子云沒經傳不作于時文籍唯有戰國䇿及太史公書而已至晉著作郎魯國樂資乃追采二史撰為春秋後傳其始以周貞王續前傳魯哀公後至王赧入秦又以秦文王之繼周終扵二世之㓕合成卅卷當漢代史書以遷固為主而紀傳互出表志相重扵文為煩頗難周覽至孝獻帝始命荀恱撮其書為編年體依左傳著漢紀三十篇自是每代國史皆有斯作起自後漢至扵髙齊如張璠孫盛于寳徐賈裴子野吳均何之元王邵等其所著書或謂之春秋或謂之紀或謂之略或謂之典或謂之志雖名各異大抵皆依左傳以為的凖焉國語家者其先亦出扵左丘眀旣為春秋内傳又稽其逸文纂其别說分周魯齊晉鄭楚吳越八國事起自周穆王終扵魯悼公列扵春秋外傳國語合為二十一篇其文以方内傳或重出而小異然自古名儒賈逵王肅虞翻韋耀之徒並申以注釋治其章句此亦六經之流三傳之亞也暨縱横互起力戰爭雄秦兼天下而著戰國䇿其篇有東西二周秦齊燕楚三晉宋衛中山合十二國分為三十三卷夫謂之䇿者蓋録而不序故即簡以為名或云漢代劉向以戰國㳺士為䇿謀因謂之戰國䇿至孔衍又以戰國䇿所書未為盡善乃引太史公所記叅其異同刪彼二家聚為一録號為春秋後語除二周及宋衛中山其所畱者七國而已始自秦孝公終扵楚漢之際比扵春秋亦盡二百三十餘年行事始衍撰春秋時國語復撰春秋後語勒成二書各為十卷今行扵世者唯後語存焉按其書序云雖左氏莫能加世人皆尤其不量力不度徳尋衍之此義自比扵丘明者第謂國語非春秋傳也必方以類聚豈多嗤乎當漢氏失馭英雄角力司馬彪又録其行事因為九州春秋州為一篇合為九卷尋其體統亦近代之國語也自魏都許洛三方鼎峙晉宅江淮四海幅裂其君雖號同王者而地實諸侯所在史官記其國事為紀傳者則規模班馬創編年者則議擬荀袁為是史漢之體大行而國語之風替矣史記家者其先出扵司馬遷自五經間行百家競列事跡錯揉前後乖舛至遷乃鳩集國史採訪家乗上起黃帝下窮漢武紀傳以統君臣書表以譜年爵合百三十卷因魯史舊名目之曰史記自是漢世史官所續皆以史記為名迄乎東亰著書猶稱漢紀至梁武帝又勅其群臣上自太初下終齊室撰成通史六百二十卷其書自秦以上皆以史記為本而别採他說以廣異聞至兩漢已還則全録當時紀傳而上下通逹臭味相依又吳蜀二主皆入世家五胡及拓㧞氏列扵夷狄傳大抵其體皆如史記其所為異者惟無表而已其後元魏濟隂王暉業又著科録二百七十卷其斷限亦起自上古而終扵宋年其編次多依放通史而取其行事尤相似者共為一科故以科録為號皇家顯慶中符壐郎隴西李延壽抄撮近代諸史南起自宋終扵陳北始自魏卒扵隋合一百八十篇號曰南北史其君臣流例紀傳羣分皆以類從各附扵本國凢此諸作皆史記之流也尋史記疆宇遼闊年月遐長而分以紀傳散以書表每論家國一政而胡越相懸叙君臣一時而參啇是隔此為其體之失者也兼其所載多聚舊記時採雜言採謂國䇿等故世本國語使覽之者事罕異聞而語饒重出此撰録之煩者也况通史以降蕪累尤深遂使學者寧習本書而怠窺新録且撰次無㡬而殘缺遂多可謂勞而無功述者所宜深誡也漢書家者其先出扵班固馬遷撰史記終扵今上自太初已下闕而不録班彪因之演成後記以續前篇至子固乃斷自髙祖盡于王莽為十二紀十志八表七十列傳勒成一史目為漢書昔虞夏之典商周之誥孔氏所撰皆謂之書夫以書為名亦稽古之偉稱尋其創造皆准子長不為世家改書曰志而已自東漢以後作者相仍皆􅊞其名號無所變革唯東觀曰記三國曰志然稱謂雖别而體制皆同歷觀自古史之所載也尚書記周事終秦繆春秋述魯史止定公記年下逮扵魏亡史記唯論扵漢始如漢書者究西都之首末窮劉氏之廢興包舉一代撰成一書言皆精練事甚該密故學者尋討易為其功自古迄今無攺斯道扵是考兹六家商㩁千載蓋史之流品亦既乆廢所可祖述者唯左氏及漢書二家而已史通卷第一史通札記序錄十行司字以意改思何云思十六行日自十七行張之象本無夾注二十四字何氏以朱筆補入目録自第四卷題目以下皆無第字一葉十六行頤賾二葉四行識職弛張下何云末三篇俱亡或云體統篇卽自敍也毓修按羣書拾補云宋本闕外篇目錄張之象本有之非是史通卷第一一葉十二行鈴以意改鈴毓修文象十四行推惟張本號作号下同号凡號皆二葉一行二行甚其一作六行殞隕十一行邵劭下同凡邵俱改十五行張之象本無夾注此疑有脱四字毓修按拾補云宋本亦然十七行元舒舒元三葉六行按按下同何俱改十行盻肸四葉十四行傳者示也拾補云宋本作傳者傳平也顧千里云此風風去也之例十七行耀曜六葉五行爲字下有之字七葉二行爲於四行揉糅六行名目目名八行梁下有世字十行以上巳上八葉二行例别類字下有相字十行遂遽九葉二行史本作文張之象哀公公疑作定哀何云抄本定五行書家史通卷第二一葉六行得無得字何云抄本八行已以二葉九行秩祑十七行世爲史而皆倣左傳也而字何亦云鈔本無官字張之象本作世爲史官無十八行貞何眞添其字於眞字下三葉六行闌作闡何云一十一行于干十七行紀記四葉四行之入十五行楊同揚下五葉十五行伯柏莊王襄荘同王下六葉十六行國園八葉五行國地字誤顧云當是六行瓜瓜九行班爵爵字張本無九葉一行今近二行册目十行序字下張本有事字十一二行不可得也或曰遷紀五帝十字衍文十六行皇黄十七行胟拇十葉一行媸何云一作嗤三行紀紀十七行邵召十一葉三行遺作異何云一四行虛班史傳虛傳班史史通卷第三一葉六行斜邪九行合含二葉十四行臣張木作長十五行切𥙷作功顧引拾十六行書下有記字三葉八行折本作析張之象十六行帙祑四葉二行星一作靈八行隋𥙷作隨顧引拾十四行頴潁五葉十五行百有疑作六葉三行者著七行彗孛一作十一行梁謝艾事當作涼此十八行柱樹梓柱馮校雀作爵漢書七葉一行雨霜霜雨四行賜錫或晉楚來聘云無或字顧引拾𥙷十三行脫本衍張之象地本作兆張之象十四行札注同􅊨顧作扎十六行火災顧作十七行在自十八行夾郟八葉二行定文七行桑下有穀字成不九行厲公下有誅四大夫四大夫欲殺厲公十一字􅊨十八行莒大爲國莒爲大國張之象本作九葉三行一二九行晝象夷狄作夜顧改晝十八行不反十葉三行烏鵝顧作九行第三知字作智十二葉十行䈮蒟十三葉一行番本蕃張之象二行夷從華夏象本張之從夏革夷十四葉一行主王思同顧同馮校作殿字當衍方思格魏太和中旣定氏族高下按此以選舉仍存殿字何又云馮校七行者疑作伯史通卷第四一葉十六行誤設二葉一行淡薄無味淡泊有味顧云當云六行于干八行歸餙十行人本作仁張之象十七行君富三葉四行序字上有自字六行彼作往張本七行小拾𥙷同意顧引四葉二行擊難作一排擊六行逮拾𥙷同殆顧引五葉一行起架五行官凖六行之一七行豈張之象本不以上皆九行遂遽十四行摸模六葉二行字行作行字顧引拾𥙷七葉二行瑰理惟同唯下四行察略十卷姚最最隋志梁後撰十二行反本互張之象十五行篇本編張之象八葉一行盡字下有者字三行陳鄭七行標褾十四行置署十六行繆謬九葉三行各若顧作七行讚瓚十二行覊覊十五行胡朝十葉十八行帙祑十一葉五行二本三張之象十二行肖拾𥙷顧引宵作十二葉二行昭拾𥙷同昭顧云十三葉六行原𥙷作考顧引拾十二行必不作不必顧引拾𥙷十五葉十三行注爲言顧改十四行注宣字上有文字王國亡國張本作十五行虛靈十六葉十行殺又引拾顧作賦煞𥙷作十四行作者引拾𥙷同所作顧慕慕張本十七葉十五行揔忽張本十七行注贊述史通卷第五一葉十六行苑下有並字𥙷同顧引拾二葉十一行加誣語顧引拾以加諸同𥙷十二行劭下有曰字十三行收因此收承此言十五行有議議有異十七行過禍疑作十八行恢詼三葉三行糠粃穅秕五行聚博博聚悅字下有於字六行諜牃八行頴潁十三行嘔𥙷作歐顧引拾十五行韋偉疑作四葉十行泉鼎五葉二行宗下有故作者三字𥙷同顧引拾六行喪裘十二行僞繆謬僞十三行戾拾𥙷同反顧引十八行蒙加六葉六行斷斵張本七葉四行同字下顧引拾補無取字六行戾反八行殞隕代古十六行復恒八葉十六行眞貞九葉十六行王劭齊志劭按書齊志二字傳寫誤也傳撰平賊記三卷當謂此十葉六行切竊補注篇闕下半採其所捐下乃因習篇文也今据張之象本補之如下以爲補注言盡非要事皆不急譬夫人有吐菓之核棄藥之滓而愚者乃重加捃拾潔以登薦持此爲工多見其無識也孝標善於攻繆博而且精固以察及泉魚辨窮河豕嗟乎以峻之才識足堪遠大而不能探賾彪嶠網羅班馬方復留情於委巷小說銳思於流俗短書可謂勞而無功費而無當者矣自茲已降其失逾甚若蕭楊之璅雜王宋之鄙碎言殊如顧作揀金事比雞肋異體同病焉可勝言大抵撰史加注者或因人成事或自我作故記錄無限規檢不存難以成一家之格言千載之楷則凡諸作者可不詳之至若鄭玄王肅述五經而各異何休馬融論三傳而競爽欲加商榷其流實煩斯則義涉儒家言非史氏今並不書於此焉因習上第十八並宜糾正此聊從陸文裕刻本耳馮評舊本因習十八邑里十九今蓋聞三王各異禮五帝不同樂故傳稱因俗易貴隨時况史書者記事之言耳夫事有貿遷而言無變革此所謂膠柱而調瑟刻舩以而顧作求劍也古者諸侯曰薨卿大夫曰卒故左氏傳稱楚鄧曼曰王薨於行國之福也又鄭子產曰文襄之伯君薨大夫弔卽其證也按夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外别內之旨也馬遷史記西伯已下與諸列國王侯凡有薨者同加卒稱此豈略外别內邪何貶薨而書卒也蓋著魯史者不謂其邦爲魯國撰周書者不呼其上主顧作曰周王如史記者事總古今勢無主客故言及漢祖多爲漢王斯亦未爲累也班氏旣分裂史記定名漢書至於述高祖爲公王之時皆不除沛漢之字凡有異方降款者以歸漢爲文肇自班書首爲此失迄于仲豫仍踵厥非積習相傳曾無先覺者矣又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文按遷之言實孝武之世也固之言今當孝明之世也事出百年語同一理卽如是豈陳氏苗裔祚流東京者乎斯必不然漢書又云嚴君平旣卒蜀人稱之云云巳下接至今十葉十二行錄無此字顧引拾𥙷十五行之字下有爲字𥙷同顧引拾十七行歴𥙷作列顧引拾十一葉一行是字下有則字𥙷同顧引拾十一行符苻十二葉三行李孝顧作四行季李十二行偶隅十四葉一行因習下第十九作邑里第十九亦曰邑里應三行本居誤下文作土何小山云居字十一行得乎其于張本作十五行注類下顧引拾補云有是字十五葉十三行平昌昌平四行注琰下脫傳義琰三字六行竟競十三行注卑畢十五行注原拾𥙷同尞顧引十六行注西字上有隴字尋循顧作十八行遂勝十六葉三行數字不空六行樂共史通卷第六一葉十一行監字下無於字𥙷同顧引拾十五行湧踴瓦作丸張本二葉八行用由疑作九行轉輔十八行者字下無則字三葉四行以作似張本六行喜憙八行注諸字下有方字類字下張本有也字十二行謂諱四葉五行損捐六行注𥙷作梨顧引拾十五行稽楊十七行唇脣五葉三行久長作長久顧引拾𥙷五行事拾𥙷同言顧引七行而其六葉四行特持七行愼作愜張本十行伐作戕張本七葉三行焉字下有足字八行注產作靈張本九行注私字上顧引拾補有陰字爾朱暢文略爾未受暢財賄今略金受文多其惡比之韓彭伊霍應云故減其惡十行書字下有元偉二字十一行世故令狐德棻周書傳稱文如歸命勝圔城孥戳茹茹歸命應云文紀論則云渚宫制出字下有於字八葉六行直眞十行注史𥙷作書顧引拾九葉十一行鈔本無幷序作簡要隱晦妄飾三條二行八字十一行於乎十葉五行故無此字顧引拾𥙷九行趐翅十二行無無此字顧引拾𥙷十三行又無此字顧引拾𥙷十一葉一行豈蓋顧作十行自洎十二葉二行士尼之代千俟尼七行哉字下有故字十三葉十行記紀十五行注驪同麗下十六行注公曰字顯引拾𥙷同公田田字下無奚以引顧作已拾𥙷將食之食君將十七行墳賁啼字下有呼字吾君之引拾𥙷同三字衍顧乎於十四葉一行者文衍其衍文顧云此則下有脫文二行公字下有羊榖二字𥙷同顧引拾六行注爲謂九行其字下有有字𥙷同顧引拾十二行者衍文顧云必字上有若字云顧十七行言字下有於字𥙷同顧引拾十五葉三行獵者漁者下有脫誤十三行秩秩祑祑十八行三片一作十六葉一行昔古古昔顧作十一二行宋人醢之蕭潰援廟桷動于甍此六字張本作十二行撫而勉之撫之廵而十七葉二行文史五行作祚張本六行容貌拾𥙷同一䫉顧引已以七行敍事屬一病一病敍屬之十行奇此字一本無十八葉十三行琛作牢張本十八行虞盧十九葉六行䡺轊八行符苻九行父受十行鑾鸞十五行草革十六行降胮十七行二史三史張本十八行齊字下有記字牛首首牛張本作二十葉一行櫝犢團圓作團欒顧引拾𥙷三行萬𥙷作萬紐萬紉顧引拾千干史通卷第七一葉五行頤𦣱十一行步拾𥙷同接顧引二葉七行欲拾𥙷同請顧引十行幾𥙷作機顧引拾十六行六七三葉十七行紀記四葉一行頗注同頍四行六行邈字下有得字𥙷同顧引拾十一行鬱菀十七行跡字下人字下脫四字行由小人自陷小人張本作作曲五葉五行屈惡十二行幸獲而全獲全幸而是足六葉二行始如七葉四行沉沈十五行帝拾𥙷同皇顧引十八行鳥作烏張本七葉八行何從而書之從而書之一作安得三行世拾𥙷同古顧引九行此義安可言於史耶下何氏從馮本增入夫史之曲筆誣書至盜憎主人之甚乎十一行刻本誤入鑒識篇中顧千里云此一百九十九字不當入曲筆李百藥以魏收爲實錄魏徵以王劭爲有慚正直皆子玄所擿鑒識之謬者耳若曲筆者載事而失其實鑒識者評史而乖其理二篇之别在此八葉九行是見十行母母十一行康秉十二行猶如顧云十六行者諸十葉一行體作體宋本作恥張本注云蜀本二行永據馮校作本張本作體何七行注克充八行注悉贍觀者以爲甲於太史公囗囗也大史公爲乙觀者以爲甲十一葉五行罕空七行同作刷蜀本十七行收謂魏徵隋書顧云收字誤當十二葉四行六拾𥙷同七顧引八行莊子囗莊又十一葉七行作拾𥙷同刊顧引九行事是苺見吕氏春秋因莓馮評攫莓知所岀之剏詞未十六行垂乘十七行來作求張本又十二葉十五行於所十六行馬作尋張本十八行氏世又十三葉一行常恆七行爲違十八行典曲十四葉一行注書引拾𥙷有伏惟二衍文陛下上顧字三行劉曹七行倫冏八行可俯而就率爾而就張本作可十二行耳爾十五葉一行閩作固張本七行東晉之史書宋齊之史張本作東晉之史通卷第八一葉七行關符二葉二行于干之阮張本三行且𥙷作但顧引拾十行正字下側注征字𥙷同顧引拾十八行其某三葉十二行謝承引拾𥙷同二字當衍顧十三行人作繞張本嘗此字張本無四葉四行彼也五行亦互六行猶作有張本八行速肖連類十七行平成十八行徐湛下同江湛於文衍五葉四行子臧叔牂是作見張本十行暢字下有曰字𥙷同顧引拾十三行方字下有等字六葉一行張字下有亮字四行上中七葉八行眞作眞張本九行誥告十七行但字下有近字八葉三行朝主七行可謂何爲顧作十二行純紀十三行數字上有此字𥙷同顧引拾九葉八行調作啁張本十三行掌作抃張本十六行明王王明張本作十葉二行祥瑞十二行仰作㧕張本十三行乃若作若乃顧引拾𥙷職辟十七行預頷顧作十一葉六行乃字上有而字七行諜牃十四行載裁熊能十八行殘殊十二葉十四行誰孰十七行世作代張本十三葉十一行禎楨楊于預楊十四葉二行宗通何作守道張本作宗道十五行傳衍文顧云傳寬寛傅十六行㦥憲十五葉四行竿竽史通卷第九一葉六行目作臣張本十行方朔方朔十三行過過十六行西栖論是二葉十一行直作苑鄧本十四行蹐踳三葉一行職識二行假令下張本有其字六行玄毅有字下有云字四葉十行譜作牃張本每多五葉四行日三拾𥙷同每自顧引六行者吾引拾𥙷之先顧行玠作玢鄧本九行裴斐十二行諜牃十六行趙採來顧作趙玉海作趙采三葉四行書文衍五行常恒八行日目十行事字下有者字十七行牀牀十八行紀𥙷作記顧引拾四葉一行體木張拾𥙷作休作矜顧引三行炳昞十行鍊𥙷作鍊顧引拾十四行駟駰五葉二行故於十行聚作衆張本十四行王𥙷作主顧引拾六葉二行識職三行稱授五行必于史職求眞求其若斯必于史職特真八行勸戒勒成張本作九行佚𥙷作失顧引拾十一行獲作藉張本十二行喜每十三行代載十四行覽賢七葉三行使下有夫字𥙷同顧引拾八行致𥙷作取顧引拾九行樂落十行笑作噱張本十五行知省八葉一行中申八行爲拾𥙷同草顧引十四行愛作受張本十七行爲當是顧云字請九葉二行諜講九行來求十一行旋拾𥙷同旅顧引十四行腑𥙷作府顧引拾十一葉一行回廻四行注之不不之六行長安下顧引拾補無中字八行所欲十二葉四行牴牾拾補作扺抵梧顧引捂八行知智十五行純絶十八行往字下有固字慸蠆𥙷並同顧引拾十三葉十五行踆漢書改爲逡是矣而非也逡顧云踆郎逡字義門依十八行奥字下有理字以文衍史通卷第十一一葉三行側注總十四條文衍四行蝣𥙷作游顧引拾十一行俱引拾但顧同𥙷二葉二行側注其一條下同衍文十行也文衍十三行佚失顧作十六行趙字上有蓋字三葉一行缶十五行占古四葉八行哀平哀牢張本作十七行司思五葉五行涉陟旻昊八行蓋慈九行校挍十二行榮瑩十五行或作彧張本十八行孫孤六葉四行常恒十一行谷纂綦㒞十七行秩𥙷作袟顧引拾七葉一行功力三行槩作暨張本八行詔曰至國史等之事一百又二字張本作雙行夾注八葉一行集文衍九行唐氏家皇十六行屬字下有者字𥙷同顧引拾九葉二行弼𥙷作鄁邶顧引拾三行搦作執張本十一行施行下馮評疑有佚文十葉十三行以拾𥙷同借顧引十四行旣而至相副五十五字史注顧引拾𥙷同鄧本云抄本小字十七行舜之事之事舜禹史通卷第十二一葉十行典册本同史册鄧十七行堯舜上有案字二葉十三行採拾𥙷同訪顧引十七行注馬字上有謂字及鄧本同顧引拾𥙷三葉三行愼眘以巳八行注或合誤致九行注容字下張本有合之二字十五行而所四葉四行頴顔八行逮何云衍文張本作至十八行襄作末張本五葉二行政功五行趾拾𥙷同止顧引十行注篇字下有遷字𥙷同顧引拾會稽文衍十四行糺礱六葉四行僞新拾𥙷同新室顧引十七行表字下有尤字𥙷同顧引拾七葉二行傳字下有體字引顧同拾𥙷八行世一二字誤并顧云世是卅十五行至本云一無嘉字張本作至元嘉鄧八葉五行本永六行故字下有漢字七行大泰九行一八十一行七十三二三張本作十二行二作七張本十三行族作續鄧本十八行十三鄧本同顧作三十九葉一行范袁作袁范顧引拾𥙷八行可丁九行峻孚拾𥙷同孚峻顧引十行營同瑩下十一行曜營推暨鄧本怍廣昭拾𥙷同
張本有公字四葉一行切𥙷作竊顧引拾四行央字下有宮字十五六行下衘史臣與中二千石臣賀等千石二千石臣賀等下御史臣謹與中二𥙷同顧引拾五葉一行湯等下有宜奉義遵職愚蠢不逮事方今盛夏吉時臣青翟臣湯等廿二字𥙷同顧引拾九行蒸烝六葉十三行嘉晉七葉四行弱字下有方字八葉二行平原下無君字第三行同顧引拾𥙷四行重圍城圍觀覩五行稱帝之害也耳顧引拾𥙷稱帝之害故同七行甚泰八行焉烏十行各作交張本十四行救趙擊秦軍秦秦軍救趙擊十六行注三作二顧鄧均九葉九行元里公乘陽慶慶里陽公陽公顧引拾𥙷作元十一行與予十六行以𥙷作而顧引拾藥醫𥙷作醫顧引拾藥十葉八行所字下何有旣字𥙷同顧引拾十二行位拾𥙷同立顧引十一葉六行渤勃十六所所郎十七行頃傾十二葉三行受拾補同授顧引六行今子作今至顧引拾𥙷從徙十一行願顧以取十三行卒率十三葉一行壻字下有陃字史通卷第十六一葉三行無側注二十五條一行十八行叱作㕱鄧本十八行讜字下有者字補同顧引拾三葉十行斯字下有亦字補同顧引拾四葉九行伊尹下有共伯名和四字拾補顧引十行王丁顧作十四行文史五葉四行類補作徒顧引拾六行今字下有當然二字補同顧引拾九行服補作伏顧引拾十行鄧通傳以下三十三字何云當在下一條十二行顧云當與十三行連十四行治字下有詔字拾𥙷顧引十七行服作伏鄧本六葉九行游夏冉季下何云無二之字補同顧引拾十二行公令十作七張本十五行遂寘寘以八葉一行惟作推張本四行稠拾補同稠顧引十行魏嬀九葉四行注溥𥙷作傳顧引拾十一行各作客張本十二行家字下有人字十葉三行寸補作尺顧引拾書水鄧文衍十行云字下有右字補同顧引拾十一葉一行全令十行固字上有尋字補同顧引拾十三葉二行常恒史通卷第十七一葉三行無側注十三條三字十二行氏作人張本十三行沙漠云通道巳有顧作涉漢又十五行勔卷梁豫章内史張緬撰緬隋經籍志晉書鈔三十二葉三行昇叔七行注曄字上有謂范二字二行舜作世張本三葉三行雖與作以顧鄧均六行篇字下有按外戚篇四字補同顧引拾八行以巳顧作輙輟顧作十二行議譏四葉四行柱注十行哀袁十三行宜益十四行下作末鄧本十五行草藁作藁草顧引拾𥙷十七行末作宋張本五葉三行二補作三顧引拾七行武字下張本有以字十二行何欺河漠張本作六葉十七行羞差七葉二行盧廬當作八行拄長萇八葉十行燼補作盡顧引拾九葉四行注等字下有事字補同顧引拾九行於拾補同軍顧引十二行諂作陷張本十三行孰顧豈補同引拾史通卷第十八一葉三行無側注二十五條四字八行滅鄧本作筏拾補作蔑十七行李齊於後主紀於後主紀李百藥齊書二葉二行舉拾𥙷同存顧引四行天作文張本十行斯不然矣不然矣重一句顧引拾補云斯更又顧作十三行注宗宋當作矣矣字鄧本同顧引拾𥙷云無十八行注六云無六字顧引拾補三葉一行注此字下有則字同鄧本三行注宗宋當作十五行注梁字下有後字補拾十六行注帝尒當作十七行注天閽靑天酆本作四葉八行注之字下有於字九行注至字下有荆字補同顧引拾十行靖靜十三行注也衍當遜同讓下十五行注詔字下拾補有乃字注署始拾補同衍文顧引無字下拾補有復字十六行夫以累易脫有暴易暴誤當云以十七行辭作嗤張本六葉一行注後字下有矣字拾𥙷顧引同三行事具風俗通當小字顧云此五行神列顧作十二行氏拾補顧引本同作代鄧十五行用因鄧本同顧引拾補作七葉二行立拾𥙷同失顧引六行雜新八行議拾補同敦顧引九行主王十三行燩燉何作敦燉字之誤十六行炳昞八葉一行技伎七行顏作好張本十四行褕裌下同揄𬒮十五行水字下有也字十六行注二一九葉五行撰顧引衍文同拾補九行良有以焉下張本有遷史編於李傳中斯爲繆矣十一字卿使還子長下世久矣劉氏不應若是善忘也顧亦云遷當何云缺而不載正謂班氏之善遷字傳寫之誤當是通史子之誤是通字十二行稱拾𥙷同講顧引十四行所拾𥙷同之顧引十七行悮本張悟作遁作滅張本十八行地世顧作十葉六行圭璧之訛挂璧緝之訛旒字十一葉一行汝女五行何則下有修字𥙷同顧引拾十四行甚引拾比顧同補十二葉四行於拾補同如顧引五行注鑑之誤鏗字七行注搜研八行注辨字下脫茗酪二字十二行餓字下有死字𥙷同顧引拾十六行其記也記也其所十八行常恒皇家五史下張本有夾注五史謂五代史六字史通卷第十九一葉四行牴牾抵梧七行志作目張本分拾𥙷同别顧引后後二葉八行灾之誤炎字十四行常恒十七行威之誤臧字十八行捐作損張本三葉十一行室字當衍顧云此十六行子之誤家字斃敝四葉五行得字下有土字七行帝字下有意字拾𥙷顧引而拾𥙷同諸顧引十三行訖拾𥙷同終顧引五葉二行注年字下拾補有又字四行注其重言事言其事當作重十五行微字上有其字補同顧引拾責作債張本六葉四行一作二拾補六行夫衍文顧云八行常恒九行按之誤接字十三行公父七葉一行祈補作歡顧引拾十四行假貸與之困與乏困張本作假八葉八行之文衍十六行則字上張本有九字九葉一行夫字下有人字補同顧引拾從字下拾補有大字同鄧本升鄧本均作登顧引拾補及八行至字下有於字補同顧引拾哺甫當作由作猶鄧本十七行蜚飛十葉三行輔補作甫顧引拾四行私作知張本者字下張本有夾注云弟與兄爭嫂字以其名鄙故稍文飾之十四行歆字上有劉字補同顧引拾各容十六行被備十七行兩雨當作十一葉三行在紀維紀鄧本同顧引拾補作四行所字上拾補有此字七行它同地下十二葉二行多作顧名十二葉九行注永和永光鄧本作綏和四年作二四鄧四十作十四顧引拾補皇拾補同吕顧引武都下有道字補同顧引拾十行注鳴鳥當作十一行注甲字下有持字十二行注李字下有棗字應字下有也字十三葉一行元亢當作九行陵作麥張本十二行亢陽下張本有爲怪二字十八行殺弑十四葉三行隗叔叔時當作四行聞字下有下字補同顧引拾八行昭字下有王字九行公作主張本十三行盟尙有脫文曼鄧下六字十五葉五行是世世寔張本作七行𣏌字下張本有按字九行爾補作耳顧引拾十七行宋寺顧作十六葉七行此字後有前字補同顧引拾十五行相桓當作十七葉九行續拾補同讀顧引十七行三作二張本十九葉五行申作由張本二十葉十一行鄭禆竈之說斯灾也說斯灾也顧鄧均同鄭禆竈之說乎裨竈之十二行亡字下張本有此其効也四字十三行有字下不空格史字下有者字𥙷及鄧顧引拾同本史通卷第二十一葉三行無側注總十四條四字六行人云衍文顧引拾𥙷十八行禍所禍有張本作三葉一行遂鄧本均作須顧引拾𥙷及今古作古今顧引拾𥙷五行倫字下張本有所字九行明拾𥙷同昭顧引十四行篡纂十七行事師四葉一行瞿字下拾補有年字同鄧本更作為張本三行有若作有子顧引拾𥙷避字下鄧本有之字五行宰我言語言游學張本作宰十三行先之誤光字十六行新作親張本五葉十八行伋問下有曰字引顧同拾𥙷六葉九行綬作紱張本十二行常恒十八行人拾𥙷及鄧衍文顧引同本七葉四行臥拾𥙷同坐顧引八葉七行也本同衍文鄧十四行餧字餒誤之十五行縑字下張本有之字則衍文顧云十八行性川州貸夫侍客犬待客張本作貨九葉七行酒二斗𥙷作二升酒二斗酒顧引拾穴拾𥙷及決顧引作訣鄧本十一行輙之誤輟字十葉十五行於以六十六下六字衍當作六十十一葉十二行詮𥙷作銓顧引拾十四行僨損十八行娼之誤媪字十二葉十三行荀謝十四行頤之誤賾字十六行費之誤贊字十三葉四行籍作籍藉本五行著纂十四行不該匪詳一作十八行深幽十四葉四行紀實引拾輔同一作實錄顧五行劭韶顧云劭何改韶非從文粹及厚齋語改讎見鑑識篇或改入曲筆誤始于困學紀聞義門沿之耳也此是隋王君懋著齊志二十卷隋史八十卷者直書見十行例作列張本十二行令意一作十五行草革十七行銘之誤鈆字十八行傳記志𥙷並同傳顧引拾十五葉八行切作竊鄧本十六行利之誤列字十八行鎗鎗錚錚鉸鉸佼佼張本作十六葉三行上之誤土字四行芻蒭十二行第作地張本十八行輒拾𥙷同輕顧引十七葉一行宦官四行仕作吏張本五行攖嬰勉俛九行蔕拾𥙷同躉顧引十行閤閣蜀本第五卷第七卷皆有錯誤此本於第五卷已刋正惟此曲筆篇中十一行誤在鑒識篇中賴得馮氏閱本正之後有重刻史通者可取徴也康熙丙戌中秋焯識後見萬曆中郭氏刋本已正其違錯書固須遍觀也癸巳冬至又識曲筆鑒識二篇並無錯簡馮氏閱本萬曆所刻皆誤而何氏跋語尙失之顔黃門云挍定書籍亦胡容易洵然道光癸未觀於揚州洪氏之績學并記六月一日思適居士顧千里巳上卷七後先王父有節錄内篇乙亥夏得之篋衍用以參校後改數字焯書甲申冬日重閱又改數字戊戌春日重閱又改數字仍多疑而未定者可以驗吾學之陋老而無聞矣書示餘兒庶用爲鑒誡早自鞭策也巳上皆卷十後甲戌十二月歸自臨沂整比家中舊書因抽此帙以消殘臈按張氏謂曾得宋代刻本乃譌舛正待點勘何歟爲卽其顯著者雌黃數處疑者則仍闕焉廿又八日焯書於貞志居觀玉海中所引史通亦有譌字脫文乃知此書自宋時卽尠善本或不至若此甚耳甲申除夕重閱盡此卷因而識之時住八貝勒邸中焯已丑重陽從錢楚殷借得孱守居士閱本因錄其評語其在行側者錄之闌下議論亦多英快虞山學者極矜重之僅季滄葦侍御一人嘗通假爾非楚殷好我末由見也始誤以爲牧翁初入史館時所閱故闌上下皆寫錢評詳質之楚殷乃改正云焯錢遵王讀書敏求記云陸文裕公刻蜀本史通其補注因習曲筆鑒識四篇殘脫疑誤不可復讀文裕題其篇末而無從是正舉世罕覩全書云云卽此本也予向收得别本是萬曆時長洲張鼎思據此重刻曾經同時人孫潛潛夫用葉石君校定本對讀者亦旣於脫簡處一一補錄完好矣錯誤處仍皆移正洵善本也因照臨一過黃蕘圃蓄沈寶研家本未知相校若何他日借勘之澗薲居士記時寓無爲州無爲寓館了無一書可檢向所雌黃多是義門諸氏所已有當推還之獨存其新知耳然於此頗自喜其暗合古人處九月重閱記于城南草堂沈寶研家本係其所臨馮巳蒼評何義門校也借勘一過九月十四日澗薲記盧氏羣書拾補引宋本附采卅許條於此若干條又續采甲子七月朔日重閱評書己上四跋見上元鄧氏藏本此史通孫潛潛夫手校本於明刻多所是正并足以訂近時通釋之失今年予攜之行篋尋覽數過每歎其佳五硯主人見而愛之因照臨一通而以其眞歸焉澗薲居士顧廣圻記時在秦淮寓中嘉慶甲子八月三日也此跋見涵芬樓藏張鼎思本史通明時第一刻爲嘉靖乙未陸儼齋深蜀本因習曲筆兩篇並有闕文萬曆三十年壬寅張鼎思復校陸本曲筆篇增四百卅餘字鑒識篇增三百餘字而去其自他篇羼入者六十餘字并删去儼齋兩跋較爲可讀而譌誤尙多涵芬樓藏張本經孫潛夫顧千里勘過已勝刻本叢刋旣據張本付印孫顧校語儗爲别錄聞江安傳沅叔總長有何義門校本又有過錄顧千里校本不費一瓻居然借到何氏自跋謂據孱守居士評本其底本則萬曆五年丁丑張之象刻本也而曲筆篇後亦有顧氏手跋則此本千里曾見之千里别有校本藏上元鄧正闇太史家保山吳慈培借錄於張之象本上顧校外更有何校並不知姓名者一家丹黃雜糅精審不苟今亦爲沅叔總長所有一旦盡得爲予借讀左右逢源殊爲快事何校自佳顧則時採羣書拾補以證之凡五百二十條顧引羣書拾𥙷亦有直下已意譏彈舊校如曲筆篇者此類尚多其于子玄之書用力可謂勤矣今據各本錄爲札記其不岀姓氏者何氏語也曰鄧本者不知姓氏之一家也史通校本向以抱經爲最精今復得此洵足訂正通釋之誤矣壬戌八月孫毓修跋

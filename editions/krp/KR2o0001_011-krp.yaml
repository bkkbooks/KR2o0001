front:
  text: 史通卷第十一
  hash: sha256:0ae12335bbd0413e5637c184cf0f4c1b2751e2e4dba760c1be07a678e779f5e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_011-1a}
body:
  text: 外篇史官建置第一總十四條夫人寓形天地其生也若蜉蝣之在世如白駒之過隙猶且恥當年而功不立疾沒世而名不聞上起帝王下窮匹庶近則朝廷之士逺則山林之客諒於其功也名也莫不汲汲焉孜孜焉夫如是者何哉皆以圖不朽之事也何者而稱不朽乎盖書名竹帛而已向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖蹻商冒之與曾閔俱一從物化墳土未乾則善惡不分妍媸永滅者矣苟史官不絶竹帛長存則其人已亡杳成空寂而其事如在皎同星漢用使後之學者坐披囊篋而神交萬古不出户庭而窮覽千載見賢而思齊見不賢而内自省若乃春秋成而逆子懼南史至而賊臣書其記事載言也則如彼其勸善懲惡也又如此由斯而言則史之爲用其利甚愽乃生人之急務爲國家之要道有國有家者其可缺之哉故備陳其事編之扵後其一條蓋史之建官其来尚矣昔軒轅氏受命倉頡沮誦實居其職至扵三代其數漸繁按周官禮記有大史小史内史外史左史右史之名大史掌國之六典小史掌邦國之志内史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之扵䇿小事簡牘而已大戴禮曰太子旣冠成人免扵保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肇自黃帝修扵周室名目旣多職務咸異至扵諸侯列國亦各有史官求其位號一同王者至如孔甲尹逸名重夏殷史佚倚相譽髙周楚晉則伯黶司籍魯則丘明受經此竝歷代史臣之可得言者䧏及戰國史氏無廢趙鞅晉之一大夫爾猶有直臣書過操簡筆扵門下田文齊之一公子爾每坐對賔客侍史記扵屏風至若秦趙二主澠池交㑹各命其御史書某年某月鼓瑟鼓缶此則春秋君舉必書之之義也然則官雖無闕而書尚有遺故史臣等差莫辨其序按吕氏春秋曰夏太史終古見桀惑亂載其圗法出奔商商太史髙勢見紂迷亂載其圖法出奔周晉太史屠黍見晉之亂亦以其圗法歸周又春秋晉齊太史書趙崔之弑鄭公孫黒強與扵盟使太史書其名且曰七子昭二年晉韓宣子來聘觀書扵太史氏見易象與魯春秋曰周禮盡在魯矣然則諸史之任太史其最優乎至秦有天下太史令胡母敬作博學章此則自夏迄秦斯職無改者矣漢興之世武帝又置太史公位在丞相上以司馬談為之漢法天下計書先上太史副上丞相叙事如春秋及談卒子遷嗣遷卒宣帝以其官為令行太史公文書而已尋自古太史之職雖以著述為宗而兼掌暦象日月隂陽度數司馬遷旣殁後之續史記者若褚先生劉向馮商楊雄之徒竝以别職來知史務扵是太史之署非復記言之司故張衡單颺王立髙堂隆等其當官見稱唯知占候而已其二條當王莽代漢改置柱下五史秩如御史聽事侍傍記跡言行盖効古者動則左史書之此其義也其三條漢氏中興明帝以班固為蘭臺令史詔撰光武本紀及諸列傳載記又楊子山為郡上計吏獻所作哀平傳為帝所異徴詣蘭臺斯則蘭臺之職者盖當時著述之所也自章和已後圖籍盛扵東觀凡撰漢記相繼在乎其中而都謂著作竟無它稱其四條當魏太和中始置著作郎職隷中書其官卽周之左史也晉元康初又職隷秘書著作郎一人謂之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下改佐著作郎為著作佐郎舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者若中朝之華嶠陳壽陸機束晢江左之王隱虞預于寶孫盛宋之徐爰蘇寶生梁之沈約裴子野斯竝史官之尤羙著作之妙選也而齊梁二代又置修史學士陳氏因循無所變革若劉涉謝旻顧野王許善心之類是也其五條至若偏隅僣國夷狄偽朝求其史官亦有可言者按蜀志稱王崇補東觀許蓋掌禮儀又郄正為秘書郎廣求益部書籍斯則典校無闕属辭有所矣而陳夀評云蜀不置史官者得非厚誣諸葛乎别有曲筆篇言之詳矣吳歸命時有左右二國史之職薛榮為其左華覈為其右又周處自左國史遷東觀令以斯考察則其班秩可知其六條偽漢嘉平初公師或以太中大夫領左國史撰其國君臣紀傳前涼張駿時劉慶遷儒林郎中常侍在東苑撰其國書蜀與西涼三朝記事委之門下南涼主烏孫初定覇基欲造國紀以其參軍郎韶為國紀祭酒使撰録時事自餘偽主多置著作官若前趙之和苞後燕之董統是也其七條元魏初稱制即有史臣雜取它官不常厥職故如崔浩髙閭之徒唯知著述而未列名號其後始扵秘書置著作局正郎二人佐郎四人其佐三史者不過一二而已晉秦以来三史稍替别置修史局其職有六人當代都之時史臣每上奉王言下詢國俗兼取工扵翻譯者来直史曹及洛京之末朝議又以為國史當專任代人不宜歸之漢士扵是以谷纂山偉更主文籍凡經二十餘年其事闕而不載斯蓋猶秉夷禮有互鄉之風者焉其八條髙齊及周迄于隋氏其史官以大臣統領者謂之監修國史自領則近循魏代逺効江南叅雜其間變通而已唯周建六官改著作之正郎為上士佐郎為下士名謚雖易而班秩不殊如魏收之擅名河朔柳虬之獨步關右王邵魏澹展効扵開皇之朝諸葛頴劉炫宣功扵大業之世亦各一時也其九條㮣皇家之建國也乃别置史舘通籍禁門西京則與鸞渚為鄰東都則與鳳池相接厥舘宇華麗酒饌豐厚得厠其流者實一時之羙事至咸亨年以職司多濫髙宗喟然而稱曰朕甚懵焉乃命所司曲加推擇如有居其職而闕其才者皆不得預扵修撰詔曰修撰國史義存典實自非操履忠正識量該通才學有聞難堪斯任切聞近日已来但居此職即知修撰非唯編緝訛舛亦恐漏洩史事自今後宜遣史司精簡堪修史人灼然為衆所推者録名進内自餘雖居史職不得輙聞見所修史籍及未行用國史等之事由是史臣拜職多取外司著作一曹始成虚設凡有筆削畢歸于餘舘始自武德迄乎長壽其間若李仁實以直辭見憚敬播以敘事推工許敬宗之矯妄牛鳯及之狂惑此其善惡尤著者也其十條又按晉令著作郎掌起居集注撰録諸言行勲伐舊載史籍者元魏置𧺫居令史每行幸讌㑹則在御左右紀録帝言及賔客詶對後别置修𧺫居注二人多以餘官兼掌至隋以吏部散官及校書正字閑扵述注者修之納言監領其事煬帝以為占有内史外史今既有著作宜立𧺫居遂置𧺫居舎人二員職隷中書省如庾自直崔濬祖虞世南蔡允恭等咸居其職時謂得人唐氏因之又加置𧺫居郎二員職與舎人同每天子臨軒侍立扵玉堦之下郎居其左舎人居其右人主有命則逼階延首而聽之退而編録以為𧺫居注龍朔中改名左史右史今上即位仍從國初之號焉髙祖大宗時有令狐德棻吕才蕭鈞褚遂良上官儀髙宗則天時有李安期顧㣧髙智周張大素凌季友斯並當時得名朝廷所屬也夫𧺫居注者編次甲子之書至扵策命章奏封拜薨免莫不隨事記録言惟詳審凡𣣔撰帝紀者皆因之以成功即今為載筆之别曹立言之貳職故略述其事附扵斯篇條其十一又按詩弼風静女之三章君子取其彤管夫彤管者女史記事規誨之所搦也古者人君外朝則有國史内朝則有女史内之與外其任皆同故晉献惑亂驪姬夜泣床第之私房中之事不得掩焉楚昭王讌逰蔡姬許從孤死矣夫宴私而有書事之冊盖受命者即女史之流乎至漢武帝時有禁中𧺫居注明德馬皇后撰明帝𧺫居注凡斯著述似出宫中求其職司未聞位號隋世王邵上䟽請依古法復置女史之班具録内儀付于外省文帝不許遂不施行大抵自古史官其㳂革廢置如此夫仲尼修春秋公羊髙作傳漢魏之陸賈魚豢晉宋之張璠范曄雖身非史職而私撰國書若斯人者有異扵是故不復詳而録之其十二條夫為史之道其流有二何者書事記言出自當時之簡勒成刪定歸扵後來之筆然則當時草創者資乎愽聞實録若董狐南史是也後來經始者貴乎雋識通才若班固陳夀是也必論其事業前後不同然相須而成其歸一揆條其十三觀夫周秦已徃史官之取人其詳不可得而聞也至於漢魏已降則可得而言然多竊虛號有聲無實按劉曹二史皆當代所撰能成其事者盖唯劉珍蔡邕王沉魚豢之徒耳而舊史載其同作非止一家如王逸阮籍亦預其列且叔師研尋章句儒生之腐者也嗣宗沉湎麴糵酒徒之狂者也斯豈能措置時事裁成國典乎而近代趨競之士尤喜居於史職至於措辭下筆者十無一二焉既而書成繕寫則署名同獻爵賞既行則攘𬒮爭受遂使是非無凖真偽相雜生則厚誣當時死則致惑來代而書之譜傳以為美談載之碑碣增其壯觀既而自厯行事稱其所長則云某代著某書某年成某史加封若干户獲賜若干段諸如此類徃徃而有遂使讀者皆以為名實相符功賞相副昔魏帝曰舜之事吾知之矣此則効歟其十四條十一卷終

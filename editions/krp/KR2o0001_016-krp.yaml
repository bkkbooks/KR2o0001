front:
  text: 史通卷第十六
  hash: sha256:b7a87baec6333cd5fbd7535a2f60b1d06d93af80c5e4a544084f99e119a014d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_016-1a}
body:
  text: 外篇雜說上第七二十五條春秋二條按春秋之書弑也稱君君無道稱臣臣之罪如齊之簡公未聞失德陳恒構逆罪莫大焉而哀十四年書齊人弑其君壬于舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子追書其事豈由以索續組不類將聖之能者乎何其乖刺之甚也按春秋左氏傳釋經云滅而不有其地曰入如入陳入衛入鄭入許即其義也至栢舉之役于常之敗庚辰呉入楚獨書以郢夫諸侯列爵並建國都惟取國名不稱都號何為郢之見入遺其楚名比扵它例一何乖踳尋二傳所載皆云入楚豈左氏之本獨為謬歟左氏傳二條左氏之敘事也述行師則簿領盈視叱聒沸騰論備火則區分在目修飾峻整言勝㨗則收獲都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱譎詐則欺誣可見談恩惠則煦如春日紀嚴切則凜若秋霜敘興邦則滋味無量陳亾國則凄凉可憫或膄辭潤簡牘或羙句入詠謌跌宕而不群縱橫而自得若斯才者殆將工侔造化思渉鬼神著述罕聞古今之卓絶如二傳之敘事也榛蕪溢句疣贅滿行華多而少實言拙而寡味若必方扵左氏也非惟不可為魯衛之政差肩鴈行亦有雲泥路阻君臣禮隔者矣左傳稱仲尼曰鮑莊子之智不如葵葵猶能衞其足夫有生而無識有質而無性者其惟草木乎然自枯自脆而已必言其含靈畜智隱身違禍則無其義也尋葵之向日傾心本不衛足由人覩其形似强為立名亦由今俗文士謂鳥鳴為啼花發為笑花之與鳥又安有咲啼之情哉必以人無喜怒不知哀樂便云其智不如花花猶善笑其智不如鳥鳥猶善啼可謂之讜言哉如鮑莊子之智不如葵葵猶能衞其足則謂智不如花花猶善笑智不如鳥鳥猶善啼皆可謂一例也而左氏録夫子一時戯言以為千載篤論成㣲婉之深累玷良直之高範不其惜乎公羊傳二條公羊云許世子止弑其君曷為加弑譏子道之不盡也其次因言樂正子春之視疾以明許世子之得罪尋子春孝道義感神明固以方駕曽閔連蹤丁郭苟事親不逮樂正便以弑逆加名斯擬失其流責非其罪盖公羊樂正俱出孔父門人思欲更相引重曲加談述所以樂正行事無理輙書故使編次不倫比喻非類言之可為嗤恠也語曰彭蠡之濵以魚食犬斯則地之所富物不稱珎按齊宻邇海隅鱗介惟錯故上客食肉中客食魚斯即齊之舊俗也然食魴鱠鯉詩人所貴必施諸他國是曰珎羞如公羊傳云晉靈公使勇士殺趙盾見其方食魚飱曰子為晉國重卿而食魚飱是子之儉也吾不忍殺子盖公羊生自齊邦不詳晉物以東土所賤謂西州亦然遂目彼嘉饌呼為菲食著之實錄以為格言非唯與左氏有乖亦扵物理全爽者矣汲冡紀年一條語曰傳聞不如所見斯則史之所述其謬已甚况乃傳寫舊記而違其本録者乎至如虞夏商周之書春秋所記之說可謂備矣而竹書紀年出扵晉代學者始知后啓殺益太甲誅伊尹文王殺季歴鄭桓公厲王之子則與經典所載乖剌甚多又孟子曰晉謂春秋為乘尋汲冡璅語即乘之流邪其晉春秋篇云平公疾夢朱羆窺屏左氏亦載斯事而云夢黄熊入門必欲捨傳聞而取所見則左傳非而晉文實矣嗚呼向若二書不出學者為古所惑則代成聾瞽無由覺悟也史記八條夫編年叙事混雜難辨紀傳成躰區别易觀昔讀太史公書每怪其所採多是周書國語世本戰國䇿之流近見皇家所撰晉史其所採亦多是短部小書省功易閱者若語林世說搜神記幽明録之類是也如曹于兩氏紀孫檀二陽秋則皆不之取故其中所載羙事遺略甚多民曹劉遺扵今晉書則了無其名續皆扵檀氏春秋有傳至若以古方今則知太史公亦同其失矣斯則遷之所録甚為膚淺而班氏稱其勤者何哉孟堅又云劉向揚雄愽極群書皆服其善叙事豈時無英秀易為雄覇者乎不然何虚譽之甚也史記鄧通傳云帝崩景帝立向若但云景帝立不言文帝崩斯亦可知矣何用兼書其事乎又倉公傳稱其傳黃帝扁鵲之脉書五色診病知人死生决嫌疑定可治召問其所長對曰傳黃帝扁鵲之脉書以下他文盡同上說夫上旣有其事下又載其言言事雖殊委曲何别按遷之所述多有此類而劉揚服其善叙事也何哉太史公撰孔子世家多採論語舊說至管晏列傳則不取其本書晏子也謂管子以為時俗所有故不復更載也按論語行扵講肆列扵學官重加編勒秪覺煩費如管晏者諸子雜家經史外事弃而不録實杜異聞夫以可除而不除宜取而不取以兹著述未覩厥義昔孔子力可翹関不以力稱何則大聖之德具美者衆不可以一介標末持為百行端首也至如達者七十分以四科而太史公述儒林則不取㳺夏之文學著循吏則不言冉季之政事至於貨殖為傳獨以子貢居先掩惡揚善旣忘此義成人之美不其缺如司馬遷序傳云為太史公十年而遭李陵之禍幽扵縲絏廼喟然而嘆曰是予之罪也身虧不用矣自叙如此何其畧哉夫云遭李陵之禍幽扵縲絏者乍似同陵䧟沒遂寘扵刑又似為陵所䧟獲罪扵國遂令讀者難得而詳頼班固載其與任安書書中具述被刑所以儻無此録何以克明其事者乎漢書載子長與任少卿書歴說自古述作皆因患而起末云不韋遷蜀世傳吕覧按吕氏修撰也廣招俊客比跡春秋共集異聞擬書荀孟思刋一字購以千金則當時宣布為日乆矣豈以遷蜀之後方始傳乎且必以身旣流移書方見重則又非關作者本因發憤著書之義也而輙引以自喻豈其倫乎若要多舉故事成其博學何不云虞卿窮愁著書八篇而曰不韋遷蜀世傳吕覽斯蓋識有不該思之未審耳昔春秋之時齊有夙沙衛者拒晉殿師郭最稱辱伐魯行唁臧堅抉死此閹官見鄙其事尤著者也而太史公與任少卿書論自古刑餘之人為士君子所賤者唯以彌子瑕為始何淺近之甚邪但夙沙出左氏傳漢代其書不行故子長不之見也夫博考前古而捨兹不載至扵乗傳車探禹穴亦何為者哉魏世家太史公曰說者皆曰魏以不用信陵君故國削弱至扵亡余以為不然天方令秦平海内其業未成魏雖得阿衡之徒曷益乎夫論成敗者固當以人事為主必惟命而言則其理悖矣蓋晉之獲也由夷吾之愎諫秦之㓕也由胡亥之無道周之季也由幽王之惑褒姒魯之逐也由稠父之違子家然則敗晉扵韓狐突已志其兆亡秦者胡始皇乆銘其說檿弧箕服章扵宣厲之年徵褰與襦顯自文成之世惡名早著天孽難逃假使彼四君才若桓文德同湯武其若之何苟推此理而言則亡國之君他皆倣此安得扵魏無譏責者㦲夫國之將亡也若斯則其將興也亦然蓋魏後之為公子也其筮曰八世莫之與京畢氏之為大夫也其占曰萬名其後必大姬宗之在水滸也鸑鷟鳴扵岐山劉姓之在中陽也蛟龍䧏扵豐澤斯皆瑞表扵先而福居其後向使四君德不半古才不逮人終能坐登大寳自致宸極矣乎必如太史公之議也則亦當以其命有必至理無可辤不復嗟其智能頌其神武者矣夫推命而論興滅委運而忘褒貶以之垂誡其不惑乎自兹以後作者著述徃徃而然如魚豢魏略虞世南帝王論或敘遼東公孫之敗有彗星出於箕而上徹是謂掃除魚豢魏略議曰當青龍景初之除不設而淫濫首施以取族滅殆天意也遼東而更置也苟其如此人不能違則德教或述江左陳氏之亡有㑹稽人史溥為楊州從事夣虞世南帝王畧論曰永定元年㸔之有文曰陳氏五主三十四年諒知㝠數非人着朱衣武冠自天而下手執金版有文字傳事獨人其理並以命而言可謂與子長同病者也諸漢史十條漢書孝成紀賛曰成帝善修容儀升車正立不内顧不疾言不親指臨朝淵嘿尊嚴若神可謂穆穆天子之容貌矣又五行志曰成帝好㣲行選期門郎及私奴各十餘人皆白衣袒幘自稱富平侯家或乗小車御者在茵上或駿騎出入遠至旁縣故谷永諌曰陛下晝夜在路獨與小人相隨亂服共坐溷淆無别公卿百寮不知陛下所在積有數年由斯而言則成帝魚服嫚逰鳥集無度雖外飾威重而内肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者矣觀太史公之創表也扵帝王則敘其子孫扵公侯則紀其年月列行縈紆以相属編字戢孴而相排雖燕越萬里而扵徑寸之内犬牙可接雖昭穆九代而扵方寸之中鴈行有敘使讀書者閱文便覩舉目可詳此其所以為快也如班氏之古今人表者惟以品藻賢愚激揚善惡為務爾既非國家逓襲禄位相承而亦複界重行狹書細字比扵它表殆非其類歟蓋人列古今本殊表限必恡而不去則宜以志名篇始自上上終于下下並當明為標榜顯列科條以種類為篇章持優劣為次第仍每扵篇後云若干品凡若干人亦猶地理志肇述京華末陳邉塞先列州郡後言户口也自漢已降作者多門雖新書已行而舊録仍在必校其則可得而言按劉氏初興書惟陸賈而已子長述楚漢之事專據此書譬夫行不由徑出不由户未之聞也然觀遷之所載徃徃與舊不同如酈生之初謁沛公髙祖之長歌鴻鵠非惟文句有别遂乃事理皆殊又韓王名信都而輙去都字用使稱其名姓全與淮隂不别班氏一凖太史書無更張靜言思之深所未了司馬遷之敘傳也始自初生及乎行歷事無巨細莫不備陳可謂審矣而竟不書其字者豈墨生所謂大忘也者乎而班固仍其本傳了無損益此又韓子所以致守株之說也如固之為遷傳也其初宜云遷字子長馮翊陽夏人其序曰云云至扵事終則言其自敘如此著述之體不當如是耶馬卿為自敘傳具在其集中子長因録斯篇即為列傳班氏仍舊曾無改奪固扵馬楊傳末皆云遷雄之自敘如此至扵相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純漢書東方朔傳委瑣煩碎不類諸篇且不述其亡殁嵗時及子孫繼嗣正與司馬遷楊雄傳相類尋其傳體必曼倩之自敘也但班氏脫略故世莫之知蘇子卿父建行事甚寡韋玄成父孟德業稍多漢書編蘇氏之傳則先以蘇建標名列韋相之篇則不以韋孟冠首並其失也班固稱項羽弑義帝自取天亡又云于公髙門以待封嚴毋掃地以待䘮如固斯言則深信夫天怨神怒福善禍淫者矣至扵其賦幽通也復以天命乆定非理所移故善惡無徵報施多爽斯則同理異說前後自相矛盾者焉或問張輔著班馬優劣論云遷敘三千年事五十萬言固敘二百年事八十萬言是固不如遷也斯言為是乎荅曰不然也按太史公書上𧺫黃帝下盡宗周年代雖存事跡殊畧至扵戰國已下始有可觀然遷雖敘三千年事其間詳備者唯漢興七十餘載而已其省也則如彼其煩也則如此求諸折中未見其宜班氏漢書全取史記仍去其日者倉公等傳以為其事煩蕪不足編次故也若使遷固易地而處撰成漢書將恐多言費辭有踰班固安得以此而定其優劣耶漢書㫁章事終新室如叔皮存沒時入中興而輙引與前書共編者盖序傳之常例者耳荀恱既刪略班史勒成漢紀而彪論王命列在末篇夫以規諷隗囂翼戴光武忽以東都之事擢居西漢之中必如是則賔戯幽通亦宜同載者矣史通卷之十六

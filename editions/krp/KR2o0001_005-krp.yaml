body:
  text: 内篇採撰載文𥙷注因習上因習下採撰第十五子曰吾猶及史之闕文是知史文有缺其來尚矣自非慱雅君子何以𥙷其遺逸者哉蓋珍裘以衆腋成温廣厦以羣材合構自古探穴藏山之士懷鈆握槧之客何嘗不徴求異說採摭羣言然後能成一家傳諸不朽觀夫丘明授經立傳廣包諸國蓋當時有周志晉乗鄭書楚杌等篇遂乃聚而編之混成一録向使專慿魯䇿獨詢孔氏何以能殫見洽聞若斯之慱也馬遷史記採世本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序說苑七畧之辭此皆當代雅言事無邪僻故能取信一時擅名千載但中古作者其流日煩雖國有册書殺青不暇而百家諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虗益新事至如禹生啓石伊産空桑海客乗槎以登漢姮娥竊藥以犇月如斯踳駮不可殫論固難以汙南董之片簡霑班曄之寸札而嵇康髙士傳好聚七國寓言玄晏帝王紀多採六經圗䜟引書之誤其萌始扵此矣至范曄増損東漢一代自謂無慙良直而王喬鳬履出扵風俗通左慈羊鳴傳扵抱朴子朱紫不别穢莫大焉沈氏著書好誣先代扵晉則故造竒說在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤甚南國承其詭妄重加誣語遂云司馬叡出扵牛金者與夏侯妃私通生中宗因逺敘宣帝王邵沈約晋書造竒說云瑯琊國姓牛晉將牛金子也宋孝王曰收以叡為金子計其以毒酒煞牛金符證其狀收因此乃云司馬叡此誤况後史編録者耶年全不相干按前史尚如劉駿上滛路氏宋書沈約書因云駿蒸其母路氏醜聲播扵甌越也曰孝武扵路太后處寢息時人多有議魏可謂助桀為虐幸人之災尋其生絶㣧嗣死遭割㫁蓋亦隂過之所致也晉世雜書諒非一族若語林世說幽明録搜神記之徒其所載或恢諧小辨或神鬼恠物其事非聖楊雄所不觀其言亂神宣尼所不語唐朝所撰晉史多採以為書夫以于鄧之所糞除王虞之所糠粃以為逸史用𥙷前傳此何異魏朝之撰皇覽梁世之修遍畧務多為羙聚慱為功雖取恱小人終見嗤扵君子矣夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其眞偽者乎至如江東五雋始自會稽典録頴川八龍出扵荀氏家傳而修晉漢史者皆徴彼虚譽定為實録苟不别加研覈何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盗嫂翟義不死諸葛猶存此皆得之扵行路傳之扵衆口儻無明白其誰曰然故蜀相薨扵渭濵晉書稱嘔血而死魏君崩扵馬圈齊史云中矢而亡沈烱薦書河北以為王韋魏收草檄關西謂之邢邵夫同說一事而分為兩家蓋言之者彼此有殊故書之者是非無定况古今路阻視聼壤隔而談者或以前為後或以有為無涇渭一亂莫之能辨而後来穿鑿喜出異同不慿國史别訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉䕫唯一足烏白馬角救燕丹而免禍犬吠鷄鳴逐劉安以高蹈此之乖濫徃徃有􅏧故作者惡道聽途說之違理街談巷議之損實觀夫子長之撰史記也殷周已徃採彼家人安國之述陽秋也梁益舊事訪諸故老夫以蒭蕘鄙說刋為竹帛正言而輙欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作㝠漠九泉毁譽所加逺誣千載異辭疑事學者宜善思之載文第十六夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其羙載扵周詩懷襄不道其惡存扵楚賦讀者不以吉甫奚斯為謟屈平宋玉為謗者何也蓋不虚羙不隱惡故也是則文之將史其流一焉固可以方駕南董俱稱良直者矣爰洎中葉文體大變樹理者多以詭妄為本飾辭者務以滛麗為宗譬以女工之有綺縠音樂之有鄭衛蓋語曰不作無益害有益至如史氏所書固當以正為主是以虞帝思理夏后失御尚書載其元首禽荒之歌鄭莊至孝晉献不明春秋録其大隧狐䘮之什其理儻而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虚上林楊雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無禆勸奬有長奸詐而前後史漢皆書列傳不其謬乎且漢代詞賦雖云虚矯自餘它文大抵猶實至扵魏晉已下則偽繆雷同㩁而論之其失有五一曰虚設二曰厚顔三曰假手四曰自戾五曰一槩何者大道爲公以能而授故堯咨尔舜舜以命禹自曹馬已䧏其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓跡實同扵莽卓言乃類扵虞夏且始自納陛迄于豋壇彤弓盧矢新君膺九命之錫白馬侯服舊主䝉三恪之禮徒有其文竟無其事所謂虚設也古者兩軍為敵二國爭雄自相稱述言無所隱何者國之得䘮如日月之蝕焉非由飾辭矯說所能掩蔽也逮扵近古則不然至如曹公歎蜀主之英畧曰劉備吾儔周帝羙齊宣之強盛云髙歡不死或移都以避其鋒或斵氷以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顔也古者詔命皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見决矣至扵近古則不然凢有詔敕皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隱之渥恩叙憂勤之至意其君雖有反道敗德惟頑與暴觀其政令則辛癸不如讀其詔誥則勛華再出此所謂假手也天子無戲言苟言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所愼至扵近古則不然凢百具寮王公卿士始有褒崇則謂其珪璋特逹善無可加旋有貶黜則比之斗筲下才罪不容責夫同為一士之行同取一君之言愚智生扵倐忽是非變扵俄頃帝心不一皇鍳無恒此所謂自戾也夫國有否泰世有汚隆作者形言本無定凖故觀猗歟之頌而驗有殷方興覩魚藻之刺而知宗周將殞至扵近代則不然夫談主上之聖明則君盡三五述宰相之英偉則臣皆二八國止方隅而言併吞六合福不盈時而稱感致百靈雖人事屢攺而文理無昜故善之與惡其說不殊欲令觀者疇爲凖的此所謂一槩也扵是考兹五失以尋文義雖事皆形似而言必憑虛夫鏤氷爲璧不可得而用也畫地爲餅不可得而食也是以行之扵世則上下相䝉傳之扵後則世人不信而世之作者復不之察聚彼虚說編而次之剙自起居成扵國史連章畢録一字無廢非復史書更成文集若乃類選衆作求其穢累王沉魚豢是其甚焉裴子野何之元抑其次也陳壽于寳頗從簡約猶時載浮訛罔盡機要唯王邵撰齊隋二史其所取也文皆諳實理多可信至扵悠悠餙詞皆不之取此實得去邪從正之理捐華摭實之義也蓋山有木工則度之况舉世文章豈無其選但苦作者書之不讀耳至如詩有韋孟諷諫賦有趙壹嫉邪篇則賈誼過秦論則班彪王命張華述箴扵女史張載題銘扵劍閣諸葛表主以出師王昶書家以誡子劉向谷永之上䟽晁錯李固之􅍟䇿荀伯子之彈文山巨源之啓事此皆言成軌則為世龜鏡求諸歷代徃往而有苟書之竹帛持之不刋則其文可與三代同風其事可與五經齊列古猶今也何逺近之有哉昔夫子修春秋别是非申黜陟而賊臣逆子懼凢今為史而載文也茍能撥浮華採眞實亦可使夫彫䖝小技者聞義而知徙矣此乃禁淫之隄防持雅之管轄凢為載削者可不務乎𥙷註第十七昔詩書旣成而毛孔立傳傳之時義以訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注蓋傳者轉也轉授扵無窮注者流也流通而靡絶惟此二名其歸一揆如韓戴服鄭鑚仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗旣而史傳小書人物雜記若贄虞之三輔决録陳壽之季漢輔臣周處之陽羡土風常據之華陽士女文言羙辭列扵章句委曲叙事存扵細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力㣲不能自逹庶慿驥尾千里絶羣遂乃掇衆史之異詞𥙷前書之所闕若裴松之三國志陸澄劉昭兩漢書劉彤晉紀劉孝摽世說之類是也亦有躬為史臣手自刋削雖志存該慱而才闕倫叙除煩則意有所恡畢載則言有所妨遂乃定彼榛楛列為子注若蕭大圜淮海亂離志楊衘之洛陽伽藍記宋孝王關東風俗傳王邵齊志之類是也㩁其得失求其利害少期集注國志以廣承祚所遺而喜聚異同不加刋定恣其擊難坐長煩蕪觀其書成表献自比蜜蜂兼採但丼苦不分難以味同萍實者矣陸澄所注班史多引司馬遷之書若乃此缺一言彼增半句皆採摘成注標為異說有昬耳目難以披覽切惟范曄之刪後漢也簡而且周踈而不漏蓋云備矣而劉昭採其所捐以今稱之皇甫謐全録斯語載於髙士傳夫孟堅士安年代懸隔至今之說豈可同云夫班之習馬其非旣如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉隗録稱其議獄事具刑法志依檢志内了無其說旣而臧氏晉書梁朝通史扵大連之傳並有斯言志亦無文傳仍虚述此又不精之咎同扵玄晏也尋班馬之列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄旣移題目扵傳首歷姓名扵卷中而猶扵列傳之下注爲列女髙隱等目茍姓名旣書題目又顯是鄧禹宼恂之首當署為公輔者矣岑彭吴漢之前當摽為將帥者矣觸類而長實繁其徒何止列女孝子髙隱獨行而已魏收著書標牓南國桓劉諸族咸曰島夷是則自江東西盡為卉服之地至扵劉昶沈文秀等傳叙其爵里則不異諸華人也沈文秀等傳則劉𥙿等傳皆云丹徒武康人云吴興豈有君臣共國父子同姓闔閭季札便致土風之殊孫䇿虞翻仍成夷夏之隔求諸徃例所未聞也當晉宅江淮實膺正朔嫉彼羣雄稱爲僣盗故阮氏七録以田范裴叚諸記劉石符姚等書别剏一名題爲偽史及隋氏受命海内爲家國靡愛憎人無彼我而世有撰隋書之經籍志者其流别羣書還同阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧爲附庸之主而楊雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王氏將崩覇國云搆必有忠臣義士捐生殉節若乃韋耿謀討曹武欽誔問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如苟濟元瑾蘭摧於李靖之末王謙尉廻玉折扵宇文之季而季刋齊史顔述隋篇時無逼畏事湏矯在而皆仍舊不攺謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盗葛龔所作而進之旣具録它文不知攺易名姓時人謂之曰作奏雖工冝去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歴觀自古此類尤多其有冝去而不去者豈直葛龔而已何事於斯獨致解頥之誚也凢為史者茍能識事詳審措辭精宻舉一偶以三隅反告諸徃而知諸來庶㡬可以無大過矣因習上第十八矣此篇終有缺文不可考古者諸侯並争勝負無懼而他善必稱已惡不諱逮乎近世無聞至公國自謂為我長家相謂為彼短至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實而魏收以元氏出扵邉裔見侮諸華遂髙自摽舉比夷朝扵姬漢之國曲加排抑同建業扵蠻貊之邦夫以敵國相讎交兵結怨載諸移檄用可致誣列諸緗素寔為妄說茍未逹此義安可言扵史耶張晏云遷歿後亡龜史職故災祥靡聞按黃氣見扵柹歸群烏墮扵江水成都言有景星出益州言無宰相氣若史官不置此事安得從而書之蓋由父辱受髠故加兹謗議者也按史通十卷舊本定為三十八篇篇繫一事惟因習分為上下篇上篇舊稱文缺今本存三十七篇比因訂正曲筆鑒識二篇錯簡乃類為一篇以還之扵此未必其本書也而文亦煩綴矣知㡬之為此書也高自摽致嘗謂國史以叙事為工叙事以簡為主故自子長丘明而上皆涉抨彈然此書之冗長亦不少矣笑前人之未工亡己事之已拙嗚呼修辭之難也如此深謹記因習下第十九邑里亦曰昔五經諸子廣書人物雖氏族可驗而邑里難詳逮太史公始革兹體惟有列傳先述太古至於國有弛張鄉有併省隨時而載用明審實按夏侯孝若撰東方朔賛云朔字曼倩平原厭次人魏建安中分厭次為樂陵郡故又為郡人焉夫以身沒之後地名改易猶復追書其事以示後来則知在生之前故冝詳録者矣異哉晉氏之有天下也自雒陽蕩覆衣冠南渡江左僑立州縣不存桑梓由是斗牛之野郡有徐雍吳越之鄊州編冀䂊欲使南北不亂淄澠可分得乎繫虛名扵本土者雖百代無易旣而天長地乆文軓大同州郡則廢置無恒名目則古今各異而作者為人立傳每云某所人也其地皆取舊號施之于今氏傳曰隴西成紀人之類也非唯王李近代史為王氏傳云瑯琊臨沂人為李郡縣皆是晉魏已前舊名號二族乆離本郡亦自當時無此欲求實録不亦難乎且人無定所因地而化生于荆者言皆成楚居于晉者齒便從黃涉魏而東已經七葉歷江而左非唯一世而猶以本國為是此鄉為非是則孔父里于平昌隂氏家于新野而系纂㣲子源承管仲乃為齊宋之人非曰魯鄧之士求諸自古其義無聞家于魏州昌樂已經三代因時修國史予𬒳配纂李義琰史體遂依李氏舊望攺為隴西成紀人既言不云義琰魏州昌樂人也監修者大笑以為深乖有此說見從故且自世重髙門人輕寒族竟以姓望所出邑里相矜若仲逺之尋鄭玄先云汝南應邵文舉之對曹操自謂魯國孔融是也爰及近古其言多偽至於碑頌所勒茅土定名虚引他邦冒為已邑若乃稱袁則飾之陳郡言杜則係之京邑姓卯金者咸曰彭城氏禾女者皆云鉅鹿書其邑里必云隴西趙郡夫以假姓猶且如斯今有姓邴者姓弘者以犯國諱皆改為李氏如及卑者如加五等爵或稱平原公或號東平子則真姓者斷可知矣又今西域胡人多有姓明夷雜種尚竊美名則諸夏士流固無慚徳也為明氏出於平原卑氏出於東平故也夫邉在諸史傳多與同風人也本姓原氏至於它篇所如隋史牛弘傳云安定鶉觚庫汗氏續謂之陳郡謝偃並其類也引皆謂之西牛弘唐史謝偃傳云本姓此乃尋流俗之常談志著書之舊體矣又近世有班秩不著姓者始以州壤自摽若楚國龔遂漁陽趙壹是也至於名位既隆則不從此列若蕭何鄧禹賈誼董仲舒是也觀周隋二史每述王庾諸事髙楊數公必云瑯琊王褒新野庾信弘農楊素渤海髙頻以此成言豈曰省文從而可知也凡此諸失皆由積習相傳寢以成俗迷而不返盖語曰難與慮始可與樂成夫以千載遵行持為故事而一朝紏正必驚愚俗此莊生所謂安得妄言之人而與之言斯言已得之矣庶知音君子詳其得失者焉史通卷之五

front:
  text: 續校史通序唐長安景龍間劉子玄在東觀商榷諸史著史通二十卷傳刻弗廣余家有抄本齊六趙肖十居一二以故宦轍所至必先購求復得二三抄本雖各有舛譌而叅稽互正庶幾可讀兹承乏江臬同寀諸公一時士望聚會之間縱言至於史方伯莆田吳公曰此有史通太史陸儼山氏守藩時刻也子其讎之余念儼山先生才雄學博其于是刻用心良勤然恨無别本叅對若有望于後人余豈敢辭因岀篋中本更爲校勘篇章有應合應岐者合之岐之書名有應刪應益應定者刪之益之定之曲筆篇爲增四百卅餘字鍳識篇增三百餘字而去其自它篇羼者六十餘字因習上卷巳亡刻中數行宜削而不削者愼之也它無可㨿者姑仍其舊校竣竊喟然曰嗟乎史職之難久矣左史以降作者比肩靡不自謂鞭撻狐南睥睨游夏而子玄横加訶詆所與完璧者僅王君懋一人而巳由斯以談柳子厚之不就豈無見乎然子玄身秉史筆不自成家龍姿美業未聞光闡鷄晨穢德未聞昭戒至其論史則信冡書而疑墳典譏堯舜訾湯文誹周孔不少顧忌故宋子京有工拙之譏柳炤之有析微之論刻之不廣大率爲此要以序體法朙典要爲作史者凖繩則是書亦豈可少哉夫其上自唐虞下及陳隋網羅千禩貫穿百家雖謂前無古人可矣此徐堅所以有座右之許也觀所上蕭至忠書雖苦積薪

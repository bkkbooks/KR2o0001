  - {type: variant, offset: 3748, length: 380, content: 上第十八矣此篇終有缺文不可考古者諸侯並争勝負無懼而他善必稱已惡不諱逮乎近世無聞至公國自謂為我長家相謂為彼短至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實而魏收以元氏出扵邉裔見侮諸華遂髙自摽舉比夷朝扵姬漢之國曲加排抑同建業扵蠻貊之邦夫以敵國相讎交兵結怨載諸移檄用可致誣列諸緗素寔為妄說茍未逹此義安可言扵史耶張晏云遷歿後亡龜史職故災祥靡聞按黃氣見扵柹歸群烏墮扵江水成都言有景星出益州言無宰相氣若史官不置此事安得從而書之蓋由父辱受髠故加兹謗議者也按史通十卷舊本定為三十八篇篇繫一事惟因習分為上下篇上篇舊稱文缺今本存三十七篇比因訂正曲筆鑒識二篇錯簡乃類為一篇以還之扵此未必其本書也而文亦煩綴矣知㡬之為此書也高自摽致嘗謂國史以叙事為工叙事以簡為主故自子長丘明而上皆涉抨彈然此書之冗長亦不少矣笑前人之未工亡己事之已拙嗚呼修辭之難也如此深謹記因習, WYG: ''}

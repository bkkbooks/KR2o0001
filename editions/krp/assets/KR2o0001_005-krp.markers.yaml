  - {type: variant, offset: 2989, length: 0, content: '', WYG: 為補注言盡非要事皆不急譬夫人有吐菓之核棄藥之滓而愚者乃重加捃拾潔以登薦持此為工多見其無識也孝標善於攻謬博而且精固以察及泉魚辨窮河豖嗟乎以峻之才識足堪逺大而不能探􅄨彪嶠網羅班馬方復留情於委巷小說銳思於流俗短書可謂勞而無功費而無當者矣自茲以降其失逾甚若蕭楊之璅雜王宋之鄙碎言殊揀金事比雞肋異體同病焉可勝言大扺撰史加注者或因人成事或自我作故記録無限規檢不存難以成一家之格言千載之楷則凡諸作者可不詳之至若鄭𤣥王肅述五經而各異何休馬融論三傳而競爽欲加商㩁其流實煩斯則義涉儒家言非史氏今並不書於此焉因習上第十八葢聞三王各異禮五帝不同樂故傳稱因俗易貴隨時況史書者記事之言耳夫事有貿遷而言無變革此所謂膠柱而調瑟刻舩以求劔也古者諸侯曰薨卿大夫曰卒故左氏傳稱楚鄧曼曰王薨於行國之福也又鄭子産曰文襄之伯君薨大夫弔即其證也按夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外别内之旨也馬遷史記西伯以下與諸列國王侯凡有薨者同加卒稱此豈略外别内耶何貶薨而書卒也葢著魯史者不謂其邦為魯國撰周書者不呼其主曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為累也班氏既分裂史記定名漢書至於述高祖為公王之時皆不除沛漢之字凡有異方降欵者以歸漢為文肇自班書首為此失迄于仲豫仍踵厥非積習相傳曾無先覺者矣又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文按遷之言今實孝武之世也固之言今當孝明之世也事出百年語同一理即如是豈陳氏苖裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至}

  - {type: variant, offset: 27, length: 1665, content: 傳刻弗廣余家有抄本齊六趙肖十居一二以故宦轍所至必先購求復得二三抄本雖各有舛譌而叅稽互正庶幾可讀兹承乏江臬同寀諸公一時士望聚會之間縱言至於史方伯莆田吳公曰此有史通太史陸儼山氏守藩時刻也子其讎之余念儼山先生才雄學博其于是刻用心良勤然恨無别本叅對若有望于後人余豈敢辭因岀篋中本更爲校勘篇章有應合應岐者合之岐之書名有應刪應益應定者刪之益之定之曲筆篇爲增四百卅餘字鍳識篇增三百餘字而去其自它篇羼者六十餘字因習上卷巳亡刻中數行宜削而不削者愼之也它無可㨿者姑仍其舊校竣竊喟然曰嗟乎史職之難久矣左史以降作者比肩靡不自謂鞭撻狐南睥睨游夏而子玄横加訶詆所與完璧者僅王君懋一人而巳由斯以談柳子厚之不就豈無見乎然子玄身秉史筆不自成家龍姿美業未聞光闡鷄晨穢德未聞昭戒至其論史則信冡書而疑墳典譏堯舜訾湯文誹周孔不少顧忌故宋子京有工拙之譏柳炤之有析微之論刻之不廣大率爲此要以序體法朙典要爲作史者凖繩則是書亦豈可少哉夫其上自唐虞下及陳隋網羅千禩貫穿百家雖謂前無古人可矣此徐堅所以有座右之許也觀所上蕭至忠書雖苦積薪與𧖟室然讀白首有期汗青無日之語其志有足諒者余深悲之故于兹編三致意焉萬曆壬寅冬十月榖旦後學長洲張鼎思譔史通序錄唐劉子玄知㡬撰長安二年余以著作佐郎兼修國史尋遷左史扵門下撰起居注會轉中書舎人暫停史任俄兼領其職今上即位除著作郎太子中允率更令其修史皆如故又属大駕還亰以留後在都無㡬驛徴入亰專知史事仍遷秘書少監自惟歴事二主從官兩亰遍居司籍之曹乆處載言之職昔馬融三入東觀漢代稱榮張華再典史官晉朝稱羙嗟予小子兼而有之是用職司其憂不遑啟處甞以載削餘暇商搉史篇下筆不休遂盈筐篋扵是區分類聚編而次之昔漢世諸儒集論經傳定之扵白虎閣因名曰白乕通予旣在史舘而成此書故便以史通為目且漢求司馬遷後封為史通子是知史之稱通其來曰乆慱采衆議爰定兹名凢為廿卷列之如左合若干言十二字註五千四百九十八字除所闕篇凢八萬二千三百五于旹嵗次庚戌景龍四年仲春之月也刋正史通序昔人謂史通一書宜置座右史法存焉耳我蜀藩司板册照新以屬來哲其意一也然人雖得而葆之不免蒙翳之患舛訛煩亂齟齬惟艱脫簡缺文坐令荒惑不有先覺將為聚飲之書也儼山先生頃膺方伯蒞蜀省閱是本憫其亂亡乃乗公暇肆筆裁訂或考同辨異輯類次編或㑹文䟽義聮屬血脉或衍去支離蕪穢以就凢例反復内外諸篇有所謂足其所未盡𥙷其所未圓白其所未瑩貫其所未一者嘉惠之意可淺言㢤夫隷古定著有禆壁經石鼓剔苔㶢價百倍愚也嘉史通之遭經先生之筆文旣足徴史法于是焉在慱雅者可以無憾矣賜進士出身中憲大夫前奉勅提督學政雲南按察司副使成都門生王閣撰史通上卷内篇第一卷六家第一第二卷世家第五二體第二列傳第六載言第三本紀第四第三卷表歷第七書志第八第四卷斷限十二論賛第九次篇十三序例第十稱謂十四題目十一第五卷因習上十八採撰十五因習下十九載文十六浦注十七第六卷言語第二十浮詞二十一叙事二十二第七卷鉴識二十六品藻二十三探頥二十七直書二十四曲筆二十五第八卷摸擬二十八書事二十九人物第三十第九卷覈才三十一序傳三十二煩省三十三第十卷批繆三十七雜述三十四弛張三十八辨識三十五體統三十六右定凢三十六篇并前序及志第七篇共三十八篇史通札記補此書初校原刻顯誤之字有逕依校筆上石者今悉復原刻之舊别補校文於後庶端緒可尋以存前賢傅校古籍點畫不苟之榘矱云丁卯七月吳縣姜殿揚補校幷記卷一五葉九行于干卷二五葉一行于干六葉十五行其吳卷三四葉十四行折拆七葉一行折拆十四葉五行事患卷四八葉十行照肰昭然十二葉十四行免兔十三葉十七行博傳卷五九葉十七行御衒十一葉三行列烈十二葉二行誕誕十五葉十七行志忘卷六三葉一行爲僞四葉七行介范尔苑八葉十八行仝全十七葉七行注刑邢卷七三葉十四行百者卷八一葉十一行一古二葉七行于干五葉十三行隋隨六葉四行力刀七葉七行于干卷九一葉十五行柝折六葉七行于干十一行一二卷十二葉九行周圈十八行于干十一葉十二行快怏卷十二十九葉十三行十八八十卷十三九葉二行爲蔿卷十五十葉十一行注上下卷十六七葉二行秋陵卷十八二葉十七行注則測四葉十二行失此此失八葉三行漢漁七行讚譖十葉六行紀絕卷十九七葉二行注十一七十三葉二行由田卷二十十五葉十行詆抵, WYG: ''}

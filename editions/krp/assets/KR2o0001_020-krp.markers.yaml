  - {type: variant, offset: 6, length: 5230, content: 十外篇暗惑忤時暗惑第十二十四條夫人識有不燭神有不明則真偽莫分邪正靡别昔人有以髮繞灸誤其國君者有置毒於胙誣其太子者矣夫髮經炙炭必致焚灼毒味經時無復殺害而行之者偽成其事受之者信以為然故使見咎一時取怨千載夫史傳叙事亦多如此其有道理難憑欺誣可見如古來學者莫覺其非葢徃往有焉今聊舉一二加以駁難列之如左史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為巳死象乃止舜宮難曰夫杳㝠不測變化無恒兵革所不能傷網羅所不能制若左慈易質為羊劉根竄形入壁是也時無可移禍所必至雖大聖所不能免若姬伯拘於羑里孔父阨於陳蔡是也然俗之愚者皆謂彼幻化是為聖人豈知聖人智周萬物才兼百行若斯而已與夫方内之士有何異哉如史記云重華入於井中匿空出去此則其意以舜是左慈劉根之類非姬伯孔父之徒苟識事如斯難以語夫聖道矣且按太史公云黄帝堯舜軼事時時見於他說余擇其言尤雅者著為本紀書首若如向之所述豈可謂雅邪又史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟為夀王大驚以為孫叔敖復生欲以為相難曰盖語有之人心不同有如其面故窳隆異等修短殊姿皆稟之自然得諸造化非由倣傚俾有遷革如優孟之象孫叔敖也衣冠談說容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪昔陳焦既亡累年而活秦諜從縊六日而蘇遂使竹帛顯書今古稱恠況叔敖之殁時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以豈有片言不接一見無疑遽欲加以寵榮復其禄位此乃類夢中行事豈人倫為者哉又史記田敬仲世家曰田常成子以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以諡此之不實明然可知又按左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎史記家令說太上皇曰髙祖雖子人主也諸如此說其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語簒成歌詞欲加刋正無可釐革故獨舉其失以為標冠云又史記仲尼弟子列傳曰孔子既殁有若狀似孔子弟子相與共立為師事之如夫子他日弟子進問曰昔夫子甞行使弟子持雨具已而果雨商瞿長無子欲更取室孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知之有若嘿然無應弟子起曰有若避此非子之坐也難曰孔門弟子七十二人柴愚參魯宰我言語師商可方回賜非類此並聖人品藻優劣已詳門徒商搉臧否又定如有若者名不隷於四科譽無偕於十哲逮尼父既殁方取為師以不答所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使喪明致罰投杖謝愆何肯公然自欺詐相承奉此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷裁史仍習其言得自委巷曾無先覺悲夫又史記漢書皆曰上自雒陽南宮從複道望見諸將徃徃相與坐沙中語上曰此何語留侯曰陛下所封皆故人新愛所誅皆平生讎怨此属畏誅故相聚謀反爾上乃憂曰為之奈何留侯曰上平生所憎誰最甚者上曰雍齒留侯曰今先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣於是上置酒封雍齒為侯難曰夫公家之事知無不為見無禮於君如鷹鸇之逐鳥雀按子房少也傾家結客為韓報仇此則忠義素彰名節甚著其事漢也何為属羣小聚謀將犯其君遂嘿然杜口俟問方對倘若髙祖不問竟欲無言者邪且將而必誅罪在不測如諸將屯聚圖為禍亂密言臺上猶懼覺知羣議沙中何無避忌為國之道必不如斯然則張良慮反側不安雍齒以嫌疑受爵盖當時實有其事也如複道之望坐沙而語是說者敷演妄益其端耳又東觀漢記曰赤眉降後積甲與熊耳山齊云云難曰按盆子既亡棄甲誠衆必與山比峻則未之有也昔大誓云前徒倒戈血流漂杵孔安國曰盖言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟又東觀漢記曰郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至郭外問使者何日當還伋使别駕計日告之既還先期一日伋為違信止於野亭須期乃入難曰盖此事不可信者三焉按漢時方伯儀比諸侯其行也前驅蔽野後乘塞路鼓吹沸喧旌棨填咽彼草萊稚子齠齓童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌襜帷首觸威嚴自陳襟抱其不可信一也又方伯按部舉州振肅至於墨綬長吏黄綬羣官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩息有所如棄而不就居止無常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄它方盖亦事同大夏訪諸商賈不可多得況在童孺彌復難求羣戲而乘如何克辦其不可信三也凡說此事總有三科搉而論之了無一實異哉又魏志注語林曰匈奴遣使人來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云難曰昔孟陽卧床詐稱齊后紀信乘纛矯號漢主或王遘屯䝉或朝罹兵革故權以取濟事非獲已如崔琰本無此急何得以臣代君者哉且凡稱人君皆慎其舉措況魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉瞩也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛結以親姻猶虺毒不悛狼心易擾如輒殺其使者不顯罪名復何以懐四夷於外蕃建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜兹謗口而言同綸綍聲遍寰區欲盖而彰止益其辱雖愚暗之主猶所不為況英略之君豈其若是夫蒭蕘鄙說閭巷讇言凡如此書通無擊難而裴引語林斯事編入魏史注中持彼虚詞亂兹實録故特申掎摭辨其疑誤者焉盖曹公多詐好立詭謀流俗相欺遂為此說又魏世諸小書皆云文鴦侍講殿瓦皆飛云云難曰案漢書云項王叱咤慴伏千人然則呼聲之極大者不過使人披靡而已尋文鴦武勇逺慙項籍況侍君側固當屏氣徐言安能檐瓦皆飛有踰武安鳴鼓且瓦既飄隕則人必震驚而魏帝與其羣臣焉得恬然無害也又晉陽秋曰胡質為荆州刺史子威自京師省之見父十餘日告歸質賜絹一疋為路粮威曰大人清髙不審於何得此絹質曰是吾俸禄之餘難曰古人謂方牧為二千石者以其禄有二千石故也名以定躰貴實甚焉設使亷如伯夷介若黔敖茍居此職終不患於貧餧者如胡威之别其父也一縑財猶且發問則千石之俸其費安施料以牙籌推之借箸察其厚薄知不然矣或曰觀諸史所載兹流非一折轅車吳隠之為如張湛為蜀郡乗客並其類也廣川貸夫待必以多為證則足可無疑然人自有身安弊緼口甘麄糲而多藏鏹帛無所散用者故公孫弘位至三公而卧布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此而史臣不詳厥理直謂清白繆矣哉又新晉書阮籍傳曰籍至孝母終正與人圍碁對者求止籍留與決既而飲酒二斗舉聲一號吐血數升及葬食一蒸㹠飲酒二斗然後臨穴直言窮矣舉聲一號因復吐血數升毁瘠骨立殆致滅性難曰夫人才雖下愚識雖不肖始亡天属必致其哀但以苴絰未㡬悲荒遽輙如謂本無戚容則未之有也況嗣宗當聖善將殁閔凶所鍾合門惶恐舉族悲咤居里巷者猶停舂杵之音在鄰伍者尚申匍匐之救而為其子者方對局求決舉杯酣暢但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之喪親也朝夕孺慕塩酪不甞斯可至於癯瘠矣如甘㫖在念則觔肉内寛醉飽自得則肌膚外博況乎溺情㹠酒不改平素雖復時一嘔慟豈能柴毁骨立乎葢彼阮生者不修名教居喪過失而說者遂言其無禮如彼人以其志操尤異才識甚髙而談者遂言其至性如此惟毁及譽皆無取焉又新晉書王祥傳曰祥漢末遭亂扶母携弟覽避地廬江隠居三十餘年不應州郡之命母終徐州刺史呂䖍檄為别駕年垂耳順覽勸之乃應召于時冦賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實賴王祥年八十五太始五年薨難曰祥為徐州别駕冦盜充斥固是漢建安中徐州未清時事耳有魏受命凡三十五年上去徐州冦賊充斥下至晉太始五年當六十年已上矣祥於建安中年垂耳順更加六十六載至晉太始五年薨則當年一百二十嵗矣而史云年八十五薨者何也如必以終時實年八十五則為徐州别駕止可二十五六年矣又云其未從官已前隠居三十餘載者但其初被檄時止年二十五六自此而往安得復有三十餘年乎必謂祥為别駕在建安後則徐州清晏何得云于時冦賊充斥祥率勵兵士頻討破之乎求其前後無一符㑹也凡所駁難具列如右盖精五經者討羣儒之别義練三史者徵諸子之異聞加以探賾索隠然後辨其紕繆如向之諸史所載則不然何者其叙事也唯記一途直論一理而矛盾自顯表裏相乖非復牴牾直成狂惑者爾尋兹失所起良由作者情多忽略識惟愚滯或採彼流言不加詮擇或傳諸繆說即從編次用使真偽混淆是非參錯盖語曰君子可欺不可罔至如邪說害正虚詞僨實小人以為信爾君子知其不然語曰信書不如無書盖為此也夫書彼竹帛事非容易凡為國史可不慎諸忤時第十三孝和皇帝時韋武弄權母媪預政士有附麗之者起家而綰朱紫予以無所傅㑹取擯當時為一載不遷中允四㑹天子還京師朝廷願從者衆予求番次在大駕後發日逗留不去守司東都杜門却掃凡經三載或有譖予躬為史臣不書國事而取樂丘園私自著述者由是驛召至京令専執史筆于時小人道長綱紀日壊仕於其間忽忽不樂遂與監修國史蕭至忠等諸官書求退曰僕幼聞詩禮長涉藝文至於史傳之言尤所躭恱尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謩中朝江左王陸干孫紀其暦劉石僭號方䇿委於和張宋齊應録惇史歸於蕭沈亦有汲冢古篆禹穴殘編孟堅所亡葛洪刋其雜記休文所缺荀綽裁其拾遺凡此諸家其流盖廣莫不頤彼泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范曄為書盛言矜其費躰斯又當仁不讓庶㡬前哲者焉然自䇿名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞籍以衆功方云絶筆唯後漢東觀大集羣儒著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子紏之於當代傅范兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿毎欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺況㒒限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者盖由杜彼顔面防諸請謁故也然今舘中作者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絶口而朝野具知筆未栖毫而搢紳咸誦夫孫盛紀實取嫉權門王劭直書見讎貴族人之情也能無畏乎其不可三也古者刋定一史纂成一家躰統各殊指歸咸别夫尚書之教也以䟽通知逺為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而飾主闕斯並曩時得失之例良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隠惡十羊九牧其令難行一國三公適從何在其不可四也切以史置監修雖古無式尋其名號可得而言夫言監者盖總領之義耳如創立紀年則年有斷限草傳叙事則事有豐約或可略而不略或應書而不書此刋削之務也属詞比事勞逸宜均揮銘奮墨勤惰須等某表某篇付之此職某傳某志歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學茍且務相推避坐變炎涼徒延嵗月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議安得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云嵗序已淹何時輟手切以網維不舉而督課徒勤雖威以刺骨之刑勗以懸金之賞終不可得也語曰陳力就列不能者止所以比者布懐知已歴詆羣公屢辭載筆之官願罷記言之職者正為此爾抑又有所未諭聊復一二言之比奉髙命令隷名修史其職非一如張尚書崔岑二吏部鄭太常等既迫以吏道不可拘之史任以僕曹務多閑勒令専知下筆夫以惟寂惟寞乃使記事記言茍如其利則栁常侍劉秘監徐禮部等皆門可張羅府無堆案何事置之度外而使各無羈束乎必謂諸賢載削非其所長以僕鎗鎗鉸鉸故推為首最就如斯理亦有其說何者僕少小從仕早躡通班當皇上初臨萬邦未親庶務而以守兹介直不附奸臣遂使官若土牛棄同芻狗逮鑾輿西幸百寮畢從自惟官曹務簡求以留後居臺常謂朝廷不知國家於我已矣豈謂一旦忽承恩㫖州司臨門使者結轍既而駈駟馬入函關排千門謁天子引賈生於宣室雖歎其才召季布於河東反增其愧明公既位居端揆望重台衡飛沉属其顧盼榮辱由其俛仰曾不上祈宸極申之以寵光僉議縉紳縻我以好爵其相見也直云史筆闕書為日已久石渠掃第思子為勞今之仰追唯此而已抑明公足下獨不聞劉炫蜀王之說乎昔劉炫仕隋為蜀王侍讀尚書牛弘甞問之曰君王遇子其禮如何曰相期髙於周孔見待下於奴僕弘不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期髙於周孔酒食左右皆饜而我餘瀝不霑是見待下於奴僕也僕亦竊不自揆輒敢方於鄙宗何者求史才則千里降追語宦途則十年不進意者得非相期髙於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隠非仕惟以守愚自得寧以充詘攖心但今者黽勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施儻使士有澹雅若嚴君平清亷如段干木與僕易地而處亦將彈鋏告勞積薪為恨況僕未能免俗能不蔕芥於心者乎當今朝號得人國稱多士蓬山之下良直差肩芸閤之中英竒接武僕既功虧刻鵠筆未獲麟徒殫太官之膳虚索長安之米乞已本職還其舊居多謝簡書請避賢路唯明公足下哀而許之至忠得書大慙無以酬答又惜其才不許解史任而宗楚客崔湜鄭愔等皆惡聞其短共讎嫉之俄而蕭宗等相次伏誅然後獲免於難史通第二十卷終, WYG: ''}

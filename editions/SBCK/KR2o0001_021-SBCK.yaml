body:
  text: 刋正史通序昔者孔子嘗曰吾自衛反魯然後樂正雅頌各得其􅀁味斯言也則雅頌在當時見者亦衆矣必俟孔子後正者何也蓋權衡設輕重乃昭尺度懸長短斯别苟非其人道不虚行聖賢者誠萬世之權度哉愚􅃇讀史通見其缺文複意繁詞冗意心頗疑之掩卷而思展卷而玩莫可為懐者矣儼山先生帥蜀之初乃取而正之篇章㫖趣各循其􅁤意怄而文順事核而理瑩自是始爲完書此無他蓋先生以江南鉅儒養之翰苑復三十餘年其學邃故其思精其思精故其見髙如扁鵲視人五臟皆見庖丁遊刃目無全牛故稱量之下銖兩自明分寸不爽固其􅀁哉厥功豈獨倍於作者殆升孔堂以續雅頌遺音矣近世有訂周禮之誤以􅀘冬官之缺􅂉謂事􅀋而功倍未知然否且羣書之誤尚不止此先生將次第正之其嘉惠後學之心益宏且逺矣敬當立雪以俟嘉靖乙未長至日後學李佶謹識

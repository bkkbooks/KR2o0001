front:
  text: 跋史通
  hash: sha256:b46e850d7ca49dce056c21a91829529a56e7f7f90bd813062604426af3d94ee0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_022-1a}
body:
  text: 方洲山人楊名撰儼山先生旣正史通使者来緘以示名且委之為􅀃名敬受而讀之至三四過則見夫井井乎如珠之就繩炳炳乎如鑑之脫垢洋洋乎如韶之叶律而琴之定徽也乃起而歎曰邈哉淵乎先生之用心矣夫尚犮則詩書是資畜德則言行有頼故雖塵籍蠧編小辭淺􅀃罔不有至理存焉者聖賢固弗廢哉况知㡬以良史才三爲史官徘徊司籍之曹􅀊月寖乆其􅀁以沉潜考證之者當不寡薄則其著而爲書固宜兼備諸體網羅百家馳驅列代㡬自成一門户獨惜夫評議狥於意見是非謬於聖􅈒不䏻使人無遺憾焉雖然作室而先式則羣材無淆織錦而預圖諸様庶百卉之不相雜此其道在我而權存乎心爾夫旣曰尚友矣畜德矣則凢詩書言行之云皆足以輔吾志而􅂇吾力罔見有􅂉病吾事者矧曰辨􅀋考故推時核􅀔案迹之實係乎然則先生兹刻雅意其在是也已矣若夫徐宋柳子􅀁稱􅀃者見則有異同言則有得失􅂉未足以語此名且將質之於先生云嘉靖丙申􅀊秋七月朔日䟦
  hash: sha256:eed10589d35580609bf5873f089748be89243818793ab2f7066fbd188c9b05fb

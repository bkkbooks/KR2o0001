front:
  text: 史通卷第十八
  hash: sha256:006184b39b662950eee6a468ccbef607bc4788538fc3c06fbc854a9b9fe87b15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_018-1a}
body:
  text: 外篇雜説下第九二十五條諸史六條夫盛服飾者以珠翠為先工繢事者以丹青為主至若錯綜乖所分布失宜則綵絢雖多巧妙不足者矣觀班氏公孫􅀪傳賛直言漢之得人盛於武宣二代至於平津善惡寂滅無覩持論如是其義靡聞必矜其美辭愛而不棄則宜㣲有改易列於百官公卿表後庶尋文究理頗相附㑹以兹編録不猶愈乎又沈侯謝靈運傳論全説文躰備言音律此正可為翰林之補亡流别之總説耳虞撰文章流别集季充撰翰林論摯如次諸史傳實為乖越陸士衡有云離之則雙羙合之則兩傷信矣哉其有事可書而不書者不應書而書者至如班固敘事㣲小必書至高祖破項垓下斬首八萬曽不渉言李齊扵後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以伐奚於邊疆小冦無不畢紀如司馬消難擁數州之地以叛曽不挂言略大舉小其流非一昔劉勰有云自卿雲已前多役才而不課學向雄已後頗引書以助天然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典麗良由才乏天然故事資虚飾者矣按宋書稱武帝入闗以鎮惡不伐遠方馮異於渭濵遊覧追想太公夫以宋祖無學愚智所委安能援引古事以詶荅羣臣者乎斯不然矣更有甚於此者覩周齊二國俱出隂山必言類互鄉則宇文尤甚漢兒夫以献武普嗣未變胡俗按王邵齊志宇文公呼高祖曰以華夏則知其言不逮於齊遠矣王宋所載其鄙甚多矣周帝仍因之而牛􅀪王邵並掌䇿書其載齊言也則淺俗如彼其載周言也則文雅若此夫如是何哉非兩邦有夷夏之殊由二史有虚實之異故也夫以記宇文之言而動遵經典多依史漢帝曰蕭繹可謂天之周史述太祖論梁元太祖怒曰何為間我骨肉生此貝錦此並六經所廢誰能興之者乎又宇文則為汾州􅂉􅉲之三國志之辭也其餘言皆如此豈是宇文之語之言也又曰榮權吉士也寡人與之言無二此魏長孫儉謂宇文曰王琛眼睛全不轉公曰瞎耶又按裴政大梁太清實録稱元帝使王琛聘相類可謂真宇文之言無愧於實録矣收使癡人來豈得怨我此言與王宗所載此何異荘子述鮒魚之對而辨類蘇張賈生敘鵩鳥之辭而文同屈宋施於寓言則可求諸實録則否矣世稱近史編語之語也謂言語惟周多美辭夫以博採古文而聚成今説是則俗之所傳有鷄九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而其事悉虚無豈可便謂南董之才宜居班馬之職也自梁室云季雕䖝道長已後謂太清平頭上尾尤忌於時對語麗辭盛行於俗始自江外被於洛中而史之載言亦同於此曰文叔得王郎降而隗囂滅安何之元梁典稱議納侯景高祖盜梁主必不捨其諡號呼以姓名此由湏對語世用羊祜之言而孫皓平夫漢晉之君事殊僣在予不及子孫知復何恨夫變我稱予互文成儷故也又姚最梁畧稱高祖曰得旣在我失亦又蕭韶太清記曰云云温子昇永安故事言帝句求諸人語理必不然此由避平頭上尾故也苦之極下傷人理此語皆非簡要而徒積字成朱世隆之攻没建州也怨痛之響上徹天閽酸靡或字湏偶對此之為害其流甚多文並由避聲對之為患也或聲從流假有辨如酈叟吃若周昌子羽修飾而言仲由率爾而對莫不拘以文禁一槩而書必求實録多見其妄矣夫晉宋已前帝王傳授始自錫命終於登極其間牋疏欵曲詔䇿頻煩雖事皆偽迹言並飾譲猶能備其威儀陳其文物俾禮容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荆州假稱德宣之令之建江陵旬日必至以此而言其偽可見業地濶􅁆千餘里德宣皇后下令或書成并部虚云孝靖之勅凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要剪截浮辭者哉但二蕭陳隋諸史通多失此業後稱公王即晉魏及宋自創足驗也禮容不欺揖遜無失自齊梁已降稱王帝位皆􅁆十年間事耳夫功德日盛秩進累遷是則於禮儀何有者哉又按北齊文宣帝将受公及即帝位皆不出旬月之中耳夫以廹促如頓盡則始知無前後節文等差降殺也魏禪宻撰錫遜勸進㫁表文詔入奏請注一時唯王邵所撰齊志獨無是焉夫以累易古人以為辭如彦淵之改魏收也以非易非彌見其失矣而撰隋文史者稱澹大矯收失者何哉且以澹著書方於君懋豈唯其間可容􅁆人而已史臣美澹而譏劭者因其成事呼為史臣隋史每論皆云史臣今故豈所謂通鍳乎語曰蝉翼為重千鈞為輕其斯之謂矣别傳九條劉向列女傳云夏姬再為夫人三為王后夫為夫人則難以驗也為王后則㫁可知矣按其時諸國稱王惟楚而已如巫臣諫荘將納姬氏不言曽入楚宫則其為后當在周室盖周惪雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於吴謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其缺如人之不命雜記曰夫魯昭公也於天子自又以女子一身而作嬪三代求諸人事理必不然尋夫春秋之後國稱王者有七盖由向悮以夏姬之生當夫戰國之世稱三為王后者謂歴嬪七國諸王校以年代殊為􅆾剌至於他篇兹例甚衆故論楚也則昭王與秦穆同時言齊也則晏嬰居宋景之後槐女景公時人列女傳曰齊傷年夫謂宋景為昔即居其後謂晏子曰昔景公時大旱三今粗舉一二其流可知觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鍳者矣及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虚事多搆偽辭非其識不周而才不足盖以世人都可欺故也嗚呼後生可畏何代無人而輙輕忽若斯者哉夫傳聞失真書事失實盖事有不獲巳人所不能免也至於故為異説以惑後來則過之尤甚者矣按蘇秦荅燕易王稱有婦人将殺夫令妾進其藥酒妾佯僵而覆之又甘茂謂蘇氏云貧人女與富人女㑹績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用蘇氏之説為二婦人立傳定其邦國加其姓氏以彼烏有特為指實何其妄哉又有甚於此者至如伯竒化鳥對吉甫以哀鳴宿瘤隱形干齊王而作后此則不附於物理者矣復有懷嬴失節目為貞女劉安覆族定以登仙立言如是豈顧丘明之有傳孟堅之有史哉楊雄法言好論司馬遷而不及左丘明常稱左氏傳惟有品藻二言而已是其鍳物有􅀁不明者也且雄哂子長愛竒多雜又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦則云鞭宓妃云云劉勰文心已議之矣然則文章小道無足致嗤觀其蜀主本紀稱杜魄化而為䳌荆屍變而為鱉其言如是何其鄙哉所謂非言之難而行之難也夫十室之邑必有忠信欲求不朽􅀪之在人何者交阯遠居南裔越裳之俗也燉煌僻處西域昆戎之鄉也求諸人物自古闕載盖由地居下國路絶上京史官注記所不能及也既而士燮著録劉炳裁書則磊落英才粲然盈瞩者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知著述之功其力大矣豈與夫詩賦小技校其優劣者哉自戰國已下詞人屬文皆偽立客主假相詶荅至於屈原離騷辭稱遇漢父於江渚宋玉高唐賦云夢神女於陽臺夫言並文章句結音韻以兹敘事足驗憑虚而司馬遷習鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚邪必如是則馬卿遊梁枚乘讃其顔色曹植至洛宓妃覩於岩畔撰魏史者亦宜編為實録矣嵇康撰高士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假説而定為實録斯以謬矣況此二漁父者較年則前後别時論地則南北殊壤而輙併之為一豈非惑哉茍如是則蘇代所言雙禽蚌鷸此亦漁父之一事何不同書於傳乎必惟取褕裌緇帷之林濯纓滄浪之水彌見其未學也胥所遇渡水蘆中斯並蘇代所言雙禽鷸􅑕伍濯纓滄浪之水若斯而已也漁父善事亦可同歸二録何止䄖裌緇帷之林莊周著書以寓言為主嵇康述高士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相憐鷽鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記並可引為真事矣夫識理如此何為而薄周孔哉杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也李陵集有與蘇武書詞彩壮麗音句流靡觀其文體不類西漢人殆後來所為假稱陵作也遷史缺而不載良有以焉雜説十條夫自古之學者談稱多矣精於公羊者尤憎左氏習於太史者則偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣觀世之學者或躭翫一經或專精一史談春秋者則不知宗周既殞而人有六雄論史漢者則不悮劉氏云亡而地分三國亦猶武陵隱士遁迹桃源當此晉年猶謂􅁀秦之地也假有學窮千載書總五車見良直而不覺其善逢牴牾而不知其失葛洪所謂藏書之箱篋五經之主人而夫子有云雖多亦安用為其斯之謂也夫鄒好長纓齊珍紫服斯皆一時所尚非百王不易之道也至如漢代公羊擅名三傳晉年荘子高視六經今並圭壁不行綴緝無紀豈與夫春秋左氏古文尚書雖暫廢於一朝終獨高於千載校其優劣可同年而語哉夫書名竹帛物情所競維聖人無私而君子亦黨盖易之作也本非記事之流而孔子繋詞輙盛述顔子稱其殆庻雖言則無媿事非虚美亦由視予猶父門人日親故非所要言而曲垂編録者矣既而揚雄寂寞師心典誥至於童烏稚子蜀漢諸賢司馬之徒謂嚴李栁太􅀇法言恣加褒賞雖内舉不避而情有所偏者焉夫以宣尼睿哲子雲叅聖在於著述不能忘私則自中庸已降抑可知矣如謝承漢書偏黨吴越魏收代史盛誇胡塞復焉足恠哉子曰汝為君子儒無為小人儒儒誠有之史亦宜然盖左丘明司馬遷君子之史也吴均魏收小人之史也其薰蕕不類何相去之遠哉禮云禮云玉帛云乎哉史云史云文飾云乎哉何則史者固當以好善為主嫉惡為次若司馬遷班叔皮史之好善者也晉董狐齊南史史之嫉惡者也必兼此二者而重之以文飾其唯左丘明乎自兹已降吾未之見也夫所謂直筆者不掩惡不虚美書之有益於褒貶不書無損於勸誡但舉其宏綱存其大體而已非謂絲毫必録􅃈細無遺者也如宋孝王王劭之徒其所記也喜論人帷薄不修言貌鄙事訐以為直吾無取焉夫故立異端喜造竒説漢有劉向􅀳有葛洪近者沈約又其甚也後來君子幸為詳焉昔魏史稱朱異有口才摯虞有筆才故知喉舌翰墨其辭本異而近世作者撰彼口語同諸筆文斯皆以元瑜孔璋之才而處丘明子長之任文之與史何相亂之甚乎夫載筆立言名流今古如馬遷史記能成一家揚雄太􅀇可傳千載此則其事尤大記之於傳可也至於近代則不然其有雕䖝末技短才小説或為集不過數卷集五卷其類是也如陳書隂鏗傳云有或著書纔至二篇名人録一卷其類是也如梁書孝元紀云撰同姓莫不一一列名編諸傳末同姓名人録陳書姚察傳云如梁書孝元紀云撰搜神記禮記音齊書祖鴻勲傳云撰晉詞記凡此書或撰西征記辨記後魏書劉芳傳云撰周官音卷或五卷者不可勝記故不具列之一卷兩卷而已自餘人有文集或四事同七畧巨細必書斯亦煩之甚者子曰齊景公有馬千駟死之日人無徳而稱焉伯夷叔齊餓於首陽之下民到于今稱之若漢代青翟劉舎位登丞相而班史無録姜詩趙壹身止計吏而謝書有傳即其例也今之修史者則不然其有才德闕如而位官通顯史臣載筆必為立傳其記也止具其生前厯官殁後贈諡若斯而已矣雖其間伸以状跡粗陳一二么麽常事曽何足觀始自伯起魏書迄乎皇家五史通多此體流蕩忘歸史漢之風忽焉不嗣者矣史通卷第十八

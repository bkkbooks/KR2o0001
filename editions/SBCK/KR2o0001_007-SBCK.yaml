front:
  text: 史通卷之七
  hash: sha256:5ae0f07aa67202ab90eb2610530816262bac335f7804d8eeceb903ef10d10f04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_007-1a}
body:
  text: 内篇品藻直言曲筆鍳識探頥品藻第二十三蓋聞方以類聚物以群分薰蕕不同器梟鸞不比翼若乃商臣冐頓南蠻北狄萬里之殊也伊尹霍光殷年漢日千載之隔也而世之稱悖逆則云商冐論忠順則曰伊霍者何哉盖厥跡相符則雖隔越為偶奚必差肩步武方稱連類者乎史氏自遷固作傳始以品彚相從然其中或以年世迫促􅂉以人物寡鮮求其具體必同不可多得是以韓非老子共在一篇董卓袁紹無聞二録豈非韓老俱稱述者書有子名袁董並曰英雄生當漢末用此為斷粗得其倫亦有厥類衆夥宜為流别而不能定其同科申其異品用使蘭艾相雜朱紫不分是誰之過歟盖史官之責也按班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列奚不類於其叙哉若孔門達者顔稱殆庶至於他子難為等差今乃先伯牛而後曾參進仲弓而退冉有等曾參冉有並在第伯牛仲弓並在第二也三等求諸折中厥理無聞又楚王過鄧三甥騅甥聃甥甥養欲殺之鄧侯不許卒亡鄧國今定鄧侯入下愚之上七等即第夫寧人負我為善獲戾持此致尤將何勸善如謂小不忍亂大謀失於用權故加其罪是則三甥見㡬而作決在未萌自當髙立標格寘諸雲漢何得止與鄧侯鄰伍列在中庸下流第六等三甥皆在而已哉又其叙晉文之臣佐也舟之僑為上陽處父次之士㑹為下苐三等陽舟之僑在㑹在弟五等處父在四等士其述燕之賔客也髙漸離居首荆軻亞之秦武陽居末在第六等秦武陽在第髙漸離在第五等荆軻等六斯並是非瞀亂善惡紛拏或珍瓴甋而賤璠璵或䇿駑駘而捨騏􅂹以兹為監􅁒誰欺乎又江充息夫躬讒謟惑上使禍延儲后毒及忠良論其奸凶過於石顯逺矣而固叙之不列佞幸揚王孫裸葬悖禮狂狷之徒考其一生更無他事而與朱雲同列冠之傳首不其穢歟若乃旁求别録側窺雜傳諸如此繆其累實多按劉向列女傳載魯之秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同於古冶殉節異於曹娥此乃凶險之頑人强梁之悍婦輙與眞烈為伍有乖其實者焉又嵇康髙士傳其􅀁載者廣矣而顔回􅕋瑗獨不見書蓋以二子雖樂道遺榮安貧守志而拘忌名教未免流俗也正如董仲舒楊子雲亦鑽仰四科驅馳六籍漸孔門之教義服魯國之儒風與此何殊而並可甄録夫回瑗是棄而楊董獲升可謂識二五而不知十百也爰及近代史臣所書求其乖失亦往往而有借如陽瓚効節邊城捐軀􅂮敵當有宋之代抑劉卜之徒歟卜謂天與劉謂劉康祖而沈氏竟不别加標牓唯寄編於索虜篇内紀僧珎砥節礪行終始無瑕而蕭氏乃與羣小混書都以恩幸為目王頗文章不足武藝居多躳詣戚藩首階逆亂撰隋史者如不能與梟感並列世隋感為梟感皆謂楊􅀇即宜附出楊諒傳中輙與詞人共編在文苑傳也隋書列王頗吉士為伍凡斯纂録豈其類乎子曰以貌取人失之子羽以言取人失之宰我光武則受誤於龎萌曹公則見欺於徐邈列在方書惟善與惡昭然可見不假許郭之深鑒裴王之妙􅊫而作者存諸簡牘不能使善惡區分故曰誰之過歟史官之責也夫能申藻鏡區别流品使小人君子臭味得朋上智中庸等差有叙則懲惡勸善永肅將來激濁揚清鬱為不朽者矣直言第二十四夫人禀五常士兼百行邪正有别曲直不同若邪曲者人之所賤而小人之道也正直者人之所貴而君子之徳也然世多趍邪而棄正不踐君子之跡而行由小人者何哉語曰直如􅁌􅂮道邊曲如鈎反封侯故寧順從以保吉不違忤以受害也況史之為務申以勸誡樹之風聲其有賊臣逆子滛君亂主茍直書其事不掩其瑕則穢跡彰於一朝惡名被於千古言之若是吁可畏乎夫為於可為之時則從為於不可為之時則㐫如董狐之書法不隠趙盾之為法受屈彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弑馬遷之述漢非韋昭仗正於吳朝崔浩犯諱於魏國或身膏斧鉞取笑於當時或書填坑窖無聞於後代夫世事如此而責史臣不能申其强項之風勵其匪躬之節蓋亦難矣是以張儼發憤私存嘿記之文孫盛不平竊撰遼東之本以兹避禍幸獲而全是以驗世途之多隘知實録之難遇耳然則歴考前史徵諸直詞雖古人糟粕真偽相亂而披沙揀金有時獲寳按金行在暦史氏尤多當宣景開基之始曹馬搆紛之際或列營渭曲見屈武侯或發仗雲臺取傷成濟陳夀王隠咸杜口而無言于寳虞預各栖毫而靡述至習鑿齒乃申以死葛走生達之說抽戈犯蹕之言歴代厚誣一朝始雪考斯人之書事盖近古之遺直歟次有宋孝王風俗傳王邵齊志其叙述當時亦務在審實按于時河朔王公箕裘未隕鄴城將相薪搆仍存而二子書其所諱曾無憚色剛亦不吐其斯人歟盖烈士殉名壯夫重氣寧為蘭摧玉折不為瓦礫長存若南董之仗氣直書不避强禦韋崔之肆情􅁬筆無所阿容雖周身之防有所不足而遺芳餘烈人到于今稱之與夫王沉魏書假回邪以竊位蕭統燕史持諂媚以偷榮貫三光而洞九泉曾未足喻其髙下也曲筆第二十五肇有人倫是稱家國父父子子君君臣臣親踈既辯等差有别蓋子為父隠直在其中論語之順也畧外别内掩惡揚善春秋之義也自兹已降率由舊章史氏有事涉君親必言多隠諱雖直道不足而名教存焉其有舞詞弄札飾非文過若王隠虞預毁辱相凌子野休文釋紛相謝用捨由乎臆說威福行於筆端斯乃作者之醜行人倫所同疾也亦有事每憑虚詞多烏有或假人之美籍為私惠或誣人之惡持報已讐若王沉魏録濫述貶甄之詔陸機晉史虚張拒葛之鋒班固受金而始書陳夀借米而方傳此又記言之奸賊載筆之凶人雖肆諸市朝投畀豺虎可也然則史之不直代有其書茍其事以彰則今無所取其有往賢之所未察來者之所不知今畧廣異聞用標先覺按後漢書更始傳稱其懦弱也其初即位南靣立朝羣臣羞愧流汗刮席不敢視夫以聖公身在微賤已能結客報讎避難綠林名為豪傑安有貴為人主而反至於斯者乎將作者曲筆阿時獨成光武之美䛕言媚主用雪伯升之怨也且中興之史出於東觀或明帝所定或馬后攸刋而炎祚靈長簡書莫改遂使他姓追撰空傳偽録者矣陳氏國志劉後主傳云蜀無史職故災祥靡聞按黄氣見於秭歸羣鳥墮於江水成都言有景星出益州言無宰相氣若史官不置此事何從而書之盖由父辱受髠故加兹謗議者也古者諸侯並争勝負無恒而他善必稱已惡不諱逮乎近世無聞至公國自謂為我長家相謂為彼短而魏收以元氏出於邊裔見侮諸華遂髙自標舉比桑乾於􅁎漢之國曲加排抑同建業於蠻貊之邦夫以敵國相讎交兵結怨載諸移檄用可致誣列諸緗素難為妄說茍未達此義安可言於史邪盖霜雪交下始見貞松之操國家喪亂方騐忠臣之節若漢末之董承耿紀晉初之諸葛母丘齊興而有劉康袁粲周滅而有王謙尉逈斯皆破家殉國視死猶生而􅍓代諸史皆書之曰逆將何以激揚名教以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董有靈必切齒於九泉之下矣自梁陳已降隋周而往者史皆貞觀年中羣公所撰近古易悉情偽可求至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實昔秦人不死驗符生之厚誣蜀老猶存知葛亮之多枉斯則自古所歎豈獨於今哉盖史之為用也記功司過彰善癉惡得失一朝榮辱千載茍違斯法豈曰能官但古來唯聞以直筆見誅不聞以曲詞獲罪是以隠侯宋書多妄蕭武知而勿尤伯起魏史不平齊宣覽而無譴故令史臣得愛憎由已髙下在心進不憚於公憲退無媿於私室欲求實録不亦難乎嗚呼此亦有國家者所宜懲革也鑒識第二十六夫人識有通塞神有晦明毁譽以之不同愛憎由其各異盖三王之受謗也值魯連而獲申五覇之擅名也逢孔宣而見詆斯則物有恒准而鑒無定識欲求銓覈得中其惟千載一遇乎況史傳為文淵源廣博學者茍不能探􅄨索隠致逺鈎深焉足以辯其利害明其善惡觀左氏之書為傳之最而時經漢魏竟不列於學官儒者皆折此一家而盛推二傳夫以丘明躬為魯史受經仲尼語世則並生論才則同體彼二家者師孔氏之弟子預達者之門人才識永殊年代又隔安得持彼傳說比兹親受者乎加以二傳理有乖僻言多鄙野方諸左氏不可同年故知膏肓墨守乃腐儒之志述賣餅太官誠智士之明鑒也逮史漢繼作踵武相承王􅂶著書既甲班而乙馬張輔持論又劣固而優遷文義浹備王克謂彪士優劣論曰士人評馬遷班固之才優劣多以紀事詳悉觀者以為甲於太史公也張輔名固二百年事八十萬言煩省不敵固之不如遷固為勝余以為史遷叙三千年事五十萬言班矣必然此二書雖互有脩短逓聞得失而大抵同風可為連類張晏云遷殁後亡龜䇿日者傳褚先生補其缺言詞鄙陋非遷本意按遷所撰五帝本紀七十列傳稱虞舜見阨遂匿空而出宣尼既殂門人推奉有若其言為鄙又甚於兹安得獨罪􅀘生而全宗馬氏也劉􅁤思啇㩁漢史雅重班才惟譏其本紀不列少帝而輙編髙后按弘非劉氏而竊養漢宮時天下無君呂宗稱制故借其嵗月寄以編年而野鷄行事自具外戚譬夫成爲孺子史刋攝正之年厲亡流􅮿暦紀共和之日而周邵二公各世家有傳班氏式遵曩例殊合事宜豈謂雖濬發於巧心反受嗤於拙目也劉祥撰宋書序録􅍓說諸家晉史其畧云法盛中興荒拙少氣王隠徐廣淪溺罕華夫史之敘事也當辯而不華質而不俚其文直其事核若斯而已可矣必令同文舉之含異等公幹之有逸如子雲之含章類長卿之飛藻此乃綺揚繡合雕章縟彩欲稱實録其可得乎以此詆訶知其妄施彈射矣夫史之曲筆誣書不過一二語其負罪為失已多而魏收雜以寓言殆將過半固以蒼頡已降罕見其流而李氏齊書稱為實録者何也盖以重規亡考未逹伯起以公輔相加字出大若事同元歎既無徳不報故以虚美相酧然必謂昭公知禮吾不信也語曰明其為賊敵乃可服如王邵之抗詞不撓可以方駕古人而魏收持論激揚稱其有慚正直夫不彰其罪而輕肆其誅此所謂兵起無名難為制勝者尋此論之作盖由君懋書法不隠取名當時或有假手史臣以復私門之耻不然何惡直醜正盜憎主人之甚乎夫以廢興時也窮達命也而書之為用亦復如是盖尚書古文六經之冠冕也春秋左氏三傳之雄覇也而自秦至晉年踰五百其書隠没不行於世既而梅氏寫獻杜侯訓釋然後見重一時擅名千古老經撰於周日莊子成於楚年遭文景而始傳值􅄞阮而方貴若斯流者可勝紀哉故曰廢興時也窮達命也適使時無識寳世缺知音若論衡之未遇伯喈太玄之不逢平子逝將煙盡火滅泥沉雨絶安有殁而不朽揚名於後世者乎按曲筆篇流汗刮席下便寫至如朝廷止言多爽實凡三十七字盖史之為用也上絶不屬鑒識篇不可同年下云故知割席不敢視云云割席疑承刮席為文逮漢史繼作上亦不屬其後文多雜亂難為章句始知其爲錯簡因加訂正如此此書外篇别有􅀧煩云回易數字加足片言分布得所彌􅒌無闕寔公言也故敢如例云爾是嵗嘉靖乙未秋七月既望雲間陸􅀷謹識探頥第二十七古之述者豈徒然哉或以取捨難明或以是非相亂由是書編典誥宣父辨其流詩列風雅卜啇通其義夫前哲所作後來是觀茍失其指歸則難以傳授而􅂉有妄生穿鑿輕究本源是乖作者之深㫖誤生人之後學其為繆也不亦甚乎昔夫子之作魯史學者以為感麟而作按子思有云吾祖厄於陳蔡夫以彼聿脩傳諸貽厥欲求實録難為爽誤事則義包微婉因攫苺而剙詞時逢西狩乃泣麟而絶筆儒者徒知其一而未知其二以為自反袂拭面稱吾道窮然後追論五始定名三叛此豈非獨學無友孤陋寡聞之所致邪孫盛稱左氏春秋書吳楚則略荀恱漢紀述匈奴則簡盖所以賤夷狄而貴諸夏也按春秋之時諸國錯峙關梁不通史官所書罕能周悉異乎炎漢之世四海一家馬遷垂傳以來自古遺文而州郡上計皆先集太史若斯之備也況彼吳楚者僻居南裔地隔江山去彼魯邦尤為迂闊丘明所録安能備諸且必以蠻夷而固略也若駒支預於􅀳㑹長狄埋於魯門葛盧之辨牛鳴郯子之知鳥職斯皆邊隅小國人品最微猶復收其瑣事見於方冊安有主盟上國勢迫宗周爭長諸華威陵强晉而可遺之者哉又荀氏著書抄撮班史其取事也中外一槩夷夏皆均非是獨略胡郷而徧詳漢室盛既疑丘明之擯吳楚遂誣仲豫之抑匈奴可謂强奏庸音特為足曲者也盖明月之珠不能無瑕夜光之璧不能無纇故作者著書或有病累而後生不能詆訶其過又更文飾其非遂推而廣之强為其說者蓋亦多矣如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非關有徳也按史之於書也有其事則記無其事則闕馬遷之馳騖今古上下數千載春秋已往得其遺事者盖惟首陽山二子而已然適使夷齊生於秦氏􅂮於漢日而乃升諸傳首庸謂有情今者考其先後隨而編次斯則理之常也烏可恠乎必謂子長以善而無報推為傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒􅂉行仁而不遇或盡忠而受戮何不求其品􅁼簡在一科而乃異其篇目各分為卷又遷之紕繆其流甚多夫陳勝之為世家既云無據項羽之稱本紀何必有慿必謂遭彼腐刑怨刺孝武故書為凢例志存激切若先黄老而後六經進奸雄而退處士此之乖刺復何為乎隋内史李徳林著論稱陳夀蜀人其撰國志黨蜀而抑魏刋之國史以為格言按曹公之創王業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良踈忌骨肉而夀評皆依違其事無所措言劉主地居漢宗仗順而􅁸夷險不撓終始無瑕方諸帝王可比少康光武譬以侯伯冝輩秦繆楚莊而夀評抑其所長攻其所短是則以魏為正朔之國典午攸承蜀乃僣偽之君中朝所嫉故典稱曹美而虚說劉非安有背曹而向劉踈魏而親蜀也云陛下邁蹤古聖蕩陳夀上書諸葛亮集咸肆其辭而無所革也然無忌故雖誹謗之言夫無其文而有其說不亦憑虚亡是者邪習鑿齒之撰漢􅀳春秋以劉爲偽國者此蓋定邪正之途明逆順之理尔而擅道鸞稱其當桓氏執政故撰此書􅁒以絶彼瞻烏防兹逐鹿歴觀古之學士爲文以諷其上者多矣若齊倫失徳豪士於焉作賦賈后無道女史由之獻箴斯皆短什小篇可俯而就也安有變三國之體統改五行之正朔勒成一史傳諸千載而藉其權以濟物取誡當時豈非勞而無功愽而非要與夫班彪王命一何異乎求之人情理不當耳自二京板蕩五胡稱制崔鴻鳩諸偽史聚成春秋其􅀁列者十有六家而已魏收云鴻世仕江左故不録司馬劉蕭之書又恐識者尤之未敢出行於外按于時中原乏主海内横流逖彼東南更為正朔適使素王再出南史重生終不能别有異同忤非其議安得以魏書無録而猶罪歸彦鸞者乎且必以崔氏祖宦吳朝故情私南國必如是則其先徙居廣閩委質慕容何得書彼南燕而與羣胡並列愛憎之道豈若是􅁘且觀鴻書之紀綱皆以􅀳為主亦猶班書之載吳項必繫漢年陳志之述孫劉皆宗魏世何止獨遺其事不取其書而已哉但伯起躬為魏史傳列島夷不欲使中國著書推崇江表所以輒假言崔志用紓魏羞且東􅀳之史考其所載㡬三百篇而偽邦墳籍僅盈百卷若使收矯鴻之失南北混書斯則四分有三事歸江外非惟肥瘠非類衆寡不均兼以東南國史皆湏紀傳區别兹又體綂不純難為編次者矣收之矯妄其可盡言乎於是考衆家之異說參作者之本意或出自􅅐懐枉申探􅄨或妄加同異輒有異同而流俗腐儒後來末學習其狂狷成其詿誤自謂見所未見聞所未聞銘諸舌端以為口實惟智者不惑無所疑焉史通卷第七

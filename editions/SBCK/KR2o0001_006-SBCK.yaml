  text: 史通卷第六
  hash: sha256:cba1b561f9f48e642de7af4fdc535506eed17f452a0c2407f6421eccebc0f707
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_006-1a}
body:
  text: 内篇言語浮辭敘事言語篇二十蓋樞機之發榮辱之主言之不文行之不逺則知飾詞専對古之所重也夫上古之世人惟朴畧言語難曉訓釋方通是以尋理則事簡而意深考文則詞難而義釋若尚書載伊尹立訓臯陶之謨洛誥康誥牧誓泰誓是也周監於二代郁郁乎文大夫行人尤重詞命語微婉而多切言流靡而不淫若春秋載呂相絶秦子産献捷臧孫諫君納􅂦魏絳對戮揚干是也戰國虎爭馳說雲湧人持弄瓦之辯家挾飛鉗之術劇談者以譎誑爲宗利口者以寓言爲主若史記載蘇秦合從張儀連衡范雎反間以相秦魯連解紛而全趙是也逮漢魏已降周隋而徃世皆尚文時無専對運籌畫䇿自具於章表献可替否總歸於筆札宰我子貢之道不行蘇秦張儀之業遂廢矣假有忠言切諫答戯解嘲其可稱者若朱雲折檻以抗憤張綱埋輪而獻直秦宓之酬吳客王融之答虜使比之小辯曾何足云是以歴選載言而布諸方冊自漢已下無足觀焉尋夫戰國已前其言皆可諷詠非但筆削所致良用體質素美何以覈諸至如鶉賁鸜鵒童竪之謡也山木轉車時俗之諺也皤腹棄甲城者之謳也原田是謀輿人之誦也斯皆芻詞鄙句猶能温潤若此況乎束帶立朝之士加以多聞博古之說者哉則知時人出言史官入記雖有討論潤色終不失梗槩者也夫三傳之說既不習於尚書兩漢之詞又多違於戰䇿足以驗甿俗之逓改知歳時之不同而後來作者通無逺識記其當世口語罕能從實而書方復追效昔人示其稽古是以好丘明者則偏模左傳愛子長者則全學史公用使周秦言辭見於魏晉之代楚漢應對行乎宋齊之日而爲脩混沌失彼天然今古以之不純真僞由其相亂故裴少期譏孫盛録曹公平素之語而全作夫差亡滅之詞雖言以春秋而事殊乖越者矣然自晉咸洛不守龜鼎南遷江左爲禮樂之鄉金陵實圖書之府故其俗猶能語存䂓檢言喜風流顛沛造次不忘經籍謂之曰啜其泣矣何嗟及矣湘東若梁史載高祖在圍中見蕭正徳而曰不有其廢君何以興皆其類王聞世子方等見殺謂其次子諸而史臣脩飾無所費功其於中國則不然何者于斯時也先王桑梓剪爲蠻貊被髮左袵充牣神州其中辯若駒支學如郯子有時而遇不可多得而彦鸞修僞國諸史收􅀪􅁧魏周書弘爲牛弘收爲魏收必謂彼夷音變成華語等楊由之聽雀如介葛之聞牛斯亦可矣而於其間則有妄益文彩虛加風物援引詩書憲章史漢遂使且渠乞伏儒雅比於元封拓跋宇文徳音同於正始華而失實過莫大焉唯王宋著書敘元髙時也謂宋孝王也邵王謂王邵也宋􅀜東風俗傳也􅁧齊志孝王􅁧抗詞正筆務存直道方言世語由此畢彰而今之學者皆尤二子以言多滓穢語傷淺俗夫本質如此而推過史臣猶鑑者見嫫姆多媸而歸罪於明鏡也又世之議者咸以北朝衆作周史爲工盖賞其記言之體多同於古故也夫以枉飾虚言都損實事便號以良直師其模楷時有童謡曰狐非狐貉非貉燋犁狗至如周太祖實名􅆩魏本索頭故當又西帝下詔罵齊神武數其罪甘諸如此事難可子嚙斷索又曰獾獾頭圑栾河中狗子破介范編錄故得􅁠聞扵後其事不傳扵北齊因而埋弃遺而周史以爲其事非雅略而不載頼君懋亦多矣没者盖是以董狐南史齊目可求班固華嶠比肩皆是者矣近有燉煌張太素中山郎餘令並稱述者自負史才郎著孝傳張著隋後略凢􅀁撰人語皆依倣舊辭若選言可以効古而書雜類者則忽而不取料其􅀁棄可勝紀哉盖江芊罵商臣曰呼役夫宜君王廢汝而立職漢王怒酈生曰竪儒㡬敗乃公事單固謂稽康曰老奴汝死自其分樂廣歎衛玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之說必播以唇吻傳諸諷誦而世人皆以爲上之二言不失清雅而下之兩句殊爲魯朴者何哉盖楚漢世隔事已成古魏晉年近言猶類今已古者即謂其文猶今者乃驚其質夫天地乆長風俗無恒後之視今亦猶今之視昔而作者皆怯書今語勇効昔言不其惑乎茍紀事則約附五經載語則依憑二史是春秋之俗戰國之風亘兩儀而並存經千載而如一奚以今來古徃質文之屢變者哉盖善爲政者不擇人而理故俗無精麄咸被其化工爲史者不選事而書故言無羙惡盡傳于後若事皆不謬言必近真庶㡬可與古人同居何止得其糟粕而已浮詞第二十一夫人樞機之發亹亹不窮必有餘音足句爲其始末是以伊惟夫盖發語之端也焉哉矣兮斷句之助也去之則言語不足加之則章句獲全而史之敘事亦有時類此故將述晉靈公厚斂彫牆則且以不君爲稱欲云司馬安四至九卿而先以巧宦摽目􅀁謂說事之端也又書重耳伐原示信而續以一戰而覇文之教也載匈奴為偶人象郅都令馳射莫能中則云其見憚如此􅀁謂論事之助也昔尼父裁經義在褒貶明如日月特用不刋而史傳􅀁書貴乎􅀓録而已至於本事之外時寄抑揚此乃得失稟於片言是非由於一句談何容易可不慎歟但近代作者溺於煩富則有發言失中加字不愼遂令後之覽者難以取信盖史記世家有云趙鞅諸子無恤最賢夫賢者當以仁恕為先禮讓居本至如僞㑹隣國進計行伐俾同氣女兄摩笄引决此則詐而安忍貪而無親鯨鯢是儔犬豕不若焉得謂之賢哉又漢書云蕭何知韓信賢按賢者處世夷險若一不隕穫於貧賤不充詘於富貴又傳曰知進退存亡者其唯聖人乎如淮陰初在仄微墮業無行後居榮貴滿盈速禍躳爲逆臣名􅀠惡徒周身之防靡聞知足之情安在美其善將呼爲才畧則可矣必以賢爲目不其謬乎又云嚴延年精悍敏捷雖子貢冉有通於政事不能絶也夫以編名酷吏列號屠伯而輙比孔門達者豈其倫哉且以春秋至漢多歴年􅀁必言貌取人耳目不接又焉知其才術相類錙銖無爽而云不能絶乎盖古之記事也􅂉先經張本􅂉後傳終言分布雖踈錯綜逾密今之記事也則不然􅂉隔卷異篇遽相矛盾􅂉連行接句頓成乖角是以齊史之論魏收良直邪曲三說各異有産竊恐未挹髙論又云足以入相李伯藥齊書序論魏收云若使子孫云收受暢財賄今故為榮傳多其惡是謂三說各異如之室游尼父之門志存實録抵訐私於爾朱暢傳又周書之評太祖寛仁好殺二理不同周書傳稱令狐徳棻徳棻周書傳稱文如歸命盡種誅夷雖出權道文帝不害諸元則云太祖天縱寛仁世故令狐是謂二理不同而用乖於徳教非惟言無準的固亦事成首鼠者矣夫人有一而史辭再三良以好發蕪音不求讜理而言之反覆觀者惑焉亦有開國承家美惡昭露皎如星漢非磨涅􅀁移而輕事塵㸃曲加粉飾求諸近史此􅀋尤多如魏書稱登國以鳥名官則云好尚淳朴逺師少皥述道武結婚蕃落則曰招携荒服追慕漢髙自餘􅀁說多類於此按魏氏始興邊朔少識典墳作儷蠻夷抑惟秦晉而鳥官創置豈關郯子之言髦頭而偶奚假奉春之䇿奢言無限何甚厚顔又周史稱元行恭因齊滅得回􅁃信贈其詩曰虢亡垂棘滅齊平寳鼎歸陳周􅀪正來聘在舘贈韋敻詩曰徳星猶未動直車詎肯來其爲信􅀪正􅀁重如此夫文以害意自古而然擬非其倫由來尚矣必以􅁃周􅀁作皆爲實録則其􅀁褒貶非止一人咸宜取其指歸何止採其四句而已若乃題目不定首尾相違則伯藥令徳棻是也史齊史令狐徳棻所撰也魏收李伯藥􅀁撰周心挾愛憎詞多出没則魏收牛􅀪是也行恭等此本牛􅀪􅀁撰也魏史魏收􅀁撰周史載元斯皆鑒裁非逺智識不周而輕弄筆端肆情髙下故彌縫雖洽而厥跡更彰取惑無知見嗤有識夫詞寡者出一言而已周才蕪者須數句而方浹按左傳稱絳父論甲子隠言於趙孟班書述楚老哭龔生莫識其名氏茍舉斯一事則觸類可知至嵇康皇甫謐撰髙士記名爲二叟立傳仝採左班之録而其傳論云二叟隠徳容身不求名利避逺亂害安於賤役夫探揣古意而廣足子音反愈新言此猶子建之詠三良延年之歌秋婦至於臨宂淚下閨中長歎雖語多本傳而事無異說盖鳬脛雖短續之則悲史文雖約增之返累加減前哲豈容易哉昔夫子斷唐虞已下迄於周剪截浮詞撮其機要故帝王之道坦然明白嗟乎自去聖日逺史籍逾多得失是非孰能刋定假有才堪釐革而以人廢言此繞朝所謂勿謂秦無人吾謀適不用者也叙事第二十二并序條簡要隱晦妄飾揔三夫史之稱美者以敘事爲先至若書功過記善惡文而不麗質而非野使人味其滋㫖懐其徳音三復忘疲百遍無斁自非作者曰聖其孰能與於此乎昔聖人之述作也上自堯典下終獲麟是為屬詞比事之言䟽通知逺之㫖子夏曰書之論事也昭昭然若日月之代明楊雄有云說事者莫辨於書說理者莫辯乎春秋然則意復深奥誥訓成義微顯闡幽婉而成章雖殊途異轍亦各有美焉諒以師範億載䂓模萬古為述者之冠冕實後來之龜鑑既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史故經史之目於此分焉甞試言之曰經猶日也史猶星也夫杲日流景則列星􅃦耀桑榆既夕而辰象粲然故史記之文當乎尚書春秋之世也則其言淺俗涉乎委巷垂趐不舉懘籥無聞逮於戰國已降去聖彌逺然後能露其鋒頴倜儻不羈故知人才有殊相去若是校其優劣詎可同年自漢已降㡬􅀅千載作者相繼非復一家求其善者盖亦無㡬矣夫班馬執簡既五經之罪人而晉宋殺青又三史之不若譬夫王覇有别粹駁相懸才難不其甚乎然則人之著述雖同出一手其間則有善惡不均精粗非類若史記蘇張蔡澤等傳是其美者至於三王本紀日者大倉公龜筴傳故無所取焉又漢書之帝紀陳項諸篇是其㝡也至於淮南王司馬相如東方􅃋傳又安足道哉豈繪事以丹素成妍帝京以山水為助故言􅎀者其史亦拙事美者其書亦工必時乏異聞世無竒事英雄不作賢雋不生區區碌碌抑惟恒理而責史臣顯其良直之體申其微婉之才盖亦難矣故楊子有云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀丘明之記事也當桓文作覇晉楚更盟則能飾彼詞句成其文雅及王室大壊事益縱横則春秋美詞㡬乎翳矣觀子長之敘事也自周已往言所不該其文闊畧無復體統自秦漢已下條貫有倫則煥炳可觀有足稱者至若荀恱漢紀其才盡於十帝陳夀魏書其美窮於三祖觸類而長他皆若斯夫識寳者稀知音盖寡近有裴子野宋略王邵齊志此二家者並長於敘事無愧古人而世人議者皆雷同譽裴而共詆王氏夫江左事雅裴筆所以専工中原跡穢王文由其屢鄙且㡬原務餙虚詞君懋志存實録此美惡所以為異也設使丘明重出子長再生記言扵賀六渾之朝書事扵士尼之代將恐輟毫栖牘無􅀁施其徳音而作者安可以今方古一概而論得失夫敘事之體其流甚多非復片言􅀁能覼縷今輙區分類聚定為三篇列之于下篇序右敘事夫國史之美者以敘事為工而敘事之工者以簡為主簡之時義大矣㢤歴觀自古作者權輿尚書發蹤􅀁載務於寡事春秋變體其言貴扵省文斯盖澆淳殊致前後異跡然則文約而事豐此述作之尤美者也始自兩漢迄乎三國國史之文日傷煩富逮晉已降流宕逾逺尋其冗句摘其煩詞一行之間必謬增數字尺紙之内恒虚費數行夫聚蚊成雷群輕折軸況於章句不節言詞莫限載之兼兩曷足道哉盖敘事之體其别有四有直紀其才行者有唯書其事跡者有因言語而可知者有假讚論而自見者至於古文尚書稱帝堯之徳標以允恭克讓春秋左傳言子太叔之狀目以美秀而文所稱如此更無他說所謂直紀其才行者又如左氏載申生為驪姬所譛自縊而亡班史稱紀信為項籍所圍代君而死此則不言其節操而忠孝自彰所謂唯書其事跡者又如尚書稱武王之罪紂也其誓曰焚炙忠良刳剔孕婦左傳記隨㑹之論楚也其詞曰蓽簵藍縷以啓山林此則才行事跡莫不闕如而言有關涉事便顯露所謂因言語而可知者又如史記衛青傳後太史公曰蘇建甞責大將軍不薦賢待士漢書孝文紀末其讃曰吳王詐病不朝賜以几杖此則記之與傳並所不書而史臣發言别出其事所謂假讚論而自見者然則才行事跡言語讚論凡此四者皆不相湏若兼而畢書則其費尤廣人居哀毁損則近史紀傳欲言好學􅁒言赴敵不顧則先云武藝絶倫言人下先云至性純孝􅁒言人晝夜觀書則先云篤志事迹也如穀梁傳云驪姬以酖為酒藥脯以毒筆成篇則先云文章敏速此則既述才行又彰食之驪姬跪曰食自外來者不可不試也覆酒獻公曰奚來驪姬曰世子以祠故致福於君將天乎天乎吾君之國子之國也子何遟乎為於地而地墳以脯與犬犬斃驪姬下堂而啼曰死子罕哭之甚哀曰宋不可伐也此則既載事君又禮記云晉將伐宋使覘之見陽門之介夫已具其紀傳中續以賛論重述前事此則近有跡又載言語也又近諸史人有行事美惡者皆梁傳新序說苑戰國䇿楚漢春秋史記迄于皇事跡紀書賛論又載但自古經史通多此􅁼公史皆有之家所撰五代能獲免者盖十無一二裴子野王唯左丘明此也邵無又敘事之省其流有二焉一曰省句二曰省字左傳宋華耦來盟稱其先人得罪於宋魯人以為敏夫以鈍者稱敏記中已有註解魯人為鈍人也禮則明賢達所􅅓此為省句也春秋經曰隕石於宋五夫聞之隕視之石數之五加以一字太詳減其一字太略求諸折中簡要合理此為省字也其反於是者若公羊稱郄克􅆌季孫行父秃孫良夫跛齊使跛者逆跛者秃者逆秃者􅆌者逆􅆌者盖宜除跛者已下字但云各以其類逆者必事皆再述則於文殊費此為煩句也漢書張倉傳云年老口中無齒盖於此一句之内去年及口中可矣夫此六文成句而三字妄加此爲煩字也然則省句為易省字為難洞識此心始可言史矣若句盡餘賸字皆重複史之煩蕪職由於此盖餌巨魚者垂其千釣而得之在於一筌捕髙鳥者張其萬􅆯而獲之由於一目夫敘事者􅂉虚益散誶廣加閑說必其所要不過一言一句耳茍能同夫獵者漁者既執而􅆯釣必收所留者唯一筌一目而已則庶㡬胼胝盡去而塵垢都捐華逝而實存滓去而瀋在矣嗟乎能損之又損而􅀇之又􅀇輪扁所不能語斤伊摯所不能言鼎也右簡要夫飾言者為文編文者為句句積而章立章積而篇目成篇目既分而一家之言備矣古者行人出境以詞令為宗大夫應對以言文為主況乎列以章句刋之竹帛安可不勵精雕飾傳諸諷誦者哉自聖賢述作是曰經典句皆韶夏言盡琳琅秩秩徳音洋洋盈耳譬夫㳺滄海者徒驚其浩曠登太山者但嗟其峻極必擿以尤㝡不知何者為先然章句之言有顯有晦顯也者繁詞縟說理盡於篇中晦也者省字約文事溢於句外然則晦之將顯優劣不同較可知矣夫能略小存大舉重明輕一言而巨細咸該三語而洪纎靡漏此皆用晦之道也昔古文義務却浮詞虞書云帝乃殂落百姓如喪考妣夏書云啓呱呱而泣予不子周書稱前徒倒戈血流漂杵虞書云四罪而天下咸服此皆文如闊畧而語實周贍故覧之者初疑其易而為之方覺其難固非雕䖝小技所能斥非其說也既而丘明授經師範尼父夫經以數字包義而傳以一句成言雖繁約有殊而隠晦無異故其綱紀而言邦俗也則有士㑹為政晉國之盜奔秦邢遷如歸衛國忘亡其欵曲而言人事也則有使婦人飲之酒以犀革褁之比及宋手足皆見宋人􅊽之蕭潰師人多寒王撫而勉之三軍之士皆如挾纊斯皆言近而㫖逺辭淺而義深雖􅀤語已殫而含意未盡使夫讀者望表而知裏捫毛而辯骨覩一事於句中反三隅於字外晦之時義不亦大哉洎班馬二史雖多謝五經必求其所長亦時值斯語至若髙祖亡蕭何如失左右手漢兵敗績睢水為之不流董生乗馬三年不知牝牡翟公之門可張雀羅則其例也自兹已降史道陵夷作者蕪音累句雲蒸泉湧其為文也大抵編字不隻捶句皆雙脩短取均竒偶相配故應以一言蔽者輒足為二言應以三句成文者必分為四句彌漫重沓不知􅀁裁是以承祚受責扵少期之注云容貌之言而分巳為三亦魏志鄧哀王􅀓曰容貌姿美裴松一病也敘事属子昇取譏於君懋刑子才不得掌興魏王邵齊志曰時議恨而撰永安記率是六言之書悵怏温子昇亦若此非不幸也盖作者言雖簡略理皆要害故能踈而不遺儉而無闕譬如用竒兵者持一當百能全克敵之功也若才乏雋穎思多昏滯費詞既甚敘事纔周亦猶售鐵錢者以兩當一方成貿遷之價也然則史漢已前省要如彼國晉已降國志也國謂三煩碎如此必定其妍􅎀甄其善惡夫讀古史者閲其章句皆可詠歌觀近史者得其緒言直求事意而已是則一貴一賤不言可知無假搉􅀭而其理自見矣右􅀮晦昔文章既作比興由生鳥獸以嫓賢愚草木以方男女詩人騷客言之備矣洎乎中代其體稍殊􅂉擬人必以其倫􅂉述事多比於古當漢氏之臨天下也君實稱帝理異殷周子乃封王名非魯衛而作者猶謂帝家為王室公輔為王臣磐石加建侯之言帶河申俾侯之稱而史臣撰録亦同彼文章假託古詞翻易今語潤色之濫萌於此矣降及近古彌見其甚至如諸子短書雜家小說論逆臣則呼爲問􅂦稱巨冦則目以長鯨􅀖國初基皆云草昧帝王世跡必號龍飛斯並理兼諷諭言非指斥異乎㳺夏措詞南董顯書之義也如魏收代史吳均齊録􅂉牢籠一世􅂉包舉一家自可申不刋之格言􅀪至公之正說而收稱劉氏納貢則曰來獻百琛均敘元日臨軒必云朝㑹萬國夫以吳徵魯賦禹計塗山持彼往事用爲今說置於文章則可施於簡册則否矣亦有方以類聚譬諸昔人如王隠稱諸葛亮挑戰真獲曹咎之利崔鴻稱慕容沖見幸爲有龍陽之姿其事相符言之讜矣而虞思道稱邢邵喪子不慟自東門吳已來未之有也李百藥稱王琳雅得人心雖李將軍恂恂善誘無以加也斯則虚引古事妄足庸音茍矜其學必辯而非當者矣昔禮記檀弓工言物始夫自我作故首剏新儀前史􅀁刋後來取證是以漢初立䡺子長􅀁書魯始為髽丘明是記河橋可作元凱取驗於毛詩男子有笄伯支逺徵於内則即其事也按裴景仁秦記稱符堅方食撫盤而詬王邵齊志述父紇洛干感恩脫㡌而謝及彦鑾撰以新史重規删其舊録乃易撫盤以推案變脫㡌爲免冠夫近世通無案食胡俗不施冠冕直以事不類古改從雅言欲學者何以考時俗之不同察古今之有異又自雜種稱制充牣神州事異諸華言多醜俗至如翼犍魏道武所諱黑􅆩周文本名而伯起草以他語徳棻闕而不載盖龎降蒯瞶字之􅎀也重耳黑臀名之鄙也舊事列以二史傳諸五經未聞後進談講别加刋定況愁山定犢彰於載䜟䜟云牛首入杜臺卿齊載上齊丘也西谷逆犢河邊之狗著於謡詠貛貛頭團圓河王邵齊志載謡爾苑也中狗子破明如日月難為盖藏此而不書何以示後亦有氏姓本複减省從單或去萬而留千􅂉存扶而除厚求諸自古罕聞兹例昔夫子有云文勝質則史故知史之爲務必藉於文自五經已降三史而往以文敘事可得言焉而今之所作者有異於是其立言也􅂉虚加練飾輕事彫彩或體兼賦頌詞類俳優文非文史非史譬夫烏孫造室雜以漢儀而刻鵠不成反類於鶩者也右妄飾史通卷之六終

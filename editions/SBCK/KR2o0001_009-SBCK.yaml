front:
  text: 史通卷第九
  hash: sha256:219dbd1b4e80caf8445f9c0c9bf38ba3b543447af8aed0c93c5e96c8cfa9e071
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_009-1a}
body:
  text: 内篇覈才序傳煩省覈才第三十一夫史才之難其難甚矣晉令云國史之任委之著作每著作郎初至必撰名目傳一人斯蓋察其所由茍非其才則不可叨居史任歴觀古之作者若蔡邕劉孝標徐陵劉炫之徒各自謂長於著書達於史體然侏儒一節而他事可知按伯喈於方朔上書謂宜廣班氏天文志夫天文之於漢史實附贅之尤甚者也必欲申以掎摭但當鋤而去之安可仍其過失而益其蕪累亦奚異觀河傾之患而不過以隄防方欲䟽而導之用速懐襄之害述史如此将非練達者歟孝標持論柝理誠為絶倫而自叙一篇過為煩碎山西一志直論文章諒難以偶跡遷固比肩陳范者也孝穆在齊有志於梁史及還江左而書竟不成嗟乎以徐公文體而施諸史傳亦猶㶚上兒戲異乎真将軍幸而量力不為可謂自卜者審矣光伯以洪儒碩學而迍邅不遇其鋭情自叙欲以垂示将來而言皆淺俗理無要害豈所謂誦詩三百雖多亦奚以為者乎昔尼父有言文勝質則史蓋史者當時之文也然朴散淳銷時移世異文之與史較然異轍故以張衡之文而不閑於史以陳壽之史而不習於文其有賦述兩都詩裁八詠而能編次漢冊勒成宋典若斯人者其流幾何是以略觀近代有齒跡文章而兼修史傳其為式也羅含謝客宛為謌頌之文蕭繹江淹直成銘賛之序温子昇尤喜複語盧思道雅好麗詞江總猖獗以沉迷􅁃信輕薄而流宕此其大較也然向之數子所撰者蓋不過偏記雜說小卷短書而已猶且乖濫踏駮一至於斯而況責之以刋勒一家彌綸一代使其始末圓備表裏無咎蓋亦難矣但自世重文藻詞宗麗􅁋於是沮誦失路靈均當軸每西省虚職東觀佇才凢所拜授必推文士遂使握管懐鈆多無銓綜之職連章累牘罕逢㣲婉之言而舉俗共為能事當時莫之敢侮假令間有術同彪嶠才若班荀懐獨見之明負不刋之業而皆取窘於流俗見嗤於朋黨遂乃哺糟歠醨俯同妄作被褐懐玉無由自陳此管仲所謂用君子而以小人參之害覇之道者昔傳􅀇有觀孟堅漢書實命代竒作及與陳宗尹敏杜撫馬嚴􅁧中興紀傳其文曾不足觀豈拘於時乎不然何不類之甚者也是後劉珍朱穆盧植楊彪之徒又繼而成之豈亦各拘於時而不得自盡乎何其益陋也嗟乎拘時之患其來尚矣斯則自古之􅀁歎豈獨當今者㢤序傳第三十二蓋作者自叙其流出於中古按屈原離騷經其首章上陳氏族下列祖考先述厥生次顯名字自叙發跡實基於此降及司馬相如始以自敘為傳然其所叙者但記自少及長立身行事而已逮於祖先所出則蔑尔無聞至馬遷又徵三閭之故事倣文園之近作模楷二家勒成一卷於是揚雄遵其舊轍班固酌其餘波自叙之篇實煩於代雖屬辭有異而兹體無易尋馬遷史記上自軒轅下窮漢武彊宇修闊道路綿長故其自敘始於氏出重黎終於身為太史雖上下馳騁終不越史記之年班固漢書止叙西京二百年事耳其自叙也則逺徵令尹􅁸楚文王之世近錄賔戯當漢明帝之朝苞括所聞踰於本書逺矣而後來叙傳非止一家競學孟堅從風而靡施於家譜猶或可通列於國史每見其失者矣然自叙之為義也茍能隠已之短稱其所長斯言不謬即為實錄而相如自序反記其客逰臨卭竊妻卓氏以春秋所諱持為美談雖事或非虚而理無可取載之於傳不其愧乎又王充論衡之自紀也述其父祖不肖為州閭所鄙而已荅以瞽頑舜神鯀惡禹聖夫自叙而言家世固當以揚名顯親為主茍無其人闕之可也至若盛矜於已而厚辱其先此何異證父攘羊學子名母必責以名敎實三千之罪人也夫自媒自衒士女之醜行然則人莫我知君子所耻按孔氏論語有云十室之邑必有忠信不如丘之好學也又曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎又曰文王既沒文不在兹乎又曰昔者吾友嘗從事於斯矣則聖達立言也時亦揚露巳才或託諷以見其情􅂉巽辭以顯其跡終不旴衡自伐攘袂公言且命諸門人各見尔志由也不讓見嗤無禮歴觀揚雄已降其自叙也始以誇尚為宗至魏文帝􅀓􅀇陶梅葛洪之徒則又踰於此者矣何則身兼片善行有㣲能皆剖析具言一二必載豈所謂憲章前聖謙以自牧者歟又近古人倫喜稱閥閱其蓽門寒族百代無聞而騂角挺生一朝暴貴無不追述本系妄承先哲至若儀父振鐸並為曹氏之初淳維李陵俱称拓㧞之始河南馬祖遷彪之說不同吳興沈約先後之序有異斯皆不因真律無假寧楹直據經史自成矛盾則知楊姓之寓西蜀班門之雄朔野或胄纂伯僑或家傳熊繹恐自我作古失之彌逺者矣蓋諂祭非鬼神所不歆致敬他親人斯悖徳凢為叙傳宜詳此理不知則闕亦何傷乎煩省第三十二昔荀卿有云錄遠略近則知史之詳略不均其為患者乆矣及于令昇昇晉人寳字令史議歴詆諸家而獨歸美左傳云丘明能以三十卷之約括囊二百四十年之事靡有孑遺斯蓋立言之髙標著作之良模也又張世偉世偉輔字著班馬優劣論云遷叙三千年事五十萬言固叙一百四十年事八十萬言是班不如馬也然則自古論史之煩省者咸以左氏為得史公為次孟堅為非自魏晉已還年祚轉促而為其國史亦不減班書此則後來逾煩其失彌甚者矣余以為近史蕪累誠則有諸亦猶古今不同勢使之然也輙求其本意略而論之何者當春秋之時諸矦力爭各閉境相拒關梁不通其有吉凶大事見知於他國者或因假道而方聞或以通盟而始赴茍異於是則無得稱魯史所書實用此道至如秦燕之據有西北楚越之大啓東南地僻遠於諸戎人罕通於上國故載其行事多有闕如且其書自宣成已前三紀而成一卷至昭襄已下數年各占一篇是知國阻隔者記事不詳年淺近者􅁧錄多備者二百四十九宣公已下亦六公杜預釋例云文公已上六公書國此逺遺落不與近同也是則儒者注書已見之書國者四百三十二計年數畧同而國數加倍矣左丘明隨聞見而成傳何有故為簡約者哉及漢時之有天下也普天率土無思不服會計之吏嵗奏於朝廷輶軒之使日馳於郡國作者俱於京兆府徵事於四方用使夷夏必聞逺近無隔故漢氏之史所以倍増於春秋也降及東京作者彌衆至如名邦大都地富才良髙門甲族世多髦俊邑老鄉賢競為别錄家譜宗譜各成私傳於是筆削所採聞見益多此中興之史所以又廣於前漢也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以謝承周悉江左京洛事缺於三吳陳壽偏委蜀中巴梁語詳於一國如宋齊受命梁陳握紀或地比禹貢一州或年方秦氏二世夫地之褊小年之窘迫適使作者採訪易洽巨細無遺耆舊可詢隠諱咸露此小國之史所以不減於大邦也夫論史之煩省但當要其事有妄載苦於榛蕪言有闕書傷於簡畧斯則可矣必量世事之厚薄限篇第以多少理則不然且必謂丘明為省也若介葛辨犧於牛鳴叔孫志梦於天壓楚人敎晉以㧞斾城者謳華以棄甲此而畢書豈得謂之省邪且必謂漢書為煩也若武帝乞􅄴於栢父陳平獻計於天山長沙戲舞以請地楊㒒怙寵而移􅀜此而不錄豈得謂之煩邪由斯而言則史之煩省不中從可知矣又古今有殊澆淳不等帝堯則天稱大書惟一篇周武觀兵孟津言成三誓伏犧止畫八卦文王加以繫辭俱為大聖行事若一其豐儉不類懸隔如斯必以古方今持彼喻此如􅃖尤黄帝交戰阪泉施於春秋則城濮鄢陵之事也有窮簒夏少康中興施於兩漢則王莾光武之事也夫差既滅勾踐覇世施於東晉則桓􅀇宋祖之事也張儀馬錯為秦開蜀施於三國則鄧艾鍾會之事也而往之所載其簡如彼今之所書其審如此若使後來同於往世限一槩以成書將恐學者必詬其踈遺尤其率畧者矣而議者茍􅅓沈約人著宋休文梁書蕭衍所記事倍於孫字子顯著齊書蕭孫盛也著晉書字安國晉人習鑿齒著晉書字彦威亦之所編語煩於班馬不亦繆乎故曰論史之煩省者但當求其事有妄載言有闕書斯可則矣必量世事之厚薄限篇第以多少理則不然其斯之謂也史通卷第九

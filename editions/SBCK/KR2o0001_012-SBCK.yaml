  text: 史通卷第十二
  hash: sha256:2554db3ce282c21ad1da8fac600b529b196842a6a201e6f19565232cd2733ec9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_012-1a}
body:
  text: 外篇古今正史第二緫十八條易曰上古結繩以理後世聖人易之以書契儒者云伏犧氏始畫八卦造書契以代結繩之政由是文籍生焉又曰伏犧神農黃帝之書謂之三墳言大道也少昊顓頊髙􅉝唐虞之書謂之五典言常道也春秋傳載楚左史能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五典䇿至扵春秋之時猶大行扵世爰及後世其書不傳惟唐虞已降可得言者然自堯而徃聖賢猶述求其一二髣髴存焉而後来諸子廣造竒􅀃其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典􅀁記無得而稱者焉右􅀃三墳五典堯舜相承己見墳典周監二代各有書籍至孔子討論其議刪為尚書始自唐堯下終秦繆其言百篇而各為之序屬秦為不道坑儒禁學孔子之末孫曰孔惠壁藏其書漢室龍興旁求儒雅聞故秦愽士伏勝能傳其業詔太常使掌故晁錯受焉時伏生年且百嵗言不可曉口授其書纔二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河内女子得㤗誓一篇獻之與伏生􅀁誦合三十篇行之扵世其篇􅀁載年月不與序相符㑹又與左傳􅀦語孟子所引㤗誓不同故漢魏諸儒玄王肅也謂馬融鄭咸疑其繆古文尚書者即孔惠之􅀁藏科斗之文字也魯恭王壞孔子舊宅始得之扵壁中博士孔安􅀦以校伏生􅀁誦增多二十五篇更以古文字寫之編為四十六卷司馬屢採其事故遷多有古􅀃安􅀦又受詔為之訓傳値武帝末巫蠱事起經籍道息不獲奏上藏諸􅀻家劉向取校歐陽大小夏侯三家經文脫誤甚衆至扵後漢孔氏之本遂絶其有見扵經典者諸儒皆謂之逸書玄杜預馬融鄭也王肅亦注今文尚書而大與古文孔傳相類􅂉肅􅀻見其本而獨秘之乎晉元帝時豫章王内史梅頥始以孔傳奏上而缺舜典一篇乃取肅之堯典從愼徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭玄王肅諸注廢而古文孔傳獨行列扵學官永為世範齊建武中吳興人姚方興采馬王之義以造孔傳舜典云扵大航購得詣闕以獻舉朝集議咸以為非蓋文句相連􅀁以或合舜典必有曰若稽古伏梁武帝時為􅀶士議曰孔叙穪伏生誤合五篇由是遂不見用也生雖云昏耄何容及江陵板蕩其文入北中原學者得而異之隋學士劉炫遂取此一篇列諸本第故今人􅀁習尚書舜典元出扵姚氏者焉右􅀃尚書當周室㣲弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左丘明觀書扵太史氏因魯史記而作春秋上遵周公遺制下明將来之法自􅀮及哀十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言􅀃經也春秋􅀁貶當世君臣其事實皆形扵傳故􅀮其書而不宣􅀁以免時難也及末世口􅀃流形故有公羊穀梁鄒夾之傳鄒氏无師夾氏有録無書故不顯扵世漢興董仲舒公孫弘並治公羊其傳習者有嚴頴二家之學宣帝即位聞衛太子􅀻好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮扵後漢儒者數廷毁之㑹博士李封卒遂不復用逮和帝元興十一年鄭興父子奏請重立扵學官至魏晉其書漸行而二傳亦廢今􅀁用左氏本即杜預􅀁注者右􅀃春秋又當春秋之世諸侯􅀦自有史故孔子求衆家史記而得百二十􅀦書如楚之書鄭之志魯之春秋魏之紀年此其可得言者左丘明旣配經立傳又撰諸異同􅃅曰外傳􅀦語二十一篇斯蓋採書志等文非唯魯之史記而已楚漢之際有好事者録自古帝王公侯卿大夫之世終乎秦襄􅃅曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰􅀦䇿三十三篇漢興太中大夫陸賈紀録時政作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳􅀦語刪世本戰􅀦䇿據楚漢列時事上自黃帝下訖麟趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記恊厥六經異傳整齊百家雜語藏諸名山副在京師以俟後聖君子至宣帝時遷外孫楊惲祖述其書遂宣布焉而十篇未成有録而已殁後亡失此􅀃非也張晏漢書注云十篇元成之間㑹稽禇先生更􅀘其缺作武帝紀三王世家􅀛䇿日者辭多鄙陋非遷本意也晉散􅀐常侍巴西譙周以遷書周秦已上􅂉采家人諸子不專據正經扵是作古史考二十五篇皆慿舊典以糺其繆今則與史記並行扵代焉右􅀃史記史記􅀁書年止漢武太初已後闕而不録其後劉向向子歆及諸好事者若馮商衛衡楊雄史岑梁審肆仁晉馮叚肅金丹馮衍􅅊融蕭奮劉恂等相次撰續迄于哀平間猶名史記至建武中司徒􅁺班彪以為其言鄙俗不足以踵前史又雄歆褒美偽薪誤後惑衆不當垂之後代者也扵是採其舊事旁觀異聞作後傳六十五篇其子固以父􅀁撰未盡一家乃􅁸元髙皇終乎王莽十有二世二百三十年綜其行事上下通洽為漢書紀表志傳百篇其事未畢㑹有上書云固私改作史記者有詔京兆收繫悉録家書封上固弟超詣闕自陳明帝引見言固續父􅀁作不敢改易舊書帝意乃解即出固徵詣校書受詔卒業經二十餘載至章帝建初中乃成固後坐竇氏事卒於洛陽獄書頗散亂莫能綜理其妹曹大家愽學能屬文奉詔校敘又選髙才郎馬融等十人從大家授讀其八表及天文志等猶未克成多是待詔東觀馬續所作而古今人表不􅁼本書始自漢末迄乎陳世為其注解者凡二十五家至扵專門受業與五經相亞初漢獻帝以固書文煩難省乃詔侍中荀恱依左氏傳刪為漢紀三十篇命秘書給紙筆經五年乃就其言簡要亦與本傳並行右􅀃漢書在漢中興明帝始詔班固與睢陽令陳宗長陵令尹敏司􅀠從事􅺖冀作世祖本紀幷撰功臣及新市平林公孫述事作列傳載記二十八篇自是以来春秋世亦以煥炳而忠臣義士莫之撰勒扵是又詔史官謁者僕射劉珍及諌議大夫李􅂶雜作紀表名臣節士儒林外戚諸傳起自建武訖乎永初事業垂竟而珍等繼卒復命侍中伏無忌與諌議大夫黃景作諸王王子功臣恩澤侯表南單于西羗傳地里志至元年復令大中大夫邉韶大軍營司馬崔寔議郎朱穆曹壽雜作孝穆崇二皇及順烈皇后傳又増外戚傳入安思等后儒林傳入崔􅂐諸人寔壽又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢記嘉平中光禄大夫馬日磾議郎蔡邕楊彪盧植著作東觀接續紀傳之可成者而邕别作朝㑹車服二志後坐事徙朔方上書求還續成十志㑹董卓作亂西遷史臣廢弃舊文散逸在許都楊彪頗存注記至於名賢君子自本初已下闕續魏黃初中唯著先賢表故記殘缺至晉無成大始中秘書丞司馬彪始討論衆作綴其􅀁聞起于光武終于孝獻録世十二編年二百通綜上下旁引庻事為紀志傳凡一十三篇號曰續漢書又散􅀐常侍華嶠刪定東觀記為漢後書帝紀十二皇后紀七十三譜十典列傳七十總九十二篇其十典竟不成而卒自斯已後作者相􅁇為編年者四族創紀傳者五家推其所長華氏居㝡而遭􅀳室東徙三惟一存至宋宣城太守范曄乃廣集學徒窮覧舊籍刪煩補略作後漢書凡十紀十志八十列傳合為百篇㑹曄以罪被收其十志亦未成而死先是􅀳東陽太守袁宏抄撮漢氏後書依荀恱體著後漢紀十三篇世言漢中興史者唯范􅀽二家而已右􅀃後漢書魏史黃初太和中始命尚書衞紀繆襲草創紀傳累載不成又命侍中􅅊誕應璩秘書王沉大將軍從事中郎阮籍司徒右長史孫該司􅀠校尉傅玄等復共撰定其後王沉獨就其業勒成魏書四十四卷其書多為時諱殊非實録呉大帝之季年始命太史令可孚郎中項峻撰呉書峻孚俱非史才其文不足紀録至少帝時更勑􅅊曜周昭薛營梁廣華覈訪求徃事相與記述並作之中曜營為首當歸命矦時廣昭先亡曜營徙黜史官乆闕書遂無聞覈表請曜營續成前史其後曜獨終其書定為五十五卷至􅀳受命海内大同著作陳夀乃集三􅀦史撰為􅀦志凡六十五篇夏侯湛時亦著魏書見夀所作便壞己草而罷及夀卒梁州大中正范頵表言􅀦志明乎得失辭多勸誡有益風化願多採録扵是詔下河南尹就家寫其書先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰呉録異聞錯出其流㝡多宋文帝以􅀦志載紀傷扵簡略乃命中書郎裴松之兼採衆書補注其闕由是世言三國之志者以裴注為本焉右􅀃三國志􅀳史洛京時著作郎陸機始撰三祖紀佐著作郎束晢又撰十志㑹中朝䘮亂其書不存先是歷陽令陳留王鈐有著述才每􅀻録晉書及功臣行狀未就而卒子隱愽學多聞受父遺業西都事跡多所詳䆒過江為著作郎受詔撰􅀳史為其同僚虞預􅀁斥坐事免官家貧無資書未遂就乃依征西將軍􅁃亮扵武昌鎮亮給其紙墨由是􅀗成凡為􅀳書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆鈐􅀁修章句混漫者必隱所作時尚書郎領國史于寶亦撰晉紀自宣訖愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱晉江左史自鄧粲孫盛王韶之檀道鸞已下相次􅁇作逺則編記兩帝近則唯敘六朝至宋湘東太守何法盛始撰晉中興書勒成一家首尾該備齊􅀮士東莞臧榮緒又集東西二史合成一書皇家貞觀中有詔以前後史十有八家制作雖多未能盡善乃勅史官更加纂録採正典與􅃇􅀃數十餘部兼引偽史十六􅀦書為記十志二十列傳七十載記三十并序例目録合為百三十二卷自是言晉史者皆棄其舊本競從新撰者焉右􅀃晉書宋史元嘉中著作郎何承天草創紀傳自此以外悉委奉朝請山謙之補承天殘缺後又命裴松之續成􅀦史松之尋卒史佐孫冲之表求别自創立為一家之言孝建初又勅南臺侍御史蘇寳山續造諸傳元嘉名臣皆其􅀁撰寳山被誅大明六年又命著作郎徐爰踵成前作爰因何孫山蘇􅀁述勒為一書其臧質魯爽王僧達諸傳又皆孝武自造而序事多虛難以取信自永光已後至禪譲十餘年中闕而不載至齊著作郎沈約更補綴􅀁遺製成雜史自義熈肇􅃅終乎昇明三年為紀十志三十列傳六十合百卷名曰宋書永明末其書旣行河東裴子野更刪為宋略二十卷沈約見而歎曰吾􅀁不逮也由是世之言宋史者以裴略為上沈書次之右􅀃宋書齊史江淹始受詔著述以史之􅀁難無出扵志故先著十志以見其才沈約復著齊紀二十篇紀八志十一列傳四十合成五十九篇時奉朝請吳均亦表請撰齊史乞給起居注并羣臣行狀有詔齊氏故事布在流俗聞見旣多可自搜訪也均遂撰齊春秋三十篇其書稱梁帝為齊明佐命帝惡其實詔燔之然其􅀻本竟能與蕭氏􅀁撰並傳扵後右􅀃齊書梁史武帝時沈約與給事中周興嗣歩兵校尉鮑行卿秘書監謝旻相承撰錄已有百篇值承聖淪沒並從焚蕩盧江何之元沛國劉璠以所聞見究其始末合撰梁典三十篇而紀傳之書未有其作陳祠部郎中姚察有志撰勒施功未周但既當朝務兼修國史至於陳亡其書不就右說梁書陳史初有呉郡顧野王北地傅繹各為撰史學士其武文二帝紀即顧傅所修太建初中書郎陸瓊續撰諸篇事傷煩雜姚察就加刪改粗有條貫及江東不守持以入關隋文帝常索梁陳事跡察具以所成每篇續奏而依違荏苒竟未絶筆皇家貞觀初其子思㢘為著作郎奏詔撰成二史於是憑其舊藁加以新錄彌厯九載方始畢功述為梁書五十六卷陳書三十六卷今並行世焉右􅀃陳書十六國史前趙劉聰時領左􅀦史公師或撰髙祖本紀及功臣傳二十人甚得良史之體淩修譛其訕謗先帝聰怒而誅之劉曜時平輿子和苞譔趙記十篇事止當年不終曜㓕後趙石勒命其臣徐光宗􅍓傅暢郭愔等撰上黨國記起居注趙書其後又令王蘭陳宴程隂徐機等相次撰述至石虎並令刋削使勒功業不傳其後燕太傅長史田融宋尚書庫部郎郭仲産北中郎叅軍王度追撰石事集鄴都記趙記等書前燕有起居注杜輔全錄以為燕紀後建興元年董統受詔草創後書著本紀并佐命功臣王公列傳合三十卷慕容垂稱其敘事富贍足成一家之言但褒述過美有慙董史之直其後申秀范享各取前後二燕合成一史南燕有趙郡王景暉嘗事德超撰二主起居注超亡仕於馮氏官至中書令仍撰南燕錄六卷蜀初號曰成後改稱漢李􅀔散􅀐常侍常璩撰漢書十卷後入􅀳秘閣改為蜀書璩又撰華陽國志具記李氏興滅前凉張駿十五年命其西曹邉瀏集内外事以付秀才索綏作涼國春秋五十卷又張仲華護軍叅軍劉慶在東菀專修國史二十餘年著涼記十二卷建康太守索暉從事中郎劉昞又各著涼書前秦史官初有趙淵車敬梁熈韋譚相繼著述符堅嘗取而觀之見苟太后幸李威事怒而焚㓕其本後著作郎董誼追録舊語十不一存及宋武帝入關曾訪秦􅀦事又命梁州刺史吉翰問諸􅄷池並無􅀁獲先是秦秘書郎趙整叅撰􅀦史值秦㓕􅀮扵南洛山著書不輟有馮翊車歩助其經費整卒翰乃啓頻纂成其書以元嘉九年起至二十八年方罷定為三卷而年月失次首尾不倫河東裴景仁又正其訛僻刪為秦記十一篇後秦扶風馬僧䖍河東衛隆景並著秦史及姚氏之㓕殘缺者多泓從弟和都仕魏為左氏尚書又追撰秦紀十卷夏天水趙思羣北地張淵扵真興承光世並受命著其國書及綂萬之亡多見焚燒西涼與西秦北燕其史􅂉當代􅀁書或他􅀖􅀁録段􅀛龍記呂氏宗欽記秃髮氏韓顯宗記呂馮氏唯此三者可知自餘不詳推作魏世黃門侍郎崔鴻乃考覈衆家辨其同異除煩補闕錯綜綱紀易其􅀦書曰録正紀曰傳都謂之十六􅀦春秋鴻始以景明之初求諸􅀦逸史逮至始元年鳩集稽備而已猶闕蜀事不果成書推求十有五年始扵江東購獲乃增其篇目勒為十卷鴻殁後永安中其子繕寫奏上請藏諸秘閣由是偽史宣布大行扵時右􅀃十六􅀦春秋元魏史道武時始令鄧淵著􅀦記為十卷而條例未成暨乎元明廢而不述神嘉二年又詔集諸文士崔浩浩弟覧髙閣鄧頴晁維范亨黃輔等撰􅀦書為十卷又特命浩總監史任務從實録復以中書郎髙􅁢散􅀐侍郎張偉並參著作續成前史書叙述􅀦事無􅀮惡而刋石寫之以示行路浩坐此夷三族同作死者百二十八人自是遂廢史官至文成帝和平元年始復其職而已高􅁢典著作修􅀦記􅁢年已九十手目俱衰時有校書郎中劉模長於緝綴乃令執筆而口占授之如是者五六􅀊􅀁成篇卷模有力焉初􅀦記自鄧崔以下皆相承作編年體至孝文大和十一年詔秘書丞李彪著作郎崔光始分為紀傳異科宣武時命邢巒追撰孝文起居注旣而崔光遵業補續下訖孝明之世温子昇復修孝武紀濟隂王暉業撰辨宗室録魏史官􅀻􅀁撰盡扵斯矣齊天寳二年勅秘書監魏收愽採舊聞勒成一史又令刁柔辛元植方延祐睦仲讓裴昻之髙孝幹等助其編次收􅀁取史官懼相凌忽故刁辛諸子並乏史才唯以髣髴學流憑附得進扵是大徵百家譜狀斟酌以成魏書上自道武下終孝靖紀傳與志凡百三十卷收謟齊氏扵魏室多不平旣黨北朝又厚誣江左性憎勝己喜念舊惡甲門盛德與之有怨者莫不被以醜言没其善事遷怒􅀁至毁及髙曾書成始奏詔收扵尚書省與諸家論討前後列訴者百有餘人時尚書令楊遵彦一代貴臣勢傾朝野收撰其家傳甚羙是以深被黨援諸訟史者皆獲重罰或斃扵獄中群怨謗聲不息孝昭世勑收更加研審然後宣布扵外書成嘗訪諸群臣猶云不實又令治改其所變易甚多由是世薄其書號為􅁾史至隋開皇勑著作郎魏淡與顔之推辛德源更撰魏書矯正收失淡以西魏為真東魏為偽故文恭列紀孝靖稱傳合紀傳論例總九十二篇煬帝以澹書猶未能善又勑左僕射楊素别撰學士潘徽褚亮歐陽詢等佐之㑹素薨而止今世稱魏史者猶以收本為主焉右􅀃後魏書髙齊史天統初太常少卿祖孝徵述獻武起居名曰黃初傳天録時中書侍郎陸元規常從文宣征討著皇帝實録惟記行師不載它事自武平後史官楊休之杜臺卿祖崇儒崔子彂等相􅁇注記逮扵齊滅隋秘書監王劭内令史李德林並少仕鄴中多識故事王乃憑述起居注廣以所聞造編年書號曰齊志十有六卷三十卷志序云唯十六卷焉今世間傳者李在齊預修􅀦史創紀傳書二十七卷至開皇初奉詔續撰増多齊史三十八篇已上送官藏之秘府皇家貞觀初勑其子中書􅃕人百藥仍其舊録雜採它書演為五十卷今之言齊史者唯王李二家云右􅀃北齊書宇文周史大統有秘書丞柳虬兼領著作直辭正色事有可稱至隋開皇中秘書監牛弘追撰周紀十有八篇略敘紀綱仍皆抵忤皇家貞觀初􅃙秘書丞令狐德棻秘書郎岺文本共加修緝定為周書五十卷右􅀃後周書隋史當開皇仁夀時王邵為書十八卷以􅁼相從定其篇目至扵編年紀傳並闕其體煬帝世唯有王胄等􅀁修大業起居注及江都之禍仍多散逸皇家貞觀初􅃙中書侍郎顔師古給事中孔頴達共撰成隋書五十五卷與新撰周史並行扵時初太宗以梁陳及齊周隋氏並未有書仍命學士分修事具扵上仍使秘書監魏徵總知其務凡有讃論徵多預焉始以貞觀三年創造至十八年方就起功多於諸史一嵗唯姚思亷貞觀二年合為五代紀傳并目録凡二百五十二卷書成不入史閤唯有十志㫁為三十卷尋擬續奏未有其文又詔左僕射于志寧太史令李淳風著作郎􅅊安仁符璽郎李延夀同撰其先撰史人唯令狐德棻重預其事太宗崩後刋勒始成其篇第雖編入隋書其實别行俗呼為五代史志右􅀃隋書惟大唐之受命也義寧武德間工部尚書温大雅首撰創業􅁸居注三篇自是司空房元齡給事中許敬宗著作佐郎敬播相與自立編年體號為實録迄乎三帝世有其書貞觀初姚思㢘始撰紀傳粗成三十卷至顯慶元年太尉長孫無忌與于志寧令狐德棻著作郎劉㣧之楊仁卿􅁸居郎顧㣧等因其舊作綴以後事復為五十卷雖云繁雜時有可觀龍朔中敬宗又以太子少􅀸總統史任更増作傳混成百卷如高宗本紀及永徽名臣四夷等傳多是其􅀁造又起草十志未半而終敬宗􅀁作紀傳或曲希時㫖或猥釋私憾凡有毁譽多非實録必方諸魏伯􅁸亦猶張衡之蔡邕焉其後左史李仁實續撰于志寕許敬宗李義府等傳載言紀事見推直筆惜其短歳功業未終至長夀中春官侍郎牛鳯及又㫁自武德終于弘道撰爲唐書百有十卷鳯及以喑聾不才而􅂺議一代大典凡所纂錄皆素貴私家行状而世人叙事罕能自達􅂉言皆比興全類咏謌或語多鄙樸實同文案而總入編次了無􅁵革其有出自􅅐臆申其機杼彂言則嗤鄙怪誕叙事則參差倒錯故閱其篇第豈謂可觀披其章句不識􅀁以既而悉收姚許諸本􅁒使其書獨行由是皇家舊事殘缺殆盡長安中余與正諌大夫朱敬則司封郎中徐堅左拾遺吳兢奉詔更撰唐書勒成八十卷神龍元年又與兢等重修則天實録編為二十卷夫舊史之壞其亂如繩錯綜艱難朞月方畢雖言無可擇事多遺恨庶將來削藁猶有憑焉大抵自古史臣撰錄其梗槩如此盖属詞比事以月繫年為史氏之根本作生人之耳目者略盡扵斯矣自餘編記小􅀃則不睱具而論之史通卷之十二

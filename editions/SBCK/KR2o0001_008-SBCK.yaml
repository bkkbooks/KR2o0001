front:
  text: 史通卷第八
  hash: sha256:61c95814beb03e61fff3586750c78d23ae23fc0f73e4f6b5e3b07ee8855bb878
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_008-1a}
body:
  text: 内篇模擬書事人物模擬第二十八夫述者相効自古而然故列禦宼之言理也則憑李叟楊子雲之草􅀇也全師孔公􅀜朗則比跡於莊周范曄則參蹤於賈誼況史臣注記其言浩慱若不仰範前哲何以貽厥後來蓋模擬之體厥途有二一曰貌同而心異二曰貌異而心同何以言之蓋一者列國命官卿與大夫為别必於國史所記則卿亦呼為大夫此春秋之例也當秦有天下地廣殷周變諸侯為帝王目宰輔為丞相而譙周撰古史思欲擯抑馬記師放孔經其書李斯之棄市也乃云秦殺其大夫以諸侯之大夫名天子之丞相以此而擬春秋所謂貌同而心異也當春秋之世列國甚多每書他邦皆顯其􅃅至於魯國直云我而已如金行握紀海内大同君靡客主之殊臣無彼此之異而于寳撰晉紀至天子之葬必云葬我某皇帝且無二君何我之有以此而擬春秋又所謂貌同而心異也狄滅二國君死城屠齊桓行覇興亡繼絶左傳云邢遷如歸衛國忘亡言上下安堵不失舊物也如孫皓暴虐人不聊生晉師是討後無相怨而于寳晉紀云吳國既滅江外忘亡豈江外􅀍典午之善政同歸命之滅亡乎以此而擬左氏又所謂貌同而心異也春秋諸國皆用夏正魯以行天子禮樂故獨用周家正朔至如書元年春王正月者年則魯君之年月則周王之月古說春秋者皆妄為解釋也考竹書紀年始達此義而自如曹馬受命躬為帝王非是以諸侯守藩行天子班曆而孫盛魏晉二陽秋每書年首必云某年春帝正月夫年既編帝紀而月又列帝名以此而擬春秋又所謂貌同而心異也五始所作是曰春秋三傳並興各釋經義如公羊傳屡云何以書記其事也此則先引經語而繼以釋辭勢使之然非史體也如吳均齊春秋每書災變亦曰何以書記異也夫事無他議言從已出輙自問而自答者豈是敘事之理者邪以此而擬公羊又所謂貌同而心異也且史漢每於列傳首書人名字至傳内有呼字處則於傳首已詳如漢書李陵傳稱隴西任立政陵字立政曰呼其字師古曰少公歸易耳夫上不言立政之字而輙言字立政曰少公者此省文從可知也至令狐徳棻周書於伊婁穆傳首云伊婁穆字奴干既而續云太祖字之曰奴干作儀同靣向我也夫上書其字而下復曰字豈是事従簡易文去重􅃨者邪以此而擬漢書又所謂貌同而心異也昔謝承家語有云蒼梧人嘗娶妻而美以讓其兄雖其為讓非讓道也又楊子法言曰有姓孔字仲尼其文是也其質非也如向之諸子所擬古作其殆蒼梧之讓姓孔字仲尼者歟蓋語曰世異則事異事異則治異必以先王之道持今世之民此韓子􅀁以著五􅗜之篇稱宋人有守株之說也世之述者銳志好竒喜編次古文􅁧叙今事巍然自謂五經再生三史重出多見其無識者矣惟夫明識之士則不然何則其􅀁擬者非如圖􅀞之寫真鎔鑄之象物以此而似彼其􅀁以為似者取其道術相會義理亦同若斯而已亦猶孔父賤為匹夫栖惶放逐而能祖述堯舜憲章文武亦何必居九五之位處南靣之尊然後謂之速肖者哉蓋左氏為書叙事之最自晉已降景慕者多有類效顰彌益其醜然求諸偶中亦可言焉蓋君父見害臣子所恥義當略說不忍斥言故左傳叙桓公在齊遇害而云彭生乗公薨於車如于寳晉紀叙愍帝殁于平陽而云晉人見者多哭賊懼帝崩以此而擬左氏所謂貌異而心同也夫當時所記􅂉未盡則先舉其始後詳其末前後相會隔越取同若左氏成七年鄭獲楚鍾儀以獻晉至九年晉歸鍾儀於楚以求平其類是也至裴子野宋略叙索虜臨江太子劭使力士排徐湛於江湛僵仆於是始與劭有隙其後三年有徐湛為元凶所殺事以此而擬左氏亦所謂貌異而心同也凡列姓名罕兼其字茍前後互舉則觀者自知如左傳上言羊斟則下曰子臧前稱子産則次見國僑其類是也至裴子野宋略亦然何者上書桓􅀇則下有敬道後叙殷鐡則先著景仁以此而擬左氏又所謂貌異而心同也左氏與論語有叙人酬􅍟茍非煩辭積句但是往復唯諾而已則連續而說去其對曰問曰等字如裴子野宋略云李孝伯問張暢卿何姓曰姓張張長史乎以此而擬左氏論語又所謂貌異而心同也善人君子功業不書見於應􅍟附彰其美如左傳稱楚武王􅁒伐隋熊率且比曰季梁在何益至蕭方三十國春秋說朝廷聞慕容雋死曰中原可圖矣桓温曰慕容恪在其憂方大以此而擬左氏又所謂貌異而心同也夫將叙其事必預張其本彌縫混說無取􅔔言如左傳稱叔輙聞日蝕而哭昭子曰子叔其將死乎秋八月叔輙卒至王邵齊志稱張伯徳夢山上掛絲占者曰其為幽州乎秋七月拜為幽州刺史以此而擬左氏又所謂貌異而心同也盖文雖缺畧理甚昭著此丘明之體也至如敘晉敗於邲先濟者賞而云上軍下軍爭舟舟中之指可掬夫不言攀舟亂以力斷指而但曰舟指可掬則讀者自覩其事矣至王邵齊志述髙季式破敵於韓陵追奔逐北而云夜半方歸槊血滿袖夫不言奮槊深入撃刺甚多而但稱槊血滿袖則聞者亦知其義矣以此而擬左氏又所謂貌異而心同也大抵作者自魏已前多効二史従晉已降喜學五經夫史才文淺而易摸經文意深而難擬既難易有别故得失亦殊盖貌異而心同者模擬之上也貌同而心異者摸擬之下也然人皆好貌同而心異不尚貌異而心同者何哉盖鑒識不明嗜愛多僻悅夫似史而憎夫真史此張子所以致譏於魯侯有葉公好龍之喻也袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也夫擬古而不類此乃難之極者何為獨闕其目乎嗚呼自子長已還似皆未覩斯義後來明達其鑒之哉書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勲五曰表賢能于寳之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子真婦之節則書之文誥専對之辭則書之才力伎藝殊異則書之於是採二家之所議徵五志之所取蓋記言之所網羅書事之所總括粗得於兹矣然必謂故無遺恨猶恐未盡者乎今更廣以三科用増前目一曰叙㳂革二曰明罪惡三曰旌恠異何者禮儀用捨節文升降則書之君臣邪僻國家䘮亂則書之幽明感應禍福萌兆則書之於是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯但古作者鮮能無病茍書而不法則何以示後蓋班固之譏司馬遷也論大道則先黄老而後六經序游俠則退處士而進姧雄述貨殖則崇勢利而羞賤貧此其所蔽也又􅀓􅀇之貶班固也論國體則飾朝闕而折忠臣叙世敎則貴取容而賤直節述時務則謹辭章而略事實此其所失也尋班馬二史咸擅一家而各自彈射逓相瘡痏夫雖自卜者審而自見為難可謂笑他人之未工忘已事之已拙上知猶其若此而況庸庸者哉茍自前哲之指蹤校後來之所失若王沉孫盛之伍伯􅁸徳棻之流論王業則黨悖逆而誣忠義叙國家則抑正順而褒簒奪述風俗則矜夷狄而陋華夏此其大較也必伸以純擿窮其負累雖擢髪而數庸可盡邪子曰於予何誅於數家見之矣抑又聞之恠力亂神宣尼不語而事鬼求福墨生􅀁信故聖人於其間若存若亡而已若吞燕卵而啇生啓龍漦而周滅厲壊門以禍􅀳鬼謀社而亡曹江使返璧於秦皇圯橋授書於漢相此則事􅀜軍國理涉興亡有而書之以彰靈驗可也而王隠何法盛之徒所撰晉史乃専訪州閭細事委巷瑣言聚而編之目為鬼神傳錄其事非要其言不經異乎三史之所書五經之所載也范曄􅀶採衆書裁成漢典觀其所取頗有竒工至於方術篇及諸蠻夷傳乃錄王喬左慈禀君盤瓠言唯迂誕事多詭越可謂美玉之瑕白圭之玷惜㦲無是可也又自魏晉已降著述多門語林笑林世說俗說皆喜載調謔小辨嗤鄙異聞雖為有識所譏頗為無知所悅而斯風一扇國史多同至如王思狂躁起驅蠅而踐筆畢卓沉􅊺左持螯而右柸劉邕榜吏以膳痂齡石戯舅而傷贅其事蕪穢其辭猥雜而歴代正史持為雅言茍使讀之者為之解頥聞之者為之撫掌固異乎記功書過彰善癉惡者也大抵近代史筆叙事為煩㩁而論之其尤甚者有四夫祥瑞者所以發揮盛徳幽賛明王至如鳳凰來儀嘉禾入獻秦得若雉魯獲如麕求諸尚書春秋上下數千載其可得言者蓋不過一二而已爰及近古則不然凢祥瑞之出非關理亂蓋主上所惑臣下相欺故徳彌少而祥彌多政逾劣而瑞逾盛是以桓靈受祉比文景而為豐劉石應符比曹馬而益倍而史官徵其謬說錄彼邪言真偽莫分是非無别其煩一也當春秋之時諸侯力爭各擅雄伯自相君長經書某使來聘某君來朝者蓋明和好所通盛徳所及此皆國之大事不可闕如而自史漢已還相承繼作至於呼韓入侍肅慎來庭如此之流書之可也若乃藩王岳牧朝會京師必也書之本紀則異乎春秋之義載擅道濟等來朝之類是也若漢書載楚王囂等來朝宋書夫臣謁其君子覲其父抑惟常理非復異聞載之簡䇿一何辭費其煩二也乃若百職遷除千官黜免其可以書名本紀者蓋惟槐􅂦而已故西京撰史唯編丞相大夫東觀著書止列司徒太尉而近世自三公已下一命已上茍沾厚祿莫不備書且一人之身兼預數職或加其􅃅而闕其位􅂉無其實而有其名賛唱為之口勞題署由其力倦具之史牘夫何足觀其煩三也夫人之有傳也蓋唯書其邑里而已其有開國承家世祿不墜積仁累徳良弓無改項籍之先世為楚將石建之後廉謹相承此則其事尤異略書於傳可也其失之者則有父官令長子秩丞郎聲不著於一鄊行無聞於十室乃叙其名位一一無遺此實家諜非關國史其煩四也於是考兹四事以觀今古足驗積習忘返流宕不歸乖作者之規模違哲人之準的也孔子曰吾黨之小子狂簡斐然成章不知所以裁之其斯之謂矣亦有言􅂉可記功或可書而紀闕其文傳亡其事者何則始自太上迄于中古其間文籍可得言焉夫以仲尼之聖也訪諸郯子始聞少皥之官叔向之賢也詢彼國僑載辨黄熊之祟􅂉八元才子因行父而獲傳􅂉伍羖大夫假趙良而見識則知當時正史流俗所行若三墳五典八索九丘之書虞夏商周春秋檮杌之記其所缺略者多矣既而汲冢所述方五經而有殘馬遷所書比三傳而多别裴松補陳壽之闕謝綽拾沈約之遺斯又言滿五車事逾三篋者矣夫記事之體欲簡而且詳踈而不漏若煩則盡取省則都損此乃忘折中之宜失均平之理惟夫􅀶雅君子知其利害者焉人物第三十夫人之生也有賢不肖焉若乃其惡可以誡世其善可以示後而死之日名無得而聞焉是誰之過歟蓋史官之責也觀夫文籍肇剏史有尚書知逺踈通網羅歴代至如有虞進賢時宗元凱夏氏中㣲國傳寒浞殷之亡也是生飛廉惡來周之興也實有散宜閎夭若斯人者􅂉為惡縦暴其罪滔天􅂉累仁積徳其名蓋世雖時淳俗質言約義簡此而不載闕誰大焉洎夫子修春秋記二百年行事三傳並作史道勃興若秦之由余百里奚越之范蠡大夫種魯之曹沬公儀休齊之寗戚田穰苴斯並命世大才挺生傑出􅂉陳力就列功􅃣一時或殺身成仁聲聞四海茍師其徳業可以治國字人慕其風範可以激貪勵俗此而不書無乃太簡又子長著史記也馳騖窮古今上下數千載至如臯陶伊尹傳說仲山甫之流並列經誥名存子史功烈尤顯事跡居多盍各採而編之以為列傳之始而斷以夷齊居首何齷齪之甚乎既而孟堅勒成漢書牢籠一代至於人倫大事亦云備矣其間若薄昭楊僕顔駟史岑之徒事所以見遺者蓋略小而存大耳夫雖逐䴢之犬不復顧兎而雞肋是棄能無惜乎當三國異朝兩晉殊宅若元則仲景時才重於許洛何禎許詢文雅髙於楊于而陳壽國志王隠晉史廣列諸傳而遺此不編斯亦網漏吞舟過為迃闊者觀東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩毁形不嫁哀慟傷生此則才徳兼美者也董祀妻蔡氏載誕胡子受辱虜庭文詞有餘節槩不足此則言行相乖者也至蔚宗後漢傳標列女徐淑不齒而蔡琰見書欲使彤管所載將安凖的裴幾原刪略宋史時稱簡要至如張禕隂受君命將賊零陵乃宗通不移飲鴆而絶雖古之鉏麑義烈何以加諸鮑昭文宗學府馳名海内方於漢代褒朔之流事皆闕如何以申其褒奨夫天下善人少而惡人多其書名竹帛者蓋惟記善而已故太史公有云自獲麟已來四百餘年賢君忠臣􅂮義之士廢而不載余甚懼焉即其義也至如四㐫列於尚書三叛見於春秋西漢之紀江充石顯東京之載梁冀董卓此皆干紀亂常存滅興亡所繫既有􅀜時政故不可闕書但近史所刋有異於是至如不才之子群小之徒或隂情醜行或素飡尸祿其惡不足以曝揚其罪不足以懲誡莫不搜其鄙事聚而為錄不其穢乎抑又聞之十室之邑必有忠信而斗筲之才何足算也若漢傳之有傳寛靳歙蜀志之有許慈宋書之虞丘進魏史之王㦥若斯數子者或才非㧞萃或行不逸群徒以片善取知㣲功見識闕之不足為少書之維益其累而史臣皆責其譜􅃺徵其爵里課虚成有裁為列傳不亦煩乎語曰君子於其所不知蓋闕如也故賢良可記而簡牘無聞斯乃􅊫所不該理無足咎至若愚智畢載妍媸靡擇此則燕石妄珎齊竿混吹者矣夫名刋史冊自古攸難事列春秋哲人所重筆削之士其慎之哉史通卷之第八

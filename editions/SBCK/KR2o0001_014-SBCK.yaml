body:
  text: 外篇惑經第四二十條昔孔宣父以大聖之德應運而生生人已來未之有也故使三千弟子七十門人鑚仰不及請益無倦然則尺有􅀁短寸有􅀁長其間切磋酬對頗亦互聞得失何者覩仲由之不悅則矢天厭以自明答言􅅯之絃歌則稱戯言以釋難斯則聖人之設教其理含弘或援誓以表心􅂉稱非以受屈豈與夫庸儒末學文過飾非使夫問者緘辭杜口懷疑不展若斯而已㦲嗟夫古今世殊師授路隔恨不得親膺洒掃陪五尺之童躬奉德音撫四科之友而徒以硏尋蠧簡穿鑿遺文菁華乆謝糟粕為偶遂使理有未達無由質疑是用握卷躊躇揮毫悱憤儻梁木斯壞魂而有靈敢効接輿之歌輙同林放之問但孔氏之立言行事刪詩讃易其義旣廣難以具論今惟摭其史文評之扵後按夫子􅀁修之史是曰春秋切詳春秋之義其所未諭者有十二何者趙孟以無辭伐國貶號為人􅂎伯以夷來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此則人倫臧否在我筆端􅀡道而行夫何所讓奚為齊鄭及楚國有弑君各以疾赴遂皆書卒年鄭子駟弑其君僖公十年齊人昭元年公子圍弑其君郟敖襄七子麋卒鄭伯頑卒齊侯陽生卒弑其君悼公而春秋但書云楚夫臣弑其君子弑其父凡在含識皆知恥懼苟欺而可免則誰不願然且官為正卿返不討賊地居冡嫡藥不親嘗遂皆被以惡名播諸來葉必以彼三逆方兹二弑躬為梟獍則漏網遺名跡涉􅀲李乃擬指顯録嫉惡之情豈其若是其所未諭一也其一條又案齊乞野幕之弑事起陽生楚靈乾谿之縊禍由常夀而春秋􅂢其首謀捨其親弑陳乞比乞謂齊比也楚公子亦何異魯酒薄而邯鄲圍城門火而魚池及必如是則邾之閽者􅀻憾射姑以其君急而好潔可行欺以激怒遂傾瓶水沃庭俾廢爐而爛卒斯亦罪之大者曷不書弑乎弑邾子宜書云閽其􅀁未諭二也其二條蓋明鏡之照物也妍􅎀必露不以毛嬙之靣􅂉有疵瑕而􅃦其鑒也虚空之傳嚮也清濁必聞不以綿駒之􅁔時有娛曲而輟其應也夫史官執簡宜類扵斯苟愛而知其醜憎而知其善善惡必書斯為實録觀夫子修春秋也多為賢者諱狄實㓕衞因桓恥而不書河陽召王成文羙而稱狩斯則情兼向背志懷彼我苟書法其如是也豈不使夫君子靡憚憲章雖玷白圭無慙良史乎其􅀁未諭三也其三條哀八年及十三年公再與吳盟而皆不書注云八年云盟不書何恥之故不録也不書盟恥吳夷也十二年注桓二年公及戎盟戎實豺狼非我族類夫非􅀁諱而仍諱謂當恥而無恥求之折􅂨未見其宜其􅀁未諭四也其四條諸􅀦臣子非卿不書必以地来奔則雖賤亦志斯豈非􅀦之大事不可限以常流者耶如陽虎盗入于讙擁陽關而外叛傳具其事經獨無聞何哉且弓玉云亡猶獲顯記城邑失守反不沾書略大存小理乖懲勸其􅀁未諭五也其五條按諸侯世嫡嗣業居䘮旣未成君不避其諱此春秋之例也何為般野之殁皆書以名而惡視之殂􅀡云子卒其􅀁未諭六也其六條凡在人倫不得其死者􅀖君已上皆謂之弑卿士已上通謂之殺此又春秋之例也按桓二年書曰宋督弑其君與夷及其大夫孔父僖十年又曰晉里克弑其君卓及其大夫荀息夫臣當為殺而稱及與君弑同科苟弑殺不分則君臣靡别者矣義之故難通既未釋此疑共編於未諭公羊傳曰及者何累也雖有此釋其此也他放其􅀁未諭七也其七條夫臣子􅀁書君父是黨雖事乖正􅀡而理合名教如魯之􅀮桓戕弑昭哀放逐姜氏􅁋奔子般夭酷斯則􅀖之孔醜諱之可也如公送晉葬公與吳盟為齊􅀁止為邾􅀁敗盟而不至㑹而後期並諱而不書豈非煩碎之甚且按汲􅃁竹書與􅀳春秋及紀年之載事也如重耳出奔惠公見獲書其本國皆無所隱唯魯春秋之記其國也則不然何者國家之事無大無小苟涉嫌疑動稱恥諱厚誣來世奚獨多乎其所未諭八也其八條案昭十二年齊納北燕伯傳于陽者何公子陽生也杜注云陽即唐燕之别邑左傳曰納北燕伯欵于唐子曰齊之事我乃知之矣在側者曰子苟知之何以不革曰如爾所不知何夫如是夫子之修春秋皆遵彼乖僻習其訛謬凡􅀁編次不加刋改者矣何為其間則一褒一貶時有弛張或㳂或革曾無定體其所未諭九也其九條又書事之法其理宜明使讀者求一家之廢興則前後相㑹討一人之出入則始末可尋如定六年書鄭㓕許以許男斯歸而哀元年書許男與楚圍蔡夫許既㓕矣君執家亡能重列諸侯舉兵圍國者何哉盖其間行事必當有說經既不書傳又闕載鈌畧如此尋繹難知其所未諭十也其十條按􅀳自魯閔公已前未通於上國至僖二年滅下陽已降漸見於春秋盖始命行人自達於魯也而􅃈語􅀳春秋載魯國閔公時事言之甚詳斯則聞事必書無假相赴者也盖當時國史它皆倣此至於夫子所脩也則不然凡書異國皆取來吿苟有所吿雖小必書如無其吿雖大亦闕故宋飛六鷁小事也以有吿而書之􅀳滅三􅀖大事也魏㓕霍也謂㓕耿滅以無吿而闕之用使巨細不均繁省失中尋兹例之作也盖因周禮舊法比夫諸國史記奚事獨為踈濶成文魯䇿夫子既撰不刋之書為後王之則豈可仍其過失而不中規矩乎其所未諭十一也一條其十盖君子以愽聞多識為工良史以實錄直書為貴而春秋記他國之事必憑來者之辭而來者所言多非其實或兵敗而不以敗吿君弑而不以弑稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋塟而以冬赴皆承其所說而書遂使眞偽莫分是非相亂其所未諭十二也其十二條凡所未諭其類􅀹多静言思之莫䆒所以豈夫子之墻數仞不得其門者歟將丘也幸苟有過人必知之者歟如其與奪請謝不敏其十三條又世人以夫子固天所縱將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫之指實㩁而為論其虚美者有五焉按古者國有史官具列時事觀汲冢所記皆與魯史符同至如周之東遷其說稍備隱桓已上難得而詳此其煩省皆與春秋不别又􅀗君曰止誅臣曰刺殺其大夫曰殺執我行人鄭弃其師隕石于宋五弃師出􅃈語􅀳春秋也其事並出竹書紀年唯鄭諸如此句多是古史全文則知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史䇿有闕文時月有失次皆存而不正無所用心斯又不可能而殫􅀃而太史公云夫子為春秋筆則筆削則削子夏之徒不能賛一辭其虚美一也其十四條又案宋襄公執滕子而誣之以得罪楚靈王弑郟敖而赴之以疾亡春秋皆承吿而書曾無變革是則無􅇳者反加以罪有罪者得隱其􅇳求諸勸戒其義安在而左丘明論春秋之義云或求名而不得或欲盖而彌彰善人勸焉􅁋人懼焉其虛美二也其十五條又春秋之􅀁書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌盻習扵春秋至扵董狐書法而不隱南史執簡而累進又寗殖出君而卒自憂名在䇿書故知當時史臣各懷直筆斯則有犯必死書法無捨者矣自夫子之修春秋也盖他􅀖之簒賊其君者有三解扵上謂齊鄭楚巳本國之殺逐其君者有五君被弑昭哀一主被有隱閔般惡視此五也逐莫不缺而靡録使其有逃名者而孟子云孔子成春秋亂臣賊子懼無乃烏有之談歟其虛美三也其十六條又按春秋之文雖有成例或事同書異理殊書一故太史公曰孔氏著春秋隱桓之間則彰至定哀之際則㣲為其切當世之文而亡褒諱之辭也斯則危行言遜吐剛茹柔推避以求全依違以免禍而孟子云孔子曰知我者其惟春秋乎罪我者其惟春秋乎其虛美四也其十七條按趙穿殺君而稱宣子之弑江乙亡布而稱令尹所盗此則春秋之世有識之士莫不㣲婉其辭隱晦其􅀃斯盖當時之􅁪事習俗所常行而固云仲尼殁而㣲言絶觀㣲言之作豈獨宣父者􅁘其虛美五也其十八條考兹衆美徵其本源良由達者相承儒敎傳授既欲神其事故談過其實語曰衆善焉必察之孟子曰堯舜不勝其美桀紂不勝其惡尋世之言春秋者得非覩衆善而不察同堯舜之多美者乎其十九條昔王􅂶􅀃論有問孔之篇雖論語群言多見指擿而春秋雜義曾未發明是用廣彼舊疑增其新覺將來學者幸為詳之其二十條申左第五古之人言春秋三傳者多矣戰國之世其事罕聞當前漢專用公羊宣皇已降穀梁又立扵學至成帝世劉歆始重左氏而書不列學官大抵自古重兩傳而輕左氏者固非一家美左氏而議兩傳者亦非一族互相攻擊各自朋黨聒籠紛竸是非莫分然則儒者之學苟以專精為主其扵治章句通訓釋斯則可也至扵論大躰舉宏綱則言罕兼統理無要害故使今古疑滯莫得而申者焉必揚㩁而論之言傳者固當以左氏為首但自古學左氏者談之又不得其情如賈逵撰左氏長義稱在秦者為劉氏乃漢室􅀁宜推先但取恱當時殊無足採又按桓譚新論曰左氏傳扵經猶衣之表裏而東觀漢記陳元奏云光武興立左氏而桓譚衛宏並共詆訾故中道而廢班固藝文志云丘明與孔子觀魯史記而作春秋有􅀁貶損事形扵傳懼罹時難故􅀮其書末世口􅀃流行遂有公羊穀梁鄒氏夾氏諸傳而於固集復有難左氏九條三評等科夫以一家之言一人之說而參差相背前後不同斯文不足觀也夫觧難者以理為本如理有所闕欲令有識心服不亦難乎今聊次其所疑列之於後盖左氏之義有三長而二傳之義有五短按春秋昭二年韓宣子來聘觀書於太史氏見魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也然春秋之作始自􅁎旦成諸仲尼丘明之傳所有筆削及發凡例皆得周典釋例杜預辨義之精者曲以所通無他凡例也左丘明則公羊􅂖梁之論春秋皆因事以起問因所問以例者皆周公之舊制者也周禮以為本諸稱凡以發傳孔子教故能成不刋之書著將來之法其長一也又按哀三年魯司鐸火南宮敬叔命周人出御書之時於魯文籍最備丘明既躬為太史愽總羣書至如檮杌紀年之流鄭書􅀳志之類凡此諸籍莫不畢覩其傳廣包它國每事皆詳其長二也論語子曰左丘明耻之丘亦耻之夫以同聖之才而膺授經之托加以達者七十弟子三千逺自四方同在一國於是上詢夫子下訪其徒凡所採摭實廣聞見其長三也如穀梁公羊者生於異國長自後來語地則與魯史相違論時則與宣尼不接安得以傳聞之􅀃而與親見者爭先乎譬猶近世漢之太史􅀳之著作撰成國典時號正言既而先賢􅂄舊益部􅂄舊傳襄陽􅂄舊傳等書謂楚國先賢傳汝南先賢行狀語林世􅀃竟造異端强書他事夫以傳自委巷而將班馬抗衡訪書古老而與子孫並列斯則難矣彼二傳之方左氏亦奚異於此哉其短一也左氏述臧哀伯諌桓納鼎周内史美其讜言王子朝吿于諸侯閔馬父嘉其辨􅀃凡如此類其數實多斯盖當時發言形於翰墨立言不朽播於他􅀖而丘明仍其本語就加編次亦猶近代史記載樂毅李斯之文漢書晁錯賈生之筆尋其實也豈是子長筆削孟堅雌黄所稱者哉觀二傳所載有異於此其錄人言也語乃齟齬文皆􅃈碎夫如是者何哉盖彼得史臣之簡書此傳流俗之口說故使隆促各異豐儉不同其短二也尋左氏載諸大夫詞令行人應荅其文典而美其語博而奥王納帶王孫勞楚而論九如僖伯諌君觀魚富辰諌援引皆據禮經之類是也鼎季札觀樂而談國風其所述逺古則委曲如存舜舉八元八凱魏絳荅􅀳悼公引虞人之箴如郯子聘魯言少昊以鳥名官季孫行父稱其事明白非是厚誣之類子革諷楚靈王誦祈招之詞徴近代則循環可覆􅀳用􅀳士渥濁諌殺荀林父說文公敗楚於如呂相絶秦述兩國世􅂩聲子班荆稱楚材食析骸以釁猶無城下之盟祝他稱踐土盟􅀳城濮有憂色子服景伯謂呉云楚圍宋易子而甲午之類也重耳魯申蔡必料其功用厚薄指意深淺諒非經營草創出自一時琢磨潤色獨成一手斯盖當時國史已有成文丘明但編而次之配經稱傳而已也如二傳者記言載事失彼菁華尋源討本取諸胷臆夫自我作古無所凖繩故理甚迂僻言多鄙野比諸左氏不可同年其短三也按二傳雖以釋經為主其缺漏不可殫論如經云薨而左傳云公子圍所殺及公羊作傳重述經文無所發明依違而已其短四也漢書載成方遂詐稱戾太子至於闕下雋不疑曰昔衛蒯瞶得罪於先君將入國太子輙拒而不納春秋是之遂命執以屬吏霍光由是始重儒學按雋生所引乃公羊正文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國梟獍為曹禮法不容名教同嫉而公羊釋義反以衛輒為賢是違夫子之教失聖人之㫖奬進惡徒疑誤後學其短五也若以彼三長校兹五短勝負之理為主而於内則為國隱惡於外則承赴而書求其本事太半失實已於疑經篇載之詳矣尋斯義之作也盖是周禮之故事魯國之遺文夫子因而修之亦存舊制而已至於實錄付之丘明用使善惡必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉盖語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲盖而彰求名而亡善人勸焉淫人懼焉尋春秋所書實乖此義而左傳所錄無媿斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉侯無加民之惡而杜預釋例曰凡諸國史承以書於䇿而簡牘之記具有失得因示無人以執皆時之赴吿欲重其罪以加民為辭失也按杜氏此釋實得經傳之情者也虛實故左傳隨實而著本狀以明其得儒者苟譏左氏作傳多敘經外别事如楚鄭與齊三國之賊隱桓昭襄四君之簒逐其外則承吿如彼其内則隱諱如此若無左氏立傳其事無由􅀗知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當􅀳景行覇公室方强而云韓氏攻趙有程嬰杵臼之事趙世家出史記魯侯禦宋得雋乗丘而云莊公敗績有馬驚流矢之禍楚􅀳相遇唯在邲役而云二國交戰置師於兩堂新書出賈誼子罕相國宋睦於􅀳而云􅀳將伐宋覘其哭於陽門介夫乃止記出禮魯師㓕項􅀳止僖公而云項實齊桓所滅春秋為賢諱羊傳出公襄年再盟君臣和叶而云諸侯失正大夫皆執國權梁傳出穀其記時也盖秦穆居春秋之始而云其女為荆昭夫人女傳出烈韓魏處戰國之時而云其君陪楚莊王葬焉滑稽傳出史記列子書論尼父而云生在鄭穆之年七錄出劉向扁鵲醫療虢公而云時當趙簡子之日扁鵲傳出史記欒書仕於周而云以􅀳文如獵犯顏直言新序出劉向荀息死於奚齊而云觀􅀳靈作臺累碁申誡說苑出劉向或以先為後或以後為先日月顛倒上下翻覆古來君子曾無所疑及左傳既行而其失自顯語其弘益不亦多乎而世之學者猶未之悟所謂忘我大德日用而不知者焉然自丘明之後迄及魏滅年將千祀其書􅃦廢至􅀳太康年中汲􅃁􅀗書全同左氏書尋亦亡汲􅃁所得秋時事與左氏同師春多載春秋時筮者繇辭逸今惟紀年􅃈語師春在焉按紀年􅃈語載春無一字差舛將左氏相校遂故束晳云若使此書出於漢世劉歆不作五原太守矣於是摯虞束晳引其義以相明王接荀顗取其文以相證杜預申以注釋釋謂釋例注謂注解于寳籍為􅀳紀紀敘例中事具于寳􅀳由是世稱實錄不復言非其書漸行物無異議故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曾子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其㫖傳所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋夫學者苟徵此二􅀃以考三傳亦足以定是非明真偽者矣何必觀汲􅃁而後信者乎以此而言則三傳之優劣見矣史通卷第十四

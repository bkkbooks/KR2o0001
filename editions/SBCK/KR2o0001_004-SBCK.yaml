body:
  text: 内篇論賛序例題目斷限編次稱謂論賛第九春秋左氏傳每有發論假君子以稱之二傳云公羊子􅂖梁子史記云太史公旣而班固曰讃荀恱曰論東觀曰序謝承曰詮陳壽曰評王􅀮曰議何法盛曰述楊雄曰譔劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其􅀁􅃅史官􅀁撰通稱史臣其名萬殊其義一揆必取便扵時者則揔歸論著􅀁以辯疑惑釋凝滯若愚智共了固無俟商㩁丘明君子曰者其義實在扵斯司馬遷始限以篇終各書一論必理有非要則強生其文史論之煩實萌扵此夫擬春秋以成史持論􅀹宜闊畧其有本無疑事輙誤論以裁之此皆􅀻徇筆端苟􅃷文彩嘉辭羙句􅀉諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡薄無味承祚懦緩不切賢才間出隔世同科􅺖堅辭惟温雅理多愜當其􅀹羙者有典誥之風翩翩弈弈良可詠也仲豫義理雖長失在繁富自茲已降流宕忘返大扺皆華多扵實理少扵文鼓其雄辭誇其儷事必擇其善者則于寳范曄裴子野是其最也沈約􅆇榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若􅀽彦伯之務歸玄言謝靈運之虚張髙論玉巵無當曾何足云王邵志在簡􅈂言兼鄙野苟得其理遂忘其文觀過知人斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛扵壯夫服綺紈扵髙士者矣史之有論也蓋欲事無重出省文可知如太史公曰觀張良貌如羙婦人耳項羽重瞳豈舜苖裔此則别加他語以􅀘書中􅀁謂事無重出者也又如班固賛曰萬石君之為父浣衣君子非之楊王孫祼葬賢扵秦始皇逺矣此則片言如約而諸義甚備􅀁謂省文可知也及後来讚語之作多録紀傳之言其有􅀁異唯加文飾而已至扵甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷序傳後歷冩諸篇各叙其意旣而班固變為詩體􅃅之曰述范曄攺徃述名呼之以賛尋述賛為例篇有一章事多者則約之以使少理小者則張之以令大名實多爽詳畧不同且欲觀人之善惡史之褒貶蓋無假扵此然固之緫述合在一篇使其條貫有序歷然可閱蔚宗後書實同班氏乃各附本事書扵卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北史李百藥蕭子顯大唐新修晉史皆依范書誤本篇終有賛夫每卷立論其煩已多而嗣論以賛為黷彌甚亦猶文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言苟撰史若斯難與議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈􅁩范曄之虚羙隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍􅂉言傷其實或擬非其倫必備加擊難則五車難盡故畧陳梗槩一言以蔽之序例第十孔安國有云序者􅀁以序作者之意也竊以書列典謨詩含比興􅀂不先叙其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事為宗至扵表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相叅風雅齊列矣迨華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以四皓為始也嶠言辭簡質叙致温雅味其宗㫖亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜􅃷文彩後來􅀁作他皆若斯扵是遷固之道怱諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史􅀁有而我書獨無世之作者以為恥愧故上自晉宋下及陳隋每書必序課成其數蓋為史之道以古傳今古旣有之今何為者濫觴肇跡容􅂉可觀累屋重起無乃太甚譬夫方朔始為客難續以賔戯觧嘲枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者􅀁厭聞老生之恒􅀃也夫史之有例猶國之有法國之無法則上下靡定史之無例則是非莫官蓋夫子作經始發凡例左氏立傳顯其區域科條之辯彪炳可觀降及戰國迄乎有晉年逾五百史豈乏才雖其體屡變而斯文終絶惟令升先覺逺述丘明重立凢例勒成晉紀鄧孫已下遂躡其蹤史例中興於斯為盛若沈宋之志序蕭齊之序録雖皆以序為名其實例也必定其臧否徴其善惡于寳范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文塲蹇躓而義甚優長斯一二家皆序例之羙者夫事不師古匪􅀃攸聞苟摸楷曩賢理非可諱而魏収作例全取蔚宗貪天之功以為已力異夫范依政駿班習子長攘袂公行不䧟穿窬之罪也蓋凡例旣立當與紀傳相符按唐朝晉書例云凡天子廟􅃅惟書扵卷末依檢孝武崩後竟不言廟曰烈宗又按百藥齊書例云人有本字行者今並書其名依撿如高愼斛律光之徒多􅀁仍􅃇謂之仲宻明月此並非言之難行之難也及晉齊史例皆云坤道卑柔中宮不可為紀今編同列傳以戒牝雞之晨切惟録皇后者旣為傳體自不可加以紀名二史之以后為傳雖云允惬而解釋非理成其偶中􅀁謂􅀞蛇而加足反失杯中之酒也至扵題目失據褒貶多違斯並散在諸篇此可得而略矣題目第十一上古之書有三墳五典八索九丘其次有春秋尚書檮杌志乗自漢已下其流漸繁大抵史名多以書記紀略為主後生祖述各從􅀁好㳂革相因循環逓習蓋區域有限莫踰扵此焉至孫盛有魏氏春秋孔衍有隋尚書陳壽王邵曰志何之元劉璠曰典此又好竒猒俗習􅃇􅂢新雖得稽古之宜未逹從時之義㩁而論之其編年月日者謂之紀列記傳者謂之書取順於時斯為最也夫名以定體為實之賔苟失其途有乖至瑰按吕陸二氏賈不韋各著一書惟次篇章不繫時月此乃子書雜記而皆號曰春秋魚豢姚察著魏梁二史巨細畢載蕪累甚多而俱牓之以畧考名責實奚其䘮歟若乃史傳雜篇區分􅀋聚隨事立號諒無恒規如馬遷撰皇后傳而以外戚命章按外戚憑皇后以得名猶宗室因天子而顯稱若編皇后而曰外戚傳則書天子而曰宗室紀可乎班固撰人表以古今為目尋其所載也皆自秦而徃非漢之事古誠有之今則安在子長史記别剙八書孟堅既以漢為書不可更摽書號改書為志義在反文而何氏中興易志為記此則貴於革舊未見其能取新夫戰爭方殷雄雌未决則有不奉正朔自相君長必國史為傳宜别立科條至如陳項諸雄􅀉篇漢籍董袁羣賊附列魏志既同臣子之例孰辨彼此之殊惟東觀以平林下江諸人列為載記顧後來作者莫之遵効逮新􅀳始以十六國主特載記表名可謂擇善而行巧扵師古者矣觀夫􅃇史列傳題卷靡恒文少者則具出姓名若司馬相如東方朔是也字煩者惟書姓氏若母將盖陳衛諸葛傳是也必人多而姓同者則結定其數若二􅀽四張二公孫傳是也如此標格足為詳審至范曄舉例始全録姓名歴短行扵卷中叢細字扵標外其子孫附出者注扵祖先之下乃􅀋俗之文按孔目藥艸經方煩碎之至孰過扵此切以周易六爻義存象内春秋萬國事具傳中讀者研尋篇終自曉何必開帙觧帶便令照肰滿目也自兹已降多師蔚宗魏收因之則又甚矣其有魏世隣國編扵魏史者扵其人姓名之上又列之以􅀖域申之以職官至如江東帝王則云僣晉司馬叡島夷劉􅁉河西酋長則云􅀻置涼州牧張寔􅀻署凉王李暠此皆篇中􅀁具又扵卷首具列必如收意使其撰兩漢書三國志題諸盗賊傳亦當云僣西楚覇王項羽偽寧朔王隗囂自餘陳涉張歩劉璋􅀽術其位􅃅皆一一具言無􅀁不盡也蓋法令滋章古人􅀁愼若范魏之裁篇目可謂滋章之甚者乎苟忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣斷限第十二夫書之立約其来尚矣如尼父之定虞書也以舜為始而云粤若稽古帝堯丘明之傳魯史也以􅀮為先而云惠公元妃孟子此皆正其疆里開其首端因有㳂革遂相交互事􅀔當然非為濫軼也過此已徃可謂狂簡不知􅀁裁者焉夫子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴􅀁出起乎司馬氏按馬記以史制名班書持漢摽目史記者載數千年之事無􅀁不容漢書者紀十二帝之時有限斯極固旣分遷之記判其去取紀傳􅀁存惟留漢目表志􅀁錄乃盡犧年舉一反三豈其若是膠柱調瑟不亦繆歟但固之􅐲駮旣往不諫而後之作者咸習其迷宋史則上括魏朝隋書則仰包梁代求其􅀁書之事得十一扵千百一成其例莫之敢移永言其理可為歎息當魏武乗時撥亂電掃羣雄鋒鏑之􅀁交網羅之􅀁及者蓋惟二􅀽劉呂而已各進鴆行弑燃臍就戮揔關王室不涉覇圗而陳壽國志引居傳首夫漢之有董卓猶秦之有趙高昔東令之誅旣不列于漢史何太師之斃遂獨刋扵魏書乎兼復􅆇洪陶謙劉虞孫讃生扵季末自相吞噬其扵曹氏也非唯理異犬牙固亦事同風馬漢典􅀁具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見它記則無宜重述故子嬰降沛其詳取驗扵秦紀伯符死漢其事斷入扵呉書沈錄金行上覊劉主魏刋水運下列高王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左旣承正􅃋斥彼魏胡故互相有錄索虜成傳魏本出扵雜種竊亦自􅃅眞君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比扵群盗盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之扵傳何厚顔之甚耶又張李諸姓據有凉蜀其扵魏也校年則前後不接論地則參商有殊何預魏氏而横加編載夫尚書者七經之􅃣冕百氏之襟䄂凢學者必先精此書次覽羣籍譬夫行不由徑非􅀁聞焉修國史者若旁採異聞用成慱物斯則可矣如班書地理志首遂全冩禹貢一篇降為後書持續前史蓋以水濟水床上施床徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏􅀁載惟録其章名如地理為書論自古風俗至扵夏世宜云禹貢已詳何必重述古文益其辭費也若夷狄本係種落􅀁興北貊起自淳維南蠻出扵盤瓠高句麗以鱉橋􅀗濟􅄍谷渾因馬闘徙居諸如此􅀃者求之歷代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無攺蓋駢指在手不加力扵千鈞附贅居身非廣形扵七尺為史之體有若扵斯苟濫引它事豐其部帙以此稱慱異乎吾黨之􅀁聞陸士衡有云雖有愛而必捐善㦲斯言可謂達作者之致矣夫􅀎明彼斷限定其折中歷選自古惟蕭子顯近諸然必謂都無其累則吾未許也編次第十二昔尚書記言春秋記事以日月為逺近年世為前後用使閱之者鴈行魚貫皎然可尋至馬遷始錯綜成篇區分􅀋聚班固踵武仍加祖述扵其間則有統體不一名目相違朱紫以之混淆􅃣􅋰扵焉顛倒盖可得而言者矣尋子長之列傳也其􅀁編者惟人而已矣至扵龜筴異物不􅀋肖形而輙與黔首同科俱謂之傳不其恠乎且龜筴􅀁記全為志體向若與八書齊列而定以書名庶㡬物得其朋同聲相應者矣孟堅每一姓有傳多出附餘􅀚其事跡􅀹異者則分入它部故慱陸去病昆弟非復一篇外戚元后婦姑分為二録至如元王受封扵楚至孫戊而亡按其行事􅀁載甚寡而􅀎獨載一卷者實由向歆之助耳但交封漢始地啔列藩向居劉末職才卿士昭穆旣踈家國又别適使分楚王子孫扵高惠之世與夫荆代並編析劉向父子扵元成之間與王京共列方扵諸傳不亦􅀋乎又自古王室雖㣲天命未攺故䑓名逃債尚書周王君未繫頸且云秦國况神壐在握火德猶存而居攝建年不編平紀之末孺子主祭咸書莾傳之中遂令漢餘數􅀊湮沒無覩求之正朔不亦厚誣當漢氏之中興也更始升壇攺元寒暑三易世祖稱臣北靣誠節不􅉻旣而兵敗長安祚歸高邑兄亡弟及歷數相承作者乃抑聖公扵傳内登文叔扵紀首事等躋僖位先不窋夫東觀秉筆容􅂉謟扵當時後来􅀁修理當刋革者也蓋逐免爭捷瞻烏靡定群雄僣盗為我駈除是以史傳􅀁分眞偽有别陳勝項籍見編扵高祖之後隗囂孫述不列扵光武之前而陳壽蜀書首摽二牧次列先主以􅁇焉璋豈以蜀是偽朝遂乃不遵恒例但鵬鷃一也何大小之異哉春秋嗣子諒闇未踰年而廢者旣不成君故不别加篇目是以魯公十二惡視不預其流及秦之子嬰漢之昌邑咸亦因胡亥而得記附孝昭而􅀗聞而呉均齊春秋乃以欝林為紀事不師古何滋章之甚與觀梁唐二朝撰齊隋兩史東昏猶在而遽列和年煬帝未終而已編㳟紀原其意㫖豈不以和為梁王􅀁立㳟乃唐氏􅀁承􅀁以黜永元而尊中興顕義寧而隱大業苟欲取恱當代遂乃輕侮前朝行之一時庶叶權道播之千載未為格言尋夫本紀􅀁書列傳仍顯表志異體必不相涉􅃇史以表志之帙分扵紀傳之間降及蔚宗肇加􅁵革沈魏繼作相與因循旣而子顯齊書頴逹隋史不依范􅁼重遵班法蓋擇善而行何有逺近聞義不徙是吾憂也若乃先黃老而後六經後外戚而先夷狄老子與韓非並列賈詡將荀彧同編孫弘慱讃宜居宣武紀末宗廟迭毁枉入玄成傳終如斯舛繆不可勝紀今畧其􅀹甚者耳故不復一一而詳之稱謂第十四孔子曰唯名不可以假人又曰名不正則言不順必也正名乎是知名之折中君子􅀁急况復列之篇籍傳之不朽者耶昔夫子修春秋呉楚稱王而仍􅃇曰子此則褒貶之大體為前修之楷式也馬遷撰史記項羽僣盗而紀之曰王此則眞偽莫分為後来􅀁惑者也自兹已降訛謬相因名諱􅀁施輕重莫等至如更始中興漢室光武􅀁臣雖事業不成而歷數終在班范二史皆以劉玄為目不其慢乎古者二國爭盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝􅀒有殊大小不􅀋未聞勢竆者即為匹庶力屈者乃成㓂賊至於近古則不然當漢氏云亡天下􅂦峙論王道則曹逆而劉順語國祚則魏促而吴長但以地處凾夏人傳正朔度長挈大魏實居多若方之扵七國亦猶秦繆楚莊與文襄而並覇吴大帝可比楚莊王蜀昭烈王可比秦繆公逮作者之書事也乃􅃿吴蜀􅃅謚呼權備姓名孫盛䓁謂魚豢方於魏􅀖懸隔頓爾懲惡勸善其義安歸續以金行版蕩戎羯稱制各有國家實同王者晉世臣子黨附君親嫉彼亂華比諸群盗此皆苟徇􅀻忿忘夫至公自非坦懐愛憎無以定其得失至蕭方等始存諸國名謚僣帝者皆稱之以王此則趙猶人君加以王號􅂎用夷禮貶同子爵變通其理事在合宜小道可觀見扵蕭氏者矣古者天子廟􅃅祖有功而宗有德始自三代迄于兩漢名實相允今古共傳降及曹氏祖名多濫必無慚德其惟武王故陳夀國志獨呼武曰祖至扵文明但稱帝而已自晉已還竊􅃅者非一如康穆兩帝劉蕭二朝梁簡文兄弟元帝也兼為孝齊武成昆季孝昭也兼言宣斯􅂉承家之僻王或王國之庸主不謚虚謬為幸巳多猶曰祖宗孰云其可而史臣載削曾無辨明每有􅀁書必存廟􅃅何以申勸沮之義杜偷濫之源者乎又位乃人臣跡參王者如周之亶父季歷晉之仲逹師昭追尊建名比諸天子可也必若當􅂗所出宦官携飬帝􅃅徒加人望不愜故國志所録無異匹夫應書其人直云皇之祖考而已至如元氏􅁸於沙朔其君乃一部之酋長耳道武追崇􅀁及凡二十八君自開闢以來未之有也而魏書序紀襲其虚􅃅生則謂之帝死則謂之崩何異沭猴而冠腐鼠稱璞者矣夫歷觀自古稱謂不同縁情而作本無定凖至若諸侯無謚者戰國已上謂之今王天子見出者漢魏已後謂之少帝周衰有共和之相楚殺有郟敖之主趙佗而曰尉佗英布而曰黥布豪傑則平林新市宼賊則黃巾赤眉園綺友朋共云四皓奮建父子都稱萬石皆出於當代史臣編録無復弛張蓋取叶隨時不藉稽古及後来作者頗繤斯流亦時採新名務成篇題第音若王晉之處士寒雋沈宋之二凶索虜即其事也唯魏收逺不師古近非因俗自我作故無􅀁憲章其撰書也乃以平陽王為出帝司馬氏為僣晉桓劉已下通曰島夷夫其謟齊則輕抑􅀜右黨魏則􅀷誣江外愛憎出於方寸與奪由其筆端語必不經名惟駭物昔漢世原涉大修墳墓乃開道立表署曰南陽阡欲以繼跡京兆齊聲曹尹而人莫之肯從但云原氏阡而已故知事非􅁢當難以遵行如􅀵之苟立詭名不依故實難復形諸竹帛終罕傳於諷誦也抑又聞之帝王受命厯數相承雖舊君已沒而致敬無攺豈可等之凡庶便書之以名者乎近代文章實同兒戲有天子而稱諱者若􅁎滿劉莊之􅀋是也有匹夫而不名者若歩兵彭澤之􅀋是也史論立言理當雅正如班述之叙聖卿也而曰董公惟亮范賛之言季孟也曰隗王得士習談漢王則謂昭烈為玄徳以蜀為正綂其習氏漢􅀳春秋帝至於論中語則呼為玄徳編叙事皆謂蜀先主為昭烈裴引魏室則目文帝為曹丕夫以淫亂之臣揔隱其諱亂謂隗囂淫謂董賢正朔之後乃呼其名意好竒而輒為文逐韻而便作囂公孫述傳賛曰公孫習吏隗王得士班固哀紀賛曰宛孌董公惟亮天功隗用捨之道其例無恒但近代為史通多此失上才猶其若是而况中庸者乎今畧舉一隅以存標格云爾史通卷第四

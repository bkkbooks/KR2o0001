body:
  text: 本紀第四昔汲冢竹書是曰紀年呂氏春秋肇立紀號蓋紀者綱紀庶品網羅萬物考篇目之大者其莫過於此乎及司馬遷之著史記也又列天子行事以本紀名篇後世因之守而勿失譬夫行夏時之正朔服孔門之敎義者雖地遷陵谷時變質文而此道常行終莫之能易也然遷之以天子爲本紀諸侯爲世家斯誠讜矣但區域旣定而疆理不分遂令後之學者罕詳其義案姬自后稷至於西伯嬴自伯翳至於莊襄爵乃諸侯而名隸本紀若以西伯莊襄以上別作周秦世家持殷紂以對武王拔秦始以承周赧使帝王傳授昭然有別豈不善乎必以西伯以前其事簡約別加一目不足成篇則伯翳之至莊襄其書先成一卷而不共世家等列輒與本紀同編此尤可怪也項羽僭盜而死未得成君求之於古則齊無知衛州吁之類也安得諱其名字呼之曰王者乎春秋吳楚僭擬書如列國假使羽竊帝名正可抑同羣盜況其名曰西楚號止霸王者乎霸王者即當時諸侯諸侯而稱本紀求名責實再三乖謬蓋紀之爲體猶春秋之經繫日月以成歲時書君上以顯國統曹武雖曰人臣實同王者以未登帝位國不建元陳志權假漢年編作魏紀猶兩漢書首列秦莽之正朔也後來作者宜準於斯而陸機晉書列紀三祖直序其事竟不編年年旣不編何紀之有夫位終北面一槪人臣倘追加大號止入傳限是以弘嗣吳史不紀孫和緬求故實非無往例逮伯起之次魏書乃編景穆於本紀以戾園虛諡間厠武昭欲使百世之中若爲魚貫又紀者旣以編年爲主唯敍天子一人有大事可書者則見之於年月其書事委曲付之列傳此其義也如近代述者魏著作李安平之徒其撰魏齊二史魏彥淵撰後魏書李百藥撰北齊書於諸帝篇或雜載臣下或兼言他事巨細畢書洪纖備錄如彥淵帝紀載沙苑之捷百藥帝紀述淮南之敗是也全爲傳體有異紀文迷而不悟無乃太甚世之讀者幸爲詳焉

seq: 10
body:
  text: 序例第十孔安國有云序者所以敍作者之意也竊以書列典謨詩含比興若不先敍其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事爲宗至於表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相參風雅齊列矣迨華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以四皓爲始也嶠言辭簡質敍致溫雅味其宗旨亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜衒文彩後來所作他皆若斯如是遷固之道忽諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史所有而我書獨無世之作者以爲恥愧故上自晉宋下及陳隋每書必序課成其數蓋爲史之道以古傳今古既有之今何爲者濫觴肇迹容或可觀累屋重架無乃太甚譬夫方朔始爲客難續以賓戲解嘲枚乘首唱七發加以七章七辯音辭雖異旨趣皆同此乃讀者所厭聞老生之恆說也夫史之有例猶國之有法國無法則上下靡定史無例則是非莫準昔夫子修經始發凡例左氏立傳顯其區域科條一辨彪炳可觀降及戰國迄乎有晉年逾五百史不乏才雖其體屢變而斯文終絕唯令升先覺遠述丘明重立凡例勒成晉紀鄧孫已下遂躡其蹤史例中興於斯爲盛若沈宋之志序蕭齊之序錄雖皆以序爲名其實例也必定其臧否徵其善惡干寶范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文傷蹇躓而義甚優長斯一二家皆序例之美者夫事不師古匪說攸聞茍模楷曩賢理非可諱而魏收作例全取蔚宗貪天之功以爲己力異夫范依叔駿班習子長攘袂公行不陷穿窬之罪也蓋凡例既立當與紀傳相符案皇朝晉書例云凡天子廟號唯書於卷末依檢孝武崩後竟不言廟曰烈宗又案百藥齊書例云人有本行字者今並書其名依檢如高慎斛律光之徒多所仍舊謂之仲密明月此並非言之難行之難也又晉齊史例皆云坤道卑柔中宮不可爲紀今編同列傳以戒牝雞之晨竊惟錄皇后者既爲傳體自不可加以紀名二史之以后爲傳雖云允愜而解釋非理成其偶中所謂畫蛇而加以足反失杯中之酒也至於題目失據褒貶多違斯並散在諸篇此可得而略矣

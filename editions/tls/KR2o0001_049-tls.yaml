body:
  text: 忤時第十三孝和皇帝時中宗初謚孝和韋武弄權母媼一作娼預政士有附麗之者起家而綰朱紫予以無所傅會取擯當時原注一為中允四載不遷會天子還京師朝廷願從者眾予求番次在大駕後發日此二句後字錯置當云予求番次在後大駕發日因古本有因字逗留不去守司東都杜門卻掃凡經三載或有譖予躬為史臣不書國事而取樂丘園私自著述者由是驛召至京令專執史筆於時小人道長綱紀日壞仕於其間忽忽不樂遂與監修國史蕭至忠等諸官書求退曰僕幼聞詩禮長涉藝文至於史傳之言尤所耽悅尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謨中朝江左王陸乾孫紀其歷劉石僭號方策委於和苞張未詳宋齊應籙惇史歸於蕭沈亦有汲塚古篆禹穴殘編孟堅所亡葛洪刊其雜記休文所缺荀當作謝綽裁其拾遺凡此諸家其流蓋廣莫不賾一作頤彼泉諱淵作泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范曄為書盛言矜其贊體斯又當仁不讓庶幾前哲者焉然自策名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典此句當與正史篇撰唐書八十卷重修則天實錄三十卷參互活看貽彼後一脫後字來者何哉靜言思之其不可有五故也何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以眾功方雲絕筆唯後漢東觀大集群儒著述無主條章靡立由是伯度譏其不實公理以為可焚張衡蔡邕二子糾之於當代傅玄范曄兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿謂劉向歆每欲記一事載一言皆擱筆相視含毫不斷故頭或作首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博愛自近古此道不行史官編錄唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討沿革於臺閣簿籍難見雖使尼父再出猶且成於管窺況僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弒也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者蓋由杜彼顏面防諸請謁故也然今館中作者多士如林皆願長喙無聞同口舌倘有五始初成一字加貶言未絕口而朝野具知筆未棲毫而縉紳咸誦夫孫盛實錄一作紀實取嫉權門王劭一作王韶直書見仇貴族人之情也能無畏乎其不可三也古者刊定一史纂成一家體統各殊指歸咸別夫尚書之教也以疏通知遠為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而飾主闕斯並曩時得失之列良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隱惡十羊九牧其令難行一國三公適從何在其不可四也竊一作切以史置監修雖古無式尋其名號可得而言夫言監者蓋總領之義耳如創紀編年一作創立紀年一脫編字則年有斷限草傳敘事則事有豐約或可略而不略或應書而不書此刊削之務也屬詞比事勞逸宜均揮鉛奮墨勤惰須等某帙一訛表某篇付之此職某傳某志一作某紀某傳歸之彼官此銓配之理也斯並宜明立科條審定區域倘人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學茍且務相推避坐變炎涼徒延歲月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議安得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云歲序已淹何時輟手切一作竊以綱維不舉而督課徒勤雖威以刺骨之刑勖以懸金之賞終不可得也語曰陳力就列不能者止所以比者布懷知己歷抵舊作詆群公屢辭載筆之官願罷記言之職一作責者正為此爾抑又有所未諭古通喻聊復一二言之比奉高命令隸名修史而其職非一如張尚書崔岑二吏部鄭太常等既迫以吏道不可拘之史任以僕曹務多閑勒令專知下筆夫以惟寂惟寞乃使記事記言茍如其例則柳常侍劉秘監徐禮部等並一脫並字一作並門可張羅府無堆案何事置之度外而使各無羈束乎必謂諸賢載削非其所長以僕槍槍鉸鉸故推為首最就如斯理亦有其說何者僕少小從仕早躡通班當皇上初臨萬邦未親庶務而以守茲介直不附奸回遂使官若土牛棄同芻狗逮鑾輿西幸百寮畢從自惟官曹務簡求以留後居臺常謂朝廷不知國家於我已矣豈謂一旦忽承恩旨州司臨門使者結轍既而驅駟馬入函關排千門謁天子引賈生於宣室雖嘆其才召季布於河東反增其愧明公既位居端揆本音上聲望重臺衡飛沈屬其顧盼一作眄榮辱由其俯仰曾不上祈宸極申之以寵光僉議搢紳縻我以好爵其相見也直云史筆闕書為日已久石渠掃第思子為勞今之仰追唯此而已抑明公足下獨不聞劉炫蜀王之說乎昔劉炫仕隋為蜀王侍讀尚書牛弘嘗問之曰君王遇子其禮如何曰相期高於周孔見待下於奴僕弘不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期高於周孔酒食左右皆饜而我餘瀝不饜是見待下於奴僕也僕亦窈不自揆輕一作輒敢方於鄙宗劉炫同姓故云何者求史才則千里降追語宦途則十年不進意者得非相期高於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利如何哉當其坐嘯洛城非隱非吏惟以守愚自得寧以充詘攖心但今者黽勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施倘使士有澹雅若嚴君平清廉如段干木與僕易地而處亦將彈鋏告勞積薪為恨況僕未能免俗能不蒂讀如蠆芥於心者乎當今朝號得人國稱多士蓬山之下良直差肩蕓閣之中英奇接武僕既功虧刻鵠筆未獲麟詳此二句非不草撰者但未卒業耳徒殫太官之膳虛索長安之米乞已本職還其舊居多謝簡書請避賢路唯明公足下哀而許之至忠得書大慚無以酬答又惜其才不許解史任而宗楚客崔湜鄭愔等皆惡聞其短共仇嫉之俄而蕭宗等相次伏誅然後獲免於難

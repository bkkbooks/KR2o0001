body:
  text: 疑古第三蓋古之史氏區分有二焉一曰記言二曰記事而古人所學以言為首至若虞夏之典商周之誥仲虺周任之言史佚臧文之說此皆言也凡有游談專對獻策上書者莫不引為端緒歸其的準言則世多習知其幹事也則不然至一作乃若少果之以鳥名官陶唐之舊有以字御龍拜職夏氏之中衰也其資有後羿寒浞齊邦之始建也其君有蒲姑伯陵此皆事也斯並開國承家異聞奇事而後世學者罕傳其說唯夫博物君於或粗知其一隅事而少僻則聞者希矣此則記事之史不行而記言之書見重斷可知矣及左慶之為傳也雖義釋本經而語雜它事遂使兩漢儒者嫉之若仇故二傳大行二傳釋言為多擅名於一作後世又孔門之著錄一作述也論語專述言辭家語兼陳事業而自古學徒相授唯稱論語而已由斯而談並古人輕事重言之明效也然則上起唐堯下終秦穆其書所錄唯有百篇而書之所載以言為主至於廢興行事萬不記一語其缺略可勝道哉故令後人有言唐虞以下帝王之事來易明也案論語曰君子成人之美不成人之惡又曰成事不說原注事已成不可復解說遂事不諫原注事已遂不可復諫止既往不咎原注事已往不可復返咎又曰民可使由之不可使知之原注由用也可用而不可使知者百姓日用而不能知自此引經四處注皆全寫先儒所釋也夫聖人立教其言若是在於史籍其義亦然是以美者因其美而一作以美之雖有其惡不加一作之下同毀也惡者因其惡而惡之雖有其美不如譽也故孟子曰堯舜不勝其美桀紂不勝其惡魏文帝曰舜禹之事吾知之矣漢景帝曰言舊脫言字學者無一作不言湯武受命不為愚嘶並囊賢精鑒已有先覺而拘於禮法限以師訓雖口不能言而心知其不可者蓋亦多矣又案魯史之有春秋也外為賢者內為本國事靡洪纖動皆隱諱斯乃周公之格言然何必春秋在於六經亦皆如此故觀夫子之刊書也夏桀讓湯武王斬紂其事甚著而芟夷不存原注此事出周書案周書是孔子刪尚書之餘以成其錄也觀夫子之定禮也定禮即修春秋也以春秋為周札舊法故云然隱閔非命惡視不終而奮筆昌言云魯無篡弒觀夫子之刪詩也凡諸舊作語誤國風皆有怨刺在於魯國獨無其章原注魯多淫僻豈無刺詩蓋夫子刪去而不錄觀夫子之論語也君娶於吳是謂同姓而司敗發間對以知禮斯驗世郭作世別作聖人之飾智矜愚愛憎由已者多矣加以古文載事其詞簡約推者難詳一作該缺漏無補遂令後來學者莫究其源蒙然靡察有如聾瞽今故訐一作評其疑事以著乾篇凡有十條列之於後蓋虞書之美放勛也云克明俊或作峻下同德而陸賈新語又曰堯舜之人本作民或作臣誤比屋可封蓋因堯典成文而廣造奇說也案春秋傳云高陽高辛二氏各有才子八人謂之元凱此十六族也世濟其美不隕其名以至於堯堯不能舉帝鴻氏少吳氏顓頊氏各有不才子謂之渾沌窮奇檮杌此三族也世濟其兇增其惡名以至於堯堯不能去縉雲氏亦有不才幹天下謂之饕餮以比或訛此三族俱稱四兇而堯亦不能去斯則當堯之世小人君子比肩齊列善惡無分賢愚共貫且一訛但論語有云舜舉咎繇不仁者遠是則當咎繇未舉不仁甚多彌驗堯時群小在位者矣一脫矣字又安得謂之克明俊德比屋可封者乎其疑一也堯典序又云將遜於位讓於一少於字虞舜孔氏注曰堯知子丹朱不肖故有禪位之志案汲塚瑣語云舜放堯於平陽而書云書名缺某地地名缺有城以囚堯為號識者憑斯異說頗以禪授為疑然則觀此二書已足為證者矣而猶有所未睹也何者據山海經謂放勛之子為帝丹朱疑脫堯朱傳子句而列君君疑名字之訛於帝者得非舜雖廢堯仍立堯子俄又奪其帝者乎觀近古一脫古字有好雄奮發自號勤工或廢父而立其子或黜兄而奉其弟始則示相推戴終亦成其篡奪求諸歷代往往而有必以古方今千載一揆斯則堯之授舜其事難明謂之讓國徒虛語耳其疑二也虞書舜典又云五十載陟方乃死注云死蒼梧之野因葬焉案蒼梧者於楚則川號汨羅在漢則邑稱零桂地總百越山連五嶺人風棵劃謂文身地氣敲瘴雖使百金之子猶憚經履其途況以萬乘之君而堪巡幸其國且舜必以精華既竭形神告勞舍茲寶位如釋重負一作負重何得以垂歿之年更踐不毛之地兼復二妃不從怨曠生離萬里無依孤魂溘盡讓王高蹈豈其若是者乎歷觀自古人君廢逐若夏桀放於南巢趙嘉當作遷遷於房陵周王流彘楚帝徙郴語其艱棘未有如斯之甚者一無者字也斯則涉方之死其殆文命之志乎其疑三也汲塚書云舜放堯於平陽帶引此句蒙前條說下益為啟所誅又曰太甲殺伊尹文丁舊謬作王殺季歷凡此數事語異正經其書近出世人多不之信也案舜之放堯舊有文之殺季四字羨文無事別說足驗其情已於舊衍此字篇前舊衍後字言之詳矣此條前後並無文丁殺季之言故知本文句字多羨夫唯益與伊尹見一作受戮並一無並字於正書猶無其證推一作榷而論之如啟之誅益仍可覆也何者舜廢堯而立丹朱禹黜舜而立商均益手握機權勢同舜禹而欲因循故事坐膺天祿其事不成自貽伊咎觀夫近古篡奪桓獨不全馬仍反正若啟之誅益亦由猶通晉之殺玄乎若舜禹相代事業皆成唯益覆車伏辜夏後亦猶桓效曹馬而獨致元興晉安帝改元之禍者乎其疑四也湯誓序舊本誓誤作誥又脫序字云湯伐桀戰於鳴條又云湯放桀於南巢唯有慚德而周書殷祝篇稱桀讓湯王位雲云甸止穩括周書之文此則有異於尚書如周書之所說豈非湯既勝桀力制夏人使桀推讓歸王於己蓋欲比跡堯舜襲其高名者乎又案墨子云湯以天下讓務光而使人說曰湯欲加惡名於汝務光遂投清冷之泉而死湯乃即位無疑然則湯之飾讓偽跡甚多考墨家所言雅與周書相會一作合夫當有周字書之作本出尚書孔父截翦浮詞裁成雅誥一作語去其鄙事直云慚德豈非欲滅湯之過增桀之惡者乎其疑五也夫五經立言千載猶仰而求其前後理甚相乖何者稱周之盛也則云三分有二商紂為獨夫語殷之敗也又云紂有臣億萬人其亡流血漂杵斯則是非無準向背不同者焉又案武王為泰誓數紂過失亦猶近代之有呂相為晉絕秦陳琳為袁檄魏袁亦不直耳曹惡得無罪陳琳句謬引欲加之罪能無辭乎而後來諸子承其偽說競一作竟列紂罪有倍五經故子貢曰桀紂之惡不至是君子惡居下流班生亦云安有據婦人臨一作於朝劉向又曰世人有弒父害君桀紂不至是而天下當有歸字惡者必以桀紂為先此其自古言辛癸之罪將非厚誣者乎其疑六也微子之命篇序舊脫序字云殺武庚序云殺武庚命微子代殷後案祿父即商紂之子也屬社稷傾覆家國淪亡父首梟懸母軀分裂永言怨恥生人一作死莫二向使其侯眼事周而全軀保其妻子也仰天俯地何以為主含齒戴發何以為貌既而合謀二叔徇節三監雖君親之怨不除而臣子之誠可見考諸名教生死無慚議一訛議字為於義二字者茍以其功業不成便以頑人民為目必如是則有君若夏少康有臣若伍子胥當作申包胥向若隕仇雪怨眾敗身滅亦當隸跡醜徒編名逆黨者邪其疑七也論語曰大矣周之德也三分天下有其二猶服事殷案尚書序舊脫序字云西伯戡黎殷始咎周二句序文夫姬氏爵乃諸侯而輒行征伐結怨王室殊一作曾無愧畏此則春秋荊蠻之滅諸姬論語季氏之伐顓臾也又案某書名闕一訛其書曰朱雀云云朱雀句當有本文雲云字誤文王受命稱王云云夫天無二日地惟一人有殷猶存而王號遽立此即春秋楚及吳越僭號而陵天子也然則戡黎滅崇自同王者服事之道理不如斯亦猶近者魏司馬文王害權臣黜少帝坐加九錫行駕六馬及其歿也而荀勖猶謂之人臣以終蓋姬之事殷當比馬之臣魏必稱周德之大者不赤虛為其說乎一作設也其疑八也論語曰太伯可謂至德也已三以天下讓民無得而稱焉案呂氏春秋書名恐誤當是吳越春秋所載雲云斯則太王鐘愛厥孫將立其父太伯年居長嫡地實妨賢向若強顏茍視懷疑不去大則類衛汲之誅小則同楚逮之逐雖欲勿讓君親其立諸且太王之殂太伯來赴季歷承考遺命推讓厥昆太伯以形質已殘有辭獲免原夫毀茲玉體從彼被發者本以外絕嫌疑內釋一作懷猜忌譬雄雞自斷其尾用獲免於人犧者焉又案春秋晉士見一脫見字申主之將廢也曰為吳太伯猶有令名斯則太伯申主事如一體直以出處有異故成敗不同若夫子之論太伯也必美其因病成妍轉禍為福斯則當矣如云可渭至德者無乃謬為其譽乎其疑九也尚書金滕篇云管蔡流言公將不利於孺子左傳云周公殺管叔而放左作蔡蔡叔夫豈舊誤其不愛王室故也昭元案尚書君爽篇序云召公為保周公為師相成王為左右召公不說皆君奭序之文斯則旦行不臣之禮挾震主之威跡居疑似坐招訕謗雖奭以亞聖之德負明允之才目睹其事猶懷憤懣況彼二叔者才處中人地居下國側聞異議能不懷猜原其推戈反噬事由誤我而周公自以不咸何用左氏語遵加顯戮與大漢代之一無之字赦淮南此下一增明帝二字寬阜陵一何遠哉斯則周公於友于之一作其義薄矣而書舊作詩之所述用為美談者何哉其疑十也大抵自春秋以前尚書之世其作者述事如此今取其正經雅言理有難曉諸子異說義或可憑參而會之以相研核一作覆如異於此則無論焉夫遠古之書與近古之史非唯繁約不類固一作故亦向背皆殊何者近古之史也言唯詳備事罕甄擇使夫學者睹一邦之政則善惡相參觀一主之才而賢愚殆半至於遠古則不然夫其所錄也略舉綱維務存褒諱尋其終始隱沒者多嘗試言之向使漢魏晉宋之君生於上代一作三代非堯舜禹湯之主出於中葉俾史官易地而書各敘時事校其得失固未可量若乃輪扁稱其糟粕孔氏述其傳疑孟子曰盡信書不如無書武成之一脫之字篇吾取其二三簡一木此下有而為累文與近古同焉九字詞義未亮一木無此九字推此而言則遠古之書其妄甚矣豈比夫王沈之不實沈約之多詐若斯而已矣一作哉卷十三外篇卷十四

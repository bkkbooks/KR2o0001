front:
  text: 序傳第三十二蓋作者自敘其流出于中古乎一無乎字案屈原離騷經其首章上陳氏族下列祖考先述厥生次顯名字自敘發跡實基于此降及司馬相如始以自敘為傳然其所敘者但記自少及長立身行事而已逮于祖先所出則蔑爾無聞至馬遷又征三閭之故事放讀仿文園之近作模楷二家勒成一卷于是揚雄遵其舊轍班固酌其余波自敘之篇實煩于代雖屬辭有異而茲體無易尋馬遷史記上自軒轅下窮漢武疆宇修闊道路綿長故其自敘始于氏出重黎終于身為太史雖上下馳騁終不越史記之年班固漢書止敘西京二百年事耳其自敘也則遠征令尹起楚文王之世近錄賓戲當漢明帝之朝苞括所及一作聞逾于本書遠矣而後來敘傳非止一家竟學孟堅從風而靡施于家諜一作譜猶或可通列于國史多一作每見其失者矣然自敘之為義也茍能隱己之短稱其所長斯言不謬即為實錄而相如自序乃舊訛及記其容游臨邛竊妻卓氏以春秋所諱持為美談雖事或非虛而理無可取載之于傳不其愧乎又王充論衡之自紀也述其父祖不肖為州閭所鄙而已答以瞽頑舜神鯀惡禹圣夫自敘而言家世固當以揚名顯親為主茍無其人闕之可也至若盛矜于己而厚辱其先此何異證父攘羊學子名母必責以名教實三千之罪人也夫自媒自衒士女之丑行然則人奠我知君子不舊作所誤恥案孔氏論語有云十室之邑必有忠信不如某之好學也又曰吾每自一依經作日三省吾身為人謀而不忠乎與朋友交而不信乎又曰文王既沒文不在茲乎又曰吾之先一依經作昔者吾友嘗從事于斯矣則聖達之舊無之字立言也時亦揚露己才或托諷以見其情或選與巽通辭以顯其跡終不盱衡自伐攘袂公言且命諸門人各言一作見爾志由也不讓見嗤無禮歷觀揚雄已降其自敘也始以夸尚為宗至魏文帝傅玄陶梅恐誤或當作梅陶葛洪之徒則又逾于此者矣何則身兼自善行有微能皆剖析具言一二必載豈所謂憲章前聖謙以自牧者歟又近古人倫喜稱閥閱其蓽門寒族百代無聞而骍角挺生一朝暴貴無不追述本系妄承先哲至若儀父振鐸并為曹氏之初淳維當作始均李陵俱稱拓拔之始河內舊訛作南馬祖遷彪之說不同吳興沈先約炯先約炯一作約先後非之言一作序有異斯皆不因真律無假寧楹直據經史自成矛盾則知揚姓之寓西蜀班門之雄朔野或胄纂伯僑或家傳熊繹恐自我作故舊作古失之彌遠者矣蓋諂祭非鬼神所不歆致敬他親人斯悖德凡為敘傳宜詳此理不知則闕亦何傷乎

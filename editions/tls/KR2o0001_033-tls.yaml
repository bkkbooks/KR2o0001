body:
  text: 煩省第三十三昔荀卿有云遠略近詳舊作錄遠略近誤則知史之詳略不均其為辨舊作患誤者久矣及干令升史議歷詆諸家而獨歸美左傳云丘明能以三十卷之約括囊二百四十年之事靡有孑遺斯蓋立言之高標著作之良模也并史議原文又張世偉著班馬優劣論云遷敘三千年事五十萬言固敘二百四十年事八十萬言是班不如馬也并優劣論原文然則自古論史之煩省者咸以左氏為得史公為次孟堅為甚甚舊作非恐誤自魏晉已還年祚轉促而為其國史亦不減班書此則後來逾煩其失彌甚者矣余以為近史蕪累誠則有諸亦猶古由通古今不同勢使之然也輒求其本意略而論之何者當春秋之時諸侯力爭各閉境相拒關梁不通其有一訛言吉兇大事見知于他國者或因假道而方聞或以通一作同盟而始赴茍異于是則無得而稱魯史所書實用此道至如秦燕之據有西北楚越之大啟東南地僻界一作遠非于諸戎人罕通于上國故載其行事多有闕如且其書自宣成以前三紀而成一卷至昭襄已下數年而一作各占一篇是知國阻隔者記載一作事不詳年淺近者撰錄多備原注杜預釋例云文公已上六公書日者二百四十九宣公已下亦六公書日者四百三十二計年數略同而日數加倍此亦久遠遺落不與近同也是則傳者注書已先覺之矣此一作左丘明隨聞見而成傳何有故為簡約者哉及漢氏一作時之有天下也普天率土無思不服會計之吏歲奏于闕廷輶軒之使月一作日馳于郡國作者居府于京兆府字舊訛在京兆下征事于四方用使夷夏必聞遠近無隔故漢氏之史所以倍增于春秋也降及東京作者彌眾至如名邦大都地富才良高門甲族代一作世多髦俊邑老鄉賢競為別錄家牒宗譜各成私傳于是筆削所采聞見益多此中興之史即後漢書也所以又廣于前漢也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以謝承尤一作周悉江左京洛事缺于三吳陳壽偏委悉也一作安非蜀中巴梁語詳于二或作一非國蜀志最短何以云然恐兼壽所撰益部耆舊傳而言如宋齊受命梁陳握紀或地比禹貢一州或年方秦氏二世夫地之偏小年之窘迫適使作者采訪易洽巨細無遺耆舊可詢隱諱咸露此小國之史所以不減于大邦也夫論史之煩省者一無者字但當要一作求其事有妄載苦于榛蕪言有闕書傷于簡略斯則可矣必量世事之厚薄限篇第以多少理則不然且必謂丘明為省也若介葛辨犧于牛鳴叔孫志夢于天壓楚人教晉以拔篩城者謳華以棄甲此而畢書豈得謂之省邪且必謂漢書為煩也若武帝乞漿于柏父陳平獻計于天山長沙戲舞以請地楊仆怙寵而移關此而不錄豈得謂之煩邪由斯而言則史之煩省不中衷也不衷于一也從可知矣又古今有殊澆淳不等帝堯則天稱大書惟一篇周武觀兵孟津言成三誓伏羲止畫八卦文王加以系辭俱為大圣行事若一其豐儉不類懸隔如斯必以古方今持彼喻此如蚩尤黃帝交戰阪泉施于春秋則城濮鄢陵之事也有窮篡夏少康中興施于兩漢則王莽光武之事也夫差既滅句踐霸世施于東晉則桓玄宋祖之事也張儀馬錯為秦開蜀施于三國則鄧艾鐘會之事也而往之所載其簡如彼後一作今非之所書其審如此若使同後來于往世同後來舊作後來同誤限一概以成書將恐學者必詬其疏遺尤其率略者矣而議者茍嗤沈蕭之所記宋書南齊書事倍于孫習皆有晉史華謝之所編皆後漢書語煩于班馬此四句舊木雜亂不成語錄見篇後不亦謬乎故曰論史之煩省者但當求其事有妄載言有闕書斯則可矣必量世事之厚薄限篇第以多少理則不然其斯之謂也卷九內篇卷十

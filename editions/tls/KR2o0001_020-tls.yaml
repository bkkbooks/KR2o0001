body:
  text: 言語第二十蓋樞機之發榮辱之主言之不文行之不遠則知飾詞專對古之所重也夫上古之世人惟樸略言語難曉訓釋方通是以尋理則事簡而意深考文則詞艱而義釋若尚書載伊尹之訓皋陶之謨洛誥牧誓泰誓是也周監二代郁郁乎文大夫行人尤重詞命語微婉而多切言流靡而不淫若春秋載呂相絕秦子產獻捷臧孫諫君納鼎魏絳對戮楊干是也戰國虎爭馳說雲湧人持弄丸之辯家挾飛鉗之術劇談者以譎誑爲宗利口者以寓言爲主若史記載蘇秦合從張儀連橫范雎反間以相秦魯連解紛而全趙是也逮漢魏以降周隋而往世皆尚文時無專對運籌畫策自具於章表獻可替否總歸於筆札宰我子貢之道不行蘇秦張儀之業遂廢矣假有忠言切諫答戲解嘲其可稱者若朱雲折檻以抗憤張綱埋輪而獻直秦宓之酬吳客王融之答虜使此之小辯曾何足云是以歷選載言布諸方册自漢以下無足觀焉尋夫戰國已前其言皆可諷詠非但筆削所致良由體質素美何以核諸至如鶉賁鴝鵒童豎之謠也山木輔車時俗之諺也皤腹棄甲城者之謳也原田是謀輿人之誦也斯皆芻詞鄙句猶能溫潤若此況乎束帶立朝之土加以多聞博古之識者哉則知時人出言史官入記雖有討論潤色終不失其梗概者也夫三傳之說既不習於尚書兩漢之詞又多違於戰策足以驗氓俗之遞改知歲時之不同而後來作者通無遠識記其當世口語罕能從實而書方復追效昔人示其稽古是以好丘明者則偏摸左傳愛子長者則全學史公用使周秦言辭見於魏晉之代楚漢應對行乎宋齊之日而僞修混沌失彼天然今古以之不純真僞由其相亂故裴少期譏孫盛錄曹公平素之語而全作夫差亡滅之詞雖言似春秋而事殊乖越者矣然自咸洛不守龜鼎南遷江左爲禮樂之鄉金陵實圖書之府故其俗猶能語存規檢言喜風流顛沛造次不忘經籍若梁史載高祖在圍中見蕭正德而謂之曰啜其泣矣何嗟及矣湘東王聞世子方等見殺謂其次子方諸曰不有其廢君何以興皆其類也而史臣修飾無所費功其於中國則不然何者於斯時也先王桑梓翦爲蠻貊被髮左衽充牣神州其中辯若駒支學如郯子有時而遇不可多得而彥鸞修僞國諸史收弘撰魏周二書必諱彼夷音變成華語等楊由之聽雀如介葛之聞牛斯亦可矣而於其間則有妄益文彩虛加風物援引詩書憲章史漢遂使且渠乞伏儒雅比於元封拓跋宇文德音同於正始華而失實過莫大焉唯王宋著書敍元高時事抗詞正筆務存直道方言世語由此畢彰而今之學者皆尤二子以言多滓穢語傷淺俗夫本質如此而推過史臣猶鑑者見嫫姆多媸而歸罪於明鏡也又世之議者咸以北朝衆作周史爲工蓋賞其記言之體多同於古故也夫以枉飾虛言都捐實事便號以良直師其模楷如周太祖實名黑獺魏本索頭故當時有童謠曰狐非狐貉非貉燋朵狗子嚙斷索又曰獾獾頭團欒河中狗子破爾菀又西帝下詔駡齊神武數其罪二十諸如此事難可棄遺而周史以爲其事非雅略而不載賴君懋編錄故得權聞於後其事不傳於北齊因而埋沒者蓋亦多矣是則董狐南史舉目可求班固華嶠比肩皆是者矣近有敦煌張太素中山郎餘令並稱述者自負史才郎著孝德傳張著隋後略凡所撰今語皆依仿舊辭若選言可以效古而書其難類者則忽而不取料其所棄可勝紀哉蓋江羋罵商臣曰呼役夫宜君王廢汝而立職漢王怒酈生曰豎儒幾敗乃公事單固謂楊康曰老奴汝死自其分樂廣歎衞玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之說必播以唇吻傳諸諷誦而世人皆以爲上之二言不失清雅而下之兩句殊爲魯朴者何哉蓋楚漢世隔事已成古魏晉年近言猶類今已古者即謂其文猶今者乃驚其質夫天地長久風俗無恆後之視今亦猶今之視昔而作者皆怯書今語勇效昔言不其惑乎茍記言則約附五經載語則依憑三史是春秋之俗戰國之風亙兩儀而並存經千載其如一奚驗以今來古往質文之屢變者哉蓋善爲政者不擇人而理故俗無精粗咸被其化工爲史者不選事而書故言無美惡盡傳於後若事皆不謬言必近真庶幾可與古人同居何止得其糟粕而已

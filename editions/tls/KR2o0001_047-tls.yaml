body:
  text: 五行志雜駁第十一魯文公二年不雨班氏以為自文即位天子使叔服會葬毛伯賜命又會晉侯於戚上得天子外得諸侯沛然自大故致亢陽之禍案周之東遷日以微弱故鄭取溫麥隱三射王中肩桓五楚絕苞茅僖四觀兵問鼎宣三事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽為怪一無為怪二字求諸人事理必不然天高聽卑豈其若是也春秋成公元年無冰班氏以為其時王札子一誤作子札下同殺召伯毛伯案今春秋經札子殺毛召事在宣十五年而此言成公時未達其說下去一訛作雲無冰凡有三載春秋昭公九年陳火董仲舒以為陳夏徵舒弒君楚嚴王原注嚴即莊也皆依本書不改其字下同托欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極陰生陽故致火災案楚嚴王之入陳乃宣十一年事也始有蹊田之謗取愧叔時一訛作取譏隗叔終有封國之恩見賢尼父毒恨尤甚其理未聞又一脫又字案陳前後為楚所滅者三始宣十一年為楚嚴王所滅次昭八年為楚靈王所滅後哀十七年為楚惠王所滅今董生誤以陳次一脫次字亡之役是楚始滅之時遂妄有占候虛辨物色尋昭之上去於宣魯易四公一作主嚴之下至於靈楚經五代雖懸隔頓別而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉春秋桓公三年日有蝕之既京房易傳以為後楚嚴始稱王志無始字此用師古注語兼地千里案楚自武王僭號鄧盟是懼荊尸久舊訛又傳亦用師古注語歷文成繆三王一作主方至於嚴是則楚之為王已四世矣何得言嚴始稱之者哉又魯桓公薨後歷嚴閔釐文宣原注釐即僖皆依本書不改其字也下同凡五公而楚嚴始作霸安有桓三年日蝕而已應之者邪非唯敘事有違亦自一無自字占候失中者矣春秋釐公二十九年秋大雨雹劉向以為釐公末年公子遂專權自恣至於弒君陰脅陽之象見釐公不悟遂後二年殺公子赤立宣公案遂之立宣殺子赤也此乃文公末代輒謂僖公暮年世實世實一作年世懸殊言何倒錯春秋釐公十二年日有蝕之劉向以為是時莒滅杞案釐一無案字一無釐字十四年諸侯城緣陵公羊傳曰曷為城杞滅之孰滅之蓋徐莒也如中壘所釋當以公羊為木耳一作爾然則作然而用公羊所說不如左氏之詳左氏襄公二十九年晉平公時杞尚在雲在一作存舊贅二雲字春秋文公元年日有蝕之劉向以為後晉滅江案本經書文四年楚人滅江今云晉滅其說無取本志師古注亦云且江居南裔與楚為鄰晉處北方去江殊遠稱晉所滅其理難通左氏傳魯襄公時宋有生女子赤而毛棄之堤下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊一脫伊字戾讒太子痤一訛座而殺之原注事在襄二十六年先是大夫華元出奔晉原注事在成十五年華合比奔衛原注事在昭六年劉向似為時則有火災赤眚之明應也案災祥之作將應後來事跡之彰用符前兆如華元奔晉在成十五年參諸棄堤實難符會又合比奔衛在昭六年而與元奔一作華元奔晉俱云先是惟前與後事並相違者焉春秋成公五年梁山崩七年鼷鼠食郊牛角襄公十五年日有蝕之董仲舒劉向皆以為自此前一無前字後晉為雞澤之會諸侯盟大夫又盟後為湨音讀如葛梁之會諸侯一多不字在而大夫獨相與盟君若綴旒不得舉手又襄公十六年五月地震劉向以為是歲三月大夫盟於口梁而五月地震矣又其二十八年春無冰班固以為天下異者襄公時天下諸侯之大夫皆執國權君不能制漸將日甚原注穀梁云諸侯始失政大夫執國權又曰諸侯失政大夫盟政在大夫大夫之不臣也案春秋諸國權臣可得言者如三桓六卿田氏而已如雞澤之會口梁之盟其臣豈有若向之所說者邪然而穀梁謂一作為大夫不臣諸侯失政穀梁傳作正前注同譏其無禮自擅在茲一舉而已非是如一作知非政由寧氏祭則寡人相承世官遂移國柄若斯之失也若董劉之徒不窺左氏直憑二傳遂廣為它說多肆奓陟加切或誤作大多二字或改作侈並非言仍云君若綴旒臣將日甚何其妄也春秋昭十七年六月日有蝕之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失眾心以弒死後莫敢復責一有其字大夫六卿遂相與比周專晉國晉君還事之案一脫案字晉厲公所尸唯三郤耳何得云誅四大夫者哉又州滿既死原注今春秋左氏本皆作州蒲誤也當為州滿事具王劭續書志悼公嗣立選六官者皆獲其才一作事逐七人者盡當其罪以辱及揚干將誅魏絳覽書後悟引愆授職此則生殺在已寵辱自由故能申五利以和戎馳三駕以挫楚威行夷夏霸復文襄而云不復責大夫何厚誣之甚也自昭公謂晉昭公已降晉政多門如以君事臣居下僭上者此乃因昭之失漸至陵夷匪由懲厲之拭自取淪辱也豈可輒持彼後事用誣先代者乎哀公十三年十一月有星孛於一無於字東方董仲舒劉向以為周之十一月夏九月日在氏出東方者軫角亢也或曰角亢大國之一無之字象為齊晉也其後田氏篡齊六卿分晉案星孛之後二年春秋之經盡矣又十一年左氏之傳盡矣自傳盡後八十二年齊康公為田和所滅又七年晉靜公為韓魏趙所滅上去星孛之歲皆出百餘年辰象所纏氛祲所指著一作共相感應何太疏闊者哉且當春秋既終之後左傳未盡之前其間衛弒君越滅吳魯遜越舊衍雲云二字賊臣逆子破家亡國者多矣此正得東方之象大國之徵何故舍而不述遠求他代者乎又範與中行早從殄滅智入戰國繼踵云亡輒與三晉連名總以六卿為目殊為謬也尋斯失所起可以意惻何者二傳所引事終西狩獲麟左氏所書語連趙襄滅智漢代學者唯讀二傳不觀左氏故事有不周言多脫略且春秋之後戰國之時史官闕書年祀難記而學者遂疑篡齊分晉時與魯史相鄰故輕引災祥用相符會白圭之玷何其甚歟春秋釐公三十三年十二月隕霜不殺草其下劉向占牽及三家逐昭公之文成公五年梁山崩劉向占亦及三家逐魯昭七年鼷鼠食郊牛角劉向以似脫為字其後三家逐魯昭公卒死於外之象單述一占括上三災案乾侯之出事由季氏孟叔二孫本所不預況昭子以納君不遂發憤而卒論其義烈道貫幽明定為忠臣猶且無愧編諸逆黨何乃厚誣夫以罪由一家而兼雲二族以此題目何其濫歟左氏傳昭公十九年龍鬥於鄭時門之外洧淵劉向以為近龍孽也鄭小國攝乎晉楚之間重以強吳鄭當其沖不能修德將斗三國以自危亡是時子產任政內惠於民外善辭令以交三國鄭卒亡患此能以德銷災之道也案昭之十九年晉楚連盟干戈不作吳雖強暴未攏諸華鄭無外虞非子產之力也又吳為遠國僻在江於必略中原當以楚宋為始鄭居河潁地匪夷庚謂當要沖殊為乖角求諸地理不其爽歟春秋昭公十五年六月日有蝕之董仲舒以為時宿在畢晉國象也又云舊作雲云誤日比再蝕其事在春秋後故不載於經案自昭十五舊作四誤年迄於獲麟之歲其間日蝕復有九舊誤七下同焉事例本經披文立驗安得云再蝕而已又在春秋之後也且觀班志編此九蝕其八舊誤六皆載董生所占復不得言董以事後春秋故不存編錄再思其語三覆所由斯蓋孟堅之誤非仲舒之罪也春秋昭公九年陳火劉向以為先是陳侯之弟招殺陳太子偃師楚因滅陳春秋不與蠻夷滅中國故復書陳火也案楚縣中國以為邑者多矣如邑有宜見於經者豈可不以楚為名者哉蓋當斯時陳雖暫亡尋復舊國故仍取陳號不假楚名獨不見鄭裨灶之說乎裨灶之說一脫此五字斯災也曰五年陳將復封封五十二年而遂亡此其效也一脫此四字自斯而後若顓頊之墟宛丘之地如有應書於國史者一無者字豈可復謂之陳乎卷九外篇卷二十

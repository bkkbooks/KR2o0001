body:
  text: 辨職第三十五夫設官分職佇績課能欲使上無虛授一作稱下無虛受其難矣哉昔漢文帝幸諸將營而目周亞夫為真將軍嗟乎必於史職求真求真二字或作求其若之一作求其若此斯乃特一無特字為難遇者矣史之為務厥途有三焉何則彰善貶惡不避強御若晉之董狐齊之南史此其上也秉直者編次勒成鬱為不朽若魯之丘明漢之子長此其次也勒巨冊者高才博學名重一時若周之史佚楚之倚相此其下也徒多聞者茍三者並闕復何為者哉昔魯叟之修春秋也不藉三桓之勢漢臣之著史記也無假七貴之權而近古每有撰述必以大臣居首案晉起居注載康帝詔盛稱著述任重理藉親賢或誤覽遂以武陵王領秘書監尋武陵才非河獻河間獻王識異淮南而輒以彼藩翰董斯邦籍求諸稱職無聞焉爾既而齊撰禮書舊作國史和士開總知唐修本草徐世績監統夫使闢陽長信影和士開指馬鄭舊作南董亦因國史相承而誤之前周勃張飛影徐世績彈壓桐雷之右斯亦怪矣大抵監史為難斯乃尤之尤一少之尤二字者若使直若南史才若馬遷精勤不懈若揚子云諳識故事若應仲遠兼斯具美督彼群才使夫一無夫字載言記事藉為模楷搦管操觚歸其儀一作準的斯則可矣但今之從政則不然凡屠斯職者必恩幸貴臣凡庸賤品飽食安步坐嘯畫諾若斯而已矣夫人既不知善之為善則亦不知惡之為惡故凡所引進皆非其才或以勢利見升或以干祈取一作致擢遂使當官效用江左以不樂為謠拜職辨名洛中以不閑為說言之可為大噱一作笑可為長嘆也曾試論之世之從仕者若使之為將也而才無韜略使之為吏也而術靡循良使之屬文也而匪閑於辭賦使之講學也而不習於經典斯則負乘致寇悔吝旋及雖五尺童兒猶知調笑者矣唯夫修史者則不然或當官卒歲竟無刊述而人莫之省一作知也或輒不自揆輕弄筆端而人莫之見也兩人字仍帶領局者由斯而言彼史曹者崇扃峻字深附九重雖地處禁中而人同方外可以養拙可以藏愚繡衣直指所不能繩強項申威所不能及斯固素餐一作食之窟宅尸祿之淵藪也凡有國有家者問事於斯職哉昔子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮又語云雖無老成人尚有典刑觀歷代之置史臣有同嬉戲而竟不廢其職者蓋存夫愛禮吝彼典刑者乎昔丘明之修傳也以避時難子長之立記也藏於名山班固之成書也出自家庭陳壽之草一作為志也創於私室然則古來賢俊立言垂後何必身居廨宇跡參僚屬而後成其事乎是以深識之上知其若斯退居清靜杜門不出成其一家獨斷而已豈與夫冠猴獻狀評議其得失者哉

body:
  text: 疑古第三總十二條蓋古之史氏區分有二焉一曰記言二曰記事而古人所學以言為首至若虞夏之典商周之誥仲虺周任之言史佚臧文之説凡有遊談專對獻䇿上書者莫不引為端緒歸其的凖其於事也則不然至若少昊之以鳥名官陶唐之以御龍拜職夏氏之中衰也其盜有后羿寒浞齊邦之始建也其君有蒲姑伯陵斯並開國承家異聞竒事而後世學者罕傳其說唯夫博物君子或粗知其一隅此則記事之史不行而記言之書見重斷可知矣及左氏之為傳也雖義釋本經而語雜他事遂使兩漢儒者嫉之若讎故二傳大行擅名後世又孔門之著述也論語專述言辭家語兼陳事業而自古學徒相授唯稱論語而已由斯而談並古人輕事重言之明效也然則上起唐堯下終秦繆其書所録唯有百篇而書之所載以言為主至於廢興行事萬不記一語其缺略可勝道哉故令後人有言唐虞以下帝王之事未易明也按論語曰君子成人之美不成人之惡又曰成事不說事已成不可復解説遂事不諫事已遂不可復諫止既往不咎事已往不可復追咎又曰民可使由之不可使知之由用也可用而不可使知者百姓日用而不能知自此引􅀴四處注皆全寫先儒所釋也夫聖人立教其言若是在於史籍其義亦然是以美者因其美以美之雖有其惡不之毁也之一作加惡者因其惡而惡之雖有其美不之譽也之一作加故孟子曰堯舜不勝其美桀紂不勝其惡魏文帝曰舜禹之事吾知之矣漢景帝曰學者不言湯武受命不為愚斯並曩賢精鑒已有先覺而拘於禮法限以師訓雖口不能言而心知其不可者蓋亦多矣又按魯史之有春秋也外為賢者内為本國事靡洪纎動皆隱諱斯乃周公之格言然何必春秋在於六經亦皆如此故觀夫子之刋書也夏桀讓湯武王斬紂其事甚著而芟夷不存此事出周書案周書是孔子剛尚書之餘以成其録也觀夫子之定禮也隱閔非命惡視不終而奮筆昌言云魯無簒弑觀夫子之刪詩也凡語國風皆有怨刺在於魯國獨無其章魯多淫僻豈無刺詩蓋夫子刪去而不録觀夫子之論語也君娶於吳是謂同姓而司敗發問對以知禮斯驗聖人之飾智矜愚愛憎由己者多矣加以古文載事其詞簡約推者難詳缺漏無補遂令後來學者莫究其源蒙然靡察有如聾瞽今故訐其疑事以著於篇凡有十條列之於後其一條蓋虞書之美放勛也云克明峻德而陸賈新語又曰堯舜之臣比屋可封蓋因堯典成文而廣造竒説也按春秋傳云髙陽髙辛二氏各有才子八人謂之元凱此十六族也世濟其美不隕其名以至於堯堯不能舉帝鴻氏少昊氏顓頊氏各有不才子謂之渾沌窮竒檮杌此三族也世濟其凶増其惡名以至於堯堯不能去縉雲氏亦有不才子天下謂之饕餮以比三族俱稱四凶而堯亦不能去斯則當堯之世小人君子比肩齊列善惡無分賢愚共貫但論語有云舜舉咎繇不仁者遠是則當咎繇未舉不仁甚多彌驗堯時群小在位者矣又安得謂之克明峻德比屋可封者乎其疑一也其二條堯典序又云將遜于位讓于虞舜孔氏注曰堯知子丹朱不肖故有禪位之志按汲冢𤨏語云舜放堯於平陽而書云某地有城以囚堯為號識者憑斯異説頗以禪授為疑然則觀此二書已足為證者矣而猶有所未覩也何者據山海經謂放勛之子為帝丹朱而列君於帝者得非舜雖廢堯仍立堯子俄又奪其帝者乎觀近有姦雄奮發自號勤王或廢父而立其子或黜兄而奉其弟始則示相推戴終亦成其簒奪求諸厯代往往而有必以古方今千載一揆斯則堯之授舜其事難明謂之讓國徒虛語耳其疑二也其三條虞書舜典又云五十載陟方乃死注云死蒼梧之野因葬焉按蒼梧者於楚則川號汨羅在漢則邑稱零桂地總百越山連五嶺人風婐劃地氣熇瘴雖使百金之子猶憚經履其途況以萬乘之君而堪廵幸其國且舜必以精華既竭形神吿勞捨兹寶位如釋重負何得以垂殁之年更踐不毛之地兼復二妃不從怨曠生離萬里無依孤魂溘盡讓王髙蹈豈其若是者乎厯觀自古人君廢逐若夏桀放於南巢趙嘉遷於房陵周王流彘楚帝徙郴語其艱棘未有如斯之甚也斯則陟方之死其殆文命之志乎其疑三也其四條汲冡書云舜放堯於平陽益為啓所誅又曰太甲殺伊尹文王殺季歴凡此數事語異正經其書近出世人多不之信也按舜之放堯文之殺季無事别説足驗其情已於此篇前後言之詳矣夫惟益與伊尹受戮並於正書猶無其證㩁而論之如啓之誅益仍可覈也何者舜廢堯而立丹朱禹黜舜而立商均益手握機權勢同舜禹而欲因循故事坐膺天禄其事不成自貽伊咎觀夫近古簒奪桓獨不全馬仍反正若啓之誅益亦猶晉之殺元乎若舜禹相代事業皆成雖益覆車伏辜夏后亦猶桓効曹馬而獨致元興之禍者乎其疑四也其五條湯誥云湯伐桀戰于鳴條又云湯放桀於南巢唯有慙德而周書殷祀篇稱桀讓湯王位云云此則有異於尚書如周書之所説豈非湯既勝桀力制夏人使桀推讓歸王於己蓋欲比跡堯舜襲其髙名者乎又按墨子云湯以天下讓務光而使人説曰湯欲加惡名於汝務光遂投清冷之泉而死湯乃即位無疑然則湯之飾讓偽跡甚多考墨家所言雅與周書相㑹夫書之作本出尚書孔父截剪浮詞裁成雅語去其鄙事直云慙德豈非欲滅湯之過増桀之惡者乎其疑五也其六條夫五經立言千載猶仰而求其前後理甚相乖何者稱周之盛也則云三分有二商紂為獨夫語殷之敗也又云紂有臣億萬人其亡流血漂杵斯則是非無凖向背不同者焉又按武王為泰誓數紂過失亦猶近代之有呂相為晉絶秦陳琳為袁檄魏欲加之罪能無辭乎而後來諸子承其偽説竟列紂罪有倍五經故孔子曰桀紂之惡不至是君子惡居下流班生亦云安有據婦人臨朝劉向又曰世人有弑父害君桀紂不至是而天下惡者皆以桀紂為先此其自古言辛癸之罪將非厚誣者乎其疑六也其七條微子之命篇云殺武庚按禄父即商紂之子也屬社稷傾覆家國淪亡父首梟懸母軀分裂永言怨恥生死莫二向使其侯服事周而全軀保其妻子也仰天俯地何以為生含齒載髮何以為貌既而合謀二叔徇節三監雖君親之怨不除而臣子之誠可見考諸名教生死無慙議者茍以其功業不成便以頑人為目必如是則有君若夏少康有臣若伍子胥向若隕讎雪怨衆敗身滅亦當𨽻跡醜徒編名逆黨者邪其疑七也其八條論語曰大矣周之德也三分天下有其二猶服事殷按尚書云西伯戡黎殷始咎周夫姬氏爵乃諸侯而輙行征伐結怨王室殊無媿畏此則春秋荆蠻之滅諸姬論語季氏之伐顓㬰也又按其書曰朱雀云云文王受命稱王云云夫天無二日地惟一人有殷猶存而王號遽立此即春秋楚及吳越僭號而陵天子也然則戡黎滅崇自同王者服事之道理不如斯亦猶近者魏司馬文王害權臣黜少帝坐加九錫行駕六馬及其沒也而荀朂猶謂之人臣以終蓋姬之事殷當比馬之臣魏必稱周德之大者不亦虛為其說乎其疑八也其九條論語曰太伯可謂至德也已三以天下讓民無得而稱焉按呂氏春秋所載云云斯則太王鍾愛厥孫將立其父太伯年居長嫡地實妨賢向若强顔茍視懷疑不去大則類衛伋之誅小則同楚建之逐雖欲勿讓君親其立諸且太王之殂太伯來赴季厯承考遺命推讓厥昆太伯以形質已殘有辭獲免原夫毁兹玉體從彼被髮者本以外絶嫌疑内釋猜忌譬雄雞自斷其尾用獲免於人犧者焉又按春秋晉士蒍申生之將廢也曰為吳太伯猶有令名斯則太伯申生事如一體直以出處有異故成敗不同若夫子之論太伯也必美其因病成妍轉禍為福斯則當矣如云可謂至德者無乃謬為其譽乎其疑九也其十條尚書金縢篇云管蔡流言公將不利於孺子左傳云周公殺管叔而放蔡叔夫豈不愛王室故也按尚書君奭篇序云召公為保周公為師相成王為左右召公不說斯則旦行不臣之禮挾震主之威跡居疑似坐招訕謗雖奭以亞聖之德負明允之才目覩其事猶懷憤懣況彼二叔者才處中人地居下國側聞異議能不懷猜原其推戈反噬事由誤我而周公自以不諴遽加顯戮與夫漢代赦淮南明帝寛阜陵一何逺哉斯則周公於友于之義薄矣而詩之所述用為美談者何哉其疑十也其十一條大抵自春秋以前尚書之世其作者述事如此今取其正經雅言理有難曉諸子異説義或可憑叅而㑹之以相研覆如異於此則無論焉夫逺古之書與近古之史非唯繁約不類故亦向背皆殊何者近古之史也言唯詳備事罕甄擇使夫學者覩一邦之政則善惡相參觀一主之才而賢愚殆半至於逺古則不然夫其所録也略舉綱維務存褒諱尋其終始隱没者多嘗試言之向使漢魏晉宋之君生於上代堯舜禹湯之主出於中葉俾史官易地而書各敘時事校其得失固未可量若乃輪扁稱其糟粕孔氏述其傳疑孟子曰盡信書不如無書武成篇吾取其二三簡推此而言則逺古之書其妄甚矣豈比夫王沈之不實沈約之多詐若斯而已哉其十二條惑經第四總二十一

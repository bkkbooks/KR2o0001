body:
  text: 論贊第九春秋左氏傳每有發論假君子以稱之二傳云公羊子榖梁子史記云太史公既而班固曰讚荀恱曰論東觀曰序謝承曰詮陳夀曰評王隱曰議何法盛曰述揚雄曰譔劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號史官所撰通稱史臣其名萬殊其義一揆必取便於時則總歸論焉夫論者所以辯疑惑釋凝滯若愚智共了固無俟商㩁邱明君子曰者其義實在於斯司馬遷始限以篇終各書一論必理有非要則強生其文史論之煩實萌於此夫擬春秋以成史持論尤宜闊略其有本無疑事輒設論以裁之此皆徇筆端茍􅃷文彩嘉辭美句寄諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡泊無味承祚懦緩不切賢才間出隔世同科孟堅辭惟温雅理多愜當其尤美者有典誥之風翩翩弈弈良可詠也仲豫義理雖長失在繁富自茲以降流宕忘返大扺皆華多於實理少於文鼓其雄辭誇其儷事必擇其善者則干寳范曄裴子野是其最也沈約臧榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若袁彦伯之務飾𤣥言謝靈運之虚張高論玉巵無當曽何足云王邵志在簡直言兼鄙野茍得其理遂忘其文觀過知仁斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛於壯夫服綺紈於高士者矣史之有論也蓋欲事無重出省文可知如太史公曰觀張良貌如美婦人耳項羽重瞳豈舜苗裔此則别加他語以補書中所謂事無重出者也又如班固贊曰萬石君之為父浣衣君子非之楊王孫袒葬賢於秦始皇逺矣此則片言如約而諸義甚備所謂省文可知也及後來讚語之作多録紀傳之言其有所異唯加文飾而已至於甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷序傳後歴寫諸篇各叙其意既而班固變為詩體號之曰述范曄改彼述名呼之以贊尋述贊為例篇有一章事多者則約之以使少理小者則張之以令大名實多爽詳略不同且欲觀人之善惡史之褒貶葢無假於此也然固之總述合在一篇使其條貫有序歴然可閱蔚宗後書實同班氏乃各附本事書於卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北史蕭子顯李百藥大唐新修晉史皆依范書誤本篇終有贊夫每卷立論其煩已多而嗣論以贊為黷彌甚亦有文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言茍撰史若斯難與議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈誼范曄之虚美隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故略陳梗槩一言以蔽之序例第十孔安國有云序者所以序作者之意也竊以書列典謨詩含比興若不先序其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事為宗至於表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相叅風雅齊列矣逮華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以四皓為始也嶠言辭簡質叙致温雅味其宗㫖亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜􅃷文彩後來所作他皆若斯於是遷固之道忽諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史所有而我書獨無世之作者以為耻愧故上自晉宋下及陳隋每書必序課成其數葢為史之道以古傳今古既有之今何為者濫觴肇跡容或可觀累屋重架無乃太甚譬夫方朔始為客難續以賓戲解嘲枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者所厭聞老生之恒說也夫史之有例猶國之有法國之無法則上下靡定史之無例則是非莫凖昔夫子修經始發凡例左氏立傳顯其區域科條一辨彪炳可觀降及戰國迄乎有晉年逾五百史不乏才雖其體屢變而斯文終絶唯令昇先覺逺述邱明重立凡例勒成晉紀鄧孫已下遂躡其蹤史例中興於斯為盛若沈宋之志序蕭齊之序録雖皆以序為名其實例也必定其臧否徵其善惡干寳范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文傷蹇躓而義甚優長斯一二家皆序例之美者夫事不師古匪說攸聞茍模楷曩賢理非可諱而魏収作例全取蔚宗貪天之功以為已力異夫范依叔駿班習子長攘袂公行不䧟穿窬之罪也葢凡例既立當與紀傳相符按唐朝晉書例云凡天子廟號惟書於卷末依撿孝武崩後竟不言廟曰烈宗又按百藥齊書例云人有本字行者今並書其名依撿如高愼斛律光之徒多所仍舊謂之仲宻明月此並非言之難行之難也及晉齊史例皆云坤道卑柔中宮不可為紀今編同列傳以戒牝雞之晨切惟録皇后者既為傳體自不可加以紀名二史之以后為傳雖云允惬而解釋非理成其偶中所謂畫蛇而加足反失杯中之酒也至於題目失據褒貶多違斯並散在諸篇此可得而略矣題目第十一上古之書有三墳五典八索九邱其次有春秋尚書檮杌志乘自漢已下其流漸繁大扺史名多以書記紀略為主後生祖述各從所好沿革相因循環遞習葢區域有限莫踰於此焉至孫盛有魏氏春秋孔衍有隋尚書陳夀王邵曰志何之元劉璠曰典此又好奇厭俗習舊捐新雖得稽古之宜未得從時之義㩁而論之其編年月者謂之紀列記傳者謂之書取順於時斯為最也夫名以定體為實之賓茍失其途有乖至理按呂陸二氏呂不韋陸賈各著一書惟次篇章不繫時月此乃子書雜記而皆號曰春秋魚豢姚察著魏梁二史巨細畢載蕪累甚多而俱牓之以略考名責實奚其爽歟若乃史傳雜篇區分類聚隨事立號諒無恒規如馬遷撰皇后傳而以外戚命章按外戚慿皇后以得名猶宗室因天子而顯稱也若編皇后而曰外戚傳則書天子而曰宗室紀可乎班固撰人表以古今為目尋其所載也皆自秦而徃非漢之事古誠有之今則安在子長史記别剙八書孟堅既以漢為書不可更標書號改書為志義在互文而何氏中興易志為記此則貴於革舊未見其能夫戰爭方殷雄雌未決則有不奉正朔自相君長必國史為傳宜别立科條至如陳項諸雄寄編漢籍董袁羣賊附列魏志既同臣子之例孰辨彼此之殊惟東觀以平林下江諸人列為載記賴後來作者莫之遵効逮新晉始以十六國主持載記表名可謂擇善而行巧於師古者矣觀夫舊史列傳題卷靡恒文少者則具出姓名若司馬相如東方朔是也字煩者惟書姓氏若毋將葢陳衞諸葛傳是也必人多而姓同者則結定其數若二袁四張二公孫傳是也如此摽格足為詳審至范曄舉例始全錄姓名歴短行於卷中叢細字於摽外其子孫附出者注於祖先之下乃類俗之文桉孔目藥草經方煩碎之至孰過於此切以周易六爻義存象内春秋萬國事具傳中讀者硏尋篇終自曉何必開帙解帶便令昭然滿目也自茲以降多師蔚宗魏収因之則又甚矣其有魏世隣國編於魏史者於其人姓名之上又列之以邦域申之以職官至如江東帝王則云僣晉司馬叡島夷劉裕河西酋長則云私置涼州牧張實私署涼王李暠此皆篇中所具又於卷首具列必如收意使其撰兩漢書三國志題諸盜賊傳亦當云僣西楚項羽偽寧朔王隗囂自餘陳涉張步劉璋袁術其位號一二具言無所不盡也葢法令滋章古人所愼若范魏之裁篇目可謂滋章之甚者乎茍忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣斷限第十二夫書之立約其來尚矣如尼父之定虞書也以舜為始而云粤若稽古帝堯邱明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有沿革遂相交互事勢當然非為濫軼也過此已徃可謂狂簡不知所裁者焉又子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴所出起乎司馬氏按馬記以史制名班書持漢標目史記者載數千年之事無所不容漢書者紀十二帝之時有限斯極固既分遷之記判其去取紀傳所存惟留漢日表志所録乃盡犧年舉一反三豈其若是膠柱調瑟不亦繆歟但固之踳駁既徃不諫而後之作者咸習其途宋史則上括魏朝隋書則仰包梁代求其所書之事得十一於千百一成其例莫之敢移永言其理可為歎息當魏武乘時撥亂電掃羣雄鋒鏑之所交網羅之所及者葢惟二袁劉呂而已卓進鴆行弑燃臍就戮總關王室不涉覇圖而陳夀國志引居傳首夫漢之有董卓猶秦之有趙高昔車令之誅既不列漢史何太師之斃遂獨刋於魏書乎兼復臧洪陶謙劉虞孫讃生於季末自相吞噬其於曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見他記則無宜重述故子嬰降沛其詳取驗於秦紀伯符死漢其事斷入於呉書沈録金行上覊劉主魏刋水運下列高王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左既承正朔斥彼魏胡故氐羌有録索虜成傳魏本出於雜種竊亦自號真君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比於羣盜盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之於傳何厚顔之甚邪又張李諸姓據有涼蜀其於魏也校年則前後不接論地則參商有殊何預魏氏而横加編載夫尚書者七經之冠冕百氏之襟袖凡學者必先精此書次覽羣籍譬夫行不由徑非所聞焉修國史者若旁採異聞用成博物斯則可矣如班書地理志首遂全寫禹貢一篇降為後書持續前史葢以水濟水牀上施牀徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏所載惟録其章名如地理為書論自古風俗至於夏世宜云禹貢已詳何必重述古文益其辭費也若夷狄本係種落所興北貊起自淳維南蠻出於槃瓠高句麗以鱉橋獲濟吐谷渾因馬鬭徙居諸如此說者求之歴代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無改葢駢指在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引他事豐其部帙以此稱博異乎吾黨之所聞陸士衡有云雖有愛而必捐善哉斯言可謂達作者之致矣夫能明彼斷限定其折中歴選自古惟蕭子顯近諸然必謂都無其累則吾未之許也編次第十三昔尚書記言春秋記事以日月為逺近年世為前後用使閱之者雁行魚貫皎然可尋至馬遷始錯綜成篇區分類聚班固踵武仍加祖述於其間則有統體不一名目相違朱紫以之混淆冠屨於焉顛倒葢可得而言者矣尋子長之列傳也其所編者惟人而已矣至於龜筴異物不類肖形而輒與黔首同科俱謂之傳不其怪乎且龜筴所記全為志體向若與八書齊列而定以書名庶幾物得其朋同聲相應者矣孟堅每一姓有傳多附出餘親其事跡尤異者則分入他部故博陸去病昆弟非復一篇外戚元后婦姑分為二録至如元王受封於楚至孫戊而亡按其行事所載甚寡而能獨載一卷者實由向歆之助耳但交封漢始地起列藩向居劉末職纔卿士昭穆既疎家國又别適使分楚王子孫於高惠之世與荆代並編析劉向父子於元成之間與王京共列方於諸傳不亦類乎又自古王室雖微天命未改故臺名逃債尚曰周王君未繫頸且云秦國況神璽在握火徳猶存而居攝建年不編平紀之末孺子主祭咸書莽傳之中遂令漢餘數歳湮没無覩求之正朔不亦厚誣當漢氏之中興也更始升壇改元寒暑三易世祖稱臣北面誠節不虧既而兵敗長安祚歸高邑兄亡弟及厯數相承作者乃抑聖公於傳内登文叔於紀首事等躋僖位先不窋夫東觀秉筆容或諂於當時後來所修理當刋革者也葢逐兔爭捷瞻烏靡定羣雄僣盜為我驅除是以史傳所分眞偽有别陳勝項籍見編於高祖之後隗囂孫述不列於光武之前而陳夀蜀書首標二牧次列先主以繼焉璋豈以蜀是偽朝遂乃不遵恒例但鵬鷃一也何大小之異哉春秋嗣子諒闇未踰年而廢者既不成君故不别加篇目是以魯公十二惡視不預其流及秦之子嬰漢之昌邑咸亦因胡亥而得記附孝昭而獲聞而呉均齊春秋乃以鬱林為紀事不師古何滋章之甚與觀梁唐二朝撰齊隋兩史東昏猶在而遽列和年煬帝未終而已編恭紀原其意㫖豈不以和為梁主所立恭乃唐氏所承所以黜末元而尊中興顯義寧而隱大業茍欲取恱當代遂乃輕侮前朝行之一時庶叶權道播之千載寧為格言寧一作未尋夫本紀所書資傳乃顯表志異體必不相涉舊史以表志之帙介於紀傳之間降及蔚宗肇加釐革沈魏繼作相與因循既而子顯齊書穎達隋史不依范例重遵班法蓋擇善而行何有逺近聞義不徙是吾憂也若乃先黄老而後六經後外戚而先夷狄老子與韓非並列賈詡將荀彧同編孫𢎞傳讃宜居宣武紀末宗廟迭毁枉入𤣥成傳中如斯舛謬不可勝紀今畧其尤甚者耳故不復一二而詳之稱謂第十四孔子曰唯名不可以假人又曰名不正則言不順言不順云云必也正名乎是知名之折中君子所急况復列之篇籍傳之不朽者耶昔夫子修春秋呉楚稱王而仍舊曰子此則褒貶之大體為前修之楷式也馬遷撰史記項羽僣盜而紀之曰王此則眞偽莫分為後來所惑者也自兹已降訛謬相因名諱所施輕重莫等至如更始中興漢室光武所臣雖事業不成而厯數終在班范二史皆以劉𤣥為目不其慢乎古者二國爭盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝負有殊大小不類未聞勢窮者即為匹庶力屈者乃成㓂賊也至於近古則不然當漢氏云亡天下鼎峙論王道則曹逆而劉順語國祚則魏促而呉長但以地處函夏人傳正朔度長挈大魏實居多二方之於上國亦猶秦繆楚莊與文襄而並覇蜀昭烈主可比秦繆公呉大帝可比楚莊王逮作者之書事也乃没呉蜀號諡呼權備姓名謂魚豢孫盛等方於魏邦懸隔頓爾懲惡勸善其義安歸續以金行版蕩戎羯稱制各有國家實同王者晉世臣子黨附君親嫉彼亂華比諸羣盜此皆茍徇私忿忘夫至公自非坦懐愛憎無以定其得失至蕭方等始存諸國名諡僣帝者皆稱之以王此則趙猶人君加以王號把用夷禮貶同子爵變通其理事在合宜小道可觀見於蕭氏者矣古者天子廟號祖有功而宗有徳始自三代迄於兩漢名實相允今古共傳降及曹氏祖名多濫必無慚徳其為武王故陳夀志獨呼武曰祖至於文明但稱帝而已自晉以還竊號者非一如康穆兩帝劉蕭二明梁簡文兄弟兼謂孝元帝也齊武成昆季兼言宣孝昭也斯或承家之僻王或亡國之庸主不諡靈謬為幸巳多猶曰祖宗孰云其可而史臣載削曾無辨明每有所書必存廟號何以申勸沮之義杜渝濫之源者乎又位乃人臣跡參王者如周之亶父季歴晉之仲達師昭追尊建名比諸天子可也必若當塗所出宦官擕養帝號徒加人望不愜故國志所錄無異匹夫應書其人直云皇之祖考而已至如元氏起於邊朔邊一作沙其君乃一部之酋長耳道武追崇所及凡二十八君自開闢以來未之有也而魏書序紀襲其虚號生則謂之帝死則謂之崩何異沐猴而冠腐鼠稱璞者矣夫歴觀自古稱謂不同縁情而作本無定凖至若諸侯無諡者戰國已上謂之今王天子見黜者漢魏以後謂之少帝周衰有共和之相楚殺有夾敖之主趙他而曰尉他英布而曰黥布豪傑則平林新市冦賊則黄巾赤眉園綺友朋共云四皓奮建父子都稱萬石凡此諸名皆出於當代史臣編録無復弛張葢取叶隨時不藉稽古及後來作者頗慕斯流亦時採新名列成篇題音第若王晉之十士寒雋沈宋之二凶索虜即其事也唯魏収逺不師古近非因俗自我作故無所憲章其撰魏書也乃以平陽王為出帝司馬氏為僣晉桓劉已下通曰島夷夫以諂齊則輕抑關右黨魏則深誣江外愛憎出於方寸與奪由其筆端語必不經名惟駭物昔漢世原涉大修墳墓乃開道立表署曰南陽阡欲以繼跡京兆齊聲曹尹而人莫之肯從但云原氏阡而已故知事非允當難以遵行如収之茍立詭名不依故實雖復䢴諸竹帛蜀本作形宋本作䢴䢴古與刋同終靡傳於諷誦也蜀本作罕宋本作靡抑又聞之帝王受命厯數相承雖舊君已没而致敬無改豈可等之凡庶便書之以名者乎近代文章實同兒戲有天子而稱諱者若姬滿劉莊之類是也有匹夫而不名者若步兵彭澤之類是也史論立言理當雅正如班述之叙聖卿也而曰董公惟亮范贊之言季孟也止曰隗王得士習談漢主則謂昭烈為𤣥徳習氏漢晉春秋以蜀為正統其編目叙事皆謂蜀先主為昭烈皇帝至於論中語則呼為𤣥徳裴引魏室則目文帝為曹丕夫以滛亂之臣忽隱其諱滛謂董賢亂謂隗囂正朔之后反呼其名意好奇而輒為文逐韻而便作班固哀紀贊曰宛孌董公惟亮天功隗囂公孫述傳贊曰公孫習吏隗王得士用捨之道其例無恒近代為史通多此失上才猶且若是而況中庸者乎今略舉一隅以存標格云爾史通卷四欽定四庫全書史通卷五唐劉知幾撰内篇

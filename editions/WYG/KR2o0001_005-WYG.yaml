body:
  text: 採撰第十五子曰吾猶及史之闕文是知史文有闕其來尚矣自非博雅君子何以𥙷其遺逸者哉葢珍裘以衆腋成温廣厦以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異説採摭羣言然後能成一家傳諸不朽觀夫邱明授經立傳廣包諸國葢當時有周志晉乗鄭書楚杌等篇遂乃聚而編之混成一録向使專慿魯䇿獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採世本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序説苑七略之辭此皆當代雅言事無邪僻故能取信一時擅名千載但中古作者其流日煩雖國有册書殺青不暇而百家諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虛益新事至如禹生啟石伊産空桑海客乗查以登漢姮娥竊藥以犇月如斯踳駁不可殫論固難以汗南董之片簡霑班華之寸札而嵇康高士傳好聚七國寓言𤣥晏帝王紀多採六經圖讖引書之誤其萌始於此矣至范曄増損東漢一代自謂無慙良直而王喬鳬履出於風俗通左慈羊鳴傳於抱朴子朱紫不别穢莫大焉沈氏著書好誣先代於晉則故造竒説在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國蜀本作甚宋本作苦承其詭妄重加誣語遂云司馬叡出於牛金王邵沈約晉書造竒説云瑯琊國姓牛者與夏侯妃私通生中宗因逺叙宣帝以毒酒殺牛金符證其狀収因此乃云司馬叡晉將牛金子也宋孝王曰收以叡為金子計其年全不相干按前史尚如此誤况後史編録者耶劉駿上滛路氏沈約宋書曰孝武於路太后處寢息時人多有議魏書因云駿烝其母路氏醜聲播於甌越也可謂助桀為虐幸人之災尋其生絶𦙍嗣死遭剖斵葢亦隂過之所致也晉世雜書諒非一族若語林世説幽明録搜神記之徒其所載或恢諧小辨或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語唐朝所撰晉史多採以為書夫以干鄧之所糞除王虞之所糠粃持為逸史用補前傳此何異魏朝之撰皇覽梁世之修遍略務多為美聚博為功雖取恱小人終見􅅓於君子矣夫郡國之記譜牒之書務欲矜其州里誇其氏族讀之者安可不練其得失明其眞偽者乎至如江東五雋始自㑹稽典録潁川八龍出於荀氏家傳而修晉漢史者皆徵彼虚譽定為實録茍不别加研覈何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盜嫂翟義不死諸葛猶存此皆得之於行路傳之於衆口儻無明白其誰曰然故蜀相薨於渭濱晉書稱嘔血而死魏君崩於馬圈齊史云中矢而亡沈炯罵書河北以為王韋魏収草檄關西謂之邢邵夫同說一事而分為兩家葢言之者彼此有殊故書之者是非無定况古今路阻視聽壤隔而談者或以前為後或以有為無涇渭一亂莫之能辨而後來穿鑿喜出異同不慿國史别訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉䕫唯一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈此之乖濫往往有旃故作者惡道聽途說之違理街談巷議之損實觀夫子長之譔史記也殷周已徃採彼家人安國之述陽秋也梁益舊事訪諸故老夫以芻蕘鄙說刋為竹帛正言而輒欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作冥漠九泉毁譽所加逺誣千載異辭疑事學者宜善思之載文第十六夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其美載於周詩懷襄不道其惡存於楚賦讀者不以吉甫奚斯為諂屈平宋玉為謗者何也葢不虚美不隱惡故也是則文之將史其流一焉固可以方駕南董俱稱良直者矣爰洎中葉文體大變樹理者多以詭妄為本飾辭者務以滛麗為宗譬以女工之有綺縠音樂之有鄭衞葢語曰不作無益害有益至如史氏所書固當以正為主是以虞帝思理夏后失邦一作御尚書載其元首禽荒之歌鄭莊至孝晉獻不明春秋録其大隧狐裘之什其理讜而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虚上林揚雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無裨奬􅂆有長奸詐而前後史漢皆書諸列傳不其謬乎且漢代詞賦雖云虚矯自餘他文大扺猶實至於魏晉已下則偽繆雷同㩁而論之其失有五一曰虚設二曰厚顔三曰假手四曰自戾五曰一槩何者昔大道為公以能而授故堯咨爾舜舜以命禹自曹馬以降其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓跡實同於莽卓言乃類於虞夏且始自納陛迄於登壇彤弓盧矢新君膺九命之錫白馬侯服舊主䝉三恪之禮徒有其文竟無其事此所謂虚設也古者兩軍為敵二國爭雄自相稱述言無所隠何者國之得喪如日月之食焉非由飾辭矯說所能掩蔽也逮於近古則不然至如曹公歎蜀主之英略曰劉備吾儔周帝美齊宣之強盛云高歡不死或移都以避其鋒或斵氷以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧𤣥黄列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顔也古者國有詔命皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見決矣至於近古則不然凡有詔勅皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隠之渥恩叙憂勤之至意其君雖有返道敗徳惟頑與㬥觀其政令則辛癸不如讀其詔誥則勛華再出此所謂假手也葢天子無戲言茍言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所愼至於近古則不然凡百具寮王公卿士始有褒崇則謂其珪璋特達善無可加旋有貶黜則比斗筲下才罪不容責夫同為一士之行同取一君之言愚智生於倐忽是非變於俄頃帝心不一皇鑒無恒此所謂自戾也夫國有否泰世有汚隆作者形言本無定凖故觀猗歟之頌而驗有殷方興覩魚藻之刺而知宗周將殞至於近代則不然夫談主上之聖明則君盡三五述宰相之英偉則臣皆二八國止方隅而言幷吞六合福不盈眥而稱感致百靈雖人事屢改而文理無昜故善之與惡其說不殊欲令觀者疇為凖的此所謂一槩也於是考茲五失以尋文義雖事皆形似而言必憑虛夫鏤氷為璧不可得而用也畫地為餅不可得而食之是以行之於世則上下相䝉傳之於後則示人不信而世之作者復不之察聚彼虚說編而次之剙自起居成於國史連章疏録蜀本作畢宋本作疏一字無廢非復史書更成文集若乃歴選衆作求其穢累王沉魚豢是其甚焉裴子野何之元抑其次也陳壽干寶頗從簡約猶時載浮訛未盡機要未一作罔惟王邵撰齊隋二史其所取也文皆詣實理多可信至於悠悠飾詞皆不之取此實得去邪從正之理捐華摭實之義也葢山有木工則度之況舉世文章豈無其選但苦作者書之不讀耳至如詩有韋孟諷諫賦有趙壹嫉邪篇則賈誼過秦論則班彪王命張華述箴於女史張載題銘於劔閣諸葛表主以出師王昶書家以誡子劉向谷永之上疏晁錯李固之對策荀伯子之彈文山巨源之啓事此皆言成軌則為世龜鏡求諸歴代往往而有茍書之竹帛持以不刋則其文可與三代同風其事可以五經齊列古猶今也何逺近之有哉昔夫子修春秋别是非申黜陟而賊臣逆子懼凡今之為史而載文也茍能撥浮華採眞實亦可使夫彫蟲小伎者聞義而知徙矣此乃禁淫之隄防持雅之管轄凡為載削者可不務乎補註第十七昔詩書既成而毛孔立傳傳之時義以訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注葢傳者轉也轉授於無窮注者流也流通而靡絶惟此二名其歸一揆如韓戴服鄭鑚仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗既而史傳小書人物雜記若趙岐之三輔決録陳夀之季漢輔臣周處之陽羨土風常璩之華陽士女文言美辭列於章句委曲叙事存於細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力微不能自達庶憑驥尾千里絶羣遂乃掇衆史之異詞補前書之所闕若裴松之三國志陸澄劉昭兩漢書劉彤晉紀劉孝標世說之類是也亦有躬為史臣手自刋削雖志存該博而才闕倫叙除煩則意有所恡畢載則言有所妨遂乃定彼榛楛列為子注若蕭大圜淮海亂離志楊􅃷之洛陽伽藍記宋孝王關東風俗傳王邵齊志之類是也㩁其得失求其利害少期集注國志以廣承祚所遺而喜聚異同不加刋定恣其擊難坐長煩蕪觀其書成表獻自比蜜蜂兼採但甘苦不分難以味同萍實者矣陸澄所注班史多引司馬遷之書若乃此缺一言彼增半句皆採摘成注標為異說有昏耳目難為披覽蜀本作搜宋本作披竊惟范曄之刪後漢也簡而且周踈而不漏葢云備矣而劉昭採其所捐以為補注言盡非要事皆不急譬夫人有吐菓之核棄藥之滓而愚者乃重加捃拾潔以登薦持此為工多見其無識也孝標善於攻謬博而且精固以察及泉魚辨窮河豖嗟乎以峻之才識足堪逺大而不能探􅄨彪嶠網羅班馬方復留情於委巷小說銳思於流俗短書可謂勞而無功費而無當者矣自茲以降其失逾甚若蕭楊之璅雜王宋之鄙碎言殊揀金事比雞肋異體同病焉可勝言大扺撰史加注者或因人成事或自我作故記録無限規檢不存難以成一家之格言千載之楷則凡諸作者可不詳之至若鄭𤣥王肅述五經而各異何休馬融論三傳而競爽欲加商㩁其流實煩斯則義涉儒家言非史氏今並不書於此焉因習上第十八葢聞三王各異禮五帝不同樂故傳稱因俗易貴隨時況史書者記事之言耳夫事有貿遷而言無變革此所謂膠柱而調瑟刻舩以求劔也古者諸侯曰薨卿大夫曰卒故左氏傳稱楚鄧曼曰王薨於行國之福也又鄭子産曰文襄之伯君薨大夫弔即其證也按夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外别内之旨也馬遷史記西伯以下與諸列國王侯凡有薨者同加卒稱此豈略外别内耶何貶薨而書卒也葢著魯史者不謂其邦為魯國撰周書者不呼其主曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為累也班氏既分裂史記定名漢書至於述高祖為公王之時皆不除沛漢之字凡有異方降欵者以歸漢為文肇自班書首為此失迄于仲豫仍踵厥非積習相傳曾無先覺者矣又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文按遷之言今實孝武之世也固之言今當孝明之世也事出百年語同一理即如是豈陳氏苖裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至今稱之皇甫謐全録斯語載於高士傳夫孟堅士安年代懸隔至今之說豈可同云夫班之習馬其非既如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉魏録稱其議獄事具刑法志依檢志内了無其說既而臧氏晉書梁朝通史於大連之傳並有斯言志亦無文傳乃虚述此又不精之咎同於𤣥晏也尋班馬之列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄既移題目於傳首歴姓名於卷中而猶於列傳之下注為列女高隠等目茍姓名既書題目又顯是鄧禹㓂恂之首當署為公輔者矣岑彭呉漢之前當標為將帥者矣觸類而長實繁其徒何止列女孝子高隠獨行而已魏収著書摽牓南國桓劉諸族咸曰島夷是則自江東而盡為卉服之地至於劉昶沈文秀等傳叙其爵里則不異諸華劉裕等傳皆云丹徒楚人也沈文秀等傳則云吳興武康人豈有君臣共國父子同姓闔閭季札便致土風之殊孫策虞翻仍成夷夏之隔求諸往例所未聞也當晉宅江淮實膺正朔嫉彼羣雄稱為僣盜故阮氏七録以田范裴段諸記劉石苻姚等書别剙一名題為偽史及隋氏受命海内為家國靡愛憎人無彼我而世有撰隋書之經籍志者其流别羣書還同阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧為附庸之主而揚雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是偽書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王室將崩霸圖云構必有忠臣義士捐生殉節若乃韋耿謀誅曹武誅一作討欽誕問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於莽靖之末王謙尉逈玉折於宇文之季而李刋齊史顏述隋篇時無逼畏事須矯枉而皆仍舊不改謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盜葛龔所作而進之既具録他文不知改易名姓時人謂之曰作奏雖工宜去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歴觀自古此類尤多其有宜去而不去者豈真葛龔而已何事於斯獨致解頥之誚也凡為史者茍能識事詳審措辭精宻舉一隅以三隅反吿諸往而知諸來斯庶幾可以無大過矣因習下第十九亦曰邑里昔五經諸子廣書人物雖世族可驗而邑里難詳逮太史公始革茲體惟有列傳先述本居至於國有弛張鄉有併省隨時而載用明審實按夏侯孝若撰東方朔贊云朔字曼倩平原厭次人魏建安中分厭次為樂陵郡故又為郡人焉夫以身没之後地名改易猶復追書其事以示後來則知在生之前故宜詳録者矣異哉晉氏之有天下也自雒陽蕩覆衣冠南渡江左僑立州縣不存桑梓由是斗牛之野郡有青徐吳越之鄉州編冀豫欲使南北不亂淄澠可分其於繫虛名於本土者雖百代無易既而天長地久文軌大同州郡則廢置無恒名目則古今各異而作者為人立傳每云某所人也其地皆取舊號施之於今近代史為王傳云瑯琊臨沂人為李傳曰隴西成紀人之類也非唯王李二族久離本居亦自當時無此郡縣皆是晉魏已前舊名號欲求實錄不亦難乎且人無定所因地而化故生於荆者言皆成楚居於晉者齒便從黄涉魏而東已經七葉歴江而北非唯一世而猶以本國為是此鄉為非是則孔父里於昌平陰氏家於新野而系纂㣲子源承管仲乃為齊宋之人非闗魯鄧之士求諸自古其義無聞時修國史予被配纂李義琰傳琰家於魏州昌樂已經三代因云義琰魏州昌樂人也監修者大笑以為深乖史體遂依李氏舊望改為隴西成紀人既言不見從故有此說且自世重高門人輕寒族竟以姓望所出邑里相矜若仲逺之尋鄭𤣥先云汝南應劭文舉之對曹操自謂魯國孔融是也爰及近古其言多偽至於碑頌所勒茅土定名虚引他邦冒為巳邑若乃稱袁則飾之陳郡言杜則加之京邑姓夘金者咸曰彭城氏禾女者皆云鉅鹿今有姓邴者姓𢎞者以犯國諱皆改為李氏如書其邑里必云隴西趙郡夫以假姓猶且如斯則真姓者斷可知矣又今西域胡人多有姓明及卑者如加五等爵或稱平原公或號東平子為明氏出於平原卑氏出於東平故也夫邊夷雜種尙竊美名則諸夏士流固無慚德也在諸史傳多與同風如隋史牛𢎞傳曰安定鶉觚人也本姓原氏至於他篇所引皆謂之西牛𢎞唐史謝偃傳云本姓庫汗氏續謂之陳郡謝偃並其類也此乃尋流俗之常談忘著書之舊體矣又近世有班秩不著者始以州壤自標若楚國龔遂漁陽趙壹是也至於名位既隆則不從此列若蕭何鄧禹賈誼董仲舒是也觀周隋二史每述王庾諸事高楊數公必云瑯琊王褒新野庾信𢎞農楊素渤海高熲以此成言豈曰省文從而可知也凡此諸失皆由積習相傳􅐛以成俗迷而不返蓋語曰難與慮始可與樂成夫以千載遵行持為故事而一朝糾正必驚愚俗此莊生所謂安得妄言之人而與之言斯言已得之矣庶知音君子詳其得失者焉史通卷五欽定四庫全書史通卷六唐劉知㡬撰内篇

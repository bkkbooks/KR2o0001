front:
  text: 文已於敘事篇言之詳矣然凡俗難曉下愚不移雖七卷成言而三隅莫反盖語曰百聞不如一見是以聚米為谷賊虜之虛實可知畫地成圖山川之形勢易悉昔陶隱居本草藥有冷熱味者朱墨㸃其名阮孝緒七録書有文惪殿者丹筆寫其字由是區分有别品類可知今輙擬其事鈔自古史傳文有煩者皆以筆㸃其上其㸃用朱粉雌黄並得凡字經㸃者盡宜去之如其間有文句虧缺者細書側注於其右其側書亦用朱粉雌黄等如正行用粉則别注者用朱黄以此為别或囘易數字或加足片言俾分布得所彌縫無闕庶觀者易悟其失自彰如我摭實而談是非茍誣前哲其一條孔子家語曰魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年必亡矣一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今果如期而亡夫子何以知然除二十四字其二條家語曰晉將伐宋使覘之宋陽門之介夫死司城子罕哭之哀覘者反言於晉侯曰宋陽門之介夫死而司城子罕哭之哀民咸悦矣宋殆未可伐也除三十一字移三字其三條史記五帝本紀曰諸侯之朝覲者不之丹朱而之舜百姓之獄訟者不之丹朱而之舜謳歌者皆不謳謌丹朱而謳謌舜舜年二十以孝聞三十而帝堯問可用者云云舜年二十以孝聞三十堯舉之除二十九字加七字其四條夏本紀曰禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黄帝禹者黄帝之𤣥孫而顓頊之孫也禹之曾大父曰昌意及父鯀皆不得在帝位為人臣除五十七字加五字案顓頊紀中已具云黄帝是顓頊祖矣此篇下云禹是顓頊孫則其上不得更言黄帝之𤣥孫既上云昌意及鯀不得在帝位則於下文不當復云為人臣今就於朱㸃之中復有此重復造次筆削庸可盡乎其五條項羽本紀曰項籍者下相人也字羽起時年二十四其季父項梁梁父楚將項燕為秦將王翦所殺者也項氏世世楚將封於項故姓項氏除三十字加二十四字釐革其次序其六條呂氏本紀曰呂太后者高祖微時妃也生孝惠帝魯元公主及高祖為漢王得定陶戚姬愛幸生趙隱王如意高祖嫌孝惠為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意類我又戚姬幸常獨從上之關東日夜泣涕欲立其子如意以代太子呂后年長常留守希見上益疎如意立為趙王後幾代太子者數矣賴大臣諍之及留侯䇿太子得無廢此事見高惠二紀及諸王叔孫通張良等傳過為重疊矣今又見於呂后紀固可略而不言除七十五字加十二字其七條宋世家曰初元公之孫糺景公殺之景公卒糺之公子得正殺太子而自立是為昭公昭公者父公孫糺糺父公子襦秦即元公少子也景公殺昭公父糺故昭公怨殺太子而自立除三十六字加十三字其八條三王世家曰大司馬臣去病昩死再拜上疏皇帝陛下陛下過聽使臣去病待罪行間宜專邊塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎貟皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣切不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察臣去病昧死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央制曰下御史六年三月戊申朔乙亥御史臣光尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯大常臣充大行令臣息太子太傅臣安行宗正事昧死上言大司馬臣去病上疏曰陛下過聽使臣去病待罪行間宜專邊塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎貟皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣切不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察制曰下御史臣與中二千石臣賀等議曰古者裂地立國並建諸侯以承天子所以尊宗廟重社稷也今臣去病上疏不㤀其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有號位臣青翟臣湯等昧死請立皇子臣閎臣旦臣胥為諸侯王昧死請所立國名除一百八十四字加一字其九條已上有言語相重者今略㸃發如此但此一篇所記全宜削除今輙具列於斯籍為鑒戒者爾凡為史者國有詔誥十分不當取其一焉故漢元帝詔曰盖聞安民之道本由隂陽間者隂陽錯謬風雨不時朕之不德庶幾羣公有敢言朕之過者今則不然婾合茍從未肯極言朕甚閔焉永惟蒸庶之饑寒逺離父母妻子勞於非業之作衞於不居之宫恐非所以佐隂陽之道也其罷甘泉建章宫衞士各令就農百家各省費條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明隂陽灾異者各三人及荀悅撰漢紀略其文曰朕惟衆庶之饑寒逺離父母妻子勞於非業之作衞於不居之宫其罷甘泉建章宫衛士各令就農丞相御史舉天下明隂陽灾異者各三人自餘抄撮他皆倣此近則天朝諸撰史者凡有制誥一字不遺唯去詔首稱門下詔尾云主者施行而已時武承嗣監修國史見之大怒謂史官曰公輩是何人而敢輙減詔書自是史官寫詔書雖門下贊詔亦録後予聞此説每唱噱而已必以三王世家相比其煩碎則又甚於斯是知史官之愚其來尚矣今之作者何獨笑武承嗣而已哉其十條魏公子傳髙祖始微少時數聞公子賢及即天子位每過大梁常祠公子髙祖十二年從撃黥布還為公子置守冢五家世世歲以四時奉祠公子太史公曰吾過大梁之墟求問其所謂夷門以徵信陵君故事說者云當戰國之時夷門者城之東門也天下諸公子亦有嘉士者矣然而信陵君之接岩穴隱者不恥下交名冠諸侯有以也高祖每過之祠奉不絶除十五字加二十字其十一條魯仲連傳曰仲連好竒偉倜儻之畫而不肯仕宦任職好持髙節遊於趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦遂東圍邯鄲趙王恐諸侯之救兵莫敢撃秦魏安釐王使將軍晉鄙救趙畏秦止於湯隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所以急圍趙者前與齊涽王爭强為帝已而復歸帝號今齊涽王已益弱今唯秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原君猶豫未有所決此時魯連適遊趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又内圍邯鄲而不去魏王使客將軍新垣衍令趙帝秦今其人在此勝也何敢言事魯連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯連先生者今其人在此勝請為紹介交之於將軍新垣衍曰吾聞魯連先生齊之髙士也衍人臣也使事有職吾不願見魯連先生平原君曰勝已洩之矣新垣衍許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中皆有求平原君者也今吾觀先生之玉貌非有所求於平原君者也曷居此重圍之中而不去魯連云云梁未觀秦稱帝之害也使梁觀秦稱帝之害則必助趙矣新垣衍曰稱秦帝之害何如魯連曰云云吾將使秦王烹醢梁王新垣衍怏然不悅也嘻亦甚矣先生之言也先生又焉能使秦王烹醢梁王魯連曰固矣吾將言之今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交有稱王之名睹其一戰而勝欲從而帝之云云於是新垣衍起再拜而謝曰始以先生為庸人吾乃今日知先生為天下之士也適㑹魏公子無忌奪晉鄙軍以救趙撃秦軍遂引而去於是平原君欲封魯連辭謝者三終不肯受平原君乃致酒酒酣前起以千金為魯連壽云云除三百七十五字加七字其十二條屈原傳漢有賈生為長沙王太傅過湘水投書以弔屈原賈生名誼洛陽人也謫賈生為長沙王太傅賈生既辭往聞長沙卑濕自以為壽不得長又以謫去意不自得及渡湘水為賦以弔屈原其詞曰云云賈生為長沙傅二年有鴞飛入賈生舍止於坐隅楚人命鴞曰鵩賈生既以謫居長沙長沙卑濕自恐壽不得長傷悼之乃為賦以自廣其詞曰云云懷王騎墮馬而死無後賈生自傷無狀歲亦死時年三十三矣除七十六字加三字其十三條扁鵲倉公傳曰太倉公者齊太倉長臨淄人也姓淳于氏名意少而喜醫方術高后八年更受師同郡公里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方與之傳黄帝扁鵲之脉書五色診病知人死生多驗詔問所為治病死生驗者幾何人主名為誰詔問故太倉長臣意方􅇊所長及所能治病有其書無有皆安受學受學幾何歲嘗有所驗何縣里人也何病醫藥與其病之狀皆何如其悉以對臣意對曰自意少時喜藥醫方試之多不驗者至髙皇后八年中得見師臨淄元里公乘陽慶已年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黄帝扁鵲之脉書五色診病知人死生決嫌疑定可治及藥書甚精我家給富心愛公欲盡以我禁方書悉敎公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脉書上下經五色診竒咳術揆度隂陽外變藥論石神接隂陽禁書受讀解驗之可一年明歲即驗然尚未精也要事之三年所常以為人診病決死生有驗精良今慶已死十年臣意年盡三十九也齊侍史成自言病也臣意診其脉吿曰君之病惡不可言也已下皆述一生醫療効驗事除二百九十五字其十四條宋世家初云襄公嗣位仍謂為宋襄公不去宋襄二字吳世家云闔閭越世家云勾踐每於其號上加吳王越王字句句未嘗捨之孟嘗君傳曰馮公形容狀貌甚辨按形容狀貌同是一説而敷演重出分為四言凡如此流不可勝載其十二諸侯表曰孔子次春秋約其辭文去其煩重又屈原傳曰其文約其辭微觀子長此言實有深鑒及自撰史記榛蕪若此豈所謂非言之難而行之難乎其十五條漢書龔遂傳曰上遣使者徵遂議曹王生請從功曹以為王生每嗜酒亡節度不可從遂不聽從至京師王生日飲酒不視太守㑹遂引入宫王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生天子悅其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹敎戒臣也云云上以議曹王生為水衡丞除八十四字其十六條新晉書袁宏傳曰袁宏有逸才文章絶美曾為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乘月率爾與左右微服泛江㑹宏在舫中諷其所作詠史詩詠聲既清詞又藻麗遂駐聽久之遣問焉答曰是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之談論申旦不寐自此名譽日茂云云從桓温北伐作北征賦其文之髙者嘗與王珣伏滔同在桓温坐温令滔讀其北征賦至聞所傳於相傳云獲麟於北野誕靈物以瑞德奚受體於虞者疚尼父之慟泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韻珣云此賦方傳千載無容率爾今於天下之後便改移韻從事然於寫送之致似為未盡滔云得益寫韻一句或為小勝宏應聲答曰感不絶於予心愬流風而獨寫云云謝安嘗賞其機對辨速後安為揚州刺史自吏部郎出為東陽郡乃祖道於冶亭時賢皆集謝安欲以卒迫試之臨别執其手顧就左右以一扇而授之曰聊以贈行宏應聲答曰輙當奉揚仁風慰彼黎庶顧者無不歎服時人歎其卒而能要焉此事出檀道鸞晉陽秋及劉義慶世説除一百一十四字加一十九字其十七條十六國春秋曰郭瑀有女始筓妙選良偶有心於劉昞遂别設一席於座前謂諸弟子曰吾有一女年向成長欲覔一快女壻誰坐此席者吾當婚焉昞遂奮衣來坐神志湛然曰向聞先生欲求快女壻昞其人也除二十二字其十八條

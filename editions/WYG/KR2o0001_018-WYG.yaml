body:
  text: 諸史六條夫盛服飾者以珠翠為先工繢事者以丹青為主至若錯綜乖所分布失宜則綵絢雖多巧妙不足者矣其一條觀班氏公孫𢎞傳賛直言漢之得人盛於武宣二代至於平津善惡寂滅無覩持論如是其義靡聞必矜其美辭愛而不棄則宜㣲有改易列於百官公卿表後庶尋文究理頗相附㑹以兹編録不猶愈乎其二條又沈侯謝靈運傳論全説文體偹言音律此正可為翰林之補亡流别之總説耳季充撰翰林論摯虞撰文章流别集如次諸史傳實為乖越陸士衡有云離之則雙美合之則兩傷信矣哉其有事可書而不書者不應書而書者至如班固敘事㣲小必書至高祖破項垓下斬首八萬曽不渉言李齊與後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以伐奚於邊疆小冦無不畢紀如司馬消難擁數州之地以叛曽不挂言略大舉小其流非一昔劉勰有云自卿雲已前多役才而不課學向雄已後頗引書以助文然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典誥良由才乏天然故事資虚飾者矣其三條按宋書稱武帝入闗以鎮惡不伐遠方馮異於渭濵遊覧追想太公夫以宋祖無學愚智所委安能援引古事以詶荅羣臣者乎斯不然矣更有甚於此者覩周齊二國俱出隂山必言類互鄉則宇文尤甚按王邵齊志宇文公呼高祖曰漢兒夫以獻武普嗣未變胡俗王宋所載其鄙甚多矣周帝仍因之以華夏則知其言不逮於齊遠矣而牛𢎞王邵並掌䇿書其載齊言也則淺俗如彼其載周言也則文雅若此夫如是何哉非兩邦有夷夏之殊由二史有虚實之異故也夫以記宇文之言而動遵經典多依史漢周史述太祖論梁元帝而曰蕭繹可謂天之所廢誰能興之者乎又宇文測為汾州或譛之太祖怒曰何謂間我骨肉生此貝錦此並六經之言也又曰榮權吉士也寡人與之言無二此三國志之辭也其餘言皆如此豈是宇文之語耶又按裴政梁太清實録稱元帝使王琛聘魏長孫儉謂宇文曰王琛眼睛全不轉公曰瞎奴使癡人來豈得怨我此言與王宗所載相類可謂真宇文之言無愧於實録矣此何異荘子述鮒魚之對而辨類蘇張賈生敘鵩鳥之辭而文同屈宋施於寓言則可求諸實録則否矣其四條世稱近史編語謂言語之語也惟周多美辭夫以博採古文而聚成今説是則俗之所傳有雞九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而其事悉虚無諸本作在字宋本作其字豈可便謂南董之才宜居班馬之職也自梁室云季雕蟲道長謂太清已後平頭上尾尤忌於時對語麗辭盛行於俗始自江外被於洛中而史之載言亦同於此何之元梁典稱議納侯景高祖曰文叔得王郎降而隗囂滅安世用羊祜之言而孫皓平夫漢晉之君事殊僣盜梁主必不捨其諡號呼以姓名此由湏對語麗辭故也又姚最梁略稱高祖曰得旣在我失亦在予不及子孫知復何恨夫變我稱予互文成句求諸人語理必不然此由避平頭上尾故也又蕭韶太清記曰云云温子昇永安故事言爾朱世隆之攻没建州日怨痛之響上徹青天酸苦痛極下傷人理此語皆非簡要而徒積字成文並由避聲對之為患也或聲從流靡或語湏偶對此之為害其流甚多假有辨如酈叟吃若周昌子羽修飾而言仲由率爾而對莫不拘以文禁一槩而書必求實録多見其妄矣其五條夫晉宋已前帝王傳授始自錫命終於登極其間牋疏欵曲詔䇿頻煩雖事皆偽迹言並飾譲猶能偹其威儀陳其文物俾禮容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荆州假稱宣德之令江陵之建業地濶􅁆千餘里宣德皇后下令旬日必至以此而言其偽可見或書成并部虚云孝靖之勑凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要剪截浮辭者哉但二蕭陳隋諸史通多失此晉魏及宋自創業後稱公王即帝位皆􅁆十年間事耳夫功德日盛稍進累遷足驗禮容不欺揖遜無失自齊梁已降稱王公及即帝位皆不出旬月之中耳夫以廹促如是則於禮儀何有者哉又按北齊文宣帝将受魏禪宻撰錫遜勸進㫁表又詔入奏請注一時頓盡則始知無前後節文等差降殺惟王邵所撰齊志獨無是焉夫以累易古人以為嗤如彦淵之改魏收也以非易非彌見其失矣而撰隋文史者稱澹大矯收失者何哉且以澹置書方於君懋豈惟其間可容􅁆人而已史臣美澹而譏邵者隋史每論皆云史臣曰今故因其成事呼為史臣豈所謂通鍳乎語曰蝉翼為重千鈞為輕其斯之謂矣其六條别傳九條劉向列女傳云夏姬再為夫人三為王后夫為夫人則難以驗也為王后則㫁可知矣按其時諸國稱王惟楚而已如巫臣諫荘將納姬氏不言曽入楚宫則其為后當在周室蓋周德雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於吴謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其闕如雜記曰夫人之不命於天子自魯昭公始也又以女子一身而作嬪三代求諸人事理必不然尋夫春秋之後國稱王者有七蓋由向誤以夏姬之生當夫戰國之世稱三為王后者謂厯嬪七國諸王校以年代殊為􅆾剌至於他篇兹例甚衆故論楚也則昭王與秦穆同時言齊也則晏嬰居宋景之後列女傳曰齊傷槐女景公時人謂晏子曰昔景公之時大旱三年夫謂宋景為昔即居其後今粗舉一二其流可知其一條觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鍳者矣及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虚事多搆偽辭非其識不周而才不足蓋以世人都可欺故也嗚呼後生可畏何代無人而輙輕忽若斯者哉夫傳聞失真書事失實蓋事有不獲巳人所不能免也至於故為異説以惑後來則過之尤甚者矣其二條按蘇秦荅燕易王稱有婦人将殺夫令妾進其藥酒妾佯僵而覆之又甘茂謂蘇氏云貧人女與富人女㑹績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用蘇氏之説為二婦人立傳定其邦國加其姓氏以彼烏有持為指實何其妄哉又有甚於此者至如伯竒化鳥對吉甫以哀鳴宿瘤隱形干齊王而作后此則不附於物理者矣復有懷嬴失節目為貞女劉安覆族定以登仙夫言如是豈顧邱明之有傳孟堅之有史哉其三條揚雄法言好論司馬遷而不及左邱明常稱左氏傳惟有品藻二言而已是其鍳物有所不明者也且雄哂子長愛竒多雜又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦則云鞭宓妃云云劉勰文心已議之矣然則文章小道無足致嗤觀其蜀主本紀稱相魄化而為䳌荆屍變而為鱉其言如是何其鄙哉所謂非言之難而行之難也其四條夫十室之邑必有忠信欲求不朽𢎞之在人何者交趾遠居南裔越裳之俗也燉煌僻處西域昆戎之鄉也求諸人物自古闕載蓋由地居下國路絶上京史官注記所不能及也既而士燮著録劉炳裁書則磊落英才粲然盈矚者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知著述之功其力大矣豈與夫詩賦小技校其優劣者哉其五條自戰國已下詞人屬文皆偽立客主假相詶荅至於屈原離騷辭稱遇漢父於江渚宋玉高唐賦云夢神女於陽臺夫言並文章句結音韻以兹敘事足驗憑虚而司馬遷習鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚耶必如是則馬卿遊梁枚乘讃其好色曹植至洛宓妃覩於巖畔撰魏史者亦宜編為實録矣其六條嵇康撰高士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假説而定為實録斯已謬矣況此二漁父者校年則前後别時論地則南北殊壤而輙併之為一豈非惑哉茍如是則蘇代所言雙禽蚌鷸此亦漁父之一事何不同書於傳乎必惟取褕袟緇帷之林濯纓滄浪之水彌見其末學也蘇代所言雙禽鷸畔伍胥所遇渡水蘆中斯並漁父善事亦可同歸一録何止褕袟緇帷之林濯纓滄浪之水若斯而已也莊周著書以寓言為主嵇康述高士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相憐鷽鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記並可引為真事矣夫識理如此何為而薄周孔哉其七條杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也其八條李陵集有與蘇武書詞彩壮麗音句流靡觀其文體不類西漢人殆後來所為假稱陵作也缺而不載良有以焉遷史編於李傳中斯為繆矣遷史李傳無此書恐誤記耳其九條雜説十條夫自古之學者談稱多矣精於公羊者尤憎左氏習於太史者則偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣其一條又觀世之學者或躭翫一經或專精一史談春秋者則不知宗周既殞而人有六雄論史漢者則不悟劉氏云亡而地分三國亦有武陵隱士滅迹桃源滅一作遁當此晉年猶謂㬥秦之地也假有學窮千載書總五車見良直而不覺其善逢抵捂而不知其失葛洪所謂藏書之箱篋五經之主人而夫子有云雖多亦安用為其斯之謂也其二條夫鄒好長纓齊珍紫服斯皆一時所尚非百王不易之道也至如漢代公羊擅名三傳晉年荘子高視六經今並挂壁不行綴旒無絶豈與夫春秋左氏古文尚書雖暫廢於一朝終獨高於千載校其優劣可同年而語哉其三條夫書名竹帛物情所競維聖人無私而君子亦黨蓋易之作也本非記事之流而孔子繋詞輙盛述顔子稱其殆庻雖言則無媿事非虚美亦由視予猶父門人日親故非所要言而曲垂編録者矣既而揚雄寂寞師心典誥至於童烏稚子蜀漢諸賢謂嚴李栁司馬之徒太𤣥法言恣加褒賞雖内舉不避而情有所偏者焉夫以宣尼叡哲子雲叅聖在於著述不能忘私則自中庸已降抑可知矣如謝丞漢書偏黨吴越魏收代史盛誇胡塞復焉足怪哉其四條子曰汝為君子儒無為小人儒儒誠有之史亦宜然蓋左邱明司馬遷君子之史也吴均魏收小人之史也其薰蕕不類何相去之遠哉其五條禮云禮云玉帛云乎哉史云史云文飾云乎哉何則史者固當以好善為主嫉惡為次若司馬遷班叔皮史之好善者也晉董狐齊南史史之嫉惡者也必兼此二者而重之以文飾其唯左邱明乎自兹已降吾未之見也其六條夫所謂直筆者不掩惡不虚美書之有益於褒貶不書無損於勸誡但舉其宏綱存其大體而已非謂絲毫必録瑣細無遺者也如宋孝王王邵之徒其所記也喜論人帷薄不修言貌鄙事訐以為直吾無取焉其七條夫故立異端喜造竒説漢有劉向晉有葛洪近者沈約又其甚也後來君子幸為詳焉昔魏史稱朱異有口才摯虞有筆才故知喉舌翰墨其辭本異而近世作者撰彼口語同諸筆文斯皆以元瑜孔璋之才而處邱明子長之任文之與史何相亂之甚乎其八條夫載筆立言名流今古如馬遷史記能成一家揚雄太𤣥可傳千載此則其事尤大記之於傳可也至於近代則不然其有雕蟲末技短才小説或為集不過數卷如陳書隂鏗傳云有集五卷其類是也或著書纔至一篇如梁書孝元記云撰同姓名人録一卷其類是也莫不一二列名編諸傳末如梁書孝紀云撰妍神記同姓名人録陳書姚察傳云撰西征記辨茗酪記後魏書劉芳傳云撰周官音禮記音齊書祖鴻勲傳云撰晉詞記凡此書或一卷兩卷而已自餘人有文集或四卷五卷者不可勝記故不具列之事同七略巨細必書斯亦煩之甚者其九條子曰齊景公有馬千駟死之日人無得而稱焉伯夷叔齊餓於首陽之下民到于今稱之若漢代青翟劉舎位登丞相而班史無録姜詩趙壹身止計史而謝書有傳即其例也今之修史者則不然其有才德闕如而位官通顯史臣載筆必為立傳其記也止具其生前厯官沒後贈諡若斯而已矣雖其間伸以状蹟粗陳一二么麽常事曽何足觀始自伯起魏書迄乎皇家五史五史謂五代史通多此體流蕩忘歸史漢之風忽焉不嗣者矣其十條史通卷十八欽定四庫全書史通卷十九唐劉知㡬撰外篇

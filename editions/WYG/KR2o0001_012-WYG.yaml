body:
  text: 右説三墳五典堯舜相承已見墳典周監二代各有書籍至孔子討論其義刪為尚書始自唐堯下終秦繆其言百篇而各為之序屬秦為不道坑儒禁學孔子之末孫曰孔惠壁藏其書漢室龍興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故􅄯錯受焉時伏生年且百歲言不可曉口授其書纔二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河内女子得㤗誓一篇獻之與伏生所誦合三十篇行之於世其篇所載年月不與序相符㑹又與左傳國語孟子所引泰誓不同故漢魏諸儒謂馬融鄭𤣥王肅也咸疑其繆古文尚書者即孔惠之所藏科斗之文字也魯恭壞孔子舊宅始得之於壁中博士孔安國以校伏生所誦增多二十五篇更以𨽻古字寫之編為四十六卷司馬屢採其事故遷多有古説安國又受詔為之訓傳値武帝末巫蠱事起經籍道息不獲奏上藏諸私家劉向取校歐陽大小夏侯三家經文脱誤甚衆至於後漢孔氏之本遂絶其有見於經典者諸儒皆謂之逸書馬融鄭𤣥杜預也王肅亦注今文尚書而大與古文孔傳相類或肅私見其本而獨秘之乎晉元帝時豫章内史梅􅄨始以孔傳奏上而缺舜典一篇乃取肅之堯典從慎徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭𤣥王肅諸注廢而古文孔傳獨行列於學官永為世範齊建武中吳興人姚方興采馬王之義以造孔傳舜典云於大航購得詣闕以獻舉朝集議咸以為非梁武帝時為博士議曰孔敘稱伏生誤合五篇蓋文句相連所以或令舜典必有曰若稽古伏生雖云昏耄何容由是遂不見用也及江陵版蕩其文入北中原學者得而異之隋學士劉炫遂取此一篇列諸本第故今人所習尚書舜典元出於姚氏者焉右説尚書當周室微弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左丘明觀書於太史氏因魯史記而作春秋上遵周公遺制下明將來之法自隱及哀盡十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言説經也春秋所貶當世君臣其事實皆形於傳故隱其書而不宣所以免時難也及末世口説流行故有公羊穀梁鄒夾之傳鄒氏無師夾氏有録無書故不顯於世漢興董仲舒公孫𢎞並治公羊其傳習者有嚴頴二家之學宣帝即位聞衛太子私好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮於後漢儒者數廷毁之㑹博士李封卒遂不復補一作用至和帝元興十一年鄭興父子奏請重立於學官至魏晉其書漸行而二傳亦廢今所用左氏本即杜預所注者右説春秋又當春秋之世諸侯國自有史故孔子求衆家史記而得百二十國書如楚之書鄭之志魯之春秋魏之紀年此其可得言者左丘明既配經立傳又撰諸異同號曰外傳國語二十一篇斯蓋採書志等文非唯魯之史記而已楚漢之際有好事者録自古帝王公侯鄉大夫之世終乎秦末號曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰國策三十三篇漢興太中大夫陸賈紀録時功作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳國語刪世本戰國策據楚漢列時事上自黄帝下訖麟趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記厥協六經異傳整齊百家雜語藏諸名山副在京師以俟後聖君子至宣帝時遷外孫楊惲祖述其書遂宣布焉而十篇未成有録而已張晏漢書注云十篇沒後亡失此説非也元成之間㑹稽褚先生更補其缺作武帝記三王世家龜策日者等傳其龜策日者辭多鄙陋非遷本意也晉散騎常侍巴西譙周以遷書周秦已上或采家人諸子不專據正經於是作古史考二十五篇皆憑舊典以糺其繆今則與史記並行於代焉右説史記史記所書年止漢武太初已後闕而不録其後劉向向子歆及諸好事者若馮商衛衡揚雄史岑梁審肆仁晉馮叚肅金丹馮衍􅅊融蕭奮劉恂等相次撰續迄於哀平間猶名史記至建武中司徒掾班彪以為其言鄙俗不足以踵前史又雄歆偽褒新莽誤後惑衆不當垂之後代者也於是採其舊事旁貫異聞作後傳六十五篇其子固以父所撰未盡一家乃起元髙皇終乎王莽十有二世二百三十年綜其行事上下通洽為漢書紀表志傳百篇其事未畢㑹有上書云固私改作史記者有詔京兆收繫悉録家書封上固弟超詣闕自陳明帝引見言固續父所作不敢改易舊書帝意乃解即出固徵詣校書受詔卒業經二十餘載至章帝建初中乃成固後坐竇氏事卒於洛陽獄書頗散亂莫能綜理其妹曹大家叶攻乎反博學能屬文奉詔校敘又選髙才即馬融等十人從大家授讀其八表及天文志等猶未克成多是待詔東觀馬續所作而古今人表不類本書始自漢末迄乎陳世為其注解者凡二十五家至於專門受業遂與五經相亞初漢獻帝以固書文煩難省乃詔侍中荀悅依左氏傳刪為漢紀三十篇命秘書給紙筆經五六年乃就其言簡要亦與本傳並行右說漢書在漢中興明帝始詔班固與睢陽令陳宗長陵令尹敏司𨽻從事孟冀作世祖本紀并撰功臣及新市平林公孫述事作列傳載記二十八篇自是以來春秋世亦以煥炳而忠臣義士莫之撰勒於是又詔史官謁者僕射劉珍及諫議大夫李充雜作紀表名臣節士儒林外戚諸傳起自建武訖乎永初事業垂竟而珍充繼卒復命侍中伏無忌與諫議大夫黄景作諸王王子功臣恩澤侯表南單于西羌傳地理志至元嘉元年復令太中大夫邉韶大軍營司馬崔寔議郎朱穆曹壽雜作孝穆崇二皇及順烈皇后傳又増外戚傳入安思等后儒林列傳入崔篆諸人寔壽又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢紀嘉平中光禄大夫馬日磾議郎蔡邕楊彪盧植著作東觀接續紀傳之可成者而邕别作朝㑹車服二志後坐事徙朔方上書求還續成十志㑹董卓作亂大駕西遷史臣廢棄舊文散逸及在許都楊彪頗存注記至於名賢君子自本初已下闕續魏黄初中唯著先賢表故記殘缺至晉不成大始中秘書丞司馬彪始討論衆說一作作綴其所聞起元光武終於孝獻録世十二編年二百通綜上下旁引庻事為紀志傳凡一十三篇號曰續漢書又散騎常侍華嶠刪定東觀記為後漢書帝紀十二皇后紀二三譜十典列傳七十總九十七篇其十典竟不成而卒自斯已後作者相繼為編年者四族創紀傳者五家推其所長華氏居最而遭晉室東徙三惟一存至宋宣城太守范曄乃廣集學徒窮覽舊籍刪煩補畧作後漢書凡十紀十志八十列傳合為百篇㑹曄以罪被收其十志亦未成而死先是晉東陽太守袁宏抄撮漢氏後書依荀悅體著後漢紀十三篇世言漢中興史者唯范袁二家而已右說後漢書魏史黄初太和中始命尚書衛覬繆襲草創紀傳累載不成又命侍中韋誕應璩秘書監王沈大將軍從事中郎阮籍司徒右長史孫該司𨽻校尉傅元等復共撰定其後王沈獨就其業勒成魏書四十四卷其書多為時諱殊非實録吳大帝之季年始命太史令可孚郎中項峻撰吳書峻孚俱非史才其文不足紀録至少帝時更勑韋曜周昭薛瑩梁廣華覈訪求往事相與紀述並作之中推瑩為首當歸命侯時廣昭先亡曜瑩徙黜史官久闕書遂無聞覈表請曜瑩續成前史其後曜獨終其書定為五十五卷至晉受命海内大同著作陳壽乃集三國史撰為國志凡六十五篇夏侯湛時亦著魏書見壽所作便壞己草而罷及壽卒梁州大中正范穎表言國志明乎得失辭多勸誡有益風化願垂採録於是詔下河南尹就家寫其書先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録異聞間出蜀本作錯宋本作間其流最多宋文帝以國志載事傷於簡略乃命中書郎裴松兼採衆書補注其闕由是世言三國志者以裴注為本焉右說三國志晉史洛京時著作郎陸機始撰三祖紀佐著作郎束晢又撰十志㑹中朝䘮亂其書不存先是厯陽令陳郡王鈐有著述才每私録晉書及功臣行狀未就而卒子隱博學多聞受父遺業西都事跡多所詳究過江為著作郎受詔撰晉史為其同僚虞預所斥坐事免官家貧無資書未遂就乃依征西將軍庾亮於武昌鎮亮給其紙墨由是獲成凡為晉書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆鈐所修章句混漫者必隱所作時尚書郎領國史干寶亦撰晉紀自宣訖愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱晉江左史官自鄧粲孫盛王韶之檀道鸞已下相次繼作逺則偏記兩帝近則唯敘六朝至宋湘東太守何法盛始撰晉中興書勒成一家首尾該備齊隱士東莞臧榮緒又集東西二史合成一書皇家貞觀中有詔以前後史十有八家制作雖多未能盡善乃勑史官更加纂録採正典與雜説數十餘部兼引偽史十六國書為紀十志二十列傳七十載記三十并序例目録合為百三十二卷自是言晉史者皆棄其舊本競從新撰者焉右說晉書宋史元嘉中著作郎何承天草創紀傳自此以外悉委奉朝請山謙之補承天殘缺後又命裴松之續成國史松之尋卒史佐孫冲之表求别自創立為一家言蜀本家下有之字宋本無孝建初又勑南臺侍御史蘇寶山續造諸傳元嘉名臣皆其所撰寶山被誅大明六年又命著作郎徐爰踵成前作爰因何孫山蘇所述勒為一書其臧質魯爽王僧達諸傳又皆孝武自造而序事多虛難以取信自永光已後至禪讓十餘年中闕而不載至齊著作郎沈約更補綴所遺製成雜史自義熙肇號終乎昇明三年為紀十志三十列傳六十合百卷名曰宋書永明末其書既行河東裴子野更刪為宋略二十卷沈約見而歎曰吾所不逮也由是世之言宋史者以裴略為上沈書次之右說宋書齊史江淹始受詔著述以史之所難無出於志故先著其志以見其才沈約復著齊紀二十篇紀八志十一列傳四十合成五十九篇時奉朝請吳均亦表請撰齊史乞給起居注并群臣行狀有詔齊氏故事布在流俗聞見既多可自搜訪也均遂撰齊春秋三十篇其書稱梁帝為齊明佐命帝惡其實詬燔之然其私本竟能與蕭氏所撰並傳於後右説齊書梁史武帝時沈約與給事中周興嗣步兵校尉鮑行􅀸秘書監謝吳相承撰録已有百篇值承聖淪沒並從焚蕩廬江何之元沛國劉璠以所聞見究其始末合撰梁典三十篇而紀傳之書未有其作陳祠部郎中姚察有志撰勒施功未周但既當朝務兼修國史至於陳亡其書不就右説梁書陳史初有吳郡顧野王北地傅縡各為撰史學士其武文二帝紀即顧傅所修太建初中書郎陸瓊續撰諸篇事傷煩雜姚察就加刪改粗有條貫及江東不守持以入關隋文帝常索梁陳事跡察具以所成每篇續奏而依違荏苒竟未絶筆皇家貞觀初其子思亷為著作郎奉詔撰成二史於是憑其舊藁加以新録彌厯九載方始畢功定為梁書五十六卷陳書三十六卷今並行世焉右説陳書十六國史前趙劉聰時領左國史公師彧撰髙祖本紀及功臣傳二十人甚得良史之體凌修譖其訕謗先帝聰怒而誅之劉曜時平輿子和苞撰趙記十篇事止當年不終曜滅後趙石勒命其臣徐光宗歴傅暢郭愔等撰上黨國記起居注趙書其後又令王蘭陳宴程隂徐機等相次撰述至石虎並令刋削使勒功業不傳其後燕太傅長史田融宋尚書庫部郎郭仲産北中郎參軍王度追撰石事集鄴都記趙紀等書前燕有起居注杜輔全録以為燕紀後燕建興元年董統受詔草創後書著本紀并佐命功臣王公列傳合三十卷慕容垂稱其敘事富贍足成一家之言但褒述過美有慙董史之直其後申秀范享各取前後二燕合成一史南燕有趙郡王景暉嘗事德超撰二主起居注超亡仕於馮氏官至中書令仍撰南燕録六卷蜀初號曰成後改稱漢李勢散騎常侍常璩撰漢書十卷後入晉秘閤改為蜀李書璩又撰華陽國志具記李氏滅前涼張駿十五年命其西曹邊瀏集内外事以付秀才索綏作涼國春秋五十卷又張重華䕶軍參軍劉慶在東苑專修國史二十餘年著涼記十二卷建康太守索暉從事中郎劉昞又各著涼書前秦史官初有趙淵車敬梁熙韋譚相繼著述苻堅嘗取而觀之見茍太后幸李威事怒而焚滅其本後著作郎董誼追録舊語十不一存及宋武帝入關曾訪秦國事又命梁州刺史吉翰問諸仇池並無所獲先是秦秘書郎趙整參撰國史值秦滅隱於南洛山著書不輟有馮翊車頻助其經始一作費整卒翰乃啓頻纂成其書以元嘉九年起至二十八年方罷定為三卷而年月失次首尾不倫河東裴景仁又正其訛僻刪為秦記十一篇後秦扶風馬僧䖍河東衛隆景並著秦史及姚氏之滅殘缺者多泓從弟和都仕魏為左民尚書又追撰秦紀十卷夏天水趙思群北地張淵於真興承光之世並受命著其國書及統萬之亡多見焚燒西涼與西秦北燕其史或當代所書或他邦所録叚龜龍記吕氏宗欽記秃髮氏韓顯宗記吕馮氏唯此三者可知自餘不詳誰作魏世黄門侍郎崔鴻乃考覈衆家辨其同異除煩補闕錯綜綱紀易其國書曰録主紀曰傳都謂之十六國春秋鴻始以景明之初求諸國逸史逮至始元年鳩集㡬備而以猶闕蜀事不果成書推求十有五年始於江東購獲乃増其篇目勒為十卷鴻沒後永安中其子繕寫奏上請藏諸秘閣由是偽史宣布大行於時右說十六國春秋元魏史道武時始令鄧淵著國記為十卷而條例未成暨乎元明廢而不述神嘉二年又詔集諸文士崔浩浩弟覽髙閭鄧頴􅄯維范亨黄輔等撰國書為十卷又特命浩總監史任務從實録復以中書郎髙允散騎侍郎張偉並參著作續成前史書敘述國事無隱惡而刋石寫之以示行路浩坐此夷三族同作死者百二十八人自是遂廢史官至文成帝和平元年始復其職而以高允典著作修國記允年已九十手目俱衰時有校書郎中劉模長於緝綴乃令執筆而口占授之如是者五六歲所成篇卷模有力焉初國記自鄧崔以下皆相承作編年體至孝文大和十一年詔秘書丞李彪著作郎崔光始分為紀傳異科宣武時命邢巒追撰孝文起居注既而崔光遵業補續下説孝明之世温子昇復修孝武紀濟隂王暉業撰辨宗室録魏史官私所撰盡於斯矣齊天寶二年勑秘書監魏收博採舊聞勒成一書又令刁柔辛元植房延祐睦仲讓裴昻之髙孝幹等助其編次收所取史官懼相凌忽故刁辛諸子並乏史才唯以髣髴學流憑附得進於是大徵百家譜狀斟酌以成魏書上自道武下終孝靖紀傳與志凡百三十卷收諂齊氏於魏室多不平既黨北朝又厚誣江左性憎勝己喜念舊惡甲門盛德與之有怨者莫不被以醜言沒其善事遷怒所至毁及髙曾書成始奏詔收於尚書省與諸家論討前後列訴者百有餘人時尚書令楊遵彦一代貴臣勢傾朝野收撰其家傳甚美是以深被黨援諸訟史者皆獲重罰或有斃於獄中羣怨謗聲不息孝昭世勑收更加研審然後宣布於外武成嘗訪諸群臣猶云不實又令治改其所變易甚多由是世薄其書號為穢史至隋開皇勑著作郎魏澹與顔之推辛德源更撰魏書矯正收失澹以西魏為真東魏為偽故文恭列紀孝靖稱傳合紀傳論例總九十二篇煬帝以澹書猶未能善又勑左僕射楊素别撰學士潘徽褚亮歐陽詢等佐之㑹素薨而止今世稱魏史者猶以收本為主焉右説後魏書髙齊史天統初太常少卿祖敬徵述獻起居名曰黄初傳天録時中書侍郎陸元規常從文宣征討著皇帝實録惟記行師不載他事自武平後史官楊休之杜臺卿祖崇儒崔子發等相繼注記逮於齊滅隋秘書監王邵内令史李德林並少仕鄴中多識故事王乃憑述起居注廣以異聞造編年書號曰齊志十有六卷其序云二十卷今世間傳者唯十六卷焉李在齊預修國史創紀傳書二十七卷至開皇初奉詔續撰増多齊史三十八篇已上送官藏之秘府皇家貞觀初勑其子中書舍人百藥仍其舊録雜採他書演為五十卷今之言齊史者唯王李二家云右説北齊書宇文周史大統年有秘書丞柳虬兼領著作直辭正色事有可稱至隋開皇中秘書監牛𢎞追撰周紀十有八篇略敘紀綱仍皆牴牾皇家貞觀初勑秘書丞令狐德棻秘書郎岑文本共加修緝定為周書五十卷右説後周書隋史當開皇仁壽時王邵為書八十卷以類相從定其篇目至於編年紀傳並闕其體煬帝世唯有王胄等所修大業起居注及江都之禍仍多散逸皇家貞觀初勑中書侍郎顔師古給事中孔頴達共撰成隋書五十五卷與新撰周史並行於時初太宗以梁陳及齊周隋氏並未有書乃命學士分修事具於上仍使秘書監魏徵總知其務凡有贊論徵多預焉始以貞觀三年創造至十八年方就唯姚思亷貞觀二年起功多於諸史一歲合五代紀傳并目録凡二百五十二卷書成下於史閣唯有十志斷為三十卷尋擬續奏未有其文又詔左僕射于志寧太史令李淳風著作郎韋安仁符璽郎李延壽同撰其先撰史人唯令狐德棻重預其事太宗崩後刋勒始成其篇第雖編入隋書其實别行俗呼為五代史志右説隋書惟大唐之受命也義寧武德間工部尚書温大雅首撰創業起居注三篇自是司空房元齡給事中許敬宗著作佐郎敬播相與自立編年體號為實録迄乎三帝世有其書貞觀初姚思亷始撰紀傳粗成三十卷至顯慶元年太尉長孫無忌與于志寧令狐德棻著作郎劉允之楊仁卿起居郎顧允等因其舊作綴以後世復為五十卷雖云繁雜時有可觀龍朔中敬宗又以太子少師總統史任更増前作混成百卷如高宗本紀及永徽名臣四夷等傳多是其所造又起草十志未半而終敬宗所作紀傳或曲希時㫖或猥釋私憾凡有毁譽多非實録必方諸魏伯起亦猶張衡之蔡邕焉其後左史李仁實續撰于志寧許敬宗李義府等傳載言紀事見推直筆惜其短世一作歲功業未終至長壽中春官侍郎牛鳳及又斷自武德終於宏道撰為唐書百有十卷鳳及以喑聾不才而輒議一代大典凡所纂録皆素責私家行狀而世人敘事不能自達或言皆比興全類咏歌或語多鄙樸實同文案而總入編次了無􅁵革其有出自胸臆申其機杼發言則媸鄙怪誕敘事則參差倒錯故閱其篇第豈謂可觀披其章句不識所以既而悉收姚許諸本欲使其書獨行由是皇家舊事殘缺殆盡長安中余與正諌大夫朱敬則司封郎中徐堅左拾遺吳兢奉詔更撰唐書勒成八十卷神龍元年又與堅兢等重修則天實録編為三十卷夫舊史之壞其亂如繩錯綜艱難朞月方畢雖言無可擇事多遺恨庶將來削藁猶有憑焉大抵自古史臣撰録其梗槩如此蓋屬詞比事以月繫年為史氏之根本作生人之耳目者略盡於斯矣自餘偏記小説則不暇具而論之右説唐書史通卷十二欽定四庫全書史通卷十三唐劉知幾撰外篇

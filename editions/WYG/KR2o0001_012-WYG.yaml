front:
  text: 十八條易曰上古結繩以理後世聖人易之以書􅆻儒者云伏犧氏始畫八卦造書契以代結繩之政由是文籍生焉又曰伏犧神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也春秋傳載楚左史能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五典策至於春秋之時猶大行於世爰及後世其書不傳惟唐虞已降可得言者然自堯而往聖賢猶述求其一二髣髴存焉而後來諸子廣造竒説其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典所記無得而稱者焉

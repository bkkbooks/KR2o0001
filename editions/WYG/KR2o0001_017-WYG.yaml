body:
  text: 諸晉史東晉之史作者多門何氏中興實居其最而為晉學者曽未之知儻湮滅不行良可惜也王檀著書王隱檀道鸞是晉史之尤劣者方諸前代其陸賈禇先生之比歟道鸞不揆淺才好出竒語所謂欲益反損求妍更媸者矣其一條臧氏晉書稱苻堅之竊號也雖疆宇狹於石虎至於人物則過之按後石之時田融趙史謂勒為前石虎為後石也張據𤓰涼李專巴蜀自遼而左人屬慕容沙漠而南地歸司馬逮於苻氏則兼而有之禹貢九州實得其八而言地劣於趙是何言歟夫識事未精而輕為著述此其不知量也張勔抄撮晉史求其異同而被褐此言不從沙汰罪又甚矣其二條夫學未該博鍳非詳正凡所修撰多聚異聞其為踳駁難以覺悟按應劭風俗通載楚有葉君祠即葉公諸梁廟也而俗云孝明帝時有河東王喬為葉令嘗飛鳬入朝及干寶搜神記乃隱應氏所通而收其流俗怪説又劉敬昇異苑稱晉武庫失火漢高祖斬蛇劒穿屋而飛其言不經故梁武帝令殷芸編諸小説及蕭方等撰三十國史乃刊為正言既而宋求漢事旁取令昇之書范曄後漢書唐徵晉語近憑方等之録謂皇家撰晉書編簡一定膠漆不移故令俗之學者説鳬履登朝則云漢書舊記稱蛇劒穿屋必曰晉典明文摭彼虚詞成兹實録語曰三人成市虎斯言其得之者乎其三條馬遷持論稱堯世無許由應劭著録云漢代無王喬其言儻矣至士安撰高士傳具説箕山之蹟令昇作搜神記深信葉縣之靈此並向聲背實捨真從偽知而故為罪之甚者其四條近者宋臨川王義慶著世説新書上敘兩漢三國及晉中朝江左事劉峻註釋摘其瑕疵偽蹟昭然理難文飾而皇家撰晉史多取此書遂採康王之妄言違孝標之正説以此書事奚其厚顔其五條漢吕后以婦人稱制事同王者班氏次其年月雖與諸帝同編而記其事蹟實與后妃齊貫皇家諸學士撰晉書首發凡例序例一卷晉書之首故云首發凡例而云班漢皇后除王吕之外不為作傳並編敘行事寄出外戚篇所不載者惟元后耳安得輒引吕氏以為例乎蓋由讀書不精識事多闕徒以本紀標目以編高后之年遂疑外戚裁篇輒敘娥姁之事其為率略不亦甚耶其六條揚王孫布囊盛屍祼身而𦵏伊籍對吴以一拜一起未足為勞求兩賢立身各有此一事而已而漢書蜀志為其立傳前哲致議言之詳矣然楊能反經合義足矯奢𦵏之􅄽伊以敏辭辨對可免使乎之辱列諸篇第猶有可取近者皇家撰晉書著劉伶畢卓傳舊晉史本無劉畢傳皇家新撰以補前史所闕其敘事也直載其嗜酒沉湎悖禮亂德若斯而已為傳若此復何所取者哉其七條宋略一條裴幾原刪略宋史定為二十篇芟煩撮要實有其力而所録文章頗傷蕪穢如文帝除徐傅官詔顔延年元后哀冊文顔峻討二凶檄孝武擬李夫人賦裴松之上注國志表孔熈先罪許曜詞凡此諸文是尤不宜載者何則羡亮威權震主負芒猜忌将欲取之必先與之既而罪名具列刑書是正則先所降詔夲非實録而乃先後雙載坐令矛盾兩傷夫國之不造史有哀冊自晉宋已還多載於起居注詞皆虚飾義不足觀必以略言之故宜去也昔漢王數項袁公檄曹若不具録其文難以暴揚其過至於二凶為惡不言可知無俟檄書始明罪状必刊諸國史豈宜異同孝武作賦悼亡鍾心内寵情在兒女語非軍國松之所論者其事甚下兼復文理非工熈先構逆懷奸矯言欺衆且所為草藁本未宣行斯並同在編次不加銓擇豈非蕪濫者耶向若除此數文别存他説則宋年美事遺略蓋寡何乃應取而不取宜除而不除乎但近代國史通多此累有同自鄶無足致譏若裴氏者衆作之中所可與言史者故偏舉其事以申掎摭云後魏書二條宋書載佛狸之入冦也其間勝負蓋皆實録焉魏史所書謂魏收所撰者則全出沈本如事有可恥者則加減隨意依違罕言至如劉氏獻女請和太武以師婚不許此言尤可怪也何者江左皇族水鄉庻姓若司馬劉蕭韓王或出於亡命或起自俘囚一詣桑乾皆成禁臠此皆魏史自述非他國所傳然則北之重南其禮若此安有黃旗之主親屈己以求婚而白登之陣反懷疑而不納一作乃致疑而不納其言河漢不亦甚哉觀休文宋典誠曰不工必比伯起魏書更為良史而收每云我視沈約正如奴耳出闗東風俗傳此可謂飾嫫母而誇西施持魚目而笑明月者也其一條近者沈約晉書喜造竒説稱元帝牛金之子以應牛繼馬後之徵鄴中學者王邵宋孝王言之詳矣而魏收深嫉南國幸書其短著司馬叡傳遂具録休文所言又崔浩謟事狄君曲為邪説稱拓拔之祖本李陵之胄當時衆議相斥事遂不行或有竊其書以渡江者沈約撰宋書索虜傳仍傳伯淵所述凡此諸妄其流甚多儻無迹可尋則真偽難辨者矣其二條北齊諸史三條王邵國史至於論戰争述紛擾賈其餘勇彌見所長至如敘文宣逼孝靖以受魏禪二王殺楊燕以廢乾明雖左氏載季氏逐昭公秦伯納重耳欒盈起於曲沃楚靈敗於乾谿殆可連類也又敘高祖破宇文於卭山周武自晉陽而平鄴雖左氏書城濮之役鄢陵之戰齊敗於鞍吴師入郢亦不是過也其一條或問曰王邵齊志多記當時鄙言為是乎為非乎對曰古往今來名目各異區分壤隔稱謂不同所以晉楚方言齊魯俗語六經諸子載之多矣自漢已降風俗屢遷求諸史籍偹覩其事或君臣之目施諸朋友或尊官之稱屬諸君父曲相崇敬標以處士王孫輕相侮辱號以僕夫舎長亦有荆楚訓多為夥廬江目橋為圯南呼北人曰傖西謂東胡曰虜渠們底箇底音丁禮反江左彼此之辭乃若君卿中朝汝我之義斯並因地而變隨時而革布在方冊無假推尋足以知甿俗之有殊驗土風之不類然自二京失守四夷稱制夷夏相雜音句尤媸而彦鸞伯起務存隱諱謂長為藏蓋為姚萇諱重規德棻志在文飾遂使中國數百年内其俗無得而言蓋語曰知古而不知今謂之陸沉又曰一物不知君子所恥是則時無遠近事無巨細必藉多聞以成博識如今之所謂者若中州名漢闗右稱羌易臣以奴呼母云姊主上有大家之號師人致兒郎之説凡如此例其流甚多必尋其本原莫詳所出閲諸齊志則了然可知由斯而言邵之所録其為宏益多矣足以開後來之䝉蔽廣來者之耳目㣲君懋吾幾靣墻於近事矣而子奈何妄加譏誚者哉其二條皇家修五代史館中墜藁仍存皆因彼舊事定為新史觀其朱墨所圖鈆黃所拂猶有可識者或以實為虚以是為非其北齊國史皆稱諸帝廟號及李氏之撰齊書謂李百藥其廟號有犯時諱者謂有世字犯太宗文皇帝諱也即稱諡焉至如變世祖為文襄改世宗為武成茍除兹世字而不悟襄成有别諸如此謬不可勝紀故其列傳之敘事也或以武定臣佐降在成朝或以河清事迹擢居襄代故時日不接而隔越相偶使讀者瞀亂而不測驚駭而多疑嗟乎因斯而言則自古著書未能精讜書成絶筆而遽捐舊章遂令玉石同燼真偽難尋者不其痛哉其三條周書一條今俗所行周史是令狐德棻等所撰其書文而不實雅而無檢真跡甚寡客氣尤煩尋宇文初習華風事由蘇綽至於軍國詞令皆準尚書太祖勑朝廷他文悉準於此蓋史臣所記皆禀其規栁虬之徒從風而靡按綽文雖去彼淫麗存兹典實而䧟於矯枉過正之失乖夫適俗隨時之義茍記言若是則其謬逾多爰及牛𢎞彌尚儒雅即其舊事因而勒成務累清言罕逢佳句而令狐不能别求他術用廣異聞惟憑本書重加潤色案宇文氏事多見於王邵齊志隋書及蔡允恭後梁春秋其王褒庾信等又多見於蕭韶太清記蕭大圜淮海亂離志裴政太清實録杜臺卿齊記而令狐德棻了不兼採以廣其書蓋以其中有鄙言故致遺略遂使周氏一代之史多非實録者焉隋書二條昔賈誼上書􅄯錯對䇿皆有益於國足貽勸戒而編於漢史讀者猶恨其繁如隋書王邵袁充兩傳惟録其詭辭妄説遂盈一篇尋又申以詆訶尤其䧟惑夫人載言示後者貴於辭理可觀既以無益而書孰若遺而不載蓋學者神識有限而述者注記無涯以有限之神識觀無涯之注記必如是則閱之心目視聼告勞書之簡編繕寫不給嗚呼茍自古著述其皆若此也則知李斯之設坑穽董卓之成帷蓋雖其所行多濫終亦有可取焉其一條按隋史譏王君懋撰齊隋二史其敘録煩碎至如劉臻還宅訪子方知王邵思書為奴所侮此而畢載其失更多可謂尤而效之罪又甚焉者矣其二條史通卷十七欽定四庫全書史通卷十八唐劉知幾撰外篇雜説下第九總二十五條

body:
  text: 雜述第三十四昔在三墳五典春秋檮杌即上代帝王之書中古諸侯之記行諸歴代以為格言其餘外傳則神農嘗藥厥有本草夏禹敷土實著山經世本辨姓著自周室家語載言傳諸孔氏是知偏記小說自成一家而能與正史參行其所從來尚矣爰及近古斯道漸煩史氏流别殊途並騖㩁而為論其流有十焉一曰偏記二曰小錄三曰逸事四曰瑣言五曰郡書六曰家史七曰别傳八曰雜記九曰地理書十曰都邑簿夫皇王受命有始有卒作者著述詳略難均有權記當時不終一代若陸賈楚漢春秋樂資山陽公載記王韶晉安陸紀姚梁後略此之謂偏記者也普天率土人物𢎞多求其行事罕能周悉則有獨舉所知編為短部若戴逵竹林名士王粲漢末英雄蕭世誠懐舊志盧子行知巳傳此之謂小錄者也國史之任記事記言視聴不該必有遺逸於是好竒之士補其所亡若和嶠汲冡紀年葛洪西京雜記顧協璅語謝綽拾遺此之謂逸事者也街談巷議時有可觀小說為言猶賢於已故好事君子無所棄諸若劉義慶世說裴榮期語林孔思尚語錄陽松玠談藪此之謂瑣言者也汝潁奇士江漢英靈人物所生載光郡國故鄉人學者編而記之若周稱陳留耆舊周裴汝南先賢陳壽益部耆舊虞預㑹稽典錄此之謂郡書者也髙門華胄奕世載徳才子承家思顯父母由是紀其先烈貽厥後來若揚雄家牒殷敬世傳孫氏譜記陸宗系厯此之謂家史者也賢士貞女類聚區分雖百行殊途而同歸於善則有取其所好各為之錄若劉向列女梁鴻逸民趙採忠臣徐廣孝子此之謂别傳者也隂陽為炭造化為工流形賦象于何不育求其怪物有廣異聞若祖台志怪干寳搜神劉義慶幽明劉敬叔異苑此之謂雜記者也九州土宇萬國山川物産殊宜風化異俗如各志其本國足以明此一方若盛𢎞之荆州記常璩華陽國志辛氏三秦羅含湘中此之謂地理書者也帝王枽梓列聖遺塵經始之制不常厥所茍能書其􅁤則可以龜鏡將來若潘岳闗中陸機洛陽三輔黄圖建康宫殿此之謂都邑簿者也大抵偏記小錄之書皆記即日當時之事求諸國史最為實錄然皆言多鄙朴事罕圓備終不能成其不刋永播來葉徒為後生作者削藁之資焉逸事皆前史所遺後人所記求諸異說為益實多及妄者為之則茍載傳聞而無銓擇由是真偽不别是非相亂如郭子横之洞㝠王子年之拾遺全搆虚辭用驚愚俗此其為弊之甚者也瑣言者多載當時辨對流俗嘲謔㑭夫樞機者藉為舌端談話者將為口實乃蔽者為之則有詆訐相戲施諸祖宗䙝狎鄙言出自牀第莫不昇之紀錄用為雅言固以無益風規有傷名教者矣郡書者矜其鄉賢美其邦族施於本國頗得流行置於他方罕聞愛異其有如常璩之詳審劉炳之該博而能傳諸不朽見羙來裔者盖無幾焉家史者事惟三族言止一門正可行於家室難以播於邦國且箕裘不墮則其錄雖存茍薪搆已亡則斯文亦喪者矣别傳者不出胸臆非由機杼徒以博採前史聚而成書其有足以新言加之别說者盖不過十一而已如寡聞末學之流則深所嘉尚至於探幽索隠之士則無所取材雜記者若論神仙之道則服食鍊氣可以益壽延年語魑魅之途則福善禍淫可以懲惡勸善斯則可矣及繆者為之則茍談怪異務述妖邪求諸𢎞益其義無取地理書者若朱贛所採浹於九州闞駟所書殫於四國斯則言皆雅正事無偏黨者矣其有異於此者則人自以為樂土家自以為名都競美所居談過其實又城池舊跡山水得名皆傳諸委巷用為故實鄙哉都邑簿者如宫闕陵廟街􅌀郭邑辨其規模明其制度斯則可矣及愚者為之則煩而且濫博而無限故論榱棟則尺寸皆書記草木則根株必數務求詳審持此為能遂使學者觀之瞀亂而難紀也於是考兹十品徵彼百家則史之雜名其流盡於此矣至於其間得失紛糅善惡相兼既難為覼縷故粗陳梗槩且同自鄶無足譏焉又按子之將史本為二說然如吕氏淮南𤣥晏抱朴凡此諸子多以敘事為宗舉而論之抑亦史之雜也但以名目有異不復編於此科盖語曰衆星之明不如一月之光歴觀自古作者著述多矣雖復門千戸萬波委雲集而言皆瑣碎事必藂殘固難以接光塵於五傳並輝烈於三史古人以比玉屑滿篋良有㫖哉然則芻蕘之言明王必擇葑菲之體詩人不棄故學者有博聞舊事多識其物若不窺别錄不討異書専治周孔之章句直守遷固之紀傳亦何能自致於此乎且夫子有云多聞擇其善者而從之知之次也茍如是則書有非聖言多不經學者博聞盖在擇之而已辨識第三十五夫設官分職佇勣課能欲使上無虚稱下無虚受其難矣哉昔漢文帝幸諸將營而目周亞夫為真将軍嗟乎必於史職求其若斯乃為難遇者矣史之為務厥途有三焉何則彰善貶惡不避强禦若晉之董狐齊之南史此其上也編次勒成鬱為不朽若魯之邱明漢之子長此其次也髙才博學名重一時若周之史佚楚之倚相此其下也苟三者竝闕復何為者哉昔魯叟之修春秋也不藉三相之勢漢臣之著史記也無假七貴之權而近古每有撰述必以大臣居首按晉起居注載康帝詔盛稱著述任重理藉親覽遂以武陵王領秘書監尋武陵才非河獻識異淮南而輒以彼藩翰董斯邦籍求之稱職無聞焉爾既而齊撰國史和士開總知唐修本草徐世勣監綂夫使辟陽長信指撝南董之前周勃張飛彈壓桐雷之右斯亦怪矣大抵監史為難斯乃尤之尤者若使直若南史才如馬遷精勤不􅈈若揚子雲諳識故事若應仲遠兼斯具美督彼羣才使載言記事藉為模楷搦管操觚歸其準的斯則可矣但今之従政則不然凡居斯職者必恩幸貴臣凡庸賤品飽食安步坐嘯畫諾若斯而已矣夫人既不知善之為善則亦不知惡之為惡故凡所引進皆非其才或以勢利見升或以干祈致擢遂使當官効用江左以不樂為謡拜職辨名洛中以不閒為說言之可為大噱可為長歎也曽試論之世之従仕者若使之為將也而才無韜略使之為吏也而術靡循良使之屬文也而匪閑於辭賦使之講學也而不習於經典斯則負乗致冦悔􅈔旋及雖五尺童兒猶知調笑者矣唯夫修史者則不然或當官卒嵗竟無刋述而人莫之知也或輒不自揆輕弄筆端而人莫之見也由斯而言彼史曹者崇扄峻宇深附九重雖地處禁中而人同方外可以養拙可以藏愚繡衣直指所不能繩强項申威所不能及斯固素食之窟宅尸祿之淵藪也凡有國有家者何事於斯職哉昔子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮又語云雖無老成人尚有典刑觀歴代之置史臣有同嬉戲而竟不廢其職者盖存夫愛禮恡彼典刑者乎昔邱明之修傳也以避時難子長之立記也藏於名山班固之成書也出自家庭陳壽之為志也創於私室然則古來賢雋立言垂後何必身居􅅟宇跡參僚屬而後成其事乎是以深識之士知其若斯退居清淨杜門不出成其一家獨斷而已豈與夫冠猴獻狀評議其得失者哉自敘第三十六予幼奉庭訓早遊文學年在紈綺便受古文尚書每苦其辭艱瑣難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聴逮講畢即為諸兄說之因竊歎曰若使書皆如此吾不復怠矣先君竒其意於是始授以左氏朞年而講誦都畢于時年甫十有二矣所講雖未能深解而大義略舉父兄欲令博觀議疏精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既欲知古今㳂革厯數相承於是觸類而觀不假師訓自漢中興已降迄乎皇家實錄年十有七而窺覽略周其所讀書多因假賃雖部帙殘缺篇題有遺題音第至於敘事之紀綱立言之梗槩亦粗知之矣但于時將求仕進兼習揣摩至於專心諸史我則未暇洎年登弱冠射策登朝於是思有餘間遂其本願旋游京洛頗積嵗年公私借書恣情披閱至如一代之史分為數家其間雜記小書又競為異說莫不鑚研穿鑿盡其利害加以自小觀書喜談名理其所悟者皆得諸衿腑非由染習故始在總角讀班謝兩漢便怪前書不應有古今人表後書宜為更始立紀當時聞者共責以童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范曄集果以二史為非其有暗合於古人者盖不可勝紀始知流俗之士難與之言凡有異同蓄諸方寸及年以過立言悟日多常恨時無同好可與言者維東海徐堅晚與之遇相得甚歡雖古者伯牙之識鍾期管仲之知鮑叔不是過也復有永城朱敬則沛國劉允濟吳興薛謙光河南元行沖陳留吳兢壽春裴懐古亦以言議見許道術相知所有㩁揚得盡懐抱每云徳不孤必有鄰四海之内知我者不過數子而已矣昔仲尼以睿聖明哲天縦多能覩史籍之繁文懼覽之者不一刪詩為三百篇約史記以修春秋讚易道以黜八索述職方以除九邱討論墳典斷自唐虞以訖于周其文不刋為後王法自兹厥後史籍逾多茍非命世大才孰能刋正其失嗟予小子敢當此任其於史傳也嘗欲自班馬已降迄于姚李令狐顔孔諸書莫不因其舊義頗加􅁵革但以無夫子之名而輒行夫子之事將恐致驚愚俗取咎時人徒有其勞而莫之見賞所以每握管歎息遲回者乆之非欲之而不能實能之而不欲也既朝廷有知意者遂以載筆見推由是三為史臣再入東觀則天朝為著作佐郎轉左史今上初即位又除著作長安中以本官兼修國史㑹遷中書舍人暫罷其任神龍元年又以本官兼修國史迄今不之改今之史舘即古之束觀也每惟皇家受命多歴年所史官所編粗惟記錄至於紀傳及志則皆未有其書長安中年㑹奉詔預修唐史及今上即位又勑撰則天大聖皇后實錄凡所著述常欲行其舊議而當時同作諸士及監修貴臣每與其鑿枘相違齟齬難入故其所載削皆與俗沉浮雖自謂依違茍従然猶大為史官所嫉嗟乎雖任當其職而吾道不行見用於時而美志不遂鬱怏孤憤無以寄懐必寢而不言嘿而無述又恐歿世之後誰知予者故退而私撰史通以見其志昔漢世劉安著書號曰淮南子其書牢籠天地博極古今上自太公下至商鞅其錯綜經緯自謂兼於數家無遺力矣然自淮南以後作者無絶必商㩁而言則其流又衆盖仲尼既歿㣲言不行史公著書是非多謬由是百家諸子詭說異辭務為小辨破彼大道故揚雄法言生焉儒者之書博而寡要得其糟粕失其菁華而流俗鄙夫貴遠賤近傳兹牴牾自相欺惑故王充論衡生焉民者冥也冥然罔知率彼愚䝉墻面而視或訛音鄙句莫究本源或守株膠柱動多拘忌故應劭風俗通生焉五常異禀百行殊􅁤能有兼偏知有長短茍隨才而任使則片善不遺必求備而後用則舉世莫可故劉劭人物志生焉夫開國承家立身行事一文一武或出或處雖賢愚壤隔善惡區分茍時無品藻則理難銓綜故陸景典語生焉詞人屬文其體非一譬甘辛殊味丹素異彩後來祖述識昩圓通家有詆訶人相掎摭故劉勰文心生焉若史通之為書也盖傷當時載筆之士其道不純思欲辨其指歸殫其體統夫其書雖以史為主而餘波所及上窮王道下掞人倫總括萬殊包吞千有自法言已降迄于文心而往以納諸胸中曽不蔕芥者矣夫其為義也有與奪焉有褒貶焉有鑒誡焉有諷刺焉其為貫穿者深矣其為網羅者宻矣其所商略者逺矣其所發明者多矣盖談經者惡聞服杜之媸論史者憎言班馬之失而此書多譏往哲喜述前非獲罪於時固其宜矣猶冀知音君子時有觀焉尼父有云罪我者春秋知我者春秋抑斯之謂也昔梁徵士劉孝標作敘傳其自比於馮敬通者有三而予輒不自揆亦竊比於揚子雲者有四焉何者揚雄嘗好雕蟲小伎老而悔其少作余幼喜詩賦而壯都不為耻以文士得名期以述者自命其似一也揚雄草𤣥累年不就當時聞者莫不哂其徒勞余撰史通亦屢移寒暑悠悠塵俗共以為愚其似二也揚雄撰法言時人競尤其妄故作解嘲以訓之余著史通見者亦互言其短故作釋䝉以拒之其似三也揚雄少為范逡劉歆所重及聞其撰太𤣥經則嘲以恐盖醤瓿然劉范之重雄者盖貴其文彩若長楊羽獵之流耳如太𤣥深奥難以探􅄨既絶窺踰故加譏誚余初好文筆頗獲譽於當時晚談史傳遂減價於知已其似四也夫才唯下劣而跡類先賢是用銘之於心持以自慰抑猶有遺恨懼不似揚雄者有一焉何者雄之𤣥經始成雖為當時所賤而桓譚以為數百年外其書必傳其後張衡陸績果以為絶倫參聖夫以史通方諸太𤣥今之君山即徐朱等數君是也後來張陸則未之知耳嗟乎倘使平子不出公紀不生將恐此書與糞土同捐煙燼俱滅後之識者無得而觀此予所以撫卷漣洏淚盡而繼之以血也史通卷十欽定四庫全書史通卷十一唐劉知幾撰

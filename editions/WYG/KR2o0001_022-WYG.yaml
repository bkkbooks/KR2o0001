body:
  text: 忤時第十三孝和皇帝時韋武弄權母媪預政凡有附麗之者起家而綰朱紫予以無所傅㑹取擯當時一為中允四載不遷㑹天子還京師朝廷願從者衆予求番次在大駕後發因逗留不去守司東都杜門却掃凡經三載或有譖予躬為史臣不書國事而取樂丘園私自著述者由是驛召至京令専執史筆于時小人道長綱紀日壊仕於其間忽忽不樂遂與監修國史蕭至忠等諸官書求退曰僕幼聞詩禮長涉藝文至於史傳之言尤所耽恱尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謩中朝江左王陸干孫紀其厯劉石僭號方䇿委於和張宋齊應録惇史歸於蕭沈亦有汲冢古篆禹穴殘編孟堅所亡葛洪刋其雜記休文所缺荀綽裁其拾遺凡此諸家其流葢廣莫不賾彼泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范曄為書盛言矜其賛體斯又當仁不讓庶㡬前哲者焉然自䇿名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞籍以衆功方云絶筆唯後漢東觀大集羣儒著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子紏之於當代傅范兩家媸之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿毎欲記一事載一言皆閣筆相視含毫不斷故白首可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺況僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者葢由杜彼顔面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絶口而朝野具知筆未栖毫而縉紳咸誦夫孫盛紀實取嫉權門王邵直書見讎貴族人之情也能無畏乎其不可三也古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教也以疏通知逺為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而飾主闕斯並曩時得失之例良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隠惡十羊九牧其令難行一國三公適從何在其不可四也切以史置監修雖古無式尋其名號可得而言夫言監者葢總領之義耳如創紀編年則年有斷限草傳叙事則事有豐約或可略而不略或應書而不書此刋削之失例也屬詞比事勞逸宜均揮鈆奮墨勤惰須等某表某篇付之此職某傳某志歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學茍且務相推避坐變炎涼徒延嵗月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議安得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云嵗序已淹何時輟手切以網維不舉而督課徒勤雖威以刺骨之刑勗以懸金之賞終不可得也語曰陳力就列不能者止所以比者布懐知已歴詆羣公屢辭載筆之官願罷記言之職者正為此爾抑又有所未諭聊復一二言之比奉髙命令𨽻名修史其職非一如張尚書崔岑二吏部鄭太常等既迫以吏道不可拘之史任以僕曹務多閒勒令専知下筆夫以惟寂惟寞乃使記事記言茍如其例則栁常侍劉祕監徐禮部等並門可張羅府無堆案何事置之度外而使各無羈束乎必謂諸賢載削非其所長以僕鎗鎗佼佼故推為首最就如斯理亦有其說何者僕少小從仕早躡通班當皇上初臨萬邦未親庶務而以守兹介直不附奸臣遂使官若土牛棄同芻狗逮鑾輿西幸百寮畢從自惟官曹務簡求以留後居臺常謂朝廷不知國家於我已矣豈謂一旦忽承恩㫖州司臨門使者結轍既而驅駟馬入函關排千門謁天子引賈生於宣室雖歎其才召季布於河東反增其愧明公既位居端揆望重台衡飛沈屬其顧盼榮辱由其俛仰曾不上祈宸極申之以寵光僉議搢紳縻我以好爵其相見也直云史筆闕書為日已久石渠掃第思子為勞今之仰追唯此而已抑明公足下獨不聞劉炫蜀王之說乎昔劉炫仕隋為蜀王侍讀尚書牛𢎞甞問之曰君王遇子其禮如何曰相期髙於周孔見待下於奴僕𢎞不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期髙於周孔酒食左右皆饜而我餘􅄋不霑是見待下於奴僕也僕亦竊不自揆輒敢方於鄙宗何者求史才則千里降追語宦途則十年不進意者得非相期髙於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隠非吏惟以守愚自得寧以充詘攖心但今者黽勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施儻使士有澹雅若嚴君平清亷如段干木與僕易地而處亦將彈鋏告勞積薪為恨況僕未能免俗能不蔕芥於心者乎當今朝號得人國稱多士蓬山之下良直差肩芸閤之中英竒接武僕既功虧刻鵠筆未獲麟徒殫太官之膳虚索長安之米乞已本職還其舊居多謝簡書請避賢路唯明公足下哀而許之至忠得書大慚無以酬答又惜其才不許解史任而宗楚客崔湜鄭愔等皆惡聞其短共讎嫉之俄而蕭宗等相次伏誅然後獲免於難史通卷二十

front:
  text: 二總十四條夫人識有不燭神有不明則真偽莫分邪正靡别昔人有以髮繞灸誤其國君者有置毒於胙誣其太子者夫髮經炎炭必致焚灼毒味經時無復殺害而行之者偽成其事受之者信以為然故使見咎一時取怨千載夫史傳叙事亦多如此其有道理難憑欺誣可見如古來學者莫覺其非葢往往有焉今聊舉一二加以駁難列之如左其一條史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為巳死象乃止舜宮難曰夫杳㝠不測變化無恒兵革所不能傷網羅所不能制若左慈易質為羊劉根竄引入壁是也時無可移禍有必至雖大聖所不能免若姬伯拘於羑里孔父厄於陳蔡是也然俗之愚者皆謂彼幻化是為聖人豈知聖人智周萬物才兼百行若斯而已與夫方内之士有何異哉如史記云重華入於井中匿空出去此則其意以舜是左慈劉根之類非姬伯孔父之徒苟識事如斯難以語夫聖道矣且按太史公黄帝堯舜軼事時時見於他說余擇其言尤雅者著為本紀書首若如向之所述豈可謂之雅邪其二條又史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟為夀王大驚以為孫叔敖復生欲以為相難曰葢語有之人心不同有如其面故窳隆異等修短殊姿皆稟之自然得諸造化非由倣傚俾有遷革如優孟之象孫叔敖也衣冠談說容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪昔陳隼既亡累年而活秦諜從縊六日而蘇遂使竹帛顯書今古稱怪況叔敖之没時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以豈有片言不接一見無疑遽欲加以寵榮復其禄位此乃類夢中行事豈人倫所為者哉其三條又史記田敬仲世家曰田常成子以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以諡此之不實明然可知又按左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎史記家令說太上皇曰髙祖雖子人主也諸如此說其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語簒成歌詞欲加刋正無可釐革故獨舉其失以為標冠云其四條又史記仲尼弟子列傳曰孔子既没有若狀似孔子弟子相與共立為師事之如夫子他日弟子進問曰昔夫子甞行使弟子持雨具已而果雨商瞿長無子母為取家孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知之有若嘿然無應弟子起曰有若避此非子之坐也難曰孔門弟子七十二人柴愚參魯宰言游學師商可方回賜非類此並聖人品藻優劣已詳門徒商搉臧否又定如有若者名不𨽻於四科譽無偕於十哲逮尼父既没方取為師以不答所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使喪明致罰投杖謝愆何肯公然自欺詐相䇿奉此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷裁史仍習其言得自委巷曾無先覺悲夫其五條又史記漢書皆曰上自雒陽南宮從複道望見諸將往往相與坐沙中語上曰此何語留侯曰陛下所封皆故人親愛所誅皆平生讎怨此屬畏誅故相聚謀反爾上乃憂曰為之奈何留侯曰上平生所憎誰最甚者上曰雍齒留侯曰今先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣於是上置酒封雍齒為侯難曰夫公家之事知無不為見無禮於君如鷹鸇之逐鳥雀按子房之少也傾家結客為韓報仇此則忠義素彰名節甚著其事漢也何為屬羣小聚謀將犯其君遂嘿然杜口俟問方對倘若髙祖不問竟欲無言者邪且將而必誅罪在不測如諸將屯聚圖為禍亂密言臺上猶懼覺知羣議沙中何無避忌為國之道必不如斯然則張良慮反側不安雍齒以嫌疑受爵葢當時實有其事也如複道之望坐沙而語是說者敷演妄益其端耳其六條又東觀漢記曰赤眉降後積甲與熊耳山齊云云難曰按盆子既亡棄甲誠衆必與山比峻則未之有也昔太誓云前徒倒戈血流漂杵孔安國曰葢言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟其七條又東觀漢記曰郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至郭外問使者何日當還伋使别駕計日告之既還先期一日伋為違信止於野亭須期乃入難曰葢此事不可信者三焉按漢時方伯儀比諸侯其行也前驅竟野竟一作蔽後乘塞路鼓吹沸喧旌棨填咽彼草萊稚子齠齓童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌襜帷首觸威嚴自陳襟抱其不可信一也又方伯按部舉州振肅至於墨紱長吏黄綬羣官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩息有所如棄而不就居止無常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄他方葢亦事同大夏訪諸商賈不可多得況在童孺彌復難求羣戲而乘如何克辦其不可信三也凡說此事總有三科搉而論之了無一實異哉其八條又魏志注語林曰匈奴遣使人來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云云難曰昔孟陽卧牀詐稱齊后紀信乘纛矯號漢王或主遘屯䝉或朝罹兵革故權以取濟事非獲已如崔琰本無此急何得以臣代君者哉且凡稱人君皆慎其舉措況魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉矚也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛結以親姻猶恐虺毒不悛狼心易擾如輒殺其使者不顯罪名復何以懐四夷於外蕃建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜兹謗口而言同綸綍聲遍寰區欲葢而彰止益其辱雖愚暗之主猶所不為況英略之君豈其若是夫芻蕘鄙說閭巷讇言諸如此書通無擊難而裴引語林斯事編入魏史注中持彼虚詞亂兹實録故特申掎摭辨其疑誤者焉葢曹公多詐好立詭謀流俗相欺遂為此說其九條又魏世諸小書皆云文鴦侍講殿瓦皆飛云云難曰案漢書云項王叱咤慴伏千人然則呼聲之極大者不過使人披靡而已尋文鴦武勇逺慚項籍況侍君側固當屏氣徐言安能使檐瓦皆飛有踰武安鳴鼓且瓦既飄隕則人必震驚而魏帝與其羣臣焉得巋然無害也其十條又晉陽秋曰胡質為荆州刺史子威自京師省之見父十餘日告歸質賜絹一疋為路粮威曰大人清髙不審於何得此絹質曰是吾俸禄之餘難曰古人謂方牧為二千石者以其禄有二千石故也名以定體貴實甚焉設使亷如伯夷介若黔敖茍居此職終不患於貧餒者如胡威之别其父也一縑之財猶且發問則千石之俸其費安施料以牙籌推以食箸察其厚薄知不然矣或曰觀諸史所載兹流非一如張湛為蜀郡乗折轅車吳隠之為廣川貨犬待客並其類也必以多為證則足可無疑然人自有身安弊緼口甘麄糲而多藏鏹帛無所散用者故公孫𢎞位至三公而卧布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此而史臣不詳厥理直謂清白當然繆矣哉其十一條又新晉書阮籍傳曰籍至孝母終正與人圍碁對者求止籍留與決既而飲酒二斗舉聲一號吐血數升及葬食一蒸㹠飲酒二斗然後臨穴直言窮矣舉聲一號因復吐血數升毁瘠骨立殆致滅性難曰夫人才雖下愚識惟不肖始亡天屬必致其哀但以苴絰未㡬悲荒遽輟如謂本無戚容則未之有也況嗣宗當聖善將没閔凶所鍾合門惶恐舉族悲咤居里巷者猶停舂相之音在鄰伍者尚申匍匐之救而為其子者方對局求決舉杯酣觴但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之喪親也朝夕孺慕鹽酪不甞斯可至於癯瘠矣如甘㫖在念則觔肉内寛醉飽自支一作得則肌膚外博況乎溺情㹠酒不改平素雖復時一嘔慟豈能柴毁骨立乎葢彼阮生者不修名教居喪過失而說者遂言其無禮如彼人以其志操尤異才識甚髙而談者遂言其至性如此惟毁及譽皆無取焉其十二條又新晉書王祥傳曰祥漢末遭亂扶母攜弟覽避地廬江隠居三十餘年不應州郡之命母終徐州刺史呂䖍檄為别駕年垂耳順覽勸之乃應召于時冦賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實賴王祥年八十五太始五年薨難曰祥為徐州别駕冦盜充斥固是漢建安中徐州未清時事耳有魏受命凡三十五年上去徐州冦賊充斥下至晉太始五年當六十年已上矣祥於建安中已垂耳順更加六十載至晉太始五年薨則當年一百二十嵗矣而史云年八十五薨者何也如必以終時實年八十五則為徐州别駕止可年二十五六矣又云其未從官已前隠居三十餘載者但其初被檄時止年二十五六自此而往安得復有三十餘年乎必謂祥為别駕在建安後則徐州清晏何得云于時冦賊充斥祥率勵兵士頻討破之乎求其前後無一符㑹也其十三條凡所駁難具列如右葢精五經者討羣儒之别義練三史者徵諸子之異聞加以探賾索隠然後辨其紕繆如向之諸史所載則不然何者其叙事也唯記一途直論一理而矛盾自顯表裏相乖非復抵捂直成狂惑者爾尋兹失所起良由作者情多忽略識惟愚滯或採彼流言不加銓擇或傳諸繆說即從編次用使真偽混淆是非參錯葢語曰君子可欺不可罔至如邪說害正虚詞損實小人以為信爾君子知其不然語曰盡信書不如無書葢為此也夫書彼竹帛事非容易凡為國史可不慎諸其十四條

body:
  text: 内篇表厯第七盖譜之建名起於周氏表之所作因譜象形故桓君山有云太史公三代世表旁行斜正並效周譜此其證歟夫以表為文用述時事施彼譜厯容或可取載諸史傳未見其宜何則易以六爻窮變化經以一字成褒貶傳包五始詩含六義故知文尚簡要語惡煩蕪何必欵曲重沓方稱周備觀馬遷史記則不然夫天子有本紀諸侯有世家公卿已下有列傳至於祖孫昭穆年月職官各在其篇具有其説用相考覈居然可知而重列之以表成其煩費豈非謬乎且表次在篇第編諸卷軸得之不為益失之不為損用使讀者莫不先看本紀越至世家表在乎其間緘而不視語其無用可勝道哉旣而班東二史東謂東觀漢記各相祖述迷而不悟無異逐狂必曲為銓擇强加引進則列國年表或可存焉何者當春秋戰國之時天下無主羣雄錯峙各自年世若申之於表以統其時則諸國分年一時盡見如兩漢御厯四海成家公卿旣為臣子王侯纔比郡縣何用表其年數以别於天子者哉又有甚於斯者異哉班氏之人表也區别九品網羅千載論世則異時語姓則他族自可方以類聚物以羣分使善惡相從先後為次何藉而為表乎且其書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢燕施松上附生疣贅不知剪截何斷而為限乎至法盛書載中興改表為注名目雖巧蕪累亦多當晉氏播遷南據揚越魏宗勃起北雄燕代其間諸偽十有六家不附正朔自相君長崔鴻著表頗有甄明比於史漢羣篇其要為切者矣若諸子小說編年雜記如韋昭洞紀陶𢎞景帝王厯皆因表而作用成其書旣非國史之流故存而不述書志第八并序志天文志五行雜志藝文志夫刑法禮樂風土山川求諸文籍出於三禮及班馬著史别裁書志考其所記多效禮經且紀傳之外有所不盡隻事片文於斯備録語其通博信作者之淵海也原夫司馬遷曰書班固曰志東觀曰記華嶠曰典張勃曰録何法盛曰説名目雖異體統不殊亦猶楚謂之檮杌晉謂之乗魯謂之春秋其義一也於其編次則有前曰平凖後云食貨古號河渠今稱溝洫析郊祀為宗廟分禮樂為威儀懸象出於天文郡國生於地理如斯變革不可勝計或名非而物是或小異而大同但作者愛竒恥於仍舊必尋源討本其歸一揆也若乃五行藝文班𥙷子長之闕百官輿服謝拾孟堅之遺王隠後來加以瑞異魏收晚進宏以釋老斯則自我作故出乎胷臆求諸厯代不過一二者焉大抵志之為篇其流十五六家而已其間則有妄入編次虚張部帙而積習已乆不悟其非亦有事應可書宜别標篇題音第而古來作者曽未覺察今略陳其義列於下云已上書志序夫兩曜百星麗於𤣥象非如九州萬國廢置無恒故海田可變而景緯無易古之天猶今之天也今之天即古之天也必欲刋之國史施於何代不可也但史記包括所及區域綿長故書有天官讀者竟忘其誤㩁而為論未見其宜班固因循復以天文作志志無漢事而𨽻入漢書尋篇考限覩其乖越者矣降及有晉迄于隋氏或地止一隅或年纔二世而彼蒼列志其篇倍多流宕忘歸不知紀極方於漢史又孟堅之罪人也切以國史所書宜述當時之事必為志而論天象也但載其時彗孛氛祲薄食晦明裨竈梓慎之所占京房李郃之所候至如熒惑退舎宋公延齡中台告坼晉相速禍星集穎川而賢人聚月犯少㣲而處士亡如斯之類志之可也若乃體分濛澒色著青蒼丹曦素魄之躔次黄道紫宫之分野旣不預於人事輙編之於策書故曰刋之國史施於何代不可也其間惟有袁山松沈約蕭子顯魏收等數家頗覺其非不遵舊例凡所記録多合事宜寸有所長賢於班馬逺矣已上天文志伏羲已降文籍始備逮於戰國其書五車傳之無窮是曰不朽夫古之所制我有何力而班漢定其流别編為藝文志論其妄載事等上篇謂天文志續漢已還祖述不暇夫前志已録而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎且漢書之志天文藝文也盖欲廣列篇名示存書體而已文字旣少披閱易周故雖乖節文而未甚穢累旣而後來繼述其流日廣天文則星占月㑹渾圖周髀之流藝文則四部七録中經秘閣之輩莫不各踰三箧自成一家史臣所書宜其輟簡而近世有著隋書者乃廣包衆作勒成二志騁其繁富百倍前修非唯循覆車而重軌亦復加闊眉以半額者矣但自史之立志非復一門其理有不安多從㳂革唯藝文一體古今是同詳求厥義未見其可愚謂凡撰志者宜除此篇必不能去當變其體近者宋孝王闗東風俗傳亦有墳籍志其所録皆鄴下文儒之士讐校之司所列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄菅蒯於宋王得之矣已上藝文志夫灾祥之作以表吉凶此理昭昭不易誣也然則麒麟鬬而日月食鯨鯢死而彗星出河變應於千年山崩由於朽壌又語曰太嵗在丑乞漿得酒太嵗在已販妻鬻子則知吉凶逓代如盈縮循環此乃闗諸天道不復繋乎人事且周王决疑龜焦蓍折宋皇誓衆竿壊幡亡梟止梁師之營鵩集賈生之舎斯皆妖灾著象而福禄來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故諸侯相赴有異不為灾見於春秋其事非一洎漢興儒者乃考洪範以釋隂陽其事也如江璧傳於鄭谷逺應始皇卧桞植於上林近符宣帝門樞白髪元后之祥柱樹黄雀新都之䜟舉夫一二良有可稱至於蜚蜮蝝螽震食崩坼隕雨霜雹大水無氷其所證明實皆迂闊故當春秋之世其在於魯也如有旱雩舛候螟螣傷苗之屬是時或秦人歸禭或毛伯錫命或滕邾入朝或晉楚來聘皆持此恒事應彼咎徴旻穹垂謫厥罰安在探􅄨索隠其可略諸且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇號為繁富作者猶廣之以拾遺加之以語録况彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解卷纔三十則知其言所略盖亦多矣而漢代儒者羅災𤯝於二百年外討符㑹於三十卷中安知事有不應於人應人而失其事何得茍有變而必知其兆者哉若乃採前文而改易其説謂王札子之作亂在彼成年春秋成公元年二月無氷董仲舒以為其時王札子殺召伯毛伯案今春秋經札子殺召毛事在宣十五年非成公時夏徴舒之構逆當夫昭代春秋昭公九年陳災董仲舒以為楚莊王為陳討夏徵舒因滅陳陳之臣子毒恨故致火災按楚莊王之滅陳在宣十一年如昭九年所滅者乃楚靈王時是莊王卒恭王立恭王卒康王立康王卒夾敖立夾敖卒靈王立相去凡五世在五行志上卷中楚莊作覇荆國始僣稱王春秋桓公三年日有食之旣京房易傳以為後楚荘稱王兼地千里按自武王始僣號厯文成繆三王始至於莊然則楚之稱王已四世矣何得言荘始稱哉又魯桓薨後世厯莊閔釐文者凡五君而楚莊邪作覇安有桓三年日食而應之髙宗諒隂亳都實生桑榖尚書伊陟相太戊亳有桑榖共生劉向以為殷道哀髙宗承弊而起盡諒隂之哀天下應之既獲顯榮怠於政事國將危亡故桑榖之異見按太戊崩其後嗣有仲丁河亶甲祖乙盤庚凡厯五世始至武丁即髙宗是也桑榖自太戊時生非髙宗事高又本不都於亳晉悼臨國六卿專政以君事臣董仲舒以為成公十七年六月甲戌朔日有食之時宿在畢晉家象也晉厲公後莫敢責大夫六卿遂相與比周專晉國君還事之按春秋成公十二月丁巳朔日食非是六月魯僖末年三桓世官殺嫡立庶春秋僖公三十三年十二月隕霜不殺草劉向以為是時公子遂專權三桓始世官向又曰嗣君㣲失柄來事之象也又釐公二十九年秋大雨雹劉向以為釐公末年信用公子遂專權自恣至於殺君故隂脅陽之象見釐公不悟遂終專權後二年殺子赤立宣公按此事乃文公未出不是僖公時也遂即東門襄仲赤文公太子即惡也斯皆不慿章句直取胷懷或以前為後以虚為實移的就箭曲取相諧掩耳盜鍾自云無覺詎知後生可畏來者難誣者邪又品藻羣流題目庶類謂莒為大國菽為强草鶖著素色負蠜匪中國之蟲春秋莊公二十九年冇蜰劉歆以為蜰負蠜也劉向以為非中國所有南越盛暑男女同川澤滛風所生是時莊取齊滛女為夫人既入滛於兩叔故蜰至按負蠜中國所生不獨出南越鸜鵒為夷狄之鳥春秋昭公二十五年鸜鵒來巢劉向以為夷狄之禽桉鸜鵒中國皆有唯不踰濟水耳事見周官如斯詭妄不可殫論而班固就加纂次曽靡銓擇因以五行編而為志不亦惑乎且每有叙一灾推一怪董京之説前後相反桓公三年日冇食之董仲舒劉向以為魯宋殺君易許田劉歆以為晉曲沃莊伯殺晉侯京房以為後楚莊稱王兼地千里也向歆之解父子不同莊公七年夜中星隕如雨劉向以為夜中者即中國也劉歆以為晝象中國夜象夷狄劉向又以為蜮生南越劉歆以為盛暑所生非自越來也遂乃雙載其文兩存厥理言無凖的事益煩費豈所謂撮其機要收彼菁華者乎自漢中興已還迄于宋齊其間司馬彪臧榮緒沈約蕭子顯相承載筆竟志五行雖未能盡善而大較多實何者如彪之徒皆自以名慙漢儒才劣班史凡所辨論務守常途旣動遵繩墨故理絶河漢兼以古書從略求徴應者難該近史尚繁考祥符者易洽此昔人所以言有乖越後進所以事不精審也然則天道遼逺禆竈焉知日食不常文伯所對至如梓慎之占星象趙達之明風角單颺識魏祚於黄龍董養徴晉亂於蒼鳥斯皆肇彰先覺取騐將來言必有中語無虛發茍誌諸竹帛其誰曰不然若乃前事已徃後來追證課彼虛説成此有詞多見其老生常談徒煩翰墨者矣子曰盖有不知而作之者我無是也包曰時人有穿鑿妄作篇籍者故云然又曰君子於其所不知盖闕如也又曰知之為知之不知為不知是知也嗚呼世之作者其鑒之哉談何容易駟不及舌無為强著一言受嗤千載也已上五行志或以為天文藝文雖非漢書所宜取而有廣聞見難為删削也對曰茍事非其限而越理來書自可觸類而長于何不録又有要於此者今可得而言焉夫圓首方足含靈受氣吉凶形於相貌貴賤彰於骨法生人之所欲知也四支六府痾瘵所纒茍詳其孔穴則砭灼無悞此養生之尤急且身名並列親疎自明豈可近昧形骸而逺求辰象旣天文有志何不為人形志乎茫茫九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣被且事當炎運尤相闗涉爾雅釋物非無徃例旣藝文有志何不為方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七略因人成事其目遂多至若許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨捨諸深所未曉厯觀衆史諸志列名或前略而後詳或古無而今有雖逓補所闕各自以為工搉而論之皆未得其最盖可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬户兆庶仰其威神虎踞龍蹯帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宫闕制度朝廷軌儀前王所為後王取則故齊府肇建誦魏都以立宫代國初遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晉宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏逺名號非一凡為國史者宜各撰都邑志列於輿服之上金石草木縞紵絲枲之流鳥獸蟲魚齒革羽毛之類或百蠻攸税或萬國是供夏書則編於禹貢周書則託於王㑹亦有圖形九牧之鼎列狀四荒之經觀之者擅其博聞學之者騁其多識自漢氏拓境無國不賔則有卭竹傳節䈮醬流味大宛輸其善馬蜀本作獻宋本作輸條攴致其巨雀爰及魏晉迄于周隋咸亦遐邇來王任土作貢異物歸於計吏竒名顯於職方凡為國史者宜各撰方物志列於食貨之首帝王苗裔公侯子孫餘慶所鍾百世無絶能言吾祖郯子見師於孔公不識其先籍談取誚於姬后故周撰世本式辨諸宗楚置三閭實掌王族逮乎晚葉譜學尤煩用之於官可以品藻士庶施之於國可以甄别華夷自劉曹受命雍豫為宅世胄相承子孫蕃衍及永嘉東渡流寓揚越代氏南遷革夷從夏於是中朝江右南北混淆華壌邉民虜漢相雜隋有天下文軌大同江外山東人物殷湊其間髙門素族蜀本作貴宋本作素非復一家郡正州都世掌其任凡為國史者宜各撰氏族志列於百官之下盖自都邑已降氏族而徃實為志者所宜先而諸史竟無其録如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曽何足云惟此數條粗加商略得失利害從可知矣庶夫後來作者擇其善而行之已上雜志或問曰子以都邑氏族方物宜各纉次以志名篇夫史之有志多憑舊説茍世無其録則闕而不編此都邑之流所以不果列志也對曰按帝王建國本無恒所作者記事亦在相時逺則漢有三輔典近則隋有東都記於南則有宋南徐州記晉宫闕名於北則有洛陽伽藍記鄴都故事盖都邑之事盡在是矣譜牒之作盛於中古漢有趙岐三輔决録晉有摰虞姓族記江左有兩主百家譜中原有方思殿格盖氏族之事盡在是矣自沈瑩著臨海水土周處撰陽羨土風厥類衆夥諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮盖方物之事盡在是矣凡此諸書代不乏作必聚而為志奚患無文譬夫涉海求魚登山採木至於鱗介脩短柯條巨細盖在擇之而已茍為漁人匠者何慮山海之貧罄哉史通卷三欽定四庫全書史通卷四唐劉知幾撰内篇

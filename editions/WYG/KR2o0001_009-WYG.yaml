body:
  text: 覈才第三十一夫史才之難其難甚矣晉令云國史之任委之著作每著作郎初至必撰名臣傳一人斯盖察其所由茍非其才則不可叨居史任歴觀古之作者若蔡邕劉峻徐陵劉炫之徒各自謂長於著書達於史體然觀侏儒一節而他事可知按伯喈於方朔上書謂宜廣班氏天文志夫天文之於漢史實附贅之尤甚者也必欲申以掎摭但當鋤而去之安可仍其過失而益其蕪累亦奚異觀河傾之患而不遏以隄防方欲疏而導之用速懐襄之害述史如此将非練達者歟孝標持論析理誠為絶倫而自敘一篇過為煩碎山西一志直論文章諒難以偶跡遷固比肩陳范者也孝穆在齊有志於梁史及還江左而書竟不成嗟乎以徐公文體而施諸史傳亦猶㶚上兒戲異乎真将軍幸而量力不為可謂自卜者審矣光伯以洪儒碩學而迍邅不遇觀其鋭情自敘欲以垂示将來而言皆淺俗理無要害豈所謂誦詩三百雖多亦奚以為者乎昔尼父有言文勝質則史盖史者當時之文也然朴散淳銷時移世異文之與史皎然異轍故以張衡之文而不嫺於史以陳壽之史而不習於文其有賦述兩都詩裁八詠而能編次漢冊勒成宋典若斯人者其流幾何是以略觀近代有齒跡文章而兼修史傳其為式也羅含謝客宛為歌頌之文蕭繹江淹直成銘贊之序温子昇尤工複語工一作喜盧思道雅好麗詞江總猖獗以沉迷庾信輕薄而流宕此其大較也然向之數子所撰者盖不過偏記雜說小卷短書而已猶且乖濫踳駁一至於斯而況責之以刋勒一家彌綸一代使其始末圓備表裏無咎盖亦難矣但自世重文藻詞宗麗淫於是沮誦失路靈均當軸每西省虚職東觀佇才凡所拜授必推文士遂使握管懐鈆多無銓綜之職連章累牘罕逢㣲婉之言而舉俗共以為能當時莫之敢侮假令其間有術同彪嶠才若班荀懐獨見之明負不刋之業而皆取窘於流俗見嗤於朋黨遂乃哺糟歠醨俯同妄作被褐懐玉無由自陳此管仲所謂用君子而以小人參之害覇之道者也昔傳𤣥有觀孟堅漢書實命代竒作及與陳宗尹敏杜撫馬嚴􅁧中興紀傳其文曾不足觀豈拘於時乎不然何不類之甚者也是後劉珍朱穆盧植楊彪之徒又繼而成之豈亦各拘於時而不得自盡乎何其益陋也嗟乎拘時之患其來尚矣斯則自古之所歎豈獨當今者哉序傳第三十二盖作者自敘其流出於中古乎按屈原離騷經其首章上陳氏族下列祖考先述厥生次顯名字自叙發跡實基於此降及司馬相如始以自敘為傳然其所敘者但記自少及長立身行事而已逮於祖先所出則蔑爾無聞至馬遷又徵三閭之故事倣文園之近作模楷二家勒成一卷於是揚雄遵其舊轍班固酌其餘波自敘之篇實煩於代雖屬辭有異而兹體無易尋馬遷史記上自軒轅下窮漢武疆宇修闊道路綿長故其自敘始於氏出重黎終於身為太史雖上下馳騁終不越史記之年班固漢書止敘西京二百年事耳其自敘也則逺徵令尹起楚文王之世近錄賓戲當漢明帝之朝苞括所及踰於本書逺矣而後來敘傳非止一家競學孟堅從風而靡施於家牒猶或可通列於國史每見其失者矣然自敘之為義也茍能隠已之短稱其所長斯言不謬即為實錄而相如自序及記其客逰臨卭竊妻卓氏以春秋所諱持為美談雖事或非虚而理無可取載之於傳不其愧乎又王充論衡之自紀也述其父祖不肖為州閭所鄙而已荅以瞽頑舜神鯀惡禹聖夫自敘而言家世固當以揚名顯親為主茍無其人闕之可也至若盛矜於已而厚辱其先此何異證父攘羊學子名母必責以名敎實三千之罪人也夫自媒自衒士女之醜行然則人莫我知君子所耻按孔氏論語有云十室之邑必有忠信不如丘之好學也又曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎又曰文王既沒文不在兹乎又曰昔者吾友嘗從事於斯矣則聖達立言也時亦揚露巳才或託諷以見其情或選辭以顯其跡選一作巽終不盱衡自伐攘袂公言且命諸門人各言爾志由也不讓見嗤無禮歴觀揚雄已降其自敘也始以誇尚為宗至魏文帝傅𤣥陶梅葛洪之徒則又踰於此者矣何則身兼片善行有㣲能皆剖析具言一二必載豈所謂憲章前聖謙以自牧者歟又近古人倫喜稱閥閱其蓽門寒族百代無聞而騂角挺生一朝暴貴無不追述本系妄承先哲至若儀父振鐸並為曹氏之初淳維李陵俱稱拓㧞之始河南馬祖遷彪之說不同吳興沈先約炯之言有異斯皆不因真律無假寧楹直據經史自成矛盾則知楊姓之寓西蜀班門之雄朔野或胄纂伯僑或家傳熊繹恐自我作古失之彌逺者矣盖諂祭非鬼神所不歆致敬他親人斯悖徳凡為敘傳宜詳此理不知則闕亦何傷乎煩省第三十三昔荀卿有云錄遠略近則知史之詳略不均其為患者乆矣及干令昇史議干寳字令昇晉人歴詆諸家而獨歸美左傳云邱明能以三十卷之約括囊二百四十年之事靡有孑遺斯盖立言之髙標著作之良模也又張世偉著班馬優劣論云張輔字世偉晉人遷敘三千年事五十萬言固敘二百四十年事八十萬言是班不如馬也然則自古論史之煩省者咸以左氏為得史公為次孟堅為非自魏晉已還年祚轉促而為其國史亦不減班書此則後來逾煩其失彌甚者矣余以為近史蕪累誠則有諸亦猶古今不同勢使之然也輒求其本意略而論之何者當春秋之時諸侯力爭各閉境相拒闗梁不通其有吉凶大事見知於他國者或因假道而方聞或以同盟而始赴茍異於是則無得而稱魯史所書實用此道至如秦燕之據有西北楚越之大啟東南地僻界於諸戎人罕通於上國故載其行事多有闕如且其書自宣成已前三紀而成一卷至昭襄已下數年而占一篇是知國阻隔者記載不詳年淺近者􅁧錄多備杜預釋例云文公已上書日者二百四十九宣公已下亦俱六公書日者四百三十二計年數略同而日數加備此亦乆逺遺落不與近同也是則儒者注書已見之矣此邱明隨聞見而成傳何有故為簡約者哉及漢氏之有天下也普天率土無思不服會計之吏嵗奏於闕廷輶軒之使月馳於郡國作者居於京兆府徵事於四方用使夷夏必聞逺近無隔故漢氏之史所以倍増於春秋也降及東京作者彌衆至如名邦大都地富才良髙門甲族世多髦俊邑老鄉賢競為别錄家牒宗譜各成私傳於是筆削所採聞見益多此中興之史所以又廣於前漢也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以謝承尤悉江左京洛事缺於三吳陳壽偏委蜀中巴梁語詳於二國如宋齊受命梁陳握紀或地比禹貢一州或年方秦氏二世夫地之褊小年之窘迫適使作者採訪易洽巨細無遺耆舊可詢隠諱咸露此小國之史所以不減於大邦也夫論史之煩省但當求其事有妄載若於榛蕪言有闕書傷於簡略斯則可矣必量世事之厚薄限篇第以多少理則不然且必謂邱明為省也若介葛辨犧於牛鳴叔孫志夢於天壓楚人敎晉以抜斾城者謳華以棄甲此而畢書豈得謂之省邪且必謂漢書為煩也若武帝乞􅄴於柏父陳平獻計於天山長沙戲舞以請地楊僕怙寵而移闗此而不錄豈得謂之煩邪由斯而言則史之煩省不中從可知矣又古今有殊澆淳不等帝堯則天稱大書惟一篇周武觀兵孟津言成三誓伏犧止畫八卦文王加以繫辭俱為大聖行事若一其豐儉不類懸隔如斯必以古方今持彼喻此如􅃖尤黄帝交戰阪泉施於春秋則城濮鄢陵之事也有窮簒夏少康中興施於兩漢則王莽光武之事也夫差既滅勾踐覇世施於東晉則桓𤣥宋祖之事也張儀馬錯為秦開蜀施於三國則鄧艾鍾會之事也而往之所載其簡如彼後之所書其審如此若使後來同於往世限一槩以成書將恐學者必詬其疎遺尤其率略者矣而議者茍嗤沈蕭之所記沈約字休文梁人著宋書蕭衍字子顯著齊書事倍於孫習孫盛字安國晉人著晉書習鑿齒字彦威亦著晉書華謝之所編華嶠謝忱亦著漢史語煩於班馬不亦繆乎故曰論史之煩省者但當求其事有妄載言有闕書斯則可矣必量世事之厚薄限篇第以多少理則不然其斯之謂也史通卷九欽定四庫全書史通卷十唐劉知幾撰内篇

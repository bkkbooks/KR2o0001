body:
  text: 史通卷十三欽定四庫全書史通卷十四唐劉知幾撰外篇申左第五古之人言春秋三傳者多矣戰國之世其事罕聞當前漢專用公羊宣皇已降穀梁又立於學至成帝世劉歆始重左氏而竟不列學官大抵自古重兩傳而輕左氏者固非一家美左氏而議兩傳者亦非一族互相攻擊各自朋黨籠聒紛競是非莫分然則儒者之學茍以專精為主至於治章句通訓釋斯則可也至於論大體舉宏綱則言罕兼統理無要害故使今古疑滯莫得而申者焉必揚㩁而論之言傳者固當以左氏為首但自古學左氏者談之又不得其情如賈逵撰左氏長義稱在秦者為劉氏乃漢室所宜推先但取悅當時殊無足採又按桓譚新論曰左氏傳於經猶衣之表裏而東觀漢記陳元奏云光武興立左氏而桓譚衛宏並共毁訾故中道而廢班固藝文志云丘明與孔子觀魯史記而作春秋有所貶損事形於傳懼罹時難故隱其書末世口説流行遂有公羊穀梁鄒氏夾氏諸傳而於固集復有難左氏九條三評等科夫以一家之言一人之説而參差相背前後不同斯又不足觀也夫解難者以理為本如理有所闕欲令有識心伏不亦難乎今聊次其所疑列之於後盖左氏之義有三長而二傳之義有五短按春秋昭二年韓宣子來聘觀書於太史氏見魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也然春秋之作始自姬旦成諸仲尼丘明之傳所有筆削及發凡例皆得周典杜預釋例公羊穀梁之論春秋皆因事以起問因所問以辨義之精者曲以所通無他凡例也左丘明則周禮以為本諸稱凡以發例者皆周公之舊制者也傳孔子教故能成不刋之書著將來之法其長一也又按哀三年魯司鐸火南宮敬叔命周人出御書之時於魯文籍最備丘明既躬為太史博總羣書至如檮杌紀年之流鄭書晉志之類凡此諸籍莫不畢覩其傳廣包他國每事皆詳其長二也論語子曰左丘明恥之丘亦恥之夫以同聖之才而膺授經之托加以達者七十弟子三千逺自四方同在一國於是上詢夫子下訪其徒凡所採摭實廣聞見其長三也如穀梁公羊者生於異國長自後來語地則與魯史相違論時則與宣尼不接安得以傳聞之説而與親見者爭先乎譬猶近世漢之太史晉之著作撰成國典時號正言既而先賢耆舊謂楚國先賢傳汝南先賢行狀益部耆舊傳襄陽耆舊傳等書語林世說競造異端强書他事夫以傳自委巷而將班馬抗衡訪諸古老而與子孫並列斯則難矣彼二傳之方左氏亦奚異於此哉其短一也左氏述臧哀伯諫桓納鼎周内史美其讜言王子朝吿于諸侯閔馬父嘉其辨説凡如此類其數實多斯盖當時發言形於翰墨立言不朽播於他邦而丘明仍其本語就加編次亦猶近代史記載樂毅李斯之文漢書録􅄯錯賈生之筆尋其實也豈是子長藁削孟堅雌黄所搆者哉觀二傳所載有異於此其録人言也語乃齷齪一作齟齬文皆瑣碎夫如是者何哉盖彼得史臣之簡書此傳流俗之口說故使隆促各異豐儉不同其短二也尋左氏載諸大夫詞令行人應答其文典而美其語博而奥如僖伯諫君觀魚富辰諫王納帶王孫勞楚而論九鼎季札觀樂而談國風其所援引皆據禮經之類是也述逺古則委曲如存如郯子聘魯言少昊以名官季孫行父稱舜舉八元八凱魏絳答晉悼公引虞人之箴子革諷楚靈王誦祈招之詩其事明白非厚誣之類徵近代則循環可覆如呂相絶秦述兩國世隙聲子班荆稱楚材晉用晉士渥濁諫殺荀林父説晉文公敗楚於濮有憂色子服景伯謂吳云楚圍宋易子而食析骸以爨猶無城下之盟祝鮀稱踐土盟晉重耳魯申蔡甲午之類也必料其功用厚薄措思深淺諒非經營草創出自一時琢磨潤色獨成一手斯盖當時國史已有成文丘明但編而次之配經稱傳而已也如二傳者記言載事失彼菁華尋源討本取諸胷臆夫自我作故無所凖繩故理甚迂僻言多鄙野比諸左氏不可同年其短三也按二傳雖以釋經為主其缺漏不可殫論如經云薨而左傳云公子圍所殺及公羊作傳重述經文無所發明依違而已其短四也漢書載成方遂詐稱戾太子至於闕下雋不疑曰昔衛蒯瞶得罪於先君將入國太子輙拒而不納春秋是之遂命執以屬吏霍光由是始重儒學按雋生所引乃公羊正文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國梟獍為曹禮法不容名教同嫉而公羊釋義反以衛輙為賢是違夫子之教失聖人之㫖奬進惡徒疑誤後學其短五也若以彼三長校兹五短勝負之理為主而於内則為國隱惡於外則承赴而書求其本事大半失實已於疑經篇載之詳矣尋斯義之作也盖是周禮之故事魯國之遺文夫子因而修之亦存舊制而已至於實録付之丘明用使善惡必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉盖語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲盖而彰求名而亡善人勸焉淫人懼焉尋春秋所書實乖此義而左傳所録無媿斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉杜預釋例曰凡諸侯無加民之惡而稱人以執皆時之赴吿欲重而罪以加民為辭國史承以書於䇿而簡牘之記具存夫子因示虛實故左傳隨實而著本狀以明其得失也案杜氏此釋實得經傳之情者也儒者茍譏左氏作傳多敘經外别事如楚鄭與齊三國之賊弑隱桓昭襄四君之簒逐其外則承吿如彼其内則隱諱如此若無左氏立傳其事無由獲知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當晉景行覇公室方强而云韓氏攻趙有程嬰杵臼之事出史記趙世家魯侯禦宋得雋乘丘而云莊公敗績有馬驚流矢之禍楚晉相遇唯在邲役而云二國交戰置師於兩堂出賈誼新書子罕相國宋睦於晉而云晉將伐宋覘其哭陽門蜀本哭下有於字宋本無介夫乃止出禮記魯師滅項晉止僖公而云項實齊桓所滅春秋為賢者諱出公羊傳襄年再盟君臣和叶而云諸侯失政大夫皆執國權出穀梁傳其記時也盖秦穆居春秋之始而云其女為荆昭夫人出列女傳韓魏處戰國之時而云其君陪楚莊王葬馬出史記滑稽傳列子書論尼父而云生在鄭穆公年出劉向七録扁鵲醫療虢公而云時當趙簡子日出史記扁鵲傳欒書仕於周室而云以晉文如獵犯顏直言出劉向新序荀息死於奚齊而云觀晉靈作臺累碁申誡出劉向説苑或以先為後或以後為先日月顛倒上下翻覆古來君子曽無所疑及左傳既行而其失自顯語其𢎞益不亦多乎而世之學者猶未之悟所謂㤀我大德日用而不知者焉然自丘明之後迄及魏滅年將千祀其書寢廢至晉太康年中汲冢獲書全同左氏汲冡所得書尋亦亡逸今惟紀年瑣語師春在焉案紀年瑣語載春秋時事與左氏同師春多載春秋時筮者繇辭將左氏相校遂無一字差舛故束晳云若使此書出於漢世劉歆不作五原太守矣於是摯虞束晳引其義以相明王接荀顗取其文以相證杜預申以注釋注謂注解釋謂釋例干寶籍為師範事具干寶晉紀敘例中由是世稱實録不復言非其書漸行物無異議故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曽子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其㫖傳所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋夫學者茍徵此二說以考三傳亦足以定是非明真偽者矣何必觀汲冢而後信者乎從此而言從一作以則三傳之優劣見矣史通卷十四欽定四庫全書史通卷十五唐劉知幾撰外篇㸃煩第六總十八條夫史之煩

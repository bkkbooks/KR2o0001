front:
  text: 條昔孔宣父以大聖之德應運而生生人已來未之有也故使三千弟子七十門人鑚仰不及請益無倦然則尺有所短寸有所長其間切磋酬對頗亦互聞得失何者覩仲由之不悅則矢天厭以自明答言偃之弦歌則稱戲言以釋難斯則聖人之設敎其理含𢎞或援誓以表心或稱非以受屈豈與夫庸儒末學文過飾非使夫問者緘辭杜口懷疑不展若斯而已哉嗟夫古今世殊師授路隔恨不得親膺洒掃陪五尺之童躬奉德音撫四科之友而徒以硏尋蠧簡穿鑿遺文菁華久謝糟粕為偶遂使理有未達無由質疑是用握卷躊躇揮毫悱憤儻梁木斯壞魂而有靈敢効接輿之歌輙同林放之問但孔氏之立言行事刪詩讃易其義既廣難以具論今惟摭其史文評之於後其一條按夫子所修之史是曰春秋切詳春秋之義其所未諭者有十二何者趙孟以無辭伐國貶號為人把伯以夷禮來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此則人倫臧否在我筆端直道而行夫何所讓奚為齊鄭及楚國有弑君各以疾赴遂皆書卒昭九年公子圍弑其君郟敖襄七年鄭子駟弑其君僖公十年齊人弑其君悼公而春秋但書云楚子麇卒鄭伯頑卒齊侯陽生卒夫臣弑其君子弑其父凡在含識皆知恥懼茍欺而可免則誰不願然且官為正卿返不討賊地居冢嫡藥不親嘗遂皆被以惡名播諸來葉必以彼三逆方兹二弑躬為梟獍則漏網遺名跡涉𤓰李乃凝脂顯録嫉惡之情豈其若是其所未諭一也其二條又案齊乞野幕之弑事起陽生楚靈乾谿之縊禍由常壽而春秋捐其首謀捨其親弑乞謂齊陳乞比楚公子比也亦何異魯酒薄而邯鄲圍城門火而魚池及必如是則邾之閽者私憾射姑以其君急而好潔可行欺以激怒遂傾瓶水沃庭俾廢爐而爛卒斯亦罪之大者曷不書弑乎宜書云閽弑邾子其所未諭二也其三條蓋明鏡之照物也妍媸必露不以毛嬙之面或有疵瑕而寢其鑒也虛空之傳響也清濁必聞不以綿駒之歌時有誤曲而輟其應也夫史官執簡宜類於斯茍愛而知其醜憎而知其善善惡必書斯必實録觀夫子修春秋也多為賢者諱狄實滅衛因桓恥而不書河陽召王成文美而稱狩斯則情兼向背志懷彼我茍書法其如是也豈不使賢人君子靡憚憲章雖玷白圭無慙良史也其所未諭三也其四條哀八年及十三年公再與吳盟而皆不書八年注云不書盟恥吳夷也十三年注云盟不書諸侯恥之故不録也桓二年公及戎盟戎實豺狼非我族類夫非所諱而仍諱謂當恥而無恥求之折衷未見其宜其所未諭四也其五條諸國臣子非卿不書必以地來奔則雖賤亦志斯豈非國之大事不可限以常流者邪如陽虎盜入于讙擁陽關而外叛傳具其事經獨無聞何哉且弓玉云亡猶獲顯記城邑失守反不沾書略大存小理乖懲勸其所未諭五也其六條按諸侯世嫡嗣業居䘮既未成君不避其諱此春秋之例也何為般野之沒皆書以名而惡視之殂直云子卒其所未諭六也其七條凡在人倫不得其死者邦君已上皆謂之弑卿士已上通謂之殺此又春秋之例也按桓二年書曰宋督弑其君與夷及其大夫孔父僖十年又曰晉里克弑其君卓及其大夫荀息及宜改為殺夫臣當為殺而稱及與君弑同科茍弑殺不分則君臣靡别者矣公羊傳曰及者何累也雖有此釋其義難通既未釋此疑共編於未諭他皆倣此也其所未諭七也其八條夫臣子所書君父是黨雖事乖正直而理合名教如魯之隱桓戕弑昭哀放逐姜氏淫奔子般夭酷斯則邦之孔醜諱之可也如公送晉葬公與吳盟為齊所止為邾所敗盟而不至㑹而後期並諱而不書豈非煩碎之甚且按汲冢竹書其晉春秋及紀年之載事也如重耳出奔惠公見獲書其本國皆無所隱唯魯春秋之記其國也則不然何者國家之事無大小茍涉嫌疑動稱恥諱厚誣來世奚獨多乎其所未諭八也其九條案昭十二年齊納北燕伯者何燕伯子陽公子陽生也左傳曰納北燕伯欵于唐唐杜注云陽即唐燕之别邑子曰我乃知之矣在側者曰子茍知之何以不革曰如爾所不知何夫如是夫子之修春秋皆遵彼乖僻習其訛謬凡所編次不加刋改者矣何為其間則一褒一貶時有弛張或㳂或革曾無定體其所未諭九也其十條又書事之法其理宜明使讀者求一家之廢興則前後相㑹討一人之出入則始末可尋如定六年書鄭滅許以許男斯歸而哀元年書許男與楚圍蔡夫許既滅矣君執家亡能重列諸侯舉兵圍國者何哉盖其間行事必當有說經既不書傳又闕載缺略如此尋繹難知其所未諭十也其十一條按晉自魯閔公已前未通於上國至僖二年滅下陽已降漸見於春秋盖始命行人自達於魯也而𤨏語春秋載魯國閔公時事言之甚詳斯則聞事必書無假相赴者也盖當時魯史他皆倣此至於夫子所修也則不然凡書異國皆取來吿茍有所吿雖小必書如無其吿雖大亦闕故宋飛六鶂小事也以有吿而書之晉滅三邦大事也謂滅耿滅魏滅霍也以無吿而闕之用使巨細不均繁省失中比夫諸國史記奚事獨為疎闊尋兹例之作也蓋因周禮舊法魯䇿成文夫子既撰不刋之書為後王之則豈可仍其過失而不中規矩者乎其所未諭十一也其十二條蓋君子以博聞多識為工良史以實録直書為貴而春秋記他國之事必憑來者之辭而來者所言多非其實或兵敗而不以敗吿君弑而不以弑稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋葬而以冬赴皆承其所説而書遂使眞偽莫分是非相亂其所未諭十二也其十三條凡所未諭其類尤多静而思之莫究所以豈夫子之牆數仞不得其門者歟將丘也幸茍有過人必知之者歟如其與奪請謝不敏其十四條又世人以夫子固天攸縦將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫知指實㩁而為論其虛美者有五焉按古者國有史官具列時事觀汲墳所記墳一作冢皆與魯史符同至如周之東遷其説稍備隱桓已上難得而詳此之煩省皆與春秋不别又獲君曰止誅臣曰刺殺其大夫曰執我行人鄭棄其師隕石于宋五其事並出竹書紀年唯鄭棄師出瑣語晉春秋也諸如此句多是古史全文則知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史䇿有闕文時月有失次皆存而不正無所用心斯又不可能而殫説矣而太史公云夫子為春秋筆則筆削則削子夏之徒不能贊一辭其虛美一也其十五條又案宋襄公執滕子而誣之以得罪楚靈王弑郟敖而赴之以疾亡春秋皆承吿而書曾無變革是則無辜者反加以罪有罪者得隱其辜求諸勸戒其義安在而左丘明論春秋之義云或求名而不得或欲盖而名彰善人勸焉淫人懼焉其虛美二也其十六條又春秋之所書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌肸習於春秋至於董狐書法而不隱南史執簡而累進又寗殖出君而卒自憂名在䇿書故知當時史臣各懷直筆斯則有犯必死書法無捨者矣自夫子之修春秋也盖他邦之簒賊其君者有三謂齊鄭楚已解於上本國之殺逐其君者有七隱閔般惡視五君被弑昭哀二主被逐也莫不缺而靡録使其有逃名者而孟子云孔子成春秋亂臣賊子懼無乃烏有之談歟其虛美三也其十七條又按春秋之文雖有成例或事同書異理殊書一故太史公曰孔氏著春秋隱桓之間則彰至定哀之際則㣲為其切當世之文而亡褒諱之辭也斯則危行言遜吐剛茹柔推避以求全依違以免禍而孟子云孔子曰知我者其惟春秋乎罪我者其惟春秋乎其虛美四也其十八條按趙穿殺君而稱宣子之弑江乙亡布而稱令尹所盜此則春秋之世有識之士莫不㣲婉其辭隱晦其說斯盖當時之恒事習俗所常行而固云仲尼沒而㣲言絶觀㣲言之作豈獨宣父者邪其虛美五也其十九條考兹衆美徵其本源良由達者相承儒敎傳授既欲神其事故談過其實語曰衆善焉必察之孟子曰堯舜不勝其美桀紂不勝其惡尋世之言春秋者得非覩衆善而不察同堯舜之多美者云其二十條昔王充設論有問孔之篇雖論語羣言多見指擿而春秋雜義曽未發明是用廣彼舊疑増其新覺將來學者幸為詳之其二十一條

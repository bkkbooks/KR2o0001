body:
  text: 漢書五行志錯誤第十班氏著志牴牾者多在於五行蕪累尤甚今輒條其錯繆定為四科一曰引書失宜二曰叙事乖理三曰釋災多濫四曰古學不精又於四科之中疏為雜目類聚區分編之如后第一科引書失宜者其流有四一曰史記左氏交錯相併二曰春秋史記雜亂難别三曰屢舉春秋言無定體四曰書名去取所記不同其志叙言之不從也先稱史記周單襄公告魯成公曰晉將有亂又稱宣公六年鄭公孫曼蒲與王子伯廖語欲為卿按宣公六年自左傳所載也夫上論單襄則持史記以標首下列曼蒲則遺左氏而無言遂令讀者疑此宣公上出史記而不云魯后莫定何邦是非難悟進退無準此所謂史記左氏交錯相併也志云史記成公十六年公㑹齊侯于周按成公者即魯侯也班氏凡說魯之某公皆以春秋為冠何則春秋者魯史之號言春秋則知公是魯君今引史記居先成公在下書非魯史而公捨魯名膠柱不移守株何甚此所謂春秋史記雜亂難别也按班書為志本以漢為主在於漢時直記其帝號諡耳至於他代則云某書某國君此其大例也至如叙火不炎上具春秋桓公十四年次叙稼穡不成直云莊公二十八年而已夫以火稼之間别書漢莽之事年代已隔去魯尤疎洎乎改說異端仍取春秋為始而於莊公之上不復以春秋建名遂使漢帝魯公同歸一揆必為永例理亦可容在諸異科事又不爾求之畫一其例無常此所謂屢舉春秋言無定體也按本志叙漢已前事多略其書名至如服妖章初云晉獻公使太子率師佩之金玦續云鄭子臧好為聚鷸之冠此二事之上每加左氏為首夫一言可悉而再列其名省則都捐繁則太甚此所謂書名去取所記不同也第二科叙事乖理者其流有五一曰徒發首端不副徵驗二曰虚編古語討事不終三曰直引時談竟無他述四曰科條不整尋繹難知五曰標舉年號詳略無準志曰左氏昭公十五年晉籍談如周葬穆后既除喪而燕叔向曰王其不終乎吾聞之所樂必卒焉今王一嵗而有三年之喪二焉於是乎以喪賔燕樂憂甚矣禮王之大經也一動而失二禮無大經矣將安用之按其後七年王室終如羊舌所說此即其效也而班氏了不言之此所謂徒發首端不副徵驗也志云左氏襄公二十九年晉汝齊語智伯曰齊髙子容宋司徒皆將不免子容専司徒侈皆亡家之主也専則速及侈則將以力弊九月髙子出奔北燕所載至此更無他說按左氏昭公二十年宋司徒奔陳而班氏採諸本傳直寫片言閱彼全書唯徵半事遂令學者疑丘明之說有是有非汝齊之言或得或失此所謂虚編古語討事不終也志云成帝於鴻嘉永始之載好為微行置私田於民間谷永諫曰諸侯夢得田占為失國而況王者畜私田財物為庶人之事乎已下弗云成帝悛與不悛谷永言效與不效諫詞雖具諸事闕如此所謂直引時談竟無他述者也其述庶徵之恒寒也先云釐公十年冬大雨雹隨載劉向之占次云公羊經曰大書雹續書董生之解按公羊所說與上奚殊而再列其辭俱云大雨雹而又此科言大雪與雹繼言隕霜殺草起自春秋訖乎漢代其事既盡仍重叙雹災分散相離斷絶無趣夫同是一類而限成二條首尾紛挐章句雜糅此所謂科條不整尋繹難知者也夫人君改元肇自劉氏史官所録須存凡例按斯志之記異也首列元封年號不詳漢代何君次言地節河平具述宣成二帝宣帝地節四年成帝河平二年其紀年號如此武稱元鼎每嵗皆書始云元鼎二年續復云元鼎三年按三年宜除元鼎之號也哀曰建平同年必録始云哀帝建平三年續復云哀帝建平三年按同是一年宜云是嵗而已不當言重其事也此所謂標舉年號詳略無準者也第三科釋災多濫其流有八一曰商㩁前世全違故實二曰影響不接牽引相㑹三曰敷演多端準的無主四曰輕持善政用配妖禍五曰但伸解釋不顯符應六曰考覈雖讜義理非精七曰妖祥可知寢嘿無說八曰不循經典自任胷懐志云史記周威烈王二十三年九鼎震是嵗韓魏趙簒晉而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣按周當戰國之世微弱尤甚故君疑竊斧臺名逃債正比夫泗上諸侯附庸小國者耳至如三晉跋扈欲為諸侯雖假王命實由已出譬夫近代莽稱安漢匪平帝之至誠卓號太師豈獻王之本願而作者茍責威烈以妄施爵賞坐貽妖孽豈得謂人之情偽盡知之矣者乎此所謂商㩁前世全違故實也志云昭公十六年九月大雩先是昭母夫人歸氏薨昭不戚而大蒐于比蒲又曰定公十一年九月大雩先是公自侵鄭歸而城中城二大夫圍鄆按夫大蒐于比蒲昭之十一年城中城圍鄆定之六年也其二役去雩皆非一載夫以國家常事而坐延災眚嵗月既遥而方聞感應斯豈非烏有成說扣寂為辭者哉此所謂影響不接牽引相㑹也志云嚴公七年秋大水董仲舒劉向以為嚴母姜與兄齊侯淫共殺桓公嚴釋公讎復娶齊女未入而先與之淫一年再出㑹於道逆亂臣下賤之應也又云十一年秋宋大水董仲舒以為時魯宋比年有乘丘鄑之戰百姓愁怨陰氣盛故二國俱水謂七年魯大水今年宋大水也按此說有三失焉何者嚴公十年十一年公敗宋師於乘丘及鄑夫以制勝克敵䇿勲命賞可以祈榮降福而反愁怨貽災邪其失一也且先是數年嚴遭大水亦謂七年校其時月殊在戰前而云與宋交兵故二國大水其失二也況於七年之内已釋水災始以齊女為辭終以宋師為應前後靡定向背何依其失三也夫以一災示眚而三說競興此所謂敷演多端準的無主者也其釋厥咎舒厥罰恒燠以為其政弛慢失在舒緩故罰之以燠冬而無冰尋其解春秋之無冰也皆主内失黎庶外失諸侯不事誅賞不明善惡蠻夷猾夏天子不能討大夫擅權邦君不能制若斯而已矣次至武帝元封六年冬無冰而云先是遣衛霍二將軍窮追單于斬首十萬餘級歸而大行慶賞上又閔恤勤勞遣使巡行天下存賜鰥寡假與乏困舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞於是天下咸喜按漢帝其武功文徳也如彼其先猛後寛也如此豈是有懦弱凌遲之失而無刑罰戡定之功哉何得茍以無冰示災便謂與昔人同罪矛盾自已始末相違豈其甚邪此所謂輕持善政用配妖禍者也志云孝昭元鳯三年太山有大石立眭孟以為當有庶人為天子者京房易傳云太山之石顛而下聖人受命人君虜又曰石立於山同姓為天下雄按此當是孝宣皇帝即位之祥也夫宣帝出自閭閻坐登宸極所謂庶人受命者也以曾孫血屬上纂皇統所謂同姓之雄者也昌邑見廢謫居逺方所謂人君虜者也班書載此徵祥雖具有剖析而求諸後應曾不縷陳叙事之宜豈其若是茍文有所闕則何以成言者哉此所謂但申解釋不顯符應也志云成帝建始三年小女陳持弓年九嵗走入未央宮又云綏和二年男子王褒入北司馬門上前殿班志雖已有證據言多疎闊今聊演而申之按女子九嵗者九則陽數之極也男子王褒者王則巨君之姓也入北司馬門上前殿者王莽始為大司馬至哀帝時就國帝崩後仍此官因以簒位夫入司馬門而上殿亦由從司馬而升極災祥示兆其事甚明忽而不書為略何甚此所謂解釋雖讜義理非精也志云哀帝建平四年山陽女子田無嗇懐妊三月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘土收養尋本志雖述此妖災而了無解釋按人從胞至育含靈受氣始末有恒數前後有定準至在孕甫爾遽發啼聲者亦由物有基業未彰而形象已兆即王氏簒國之徵生而不舉葬而不死者亦猶物有期運已定非誅剪所平即王氏受命之應也又案班志以小女陳持弓者陳即莽之所出如女子田無嗇者田故莽之本宗事既同占言無一槩豈非唯知其一而不知其二者乎此所謂妖祥可知寢嘿無說也當春秋之時諸國賢俊多矣如沙麓其壊梁山云崩鶂退蜚於宋都龍交鬭於鄭水或伯宗子産具述其非妖或卜偃史過盛言其必應葢于時有識君子以為美談故左氏書之不刋貽厥來裔既而古今路阻聞見壤隔至漢代儒者董仲舒劉向之徒始别搆異聞輔申他說以兹後學凌彼先賢葢今諺所謂季與厥昆爭知嫂諱者也今諺云弟與兄爭嫂字以其名鄙故稍文釋之而班志尚捨長用短捐舊習新茍出異同自矜魁博多見其無識者矣此所謂不循經典自任胷懐也第四科古學不精者其流有三一曰博引前書網羅不盡二曰兼採左氏遺逸甚多三曰屢舉舊事不知所出志曰庶徵之恒風劉向以為春秋無其應劉歆以為釐十六年左氏傳釋六鶂退飛是也案舊史稱劉向學榖梁歆學左氏既祖習各異而聞見不同信矣而周木斯拔鄭車僨濟風之為害被於尚書春秋向則略而不言歆則知而不傳又詳言衆怪歴叙羣妖述雨㲠為災而不録趙毛生地書異鳥相育而不載宋雀生鸇斯皆見小忘大舉輕略重葢學有不同識無通鑑故也且當炎漢之代厥異尤竒若景帝承平赤風如血于公在職亢陽為旱在紀與傳各具其祥在於志中獨無其說者何哉所謂博引前書網羅不盡也左傳云宋人逐猰狗華臣出奔陳又云宋公子地有白馬景公奪而朱其尾鬛他弟辰以蕭叛班志書此二事以為犬馬之禍此二事是班生自釋非引諸儒所言按左氏所載斯流實繁如季氏之逆也由鬭雞而傅介衛侯之敗也因養鶴以乗軒曹亡首於獲雁鄭殺萌於解黿郄至奪豕而家滅華元殺羊而卒奔此言白黑之祥羽毛之孽何獨捨而不論唯徵犬馬而已此所謂兼採左氏遺逸甚多也按太史公書自春秋已前所有國家災眚賢哲占候皆出於左氏國語者也今班志所引上自周之幽厲下終魯之定哀而不云國語唯稱史記豈非忘本徇末逐近棄逺者乎此所謂屢舉舊事不知所出也所定多目凡一十九種但其失既衆不可殫論故每目之中或時舉一事庶觸類而長他皆可知又按斯志之作也本欲明吉凶釋休咎懲惡勸善以誡將來至如春秋已還漢代而往其間日食地震石隕山崩雨雹雨魚大旱大水犬豕為禍桃李冬花多直叙其災而不言其應載春秋時日食三十六而二不言其應漢時日食五十三而四十不言其應又惠帝二年武帝征和二年宣帝本始四年元帝永和三年綏和四年皆地震隕石凡四十總不言其應又皇后二年武都山崩成帝和平二年楚國雨雹大如斧蜚鳥死成帝鴻嘉四年雨魚于信都孝景之時大旱者二昭成二年大雨水三河平元年長安有如人狀被甲兵弩繫之皆狗也又鴻嘉中狗與豕交惠帝五年十月桃李花棗食皆不言其應此乃魯史之春秋漢書之帝紀耳何用復編之於此志哉昔班叔皮云司馬遷叙相如則舉其郡縣蕭曹仲舒並時之人不記其字或縣而不郡葢有所未暇也若孟堅此志錯繆殊多豈亦刋削未周者邪不然何脫略之甚也亦有穿鑿成文强生異義如蜮之為惑麋之為迷隕五石者齊五子之徵崩七山者漢七國之象叔服㑹葬成伯來奔亢陽所以成妖鄭易許田魯謀萊國食苖所以為禍諸如此比一作事其類𢎞多徒有解釋無足觀採知音君子幸為詳焉漢書五行志雜駁第十一春秋時事違誤最多總十五條魯文公二年不雨班氏以為自文即位天子使叔服㑹葬毛伯錫命又㑹晉侯于戚上得天子外得諸侯沛然自大故致亢陽之禍按周之東遷日以微弱故鄭取温麥射王中肩楚絶苞茅觀兵問鼎事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽為怪求諸人事理必不然天髙聽卑豈其若是也其一條春秋成公元年無冰班氏以為其時王札子殺召伯毛伯按今春秋經札子殺毛召事在宣十五年而此言成公時未達其說下去無冰凡有三載春秋昭公九年陳火董仲舒以為陳夏徵舒殺君楚嚴王嚴即莊也皆依本書不改其事下同託欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極陰生陽故致火災按楚嚴王之入陳乃宣十一年事也始有蹊田之謗取愧叔時愧一作譏終有封國之恩見賢尼父毒恨尤甚其理未聞按陳前後為楚所滅者三始宣十一年為楚嚴王所滅次昭八年為楚靈王所滅後哀十七年為楚惠王所滅今董生誤以陳次亡之役是楚始滅之時遂妄有占候虚辨物色尋昭之上去於宣魯易四主嚴之下至於靈楚經五代雖懸隔頓别而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉其二條春秋桓公三年日有食之既京房易傳以為後楚莊始稱王兼地千里按楚自武王僭號鄧盟是懼荆戸又歴文成繆三王方至於莊是則楚之為王已四世矣何得言莊始稱之者哉又魯桓公薨後歴莊閔釐文宣釐即僖依本書不改其字下同凡五公而楚莊始作霸安有桓三年日食而已應之者邪非唯叙事有違亦自占候失中者矣其三條春秋釐公二十九年秋大雨雹劉向以為釐公末年公子遂専權自恣至於弑君陰脅陽之象見釐公不悟遂後二年殺公子赤立宣公按遂之立宣殺子赤也此乃文公末代輒謂僖公暮年世實懸殊言何倒錯其四條春秋釐公十二年日有食之劉向以為是時莒滅杞案十四年諸侯城縁陵公羊傳曰曷為城杞滅之孰滅之葢徐莒也如中壘所釋當以公羊為本爾然則公羊所說不如左氏之詳左氏襄公二十九年晉平公時杞尚存云云其五條春秋文公元年日有食之劉向以為後晉滅江按本經書文四年楚人滅江今云晉滅其說無取且江居南裔與楚為隣晉處北方去江殊逺稱晉所滅其理難通其六條左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之事在襄二十六年先是大夫華元出奔晉事在成十五年華合比奔衛事在昭六年劉向以為時則有火災赤眚之明應也按災祥之作將應後來事蹟之彰用符前兆如華元奔晉在成十五年㕘諸棄隄實難符㑹又合比奔衛在昭六年而與華元奔晉俱云先是惟前與後事並相違者焉其七條春秋成公五年梁山崩七年鼷鼠食郊牛角襄公十五年日有食之董仲舒劉向皆以為自此後晉為雞澤之㑹諸侯盟大夫又盟後為溴梁之㑹諸侯在而大夫獨相與盟君若綴旒不得舉手又襄公十六年五月地震劉向以為是嵗三月大夫盟於溴梁而五月地震矣又其二十八年春無冰班固以為天下異也襄公時天下諸侯之大夫皆執國權君不能制漸將日甚榖梁云諸侯始失政大夫執國權又曰諸侯失政大夫盟政在大夫大夫之不臣也按春秋諸國權臣可得言者如三桓六卿田氏而已如雞澤之㑹溴梁之盟其臣豈有若向之所說者邪然而榖梁為大夫不臣諸侯失政譏其無禮自擅在兹一舉而已非是如政由甯氏祭則寡人相承世官遂移國柄若斯之失也董劉之徒不窺左氏直憑二傳遂廣為他說多肆侈言仍云君若綴旒臣將日甚何其妄也其八條春秋昭十七年六月日有食之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失衆心以弑死後莫敢復責其大夫六卿遂相與比周専晉國晉君還事之按晉厲公所屍唯三郤耳何得云誅四大夫者哉其九條又州滿既死今春秋左氏本皆作州蒲誤也當為州滿事具王邵續書志悼公嗣立選六官者皆獲其才逐七人者盡當其罪以辱及揚干將誅魏絳覽書後悟引愆授職此則生殺在已寵辱自由故能申五利以和戎馳三駕以挫楚威行夷夏霸復文襄而云不復責大夫何厚誣之甚也自昭公已降晉政多門如以君事臣居下僭上者此乃因昭之失漸至陵夷匪由懲厲之弑自取淪辱也豈可輒持彼後事用誣先代者乎其十條哀公十三年十一月有星孛于東方董仲舒劉向以為周之十一月夏九月日在氐出東方者軫角亢也或曰角亢大國之象為齊晉也其後田氏簒齊六卿分晉按星孛之後一年春秋之經盡矣又十一年左氏之傳盡矣自傳盡後二十八年齊康公為田和所滅又七年晉靜公為韓魏趙所滅上去星孛之嵗皆出百餘年辰象所纒氛祲所指其相感應何太疎闊者哉且當春秋既終之後左傳未盡之前其間衛弑君越滅吳魯遜越云云賊臣逆子破家亡國多矣此正得東方之象大國之徵何故捨而不述逺求他代者乎又范與中行早從殄滅智入戰國繼踵云亡輒與三晉連名勑以六卿為目殊為謬也尋斯失所起可以意測何者二傳所引事終西狩獲麟左氏所書語連趙襄滅智漢代學者唯讀二傳不觀左氏故事有不周言多脫略且春秋之後戰國之時史官闕書年祀難記而學者遂疑簒齊分晉時與魯史相鄰故輕引災祥用相符㑹白珪之玷何其甚歟其十一條春秋釐公三十三年十二月隕霜不殺草成公五年梁山崩七年鼷鼠食郊牛角劉向以其後三家逐魯昭公卒死於外之象按乾侯之出事由季氏孟叔二孫本所不預況昭子以納君不遂發憤而卒論其義烈道貫幽明定為忠臣猶且無愧編諸逆黨何乃厚誣夫以罪由一家而兼云二族以此題目何其濫歟其十二條左氏傳昭公十九年龍鬭於鄭時門之外洧淵劉向以為近龍孽也鄭小國攝乎晉楚之間重以强吳鄭當其衝不能修徳將鬭三國以自危亡是時子産任政内惠於民外善辭令以交三國鄭卒無患此能以徳銷災之道也按昭之十九年晉楚連盟干戈不作吳雖强暴未擾諸華鄭無外虞非子産之力也又吳為逺國僻在江干必略中原當以楚宋為始鄭居河潁地匪夷唐謂當要衝殊為乖角求諸地理不其爽歟其十三條春秋昭公十五年六月日有食之董仲舒以為時宿在畢晉國象也云云日比再食其事在春秋後故不載於經按自昭十四年迄于獲麟之嵗其間日食復有七焉事列本經披文立驗安得云再食而已又在春秋之後也且觀班志編此七食其六皆載董生所占復不得言董以事後春秋故不存編録再思其語三覆所由斯葢孟堅之誤非仲舒之罪也其十四條春秋昭公九年陳火劉向以為先是陳侯之弟招殺陳太子偃師楚因滅陳春秋不與蠻夷滅中國故復書陳火也按楚縣中國以為邑者多矣如邑有宜見於經者豈可不以楚為名者哉葢當斯時陳雖暫亡尋復舊國故仍取陳號不假楚名獨不見鄭禆竈之說斯災也曰五年陳將復封封五十二年而遂亡此其效也自斯而後若顓頊之墟宛丘之地如有應書於國史豈可復謂之陳乎其十五條史通卷十九欽定四庫全書史通卷二十唐劉知㡬撰外篇暗惑第十二總

body:
  text: 核才第三十一夫史才之難其難甚矣晉令云國史之任委之著作每著作郎初至必撰名臣傳一人斯蓋察其所由茍非其才則不可叨居史任歷觀古之作者若蔡邕劉峻一本峻獨不書名而書字非徐陵劉炫之徒各自謂長于著書達于史體然觀一無觀字侏儒一節而他事可知案伯喈于朔方舊誤作方朔或誤作方翔上書謂宜廣班氏天文志夫天文之于漢史實附贅之尤甚者也必欲申以掎摭但當鋤而去之安可仍其過失而益其蕪累亦奚異觀河傾之患而不遏以堤防方欲疏而導之用速懷襄之害述史如此將非練達者歟孝標持論談一作析理誠為絕倫而自敘一篇過為煩碎山棲一志直論一作是文章句恐有訛字諒難以偶跡遷固比肩陳范者也孝穆在齊有志一有于字梁史及還江左一有而字書竟不成嗟乎以徐公文體而施諸史傳亦猶灞上兒戲異乎真將軍幸而量力不為可謂自卜者審矣光伯以洪儒碩學而迍邅不遇觀一無觀字其銳情自敘欲以垂示將來而言皆淺俗理無要害豈所謂誦詩三百雖多亦奚以為者乎昔尼父有言文勝質則史蓋史者當時之文也然撲散淳銷時移世異文之與史較一作皎然異轍故以張衡之文而不閑于史以陳壽之史而不習于文其有賦述兩都詩裁八詠而能編次漢冊勒成宋典若斯人者其流幾何是以略觀近代有齒跡文章而兼修史傳其為式也羅含謝客宛為歌頌之文蕭繹江淹直一作究成銘贊之序序字似當作筆溫子升尤工一作喜復語盧思道雅好麗作儷字用詞江總猖獗以沉迷庾信輕薄而流宕此其大較也然向之數子所撰者蓋不過偏記雜說小卷短書而已猶且乖濫踳駁一至于斯而況責之以刊勒一家彌綸一代使其始未圓備表里無咎蓋亦難矣但自世重文藻詞宗麗淫于是沮誦失路靈均當軸每當有值字西省虛職東觀儜才凡所拜授必推文士遂使握管懷鉛多無銓綜之識舊訛作職連章累牘罕逢微婉之言而舉俗共以為能一作共為能事當時莫之敢侮假令其一無其字間有術同彪嶠才若班荀懷獨見之明負不刊之業而皆取窘于流俗見嗤于朋黨遂乃哺糟歠醨俯同妄作披褐懷玉無由自陳此管仲所謂用君子而以小人參之害霸之道者也一無也字昔傅玄或作毅非有云一脫云字觀孟堅漢書實命代奇作及與陳宗尹敏杜撫馬嚴撰中興紀傳其文曾不足觀豈拘于時乎不然何不類之甚者也是後劉珍朱穆盧植楊彪之徒又繼而成之豈亦各拘于時而不得自盡乎何其益陋也以上并傅玄語嗟乎拘時之患其來尚矣斯則自古一有之字所嘆豈獨當今者哉

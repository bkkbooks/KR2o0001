body:
  text: 惑經第四昔孔宣父以大聖之德應運而生生人民已來未之有也故使三千弟子七十門人鉆仰不及請益無倦然則作然而用尺有所短寸有所長其間切磋酬對頗亦互聞得失何者睹仲由之不悅則矢天厭以自明答言偃之弦歌則稱戲言以釋難斯則聖人舊有之字設教其理含弘或援誓以表心或稱非以受屈豈與夫庸儒未學文過飾非使夫問者緘辭杜口懷疑不展若斯而已哉嗟乎古今世殊師授路隔恨不得親膺灑掃陪五尺之重躬奉德音撫四科之友而徒以研尋蠹簡穿鑿遺文育華久謝糟粕為偶遂使理有未達無由質疑是用握卷躊躇揮毫悱憤倘梁木斯壞魂而有靈敢效接輿之歌輒同林放之問但孔氏之立言行事刪詩贊易其義既廣難以具論今惟掖其史文評之於後未借詩易折歸春秋一本連下非案大子所修之史是曰春秋竊詳春秋之義其所未諭喻通後同者有十二舊亦連下何者趙孟以無辭伐國貶號為人杞伯以夷禮一脫禮字來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此則人倫臧否在我筆端直道而行夫何所讓奚為齊鄭及楚照春秋世次當作鄭楚及齊國有戮君各以疾赴遂皆書卒原注襄七年鄭子駟弒其君傅公昭元年楚公子圍弒其君郟敖僖公十年齊人弒其君悼公而春秋但書云鄭伯髡頑卒楚子麋卒齊侯陽生卒夫臣弒其君子弒其父凡在含識皆知恥懼茍欺而可免則誰不願然且官為正卿反不討賊地居冢嫡藥不親嘗遂皆被以惡名播諸來葉必以彼三逆方茲二弒躬為梟獍則漏網遺名迹涉瓜李乃凝脂或刊作擬指非顯録嫉惡之情豈其若是其所未諭一也又案齊乞一作荼野幕之戮一作弒事起陽生楚比一作靈乾溪之縊一作弒禍由觀從原作常壽誤原注乞謂齊陳乞比謂楚公子比也而春秋捐其首謀舍其親弒亦何異魯酒薄而邯鄲圍城門火而池魚及必如是則邾之閽者私憾射姑以其君卞舊脫卞字急而好潔可行欺以激怒遂傾瓶水似一脫以字沃庭俾廢壚而爛卒斯亦罪之大者奚一作曷不書弒乎原注童書云閽弒邾子其所未諭二也蓋明鏡之照物也妍媸必露不以毛壻之面或有疵瑕而寢其鑒也虛空之傳響也清濁必聞不以綿駒之歌時有誤曲而輟其應也夫史官執簡宜類於斯茍愛而知其醜憎而知其善善惡必書斯為實録觀夫子修春秋也多為賢者諱狄實滅衛因桓恥一脫恥字而不書河陽召王成文美而稱狩斯則情兼向背志懷彼我茍書法其如是也豈不使為人君者此四字或作賢人君子或作夫君子三字皆誤靡憚憲章雖玷白圭無慚良史也乎一無也字一無乎字其所未諭三也哀八年及十三年公再與吳盟而皆不書原注八年注云不書盟恥吳夷也十三年注云盟不書諸侯恥之故不録也桓二年公及戎盟則書之舊無此三字今補戎實豺狼非我族類夫非所諱而仍諱謂當恥而無恥求之折衷未見其宜其所未諭四也諸國臣子非卿不書必以地來奔則雖賤亦志斯豈非國之大事不可限以常流者那一作也如陽虎盜入千歡擁陽關而外叛傳具其事經獨無聞何哉且弓玉中一作雲亡猶獲顯記城邑失守反不沾一作具書略大存小理乖懲勸其所未諭五也案諸侯世嫡嗣業居喪既未成君不避其諱此春秋之例也何為般野之歿皆以名書書子舊在以名之上而惡視之姐直云子卒其所未諭六也凡在人倫不得其死者邦君已上皆謂之弒卿士已上通謂之殺此又春秋之例也案桓二年書曰未督弒其君與夷及其大夫孔父棺十年又曰晉里克弒其君卓及其大夫荀息原注及宜改為殺夫臣當為殺而稱及與君弒同科茍弒殺不分則君臣靡別者矣原注公羊傳曰及者何纍也雖有此釋其義難通既未釋此疑共編於未諭他皆仿此也其所未諭七也夫臣子所書君父是黨雖事乖正直而理合名教如魯之隱桓戕弒昭哀放逐哀公混入薑氏淫奔子般夭酷斯則邦之孔丑諱之可也如公送晉葬公與吳盟為齊所止為邪所敗盟而不至會而後期並諱而不書豈非煩碎之甚且案汲冢竹書舊衍與字晉春秋及紀年之載事也如重耳出奔惠公見獲書其本國皆無所隱唯魯春秋之記其國也則不然何者猶云此何為者是繳上之詞國家一衍之字事無大小茍涉嫌疑動稱恥諱厚誣來世奚獨多乎其所未諭八也案昭十二年齊納北燕伯於陽此句經文伯於陽古木復此三字今本並脫者何公子陽生也原注左傳曰納北燕伯款於唐牡注云陽即唐羔之別邑子曰一多齊之事三字我乃知之矣在側者曰子茍知之何以不革曰如爾所不知何自經文已下至此並公羊傳文夫如是一有則字夫子之修春秋皆遵彼乖僻習其訛謬凡所編次不加刊改者矣何為其間則一褒一貶時有張弛或沿或革曾無定體其所未諭九也又書事之法其理宜明使讀者求一家之廢興則前後相會討一人之出入則始未可尋如定六年書鄭滅許以許男斯歸而哀元年書許男與楚圍蔡夫許既滅矣君執家亡能重列諸侯舉兵圍國者何哉蓋其間行事必當有説經既不書傳又闕載謂定六哀元之間其子許事必有闕文缺略如此尋繹難知其所未諭十也案晉自魯閔公已前未通於上當作宗國至僖二年滅下陽已降漸見於春秋蓋始命行人自達於魯也而瑣語春秋載魯國閡公時事言之甚詳謂魯事詳於晉亦在晉未見春秋前斯則聞事必書無假相赴者也蓋當時國史它皆仿此至於夫子所修也則不然凡書異國皆取來告茍有所告雖小必書如無其告雖大亦闕故宋飛六鷁王本作鶂小事也以有告而書之晉滅三邦大事也原注謂滅耿滅魏滅霍也以無告而闕之用使巨細不均繁省失中比夫諸國史記奚事獨為疏闊尋茲例之作也蓋因周禮舊法魯策成文郭本自比夫至此二十八字誤作小注夫子既撰不刊之書為後王之則豈可仍其過失而不中規矩者一無者字乎其所未諭十一也蓋君子以博聞多識為工良史以實録直書為貴而春秋記它國之事必憑來者之辭而來者所言人多非其實或兵敗而不以敗告君弒而不以弒稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋葬而以冬赴皆承其所説而書遂使真偽莫分是非相亂其所未諭十二也凡所未諭其類尤作猶多靜言恩之莫究所以豈夫子之墻數初不得其門者歟將某也幸茍有過人必知之者歟如其與奪請謝不敏又世人以夫子固天攸一作所縱將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫之一作知指實榷而為論其虛美者有五焉舊本此處連下非案古者國有史官具列時事觀汲墳出墳出一作冢所記皆與魯史符同至如周之東遷其説稍備隱桓已上難得而詳此之一作其煩省皆與春秋不別又獲君曰止誅臣曰刺殺其大夫曰殺一脫殺字執我行人鄭棄其師隕石於宋五原注其事並出竹書紀年唯鄭棄師出瑣語晉春秋也諸如此句多是古史全文則知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史策有闕文時月有失次皆存而不正無所用心斯又不可一多能而二字殫説矣一無矣字而太史公云夫子為春秋筆則筆削則削遊一作子夏之徒不能贊一辭其虛美一也又案宋襄公執膝子而誣之以得罪楚靈王弒郟敖而赴之以疾亡春秋皆承告而書曾無變革是則無辜者反加以罪有罪者得隱其辜求諸勸戒其義安在而左丘明論春秋之義云一作也或求名而不得或欲蓋而名一作彌彰善人勸焉淫人懼焉其虛美二也又案舊脫案字春秋之所書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌胖習於春秋至於董狐書法疑當作弒而不隱宣二南史執簡而纍進襄二十五又寧殖出君而卒自憂名在策書故知當時史臣各懷直筆斯則有犯必死書法無舍者矣自夫子之修春秋也蓋他邦之篡賊其君者有三原注謂齊鄭楚已解於上本國之弒或作殺非逐其君者有七一作五原注隱閔般惡視五君被弒昭哀二主被逐也莫不缺而靡録使其有逃名者而孟子云孔子成春秋亂臣賊子懼無乃烏有之談歟其虛美三也又案春秋之文雖有成例或事同書異理殊畫一訛作書一故太史公曰孔氏史記作子著春秋隱桓之間則彰至定哀之際則微為其切當世之文而罔此二字一本例一本罔作亡褒史記多忌字諱之辭也斯則危行言遜吐剛茹柔推避以求全依違以免禍而孟子云孔子曰知我者其惟春秋乎罪我者其惟春秋乎其虛美四也又一脫又字案趙穿殺君而稱宣子之弒江乙亡布而稱令尹所盜此則春秋之世有識之士莫不微婉其辭隱晦其説斯蓋當時之恆事習俗所常行而班一脫班字固云仲尼歿而微言絶觀微言之作豈獨宣父者邪其虛美五矣一作也考茲衆美徵其本源良由達者相承儒教傳授既欲神其事故談過其實語曰衆善之必察焉一本之焉二字互轉孟子曰堯舜不勝其美桀紂不勝其惡尋世之言春秋者礙非睹衆善而不察同堯舜之多美者乎一誤作雲昔王充設一作説論有問孔之篇雖論語群言多見指摘而春秋雜義曾未發明是用廣彼一訛作破舊疑增其新覺將來學者幸為詳之

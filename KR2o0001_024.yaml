body:
  text: 直書第二十四夫人稟五常士兼百行邪正有別曲直不同若邪曲者人之所賤而小人之道也正直者人之所貴而君子之德也然世多趨邪而棄正不踐君子之迹而行由一本由作曲又多自陷二字小人者何哉語曰直如弦死道邊曲如鉤反封侯故寧順從以保吉不違忤以受害也況史之為務申以勸誡樹之風聲其有賊臣逆子淫君亂主茍直書其事不掩其暇則穢迹彰于一朝惡名被于千載一作古言之若是吁可畏乎夫為于可為之時則從為于不可為之時則凶如董狐之書法不隱趙盾之為法受屈彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弒馬遷之述漢非韋昭仗正于吳朝崔浩犯諱于魏國或身膏斧鉞取笑一有于字下同當時或書填坑窖無聞後代夫世事如此而責史臣不能申其強項之風勵其匪躬之節蓋亦難矣是以張儼發憤私存默記之文孫盛不平竊撰遼東之本以茲避禍幸獲兩舊作而誤全足舊作是誤以驗世途之多隘知實録之難遇耳然則歷考前史徵諸直詞雖古人糟粕真偽相亂而披沙揀金有時獲寶案金行晉在歷史氏尤多當宣懿景師開基之始曹馬構紛之際或列營渭曲見屈武侯或發仗云臺取傷成濟陳壽王隱咸杜口而無言陸機虞預各棲毫而靡述至習鑿齒乃申以死葛走舊有生字達之説疑脫干令升亦斥以六字抽戈犯蹕之言歷代厚誣一朝如一作始雪考斯人之書事蓋近古之遺直歟次有宋孝王風俗傳王劭齊志其敘述當時亦務在審實案于時河朔謂元魏王公箕裘未隕鄴城謂高齊將相薪構仍存而二子書其所諱曾無憚色剛亦不吐其斯人一本人字作之謂二字歟蓋烈士詢名壯夫重氣寧為蘭摧玉折不作瓦礫長存若南董之仗氣直書不避強御韋崔之肆情奮筆無所阿容雖周身之防有所不足而遺芳余烈人到于今稱之與夫王沈魏書假回邪以竊位董統燕史持諂媚以偷榮貫三光而洞九泉曾未足喻其高下也

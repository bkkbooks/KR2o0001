body:
  text: 書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勛五曰表賢能干寶之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子貞婦之節則書之文誥專對之辭則書之木力技藝殊異則書之干寶釋語不必與五志分貼于是采二家之所議征五志之所取蓋記言之所網羅書事之所總括粗得于茲矣然必謂故無遺恨猶恐未盡者乎今更廣以三科用增前目一曰敘沿革二曰明罪惡三曰旌怪異何者禮儀用舍節文升降則書之君臣邪僻國家喪亂則書之幽明感應禍福萌兆則書之三科以補五志也亦不與后文關貼于是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯但自一無自字古作者鮮能無病茍書而不法則何以示后蓋班固之譏司馬遷也論大道則先黃老而后六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧此其所蔽也又傅玄之貶班固也論國體則飾主闕而折忠臣敘世教則貴取容而賤直節述時務則謹辭章而略事實此其所失也譏馬貶班引用成語以見作史最易招駁勿粘看尋班馬二史咸擅一家而各自彈射遞相瘡痏夫雖自卜者審而自見為難可謂笑他人之未工忘己事之已拙上智猶其若此而況庸庸者哉節中作頓挫茍目或訛作自前哲之指蹤校從來之所失若王沈孫盛之伍伯起德棻之流論王業則黨悖逆而誣忠義敘國家則抑正順而褒篡奪述風俗則矜夷狄而陋華夏其説散見諸篇之中此其大較也必伸以糾摘窮其負纍雖擢發而數庸可盡邪子曰于豫何誅于此一無此字數家見之矣抑又聞之怪力亂神宣尼不語而事鬼求福墨生所信故聖人于其間若存若亡而已若存若亡最圓活若吞燕卵而商生啓龍漦而周滅厲壞門以禍晉鬼謀社而亡曹江使返璧于秦皇圯橋授書于漢相此則事關軍國理涉興亡有而書之以彰靈驗可也節中頓挫而王隱何法盛之徒所撰晉史乃專訪州閭細事委巷瑣言非關軍國興亡者聚而編之目為鬼神傳録其事非要其言不經異乎三史之所書五經之所載也范曄博采衆書裁成漢典觀其所取頗有奇工至于方術篇及諸蠻夷傳乃録王喬左慈廩君槃亦作盤瓠言唯迂誕事多詭越可謂美玉之瑕白圭之玷惜哉無是可也節中頓挫又自魏晉已降著述多門語林笑林世説俗説皆喜載調一作槃謔小辨嗤鄙異聞在小説家可無譏也雖為有識所譏頗為無知所説而斯風一扇國史多同馴而濫入國史矣至如王思狂躁起驅蠅而踐筆畢卓沈湎左持螯而右杯劉雍榜吏以膳痂齡石戲舅而傷贅其事蕪穢其辭猥雜而歷代正史持為雅言茍使讀之者為之解頤聞之者為之撫掌一作槃固異乎記功書過彰善疸惡者也大抵近代史筆敘事為煩榷而論之其尤甚者有四夫祥瑞者所以發揮盛德幽贊明王至如鳳皇來儀嘉禾入獻秦得若雉魯獲如麕求諸尚書春秋上下數千載其可得言者蓋不過一二而已愛及近古則不然凡祥瑞之出非關理亂蓋主上所惑臣下相欺故德彌少而瑞或作祥彌多政逾劣而樣或作瑞逾盛是以桓靈受祉比文景而為豐劉石應符比曹馬而益倍而史官征其謬説録彼邪言真偽莫分是非無別其煩一也當春秋之時諸侯力爭各擅雄伯自相君臣一作長經書某使來聘某君來朝者蓋明和好所通盛疑威字之訛德所及此皆國之大事不可闕如而自史漢已還相承繼作至于呼韓入侍肅慎來庭如此之流書之可也若乃藩王嶽牧朝會京師必也書之本紀則異乎春秋之義原注若漢書載楚王囂等來朝宋書載檀道濟等來朝之類是也夫臣謁其君子覲其父抑惟恆亦作常理非復異聞載之簡策一何辭費其煩二也若乃一作乃若百職一作辟非遷除千官黜免其可以書名本紀者蓋推槐鼎而已故西京撰史唯編丞相大夫東觀著書止列司徒太尉而近世自三公以下一命已上茍沾厚祿莫不備書且一人之身兼頂數職或加其號而闕其位或無其實而有其名南北諸史以后大抵皆然贊唱為之口勞題署由其力倦具之史牘夫何足觀其煩三也夫人之有傳也蓋唯書其邑里而已其有開國承家世祿不墜積仁纍德良弓無改項籍之先世為楚將史記項羽本紀石建之后廉謹相承史記萬石君傳此則其事尤異略書于傳可也其失之者則有父官令長子秩丞郎聲不著于一鄉行無聞于十室而一無而字乃敘其名位一二或作一一無遺此實家諜非關國史其煩四也于是考茲四事以觀今疑當作近古足驗積習忘返流宕不歸乖作者之規模違哲人之準的也孔子曰吾黨之小子狂簡斐然成章不知所以裁之其斯之謂矣亦有言或可記功或可書而紀一作記闕其文傳亡其事者何則始自太上迄于中古其間文籍可得言焉夫以仲尼之聖也訪諸郯子始聞少皞之官叔向之賢也詢彼國僑載辨黃能一作熊之祟或八元才子因行父而獲傳見后篇元凱注或五羖大夫假趙良而見識商君列傳則知當時正史流俗所行若三墳五典八索九丘之書虞夏商周春秋檮杌之記其所缺略者多矣既而汲冢所述方五經而有殘一作殊馬遷所書比三傳而多別裴松補陳壽之闕謝綽拾沈約之遺斯又言滿五車事逾三篋者矣夫記事之體欲簡而且詳疏而不漏若煩則盡取省則多捐此乃忘折中之宜失均平之理推夫博雅君子知其利害者焉

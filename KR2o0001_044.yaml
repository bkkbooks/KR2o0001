body:
  text: 雜說中第八諸晉史六條東晉之史作者多門何氏中興實居其最而為晉學者曾未之知倘湮滅不行良可惜也王檀著書一作者是晉史之尤劣者方諸前代其陸賈諸先生之比歟道鸞不揆淺才好出奇語所謂欲益反損求妍更媸者矣臧氏晉書稱苻堅之竊號也雖疆宇狹於石虎至於人物則過之案後石之時原注田融趙史謂勒為前石虎為後石也張據瓜涼李專巴蜀自遼而左人一作氏屬慕容涉漢舊皆訛作沙漠而一訛作西南地歸司馬逮於苻氏則兼而有之禹貢九州實得其八而言地劣於趙是何言歟夫識事未精而輕為著述此其不知量也張勔隋志作緬抄撮晉史不求異同而備揭一訛作被褐此言不從沙汰罪又甚矣夫學未該博鑒非詳正凡所修撰多聚異聞一作門其為踳駁難以覺悟案應劭風俗通載楚有葉君祠即葉公諸梁廟也而俗云孝明帝時有河東王喬為葉令嘗飛鳧入朝及干寶搜神記乃隱應氏所通一訛作遺而收舊有其字流俗怪說又劉敬叔異苑稱晉武庫失火漢高祖斬蛇劍穿屋麗飛其言不經致誤故梁武帝令殷蕓編諸小說及蕭方等撰三十國史乃刊為正言既而宋求漢事旁取令升之書原注謂范曄後漢書唐征晉語近憑方等之録原注謂皇家撰晉韋編簡一定膠漆不移故令俗之學者說鳧履登朝則云漢書舊記談蛇劍穿屋必曰晉典明文遮一誤作遞一作托彼虛詞成茲實録語曰三人成市虎斯言其得之者一無者字乎馬遷待論稱堯世一誤作舜無許由應劭著録雲漢代無王喬其言讜矣至士安撰高士傳具說箕山之跡令升作搜神記深信葉縣之靈此並向聲背實舍真從僞知而故為罪之甚者北平本此處截條非本條蓋論晉書前特引端之詞非泛論雜家也近者一無者字宋臨川王義慶著世說新語上敘兩漢三國及晉中朝江事左劉峻注釋摘其瑕疵僞跡昭然理難文飾而皇家撰晉史多取此書遂採康王之妄言違孝標之正說以此書事奚其厚顏漢呂后以婦人稱制事同王者班氏次其年月雖與一訛以諸帝同編而記其事跡實與后妃齊貫皇家諸學士撰晉書首發凡例原注序例一卷晉書之首故云首發凡例而云班漢皇后除王呂之外不為作傳並編敘行事寄出外戚篇所不載者唯元後字政君耳安得輒引呂氏以為例乎蓋由讀書不精識事多闕徒以本紀標目以編高后之年遂疑外戚裁篇輒敘娥姁呂后字之事此四句文義亦不可曉其為率略不亦甚邪楊王孫布囊盛尸裸身而葬伊籍對吳以一拜一起未足為勞求兩賢立身各有此一事而已而漢書蜀志為其立傳前哲致譏一作議言之詳矣然楊能反經合義雖其事反葬禮之經而其言合達人之義足矯奢葬之愆伊以敏辭辨對可免使乎之辱列諸篇第猶有可取近者皇家撰晉書著劉伶畢卓傳其敘事也直載其嗜酒沉湎悖禮亂德若斯而已為傳如此復何所取者哉原注舊晉史本無劉畢傳皇家新撰以補前史所闕一本失此注宋略一條裴幾原子野刪略宋史定為二十篇芟煩一作繁撮要實有其力而所録文章頗傷蕪穢如文帝除徐一作師非傅官詔顏延年元后哀冊文顏峻史作竣討二凶檄孝武擬李夫人賦裴松之上注俗本注字作三字非國志表孔熙先罪許曜史作耀詞凡此諸文是尤不宜載者何則羡亮威權震主負芒猜忌將欲取之必先與之既而罪名具列刑書是正則先所降詔本非實録而乃先後雙載坐令矛盾兩傷論斷一夫國之不造史有哀冊或作策自晉宋已還多載於起居注詞皆虛飾義不足觀必以略言之故宜去也論斷二昔漢王數項袁公檄曹若不具録其文難以暴揚其過至於二凶為惡不言可知無俟檄數一作書始明罪狀必刊諸國史豈益一作宜非異同論斷三孝武作賦悼亡鐘心內寵情在兒女語非軍國論斷四松之所論者其事甚末一作下兼復文理非工論斷五熙先構逆懷奸矯言欺衆且所為稿草一作草稿本未宣行論斷六斯並同在編次不加銓一作詮擇豈非蕪濫者邪向若除此數文別存他說則宋年美事遺略蓋寡何乃應取而不取宜除而不除乎但近代國史通多此纍有同自鄶無足致譏若裴氏者一有是字衆作之中所可與言史者故偏舉其事以申掎托云後魏書二條宋書載佛貍之入寇也其間勝負蓋皆實録焉魏史所書原注謂魏收所撰者則全出沈本如事有可恥者則加減隨意依違飾一作罕非言至如劉氏獻女請和太武以師此二字一改作求字非婚不許此言尤可怪也何者江左皇族水鄉庶姓若司馬劉蕭韓王或出於亡命或起自俘囚一詣桑乾皆成禁臠此皆魏史自述非他國所傳然則北之重南其禮如此安有黃旗之主親屈己以求婚而白登之陳反懷一作乃致疑而不納其言河漢不亦甚哉觀休文宋典誠曰不工必比伯起魏書更為良史而收每云我視沈約正如或有一字奴耳原注出關東風俗傳一本失此注此可謂飾嫫母而誇西施持魚目而笑明月者也近者沈約晉書喜造奇說稱元帝牛金之子以應牛繼馬後之徵鄴中學者王劭宋孝王言之詳矣而魏收深嫉南國幸書其短著司馬睿傳遂具録休文所言又崔浩諂事狄君曲為邪說稱拓跋之祖本李陵之胄當時衆議抵一作相誤斥事遂不行或有竊其書以渡江者沈約撰宋書索虜傳仍傳伯淵所述凡此諸妄其流甚多倘無跡可尋則真僞難辨者矣北齊諸史三條王劭國史至於論戰爭述紛擾賈其餘勇彌見所長至如敘文宣逼孝靖以受魏禪二王當作常山殺楊燕以廢乾明雖左氏載季氏逐昭公秦伯納重耳欒盈起於曲沃楚靈敗於乾祐殆可連類也又敘高祖破宇文於邙一訛印一訛邛史作芒山周武自晉陽而平鄴雖左氏書城濮之役鄢陵之戰齊敗於鞍吳師入郢亦不是過也或問曰王劭齊志多記當時鄙言為是乎為非乎對曰古往今來名目各異區分壤隔稱謂不同所以晉楚方言齊魯俗語六經諸子載之多矣自漢已降風俗屢遷求諸史籍差睹其事或君臣之目施諸朋友或尊官之稱屬諸君父曲相崇敬標以處士王孫輕加侮辱號以僕夫恐作役夫為允舍長亦有荊楚訓多為夥廬江目橋為圯南呼北人曰倫西謂東胡曰虜渠們底個江左彼此之辭乃若君卿中朝汝我當作爾汝之義斯並因地而變隨時而革布在方冊無假推尋足以知氓俗之有殊驗土風之不類然自二京失守四夷稱制夷夏相雜音句尤媸而彥鸞伯起務存隱諱舊注謂長為藏蓋為姚萇諱重規德棻志在文飾遂使中國數百年內其俗無得而言蓋語曰知古而不知今謂之陸沈又曰一物不知君子所恥是則時無遠近事無巨細必籍通藉多聞以成博識如今之一無之字所謂者若中州名漢關右稱羌易臣以奴呼母云姊主上有大家之號師人致兒郎之說六句皆言現在俗傳口語凡如此例其流甚多必尋其本源莫詳所出閲諸齊志王劭作則了然可知由斯而言劭之所録其為弘益一作益彌多矣足以開後進之蒙蔽廣來者之耳目微君懋吾幾面墻於近事矣而子奈何妄加譏誚者哉皇家修五代史梁陳北齊後周隋館中墜稿仍存皆因彼舊事定為新史觀其朱墨所圖通塗鉛黃所拂猶有可識者或以實為虛以非為是其北齊國史皆稱諸帝廟號及李氏撰齊書其廟號有犯時諱者原注謂有世字犯太宗文皇帝諱也即稱諡焉至如變世宗誤作祖為文襄改世祖誤作宗為武成茍除茲世字而不悟襄成有別句意未足恐有脫字諸如此謬不可勝紀又舊誤故其列傳之敘事也或以武定臣佐降在成朝或以河清事跡擢居襄代故時日不接而隔越相偶使讀者瞀亂而不測驚駭而多疑嗟乎因斯而言則自古著書未能精讜書成絶筆而遽捐舊章遂令玉石同燼一作盡真僞難尋者不其痛哉周書一條今俗所行周史是令狐德棻等所撰其書文而不實雅而無檢真跡甚寡客氣尤煩尋宇文初習華風事由蘇綽至於軍國詞令皆準尚書太祖敕朝廷他一無他字文悉準於此蓋史臣所記皆稟其規柳虯之徒從風而靡案綽文雖去彼淫麗如南朝北梁諸書存茲典實謂規仿尚書之體而陷於矯枉過正之失乖夫適俗隨時之義茍記言若是則其謬逾多爰及牛弘彌尚儒雅即其一有書字舊事因而勒成務纍上聲清言罕逢佳句據文義佳句恐是往句之訛謂無復原初質語也而令狐不能別求他述一作術述通用廣異聞唯憑本書重加潤色原注案字文氏事多見於王劭齊志隋書及蔡允恭後梁春秋其王褒庾信等事又多見於蕭韶太清記蕭大圜淮海亂離志裴政太清實録杜臺卿齊紀而令狐德棻了不兼採以廣具書蓋以其中有鄙言故致遺略遂使周氏一代之史多非實録者焉隋書一條昔賈誼上書朝錯對策皆有益軍一作於國足貽勸戒而編於漢史一作史漢非讀者猶恨其繁如隋書王劭袁充兩傳唯録其詭辭妄說遂盈一篇尋又申以詆河尤其諂惑夫一多史字一多人字載言示後一多世字者貴於辭理可觀既以無益而書豈一作孰若遺而不載蓋學者神識有限而述者注記無涯以有限之神識觀無涯之注記必如是則閲之心目視聽告勞書之簡編繕寫不給嗚呼茍自古一脫古字著述其皆若此也則知李斯之設坑阱董卓之成帷蓋雖其所行多濫終亦有可取焉有激之辭案隋史譏王君懋撰齊隋二史舊有其字敘録煩碎此處當補及其自編隋書仍復蕪辭不翦雲云方得文義清畫行本缺至如劉臻還宅訪子方知王劭思書為奴所侮此而畢載為失更多可謂尤而效之罪又甚焉者矣卷十七外篇卷十八

body:
  text: 暗惑第十二夫人識有不燭神有不明則真偽莫分邪正靡別昔人一無人字有以發繞炙誤其國君者有置毒於胙誣其太子者一有矣字夫發經炎一作炙炭必致焚灼毒昧經時無復殺害而行之者偽成其事受之者信以為然故使見咎一時取怨千載夫史傳敘事亦多如此其有道理難憑欺誣可見如古來學者莫覺是非蓋往往有焉今聊舉一二加以駁難列之於左史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為已死象乃止舜宮難曰夫杳冥不測變化無恆兵革所不能傷網羅所不能制若左慈易質為羊劉根竄形入壁是也時無可移禍有一作所必至雖大聖所不能免若姬伯拘於羑里孔父厄於陳蔡是也然俗之愚者皆謂彼幻化是為聖人豈知聖人智周萬物才兼百行若斯而已與夫方內之上有何異哉如史記云重華入於井中匿空出去此則其意以舜是左慈劉根之類非姬伯孔父之徒茍識事如斯難以語夫聖道矣且案太史公云舊脫雲字黃帝堯舜軼事時時見於他說餘擇其言尤雅者著為本紀書首若如向之所述豈可謂之一無之字雅邪又舊本自此以下節首並有又字一本皆無今從舊本史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語歲餘象孫叔敖楚王及左右不能別也莊王置酒優孟為壽王大驚以為孫叔敖復生欲以為相難曰蓋語有之人心不同有如其面故窊舊作窳隆異等修短殊姿皆稟乏自然得諸造化非由仿效俾有遷革著想滯如優孟之象孫叔敖也衣冠談說容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪一作也昔陳焦既亡累年吳志亦作六日而活秦諜從縊六月而蘇顧或訛須一改遂使竹帛顯書古今或作今古稱怪況叔敖之歿時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以又是滯語豈有片言不接一見無疑遽欲加以寵榮復其祿位此乃類夢中行事豈人倫所為者哉又史記田敬仲世家曰田常成子以大斗出貸以小斗收齊人歌之曰嫗乎採芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以謚此之不實明一作昭然可知又案左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎同史記文史記家令說太上皇曰高祖雖子人主也諸如此說其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語纂成歌詞欲加刊正無可厘革故獨舉其失以為標冠云又史記仲尼弟子列傳曰孔子既沒有若狀似孔子弟子相與共立為師師一作事之如夫子他日弟子進問曰昔夫子當舊作嘗行使弟子持雨具已而果雨商瞿年一脫年字長無子母為此二字一作欲更取室孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知此舊作之有若默然無史有以字應弟子起曰有子一作若避史有之字斷句此非子之坐也難曰孔門弟子七十二人柴愚參魯宰言游學俗作宰我言語誤師商可方回賜非俗誤作之類此並聖人品藻優劣已詳門徒商榷臧否又定如有若者名不隸於四科譽無偕於十哲逮尼父既歿方取為師以不答所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使喪明致罰投杖謝愆何肯公然自欺詐相策一作承奉此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷裁史仍習其言得自委巷曾無先覺悲夫又史記漢書皆曰上自史記作在漢書作居洛陽南宮從復道望見諸將往往相與坐沙中語漢書作往往數人偶語上曰此何語留侯曰陛下所封皆故人親愛所誅皆平生讎一作仇忌史漢作怨此屬畏誅故相聚謀反爾上乃憂曰為之奈何留侯曰上平生所憎誰最甚者上曰雍齒留侯曰今先封雍齒以示群臣群臣見雍齒封則人人自堅矣於是上置酒封雍齒為侯難曰夫公家之事知無不為見無禮於君如鷹鸇之逐鳥雀案子房之一無之字少也傾家結客為韓報讎一作仇此則忠義素彰名節甚著其事漢也何為屬群小聚一脫聚字謀將犯其君遂默然杜口俟問方對倘若高祖不同竟欲無言者邪且將而必誅罪在不測如諸將屯聚圖為禍亂密言臺上猶懼覺知群議沙中何無避忌為國當作圖之道必不如斯然則張良慮反側不安雍齒以嫌疑受爵蓋當時實有其事也如復道之望坐沙而語是說者敷演妄溢其端耳又東觀漢記曰赤眉降後積甲與熊耳山齊雲云所難之指文中已足雲云字疑衍難曰案盆子既亡棄甲誠眾必與山比峻則未之有也昔武成云前徒倒戈血流漂杵孔安國曰蓋言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟又東觀漢記曰郭伋為並州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問一有曰字兒曹何自遠來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至一作出郭外問使君向日當還伋使別駕計日告之既還先期一日伋為違信止於野亭須期乃入難曰蓋此事不可信者三焉案漢時方怕儀比諸侯其行也前驅竟一作蔽野後乘塞路鼓吹沸喧旌棨填咽彼草萊稚子齠齔童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌棨帷首觸威嚴自陳襟抱其不可信一也又方伯案部舉州振肅至於墨紱長吏黃綬群官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩自有所如棄而不就居止無恆一作常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄它方蓋亦事同大夏訪知一作諸商賈不可多得況在童孺彌復難求群戲而乘如何克辦其不可信三也凡說此事總有三科三科屬漢記言推而論之了無一實異哉補注傳檄恐當作轉致又魏志注語林曰匈奴遣使人一無人字來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云云二字亦贅一本止一雲字亦衍難曰昔孟陽臥一作坐床詐稱齊後紀信乘口矯號漢王或主遘屯蒙或朝罹兵革故權以取濟事非獲已如崔琰本無此意何得以臣代君者哉且凡稱人君皆慎其舉措況魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉矚也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛給以親姻猶恐一脫恐字虺毒不悛狼心易擾如輒殺其使者不顯罪名復何以懷四夷於外藩建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜茲謗口而言同綸綍聲遍寰區欲蓋而彰止益其辱雖愚暗之主猶所不為況英略之君豈其若是夫芻蕘鄙說閭巷讕舊作諂或作闊並非言凡一作諸如此書通無擊難而裴引語林斯事編入魏史注中持彼虛詞亂茲實錄蓋曹公多詐好立詭謀流俗相欺遂為此說蓋曹公十七字一本失去一本綴注節末細按之定是正文應置於此故特申掎摭辯其疑誤者焉又魏世諸小書一訛作事皆云文鴦侍講殿瓦皆飛雲云二字贅此事列晉陽秋之前亦指曹魏時難曰案漢書云項王叱吒懾伏千人然則呼聲之極大者不過使人披靡而已尋文鴦武勇遠慚項籍況侍君側固當屏氣徐言安能一多使字簷瓦皆飛有逾舊作喻武安鳴鼓且瓦既飄隕則人必震驚而魏帝與其群臣焉得巋然無害也又晉陽秋曰胡質為荊州刺史子威自京都一作師省之見父史有停廄中三字文當摘一停字乃成句十餘日告歸質賜絹一匹為路糧威曰大人清高不審於何得此絹質曰是吾俸祿之餘難曰古人謂方牧為二千石者以其祿有二千石故也名以定體貴實甚焉設使廉如伯夷介若黔敖恐當作婁茍居此職終不患於貧餒者如胡威之別其父也一縑之財猶且發問則千石之俸其費安施料以牙籌推以食一作之借箸察其厚薄知不然矣或曰觀諸史所載茲流非一原注如張堪為蜀郡乘折轅車吳隱之為廣川貨犬待客並其類也張堪舊作張湛貨犬或作貸米並誤必以多為證則足可無疑然人自有身安弊古通敝鏹口甘粗糲而多藏鏹帛無所散用者故公孫弘位至三公而臥布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此而史臣不詳厥理直謂清白當然一脫當然二字繆矣哉又新晉書阮籍傳曰籍至孝母終正與人圍棋對者求止籍留與決史有賭字既而飲酒二斗舉聲一號吐血數升及史有將字葬食一蒸豚飲二斗酒一本酒字在二斗上然後臨穴史作訣直言窮矣舉聲一號因復吐血數斗史亦作升毀瘠骨立殆致滅性難曰夫人才雖下愚識雖不肖始亡天屬必致其哀但有舊誤作以苴絰未幾悲荒遽輟如謂本無戚容則未之有也況嗣宗當聖善將歿閔兇所鐘合門惶恐舉族悲吒居里巷者猶停舂相一作杵之音在鄰伍者尚申匍匐之救而為其子者方對局求決舉杯酣暢但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之喪親也朝夕孺慕鹽酪不嘗斯可至於臒瘠矣如甘旨在念則筋肉內寬醉飽自得一作支則饑膚外博況乎溺情豚酒不改平素雖復時一嘔慟豈能柴毀骨立乎已上兩駁理解皆得苦其煩絮蓋彼阮生者不修名教居喪過失而說者遂言其無禮如彼又舊訛作人以其志操本一作尤異才識甚高而談者遂言其至性如此惟毀及譽皆無取焉又新晉書王祥傳曰祥漢末遭亂扶母攜弟覽避地廬一作盧誤江隱居三十餘年不應州郡之命母終徐州刺史呂虔檄為別駕年垂耳順覽勸之乃應召於時寇賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實賴王祥年八十五太始五年薨難曰祥為徐州別駕寇盜充斥固是漢建安中獻帝第三改元徐州未清時事耳子玄粘看在此疑端從此生有魏受命凡四十一作三十誤五年自丕至陳留王全魏之數也陳留即常遺鄉公後謚元帝上去徐州寇賊充斥下至晉太始武帝初元五年當六十年已上矣祥於建安中年垂耳順更加六十一多六字載至晉太始五年薨則當年一百二十歲矣而史云年八十五薨者何也如必以終時實年八十五則為徐州別駕止可年年字一在五六下二十五六矣又云其未從官已前隱居三十餘載者但其初被檄時止年二十五六自此而在安得復有三十餘年乎必謂祥為別駕在建安後則徐州清晏易代頻仍麼麼竊發固亦時有史不悉載耳胡可臆泥何得云於時寇賊充斥祥率勵兵士頻討破之乎求其前後無一符會也凡所駁難具列如右蓋精五經者討群儒之別義練三史者徵諸子之異聞加以探賾索隱然後辨其紕繆如向之諸史所載則不然何者其敘事也唯記一途宜論一理而矛盾自顯表裏相乖非復牴牾直成狂惑者爾尋茲失所起良由作者情多忽略識惟愚滯或採彼流言不加銓一作詮擇或傳諸繆說即從編次用使真偽混淆是非參錯蓋語曰君子可欺不可罔至如邪說害正虛詞損實小人以為信爾君子知其不然又一無又字語曰信書不如無書蓋為此也夫書彼竹帛事非容易凡為國史可不慎諸

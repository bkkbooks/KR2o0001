body:
  text: 載言第三古者言為尚書事為春秋左右二史分尸其職蓋桓文作霸糾合同盟春秋之時事之大者也而尚書缺紀秦師敗績繆公誡誓尚書之中言之大者也而春秋靡録此則言事有別斷可知矣逮左氏為書不遵古法言之與事同在傳中然而言事相兼煩省合理故使讀者尋繹不倦覽諷忘疲至於史漢則不然凡所包舉務在恢博文辭之記繁富為多是以賈誼朝錯董仲舒東方朔等傳唯上録言罕逢載事夫方述一事得其紀綱而隔以大篇分其次序遂令披閲之者有所懵然後史相承不改其轍交錯分擾古今是同案遷固列君臣於紀傳統遺逸於表志雖篇名甚廣而言無獨録愚謂凡為史者宜於表志之外更立一書若人主之制册誥令羣臣之章表移檄收之紀傳悉入書部題為制册章表書以類區別他皆放此亦猶志之有禮樂志刑法志者也又詩人之什自成一家故風雅比興非三傳所取自六義不作文章生焉若韋孟諷諫之詩揚雄出師之頌馬卿之書封禪賈誼之論過秦諸如此文皆施紀傳竊謂宜從古詩例斷入書中亦猶舜典列元首之歌夏書包五子之詠者也夫能使史體如是庶幾春秋尚書之道備矣昔干寶議撰晉史以為宜準左丘明其臣下委曲仍為譜注於時議者莫不宗之故前史之所未安後史之所宜革是用敢同有識爰立茲篇庶世之作者覩其利害如謂不然請俟來哲

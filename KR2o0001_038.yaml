body:
  text: 古今正史第二易曰上古結繩以理後世聖人易之以書契儒疑當作傳蓋指注經者者云伏羲氏始畫八卦造書契以代結繩之政由是文籍主焉又曰優羲神農黃帝之書謂之三墳言大道也少吳顓頊高辛唐虞之書謂之五典言常道也春秋傳載楚左史疑當有倚相二字能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五史一作典策至於春秋之時猶大行於世愛及後古一作世其書不傳惟唐虞已降可得言者然自堯而往聖賢猶述求其一二仿佛存焉而後來諸子廣造奇說造唐虞已上之說其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典所記無得而稱者焉案一無案字堯舜相承已見墳典周監二代各有書籍至孔子討論其義刪為尚書始自唐堯下終秦穆其言百篇而各為之序屬秦為不道坑儒禁學孔子之未孫曰一多孔字惠壁藏其書漢室龍興旁求儒雅聞故奏博士伏勝能傳其業詔太常使掌故一本作固據漢書作故朝錯受焉時伏生年且百歲言不可曉口授其書才二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河內女子得泰誓一篇獻之與伏生所誦合三十篇行之於世其篇所載年月不與序相符會又與左傳國語孟子所引泰誓不同故漢魏諸儒原注謂馬融鄭玄王肅也咸疑其繆古文尚書者即孔惠之所藏科斗之文字也魯恭王壞孔子舊宅始得之於壁中博士孔安國以校伏生所誦增多二十五篇更以隸古字寫之編為四十六卷司馬遷遷字舊訛在故字下屢訪一作採其事故多有古說安國又受詔為之訓傳值武帝末巫蠱事起經籍道息不獲奏上藏諸私家劉向取校歐陽大小夏侯三家經文脫誤甚衆至於後漢孔氏之本遂絶其有見於經典者諸儒皆謂之逸書原注謂馬融鄭玄杜預也王肅亦注今文尚書而大與古文孔傳相類或肅私見其本而獨祕之平晉元帝時豫章一多王字內史梅賾始以孔傳奏上而缺舜典一篇乃取肅之堯典從慎徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭玄王肅諸注廢而古文孔傳獨行列於學官或作宮非永為世範齊建武中吳興人姚方興孔穎達作方興隋書方字在下採馬王之義以造孔傳舜典云於大航隋書作杭購得詣闕以獻舉朝集議咸以為非原注梁武帝時博士議曰孔敘稱伏生誤合五篇蓋文句相連所以成合舜典必有曰若稽古伏生雖雲昏耄何容由是遂不見用也及江陵板蕩其文入北中原學者得而異之隋學當作博士劉炫遂取此一篇列諸本第故今人所習尚書舜典元出於姚氏者焉當周室微弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左丘明觀書於太史氏因魯史記而一誤作所作春秋上遵周公遺制下明將來之法自隱及哀一有盡字十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言說經也春秋所貶當世君臣其事實皆形於傳故隱其書而不宣所以免時難矣及末世口說流行故有公羊穀梁鄒夾之傳鄒氏無師夾氏有録無書故不顯於世漢興董仲舒公孫弘並治公羊其傳習者有嚴顏二家之學宣帝即位聞衛太子私好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮於後漢儒者數廷毀之會博士李封卒遂不復補一作用逮一無逮字和帝元興十一年鄭興父子奏請重立於學官至魏晉其書漸行而二傳亦廢今所用左氏本即杜預所注者又當春秋之世諸侯國自有史故孔子求衆家史記而得百二十國書如楚之書鄭之志魯之春秋魏之紀年此其可得言者左丘明既配經立傳又撰諸異同號曰外一訛小傳國語二十一篇斯蓋採書志等文非唯魯之史記而已楚漢之際有好事者録自古帝王公侯卿大夫之世終乎秦末號曰世本十五篇春秋之後七雄並爭秦並諸侯則有戰國策三十三篇漢興太中大夫陸賈紀録時功一作政作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳國語刪世本戰國策據楚漢列國舊本脫國字今照班彪略論補時事上自黃帝下訖麟止一誤作趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記厥協一本二字例置六經異傳整齊百家雜言藏諸名山副在京師以俟後聖君子至宣帝時遷外孫楊惲祖述其書遂宣布焉而十篇未成有録而已原注張晏漢書注云十篇遷歿後亡失此說非也元成之間一多會稽二字褚先生更補其缺作武帝紀三王世家龜策日者等傳古本脫等字今本於等傳下有其龜策日者五字辭多鄙陋非遷本意也晉散騎常侍巴西譙周以遷書周秦已上或採家人諸子不專據正經於是作古史考二十五篇皆憑舊典以糾一作礱其繆今則與史記並行於代焉史記所書年止漢武太初已班彪傳作以後闕而不録其後劉向向子歆及諸好事者若馮商衛衡揚雄史岑梁審肆仁晉馮段肅班固集作段肅固本傳作殷肅金丹馮衍韋融蕭奮劉恂等相次撰續迄於哀平間猶名史記至建武中司徒掾班彪以為其言鄙俗不足以踵前史又雄歆褒美僞新一作僞褒新室又一本新室作新莽誤後惑衆不當垂之後代者也於是採其舊事旁貫異聞作後傳六十五篇其子固以父所撰未盡一家乃起元高皇終乎王莽十有二世二百三十年綜其行事上下通洽為漢書紀表志傳百篇其事未畢會有上書云固私改作史記者有詔京兆收系悉録家書封上固弟超詣闕自陳明帝引見言固續父所作不敢改易舊書帝意乃解出固徵詣校書受詔卒業經二十餘載至章帝建初中乃成固後坐竇氏事卒於洛陽獄書頗散亂莫能綜理其妹曹大家博學能屬文奉詔校敘又選高才郎馬融等十人從大家受舊作授讀其八表及天文志等猶未克成多是待詔東觀馬續所作而古今人表尤一無尤字不類本書始自漢末迄平陳世為其注解者凡二十五家至於專門受業遂一無遂字與五經相亞初漢獻帝以固書文煩難省乃詔侍中荀悅依左氏傳體一無體字刪為漢紀三十篇命祕書給紙筆經五六一無六字年乃就其言簡要亦與紀舊作本誤傳並行在漢中興明帝始詔班固與睢陽令陳宗長陵令尹敏司隸從事孟異班固傳作異舊木作冀作世祖本紀並撰功臣及新市平林公孫述事作列傳載記二十八篇自是以來春秋考紀此句舊本作春秋世三字王本世字下空一字亦以煥炳而忠臣義士莫之撰勒於是又詔史官謁者僕射劉珍及諫議大夫李尤或訛作充雜作記表名臣節士儒林外戚諸傳起自建武光武元訖乎永初安帝元事業垂竟而珍尤一作等繼卒復命侍中伏無忌與諫議大夫黃景作諸王王子功臣恩澤侯表南單于西羌傳地理志至元嘉元年桓帝無復令太中大夫邊韶大軍營司馬崔實議郎朱穆曹壽雜作孝穆崇二皇孝穆五字傳寫訛脫當作獻穆孝崇二皇后及順烈皇后傳又增外戚傳入安思等後儒林傳入崔篆諸人實壽又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢記熹舊訛嘉平中熹平是靈帝改元光祿大夫馬日碑議郎蔡雍楊彪盧植著作東觀接續紀傳之可成者而雍別作朝會車服二志後坐事徙朔方上書求還續成十志本傳作十意會董卓作亂大駕此二字一本脫西遷史臣廢棄舊文散佚及一無及字在許都楊彪頗存注記至於名賢君子自永一作本誤初已下闕續魏黃初中文帝元唯著先賢表故漢一脫漢字記殘缺至晉無成泰始中晉武帝元祕書丞司馬彪始討論衆書一作說一作作今依彪傳綴其所聞起元傳作於光武終於孝獻録世十二編年二百通綜上下旁引傳作貫庶事為紀志傳凡八十依本傳舊作一十三篇號曰續漢書又散騎常侍華峙刪定東觀記為漢後或作後漢誤書帝紀十二或訛作三皇后紀二典十一作十典又以三譜置十典上列傳七十譜三嶠本傳作三譜序傳目録總九十七或誤作二篇其十典竟不成而卒自斯已往已往猶云已上總前而言也舊作後非作者相繼為編年者四族創紀傳者五家推其所長華氏居最而遭晉室東徙三惟一存所存惟三分之一也至宋宣城太守范曄乃廣集學徒窮覽舊籍刪煩補略作後漢書凡十紀十志八十列傳合為百篇會曄以罪被收其十志亦未成而死先是晉東陽太守袁宏抄撮漢氏後書依荀悅體著後漢紀三十或誤作十三篇世言漢中興史者唯範袁一作袁範二家而已魏史黃初太和中始命尚書衛覬繆襲草刨紀傳纍載不成又命侍中韋誕應璩祕書監一無監字王沈大將軍從事中郎阮籍司徒右長史孫該司隸校尉傅玄等復共撰一作擇定其後王沈獨就其業勒成魏書四十四卷其書多為時諱殊非實録吳大帝之季年始命太史令丁孚郎中項峻撰吳書孚峻一作峻孚俱非史才其文不足紀録至少帝時更敕韋曜周昭薛瑩梁廣華核訪求往事相與記述並作之中曜一作推瑩為首當歸命侯時昭廣一作廣昭先亡曜瑩徙黜史官久闕書遂無聞核表請召一無召字曜瑩續成前史其後曜獨終其書定為五十五卷至晉受命海內大同著作陳壽乃集三國史前但述二國此云三國者據陳所撰書為言也撰為國志凡六十五篇夏侯湛時亦著魏書見壽所作便壞己草而罷及壽卒梁州大中正範頵表言國志明乎得失辭多勸誡有益風化願垂採録於是詔下河南尹就家寫其書先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録異聞錯出其流最一作甚多宋文帝以國志載事一作紀傷於簡略乃命中書郎裴松之兼採衆書補注其闕由是世一無世字言三國志者以裴注為本焉晉史洛京時著作郎陸機始撰三祖紀佐著作郎一脫郎字束皙又撰十志會中朝喪亂其書不存先是歷陽令陳郡一作留王銓一誤作鈐下同有著述才每私録晉事舊誤作晉書及功臣行狀未就而卒子隱博學多聞郭作文受父遺業西都事跡多所詳究過江為著作郎受詔撰晉史為其同僚虞預所訴舊作斥誤坐事免官家貧無資書未遂就乃依征西將軍庾亮於武昌鎮亮給其紙筆由是獲成凡為晉書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆銓所修章句混漫者必隱所作時尚書郎領國史干寶亦撰晉紀自宣迄愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱晉江左史一有官字自鄧粲孫盛檀道鸞王韶之王韶之舊在檀道鸞上已下相次繼作遠則偏記兩帝近則唯敘八舊作六誤朝至宋湘東太守何法盛始撰晉中興書勒成一家首尾該備齊隱士東莞臧榮緒又集東西二史合成一書皇家貞觀中有詔以前後晉一脫晉字史十有八家制作雖多未能盡善乃敕史官更加纂録採正典與雜或作舊說數十餘部兼引僞史十六國書為紀一訛記十志二十列傳七十載記三十並敘例目録合為百三十二卷自是言晉史者皆棄其舊本內有編年體並棄之矣竟從新撰者焉宋史元嘉中文帝元著作郎問承天草創紀傳自此以外悉委奉朝請山謙之補承天殘缺後又命裴松之續成國史松之尋卒史佐孫沖之表求別自創立為一家之一無之字言孝建初孝武元又敕南臺侍御史蘇寶生或訛山下同續造諸傳元嘉名臣皆其所撰寶生被誅大明孝武改元六年又命著作郎徐愛踵成前作愛因問孫山蘇所述勒為一作成一書其臧質魯爽王僧達諸傳又皆孝武自造而序事多虛難以取信自永光廢蒂元已後至禪讓十餘年中闕而不載至齊著作郎沈約更補綴所遺制成新舊訛作雜史始一脫始字自義熙肇號晉安帚改元終乎升明三年順帝末為紀十志三十列傳六十合百卷名曰宋書永明末其書既行河東裴子野更刪為宋略二十卷沈約見而嘆曰吾所不逮也由是世之言宋史者以裴略為上沈書次之齊史江淹始受詔著述以為史之所難無出於志故先著十一作其非志以見其才沈約復著齊紀二十篇梁天監中太尉録事蕭子顯啓撰齊史書成表奏之詔付祕閣起升明宋順帝元之年盡永元東昏元之代此八句諸本脫簡今據本傳補入寧冒妄綴之譏不敢疏率了事也為此亦補字紀八志十一列傳四十合成五十九篇時奉朝請吳均亦表請撰齊史乞給起居注並群臣行狀有詔齊氏故事布在流俗聞見既多可自搜訪也均遂撰齊春秋三十篇其書稱梁帝為齊明佐命帝惡其實詔燔之然其私本竟能與蕭氏所撰並傳於後梁史武帝時沈約與給事中周興嗣步兵校尉鮑行卿祕書監謝吳相承撰録已有百篇值承聖元帝元淪沒並從焚蕩廬江何之元沛國劉潘以所聞見究其始未合撰梁典三十篇而紀傳之書未有其作陳桐部郎中姚察有志撰勒施功未周謂加功於前人所未完者但既當朝務兼知一作修非國史至於陳亡其書不就陳史初有吳郡顧野王北地傅縡各為撰史學士其武文二帝紀即顧傅所修太建初宣帝元中書郎陸瓊續撰諸篇事傷煩雜姚察就加刪改粗有條貫及江東不守持以入關隋艾帝嘗索梁陳事跡察具一訛作且以所成每篇續奏而依違荏苒竟未絶筆皇家貞觀初其子思廉為著作郎奉詔撰成二史於是憑其舊稿加以新録彌歷九載方始畢功定王本作述為梁書五十卷陳書三十六卷今並行世焉十六國史前趙劉聰時領左國史公師或撰高祖劉淵本紀及功臣傳二十人甚得良史之體凌修譖其訕謗先帝聰怒而誅之劉曜時平輿子封號和苞撰漢一脫漢字趙記十篇事止當年不終曜滅後趙石勒命其臣徐光宗歷傅暢鄭惜等撰上黨國記起居注趙書其後又令王蘭陳宴程陰徐機等相次撰述至石虎並令刊削使勒功業不傳其後燕太傅長史田融宋尚書庫部郎郭仲産北中郎參軍王度迫撰二舊無二字石事集為舊無為字鄴部記趙記一作紀等書前燕慕容廆皓雋口有起居注杜輔全疑詮字脫旁録以為燕紀後燕垂寶盛熙建興元年董統受詔草創後書著本紀並佐命功臣王公列傳合三十卷慕容垂稱其敘事富贍足成一家之言但褒述過美有慚董史之直其後申秀範亨各取前後二燕合成一史南燕有趙郡王景暉嘗事德超南燕二主名撰二主起居注超亡仕於馮氏官至中書令仍撰南燕録六卷蜀初號曰成後改稱漢李勢散騎常侍常璩撰漢書十卷後入晉祕閣改為蜀李一脫李字書璩又撰華陽國志具載李氏興滅前涼張駿十五年命其西曹邊瀏集內外事以付秀才索綏作涼國春秋五十卷又張重華護軍參軍劉慶在東苑苑通專修國史二十餘年著涼記十二卷建康太守索暉一作琿從事中郎劉曬又各著涼書前秦苻堅史官初有趙淵車敬梁熙韋談相繼著述符堅嘗取而觀之見茍大後幸李威事怒而焚滅其本後著作朗董誼追録舊語十不一存及宋武帝入關曾訪秦國事又命梁州刺史吉翰問諸仇池並無所獲先是秦祕書郎趙整參撰國史值秦滅隱於商一作南洛山著書不輟有馮詡車頻助其經費一作始整卒翰乃啓頻纂成其書以元嘉九年起至二十八年方罷定為三卷而年月失次首尾不倫河東裴景仁又正其訛僻刪為秦紀十一篇後秦姚弋仲扶風馬僧虔河東衛隆景並著秦史及姚氏之滅殘缺者多泓從弟和都仕魏為左民尚書又追撰秦紀十卷夏赫連勃勃天水趙思群北地張淵於真興勃勃元承光昌元之一無之字世並受命著其國書及統萬夏城之亡多見焚燒一脫燒字西涼李皓與西秦乞伏國仁此下誤衍北燕二字其史或當代所書或他邦所録此下當補纍經過轉今並失傳八字段龜龍記呂氏後涼宗欽記沮渠氏北涼失名記舊本宗欽記誤粘禿發脫去沮渠一家今照史補此六字禿發氏南涼韓顯宗記舊衍呂字馮氏北燕唯有舊訛此三者本有四種其一大名故云三者可知自餘不詳誰作魏世黃門侍郎崔鴻乃考核衆家辨其同異除煩補闕錯綜綱紀易其國書曰録主一訛正紀曰傳都謂之十六國春秋鴻始以景明之初魏世宗宣武元求諸國逸史逮正一訛至始元年亦宣武元鳩集稽備而一本有以字一本而作已屬土句猶闕蜀事不果成書推求十有五年始於江東購獲乃增其篇目勒為一百二此三字舊訛作十卷鴻歿後永安中魏莊帝元其子繕寫奏上請藏諸祕閣由是僞史宣布大行於時元魏史道武時始令鄧淵著國記唯一脫唯字為十卷而條例未成暨乎明元廢而不述神祇二年太武元又詔集諸文士崔浩浩弟覽高說舊作閭誤鄧穎朝繼一訛維範亨黃輔等撰國書為三舊脫三字十卷又特命浩總監史任務從實録復以中書郎高允散騎恃郎張偉並參著作續成前史史字疑衍書敘述國事無隱所一無所字惡而刊石寫之以示行路浩坐此夷三族同作死者百二十八人自是遂廢史官至文成帝和平元年始復其職而以高允典著作修國記允年已九十手目俱衰時有校書郎一有中子劉模長於緝綴乃令執筆而口占授之如是者五六歲所成篇卷模有力焉初國記自鄧崔以下皆相承作編年體至孝文太和十一年詔祕書丞李彪著作郎崔光始分紀傳異科宣武時命邢巒追撰孝文起居注既而崔光王舊脫王字遵業補續下訖孝明之世溫子升復修孝莊一訛武紀濟陰王暉業撰辨宗室録魏史官私官私謂官木私木所撰盡於斯矣齊天保二年顯祖元敕祕書監魏收博採舊聞勒成一史又命一作令刁柔辛元植房延祐睦一訛陸仲讓裴昂之高孝乾等助其編次收所取史官懼相凌忽故刁辛諸子並乏史才唯以仿佛學流憑附得進於是大征百家譜狀斟酌以成魏書上自道武下終孝靖紀傳與志凡百三十卷收諂齊氏於魏室多不平既黨北朝又厚誣江左性憎勝己喜念舊惡甲門盛德與之有怨者莫不被以醜言沒其善事遷怒所至毀及高曾書成始奏詔收於尚書省與諸家論討前後列訴者百有餘人時尚書令楊遵彥一代貴臣勢傾朝野收撰其家傳甚美是以深被黨援諸訟史者皆獲重罰或有一無有字斃於獄中群怨謗聲不息孝昭世敕收更加研審然後宣布於外武成武成孝武弟世祖諡也王本改作書成非嘗訪諸群臣猶云不實又令治改其所變易甚多由是世薄其書號為穢史至隋開皇敕著作郎魏簷與顏之椎辛德源更撰魏書矯正收失淡以西魏為真東魏為僞故文恭列紀孝靖稱傳合紀傳論例總九十二篇煬帝以泡書猶未能善又敕左僕射楊素別撰學士潘徽諸亮歐陽詢等佐之會素薨而止今世稱魏史者猶以收本為主焉高齊史天統初後主緯元太常少卿祖孝徵述獻武起居名曰黃初傳天録或謬改為録時中書侍郎陸元規常從文宣征討著皇帝實録唯記行師不載它事自武平後亦後主元史官陽休之杜臺卿祖崇儒崔子發等相繼注記逮一作迄於齊滅隋祕書監王劭內史令李德林並少仕鄴中多識故事王乃憑述起屠注廣以異聞造編年書號曰齊志十有六卷原注其序云二十卷個世間傳老唯十六卷焉李在齊預修國史刨紀傳書二十七卷至開墾初一有又字奉詔續撰增多齊史三十八篇以舊作已上送官藏之祕府皇家貞觀初敕其子中書舍人百藥仍其舊録雜採它書演為五十卷今之言齊史者唯王李二家云字文周史大統年有祕書丞柳虯兼領著作直辭正色事育可稱至隋開皇中祕書監牛弘追撰周紀十有八篇略述紀綱仍皆抵許王本作抵捂皇家貞觀初敕祕書丞令狐德棻祕書郎岑文本共加修緝定為周書五十卷隋史當開皇仁壽時王劭為書八十卷以類相從定其篇目至於編年紀傳並闕其體煬帝世唯有王胄等所修大業起居注及江都之禍仍多散逸皇家貞觀初敕中書侍郎顏師古給事中孔穎達共撰成隋書五十五卷與新撰周書並行於時初太宗以梁陳及齊周隋氏並未有書乃命學士分修事具於上上謂梁陳及齊周隋四節所云仍使祕書監魏徵總知其務凡有贊論徵多預焉始以貞觀三年創造至十八年方就原注唯姚思廉貞觀二年起功多於諸史一歲合為一脫為字五代紀傳並目録凡二百五十二卷書成下於史閣唯有十志斷為三十卷尋擬續奏未有其文又詔左僕射於志寧太史令李淳風著作郎韋安仁符璽郎李延壽同撰其先撰史人唯令狐德棻重預其事太宗崩後刊勒始成其篇第雖編入隋書其實別行俗呼為五代史志惟大唐之受命也義寧隋恭帝元武德唐高祖元間工部尚書溫大雅首撰創業起居注三篇自是司空房玄齡給事中許敬宗著作佐郎敬播相次立一作相與自立編年體號為實録迄乎三帝世有其書貞觀初姚思廉始撰紀傳粗成三十卷至顯慶高宗改元元年太尉長孫無忌與於志寧令狐德棻著作郎劉胤之楊仁卿起居郎顧胤等因其舊作一作書綴以後事復為五十卷雖雲繁雜時有可觀龍朔亦高宗元中敬宗又以太子少師一作卿誤總統史任更增前作混成百卷如高宗本紀及永徽高宗初元名臣四夷等傳多是其所造又起草十志未半而終敬宗所作紀傳或曲希時旨或猥飾一作釋私憾凡有毀譽多非實録必方諸魏伯起亦猶張衡之蔡巨焉其後左史李仁實續撰於志寧許敬宗李義府等傳載言記事見推直筆惜其短歲一作世功業未終至長壽中武後九年春官侍郎牛鳳及又斷自武德終於弘道高宗未元撰為唐書百有十卷鳳及以暗聾不才而輒議一代大典凡所撰録皆素責私家行狀而世人敘事謂家狀罕能自遠謂遠於俗一作遠非或言皆比興全類詠歌或語多鄙朴實同文案四語皆謂家狀所敘而總入編次了無厘革其有出自胸臆申其機抒發言則嗤鄙怪誕敘事則參差倒錯故閲其篇第豈謂可觀披其章句不識所以既而悉收姚許諸本繳去之也欲使其書獨行由是皇家舊事殘缺殆盡長安中武後十八年餘與正諫大夫朱敬則司劫郎中徐堅左拾遺吳兢奉詔更撰唐書勒成八十卷神龍中宗元元年又與堅一無堅字兢等重修則天實録編為三或作二十卷夫舊史之壞其亂如繩錯綜艱難期月方畢雖言無可擇事多遺恨庶將來削稿猶有憑焉大抵自古史臣撰録其梗概如此蓋屬詞比事以月系年為史氏之根本作生人之耳目者略盡於斯矣自餘偏一訛作編記小說則不暇具而論之卷十二外篇卷十三

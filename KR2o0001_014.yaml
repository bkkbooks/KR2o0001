body:
  text: 稱謂第十四孔子曰唯名不可以假人又曰名不正則言不順必也正名乎是知名之折中君子所急況復列之篇籍傳之不朽者邪昔夫子修春秋吳楚稱王而仍舊曰子此則褒貶之大體為前修之楷式也馬遷撰史記項羽僭盜而紀之曰王此則真偽莫分為後來所惑者也自茲已降訛謬相因名諱所施輕重莫等至如更始中興漢室光武所臣雖事業不成而歷數終在班范二史皆以劉玄為目不其慢乎古者二國爭盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝負有殊大小不類未聞勢窮者即為匹庶為屈者乃成寇賊也至於近古則不然當漢氏云亡天下鼎峙論王道則曹逆而劉順語國祚則魏促而吳長但以地處函夏人傳正朔度長潔短魏實居多二方之於上國亦猶秦繆楚莊與文襄而並霸蜀昭烈帝可比秦繆公吳大帝可比楚莊王逮作者之書事也乃沒吳蜀號諡呼權備姓名謂魚豢孫盛等方於魏邦懸隔頓爾懲惡勸善其義安歸續以金行版蕩戎羯稱制各有國家實同王者晉世臣子黨附君親嫉彼亂華比諸羣盜此皆茍徇私忿忘夫至公自非坦懷愛憎無以定其得失至蕭方等始存諸國名諡僭帝者皆稱之以王此則趙猶人君加以主號杞用夷禮貶同子爵變通其理事在合宜小道可觀見於蕭氏者矣古者天子廟號祖有功而宗有德始自三代迄於兩漢名實相允今古共傳降及曹氏祖名多濫必無愧德其唯武王故陳壽國志獨呼武曰祖至於文明但稱帝而已自晉已還竊號者非一如成穆兩帝劉蕭二明梁簡文兄弟兼言孝元帝也齊武成昆季兼文宣孝昭也斯或承家之僻王或亡國之庸主不諡靈繆為幸已多猶曰祖宗孰云其可而史臣載削曾無辨明每有所書必存廟號何以申勸沮之義杜渝濫之源者乎又位乃人臣迹參王者如周之亶父季歷晉之仲達師昭追尊建名此諸天子可也必若當塗所出宦官攜養帝號徒加人望不愜故國志所録無異匹夫應書其人直云皇之祖考也而已至如元氏起於邊朔其君乃一部之酋之長耳道武追崇所及凡二十八君自開闢已來未之有也而魏書序紀襲其虛號生則謂之帝死則謂之崩何異沐猴而冠腐鼠稱璞者矣夫歷觀自古稱謂不同緣情而作本無定準至若諸侯無諡者戰國已上謂之今王天子見黜者漢魏已後謂之少帝周衰有共和之相楚弒有郟敖之主趙他而曰尉他英布而曰鯨布豪傑則平林新市寇賊則黃巾赤眉園綺友朋共云四皓奮建父子都稱萬石凡此諸名皆出當代史臣編録無復張馳蓋取叶隨時不藉稽古及後來作者頗慕斯流亦時採新名列成篇題若王晉之十士寒俊沈宋之二凶索虜即其事也唯魏收遠不師古近非因俗自我作故無所憲章其撰魏書也乃以平陽王為出帝司馬氏為僭晉桓劉已下通曰島夷夫其諂齊則輕抑關右黨魏則深誣江外愛憎出於方寸與奪由其筆端語必不經名惟駭物昔漢世原涉大修墳墓乃開道立表署曰南陽阡欲以繼迹京兆齊聲曹尹而人莫之肯從但云原氏阡而已故知事非允當難以遵行如收之茍立詭名不依故實雖復刊諸竹帛終罕傳於諷誦也抑又聞之帝王受命歷數相承雖舊君已沒而致敬無改豈可等之凡庶便書之以名者乎近代文章實同兒戲有天子而稱諱者若姬滿劉莊之類是也有匹夫而不名者若步兵彭澤之類是也史論立言理當雅正如班述之敘聖卿也而曰董公惟亮范贊之言季孟也至曰隗王得士習談漢主則謂昭烈為玄德習氏漢晉春秋以蜀為正統其編目敘事皆謂蜀先主為昭烈皇帝至於論中語則呼為玄德裴引魏室則目文帝為曹丕夫以淫亂之臣忽隱其諱正朔之后反呼其名意好奇而輒為文逐韻而便作班固哀紀述曰宛孌董公惟亮天功隗囂公孫述傳贊曰公孫習吏隗王得士用捨之道其例無恆但近代為史通多此失上才猶且若是而況中庸者乎今略舉一隅以存標格云爾卷四內篇卷五

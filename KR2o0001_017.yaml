body:
  text: 補注第十七昔詩書既成而毛孔立傳傳之時義以訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注蓋傳者轉也轉授於無窮注者流也流通而靡絶進此二名其歸一揆如韓戴服鄭鑽仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗既而史傳小書人物雜記若摯虞之三輔決録陳壽之季漢輔臣周處之陽羡風土常璩之華陽士女文言美辭列於章句委曲敍事存於細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力微不能自達庶憑驥尾千里絶羣遂乃掇衆史之異辭補前書之所闕若裴松之三國志陸澄劉昭兩漢書劉彤晉紀劉孝標世說之類是也亦有躬為史臣手自刊補雖志存該博而才闕倫敍除煩則意有所吝畢載則言有所妨遂乃定彼榛楉列為子注若蕭大圜淮海亂離志羊衒之洛陽伽藍記宋孝王關東風俗傳王劭齊志之類是也榷其得失求其利害少期集注國志以廣承祚所遺而喜聚異同不加刊定恣其擊難坐長煩蕪觀其書成表獻自此蜜蜂兼採但甘苦不分難以味同萍實者矣陸澄所注班史多引司馬遷之書若此缺一言彼增半句皆採摘成注標為異說有昏耳目難為披覽竊惟范曄之刪後漢也簡而且周疏而不漏蓋云備矣而劉昭採其所捐以為補注言盡非要事皆不急譬夫人有吐果之核棄藥之滓而愚者乃重加捃拾潔以登薦持此為工多見其無識也孝標善於攻繆博而且精固以察及泉魚辨窮河豕嗟乎以峻之才識足堪遠大而不能探賾彪嶠網羅班馬方復留情於委巷小說鋭思於流俗短書可謂勞而無功費而無當者矣自茲已降其失逾甚若蕭羊之瑣雜王宋之鄙碎言殊揀金事比雞肋異體同病焉可勝言大抵撰史加注者或因人成事或自我作故記録無限規檢不存難以存一家之格言千載之楷則凡諸作者可不詳之至若鄭玄王肅述五經而各異何休馬融論三傳而競爽欲加商榷其流實繁斯則義涉儒家言非史氏今並不書於此焉

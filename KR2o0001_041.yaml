body:
  text: 申左第五古之人言春秋三傳者多矣戰國之世其事罕聞當前漢當有之初二字專用公羊宣皇已降穀梁又立於學至成帝世劉欲始重左氏而竟一作書不列學官太抵自古重兩傳而輕左氏者固非一家美左氏而譏一作議兩傳者亦非一族互相攻擊各用一作自朋黨哤聒舊作籠聒或作聒籠並訛紛競是非莫分然則儒者之學茍以專精為主止舊作至誤於治章句通訓釋斯則可矣一作也至一脫至字於論大體舉宏綱則言罕兼統理無要害故使今古疑一作凝滯莫得而申者焉必揚榷而論之言傳者固當以左氏為首但自古學左氏者一無者字談之又不得其情如賈逵撰左氏長義稱在秦者為劉氏乃漢室所宜推先但取悅當時殊無足採又案桓談新論曰左氏傳於經猶衣之表裏而東觀漢記陳元奏云光武興立左氏而桓談衛宏並共詆一作毀訾故中道而廢班固藝文志云丘明與孔子觀魯史記而作春秋有所貶損事形於傳懼罹時難故隱其書一有為字未世口說流行遂有公羊穀梁鄒氏夾氏諸傳而於固集復有難左氏九條三評等科夫以一家之言一人之說而參差相背前後不同斯又或訛文不足觀也夫解難者以理為本如理有所闕欲令有識心伏不亦難乎今聊次其所一無所字疑列之於後蓋左氏之義有三長而二傳之義有五短案春秋昭一有公字二年韓宣子來聘觀書於太史氏見魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也然當有則字春秋之作始自姬旦成於仲厄丘明之傳所有筆削及發凡例皆得周典原注杜預釋例云公羊穀梁之論春秋皆因事以起問因問以辨義義之者曲以通無他凡例也左丘明則周禮以為木諸稱凡以發例者皆周公之舊制者也傳孔子教故能成不刊之書著將來之法其長一也又案哀三年魯司譯火南宮敬叔命周人出御書句下並收子服景伯命宰人出扎書十字文義方足今脫其時於魯文籍最備丘明既躬為大史博總群書至如檮杌紀年之流鄭書晉志之類凡此諸籍莫不畢睹其傳廣包它國每事皆洋其長二也論語子曰左丘明恥之某亦恥之夫以同聖之才而膺授經之托加以達者七十弟子三千遠自四方同在一國於是上詢夫子下訪其徒凡所採托實廣聞見其長三也如穀梁公羊者生乾異國長肉後來語地則與魯産舊誤作史相違論時則與宣尼不接安得以傳聞之說與親見者爭先者一兄者字乎譬猶近世漢之太史晉之著作撰成國典時號正書舊誤作言既而先賢耆舊原注謂楚國先賢傳汝南先賢行狀益部耆舊傳襄陽耆舊傳等書語林世說竟造異端強書它事夫以傳自委巷而將冊府恐當用此二字舊作班馬無涉抗衡訪諸古老而與同時此二字舊作子孫更謬此皆版本模糊後人妄填之過並列斯則難矣波二傳之方左氏亦奚異於此哉其短一也左氏述臧哀伯諫桓納鼎周內史美其讜言王子朝告於諸侯閡馬父嘉其此二字疑是加之二字之訛辨說凡如此類其數實多斯蓋當時發言形於翰墨立名不朽播於他邦而丘明仍其本語就加編次亦猶近代史記載樂毅李斯之文漢書録一脫録字朝錯賈生之筆尋其實也豈是子長稿一作筆削盂堅雌黃所構者哉觀二傳所載有異於此其録人言也語乃齟齬一作齷齪文皆瑣碎夫如是者何哉蓋波礙史官之簡書此傳流俗之口說故使隆促各異豐儉不同其短二也尋左氏載諸大夫詞令行人應答其文典而美其語博而奧原注如僖伯諫君觀魚富辰諫王納狄王孫勞泛而論九鼎季禮觀樂而談國風算所援引皆據禮經之類是也述遠古則委曲如存原注如郟子聘魯言少昊以鳥名官季孫行父稱舜舉八元八凱魏絳答晉悼公引虞人之針子革諷楚靈王誦祈招之詩其事明白非是厚誣之類是也徵近代則循環可覆原注如呂相絶秦述兩國世隙聲子班荊稱楚材晉用普士渥濁諫殺茍林父說文公敗楚於城濮有憂色子服景伯謂吳雲楚圍未易子而食析骸而麇猶無域下之盟祝他稱踐土盟晉重耳魯申蔡甲午之尖是也必料其功用厚薄指意一作措思深淺諒非經營草創出自一時琢磨潤色獨成一手斯蓋當時國史已有成文丘明但編而次之配經稱傳而行舊作已也如二傳者記言載事失彼菁華尋源討本取諸胸臆夫自我作故無所準繩故理甚迂僻言多鄙野比諸左氏不可同年其短三也案二傳雖以釋經為主其缺漏不可彈論如經云楚子麋卒此四字舊止一字又誤作薨而左傳云公子圍所殺昭元及公谷止作公羊非作傳重一作不非述經文無所發明依違而已其短四也漢書載成方遂詐稱戾太子至於闕下雋不疑曰昔衛蒯瞆得罪於先君將入國太子輒拒而不納與漢書句稍異春秋是之遂命執以屬吏霍光由是始重儒學案雋生所引乃公羊正文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國泉猿為曹禮法不容名教同嫉而公羊釋義反以衛輒為賢是違夫子之教失聖人之旨獎進惡徒疑誤後學其短五也若以彼三長校茲五短勝負之理此下有闕文當補曰斷然可知必執二傳之文唯取依經此上皆闕文今補為主而於內則為國隱惡於外則承赴而書求其本事大半失實已於疑當作惑經篇載之詳矣尋斯義之作也蓋是周禮之故事魯國之遺文夫子因而修之亦存舊制而已至於實録付之丘明用使善惡畢一作必彰真僞盡露向使孔經獨用左傳不作則當代行事安得而詳者哉蓋語曰仲尼修春秋逆臣賦子懼又曰春秋之義也欲蓋而彰求名而亡善人勸焉淫人懼焉尋原本此下有春秋所書實乖此義而九字肆筆拂經且自害志削之乃無語病左傳所録無愧斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉原注杜預釋例曰凡諸候無加民之惡而稱人以貶皆時之赴告欲重其罪以加民為辭國史承以書於策而簡牘之記具存夫子因示虛實故左傳隨實而著本狀以明其得失也案杜氏此釋實得經傳之情者也儒者茍譏左氏作傳多敘經外別事如楚鄭與齊三國之賊弒一脫弒字隱桓昭哀通經後之傳為言然哀字終屬假借或誤作襄益非四君之篡逐其外則承告如彼其內則隱諱如此若無左氏立傳其事無由獲知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者兀一作代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當晉景行霸公室方強而云屠岸舊誤作韓氏攻趙有程嬰杵臼之事原注出史記趙世家魯侯御宋得俊乘丘而云莊公敗績有馬驚流矢之禍楚晉相遇唯在邲役而雲二國交戰置師於兩棠一訛堂原注出賈誼新書子罕相國宋睦於晉而云晉將伐宋覘舊衍其字哭於陽門舊衍介夫乃止四字原注出禮記魯師滅項晉止值公而云項實舊衍齊字桓舊衍所字滅春秋為賢者諱原注出公羊傳襄年再盟君臣和葉而云諸侯失政傳作正大夫皆執國權原注出穀梁傳其記時也蓋秦繆居春秋之始而云其女為荊平舊作昭誤夫人原注出烈女傳韓魏處戰國之時而云其君陪楚莊舊衍王字葬馬原注出史記滑稽傳列子書論尼父而雲生在鄭穆公之一無之字下同年原注出劉向七略扁鵲醫療魏公而雲時當趙簡子之日原注出史記扁鵲傳架書仕於周子而云以晉文如獵犯顏直言原注出劉向新序荀息死於奚齊而雲觀晉靈作臺纍棋申誡原注出劉向說苑或以先為後或以後為先日月顛倒上下翻覆此四句只口括記時之淆訛可悟上片之缺古來君子曾無所疑及左傳既行而其失自顯語其弘益不亦多乎而世之學者猶未之悟所謂忘我大德日用而不知者焉然自丘明之後迄於一作及魏滅年將千祀其書寢廢至晉太康年中汲冢獲書全同左氏原注汲冢所得書尋亦亡逸今惟紀年瑣語師春在焉案紀年瑣語載春秋時事多與左氏同師春多載春秋時互者繇辭將左氏相校遂無一字差舛故束皙云若使此書出於漢世劉歆不作五原太守矣於是摯虞柬皙引其義以相明王接荀顗疑當作勖取其文以相證杜預申以注釋原注注謂注解釋謂釋例千寶藉為師範一訛作晉紀原注事具干寶晉紀敘例中由是世稱實録不復言非其書漸行物無異議故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曾子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其傳旨有或作所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋史記文在十二諸侯年表但與集中史公不見左傳之說不相照顧夫學者茍能徵此二說以考三傳亦足以定是非明真僞者矣何必觀汲冢而後信者乎從一作以此而言則三傳之優劣見矣卷十四外篇卷十五

body:
  text: 題目第十一上古之書有三墳五典八索九丘其次有春秋尚書檮杌志乘自漢已下其流漸繁大抵史名多以書記紀略為主後生祖述各從所好沿革相因循環遞習蓋區域有限莫逾於此焉至孫盛有魏氏春秋孔衍有漢魏尚書陳壽王劭曰志何之元劉璠曰典此又好奇厭俗習舊捐新雖得稽古之宜未達從時之義榷而論之其編年月者謂之紀列紀傳者謂之書取順於時斯為最也夫名以定體為實之賓茍失其途有乖至理案呂陸二氏各著一書唯次篇章不繫時月此乃子書雜記而皆號曰春秋魚豢姚察著魏梁二史巨細畢載蕪纍甚多而俱榜之以略考名責實奚其爽歟若乃史傳雜篇區分類聚隨事立號諒無恆規如馬遷撰皇后傳而以外戚命章案外戚憑皇后以得名猶宗室因天子而顯稱若編皇后而曰外戚傳則書天子而曰宗室紀可乎班固撰人表以古今為目尋其所載也皆自秦而往非漢之事古誠有之今則安在子長史記別創八書孟堅既以漢為書不可更標書號改書為志義在互文而何氏中興易志為記此則貴於革舊未見其能取新夫戰爭方殷雄雌未決則有不奉正朔自相君長必國史為傳宜別立科條至如陳項諸雄寄編漢籍董袁羣賊附列魏志既同臣子之例孰辨彼此之殊唯東觀以平林下江諸人列為載記顧後來作者莫之遵效逮新晉始以十六國主持載記表名可謂擇善而行巧於師古者矣觀夫舊史列傳題卷靡恆文少者則具出姓名若司馬相如東方朔是也字煩者唯書姓氏若毋將蓋衛諸葛傳是也必人多而姓同者則結定其數若二袁四張二公孫傳是也如此標格足為詳審至范曄舉例始全録姓名歷短行於卷中叢細字於標外其子孫附出者注於祖先之下乃類俗之文案孔目藥草經方煩碎之至孰過於此竊以周易六爻義存象內春秋萬國事具傳中讀者研尋篇中自曉何必開帙解帶便令昭然滿目也自茲已降多師蔚宗魏收因之則又甚矣其有魏世鄰國編於魏史者於其人姓名之上又列之以邦域申之以職官至如江東帝主則云僭晉司馬睿島夷劉裕河西酋長則云私署涼州牧張實私署涼王李皓此皆篇中所具又於卷首具列必如收意使其撰兩漢書三國志題諸盜賊傳亦當云僭西楚霸王項羽偽寧朔王隗囂自餘陳涉張步劉璋袁術其位號皆一二具言無所不盡者也蓋法令滋章古人所慎若范魏之裁篇目可謂滋章之甚者乎茍忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣

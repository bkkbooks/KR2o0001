body:
  text: 二體第二三五之代書有典墳悠哉邈矣不可得詳自唐虞以下迄於周是為古文尚書然世猶淳質文從簡略求諸備體固以闕如既而丘明傳春秋子長著史記載筆之體於斯備矣後來繼作相與因循假有改張變其名目區城有限孰能踰此蓋荀悅張璠丘明之黨也班固華嶠子長之流也惟此二家各相矜尚必辨其利害可得而言之夫春秋者繫日月而為次列時歲以相續中國外夷同年共世莫不備載其事形於目前理盡一言語無重出此其所以為長也至於賢士貞女高才俊德事當衝要者必盱衡而備言迹在沈冥者不枉道而詳說如絳縣之老杞梁之妻或以酬晉卿而獲記或以對齊君而見録其有賢如柳惠仁若顏回終不得彰其名氏顯其言行故論其細也則纖芥無遺語其粗也則丘山是棄此其所以為短也史記者紀以包舉大端傳以委曲細事表以譜列年爵志以總括遺漏逮於天文地理國典朝章顯隱必該洪纖靡失此其所以為長也若乃同為一事分在數篇斷續相離前後屢出於高紀則云語在項傳於項傳則云事具高紀又編次同類不求年月後生而擢居首帙先輩而抑歸末章遂使漢之賈誼將楚屈原同列魯之曹沫與燕荊軻並編此其所以為短也考茲勝負互有得失而晉世干寶著書乃盛譽丘明而深抑子長其義云能以三十卷之約括囊二百四十年之事靡有遺也尋其此說可謂徑挺之詞乎案春秋時事入於左氏所書者蓋三分得其一耳丘明自知其略也故為國語以廣之然國語之外尚多亡逸安得言其括囊靡遺者哉向使丘明世為史官皆仿左傳也至於前漢之嚴君平鄭子真後漢之郭林宗黃叔度朝錯董生之對策劉向谷永之上書斯並德冠人倫名馳海內識洞幽顯言窮軍國或以身隱位卑不預朝政或以文煩事博難為次序皆略而不書斯則可也必情有所吝不加刊削則漢氏之志傳百卷併列於十二紀中將恐碎瑣多蕪闌單失力者矣故班固知其若此設紀傳以區分使其歷然可觀綱紀有別荀悅厭其迂闊又依左氏成書翦裁班史篇才三十歷代褒之有逾本傳然則班荀二體角力爭先欲廢其一固亦難矣後來作者不出二途故晉史有王虞而副以干紀宋書有徐沈而分為裴略各有其美並行於世異夫令升之言唯守一家而已

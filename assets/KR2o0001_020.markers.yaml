  - {type: variant, offset: 11, length: 0, content: '', krp: 復其禄位此乃類夢中行事豈人倫為者哉又史記田敬仲世家曰田常成子以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以諡此之不實明然可知又按左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎史記家令說太上皇曰髙祖雖子人主也諸如此說其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語簒成歌詞欲加刋正無可釐革故獨舉其失以為標冠云又史記仲尼弟子列傳曰孔子既殁有若狀似孔子弟子相與共立為師事之如夫子他日弟子進問曰昔夫子甞行使弟子持雨具已而果雨商瞿長無子欲更取室孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知之有若嘿然無應弟子起曰有若避此非子之坐也難曰孔門弟子七十二人柴愚參魯宰我言語師商可方回賜非類此並聖人品藻優劣已詳門徒商搉臧否又定如有若者名不隷於四科譽無偕於十哲逮尼父既殁方取為師以不答所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使喪明致罰投杖謝愆何肯公然自欺詐相承奉此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷裁史仍習其言得自委巷曾無先覺悲夫又史記漢書皆曰上自雒陽南宮從複道望見諸將徃徃相與坐沙中語上曰此何語留侯曰陛下所封皆故人新愛所誅皆平生讎怨此属畏誅故相聚謀反爾上乃憂曰為之奈何留侯曰上平生所憎誰最甚者上曰雍齒留侯曰今先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣於是上置酒封雍齒為侯難曰夫公家之事知無不為見無禮於君如鷹鸇之逐鳥雀按子房少也傾家結客為韓報仇此則忠義素彰名節甚著其事漢也何為属羣小聚謀將犯其君遂嘿然杜口俟問方對倘若髙祖不問竟欲無言者邪且將而必誅罪在不測如諸將屯聚圖為禍亂密言臺上猶懼覺知羣議沙中何無避忌為國之道必不如斯然則張良慮反側不安雍齒以嫌疑受爵盖當時實有其事也如複道之望坐沙而語是說者敷演妄益其端耳又東觀漢記曰赤眉降後積甲與熊耳山齊云云難曰按盆子既亡棄甲誠衆必與山比峻則未之有也昔大誓云前徒倒戈血流漂杵孔安國曰盖言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟又東觀漢記曰郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至郭外問使者何日當還伋使别駕計日告之既還先期一日伋為違信止於野亭須期乃入難曰盖此事不可信者三焉按漢時方伯儀比諸侯其行也前驅蔽野後乘塞路鼓吹沸喧旌棨填咽彼草萊稚子齠齓童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌襜帷首觸威嚴自陳襟抱其不可信一也又方伯按部舉州振肅至於墨綬長吏黄綬羣官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩息有所如棄而不就居止無常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄它方盖亦事同大夏訪諸商賈不可多得況在童孺彌復難求羣戲而乘如何克辦其不可信三也凡說此事總有三科搉而論之了無一實異哉又魏志注語林曰匈奴遣使人來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云難曰昔孟陽卧床詐稱齊后紀信乘纛矯號漢主或王遘屯䝉或朝罹兵革故權以取濟事非獲已如崔琰本無此急何得以臣代君者哉且凡稱人君皆慎其舉措況魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉瞩也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛結以親姻猶虺毒不悛狼心易擾如輒殺其使者不顯罪名復何以懐四夷於外蕃建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜兹謗口而言同綸綍聲遍寰區欲盖而彰止益其}

  - {type: variant, offset: 708, length: 0, content: '', SBCK: 廣川貸夫待必以多為證則足可無疑然人自有身安弊緼口甘麄糲而多藏鏹帛無所散用者故公孫􅀪位至三公而卧布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此}
  - {type: page-break, offset: 708, content: '', id: KR2o0001_SBCK_020-9a}
  - {type: variant, offset: 708, length: 0, content: '', krp: 廣川貸夫待必以多為證則足可無疑然人自有身安弊緼口甘麄糲而多藏鏹帛無所散用者故公孫弘位至三公而卧布被食脫粟飯汲黯所謂齊人多詐者是也安知胡威之徒其儉亦皆如此}
  - {type: variant, offset: 711, length: 0, content: '', SBCK: 不詳厥理直謂清白繆矣哉又新晉書阮籍傳曰籍至孝母終正與人圍碁對者求止籍留與決既而飲酒二斗舉聲一號吐血數升及葬食一蒸㹠飲酒二斗然後臨穴直言窮矣舉聲一號因復吐血數升毁瘠骨立殆致滅性難曰夫人才雖下愚識雖不肖始亡天属必致其哀但以苴絰未㡬悲荒遽輙如謂本無戚容則未之有也況嗣宗當聖善將殁閔凶􅀁鍾合門惶恐舉族悲咤居里巷者猶停舂杵之音在鄰伍者尚申匍匐之救而為其子者方對局求決舉杯酣暢但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之喪親也朝夕孺慕塩酪不甞斯可至於癯瘠矣如甘㫖在念則觔肉内寛醉飽自得則肌膚外博況乎溺情㹠酒不改平素雖復時一嘔慟豈能柴毁骨立乎葢彼阮生者不}
  - {type: page-break, offset: 711, content: '', id: KR2o0001_SBCK_020-9b}
  - {type: page-break, offset: 711, content: '', id: KR2o0001_SBCK_020-10a}

  - {type: punctuation, offset: 713, content: ，, id: KR2o0001_tls_020-bkkpn182}
  - {type: 'tls:seg', offset: 713, content: '', id: KR2o0001_tls_020-5a.10}
  - {type: variant, offset: 714, length: 0, content: '', SBCK: 禮如彼人以其志操尤異才識甚髙而談者遂言其至性如此惟毁及譽皆無取焉又新晉書王祥傳曰祥漢末遭亂扶母携弟覽避地廬江隠居三十餘年不應州郡之命母終徐州刺史呂䖍檄為别駕年垂耳順覽勸之乃應召于時冦賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實賴王祥年八十五太始五年薨難曰祥為徐州别駕冦盜充斥固是漢建安中徐州未清時事耳有魏受命凡三十五年上去徐州冦賊充斥下至晉太始五年當六十年已上矣祥於建安中年垂耳順更加六十六載至晉太始五年薨則當年一百二十嵗矣而史云年八十五薨者何也如必以終時實年八十五則為徐州别駕止可二十五六年矣又云其未從官已前隠居三十餘載者但其初被檄時止年二十五六自此而往安得復有三十餘年乎必謂祥為别駕在建安後則徐州清晏何得云于時冦賊充斥祥率勵兵士頻討破之乎求其前後無一符㑹也凡}
  - {type: page-break, offset: 714, content: '', id: KR2o0001_SBCK_020-10b}

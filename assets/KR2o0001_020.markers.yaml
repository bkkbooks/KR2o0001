  - {type: variant, offset: 1144, length: 146, content: 以效古而書其難類者則忽而不取料其所棄可勝紀哉蓋江羋罵商臣曰呼役夫宜君王廢汝而立職漢王怒酈生曰豎儒幾敗乃公事單固謂楊康曰老奴汝死自其分樂廣歎衞玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之說必播以唇吻傳諸諷誦而世人皆以爲上之二言不失清雅而下之兩句殊爲魯朴者何哉蓋楚漢世隔事已成古魏晉年近言猶類今已, SBCK: 三也}

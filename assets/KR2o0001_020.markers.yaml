  - {type: xml-element, offset: 1450, content: '', id: KR2o0001_tls_020-bkkxmlele22}
  - {type: variant, offset: 1450, length: 0, content: '', SBCK: 抑明公足下獨不聞劉炫蜀王之說乎昔劉􅋑仕隋為蜀王侍讀尚書牛􅀪甞問之曰君王遇子其禮如何曰相期髙於周孔見待下於奴僕􅀪不悟其言請聞其義􅋑曰吾王每有所疑必先見訪是相期髙於周孔酒食左右皆饜而我餘􅄋不霑是見待下於奴僕也僕亦竊不自揆輒敢方於鄙宗何者求史才則千里降追語宦途則十年不進意者得非相期髙於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隠非仕惟以守愚自得寧以充詘攖心但今者黽勉從事攣拘就役朝廷厚用其才竟不薄加其禮求諸隗始其義安施儻使士有澹雅若嚴君平清亷如段干木與僕易地而處亦將彈鋏告勞積薪為恨況僕未能免俗能不蔕芥於心者乎當今朝號得人國稱多士蓬山之下良直差肩芸閤之中英竒接武僕既功虧刻鵠筆未獲麟徒殫太官之膳虚索長安之米乞已本職還其舊居多謝簡書請避賢路唯明公足下哀而許之至忠得書大慙無以酬答又惜其才不許解史任而宗楚客崔湜鄭愔等皆惡聞其短共讎嫉之俄而蕭宗等相次伏誅然後獲免於難史通第二十卷終}

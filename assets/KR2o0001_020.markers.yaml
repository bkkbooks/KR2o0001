  - {type: variant, offset: 179, length: 120, content: 史記載蘇秦合從張儀連橫范雎反間以相秦魯連解紛而全趙是也逮漢魏以降周隋而往世皆尚文時無專對運籌畫策自具於章表獻可替否總歸於筆札宰我子貢之道不行蘇秦張儀之業遂廢矣假有忠言切諫答戲解嘲其可稱者若朱雲折檻以抗憤張綱埋輪而獻直秦宓之酬吳客王融之答虜使, SBCK: 黔敖茍居}

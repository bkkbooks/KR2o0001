  - {type: variant, offset: 1133, length: 0, content: '', SBCK: 始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺況㒒限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者盖由杜彼顔面防諸請謁故也然}

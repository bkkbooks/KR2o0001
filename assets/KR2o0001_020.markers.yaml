  - {type: variant, offset: 5, length: 3, content: 蓋樞機, SBCK: 外篇暗惑忤時暗惑第十二十四條夫人識有不燭神有不明則真偽莫分邪正靡别昔人有以髮繞灸誤其國君者有置毒於胙誣其太子者矣夫髮經炙炭必致焚灼毒味經時無復殺害而行}
  - {type: variant, offset: 5, length: 3, content: 蓋樞機, krp: 外篇暗惑忤時暗惑第十二十四條夫人識有不燭神有不明則真偽莫分邪正靡别昔人有以髮繞灸誤其國君者有置毒於胙誣其太子者矣夫髮經炙炭必致焚灼毒味經時無復殺害而行}
  - {type: variant, offset: 9, length: 1, content: 發, SBCK: 者偽成其事受之者信以為然故使見咎一時取怨千載夫史傳叙事亦多如此其有道理難憑欺誣可見如古來學者莫覺其非葢徃往有焉今聊舉一二加以駁難列之如左史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為巳死象乃止舜宮難曰夫杳㝠不測變化無恒兵革所不能傷網羅所不能制若左慈易質為羊劉根竄形入壁是也時無可移禍所必至雖大聖所不能免若姬伯拘於羑里孔父阨於陳蔡是也然俗之愚者皆謂彼幻化是為聖人豈知聖人智周萬物才兼百行若斯而已與夫方内之士有何異哉如史記云重華入於井中匿空出去此則其意以舜是左慈劉根之類非姬伯孔父之徒苟識事如斯難以語夫聖道矣且按太史公云黄帝堯舜軼事時時見於他說余擇其言尤雅者著為本紀書首若如向之所述豈可謂雅邪又史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟為夀王大驚以為孫叔敖復生欲以為相難曰盖語有之人心不同有如其面故窳隆異等修短殊姿皆稟之自然得諸造化非由倣傚俾有遷革如優孟之象孫叔敖也衣冠談說容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪昔陳焦既亡累年而活秦諜從縊六日而蘇遂使竹帛顯書今古稱恠況叔敖之殁時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以豈有片言不接一見無疑遽欲加以寵}

  - {type: punctuation, offset: 123, content: ，, id: KR2o0001_tls_003-bkkpn42}
  - {type: 'tls:seg', offset: 123, content: '', id: KR2o0001_tls_003-3a.2}
  - {type: variant, offset: 125, length: 0, content: '', SBCK: 長贒扵班馬逺矣文志已上天伏羲已降文籍始備逮扵戰國其書五車傳之無窮是曰不朽夫古之􅀁制我有何力而班漢定其流别編爲藝文志論其妄載事等上篇天謂志文續漢已還祖述不暇夫前志已錄而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎且漢書之志天文藝文也盖􅁒廣列篇名示存書體而已文字旣少披閱易周故雖乖節文而未甚穢累旣而後來􅁇述其流日廣天文則星占月㑹渾圗周髀之流藝文則四部七錄中經秘閣之輩莫不各踰三箧自成一家史臣􅀁書冝其輙簡而近世有著隋書者乃廣}
  - {type: page-break, offset: 125, content: '', id: KR2o0001_SBCK_003-5b}
  - {type: variant, offset: 125, length: 0, content: '', WYG: 記録多合事宜寸有所長賢於班馬逺矣已上天文志伏羲已降文籍始備逮於戰國其書五車傳之無窮是曰不朽夫古之所制我有何力而班漢定其流别編為藝文志論其妄載事等上篇謂天文志續漢已還祖述不暇夫前志已録而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎且漢書之志天文藝文也盖欲廣列篇名示存書體而已文字旣少披閱易周故雖乖節文而未甚穢累旣而後來繼述其流日廣天文則星占月㑹渾圖周髀之流藝文則四部七録中經秘閣之輩莫不各踰三箧自成一家史臣所書宜其輟簡而近世有著隋書者乃廣}

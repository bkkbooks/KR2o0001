  - {type: variant, offset: 117, length: 1, content: 於, SBCK: 世家表在乎其間緘而不視語其無用可勝道㦲旣而班東二史􅀚漢史東謂東各相祖述迷而不悞無異逐狂必曲為銓擇强加引進則列國年表􅂉可存焉何者當春秋戰國之時天下無主群雄錯峙各自年世若申之扵表以統其時則諸國分年一時盡見如兩漢御暦四海成家公卿旣為臣子王侯才比郡縣何用表其年􅂾以别扵天子者㦲又有甚扵斯者異㦲班氏之人表也區别九品網羅千載論世則異時語姓則他族自可方以􅀋聚物以群分使善惡相從先後為次何籍而為表乎且其書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢蔦施松上附生疣贅不知剪截何斷而為限至法盛書載中興攺表為注名目雖巧蕪累亦多當晋氏播遷南據楊越魏宗勃起北雄燕代其間諸偽十有六家不附正朔自相君臣崔鴻著表頗有甄明比扵}
  - {type: page-break, offset: 117, content: '', id: KR2o0001_SBCK_003-2a}
  - {type: page-break, offset: 117, content: '', id: KR2o0001_SBCK_003-2b}

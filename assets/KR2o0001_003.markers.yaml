  - {type: variant, offset: 237, length: 0, content: '', WYG: 除此篇必不能去當變其體近者宋孝王闗東風俗傳亦有墳籍志其所録皆鄴下文儒之士讐校之司所列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄菅蒯}
  - {type: page-break, offset: 237, content: '', id: KR2o0001_WYG_003-6a, image: WYG0685/WYG0685-0021c.png}
  - {type: variant, offset: 238, length: 0, content: '', WYG: 宋王得之矣已上藝文志夫灾祥之作以}
  - {type: variant, offset: 239, length: 0, content: '', WYG: 吉凶此理昭昭不易誣也然則麒麟鬬而日月食鯨鯢死而彗星出河變應於千年山崩由於朽壌又語曰太嵗在丑乞漿得酒太嵗在已販妻鬻子則知吉凶逓代如盈縮循環此乃闗諸天道不復繋乎人事且周王决疑龜焦蓍折宋皇誓衆竿壊幡亡梟止梁師之營鵩集賈生之舎斯皆妖灾著象而福禄來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故諸侯相赴有異不為灾見於春秋其事非一洎漢興儒者乃考洪範以釋隂陽其事也如江璧傳於鄭谷逺應始皇卧桞植於上林近符宣帝門樞白髪元后之祥柱樹黄雀新都之䜟舉夫一二良有可稱至於蜚蜮蝝螽震食崩坼隕雨霜雹大水無氷其所證明實皆迂闊故當春秋之世其在於魯也如有旱雩舛候螟螣傷苗之屬是時或秦人歸禭或毛伯錫命或滕邾入朝或晉楚來聘皆持此恒事應彼咎徴旻穹垂謫厥罰安在探􅄨索隠其可略諸且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇號為繁富作者猶廣之以拾遺加之以語録况彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解卷纔三十則知其言所略盖亦多矣而漢代儒者羅災𤯝於二百年外討符㑹於三十卷中安知事有不應於人應人而失其事何得茍有變而必知其兆者哉若乃採前文而改易其説謂王札子之作亂在彼成年春秋成公元年二月無氷董仲舒以為其時王札子殺召伯毛伯案今春秋經札子殺召毛事在宣十五年非成公時夏徴舒之構逆當夫昭代春秋昭公九年陳災董仲舒以為楚莊王為陳討夏徵舒因滅陳陳之臣子毒恨故致火災按楚莊王之滅陳在宣十一年如昭九年所滅者乃楚靈王時是莊王卒恭王立恭王卒康王立康王卒夾敖立夾敖卒靈王立相去凡五世在五行}

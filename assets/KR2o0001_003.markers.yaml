  - {type: variant, offset: 210, length: 16, content: 臣於紀傳統遺逸於表志雖篇名甚廣而, SBCK: 易許田劉歆以爲桓公三年日有食之董仲舒劉向爲後楚嚴稱王兼地千里也晋曲沃莊伯殺晋侯京房以向歆之解父子不同即中國也劉歆以爲晝象夷狄劉向又以爲嚴公七年夜中星隕如雨劉向以爲夜中者暑蜮􅀁生非自越来也蜮生南越劉歆以為盛遂乃雙載其文兩存要理}

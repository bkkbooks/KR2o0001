  - {type: variant, offset: 465, length: 0, content: '', WYG: 鑒之哉談何容易駟不及舌無為强著一言受嗤千載也已上五行志或以為天文藝文雖非漢書所宜取而有廣聞見難為删削也對曰茍事非其限而越理來書自可觸類而長于何不録又有要於此者今可得而言焉夫圓首方足含靈受氣吉凶形於相貌貴賤彰於骨法生人之所欲知也四支六府痾瘵所纒茍詳其孔穴則砭灼無悞此養生之尤急且身名並列親疎自明豈可近昧形骸而逺求辰象旣天文有志何不為人形志乎茫茫九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣被且事當炎運尤相闗涉爾雅釋物非無徃例旣藝文有志何不為方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七略因人成事其目遂多至若許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨捨諸深所未曉厯觀衆史諸志列名或前略而後詳或古無而今有雖逓補所闕各自以為工搉而論之皆未得其最盖可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬户兆庶仰其威神虎踞龍蹯帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宫闕制度朝廷軌儀前王所為後王取則故齊府肇建誦魏都以立宫代國初遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晉宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏逺名號非一凡為國史者宜各撰都邑志列於輿服之上金石草木縞紵絲枲之流鳥獸蟲魚齒革羽毛之類或百蠻攸税或萬國是供夏書則編於禹貢周書則託於王㑹亦有圖形九牧之鼎列狀四荒之經觀之者擅其博聞學之者騁其多識自漢氏拓境無國不賔則有卭竹傳節䈮醬流味大宛輸其善馬蜀本作獻宋本作輸條攴致其巨雀爰及魏晉迄于周隋咸亦遐邇來王任土作貢異物歸於計吏竒名顯於職方凡為國史者宜各撰方物志列於食貨之首帝王苗裔公侯子孫餘慶所鍾百世無絶能言吾祖郯子見師於孔公不識其先籍談取誚於姬后故周撰世本式辨諸宗楚置三閭實掌王族逮乎晚葉譜學尤煩用之於官可以品藻士庶施之於國可以甄别華夷自劉曹受命雍豫為宅世胄相承子孫蕃衍及永嘉東渡流寓揚越代氏南遷革夷從夏於是中朝江右南北混淆華壌邉民虜漢相雜隋有天下文軌大同江外山東人物殷湊其間髙門素族蜀本作貴宋本作素非復一家郡正州都世掌其任凡為國史者宜各撰氏族志列於百官之下盖自都邑已降氏族而徃實為志者所宜先而諸史竟無其録如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曽何足云惟此數條粗加商略得失}

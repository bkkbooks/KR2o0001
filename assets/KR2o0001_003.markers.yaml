  - {type: variant, offset: 120, length: 0, content: '', SBCK: 群篇其要為切者矣若諸子小􅀃編年雜記如􅅊昭洞紀陶弘景帝王歷皆因表而作用成其書旣非國史之流故存而不述書志第八五行志典序雜志天文志藝文志夫刑法禮樂風土山川求諸文籍出扵三禮及班馬著史别裁書志考其􅀁記多効禮經且記傳之外有􅀁不盡隻事片文扵斯備錄語其通博信作者之淵海也原夫司馬遷曰書班固曰志東􅀚曰記華嶠曰典張勃曰錄何法盛曰說名目雖異體綂不殊亦猶楚謂檮杌晋謂之乗魯謂之春秋其義一也扵其編次}

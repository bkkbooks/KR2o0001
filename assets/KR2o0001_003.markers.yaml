  - {type: variant, offset: 121, length: 0, content: '', krp: 有前曰平准後云食貨古號河渠今稱溝洫折郊祀爲宗廟分禮樂爲威儀懸象出扵天文郡國生扵地理如斯變革}
  - {type: variant, offset: 122, length: 2, content: 然凡, SBCK: 可勝計􅂉名非而物是􅂉小異而大同但作者愛竒耻扵仍舊必尋源討本其歸一揆也若乃五行藝文班􅀘子長之闕百官輿服謝拾孟堅之遺王􅀮後来加以瑞異魏􅀵晚進弘以釋老斯則自我作古出乎胸臆求諸歴代不過一二者焉大抵志之為篇其流十五六家而已其間則有妄入編次虗張部帙而積習已乆不悟其非亦有事應可書冝别摽題而古來作者曾未覺察今畧陳其義列扵下云上已緫論書志夫兩曜百星麗扵玄􅨆非如九州萬國廢置無􅁪故海田可變而景緯無易古之天猶今之天也今之天即古之天也必􅁒刋之國史施扵何代不可也但史記包括􅀁及區域綿長故書有天官讀者竟􅁯其誤㩁而為論未見其宜班固因循復以天文作志志無漢事而􅀠入漢書尋篇考限覩其乖越者矣降及有晉迄于隋氏􅂉地止一隅􅂉年才二世而彼蒼列志其篇倍多流宕􅁯歸不知紀極方扵漢史又孟堅之罪人也切以國史􅀁書冝述當時之事必為志而論天􅨆也但載其時彗孛氛祲薄食晦明禆竈梓愼之􅀁占京房李郃之􅀁􅀱至扵熒惑退舎宋公延齡中台告拆晉相速禍星集頴川而賢人聚月犯少微而處士亾如斯之􅀋志之可也若乃體分濛澒色著青蒼丹曦素魄之躔次黃道紫宫之分野旣不預扵人事􅂺編之扵策書故曰刋之國史施扵何代不可也其間唯有􅀽山松沈約蕭子顯魏􅀵等􅂾家頗覺其非不遵舊例凢􅀁記錄多合事冝寸有}
  - {type: page-break, offset: 122, content: '', id: KR2o0001_SBCK_003-4a}

  - {type: variant, offset: 205, length: 0, content: '', SBCK: 詳求厥義未見其可愚謂凢撰志者宜除此篇必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其􅀁錄皆鄴下文儒之士讎校之司􅀁列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄管蒯扵宋生得之矣文志已上藝夫灾祥之作以表吉凶此理昭昭不易誣也然則麒麟闘而日月蝕鯨鯢􅂮而彗星出河變應扵千年山崩由扵朽壊又語曰太歳在丑乞漿得酒太歳在已販妻鬻子則知吉㐫逓代如盈縮循環此乃關諸天道不復繋乎人事且周王决疑􅀛焦蓍折宋皇誓衆竿壊幡亡梟止梁師之營鵩集賈生之舎斯皆妖灾著象而福祿来鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其羙惡也故證候相軋有異不為灾見扵春秋其事非一洎漢興儒者乃考洪範以釋隂陽其事也如江璧傳扵鄭客逺應始皇卧桞植扵上林近符宣帝門樞白髮元后之祥柱􅀣黄雀新都之䜟舉夫一二良有可稱至扵蜚蜮蝝螽震食崩拆隕雨霜雹大水無氷其􅀁證明實皆迂闊故當春秋之世其在扵魯也如有旱雩舛􅀱螟􅭈傷苗之属是時或秦人歸禭􅂉毛伯賜命􅂉滕邾入朝􅂉晉楚來聘皆持此􅁪事應彼咎徴旻穹垂謪厥罰安在探􅄨索隱其可略諸且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇􅃅為繁富作者猶廣之以拾遺加之以語錄况彼春秋之􅀁記也二百四十年行事夷夏之國盡書而經傳集解卷才三十則知其􅀁略蓋亦多矣而漢代儒者羅災􅌌扵二百年外討符㑹扵三十卷中安知事有不應扵人應人而失其事何得苟有脫變而必知其地者㦲若乃採前文而攺易其說謂王札子之作亂在彼成年成元春秋毛伯}

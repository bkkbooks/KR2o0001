  - {type: variant, offset: 465, length: 0, content: '', SBCK: 鑒之㦲談何容易駟不及舌無為强著一言受􅅓千載也行志已上五或以為天文藝文雖非漢書􅀁宜取而可廣聞見難為刪削也對曰苟事非其限而越理來書自可觸􅀋而長于何不錄又有要扵此者今可得而言焉夫圓首方足含靈受氣吉㐫形扵相貌貴賤彰扵骨法生人之􅀁􅁒知也四攴六府痾瘵􅀁纏苟詳其孔穴則砭灼無悞此養生之尤急且身名並列親踈自明豈可近昧形骸而遠求辰象旣天文有志何不為人形志乎􅃼􅃼九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣􅀍且事當災運尤相􅀜涉尔雅釋物非無徃例旣藝文有志何不為方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七畧因人成事其目遂多至若許􅀒相經楊雄方言並當時所重見傳流俗若加以二志幸有其書何獨捨諸深所未曉歷􅀚衆史諸志列名􅂉前畧而後詳􅂉古無而今有雖遍􅀘􅀁闕各自以為工搉而論之皆未得其最盖可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬户兆庻仰其神威虎踞龍蟠帝王表其尊極兼復土堦卑室好約者􅀁以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宫闕制度朝廷軌儀前王所為後王取則故齊府肇建誦魏都以立宫代國􅀄遷寫吳京而􅀣闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晋宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏遠名號非一凢為國史者宜各􅁧都邑志列扵輿服之上金石艸木縞紵絲枲之流鳥獸䖝魚齒革羽毛之􅀋或百蠻攸稅􅂉萬國是供夏書則編扵禹貢周書則託扵王㑹亦有圗形九牧之􅂦列狀四荒之經􅀚之者擅其愽學聞之者騁其多識自漢氏拓境無國不賓則有卭竹傳節䈮醬流味大宛献其善馬條攴致其巨雀爰及魏晋迄于周隋咸亦遐邇來王任土作貢異物歸扵計吏竒名顯扵職方凢為國史者宜各􅁧方物志列扵食貨之首帝王苖裔公侯子孫餘慶􅀁鍾百世無絶􅀎言吾祖郯子見師扵孔公不識其先籍談取誚於􅁎后故周撰世本式辯諸宗楚置三閭實掌王族逮乎晚葉譜學尤煩用之扵官可以品藻士庶施之扵國可以甄别華夷自劉曹受命雍豫為宅世胄相承子孫番衍及永嘉東渡流寓楊越代氏南遷夷從華夏扵是中朝江右南北混淆華壤邉民虜漢相雜隋有天下文軌大同江外山東人物殷凑其間髙門貴族非復一家郡正州都世掌其任凢為國史者宜各􅁧氏族志列扵百官之下盖自都邑已降氏族而徃實為志者􅀁宜先而諸史竟無其錄如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曽何足云惟此數條粗加啇畧得失}

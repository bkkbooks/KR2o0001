  - {type: variant, offset: 398, length: 0, content: '', WYG: 莊公二十九年冇蜰劉歆以為蜰負蠜也劉向以為非中國所有南越盛暑男女同川澤滛風所生是時莊取齊滛女為夫人既入滛於兩叔故蜰至按負蠜中國所生不獨出南越鸜鵒為夷狄之鳥春秋昭公二十五年鸜鵒來巢劉向以為夷狄之禽桉鸜鵒中國皆有唯不踰濟水耳事見周官如斯詭妄不可殫論而班固就加纂次曽靡銓擇因以五行編而為志不亦惑乎且每有叙一灾推一怪董京之説前後相反桓公三年日冇食之董仲舒劉向以為魯宋殺君易許田劉歆以為晉曲沃莊伯殺晉侯京房以為後楚莊稱王兼地千里也向歆之解父子不同莊公七年夜中星隕如雨劉向以為夜中者即中國也劉歆以為晝象中國夜象夷狄劉向又以為蜮生南越劉歆以為盛暑所生非自越來也遂乃雙載其文兩存厥理言無凖的事益煩費豈所謂撮其機要收彼菁華者乎自漢中興已還迄于宋齊其間司馬彪臧榮緒沈約蕭子顯相承載筆竟志五行雖未能盡善而大較多實何者如彪之徒皆自以名慙漢儒才劣班史凡所辨論務守常途旣動遵繩墨故理絶河漢兼以古書從略求徴應者難該近史}

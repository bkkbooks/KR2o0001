  - {type: variant, offset: 470, length: 5, content: 然請俟來哲, SBCK: 編此都邑之流􅀁以不果列志也對曰按帝王建國本無恒􅀁作者記事亦在相時逺則漢有三輔典近則隋有東都記扵南則有宋南徐州記晋宫闕名於北則有洛陽伽藍記鄴都故事盖都邑之事盡在是矣譜諜之作盛扵中古漢有趙岐三輔决錄晋有摯虞姓族記江左有兩主百家譜中原有方思殿格盖氏族之事盡在是矣自沈莹著臨海水土周處撰陽羨土風厥􅀋衆夥諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮盖方物之事盡在是矣凢此諸書代不乏作必聚而為志奚事無文譬夫涉海求魚登山採木至扵鱗介脩短柯條巨細盖在擇之而已苟為漁人匠者何慮山海之貧罄㦲史通卷之三}
  - {type: page-break, offset: 470, content: '', id: KR2o0001_SBCK_003-14a}

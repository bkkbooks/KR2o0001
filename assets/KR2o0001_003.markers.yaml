  - {type: variant, offset: 240, length: 0, content: '', WYG: 上卷中楚莊作覇荆國始僣稱王春秋桓公三年日有食}
  - {type: variant, offset: 241, length: 5, content: 外更立一書, SBCK: 占星象趙逹之明風角單颺識魏祚扵黃龍董飬徴晉亂扵蒼烏斯皆肇彰先覺取驗將来言必有中語無虚􅀤苟誌諸竹帛其誰曰不然}
  - {type: variant, offset: 241, length: 2, content: 外更, WYG: 旣京房易傳以為後楚荘稱王兼地千里按自武王始僣號厯文成繆三王始至於莊然則楚之稱王已四世矣何得言荘始稱哉又魯桓薨後世厯莊閔釐文者凡五君而楚莊邪作覇安有桓三年日食而應之髙宗諒隂亳都實生桑榖尚書伊陟相太戊亳有桑榖共生劉向以為殷道哀髙宗承弊而起盡諒隂之哀天下應之既獲顯榮怠於政事國將危亡故桑榖之異見按太戊崩其後嗣有仲丁河亶甲祖乙盤庚凡厯五世始至武丁即髙宗是也桑榖自太戊時生非髙宗事高又本不都於亳晉悼臨國六卿專政以君事臣董仲舒以為成公十七年六月甲戌朔日有食之時宿在畢晉家象也晉厲公後莫敢責大夫六卿遂相與比周專晉國君還事之按春秋成公十二月丁巳朔日食非是六月魯僖末年三桓世官殺嫡}

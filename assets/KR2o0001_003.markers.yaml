  - {type: variant, offset: 470, length: 5, content: 然請俟來哲, WYG: 編此都邑之流所以不果列志也對曰按帝王建國本無恒所作者記事亦在相時逺則漢有三輔典近則隋有東都記於南則有宋南徐州記晉宫闕名於北則有洛陽伽藍記鄴都故事盖都邑之事盡在是矣譜牒之作盛於中古漢有趙岐三輔决録晉有摰虞姓族記江左有兩主百家譜中原有方思殿格盖氏族之事盡在是矣自沈瑩著臨海水土周處撰陽羨土風厥類衆夥諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮盖方物之事盡在是矣凡此諸書代不乏作必聚而為志奚患無文譬夫涉海求魚登山採木至於鱗介脩短柯條巨細盖在擇之而已茍為漁人匠者何慮山海之貧罄哉史通卷三欽定四庫全書史通卷四唐劉知幾撰内篇}

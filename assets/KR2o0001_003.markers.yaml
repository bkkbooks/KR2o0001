  - {type: variant, offset: 122, length: 1, content: 然, WYG: 可勝計或名非而物是或小異而大同但作者愛竒恥於仍舊必尋源討本其歸一揆也若乃五行藝文班𥙷子長之闕百官輿服謝拾孟堅之遺王隠後來加以瑞異魏收晚進宏以釋老斯則自我作故出乎胷臆求諸厯代不過一二者焉大抵志之為篇其流十五六家而已其間則有妄入編次虚張部帙而積習已乆不悟其非亦有事應可書宜别標篇題音第而古來作者曽未覺察今略陳其義列於下云已上書志序夫兩曜百星麗於𤣥象非如九州萬國廢置無恒故海田可變而景緯無易古之天猶今之天也今之天即古之天也必欲刋之國史施於何代不可也但史記包括所及區域綿長故書有天官讀者竟忘其誤㩁而為論未見其宜班固因循復以天文作志志無漢事而𨽻入漢書尋篇考限覩其乖越者矣降及有晉迄于隋氏或地止一隅或年纔二世而彼蒼列志其篇倍多流宕忘歸不知紀極方於漢史又孟堅之罪人也切以國史所書宜述當時之事必為志而論天象也但載其時彗孛氛祲薄食晦明裨竈梓慎之所占京房李郃之所候至如熒惑退舎宋公延齡中台告坼晉相速禍星集穎川而賢人聚月犯少㣲而處士亡如斯之類志之可也若乃體分濛澒色著青蒼丹曦素魄之躔次黄道紫宫之分野旣不預於人事輙編之於策書故曰刋之國史施於何代不可也其間惟有袁山松沈約蕭子顯魏收等數家頗覺其非不遵舊例}

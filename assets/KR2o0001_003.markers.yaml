  - {type: variant, offset: 205, length: 25, content: 案遷固列君臣於紀傳統遺逸於表志雖篇名甚廣而言無獨錄, WYG: 詳求厥義未見其可}
  - {type: variant, offset: 205, length: 0, content: '', krp: 詳求厥義未見其可愚謂凢撰志者宜除此篇必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其所錄皆鄴下文儒之士讎校之司所列書名唯取當時撰者習兹楷則庶免譏嫌語曰雖有絲麻無棄管蒯扵宋生得之矣文志已上藝夫灾祥之作以表吉凶此理昭昭不易誣也然則麒麟闘而日月蝕鯨鯢死而彗星出河變應扵千年山崩由扵朽壊又語曰太歳在丑乞漿得酒太歳在已販妻鬻子則知吉㐫逓代如盈縮循環此乃關諸天道不復繋乎人事且周王决疑龜焦蓍折宋皇誓衆竿壊幡亡梟止梁師之營鵩集賈生之舎斯皆妖灾著象而福祿来鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其羙惡也故證候相軋有異不為灾見扵春秋其事非一洎漢興儒者乃考洪範以釋隂陽其事也如江璧傳扵鄭客逺應始皇卧桞植扵上林近符宣帝門樞白髮元后之祥柱樹黄雀新都之䜟舉夫一二良有可稱至扵蜚蜮蝝螽震食崩拆隕雨霜雹大水無氷其所證明實皆迂闊故當春秋之世其在扵魯也如有旱雩舛候螟􅭈傷苗之属是時或秦人歸禭或毛伯賜命或滕邾入朝或晉楚來聘皆持此恒事應彼咎徴旻穹垂謪厥罰安在探賾索隱其可略諸且史之記載難以周悉近者宋氏年唯五紀地止江淮書滿百篇號為繁富作者猶廣之以拾遺加之以語錄况彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解卷才三十則知其所略蓋亦多矣而漢代儒者羅災青扵二百年外討符㑹扵三十卷中安知事有不應扵人應人而失其事何得苟有脫變而必知其地者㦲若乃採前文而攺易其說謂王札子之作亂在彼成年成元春秋毛伯}
  - {type: variant, offset: 206, length: 1, content: 遷, SBCK: 今春秋經扎子殺召毛事在宣十五年年二月無氷董仲舒以為其時王扎子殺召伯公時非成夏徴舒之構逆當夫昭代陳災董仲舒以春秋昭公九年恨故致火災案楚􅃊王之㓕陳在宣十一年如為楚􅃊王為陳討夏徵舒因㓕陳陳之臣子毒恭王卒康王立康王卒夾敖立夾敖卒靈王立昭九年􅀁㓕者乃楚靈王時且荘王卒恭王立五行志上卷中相去凢五世在楚􅃊作霸荆國始僣稱王桓公春秋地千里案自武王始僣號歷定成繆三王始至三年日有蝕之旣京房易傳以為楚􅃊稱王兼㦲又魯桓薨後世歴􅃊閔釐文宣凢五君而楚於􅃊然則楚之稱王已四世矣何得言􅃊始稱而應之邪􅃊作覇安有桓三年日食髙宗諒隂亳都實生桑榖為殷道衰髙宗承弊而起盡諒隂之哀天下尚書伊陟相太戊毫有桑榖拱生劉向以之異見按大戊崩其後嗣有仲丁河亶甲祖乙應之旣􅀗顕荣怠扵政事而國將危亡故桑榖戊時生非髙宗事高宗又本成都於毫盤庚凢歷五世始至武丁即髙宗是也桑自太􅀳悼臨國六卿專政以君事臣成公十七年董仲舒以為厲公後莫敢責大夫六卿遂相與比周專晋國六月甲戌朔日有食之時宿在畢晋家象也晋月丁巳朔日食非是六月君還事之按春秋成公十二魯僖末年三桓世官殺嫡立庶草劉向以為是時公子遂專􅁠三桓春秋僖公三十年十二月殞霜不殺公二十九年秋大雨雹劉向以為􅁵公末年信始世官向又曰嗣君徴失柄来事之象也又􅁵見􅁵公不悟遂終專􅁠後二年殺子赤立宣公用公子遂專􅁠自恣至扵殺君故隂脅陽之象東門㐮仲赤文公太子即惡也按此事乃文公末世不是僖公時也遂即斯皆不慿章句􅈂取胷懷􅂉以前為後以虗為實移的就箭曲取相諧掩耳盗鍾自云無覺詎知後生可畏来者難誣者邪又品藻群流題目庶􅀋謂莒大為國菽為強艸鶖著青色􅀒蠜匪中國之䖝蠜也劉向以爲非中國􅀁有南越盛暑男春秋嚴公二十九年有蜰劉歆以爲蜰􅀒人旣入滛扵兩叔故蜰至按􅀒蠜中國􅀁生不女同川澤滛風􅀁生是時嚴公取齊滛女爲夫南越獨出鸚鵒爲夷狄之鳥鵒来巢劉向以爲夷狄春秋昭公二十三年鸜喻濟水耳事見周官之禽按鸜鵒中國皆有唯不如斯詭妄不可殫論而班}

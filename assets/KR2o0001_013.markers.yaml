  - {type: variant, offset: 12, length: 1, content: 記, WYG: 傳云髙陽髙辛二氏各有才子八人謂之元凱此十六族也世濟其美不隕其名以至於堯堯不能舉帝鴻氏少昊氏顓頊氏各有不才子謂之渾沌窮竒檮杌此三族也世濟其凶増其惡名以至於堯堯不能去縉雲氏亦有不才子天下謂之饕餮以比三族俱稱四凶而堯亦不能去斯則當堯之世小人君子比肩齊列善惡無分賢愚共貫但論語有云舜舉咎繇不仁者遠是則當咎繇未舉不仁甚多彌驗堯時群小在位者矣又安得謂之克明峻德比屋可封者乎其疑一也其二條堯典序又云將遜于位讓于虞舜孔氏注曰堯知子丹朱不肖故有禪位之志按汲冢𤨏語云舜放堯於平陽而書云某地有城以囚堯為號識者憑斯異説頗以禪授為疑然則觀此二書已足為證者矣而猶有所未覩也何者據山海經謂放勛之子為帝丹朱而列君於帝者得非舜雖廢堯仍立堯子俄又奪其帝者乎觀近有姦雄奮發自號勤王或廢父而立其子或黜兄而奉其弟始則示相推戴終亦成其簒奪求諸厯代往往而有必以古方今千載一揆斯則堯之授舜其}

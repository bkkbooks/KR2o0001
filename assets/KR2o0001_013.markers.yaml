  - {type: variant, offset: 10, length: 0, content: '', krp: 云魯無簒弑觀夫子之刪詩也凡語國風皆有怨刺在扵魯國獨無其章豈無剌詩魯多淫僻去而不録盖夫子删觀夫子之論語也君娶扵吳是謂同姓而司敗發問對以知禮斯驗世人之飾智矜愚愛憎由己者多矣加以古文載事其詞簡約推者難詳缺漏無補遂令後來學者莫究其源蒙然靡察有如聾瞽今故言其疑事以著于篇凡有十條列之扵後盖虞書之美放勛也云克明峻德而陸賈新語又曰堯舜之臣比屋可封盖因堯典成文而廣造奇說也按}
  - {type: punctuation, offset: 12, content: 》, id: KR2o0001_tls_013-bkkpn5}
  - {type: variant, offset: 12, length: 1, content: 記, SBCK: 傳云髙陽髙辛二氏各有才子八人謂之元凱此十六族也世濟其美不隕其名以至扵堯堯不能舉帝鴻氏少昊氏顓頊氏各有不才子謂之渾沌窮奇檮杌此三族也世濟其凶増其惡名以至扵堯堯不能去縉雲氏亦有不才子天下謂之饕餮與此三族俱稱四㐫而堯亦不能去斯則當堯之世小人君子比肩齊列善惡無分賢愚共貫但論語有云舜舉咎繇不仁者逺是則當咎繇未舉不仁甚多以驗堯時群小在位者又安得謂之克明峻德比屋可封者乎其疑一也堯典序又云將遜于位讓于虞舜孔氏注曰堯之子丹朱不肖故有禪位之志按汲􅃁􅃈語云舜放堯扵平陽而書云某地有城以囚堯為號識者憑斯異􅀃頗以禪授為疑然則觀此二書已足為證者矣而猶有所未覩也何者據山海經謂放勛之子為帝丹朱而列君扵帝者得非舜雖廢堯仍立堯子俄又奪其帝者乎觀近有姦雄奮發自號覇王或廢父而立其子或黜兄而奉其弟始則示相推戴終亦成其簒奪求諸歴代徃徃而有必以古方今千載一揆斯則堯之授舜其}

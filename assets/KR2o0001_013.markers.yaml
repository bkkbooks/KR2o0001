  - {type: variant, offset: 5, length: 1, content: 昔, SBCK: 外篇疑古第三總十二條盖古之史氏區分有二焉一曰記言二曰記事而古人所學以言爲首至若虞夏之典商周之誥仲虺周任之言史佚臧文之􅀃凡有遊談專對献䇿上書者莫不引爲端緒歸其的凖其於事也則不然乃若少昊之以鳥名官陶唐之以御龍拜職夏氏之中衰也其盜有后羿寒浞齊􅀖之始建也其君有蒲姑伯陵斯並開國成家異聞奇事而後世學者罕傳其􅀃唯夫博物君子或粗知其一隅此則記事之史不行而記言之書見重断可知矣及左氏之為傳也雖義釋本經而語雜它事遂使兩漢儒者嫉之若讎故二傳大行擅名後世又孔門之著述也論語專述言辭家語兼陳事業而自古學徒相授唯稱論語而已由斯而談並古人輕事重言之明效也然則上起唐堯下終秦繆其書􅀁録惟有百篇而書之所載以言為主至扵廢興行事萬不記一語其缺畧可勝道哉故令後人有言唐虞以下帝王之事未易明也按論語曰君子成人之美不成人之惡又曰成事不􅀃可復解􅀃事已成不遂事不諌可復諌止事已遂不旣徃不咎可復追咎事已徃不又曰民可使由之不可使知之知者百性日用而不能由用也可用而不可使㫮全冩先儒所释也知自此引經四䖏注夫聖人立敎其言若是在扵史籍其義亦然是以美者因其美以美之雖有其惡不加毁也惡者因其惡而惡之雖有其美不加譽也故孟子曰堯舜不勝其美桀紂不勝其惡魏文帝曰舜禹之事吾知之矣漢景帝曰學者不言湯武受命不為愚斯並曩賢精鑒已有先覺而拘扵禮法限以師訓雖口不能言而心知其不可者盖亦多矣又按魯史之有春秋也外為賢者内為本國事靡洪纎動皆隱諱斯乃周公之格言然何必春秋在扵六經亦皆如此故觀夫子之刋書也夏桀讓湯武王斬紂其事甚著而芟夷不存孔子則}

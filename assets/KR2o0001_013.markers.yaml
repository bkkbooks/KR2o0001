  - {type: variant, offset: 63, length: 2, content: 統體, SBCK: 異扵尚書如周書之所􅀃豈非湯旣勝桀力制夏人使桀推讓歸王扵己盖􅁒北跡堯舜襲其髙名者乎又按墨子云湯以天下讓務光而使人􅀃曰湯􅁒加惡名扵汝務光遂投清冷之泉而死湯乃卽位無疑然則湯之飾讓偽跡甚多考墨家所言雅與周書相㑹夫書之作本出尚書孔父截剪浮詞裁成雅語去其鄙事直云慙德豈非􅁒减湯之過増桀之惡者乎其疑五也夫五經立言千載猶仰而求其前後理甚相乖何者稱周之盛也則云三分有二商紂為獨夫語殷之敗也又云紂有臣億萬人其亡流血漂杵斯則是非無凖向背}
  - {type: page-break, offset: 63, content: '', id: KR2o0001_SBCK_013-6b}
  - {type: variant, offset: 63, length: 4, content: 統體不一, WYG: 異於尚書如周書之所説豈非湯既勝桀力制夏人使桀推讓歸王於己蓋欲比跡堯舜襲其髙}
  - {type: variant, offset: 63, length: 2, content: 統體, krp: 異扵尚書如周書之所說豈非湯旣勝桀力制夏人使桀推讓歸王扵己盖𣣔北跡堯舜襲其髙名者乎又按墨子云湯以天下讓務光而使人說曰湯𣣔加惡名扵汝務光遂投清冷之泉而死湯乃卽位無疑然則湯之飾讓偽跡甚多考墨家所言雅與周書相㑹夫書之作本出尚書孔父截剪浮詞裁成雅語去其鄙事直云慙德豈非𣣔减湯之過増桀之惡者乎其疑五也夫五經立言千載猶仰而求其前後理甚相乖何者稱周之盛也則云三分有二商紂為獨夫語殷之敗也又云紂有臣億萬人其亡流血漂杵斯則是非無凖向背}
  - {type: variant, offset: 66, length: 1, content: 一, SBCK: 同者焉又按武王為㤗誓數紂過失亦猶近代之有吕相為書絶秦陳琳為􅀽檄魏欲加之罪能無辭乎而後来諸子承其偽􅀃竟列紂罪有倍五經故孔子曰桀紂之惡不至是君子惡居下流班生亦云安有據婦人扵朝劉向又曰世人有弑父害君桀紂不至是而天下惡者皆以桀紂為先此其自古言辛癸之罪將非厚誣者乎其疑六也㣲子之命篇云殺武庚按禄父即商紂之子也屬社稷傾覆家國淪亡父首梟懸母軀分裂永言怨恥生死莫二向使其侯服事周而全軀保其妻子也仰天俯地何以為生含齒載髮何以為貌既而合謀二叔狥節三監雖君親之怨不除而臣子之誠可見考諸}

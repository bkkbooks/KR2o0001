  - {type: punctuation, offset: 10, content: 《, id: KR2o0001_tls_013-bkkpn4}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 云魯無簒弑觀夫子之刪詩也凡語􅀦風皆有怨刺在扵魯􅀦獨無其章豈無剌詩魯多􅁋僻去而不録盖夫子删觀夫子之論語也君娶扵吳是謂同姓而司敗發問對以知禮斯驗世人之飾智矜愚愛憎由己者多矣加以古文載事其詞簡約推者難詳缺漏無補遂令後來學者莫究其源蒙然靡察有如聾瞽今故言其疑事以著于篇凡有十條列之扵後盖虞書之美放勛也云克明峻德而陸賈新語又曰堯舜之臣比屋可封盖因堯典成文而廣造奇􅀃也按}
  - {type: page-break, offset: 10, content: '', id: KR2o0001_SBCK_013-3b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 云魯無簒弑觀夫子之刪詩也凡語國風皆有怨刺在於魯國獨無其章魯多淫僻豈無刺詩蓋夫子刪去而不録觀夫子之論語也君娶於吳是謂同姓而司敗發問對以知禮斯驗聖人之飾智矜愚愛憎由己者多矣加以古文載事其詞簡約推者難詳缺漏無補遂令後來學者莫究其源蒙然靡察有如聾瞽今故訐其疑事以著於篇凡有十條列之於後其一條蓋虞書之美放勛也云克明峻德而陸賈新語又曰堯舜之臣比屋可封蓋因堯典成文而廣造竒説也按}

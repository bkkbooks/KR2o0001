  - {type: variant, offset: 431, length: 0, content: '', SBCK: 述事如此今取其正經雅言理有難曉諸子異􅀃義或可憑叅而㑹之以相研覆如異扵此則無論焉夫逺古之書與近古之史非唯繁約不類故亦向背皆殊何者近古之史也言唯詳備事罕甄擇使夫學者覩一􅀖之政則善惡相叅觀一主之才而賢愚殆半至扵逺古則不然夫其􅀁録也畧舉綱維務存褒諱尋其終始􅀮没者多甞試言之向使漢魏晉宋之君生扵三代堯舜禹湯之主出扵中葉俾史官易地而書各叙時事校其得失固未可量若}

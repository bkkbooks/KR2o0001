  - {type: variant, offset: 346, length: 0, content: '', SBCK: 王號􅃍立此即春秋楚及吳越僣號而陵天子也然則戡黎㓕崇自同王者服事之道理不如斯亦猶近者魏司馬文王害權臣黜少帝坐加九錫行駕六馬及其殁也而荀朂猶謂之人臣以終盖􅁎之事殷當比馬之臣魏必稱周德之大者不亦虚為其設也其疑八也論語曰太伯可謂至德也已三以天下讓民無德而稱焉按呂氏春秋所載云云斯則太王鍾愛厥孫將立其父太伯年}

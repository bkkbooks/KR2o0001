  - {type: variant, offset: 165, length: 140, content: 古為述者之冠冕實後來之龜鏡既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史經史之目於此分焉嘗試言之曰經猶日也史猶星也夫杲日流景則列星寢耀桑榆既夕而辰象粲然故史漢之文當乎尚書春秋之世也則其言淺俗涉乎委巷垂翅不舉懘籥無聞逮於戰國已降去聖彌遠然後能露其鋒穎倜黨不羈故知人, WYG: 物}

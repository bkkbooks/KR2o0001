  - {type: variant, offset: 3242, length: 1, content: 李, WYG: 況嗣宗當聖善將没閔凶所鍾合門惶恐舉族悲咤居里巷者猶停舂相之音在鄰伍者尚申匍匐之救而為其子者方對局求決舉杯酣觴但當此際曾無感惻則心同木石志如梟獍者安有既臨泉穴始知摧慟者乎求諸人情事必不爾又孝子之喪親也朝夕孺慕鹽酪不甞斯可至於癯瘠矣如甘㫖在念則觔肉内寛醉飽自支一作得則肌膚外博況乎溺情㹠酒不改平素雖復時一嘔慟豈能柴毁骨立乎葢彼阮生者不修名教居喪過失而說者遂言其無禮如彼人以其志操尤異才識甚髙而談者遂言其至性如此惟毁及譽皆無取焉其十二條又新晉書王祥傳曰祥漢末遭亂扶母攜弟覽避地廬江隠居三十餘年不應州郡之命母終徐州刺史呂䖍檄為别駕年垂耳順覽勸之乃應召于時冦賊充斥祥率勵兵士頻討破之時人歌曰海沂之康實賴王祥年八十五太始五年薨難曰祥為徐州别駕冦盜充斥固是漢建安中徐州未清時事耳有魏受命凡三十五年上去徐州冦賊充斥下至晉太始五年當六十年已上矣祥於建安中已垂耳順更加六十載至晉太始五年薨則當年一}
  - {type: page-break, offset: 3242, content: '', id: KR2o0001_WYG_020-10a, image: WYG0685/WYG0685-0152a.png}

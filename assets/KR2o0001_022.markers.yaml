  - {type: variant, offset: 3320, length: 0, content: '', WYG: 亡葛洪刋其雜記休文所缺荀綽裁其拾遺凡此諸家其流葢廣莫不賾彼泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范曄為}
  - {type: punctuation, offset: 3321, content: ；, id: KR2o0001_tls_022-bkkpn886}
  - {type: 'tls:seg', offset: 3321, content: '', id: KR2o0001_tls_022-17a.9}
  - {type: variant, offset: 3321, length: 0, content: '', WYG: 盛言矜其賛體斯又當仁不讓庶㡬前哲者焉然自䇿名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之其不可有五故也何者古之國史皆出自一家如}
  - {type: page-break, offset: 3321, content: '', id: KR2o0001_WYG_020-13a, image: WYG0685/WYG0685-0153c.png}
  - {type: variant, offset: 3322, length: 3, content: 始為髽, WYG: 漢之}
  - {type: punctuation, offset: 3325, content: ，, id: KR2o0001_tls_022-bkkpn887}
  - {type: 'tls:seg', offset: 3325, content: '', id: KR2o0001_tls_022-17a.10}
  - {type: variant, offset: 3327, length: 0, content: '', WYG: 子長晉齊之董狐南史咸能立言不朽藏諸名山未聞籍以衆功方云絶筆唯後漢東觀大集羣儒著述無主條章靡立由}
  - {type: variant, offset: 3328, length: 0, content: '', WYG: 伯度譏其不實公理以為可焚張蔡二子紏之於當代傅范兩家媸之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿毎欲}
  - {type: punctuation, offset: 3329, content: 。, id: KR2o0001_tls_022-bkkpn888}

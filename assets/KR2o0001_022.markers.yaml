  - {type: variant, offset: 3600, length: 0, content: '', WYG: 此刋削之失例也屬詞比事勞逸宜均揮鈆奮墨勤惰須等某表某篇付之此職某傳某志歸之彼官此銓配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學茍且務相推避坐變炎涼徒延嵗月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議安得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤勤於課責或云墳籍事重努力用心或云嵗序已淹}
  - {type: page-break, offset: 3600, content: '', id: KR2o0001_WYG_020-15a, image: WYG0685/WYG0685-0154c.png}
  - {type: variant, offset: 3601, length: 0, content: '', WYG: 時輟手切}
  - {type: variant, offset: 3602, length: 2, content: 示後, WYG: 網維不舉而督課徒勤雖威以刺骨之刑勗以懸金之賞終不可得也語曰陳力就列不能者止所以比者布懐知已歴詆羣公屢辭載筆之官願罷記言之職者正為此爾抑又有所未諭聊復一二言之比奉髙命令𨽻名修史其職非一如張尚書崔岑二吏部鄭太常等既迫以吏道不可拘之史任以僕曹務多閒勒令専知下筆夫以惟寂惟寞乃使記事記言茍如其例則栁常侍劉祕監徐禮部等並門可張羅府無堆案何事置之度外而使各無羈束乎必謂諸賢載削非其所長以僕鎗鎗佼佼故推為首最就如斯理}

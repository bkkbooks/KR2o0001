  - {type: variant, offset: 306, length: 382, content: 有殊相去若是校其優劣詎可同年自漢已降幾將千載作者相繼非復一家求其善者蓋亦幾矣夫班馬執簡既五經之罪人而晉宋殺青又三史之不若譬夫王霸有別粹駁相懸才難不其甚乎然則人之著述雖同自一手共間則有善惡不均精粗非類若史記之蘇張蔡澤等傳是其美者至於三五本紀日者太倉公龜策傳固無所取焉又漢書之帝紀陳項諸篇是其最也至於淮南王司馬相如東方朔傳又安足道哉豈繪事以丹素成妍帝京以山水為助故言媸者其史亦拙事美者其書亦工必時乏異聞世無奇事英雄不作賢俊不生區區碌碌抑惟恆理而責史臣顯其良直之體申其微婉之才蓋亦難矣故揚子有云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀丘明之記事也當桓文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壞事益縱橫則春秋美辭幾乎翳矣觀子長之敍事也自周以往言所不該其文闊略無復體統洎秦漢已下條貫有倫則煥炳可觀有足稱者至若荀悅漢紀其才盡於十帝陳壽魏書其美窮於三祖觸類而長他皆, WYG: 兼百行}

  - {type: variant, offset: 2296, length: 1, content: 虞, WYG: 孔安國曰葢言之甚也如積甲與熊耳山齊者抑亦血流漂杵之徒歟其七條又東觀漢記曰郭伋為并州牧行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送至郭外問使者何日當還伋使别駕計日告之既還先期一日伋為違信止於野亭須期乃入難曰葢此事不可信者三焉按漢時方伯儀比諸侯其行也前驅竟野竟一作蔽後乘塞路鼓吹沸喧旌棨填咽彼草萊稚子齠齓童兒非唯羞赧不見亦自驚惶失據安能犯騶駕凌襜帷首觸威嚴自陳襟抱其不可信一也又方伯按部舉州振肅至於墨紱長吏黄綬羣官率彼吏人顒然佇候兼復掃除逆旅行李有程嚴備供具憩息有所如棄而不就居止無常必公私闕擬客主俱窘凡為良二千石固當知人所苦安得輕赴數童之期坐失百城之望其不可信二也夫以晉陽無竹古今共知假有傳檄他方葢亦事同大夏訪諸商賈不可多得況在童孺彌復難求羣戲而乘如何克辦其不可信三也凡說此事總有三科搉而論之了無一實異哉其八條又魏志注語林曰匈奴遣使人來朝太祖令崔琰在座而已握刀侍立既而使人問匈奴使者曰曹公何如對曰曹公美則美矣而侍立者非人臣之相太祖乃追殺使者云云難曰昔孟陽卧牀詐稱齊后紀信乘纛矯號漢王或主遘屯䝉或朝罹兵革故權以取濟事非獲已如崔琰本無此急何得以臣代君者哉且凡稱人君皆慎其舉措況魏武經綸霸業南面受朝而使臣居君座君處臣位將何以使萬國具瞻百寮僉矚也又漢代之於匈奴其為綏撫勤矣雖復賂以金帛結以親姻猶恐虺毒不悛狼心易擾如輒殺其使者不顯罪名復何以懐四夷於外蕃建五利於中國且曹公必以所為過失懼招物議故誅彼行人將以杜兹謗口而言同綸綍聲遍寰區欲葢而彰止益其辱雖愚暗之主猶所不為況英略之君豈其若是夫芻蕘鄙說閭巷讇言諸如此書通無擊難而裴引語林斯事編入魏史注中持彼虚詞亂兹實録故特申掎摭辨其疑誤者焉葢曹公多詐好立詭謀流俗相欺遂為此說其九條又魏世諸小書皆云文鴦侍講殿瓦皆飛云云難曰案漢}

  - {type: variant, offset: 2302, length: 4, content: 天下咸服, WYG: 已尋文鴦武勇逺慚項籍況侍君側固當屏氣徐言安能使檐瓦皆飛有踰武安鳴鼓且瓦既飄隕則人必震驚而魏帝與其羣臣焉得巋然無害也其十條又晉陽秋曰胡質為荆州刺史子威自京師省之見父十餘日告歸質賜絹一疋為路粮威曰大人清髙不審於何得}

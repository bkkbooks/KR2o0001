  - {type: variant, offset: 9, length: 2, content: 稱美, SBCK: 曹􅀊月寖乆其􅀁以沉潜考證之}
  - {type: variant, offset: 9, length: 2, content: 稱美, WYG: 如左其一條史記本紀曰瞽叟使舜穿井為匿空旁出瞽叟與象共下土實井瞽叟象喜以舜為巳死象乃止舜宮難曰夫杳㝠不測變化無恒兵革所不能傷網羅所不能制若左慈易質為羊劉根竄引入壁是也時無可移禍有必至雖大聖所不能免若姬伯拘於羑里孔父厄於陳蔡是也然俗之愚}

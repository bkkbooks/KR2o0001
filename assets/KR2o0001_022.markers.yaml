  - {type: variant, offset: 3329, length: 2, content: 河橋, WYG: 一事載一言皆閣筆相視含毫不斷故白首}
  - {type: variant, offset: 3332, length: 0, content: '', WYG: 期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺況僕限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門深居九重欲人不見尋其義者葢由杜彼顔面防諸請謁故也然今館中}
  - {type: page-break, offset: 3332, content: '', id: KR2o0001_WYG_020-13b, image: WYG0685/WYG0685-0153d.png}
  - {type: punctuation, offset: 3333, content: ，, id: KR2o0001_tls_022-bkkpn889}
  - {type: 'tls:seg', offset: 3333, content: '', id: KR2o0001_tls_022-17a.12}
  - {type: variant, offset: 3333, length: 2, content: 元凱, WYG: 者多士如林皆願長喙無聞䶦舌儻有五始初成一字加貶言未絶口而朝野具知筆未栖毫而縉紳咸誦夫孫盛紀實}
  - {type: page-break, offset: 3333, content: '', id: KR2o0001_WYG_020-14a, image: WYG0685/WYG0685-0154a.png}
  - {type: variant, offset: 3336, length: 6, content: 驗於毛詩男子, WYG: 嫉權門王邵直書見讎貴族人之情也能無畏乎其不可三也古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教也以疏通知逺為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而飾主闕斯並曩時得失之例良史是非之準作者言之詳矣頃史官注記多取稟監修楊令公則云必須直詞宗尚書則云宜多隠惡十羊九牧其令難行一國三公適從何在其不可四也切以史置監修雖古無式尋其名號可得而言夫言監者葢總領之義耳如創紀編年則年}
  - {type: page-break, offset: 3336, content: '', id: KR2o0001_WYG_020-14b, image: WYG0685/WYG0685-0154b.png}

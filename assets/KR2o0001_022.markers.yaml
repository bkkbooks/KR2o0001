  - {type: variant, offset: 2436, length: 276, content: 挾纊斯皆言近而旨遠辭淺而義深雖發語已殫而含義未盡使夫讀者望表而知里捫毛而辨骨覩一事於句中反三隅於字外晦之時義不亦大哉洎班馬二史雖多謝五經必求其所長亦時值斯語至若高祖亡蕭何如失左右手漢兵敗績睢水為之不流董生乘馬三年不知牝牡翟公之門可張雀羅則其例也自茲已降史道陵夷作者蕪音累句雲蒸泉湧其為文也大抵編字不隻捶句皆雙修短取均奇偶相配故應以一言蔽之者輒足為二言應以三句成文者必分為四句彌漫重沓不知所裁是以處道受責於少期魏書鄧哀王傳曰容貌姿美有殊於衆故特見寵異裴松之曰一類之言而分以為三亦敍屬之一病也子昇取譏於君懋王劭齊志曰時議恨刑子才不得掌興魏之書悵怏溫子昇亦若, WYG: ''}

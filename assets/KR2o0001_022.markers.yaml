  - {type: variant, offset: 893, length: 340, content: 歷觀自古作者權輿尚書發蹤所載務於寡事春秋變體其言貴於省文斯蓋澆淳殊致前後異迹然則文約而事豐此述作作之尤美者也始自兩漢迄乎三國國史之文日傷煩富逮晉已降流宕逾遠尋其冗句摘其煩詞一行之間必謬增數字尺紙之內恆虛費數行夫聚蟻成雷羣輕折軸況於章句不節言詞莫限載之兼兩曷足道哉蓋敍事之體其別有四有直紀其才行者有唯書其事蹟者有因言語而可知者有假贊論而自見者至如古文尚書稱帝堯之德標以允恭克讓春秋左傳言子太叔之狀目以美秀而文所稱如此更無他說所謂直紀其才行者又如左氏載申生為驪姬所譖自縊而亡班史稱紀信為項籍所圍代君而死此則不言其節操而忠孝自彰所謂唯書其事迹者又如尚書稱武王之罪紂也其誓曰焚炙忠良刳剔孕婦左傳欒武子之論楚也其詞曰蓽輅藍縷以啓山林此則才行事迹莫不闕如而言有關涉事便顯露所謂因言語而可知者又, WYG: ''}

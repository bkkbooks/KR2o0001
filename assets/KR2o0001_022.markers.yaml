  - {type: variant, offset: 1555, length: 697, content: 行事美惡皆已具其紀傳中續以讚論重述前事此則才行事迹紀傳已書讚論又載也但自古經史通多此纇公梁禮新序說苑戰國策楚漢春秋史記迄於皇家所撰五代史皆有之能獲免者蓋十無一二唯左丘明裴子野王劭無此也又敍事之省其流有二焉一曰省句二曰省字如左傳宋華耦來盟稱其先人得罪於宋魯人以為敏夫以鈍者稱敏魯人謂鈍人也禮記中已有注解則明賢達所嗤此為省句也春秋經曰隕石於宋五夫聞之隕視之石數之五加以一字太詳減其一字太略求諸折中簡要合理此為省字也其有反於是者若穀梁稱郄克眇季孫行父禿孫良夫跛齊使跛者逆跛者禿者逆禿者眇者逆眇者僂者逆僂者蓋宜除跛者已下句但云各以其類逆必事皆再述則於文殊費此為煩句也漢書張蒼傳云年老口中無齒蓋於此一句之內去年及口中可矣夫此六文成句而三字妄加此為煩字也然則省句為易省字為難洞識此心始可言史矣苟句盡餘剩字皆重複史之煩蕪職由於此蓋餌巨魚者垂其千釣而得之在於一筌捕高鳥者張其萬置而獲之由於一目夫敍事者或虛益散辭廣加閑說必取其所要不過一言一句耳苟能同夫獵者漁者既執而置釣必收其所留者唯一筌一目而已則庶幾胼胝盡去而塵垢都捐華逝而實存滓去而瀋在矣嗟乎能損之又損而玄之又玄輪扁所不能語斤伊摯所不能言鼎也夫飾言者為文編文者為句句積而章立章積而篇成篇目既分而一家之言備矣古者行人出境以詞令為宗大夫應對以言文為主況乎列以章句刊之竹帛安可不勵精雕飾傳諸諷誦者哉自聖賢述作是曰經典句皆韶夏言盡琳瑯秩秩德音洋洋盈耳譬夫游滄海者徒驚其浩曠登太山者但嗟其峻極必摘以尤最不知何者為先然章句之言有顯有晦顯也者繁詞縟說理盡於篇中晦也者省字約文事溢於句外然則晦之將顯優劣不同較可知矣夫能略小存大舉重明輕一言而巨細咸該片語而洪纖靡漏此皆用晦之道, WYG: ''}

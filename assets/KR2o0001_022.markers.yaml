  - {type: variant, offset: 3626, length: 2, content: 除厙, WYG: 驅駟馬入函關排千門謁天子引賈生於宣室雖歎其才召季布於河東反增其愧明公既位居端揆望重台衡飛沈屬其顧盼榮辱由其俛仰曾不上祈宸極申之以寵光僉議搢紳縻我以好爵其相見也直云史筆闕書為日已久石渠掃第思子為勞今之仰追唯此而已抑明公足下獨不聞劉炫蜀王之說乎昔劉炫仕隋為蜀王侍讀尚書牛𢎞甞問之曰君王遇子其禮如何曰相期髙於周孔見待下於奴僕𢎞不悟其言請聞其義炫曰吾王每有所疑必先見訪是相期髙於周孔酒食左右皆饜而我餘􅄋不霑是見待下於奴僕也僕亦竊不自揆輒敢方於鄙宗何者求史才則千里降追語宦途則十年不進意者得非相期髙於班馬見待下於兵卒乎又人之品藻貴識其性明公視僕於名利何如哉當其坐嘯洛城非隠非吏惟以守愚自得寧以充詘攖心但今者黽勉從事攣拘就役朝廷厚用其才竟不薄加其禮}

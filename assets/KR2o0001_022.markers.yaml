  - {type: variant, offset: 549, length: 282, content: 云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀丘明之記事也當桓文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壞事益縱橫則春秋美辭幾乎翳矣觀子長之敍事也自周以往言所不該其文闊略無復體統洎秦漢已下條貫有倫則煥炳可觀有足稱者至若荀悅漢紀其才盡於十帝陳壽魏書其美窮於三祖觸類而長他皆若斯夫識寶者稀知音蓋寡近有裴子野宋略王劭齊志此二家者并長於敍事無愧古人而世人議者皆雷同舉裴而共詆王氏夫江左事雅裴筆所以專工中原迹穢王文由其屢鄙且幾原務飾虛辭君懋志存實錄此美惡所以為異也設使丘明重出子長再生記言於賀六渾之朝書事於士尼干之代將恐輟毫栖牘無所施其德音而作者安可以今方古一概而論, SBCK: ''}

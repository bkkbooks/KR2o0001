  - {type: variant, offset: 7, length: 0, content: '', SBCK: 井井乎如珠之就繩炳炳乎如鑑之脫垢洋洋乎如韶之叶律而琴之定徽也乃起而歎曰邈哉淵乎先生之用心矣夫尚犮則詩書是資畜德則言行有頼故雖塵籍蠧編小辭淺􅀃罔不有至理存焉者聖賢固弗廢哉况知㡬以良}

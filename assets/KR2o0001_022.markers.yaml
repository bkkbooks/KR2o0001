  - {type: variant, offset: 3354, length: 94, content: 也案裴景仁秦記稱苻堅方食撫盤而詬王劭齊志述洛干感恩脫帽而謝及彥鸞撰以新史重規删其舊錄乃易撫盤以推案變脫帽為免冠夫近世通無案食胡俗不施冠冕直以事不類古改從雅言欲令學者何以考時俗之不同察古今之, WYG: ''}

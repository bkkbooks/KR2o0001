  - {type: variant, offset: 3244, length: 5, content: 藥稱王琳雅, WYG: 二十嵗矣而史云年八十五薨者何也如必以終時實年八十五則為徐州别駕止可年二十五六矣又云其未從官已前隠居三十餘載者但其初被檄時止年二十五六自此而往安}
  - {type: page-break, offset: 3244, content: '', id: KR2o0001_WYG_020-11a, image: WYG0685/WYG0685-0152c.png}

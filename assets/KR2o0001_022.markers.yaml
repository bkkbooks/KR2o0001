  - {type: variant, offset: 3308, length: 1, content: 來, WYG: 發因逗留不去守司東都杜門却掃凡經三載或有譖予躬為史臣不書國事而}
  - {type: variant, offset: 3310, length: 1, content: 證, WYG: 樂丘園私自著述者由}
  - {type: punctuation, offset: 3311, content: 。, id: KR2o0001_tls_022-bkkpn884}
  - {type: 'tls:seg', offset: 3311, content: '', id: KR2o0001_tls_022-17a.7}
  - {type: variant, offset: 3312, length: 5, content: 以漢初立槥, WYG: 驛召至京令専執史筆于時小人道長綱紀日壊仕於其間忽忽不樂遂與監修國史蕭至忠等諸官書求退曰僕幼聞詩禮長涉藝文至於史傳之言尤所耽恱尋夫左史右史是曰春秋尚書素王素臣斯稱微婉志晦兩京三國班謝陳習闡其謩中朝江左王陸干孫紀其厯劉石僭號方䇿委於和張宋齊應録惇史歸於蕭沈亦有汲冢古篆禹穴殘編}
  - {type: page-break, offset: 3312, content: '', id: KR2o0001_WYG_020-12b, image: WYG0685/WYG0685-0153b.png}
  - {type: punctuation, offset: 3317, content: ，, id: KR2o0001_tls_022-bkkpn885}

  - {type: variant, offset: 3306, length: 1, content: 刊, WYG: 載則不然何者其叙事也唯記一途直論一理而矛盾自顯表裏相乖非復抵捂直成狂惑者爾尋兹失所起良由作者情多忽略識惟愚滯或採彼流言不加銓擇或傳諸繆說即從編次用使真偽混淆是非參錯葢語曰君子可欺不可罔至如邪說害正虚詞損實小人以為信爾君子知其不然語曰盡信書不如無書葢為此也夫書彼竹帛事非容易凡為國史可不慎諸其十四條忤時第十三孝和皇帝時韋武弄權母媪預政凡有附麗之者起家而綰朱紫予以無所傅㑹取擯當時一為中允四載不遷㑹天子還京師朝廷願從者衆予求番次在大駕}

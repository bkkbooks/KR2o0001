  - {type: variant, offset: 2310, length: 2, content: 闊略, WYG: 伯夷介若黔敖茍居此職終不患於貧餒者如胡威之别其父也一縑之財猶且發問則千石之俸其費安施料以牙籌推以食箸察其厚薄知不然矣或曰觀諸史所載兹流非一如張湛為蜀郡乗折轅車吳隠之為廣川貨犬待客並其類也必以多為證則足可無疑然人自有身安弊緼口甘麄糲}

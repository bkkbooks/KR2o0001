  - {type: variant, offset: 1243, length: 0, content: '', WYG: 黄帝堯舜軼事時時見於他說余擇其言尤雅者著為本紀書首若如向之所述豈可謂之雅邪其二條又史記滑稽傳孫叔敖為楚相楚王以霸病死居數年其子窮困負薪優孟即為孫叔敖衣冠抵掌談語嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟為夀王大驚以為孫叔敖復生欲以為相難}
  - {type: page-break, offset: 1243, content: '', id: KR2o0001_WYG_020-2b, image: WYG0685/WYG0685-0148b.png}
  - {type: punctuation, offset: 1244, content: ：, id: KR2o0001_tls_022-bkkpn353}

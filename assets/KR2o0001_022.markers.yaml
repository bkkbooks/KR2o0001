  - {type: punctuation, offset: 1244, content: 「, id: KR2o0001_tls_022-bkkpn354}
  - {type: variant, offset: 1244, length: 0, content: '', WYG: 葢語有之人心不同有如其面故窳隆異等修短殊姿皆稟之自然得諸造化非由倣傚俾有遷革如優孟之象孫叔敖也衣冠談說容或亂真眉目口鼻如何取類而楚王與其左右曾無疑惑者邪昔陳隼既亡累年而活秦諜從縊六日而}
  - {type: variant, offset: 1245, length: 3, content: 建嘗責, WYG: 遂使竹帛顯書今古稱怪況叔敖之没時日已久楚王必謂其復生也先當詰其枯骸再肉所由闔棺重開所以豈有片言不接一見無疑遽欲加以寵榮復其禄位此乃類夢中行事豈人倫所為者哉其三條又史記田敬仲世家曰田常成子以}
  - {type: page-break, offset: 1245, content: '', id: KR2o0001_WYG_020-3a, image: WYG0685/WYG0685-0148c.png}
  - {type: variant, offset: 1249, length: 2, content: 將軍, WYG: 斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子難曰夫人既從物故然後加以易名田常見存而遽呼以諡此之}
  - {type: variant, offset: 1252, length: 4, content: 薦賢待士, WYG: 實明然可知又按左氏傳石碏曰陳桓公方有寵於王論語陳司敗問孔子昭公知禮乎史記家令說太上皇曰髙祖雖子人主也諸如此說其例皆同然而事由過誤易為筆削若田氏世家之論成子也乃結以韻語簒成歌詞欲加刋正無可釐革故獨舉其失以為標冠云其四條又史記仲尼弟子列傳曰孔子既没有若狀似孔子弟子相與共立為師事之如夫子他日弟子進問曰昔夫子甞行使弟子持雨具已而果雨商瞿長無子母為取家孔子曰瞿年四十後當有五丈夫子已而果然敢問夫子何以知之有若嘿然無應弟子起曰有若避此非子之坐也難曰孔門弟子七十二人柴愚參魯宰言游學師商可方回賜非類此並聖人品藻優劣已詳門徒商搉臧否又定如有若者名不𨽻於四科譽無偕於十哲逮尼父既没方取為師以不答所問始令避坐同稱達者何見事之晚乎且退老西河取疑夫子猶使喪明致罰投杖謝愆何肯公然自欺詐相䇿奉此乃童兒相戲非復長老所為觀孟軻著書首陳此說馬遷裁史仍習其言得自委巷曾無先覺悲夫其五條又史記}

  - {type: variant, offset: 173, length: 208, content: 後來之龜鏡既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史經史之目於此分焉嘗試言之曰經猶日也史猶星也夫杲日流景則列星寢耀桑榆既夕而辰象粲然故史漢之文當乎尚書春秋之世也則其言淺俗涉乎委巷垂翅不舉懘籥無聞逮於戰國已降去聖彌遠然後能露其鋒穎倜黨不羈故知人才有殊相去若是校其優劣詎可同年自漢已降幾將千載作者相繼非復一家求其善者蓋亦幾矣夫班馬執簡既五經之罪人而晉宋殺青又三史之不若譬夫王霸有別粹駁相懸才難不其甚, SBCK: 係}

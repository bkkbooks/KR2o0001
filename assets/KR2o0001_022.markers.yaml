  - {type: variant, offset: 2713, length: 273, content: 而撰永安記率是支言非不幸也蓋作者言雖簡略理皆要害故能疏而不遺儉而無闕璧如用奇兵者持一當百能全克敵之功也若才乏儁穎思多昏滯費詞既甚敍事纔周亦猶售鐵錢者以兩當一方成貿遷之價也然則史漢已前省要如彼國晉已降煩碎如此國謂三國志晉謂晉書也必定其妍媸甄其善惡夫讀古史者明其章句皆可詠歌觀近史者悅其緒言直求事意而已是則一貴一賤不言可知無假榷揚而其理自見矣昔文章既作比興由生鳥獸以媲賢愚草木以方男女詩人騷客言之備矣洎乎中代其體稍殊或擬人必以其倫或述事多比於古當漢氏之臨天下也君實稱帝理異殷周子乃封王名非魯衛而作者猶謂帝家為王室公輔為王臣盤石加建侯之言帶河申俾侯之誓, WYG: ''}

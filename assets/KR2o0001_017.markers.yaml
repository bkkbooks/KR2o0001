  - {type: variant, offset: 10, length: 0, content: '', SBCK: 兹實録語曰三人成市虎斯言其得之者乎馬遷持論稱堯舜無許由應劭著録云漢代無王喬其言讜矣至士安撰高士傳具説箕山之跡令昇作搜神記深信葉縣之靈此並向聲背實捨真從偽知}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 兹實録語曰三人成市虎斯言其得之者乎其三條馬遷持論稱堯世無許由應劭著録云漢代無王喬其言儻矣至士安撰高士傳具説箕山之蹟令昇作搜神記深信葉縣之靈此並向聲背實捨真從偽知}
  - {type: variant, offset: 10, length: 0, content: '', krp: 兹實録語曰三人成市虎斯言其得之者乎馬遷持論稱堯舜無許由應劭著録云漢代無王喬其言讜矣至士安撰高士傳具説箕山之跡令昇作搜神記深信葉縣之靈此並向聲背實捨真從偽知}
  - {type: variant, offset: 11, length: 2, content: 毛孔, SBCK: 故為罪之甚者近宋臨川王義慶著世説新語上敘兩漢三國及晉中朝江左事劉峻註釋摘其瑕疵偽跡昭然理難文飾而皇家撰晉史多取此書遂採康王之妄言違孝標之正説以此書事奚其厚顔漢吕后以婦人稱制事同王者班氏次其年月雖與諸帝同編而記其事跡實與后妃齊貫皇家諸學士撰晉書首發凡例首故云首發凡例序例一卷晉書之而云班漢皇后除王吕之外不為作傳並編敘行事寄出外戚篇所不載者唯元后耳安得輒引吕氏以為例乎蓋由讀書不精識事多闕徒以本記標目以編高后之年遂疑外戚裁篇輒敘娥姁之事其為率略不亦甚邪揚王孫布囊盛屍祼身而􅁙伊籍對吴以一拜一起未足為勞求兩賢立身各有此一事而已而漢書蜀志為其}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_SBCK_017-3a}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_SBCK_017-3b}
  - {type: variant, offset: 11, length: 2, content: 毛孔, WYG: 故為罪之甚者其四條近者宋臨川王義慶著世説新書上敘兩漢三國及晉中朝江左事劉峻註釋摘其瑕疵偽蹟昭然理難文飾而皇家撰晉史多取此書遂採康王之妄言違孝標之正説以此書事奚其厚顔其五條漢吕后以婦人稱制事同王者班氏次其年月雖與諸帝同編而記其事蹟實與后妃齊貫皇家諸學士撰晉書首發凡例序例一卷晉書之首故云首發凡例而云班漢皇后除王吕之外不為作傳並編敘行事寄出外戚篇所不載者惟元后耳安得輒引吕氏以為例乎蓋由讀書不精識事多闕徒以本紀標目以編高后之年遂疑外戚裁篇輒敘娥姁之事其為率略不亦甚耶其六條揚王孫布囊盛屍祼身而𦵏伊籍對吴以一拜一起未足為勞求兩賢立身各有此一事而已而漢書蜀志為其}

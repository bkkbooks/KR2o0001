  - {type: variant, offset: 8, length: 0, content: '', SBCK: 道鸞王隱檀是晉史之尤劣者方諸前代其陸賈禇先生之比歟道鸞不揆淺才好出竒語所謂欲益反損求妍更媸者矣臧氏晉書稱苻堅之竊號也雖疆宇狹於石虎至於人物則過之按後石之時爲前石虎爲後田融趙史謂勒也石張據􅀲涼李專巴蜀自遼而左人屬慕容沙漠而南地歸司馬逮於苻氏則兼而有之禹貢九州實得其八而言地劣於趙是何言歟夫識事未精而輕爲著述此其不知量也張勔抄撮晉史不求異同而備摘此言不從沙汰罪又甚矣夫學未該博鍳非詳正凡所修撰多聚異聞其爲踳駮難以覺悟按應劭風俗通載楚有葉君祠即葉公諸梁廟也而俗云孝明帝時有河東王喬為葉令嘗飛鳬入朝及干寶搜神記乃隱應氏所通而收其流俗恠説又劉敬昇異苑稱晉武庫失火漢高祖斬蛇劒穿屋而飛其言不經故梁武帝令殷芸編諸小説及蕭方等撰三十國史乃刋為正言}

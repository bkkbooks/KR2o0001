  - {type: variant, offset: 9, length: 0, content: '', SBCK: 而宋求漢事旁取令昇之書曄後漢書唐徵晉語近憑方等之録皇謂晉書家撰編簡一定膠漆不移故令俗之學者説鳬履登朝則云漢書舊記談蛇劒穿屋必曰晉典明文摭彼虚詞}

  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_017-1a}
  - {type: variant, offset: 0, length: 3, content: 補注第, WYG: 諸晉史東晉之史作者多門何氏中興實居其最而為晉學者曽未之知儻湮滅不行良可惜也王檀著書王隱檀道鸞是晉史之尤劣者方諸前代其陸賈禇先生之比歟道鸞不揆淺才好出竒語所謂欲益反損求妍更媸者矣其一條臧氏晉書稱苻堅之竊號也雖疆宇狹於石虎至於人物則過之按後石之時田融趙史謂勒為前石虎為後石也張據𤓰涼李專巴蜀自遼而左人屬慕容沙漠而南地歸司馬逮於苻氏則兼而有之禹貢九州實得其八而言地劣於趙是何言歟夫識事未精而輕為著述此其不知量也張勔抄撮晉史求其異同而被褐此言不從沙汰罪又甚矣其二條夫學未該博鍳非詳正凡所修撰多聚異聞其為踳駁難以覺悟按應劭風俗通載楚有葉君祠即葉公諸梁廟也而俗云孝明帝時有河東王喬為葉令嘗飛鳬入朝及干寶搜神記乃隱應氏所通而收其流俗怪説又劉敬昇異苑稱晉武庫失火漢高祖斬蛇劒穿屋而飛其言不經故梁武帝令殷芸編諸小説及蕭方等撰三}

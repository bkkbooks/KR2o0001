  - {type: variant, offset: 18, length: 10, content: 義以訓詁爲主亦猶春秋, SBCK: 日不接而隔越相偶使讀者瞀亂而不測驚駭而多疑嗟乎因斯而言則自古著書未能精讜書成絶筆而遽捐舊章遂令玉石同燼真偽難尋者不其痛哉周書一條今俗所行周史是令狐德棻等所撰其書文而不實雅而無檢真迹甚寡客氣尤煩尋宇文初習華風事由蘇綽至於軍國詞令皆準尚書太祖勑朝廷文悉准於此盖史臣所記皆禀其規栁虬}

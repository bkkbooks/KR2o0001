  - {type: variant, offset: 15, length: 0, content: '', SBCK: 前哲致議言之詳矣然楊能反經合義足矯奢􅁙之􅄽伊以敏辝辨對可免使乎之辱列諸篇第猶有可取近者皇家撰晉書著劉伶畢卓傳其敘事也直載其嗜酒沉湎悖禮亂德若斯而已為傳如此復何所取者哉本無劉舊晉史􅀘前史所闕畢傳皇家新撰以宋略一條裴幾原刪略宋史定為二十篇芟繁撮要實有其力而所録文章頗傷蕪穢如文帝除師傅官詔顔延年元后哀冊文顔峻討二凶檄孝武擬李夫人賦裴松之上柱國志表孔熈先罪許曜詞凡此諸文是尤不宜載者何則羡亮威權震主負芒猜忌将欲取之必先與之既而罪名具列刑書是正則先所降詔夲非實録而乃先後雙載坐令矛盾兩傷夫國之不造史有哀冊自晉宋已還多載於起居注詞皆虚飾義不足觀必以略言之故宜去也昔漢王數項袁公檄曹若不具録其文難以暴揚其過至於二凶為惡不言可知無俟檄数始明罪状必刊諸國史豈宜異同孝武作賦悼亡鍾心内寵情在兒女語非軍國松之所論者其事甚下兼復文理非工熈先構逆懷姧矯言欺衆且所為草藁本未宣行斯並同在編次不加銓擇豈非蕪濫者邪向若除此數文别存佗説則末年美事遺略蓋寡何乃應取而不取宜除而不除乎但近代國史通多此累有同自鄶無足致譏若裴氏者衆作之中所可與言史者故偏舉其事以申掎摭云後魏書二條宋書載佛狸之入冦也其間勝負蓋皆實録焉魏史所書謂魏收所撰者則全出沈本如事有可恥者則加減隨意依違飾言至如劉氏獻女請和太武師婚不許此言尤可恠也何者江左皇族水鄊庻姓若司馬劉蕭韓王或出於亡命或起自俘囚一詣桑乾皆成禁臠此皆魏史自述非佗國所傳然則北之重南其禮若此安有黃旗之主親屈己以求婚而白登之陣乃致疑而不納其言可欺不亦甚哉觀休文宋典誠曰不工必比伯起魏書更為良史而收每云我視沈約正如一傳出闗東風俗奴耳此可謂飭嫫母而誇西施持魚目而笑明月者也近者沈約晉書喜造竒説稱元帝牛金之子以應牛繼馬後之徵鄴中學者王邵宋孝王言之詳矣而魏收深嫉南國幸書其短著司馬叡傳遂具録休文所言又崔浩謟事狄君曲為邪説稱拓拔之祖本李陵之胄當時衆議抵斥事遂不行或有竊其書以渡江者沈約撰宋書索虜傳仍傳伯淵所述凡此諸妄其流甚多儻無迹可尋則真偽難辨者矣北齊書史三條王邵國史至於論戰争述紛擾賈其餘勇彌見所長至如敘文宣逼孝靖以受魏禪二王殺楊燕以廢乾明雖左氏載季氏逐昭公秦伯納重耳欒盈起於曲沃楚靈敗於乾溪殆可連類也又敘高祖破宇文於卭山周武自晉陽而平鄴雖左氏書城濮之役鄢陵之戰齊敗於鞍吴師入郢亦不是過也或問曰王劭齊志多記當時鄙言為是乎為非乎對曰古往今來名目各異區分壤隔稱謂不同所以晉楚方言齊魯俗語六經諸子載之多矣自漢已降風俗屢遷求諸史籍羞覩其事或君臣之目施諸朋友或尊官之稱属諸君父曲相崇敬標以處士王孫輕加侮辱號以僕夫舎長亦有荆楚訓多為夥廬江目橋為圯南呼北人曰傖西謂東胡曰虜渠們底反丁禮箇江左彼此之辭乃若君卿中朝汝我之義斯並因地而變隨時而革布在方冊無假推尋足以知甿俗之有殊驗土風之不類然自二京失守四夷稱制夷夏相雜音句尤媸而彦鸞伯起務存隱諱長謂姚長諱為藏盖為重規德棻志在文飾遂使中國數百年内其俗無得而言盖語曰知古而不知今謂之陸沉又曰一物不知君子所恥是則時無遠近事無巨細必藉多聞以成博識如今所謂者若中州名漢闗右稱羌易臣以奴呼母云姊主上有大家之號師人致兒郎之説凡如此例其流甚多必尋其本源莫詳所出閲諸齊志則了然可知由斯而言劭之所録其為益彌多矣足以開後進之䝉蔽廣來者之耳目㣲君懋吾幾靣墻於近事矣而子奈何妄加譏誚者哉皇家修五代史館中墜藁仍存皆因彼舊事定為新史觀其朱墨所圖鈆黃所拂猶可識者或以實為虚以是為非其北齊國史皆稱諸帝廟號及李氏之撰齊書伯藥謂李其廟號有犯時諱者文武皇帝諱也謂有世字犯太宗即稱諡焉至如變世祖為文襄改世宗為武成茍除兹世字而不悟襄成有别諸如此謬不可勝紀故其列}

  - {type: variant, offset: 8, length: 1, content: 既, WYG: 范曄後漢書唐徵晉語近憑方等之録謂皇家撰晉書編簡一定膠漆不移故令俗之學者説鳬履登朝則云漢書舊記稱蛇劒穿屋必曰晉典明文摭彼虚詞}

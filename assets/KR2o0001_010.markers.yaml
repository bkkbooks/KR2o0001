  - {type: variant, offset: 4, length: 0, content: '', SBCK: 内篇雜述辦識自叙雜述第三十四昔在三墳五典春秋檮杌即上代帝王之書中古諸侯之記行諸歴代以爲格言其餘外傳則神農嘗藥厥有本草夏禹敷土實著山經世本辨姓著自周室家語載言傳諸}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四昔在三墳五典春秋檮杌即上代帝王之書中古諸侯之記行諸歴代以為格言其餘外傳則神農嘗藥厥有本草夏禹敷土實著山經世本辨姓著自周室家語載言傳諸}

  - {type: variant, offset: 5, length: 0, content: '', WYG: 氏是知偏記小說自成一家而能與正史參行其所從來尚矣爰及近古斯道漸煩史氏流别殊途並騖㩁而為論其流有十焉一曰偏記二曰小錄三曰逸事四曰瑣言五曰郡書六曰家史七曰别傳八曰雜記九曰地理書十曰都邑簿夫皇王受命有始有卒作者著述詳略難均有權記當時不終一代若陸賈楚漢春秋樂資山陽公載記王韶晉}

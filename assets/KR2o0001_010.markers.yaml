  - {type: 'tls:seg', offset: 11, content: '', id: KR2o0001_tls_010-1a.3}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 盖不可勝紀始知流俗之士難與之言凢有異同蓄諸方寸及年過而立言悟日多常恨時無同好可與言者惟東海徐堅晚與之遇相得甚歡雖古者伯牙之識鍾期管仲之知鮑叔不是過也復有永城朱敬則沛國劉允濟吳興薛謙光河南元行沖陳留吳兢壽春裴懐古亦以言議見許道術相知所有搉揚得盡懐抱每云徳不孤必有鄰四海之内知我者不過數子而已矣昔仲尼以睿聖明哲天縦多能覩史籍之繁文懼覧者之不一刪詩爲三百篇約史記以脩春秋讃易道以黜八索述職方以除九丘討論墳典斷自唐虞以訖于周其文不刋爲後王法自兹厥後史籍逾多茍非命世大才孰能刋正其失嗟予小子敢當此任其於史傳也嘗欲自班馬已降迄于李令狐顔孔諸書莫不因其舊義普加􅁵革但以無夫子之名而輙行夫子之事將恐驚末俗取咎時人徒有其勞而莫之見賞}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_SBCK_010-10b}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 盖存夫愛禮恡彼典刑者乎昔邱明之修傳也以避時難子長之立記也藏於名山班固之成書也出自家庭陳壽之為志也創於私室然則古來賢雋立言垂後何必身居􅅟宇跡參僚屬而後成其事乎是以深識之士知其若斯退居清淨杜門不出成其一家獨斷而已豈與夫冠猴獻狀評議其得失者哉自敘第三十六予幼奉庭訓早遊文學年在紈綺便受古文尚書每苦其辭艱瑣難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聴逮講畢即為諸兄說之因竊歎曰若使書皆如此吾不復怠矣先君竒其意於是始授以左氏朞年而講誦都畢于時年甫十有二矣所講雖未能深解而大義略舉父兄欲令博觀議疏精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既欲知古今㳂革厯數相承於是觸類而觀不假師訓自漢中興已降迄乎皇家實錄年十有七而窺覽略周其所讀書多因假賃雖部帙殘缺篇題有遺題音第至於敘事之紀綱立言之梗槩亦粗知之矣但于時將求仕進兼習揣摩至於專心諸史我則未暇洎年登弱冠射策登朝於是思有餘間遂其本願旋游京洛頗積嵗年公私借書恣情披閱至如一代之史分為數家其間雜記小書又競為異說莫不鑚研穿鑿盡其利害加以自小觀書喜談名理其所悟者皆得諸衿腑非由染習故始在總角讀班謝兩漢便怪前書不應有古今人表後書宜為更始立紀當時聞者共責以童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范曄集果以二史為非其有暗合於古人者盖不可勝紀始知流俗之士難與之言凡有異同蓄諸方寸及年以過立言悟日多常恨時無同好可與言者維東海徐堅晚與之遇相得甚歡雖古者伯牙之識鍾期管仲之知鮑叔不是過也復有永城朱敬則沛國劉允濟吳興薛謙光河南元行沖陳留吳兢壽春裴懐古亦以言議見許道術相知所有㩁揚得盡懐抱每云徳不孤必有鄰四海之内知我者不過數子而已矣昔仲尼以睿聖明哲天縦多能覩史籍之繁文懼覽之者不一刪詩為三百篇約史記以修春秋讚易道以黜八索述職方以除九邱討論墳典斷自唐虞以訖于周其文不刋為後王法自兹厥後史籍逾多茍非命世大才孰能刋正其失嗟予小子敢當此任其於史傳也嘗欲自班馬已降迄于姚李令狐顔孔諸書莫不因其舊義頗加􅁵革但以無夫子之名而輒行夫子之事將恐致驚愚俗取咎時人徒有其勞而莫之見賞}

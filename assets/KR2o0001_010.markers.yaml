  - {type: variant, offset: 6, length: 0, content: '', WYG: 陸紀姚梁後略此之謂偏記者也普天率土人物𢎞多求其行事罕能周悉則有獨舉所知編為短部若戴逵竹林名士王粲漢末英雄蕭世誠懐舊志盧子行知巳傳此之謂小錄者也國史之任記事記言視聴不該必有遺逸於是好竒之士補其所亡若和嶠汲冡紀年葛洪西京雜記顧協璅語謝綽拾遺此之謂逸事者也街談巷議時有可觀小說為言猶賢於已故好事君子無所棄諸若劉義慶世說裴榮期語林孔思尚語錄陽松玠談藪此之謂瑣言者也汝潁奇士江漢英靈人物所生載光郡國故鄉人學者編而記之若周稱陳留耆舊周裴汝南先賢陳壽益部耆舊虞預㑹稽典錄此之謂郡書者也髙門華胄奕世載徳才子承家思顯父母由是紀其先烈貽厥後來若揚雄家牒殷敬世傳孫氏譜記陸宗系厯此之謂家史者也賢士貞女類聚區分雖百行殊途而同歸於善則有取其所好各為之錄若劉向列女梁鴻逸民趙採忠臣徐廣孝子此之謂别傳者也隂陽為炭造化為工流形賦象于何不育求其怪物有廣異聞若祖台志怪干寳搜神劉義慶幽明劉敬叔異苑此之謂雜記者也九州土宇萬國山川物産殊宜風化異俗如各志其本國足以明此一方若盛𢎞之荆州記常璩華陽國志辛氏三秦羅含湘中此之謂地理書者也帝王枽梓列聖遺塵經始之制不常厥所茍能書其􅁤則可以龜鏡將來若潘岳闗中陸機洛陽三輔黄圖建康宫殿此之謂都邑簿者也大抵偏記小錄之書皆記即日當時之事求諸國史最為實錄然皆言多鄙朴事罕圓備終不能成其不刋永播來葉徒為後生作者削藁之資焉逸事皆前史所遺後人所記求諸異說為益實多及妄者為之則茍載傳聞而無銓擇由是真偽不别是非相亂如郭子横之洞㝠王子年之拾遺全搆虚辭用驚愚俗此其為弊之甚者也瑣言者多載當時辨對流俗嘲謔㑭夫樞機者藉為舌端談話者將為口實乃蔽者為之則有詆訐相戲施諸祖宗䙝狎鄙言出自牀第莫不昇之紀錄用為雅言固以無益風規有傷名教者矣郡書者矜其鄉賢美其邦族施於本國頗得流行置於他方罕聞愛異其有如常璩之詳審劉炳之該博而能傳諸不朽見羙來裔者盖無幾焉家史者事惟三族言止一門正可行於家室難以播於邦國且箕裘不墮則其錄雖存茍薪搆已亡則斯文亦喪者矣别傳者不出胸臆非由機杼徒以博採前史聚而成書其有足以新言加之别說者盖不過十一而已如寡聞末學之流則深所嘉尚至於探幽索隠之士則無所取材雜記者若論神仙之道則服食鍊氣可以益壽延年語魑魅之途則福善禍淫可以懲惡勸善斯則可矣及繆者為之則茍談怪異務述妖邪求諸𢎞益其義無取地理書者若朱贛所採浹於九州闞駟所書殫於四國斯則言皆雅正事無偏黨者矣其有異於此者則人自以為樂土家自以為名都競美所居談過其實又城池舊跡山水得名皆傳諸委巷用為故實鄙哉都邑簿者如宫闕陵廟街􅌀郭邑辨其規模明其制度斯則可矣及愚者為之則煩而且濫博而無限故論榱棟則尺寸皆書記草木則根株必數務求詳審持此為能遂使學者觀之瞀亂而難紀也於是考兹十品徵彼百家則史之雜名其流盡於此矣至於其間得失紛糅善惡相兼既難為覼縷故粗陳梗槩且同自鄶無足譏焉又按子之將史本為二說然如吕氏淮南𤣥晏抱朴凡此諸子多以敘事為宗舉而論之抑亦史之雜也但以名目有異不復編於此科盖語曰衆星之明不如一月之光歴觀自古作者著述多矣雖復門千戸萬波委雲集而言皆瑣碎事必藂殘固難以接光塵於五傳並輝烈於三史古人以比玉屑滿篋良有㫖哉然則芻蕘之言明王必擇葑菲之體詩人不棄故學者有博聞舊事多識其物若不窺别錄不討異書専治周孔之章句直守遷固之紀傳亦何能自致於此乎且夫子有云多聞擇其善者而從之知之次也茍如是則書有非聖言多不經學者博聞盖在擇之而已辨識第三十五夫設官分職佇勣課能欲使上無虚稱下無虚受其難矣哉昔漢文帝幸諸將營而目周亞夫為真将軍嗟乎必於史職求其若斯乃為難遇者矣史之為務厥途有三焉何則彰善貶惡不避强禦若晉之董狐齊之南史此其上也編次勒成鬱為不朽若魯之邱明漢之子長此其次也髙才博學名重一時若周之史佚楚之倚相此其下也苟三者竝闕復何為者哉昔魯叟之修春秋也不藉三相之勢漢臣之著史記也無假七貴之權而近古每有撰述必以大臣居首按晉起居注載康帝詔盛稱著述任重理藉親覽遂以武陵王領秘書監尋武陵才非河獻識異淮南而輒以彼藩翰董斯邦籍求之稱職無聞焉爾既而齊撰國史和士開總知唐修本草徐世勣監綂夫使辟陽長信指撝南董之前周勃張飛彈壓桐雷之右斯亦怪矣大抵監史為難斯乃尤之尤者若使直若南史才如馬遷精勤不􅈈若揚子雲諳識故事若應仲遠兼斯具美督彼羣才使載言記事藉為模楷搦管操觚歸其準的斯則可矣但今之従政則不然凡居斯職者必恩幸貴臣凡庸賤品飽食安步坐嘯畫諾若斯而已矣夫人既不知善之為善則亦不知惡之為惡故凡所引進皆非其才或以勢利見升或以干祈致擢遂使當官効用江左以不樂為謡拜職辨名洛中以不閒為說言之可為大噱可為長歎也曽試論之世之従仕者若使之為將也而才無韜略使之為吏也而術靡循良使之屬文也而匪閑於辭賦使之講學也而不習於經典斯則負乗致冦悔􅈔旋及雖五尺童兒猶知調笑者矣唯夫修史者則不然或當官卒嵗竟無刋述而人莫之知也或輒不自揆輕弄筆端而人莫之見也由斯而言彼史曹者崇扄峻宇深附九重雖地處禁中而人同方外可以養拙可以藏愚繡衣直指所不能繩强項申威所不能及斯固素食之窟宅尸祿之淵藪也凡有}

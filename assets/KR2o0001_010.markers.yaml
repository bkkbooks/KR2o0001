  - {type: variant, offset: 13, length: 1, content: 敍, krp: 每握管歎息遲回者乆之非𣣔之而不能實能之而不𣣔也既朝廷有知意者遂以載筆見推由是三為史臣再入東觀初即位又除著作長安中以本官則天朝為著作佐郎轉左史今上又以本官兼修國史迄今之不改今之史館即兼修國史㑹遷中書舍人暫罷其任神龍元年觀也古之東每惟皇家受命多歴年所史官所編粗惟記錄至於紀傳及志則皆未有其書長安中年㑹奉詔預脩唐史及今上即位又勑撰則天大聖皇后實錄凡所著述常𣣔行其舊議而當時同作諸士及監修貴臣每與其鑿枘相違齟齬難入故其所載削皆與俗沉浮雖自謂依違茍従然猶大為史官所嫉嗟乎雖任當其職而吾道不行見用於時而美志不遂欝快孤憤無以寄懐必寢而不言嘿而無述又恐歿世之後誰知予者故退而私撰史通以見其志昔漢世劉安著書號曰淮南子其書牢籠天地博極古今上自太公下至商鞅其錯綜經緯自謂兼於數家無遺力矣然自淮南已後}

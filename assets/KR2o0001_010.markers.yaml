  - {type: variant, offset: 173, length: 2, content: 他皆, SBCK: 敘傳其自比於馮敬通者有三而予輒不自揆亦竊比於揚子雲者有四焉何者揚雄嘗好雕蟲小伎老而悔其少作余糿喜詩賦而壯都不為耻以文士得名期以述者自命其似一也揚雄草􅀇累年不就當時聞者莫不哂其徒勞余撰史通亦屢移寒暑悠悠塵俗共以為愚其似二也揚雄撰法言時人竸尤其妄故作解嘲以詶之余著史通見者亦互言其短故作釋䝉以拒之其似三也揚雄少為范踆劉歆所重及聞其撰太􅀇經則嘲以恐盖醤瓿然劉范之重雄者盖貴其文彩}

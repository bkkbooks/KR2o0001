  - {type: variant, offset: 172, length: 0, content: '', SBCK: 及上窮王道下掞人倫總括萬殊包吞千有自法言已降迄于文心而往以納諸胸中曽不慸芥者矣夫其為義也有與奪焉有褒貶焉有諷剌焉其為貫穿者深矣其爲網羅者宻矣其所商略者逺矣其所發明者多矣盖談經者惡聞服杜之嗤論史者憎言班馬之失而此書多譏往哲喜述前非獲罪於時固其冝矣猶冀知音君子時有觀焉尼父有云罪我者春秋斯之謂也昔梁徵士劉孝標}

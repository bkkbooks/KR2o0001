  - {type: variant, offset: 9, length: 0, content: '', SBCK: 雖無老成人尚有典刑觀歴代之置史臣有同嬉戯而竟不廢其職者盖存夫愛禮恡彼典刑者乎昔丘明之修傳也以避時難子長之立記也藏於名山班固之成書也出自家庭陳壽之為志也創於私室然則古來賢雋立言垂後何必身居􅅟宇跡參僚屬而後成其事乎是以深識之士知其若斯退居清淨杜門不出成其一家獨斷而已豈與夫冠猴獻狀評議其得失者哉自叙第三十六予糿奉庭訓早逰文學年在紈綺便愛古文尚書每苦其辭艱􅃈難為諷讀雖屢逢捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聴逮講畢即為諸兄說之因切歎曰若使書皆如此吾不復怠矣先君竒其意於是始授以左氏朞年而講誦都畢于時年甫十有二矣所諜雖未能深解而大義略舉父兄欲令􅀶觀議䟽精此一經辭以獲麟已後未見其事乞且觀餘部以廣異聞次又讀史漢三國志既􅁒知古今㳂革暦數相承於是觸類而觀不假師訓自漢中興已降迄乎皇家實錄年十有七而窺覧略周其所讀書多因假賃雖部帙殘缺篇第有遺至於叙事之紀綱立言之梗槩亦粗知之矣但于時將来仕進兼習揣摩至於專心諸史我則未暇洎年登弱冠射策登朝於是思有餘閑獲遂本願旋逰京洛頗積嵗年公􅀻借書恣情披閱至如一代之史分為數家其間雜記小書又兢為異說莫不鑚研穿鑿盡其利害加以自小觀書喜談名理其􅀁悟者皆得諸襟腑非由染習故始在總角讀班謝兩漢便恠前書不應有古今人表後書宜為更始立紀當時懵者共責以童子何知而敢輕議前哲於是赧然自失無辭以對其後見張衡范曄集}

  - {type: variant, offset: 1217, length: 4, content: 賈誼過秦, SBCK: 不以􅅊孟冠首並其失也班固稱項羽弑義帝自取天亡又云于公髙門以待封嚴毋掃地以待䘮如固斯言則深信夫天怨神怒福善禍􅁋者矣至扵其賦幽通也復以天命乆定非理所移故善惡無徵報施多爽斯則同理異􅀃前後自相矛盾者焉或問張輔著班馬優劣}
  - {type: variant, offset: 1217, length: 4, content: 賈誼過秦, krp: 如彼其煩也則如此求諸折中未見其宜班氏漢書全取史記仍去其日者倉公等傳以為其事煩蕪不足編次故也若使遷固易地而處撰成漢書將恐多言費辭有踰班固安得以此而定其優劣耶漢書㫁章事終新室如叔皮存沒時入中興而輙引與前書共編者盖序傳之常例者耳荀恱既刪略班史勒成漢紀而彪}
  - {type: punctuation, offset: 1219, content: 《, id: KR2o0001_tls_016-bkkpn290}

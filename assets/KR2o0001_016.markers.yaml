  - {type: variant, offset: 1176, length: 0, content: '', SBCK: 識有不該思之未審耳昔春秋之時齊有夙沙衛者拒晉殿師郭最稱辱伐魯行唁臧堅抉死此閹官見鄙其事􅀹著者也而太史公與任少卿書論自古刑餘之人為士君子􅀁賤者唯以彌子瑕為始何淺近之甚邪但夙沙出左氏傳漢代其書不行故子長不之見也夫博考前古而捨兹不載至扵乗傳車探禹穴亦何為者哉魏世家太史公曰􅀃者皆曰魏以不用信陵君故􅀦削弱至扵亡余以為不然天方令秦平海内其業未成魏雖得阿衡之徒曷益乎夫論成敗者固當以人事為主必惟命而言則其理悖矣蓋晉之獲也由夷吾之愎諫秦之㓕也由胡亥之無道周之季也由幽王之惑褒姒魯之逐也由稠父之違子家然則敗晉扵韓狐突已志其兆亡秦者胡始皇乆銘其􅀃檿弧箕服章扵宣厲之年徵褰與襦顯自文成之世惡名早著天孽難逃假使彼四君才若桓文德同湯武其若之何苟推此理而言則亡􅀦之君他皆倣此安得扵魏無譏責者㦲夫􅀦之將亡也若斯則其將興也亦然蓋魏後之為公子也其筮曰八世莫之與京畢氏之為大夫也其占曰萬名其後必大􅁎宗之在水滸也鸑鷟鳴扵岐}

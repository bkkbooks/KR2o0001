  front:
  - {type: variant, offset: 0, length: 2, content: 載文, SBCK: 史通卷}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_016-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 二十五條春秋二條按春秋之書弑也稱君君無道稱臣臣之罪如齊之簡公未聞失德陳恒構逆罪莫大焉而哀十四年書齊人弑其君壬于舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子追書其事豈由以索續組不類将聖之能者乎何其乖刺也其一條按春秋左氏傳釋經云滅而不有其地曰入如入陳入衞入鄭入許即其義也至柏舉之役子常之敗庚辰吴入獨書以郢夫諸侯列爵並建國都惟取國名不稱都號何為郢之見入遺其楚名比於他例一何乖踳尋二傳所}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_WYG_016-1b, image: WYG0685/WYG0685-0119b.png}
  - {type: variant, offset: 0, length: 2, content: 載文, krp: 史通卷}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 皆云入楚豈左氏之本獨為謬歟其二條左氏傳二條左氏之敘事也述行師則簿領盈視叱聒沸騰論偹火則區分在目修飾峻整言勝㨗則收獲都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱譎詐則欺誣可見談恩惠則煦如春日紀嚴切則凜若秋霜敘興邦則滋味無量陳亡國則淒凉可憫或腴辭潤簡牘或美句入詠歌跌宕而不群縱橫而自得若斯才者殆将工侔造化思渉鬼神著述罕聞古今卓絶如二傳之敘事也榛蕪溢句疣贅滿行華多而少實言拙而寡味若必方於左氏也非惟不可為魯衞之政差肩雁行亦有雲泥路阻君臣禮隔者矣左傳稱仲尼曰鮑莊子之智不如葵葵猶能衞其足夫有生而無識有質而無性者其惟草木乎然自古設比興而以草木方人者皆取其善惡薰蕕榮枯貞脆而已必言其含靈畜智隱身遠禍則無其義也尋葵之向日傾心本不衞足由人覩其形似强為立名亦由今俗}
  - {type: page-break, offset: 1, content: '', id: KR2o0001_WYG_016-2a, image: WYG0685/WYG0685-0120a.png}
  - {type: page-break, offset: 1, content: '', id: KR2o0001_WYG_016-2b, image: WYG0685/WYG0685-0120b.png}
  - {type: variant, offset: 2, length: 3, content: 第十六, WYG: 士謂鳥鳴為啼花發為笑花之與鳥安有啼笑之情哉必以人無喜怒不知哀樂便云其智不如花花猶善􅀏其智不如鳥鳥猶善啼可謂之讜言哉如鮑莊子之智不如葵葵猶能衞其足即其例也而左氏録}
  - {type: page-break, offset: 2, content: '', id: KR2o0001_WYG_016-3a, image: WYG0685/WYG0685-0120c.png}
  - {type: xml-element, offset: 5, content: '', id: KR2o0001_tls_016-bkkxmlele1}

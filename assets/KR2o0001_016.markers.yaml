  - {type: variant, offset: 1160, length: 0, content: '', SBCK: 類而劉揚服其善叙事也何哉太史公撰孔子世家多採論語舊􅀃至管晏列傳則不取其本書晏子也謂管子以為時俗􅀁有故不復更載也按論語行扵講肆列扵學官重加編勒秪覺煩費如管晏者諸子雜家經史外事弃而不録}
  - {type: page-break, offset: 1160, content: '', id: KR2o0001_SBCK_016-6a}
  - {type: variant, offset: 1160, length: 0, content: '', WYG: 類而劉揚服其善叙事也何哉其二條太史公撰孔子世家多採論語舊説至管晏列傳則不取其本書謂管子晏子也以為時俗所有故不復更載也按論語行於講肆列於學宫重加編勒祗覺煩費如管晏者諸子雜家經史外事棄而不録}
  - {type: page-break, offset: 1160, content: '', id: KR2o0001_WYG_016-6a, image: WYG0685/WYG0685-0122a.png}
  - {type: variant, offset: 1160, length: 0, content: '', krp: 類而劉揚服其善叙事也何哉太史公撰孔子世家多採論語舊說至管晏列傳則不取其本書晏子也謂管子以為時俗所有故不復更載也按論語行扵講肆列扵學官重加編勒秪覺煩費如管晏者諸子雜家經史外事弃而不録}
  - {type: variant, offset: 1161, length: 0, content: '', SBCK: 杜異聞夫以可除而不除宜取而不取以兹著述未覩厥義昔孔子力可翹関不以力稱何則大聖之德具美者衆不可以一介標末持為百行端首也至如達者七十分以四科而太史公述儒林則不取㳺夏之文學著循吏則不言冉季之政事至於貨殖為傳獨以子貢居先掩惡揚善旣忘此義成人之美不其缺如司馬遷序傳云為太史公十年而遭李陵之禍幽扵縲絏廼喟然而嘆曰是予之罪也身虧不用矣自叙如此何其畧哉夫云遭李陵之禍幽扵縲絏者乍似同陵䧟沒遂寘扵刑又似為陵所䧟獲罪扵國遂令讀者難}
  - {type: page-break, offset: 1161, content: '', id: KR2o0001_SBCK_016-6b}
  - {type: variant, offset: 1161, length: 0, content: '', WYG: 杜異聞夫以可除而不除宜取而不取以兹著述未覩厥義其三條昔孔子力可翹闗不以力稱何則大聖之德具美者衆不可以一介末事持為百行端首也至如達者七十分以四科而太史公述儒林則不取㳺夏之文學著循吏則不言冉季之政事至於貨殖為傳獨以子貢居先掩惡揚善旣忘此義成人之美不其闕如其四條司馬遷序傳云為太史七十年而遭李陵之禍幽於縲絏廼喟然而歎曰是予之罪也身虧不用矣自叙如此何其略哉夫云遭李陵之禍幽於縲絏者乍似同陵䧟沒遂寘於刑又似為陵所間獲罪於國遂令讀者難}

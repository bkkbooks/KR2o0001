  - {type: variant, offset: 312, length: 824, content: 已下則訛謬雷同榷而論之其失有五一曰虛設二曰厚顏三曰假手四曰自戾五曰一概何者昔大道爲公以能而授故堯咨爾舜舜以命禹自曹馬已降其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓迹實同於莽卓言乃類於虞夏且始自納陛迄於登壇彤弓盧矢新君膺九命之錫白馬侯服舊主蒙三恪之禮徒有其文竟無其事此所謂虛設也古者兩軍爲敵二國爭雄自相稱述言無所隱何者國之得喪如日月之蝕焉非由飾辭矯說所能掩蔽也逮於近古則不然曹公歎蜀主之英略曰劉備吾儔周帝美齊宣之強盛云高歡不死或移都以避其鋒或斷冰以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顏也古者國有詔命皆人主所爲故漢光武時第五倫爲督鑄錢掾見詔書而歎曰此聖主也一見決矣至於近古則不然凡有詔敕皆責成羣下但使朝多文士國富辭人肆其筆端何事不錄是以每發璽誥下綸言申惻隱之渥恩敍憂勤之至意其君雖有反道敗德唯頑與暴觀其政令則辛癸不如讀其詔誥則勳華再出此所謂假手也蓋天子無戲言茍言之有失則取尤天下故漢光武謂龐萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所慎至於近古則不然凡百具寮王公卿士始有褒崇則謂其珪璋特達善無可加旋有貶黜則比諸斗筲下才罪不容責夫同爲一士之行同取一君之言愚智生於倏忽是非變於俄頃帝心不一皇鑒無恆此所謂自戾也夫國有否泰世有污隆作者形言本無定準故觀猗與之頌而驗有殷方興覩魚藻之刺而知宗周將殞至於近代則不然夫談主上之聖明則君盡三五述宰相之英偉則人皆二八國止方隅而言併吞六合福不盈眥而稱感致百靈雖人事屢改而文理無易故善之與惡其說不殊欲令觀者疇爲準的此所謂一概也於是考茲五失以尋文義雖事皆形似而言必憑虛夫鏤冰爲璧不可得而用也畫地爲餅不可得而食也是以行之於世則上下相蒙傳之於後則示人不信而世之作者恆不之察聚彼虛說編而次之創自起居成於國史連章疏錄一字無廢非復史書更成文集若乃歷選衆作求其穢累王沈魚豢是其甚焉裴子野何之元抑其次也陳壽干寶頗從簡約猶時載浮訛罔盡機要唯王劭撰齊隋二, SBCK: ''}

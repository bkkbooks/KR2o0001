  - {type: variant, offset: 1222, length: 0, content: '', SBCK: 云遷敘三千年事五十萬言固敘二百年事八十萬言是固不如遷也斯言為是乎荅曰不然也按太史公書上􅁸黃帝下盡宗周年代雖存事跡殊畧至扵戰國已下始有可觀然遷雖敘三千年事其間詳備者唯漢興七十餘載而已其省也}

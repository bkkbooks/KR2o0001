  - {type: variant, offset: 1202, length: 0, content: '', SBCK: 扵事終則言其自敘}
  - {type: variant, offset: 1202, length: 0, content: '', krp: 扵事終則言其自敘}
  - {type: variant, offset: 1203, length: 2, content: 詩有, SBCK: 此著述之體不當如是耶馬卿為自敘傳具在其集中子長因録斯篇即為列傳班氏仍舊曾無改奪固扵馬楊傳末皆云遷雄之自敘如此至扵相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純漢書東方朔傳委􅃈煩碎不類諸篇且不述其亡殁嵗時及子孫繼嗣正與司馬遷楊雄傳相類尋其傳體必曼倩之自敘也但班氏脫略故世莫之知蘇子卿父建行事甚寡􅅊玄成父孟德業稍多漢書編蘇氏之傳則先以蘇建標名列}
  - {type: page-break, offset: 1203, content: '', id: KR2o0001_SBCK_016-11b}
  - {type: page-break, offset: 1203, content: '', id: KR2o0001_SBCK_016-12a}
  - {type: variant, offset: 1203, length: 2, content: 詩有, krp: 此著述之體不當如是耶馬卿為自敘傳具在其集中子長因録斯篇即為列傳班氏仍舊曾無改奪固扵馬楊傳末皆云遷雄之自敘如此至扵相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純漢書東方朔傳委瑣煩碎不類諸篇且不述其亡殁嵗時及子孫繼嗣正與司馬遷楊雄傳相類尋其傳體必曼倩之自敘也但班氏脫略故世莫之知蘇子卿父建行事甚寡韋玄成父孟德業稍多漢書編蘇氏之傳則先以蘇建標名列韋相之篇則不以}
  - {type: variant, offset: 1206, length: 9, content: 孟諷諫賦有趙壹嫉邪, SBCK: 相之}
  - {type: punctuation, offset: 1207, content: 《, id: KR2o0001_tls_016-bkkpn284}
  - {type: variant, offset: 1207, length: 2, content: 諷諫, krp: 冠首並其失也班固稱項羽弑義帝自取天亡又云于公髙門以待封嚴毋掃地以待䘮如固斯言則深信夫天怨神怒福善禍淫者矣至扵其}
  - {type: punctuation, offset: 1209, content: 》, id: KR2o0001_tls_016-bkkpn285}
  - {type: punctuation, offset: 1209, content: ，, id: KR2o0001_tls_016-bkkpn286}
  - {type: 'tls:seg', offset: 1209, content: '', id: KR2o0001_tls_016-11a.7}
  - {type: variant, offset: 1210, length: 0, content: '', krp: 幽通也復以天命乆定非理所移故善惡無徵報施多爽斯則同理異說前後自相矛盾者焉或問張輔著班馬優劣論云遷敘三千年事五十萬言固敘二百年事八十萬言是固不如遷也斯言為是乎荅曰不然也按太史公書上𧺫黃帝下盡宗周年代雖存事跡殊畧至扵戰國已下始}
  - {type: variant, offset: 1211, length: 5, content: 趙壹嫉邪篇, krp: 可觀然遷雖敘三千年事其間詳備者唯漢興七十餘載而已其省也}
  - {type: substitution, offset: 1212, original: 壹, replacement: 一, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20157}}

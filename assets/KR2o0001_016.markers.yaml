  - {type: variant, offset: 1319, length: 0, content: '', WYG: 則}
  - {type: variant, offset: 1320, length: 0, content: '', WYG: 得而言按劉氏初興書惟陸賈而已子長述楚漢之事專據此書譬夫行不由徑出不由户未之聞也然觀遷之所載往往}
  - {type: punctuation, offset: 1321, content: 《, id: KR2o0001_tls_016-bkkpn313}
  - {type: variant, offset: 1321, length: 0, content: '', WYG: 舊不同如酈生之初謁沛公髙祖之長歌鴻鵠非惟文句有别遂乃事理皆殊又韓王名信都而輙去都留信用使稱其名姓全與淮隂不别班氏一凖太史曽無弛張靜言思之深所未了其三條司馬遷之敘傳也始自初生及乎行厯事無巨細莫不偹陳可謂審矣而竟不書其字者豈墨生所謂大忘者乎而班固仍其本傳了無損益此又韓子所以致守株之説也如固之為遷傳也其初宜云遷字子長憑翊夏陽人其序曰云云至於事終則言其自敘如此著述之體不當如是耶其四條馬卿為自敘傳具在其集中子長因録斯篇即為列傳班氏仍舊更無改作固於馬揚傳末皆云遷雄之自敘如此至於相如篇下獨無此言蓋止憑太史之書未見文園之集故使言無畫一其例不純其}

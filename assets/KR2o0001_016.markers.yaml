  - {type: variant, offset: 1162, length: 4, content: 去邪從正, SBCK: 而詳頼班固載其與任安書書中具述被刑所以儻無此録何以克明其事者乎漢書載子長與任少卿書歴說自古述作皆因患而起末云不韋遷蜀世傳吕覧按吕氏修撰也廣招俊客比跡春秋共集異聞擬書荀孟思刋一字購以千金則當時宣布為日乆矣豈以遷蜀}

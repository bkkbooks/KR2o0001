  - {type: variant, offset: 1260, length: 146, content: 上疏晁錯李固之對策荀伯子之彈文山巨源之啓事此皆言成軌則爲世龜鏡求諸歷代往往而有茍書之竹帛持以不刊則其文可與三代同風其事可與五經齊列古猶今也何遠近之有哉昔夫子修春秋別是非申黜陟而賊臣逆子懼凡今之爲史而載文也茍能撥浮華採貞實亦可使夫雕蟲小技者聞義而知徙矣此乃禁淫之隄防持雅之管轄凡爲載削者可不務乎, SBCK: 十六}

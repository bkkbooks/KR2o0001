  - {type: variant, offset: 1196, length: 0, content: '', SBCK: 著述徃徃而然如魚豢魏略虞世南帝王論􅂉敘遼東公孫之敗有彗星出於箕而上徹是謂掃除魚豢魏略議曰當青龍景初之除不設而􅁋濫首施以取族滅殆天意也遼東而更置也苟其如此人不能違則德教􅂉述江左陳氏之亡有㑹稽人史溥為楊州從事夣虞世南帝王畧論曰永定元年㸔之有文曰陳氏五主三十四年諒知㝠數非人着朱衣武􅃣自天而下手執金版有文字傳事獨人其理並以命而言可謂與子長同病者也諸漢史十條漢}
  - {type: page-break, offset: 1196, content: '', id: KR2o0001_SBCK_016-9a}
  - {type: variant, offset: 1196, length: 33, content: 書之不讀耳至如詩有韋孟諷諫賦有趙壹嫉邪篇則賈誼過秦論則班彪王命張華, WYG: 著}
  - {type: variant, offset: 1196, length: 0, content: '', krp: 著述徃徃而然如魚豢魏略虞世南帝王論或敘遼東公孫之敗有彗星出於箕而上徹是謂掃除魚豢魏略議曰當青龍景初之除不設而淫濫首施以取族滅殆天意也遼東而更置也苟其如此人不能違則德教或述江左陳氏之亡有㑹稽人史溥為楊州從事夣虞世南帝王畧論曰永定元年㸔之有文曰陳氏五主三十四年諒知㝠數非人着朱衣武冠自天而下手執金版有文字傳事獨人其理並以命而言可謂與子長同病者也諸漢史十條漢}
  - {type: variant, offset: 1197, length: 0, content: '', SBCK: 孝成紀賛曰成帝善修容儀升車正立不内顧不疾言不親指臨朝淵嘿尊嚴若神可謂穆穆天子}
  - {type: page-break, offset: 1197, content: '', id: KR2o0001_SBCK_016-9b}
  - {type: variant, offset: 1197, length: 0, content: '', krp: 孝成紀賛曰成帝善修容儀升車正立不内顧不疾言不親指臨朝淵嘿尊嚴若神可謂穆穆天子}
  - {type: variant, offset: 1198, length: 0, content: '', SBCK: 容貌矣又五行志曰成帝好㣲行選期門郎及􅀻奴各十餘人皆白衣袒幘自稱富平侯家􅂉乗小車御者在茵上或駿􅀐出入遠至旁縣故谷永諌曰陛下晝夜在路獨與小人相隨亂服共坐溷淆無别公卿百寮}
  - {type: variant, offset: 1198, length: 0, content: '', krp: 容貌矣又五行志曰成帝好㣲行選期門郎及私奴各十餘人皆白衣袒幘自稱富平侯家或乗小車御者在茵上或駿騎出入遠至旁縣故谷永諌曰陛下晝夜在路獨與小人相隨亂服共坐溷淆無别公卿百寮}
  - {type: variant, offset: 1199, length: 0, content: '', SBCK: 知陛下􅀁在積有數年由斯而言則成帝魚服嫚逰鳥集無度雖外飾威重而内肆輕薄人君之望不其缺如觀孟堅紀志􅀁言前後自相矛盾者矣觀太史公之創表也扵帝王則敘其子孫扵公侯則紀其年月列行縈紆以相属編字戢孴而相排雖燕越萬里而扵徑寸之内犬牙可接雖昭穆九代而扵方寸之中鴈行有敘使}
  - {type: page-break, offset: 1199, content: '', id: KR2o0001_SBCK_016-10a}
  - {type: variant, offset: 1199, length: 0, content: '', krp: 知陛下所在積有數年由斯而言則成帝魚服嫚逰鳥集無度雖外飾威重而内肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者矣觀太史公之創表也扵帝王則敘其子孫扵公侯則紀其年月列行縈紆以相属編字戢孴而相排雖燕越萬里而扵徑寸之内犬牙可接雖昭穆九代而扵方寸之中鴈行有敘使}
  - {type: variant, offset: 1200, length: 1, content: 耳, SBCK: 書者閱文便覩舉目可詳此其􅀁以為快也如班氏之古今人表者惟以品藻賢愚激揚善惡為務爾既非􅀦家逓襲禄位相承而亦複界重行狹書細字比扵它表殆非其類歟蓋人列古今本殊表限必恡而不去則宜以志名篇始自上上終于下下並當明為標榜顯列科條以種類為篇章持優劣為次第仍每扵篇後云若干品凡若干人亦猶地理志肇述京華末陳邉塞先列州郡後言户口也自漢已降作者多門雖新書已行而舊録仍在必校其則可得而言按劉氏初興書惟陸賈而已子長述楚漢之事專據此書譬夫行不由徑出不由户未之聞也然觀遷之􅀁載徃徃與舊不同如酈生之初謁沛公髙祖之長􅁔鴻鵠非惟文句有别遂乃事理皆殊又韓王名信都而輙去都字用使稱其名姓全與淮隂不别班氏一凖太史書無更張靜言思之深􅀁未了司馬遷之敘傳也始自初生及乎行歷事無巨細莫不備陳可謂審矣而竟不書其字者豈墨生􅀁謂大忘也者乎而班固仍其本傳了無損益此又韓子􅀁以致守株之􅀃也如固之為遷傳也其初宜云遷字子長馮翊陽夏人其序曰云云}
  - {type: page-break, offset: 1200, content: '', id: KR2o0001_SBCK_016-10b}
  - {type: page-break, offset: 1200, content: '', id: KR2o0001_SBCK_016-11a}
  - {type: variant, offset: 1200, length: 1, content: 耳, krp: 書者閱文便覩舉目可詳此其所以為快也如班氏之古今人表者惟以品藻賢愚激揚善惡為務爾既非國家逓襲禄位相承而亦複界重行狹書細字比扵它表殆非其類歟蓋人列古今本殊表限必恡而不去則宜以志名篇始自上上終于下下並當明為標榜顯列科條以種類為篇章持優劣為次第仍每扵篇後云若干品凡若干人亦猶地理志肇述京華末陳邉塞先列州郡後言户口也自漢已降作者多門雖新書已行而舊録仍在必校其則可得而言按劉氏初興書惟陸賈而已子長述楚漢之事專據此書譬夫行不由徑出不由户未之聞也然觀遷之所載徃徃與舊不同如酈生之初謁沛公髙祖之長歌鴻鵠非惟文句有别遂乃事理皆殊又韓王名信都而輙去都字用使稱其名姓全與淮隂不别班氏一凖太史書無更張靜言思之深所未了司馬遷之敘傳也始自初生及乎行歷事無巨細莫不備陳可謂審矣而竟不書其字者豈墨生所謂大忘也者乎而班固仍其本傳了無損益此又韓子所以致守株之說也如固之為遷傳也其初宜云遷字子長馮翊陽夏人其序曰云云}

  - {type: variant, offset: 1299, length: 0, content: '', WYG: 彗星出於箕而上徹是謂掃除遼東而更置也}
  - {type: variant, offset: 1300, length: 0, content: '', WYG: 其如此人不能違則德教不設而淫濫首施以取族滅殆天意也或述江左陳氏之亡虞世南帝王略論曰永定元年有㑹稽人史溥為揚州從事夢人着朱衣武冠自天而下手執金版有文字溥㸔之有文曰陳氏五主二十四年諒知㝠數非獨人事其理並以命而言可謂與子長同病者也其八條諸漢史十條漢}
  - {type: variant, offset: 1301, length: 0, content: '', WYG: 孝成紀賛曰成帝善修容儀升車正立不内顧不疾言不親指臨朝淵嘿尊嚴若神可謂穆穆天子}
  - {type: page-break, offset: 1301, content: '', id: KR2o0001_WYG_016-9b, image: WYG0685/WYG0685-0123d.png}
  - {type: variant, offset: 1302, length: 2, content: 竹帛, WYG: 容貌矣又五行志曰成帝好㣲行選期門郎及私奴客十餘人皆白衣袒幘自稱富平侯家或乘小車御者在茵上或皆騎出入皆一作駿遠至旁縣故谷永諌曰陛下晝夜在路獨與小人相隨亂服共坐溷淆無别公卿百寮不知陛下所在積數年矣蜀夲積下有一有字宋夲無由斯而言則成帝魚服嫚遊鳥集無度雖外飾威重而内肆輕薄人君之望不其闕如觀孟堅紀志所言前後自相矛盾者矣其一條觀太史公之創表也於帝王則敘其子孫於公侯則紀其年月列行縈紆以相屬編字戢孴而相排雖燕越萬里而於徑寸之内犬牙可接雖昭穆九代而於方寸之中雁行有敘使讀書者閲文便覩舉目可詳此其所以為快也如班氏之古今人表者唯以品藻賢愚激揚善惡為務爾既非國家逓襲禄位相承而亦複界重行狹書細字比於他表殆非其類歟蓋人列古今本殊表限必恡而不去則宜以志名篇始自上上終于下下並當明為標牓顯列科條以種類為篇章}

  - {type: variant, offset: 101, length: 0, content: '', SBCK: 出孔父門人思欲更相引重曲加談述所以樂正行事無理輙書故使編次不倫比喻非􅁼言之可為嗤恠也語曰彭蠡之濵以魚食犬斯則地之所富物不}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 出孔父門人思欲更相引重曲加談述所以樂正行事無理輙書致使編次不倫比喻非類言之可為嗤怪也語曰彭蠡之濵以魚食犬斯則地之所富物不}
  - {type: variant, offset: 101, length: 0, content: '', krp: 出孔父門人思欲更相引重曲加談述所以樂正行事無理輙書故使編次不倫比喻非類言之可為嗤恠也語曰彭蠡之濵以魚食犬斯則地之所富物不}

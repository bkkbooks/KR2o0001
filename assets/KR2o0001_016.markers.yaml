  - {type: variant, offset: 5, length: 0, content: '', SBCK: 外篇雜􅀃上第七二十五條春秋二條按春秋之書弑也稱君君無道稱臣臣之罪如齊之簡公未聞失德陳恒構逆罪莫大焉而哀十四年書齊人弑其君壬于舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子追書其事豈由以索續組不類將聖之能者乎何其乖刺之甚也按春秋左氏傳釋經云滅而不有其地曰入如入陳入衛入鄭入許即其義也至栢舉之役于常之敗庚辰呉入楚獨書以郢}
  - {type: page-break, offset: 5, content: '', id: KR2o0001_SBCK_016-1b}
  - {type: variant, offset: 5, length: 0, content: '', krp: 外篇雜說上第七二十五條春秋二條按春秋之書弑也稱君君無道稱臣臣之罪如齊之簡公未聞失德陳恒構逆罪莫大焉而哀十四年書齊人弑其君壬于舒州斯則賢君見抑而賊臣是黨求諸舊例理獨有違但此是絶筆獲麟之後弟子追書其事豈由以索續組不類將聖之能者乎何其乖刺之甚也按春秋左氏傳釋經云滅而不有其地曰入如入陳入衛入鄭入許即其義也至栢舉之役于常之敗庚辰呉入楚獨書以郢}
  - {type: variant, offset: 6, length: 1, content: 觀, SBCK: 諸侯列爵並建􅀦都惟取􅀦名不稱都􅃅何為郢之見入遺其楚名比扵它例一何􅆾踳尋二傳􅀁載皆云入楚豈左氏之本獨為謬歟左氏傳二條左氏之敘事也述行師則簿領盈視叱聒沸騰論備火則區分在目修飾峻整言勝㨗則收􅀗都盡記奔敗則披靡橫前申盟誓則慷慨有餘稱譎詐則欺誣可見談恩惠則煦如春日紀嚴切則凜若秋霜敘興􅀖則滋味無量陳亾􅀦則凄凉可憫􅂉膄辭潤簡牘或羙句入詠謌跌宕而不群縱橫而自得若斯才者殆將工侔造化思渉鬼神著述罕聞古今之卓絶如二傳之敘事也榛蕪溢句疣贅滿行華多而少實言拙而寡味若必方扵左氏也非惟不可為魯衛之政差肩鴈行亦有雲泥路阻君臣禮隔者矣左傳稱仲尼曰鮑莊子之智不如葵葵猶能衞其足夫有生而無識有質而無性者其惟草木}

  - {type: variant, offset: 1159, length: 0, content: '', SBCK: 故其中􅀁載羙事遺略甚多民曹劉遺扵今晉書則了無其名續皆扵檀氏春秋有傳至若以古方今則知太史公亦同其失矣斯則遷之􅀁録甚為膚淺而班氏稱其勤者何哉孟堅又云劉向揚雄愽極群書皆服其善叙事豈時無英秀易為雄覇者乎不然何虚譽之甚也史記鄧通傳云帝崩景帝立向若但云景帝立不言文帝崩斯亦可知矣何用兼書其事乎又倉公傳稱其傳黃帝扁鵲之脉書五色診病知人死生决嫌疑定可治召問其所長對曰傳黃帝扁鵲之脉書以下他文盡同上􅀃夫上旣有其事下又載其言言事雖殊委曲何别按遷之所述多有}
  - {type: page-break, offset: 1159, content: '', id: KR2o0001_SBCK_016-5b}
  - {type: variant, offset: 1159, length: 0, content: '', WYG: 故其中所載美事遺略甚多劉遺民曹纉皆於檀氏春秋有傳至於今晉書則了無其名若以古方今則知史公亦同其失矣斯則遷之所録甚為膚淺而班氏稱其勤者何哉孟堅又云劉向揚雄博極羣書皆服其善叙事豈時無英秀易為雄覇者乎不然何虚譽之甚也史記鄧通傳云帝崩景帝立向若但云景帝立不言文帝崩斯亦可知矣何用兼書其事乎其一條又倉公傳稱其傳黃帝扁鵲之脉書五色診病知人死生决嫌疑定可否召問其所長對曰傳黃帝扁鵲之脉書以下他文盡同上説夫上旣有其事下又載其言言事雖殊委曲何别按遷之所述多有}

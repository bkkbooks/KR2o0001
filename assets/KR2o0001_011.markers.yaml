  - {type: variant, offset: 90, length: 0, content: '', SBCK: 其官卽周之左史也􅀳元康初又職􅀠秘書著作郎一人謂之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下改佐著作郎為著作佐郎舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者若中朝之華嶠}
  - {type: page-break, offset: 90, content: '', id: KR2o0001_SBCK_011-5a}
  - {type: variant, offset: 90, length: 0, content: '', WYG: 其官即周之左史也晉元康初又職𨽻秘書著作郎一人為之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下改佐著作郎為著作佐郎舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者若中朝之華嶠}
  - {type: variant, offset: 90, length: 0, content: '', krp: 其官卽周之左史也晉元康初又職隷秘書著作郎一人謂之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下改佐著作郎為著作佐郎舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者若中朝之華嶠}

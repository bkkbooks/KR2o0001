  - {type: variant, offset: 99, length: 5, content: 劉璠曰典此, SBCK: 魏初稱制即有史臣雜取它官不常厥職故如崔浩髙閭之徒唯知著述而未列名􅃅其後始扵秘書置著作局正郎二人佐郎四人其佐三史者不過一二而已晉秦以来三史稍替别置修史局其職有六人當代都之時史臣每上奉王言下詢􅀦俗兼取工扵翻譯者来直史曹及洛京之末朝議}

  - {type: variant, offset: 136, length: 0, content: '', SBCK: 監修􅀦史自領則近循魏代逺効江南叅雜其間變通而已唯周建六官改著作之正郎為上士佐郎為下士名謚雖易而班秩不殊如魏收之擅名河朔柳虬之獨步關右王邵魏澹展効扵開皇之朝諸葛頴劉炫宣功扵大業之世亦各一時也其九條㮣皇家之建􅀦也乃别置史舘通籍禁門西京則與鸞渚為鄰東都則與鳳池相接厥舘宇華麗酒饌豐厚得厠其流者實一時之羙事至咸亨年以職司多濫髙宗喟然而稱曰朕甚懵焉乃命􅀁司曲加推擇如有居其職而闕其才者皆不得預扵修撰詔曰修撰􅀦史義存典實自非操履忠正識量該通才學有聞難堪斯任切聞近日已来但居此職即知修撰非唯編緝訛舛亦恐漏􅂥史事自今後宜遣史司精簡堪修史人灼然為衆􅀁推者録名進内自餘雖居史職不得輙聞見􅀁修史籍及未行用􅀦史等之事由是史臣拜職多取外司著作一曹始成虚設凡有筆削畢歸于餘舘始自武德迄乎長壽其間若李仁實以􅈂辭見憚敬播以敘事推工許敬宗之矯妄牛鳯及之狂惑此其善惡􅀹著者也其十條又按晉令著作郎掌起居集注撰録諸言行勲伐舊載史籍者元魏置􅁸居令史每行幸讌㑹則在御左右}

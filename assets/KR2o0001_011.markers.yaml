  - {type: variant, offset: 41, length: 0, content: '', SBCK: 大史掌􅀦之六典小史掌􅀖􅀦之志内史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之扵䇿小事簡牘而已大戴禮曰太子旣􅃣成人免扵保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肇自黃帝修扵周室名目旣}
  - {type: page-break, offset: 41, content: '', id: KR2o0001_SBCK_011-2b}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 大史掌國之六典小史掌邦國之志内史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之於策小事簡牘而已大戴禮曰太子既冠成人免於保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肇自黄帝備於周室名目既}
  - {type: page-break, offset: 41, content: '', id: KR2o0001_WYG_011-2b, image: WYG0685/WYG0685-0082d.png}
  - {type: variant, offset: 41, length: 0, content: '', krp: 大史掌國之六典小史掌邦國之志内史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之扵䇿小事簡牘而已大戴禮曰太子旣冠成人免扵保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肇自黃帝修扵周室名目旣}
  - {type: variant, offset: 42, length: 1, content: 以, SBCK: 職務咸異至扵諸侯列􅀦亦各有史官求其位􅃅一同王者至如孔甲尹逸名重夏殷史佚􅀝相譽髙周楚晉則伯黶司籍魯則丘明受經此竝歷代史臣之可得言者䧏及戰􅀦史氏無廢趙鞅晉之一大夫爾猶有􅀡臣}
  - {type: variant, offset: 42, length: 1, content: 以, WYG: 職務咸異至於諸侯列國亦各有史官求其位號一同王者至如孔甲尹逸名重夏殷史佚倚相譽髙周楚晉則伯黶司籍魯則邱明受經此並厯代史臣之可得言者降及戰國史氏無廢趙鞅晉之一大夫爾猶有直臣}

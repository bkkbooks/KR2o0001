  - {type: variant, offset: 23, length: 0, content: '', SBCK: 成而逆子懼南史至而賊臣書其記事載言也則如彼其勸善懲惡也又如此由斯而言則史之爲用其利甚愽乃生人之急務爲國家之要道有􅀦有家者其可缺之哉故備陳其事編之扵後其一條蓋史之建官其来}
  - {type: page-break, offset: 23, content: '', id: KR2o0001_SBCK_011-2a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 成而逆子懼南史至而賊臣書其記事載言也則如彼其勸善懲惡也又如此由斯而言則史之為用其利甚博乃生人之急務為國家之要道有國有家者其可缺之哉故備陳其事編之於後其一條蓋史之建官其來}

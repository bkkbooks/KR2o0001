  - {type: variant, offset: 87, length: 0, content: '', SBCK: 興之世武帝又置太史公位在丞相上以司馬談為之漢法天下計書先上太史副上丞相叙事如春秋及談卒子遷嗣遷卒宣帝以其官為令行太史公文書而已尋自古太史之職雖以著述為宗而兼掌暦象日月隂陽度數司馬遷旣殁後之續史記者若褚先生劉向馮商楊雄之徒竝以别職來知史務扵是太史之署非復記言之司故張衡單颺王立髙堂􅂭等其當官見稱唯知占􅃸而已其二條當王莽代漢改置柱下五史秩如御史聽事侍傍記跡言行盖効古者動則左史書之此其義也其三條漢氏中興明帝以班固為蘭臺令史詔撰光武本紀及諸列傳載記又楊子山為郡上計吏獻􅀁作哀平傳為帝􅀁異徴詣蘭臺斯則蘭臺之職者盖當時著述之􅀁也自章和已後圖籍盛扵東觀凡撰漢記相繼在乎其中而都謂著作竟無它稱其四條當}
  - {type: page-break, offset: 87, content: '', id: KR2o0001_SBCK_011-4a}
  - {type: page-break, offset: 87, content: '', id: KR2o0001_SBCK_011-4b}

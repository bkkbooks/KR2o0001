  - {type: variant, offset: 96, length: 1, content: 何, SBCK: 稱王崇補東觀許蓋掌禮儀又郄正為秘書郎廣求益部書籍斯則典校無闕属辭有􅀁矣而陳夀評云蜀不置史官者得非厚誣諸葛乎别有曲筆篇言}

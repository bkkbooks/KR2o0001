  - {type: variant, offset: 144, length: 0, content: '', krp: 至扵策命章奏封拜薨免莫不隨事記録言惟詳審凡𣣔撰帝紀者皆因之以成功即今為載筆之别曹立言之貳職故略述其事附扵斯篇條其十一又按詩弼風静女之三章君子}
  - {type: variant, offset: 145, length: 2, content: 順於, SBCK: 其彤管夫彤管者女史記事規誨之所搦也古者人君外朝則有國史内朝則有女史内之與外其任皆同故晉献惑亂驪􅁎夜泣床第之􅀻房中之事不得掩焉楚昭王讌逰蔡􅁎許從孤死矣夫宴􅀻而有書事之冊盖受命者即女史之流乎至漢武帝}
  - {type: variant, offset: 145, length: 1, content: 順, WYG: 其彤管夫彤管者女史記事規誨之所執也古者人君外朝則有國史内朝則有女史内之與外其任皆同故晉獻惑亂驪姬夜泣牀第之私房中之事不得掩焉楚昭王讌遊蔡姬許從孤死矣夫宴私而有書事之册蓋受命者即女史之流乎至漢武帝時有禁中起居注明德馬皇后撰明帝起居注凡斯著述似出宫中求其職司未聞位號隋世王邵上疏請依古法復置女史之班具録内儀付}

  body:
  - {type: variant, offset: 3, length: 0, content: '', WYG: 一總}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四條夫人寓形天地其生也若蜉蝣之在世如白駒之過隙猶且恥當年而功不立疾沒世而名不聞上起帝王下窮匹庶近則朝廷之士逺則山林之客其於功也名也莫不汲汲焉孜孜焉蜀本其字上有諒字宋本無夫如是者何哉皆以圖不朽之事也何者而稱不朽乎蓋書名竹帛而已向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖蹻商冒之與曾閔俱}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_011-1b, image: WYG0685/WYG0685-0082b.png}
  - {type: xml-element, offset: 5, content: '', id: KR2o0001_tls_011-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR2o0001_tls_011-1a.1}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 外篇史官建置第一總十四條夫人寓形天地其生也若蜉蝣之在世如白駒之過􅂩猶且恥當年而功不立疾沒世而名不聞}
  - {type: variant, offset: 5, length: 1, content: 上, WYG: 從物化墳土未乾而善惡不分妍媸永滅者矣茍史官不絶竹帛長存則其人已亡杳成空寂而其事如在皎同星漢用使後之學者坐披囊篋而神交萬}
  - {type: variant, offset: 5, length: 0, content: '', krp: 外篇史官建置第一總十四條夫人寓形天地其生也若蜉蝣之在世如白駒之過隙猶且恥當年而功不立疾沒世而名不聞}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 起帝王下窮匹庶近則朝廷之士逺則山林之客諒於其功也名也莫不汲汲焉孜孜焉夫如是者何哉皆以圖不朽之事也何者而稱不朽乎盖書名竹帛而已向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖蹻商冒之與曾閔俱一從物化墳土未乾則善惡不分妍􅎀永滅者矣苟史官不絶竹帛長存則其人已亡杳成空寂而其事如在皎同星漢用使後之學者坐披囊篋而神交萬}
  - {type: page-break, offset: 6, content: '', id: KR2o0001_SBCK_011-1b}
  - {type: variant, offset: 6, length: 0, content: '', krp: 起帝王下窮匹庶近則朝廷之士逺則山林之客諒於其功也名也莫不汲汲焉孜孜焉夫如是者何哉皆以圖不朽之事也何者而稱不朽乎盖書名竹帛而已向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖蹻商冒之與曾閔俱一從物化墳土未乾則善惡不分妍媸永滅者矣苟史官不絶竹帛長存則其人已亡杳成空寂而其事如在皎同星漢用使後之學者坐披囊篋而神交萬}
  - {type: variant, offset: 7, length: 14, content: 之書有三墳五典八索九丘其次有, SBCK: 不出户庭而窮覽千載見賢而思齊見不賢而内自省若乃}

  - {type: variant, offset: 141, length: 0, content: '', krp: 修之納言監領其事煬帝以為占有内史外史今既有著作宜立𧺫居遂置𧺫居舎人二員職隷中書省如庾自直崔濬祖虞世南蔡允恭等咸居其職時}
  - {type: variant, offset: 142, length: 0, content: '', SBCK: 得人唐氏因之又加置􅁸居郎二員職與舎人同每天子臨軒侍立扵玉堦之下郎居其左舎人居其右人主有命則逼階延首而聽之退而編録以為􅁸居注龍朔中改名左史右史今上即位仍從國初之號焉髙祖大宗時有令狐德棻吕才蕭鈞褚遂良上官儀髙宗則天時有李安期顧㣧髙智周張大素凌季友斯並當時得名朝廷􅀁屬也夫􅁸居注者編次甲子}
  - {type: page-break, offset: 142, content: '', id: KR2o0001_SBCK_011-8b}

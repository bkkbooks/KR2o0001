  - {type: variant, offset: 93, length: 2, content: 劭曰, SBCK: 隱虞預于寶孫盛宋之徐爰蘇寶生梁之沈約裴子野斯竝史官之􅀹羙著作之妙選也而齊梁二代又置修史學士陳氏因循無􅀁變革若劉涉謝旻顧野王許善心之類是也其五條至若偏隅僣􅀦夷狄偽朝求其史官亦有可言者按蜀}
  - {type: variant, offset: 93, length: 2, content: 劭曰, WYG: 隱虞預干寶孫盛宋之徐爰蘇寶生梁之沈約裴子野斯並史官之尤美著作之妙選也而齊梁二代又置修史學士陳氏因循無所變革若劉涉謝吳顧野王許善心之類是也其五條至若偏隅僭國夷狄偽朝求其史官亦可言者按蜀}

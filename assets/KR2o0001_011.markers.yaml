  - {type: variant, offset: 136, length: 0, content: '', WYG: 監修國史自領則近循魏代逺効江南參雜其間變通而已唯周建六官改著作之正郎為上士佐郎為下士名諡雖易而班秩不殊如魏收之擅名河朔柳虬之獨步關右王邵魏澹展効於開皇之朝諸葛頴劉炫宣功於大業之世亦各一時也其九條曁皇家之建國也乃别置史館通籍禁門西京則與鸞渚為鄰東都則與鳳池相接而館宇華麗酒饌豐厚得厠其流者實一時之美事至咸亨年以職司多濫髙宗喟然而稱曰朕甚懵焉乃命所司曲加推擇如有居其職而闕其才者皆不得預於修撰詔曰修撰國史義存典實自非操履忠正識量該通才學有聞難堪斯任如聞近日已來但居此職即知修撰非唯編緝訛舛亦恐漏􅂥史事自今宜遣史司精簡堪修史人灼然為衆所推者録名進内自餘雖居史職不得輒聞見所修史籍及未行用國史等之事由是史臣拜職多取外司著作一曹殆成虛設凡有筆削畢歸於館始自武德迄乎長壽其間若李仁實以直辭見憚敬播以敘事推工許敬宗之矯妄牛鳳及之狂惑此其善惡尤著者也其十條又按晉令著作郎掌起居集注撰録諸言行勲伐舊載史籍者元魏置起居令史每行幸讌㑹則在御左右}

  - {type: variant, offset: 98, length: 0, content: '', SBCK: 詳矣吳歸命時有左右二􅀦史之職薛榮為其左華覈為其右又周處自左􅀦史遷東觀令以斯考察則其班秩可知其六條偽漢嘉平初公師􅂉以太中大夫領左國史撰其國君臣紀傳前涼張駿時劉慶遷儒林郎中常侍在東苑撰其􅀦書蜀與西涼三朝記事委之門下南涼主烏孫初定覇基欲造􅀦紀以其􅂙軍郎韶為􅀦紀祭酒使撰録時事自餘偽主多置著作官若前趙之和苞後燕之董統是也其七條}
  - {type: page-break, offset: 98, content: '', id: KR2o0001_SBCK_011-6a}
  - {type: variant, offset: 98, length: 0, content: '', WYG: 詳矣吳歸命時有左右二國史之職薛瑩為其左華覈為其右又周處自左國史遷東觀令以斯考察則其班秩可知其六條偽漢嘉平初公師或以太中大夫領左國史撰其國君臣紀傳前涼張駿時劉慶遷儒林郎中常侍在東苑撰其國書蜀與西涼二朝記事委之門下南涼主烏孫初定霸基欲造國紀以其參軍郎韶為國紀祭酒使撰録時事自餘偽主多置著作官若前趙之和苞後燕之董綂是也其七條}

  - {type: variant, offset: 654, length: 0, content: '', WYG: 葢江芉罵商臣曰呼役夫宜君王廢汝而立職漢王怒酈生曰豎儒㡬敗乃公事單固謂嵇康曰老奴汝死自其分樂廣歎衛玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之說必播以唇吻傳諸諷誦而世人皆以為上之二言不失清雅而下之兩句殊為魯朴者何哉葢楚漢世隔事已成古魏晉年近言猶類今已古者即謂其文猶今者乃驚其質夫天地久長風俗無恒後之視今亦猶今之視昔而作者皆怯書今語勇效昔言不其惑乎茍紀事則約附五經載語則依憑三史是春秋之俗戰國之時與兩儀而並存經千載而如一奚以今來古往質文之屢變者哉葢善為政者不擇人而理故俗無精麄咸被其化工為史者不選事而書故言無美惡盡傳于後若事皆不謬言必近真庶㡬可與}

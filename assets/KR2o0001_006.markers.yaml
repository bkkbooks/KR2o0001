  - {type: variant, offset: 667, length: 0, content: '', krp: 邵無又敘事之省其流有二焉一曰省句二曰省字左傳宋華耦來盟稱其先人得罪於宋魯人以為敏夫以鈍者稱敏記中已有註解魯人為鈍人也禮則明賢達所嗤此為省句也春秋經曰隕石於宋五夫聞之隕視之石數之五加以一字太詳減其一字太略求諸折中簡要合理此為省字也其反於是者若公羊稱郄克眇季孫行父秃孫良夫跛齊使跛者逆跛者秃者逆秃者眇者逆眇者盖宜除跛者已下字但云各以其類逆者必事皆再述則於文殊費此為煩句也漢書張倉傳云年老口中無齒盖於此一句之内去年及口中可矣夫此六文成句而三字妄加此爲煩字也然則省句為易省字為難洞識此心始可言史矣若句盡餘賸字皆重複史之煩蕪職由於此盖餌巨魚者垂其千釣而得之在於一筌捕髙鳥者張其萬罝而獲之由於一目夫敘事者或虚益散誶廣加閑說必其所要不過一言一句耳茍能同夫獵者漁者既執而罝釣必收所留者唯一筌一目而已則庶㡬胼胝盡去而塵垢都捐華逝而實存滓去而瀋在矣嗟乎能損之又損而玄之又玄輪扁所不能語斤伊摯所不能言鼎也右簡要夫飾言者為文編文者為句句積而章立章積而篇目成篇目既分而一家之言備矣古者行人出境以詞令為宗大夫應對以言文為主況乎列以章句刋之竹帛安可不勵精雕飾傳諸諷誦者哉自聖賢述作是曰經典句皆韶夏言盡琳琅秩秩徳音洋洋盈耳譬夫㳺滄海者徒驚其浩曠登太山者但嗟其峻極必擿以尤㝡不知何者為先然章句之言有顯有晦顯也者繁詞縟說理盡於篇中晦也者省字約文事溢於句外然則晦之將顯優劣不同較可知矣夫能略小存大舉重明輕一言而巨細咸該三語而洪纎靡漏此皆用晦之道也昔古文義務却浮詞虞書云帝乃殂落百姓如喪考妣夏書云啓呱呱而泣予不子周書稱前徒倒戈血流漂杵虞書云四罪而天下咸服此皆文如闊畧而語實周贍故覧之者初疑其易而為之方覺其難固非雕䖝小技所能斥非其說也既而丘明授經師範尼父夫經以數字包義而傳以一句成言雖繁約有殊而隠晦無異故其綱紀而言邦俗也則有士㑹為政晉國之盜奔秦邢遷如歸衛國忘亡其欵曲而言人事也則有使婦人飲之酒以犀革褁之比及宋手足皆見宋人醢之蕭潰師人多寒王撫而勉之三軍之士皆如挾纊斯皆言近而㫖逺辭淺而義深雖發語已殫而含意未盡使夫讀者望表而知裏捫毛而辯骨覩一事於句中反三隅於字外晦之時義不亦大哉洎班馬二史雖多謝五經必求其所長亦時值斯語至若髙祖亡蕭何如失左右手漢兵敗績睢水為之不流董生乗馬三年不知牝牡翟公之門可張雀羅則其例也自兹已降史道陵夷作者蕪音累句雲蒸泉湧其為文也大抵編字不隻捶句皆雙脩短取均竒偶相配故應以一言蔽者輒足為二言應以三句成文者必分為四句彌漫重沓不知所裁是以承祚受責扵少期之注云容貌之言而分巳為三亦魏志鄧哀王傳曰容貌姿美裴松一病也敘事属子昇取譏於君懋刑子才不得掌興魏王邵齊志曰時議恨而撰永安記率是六言之書悵怏温子昇亦若此非不幸也盖作者言雖簡略理皆要害故能踈而不遺儉而無闕譬如用竒兵者持一當百能全克敵之功也若才乏雋穎思多昏滯費詞既甚敘事纔周亦猶售鐵錢者以兩當一方成貿遷之價也然則史漢已前省要如彼國晉已降國志也國謂三煩碎如此必定其妍媸甄其善惡夫讀古史者閲其章句皆可詠歌觀近史者得其緒言直求事意而已是則一貴一賤不言可知無假搉揚而其理自見矣右隱晦昔文章既作比興由生鳥獸以嫓賢愚草木以方男女詩人騷客言之備矣洎乎中代其體稍殊或擬人必以其倫或述事多比於古當漢氏之臨天下也君實稱帝理異殷周子乃封王名非魯衛而作者猶謂帝家為王室公輔為王臣磐石加建侯之言帶河申俾侯之稱而史臣撰録亦同彼文章假託古詞翻易今語潤色之濫萌於此矣降及近古彌見其甚至如諸子短書雜家小說論逆臣則呼爲問鼎稱巨冦則目以長鯨邦國初基皆云草昧帝王世跡必號龍飛斯並理兼諷諭言非指斥異乎㳺夏措詞南董顯書之義也如魏收代史吳均齊録或牢籠一世或包舉一家自可申不刋之格言弘至公之正說而收稱劉氏納貢則曰來獻百琛均敘元日臨軒必云朝㑹萬國夫以吳徵魯賦禹計塗山持彼往事用爲今說置於文章則可施於簡册則否矣亦有方以類聚譬諸昔人如王隠稱諸葛亮挑戰真獲曹咎之利崔鴻稱慕容沖見幸爲有龍陽之姿其事相符言之讜矣而虞思道稱邢邵喪子不慟自東門吳已來未之有也李百藥稱王琳雅得人心雖李將軍恂恂善誘無以加也斯則虚引古事妄足庸音茍矜其學必辯而非當者矣昔禮記檀弓工言物始夫自我作故首剏新儀前史所刋後來取證是以漢初立䡺子長所書魯始為髽丘明是記河橋可作元凱取驗於毛詩男子有笄伯支逺徵於内則即其事也按裴景仁秦記稱符堅方食撫盤而詬王邵齊志述父紇洛干感恩脫㡌而謝及彦鑾撰以新史重規删其舊録乃易撫盤以推案變脫㡌爲免冠夫近世通無案食胡俗不施冠冕直以事不類古改從雅言欲學者何以考時俗之不同察古今之有異又自雜種稱制充牣神州事異諸華言多醜俗至如翼犍魏道武所諱黑獺周文本名而伯起草以他語徳棻闕而不載盖龎降蒯瞶字之媸也重耳黑臀名之鄙也舊事列以二史傳諸五經未聞後進談講别加刋定況愁山定犢彰於載䜟䜟云牛首入杜臺卿齊載上齊丘也西谷逆犢河邊之狗著於謡詠貛貛頭團圓河王邵齊志載謡爾苑也中狗子破明如日月難為盖藏此而不書何以示後亦有氏姓本複减省從單或去萬而留千或存扶而除厚求諸自古罕聞兹例昔夫子有云文勝質則史故知史之爲務必藉於文自五經已降三史而往以文敘事可得言焉而今之所作者有異於是其立言也或虚加練飾輕事彫彩或體兼賦頌詞類俳優文非文史非史譬夫烏孫造室雜以漢儀而刻鵠不成反類於鶩者也右妄飾史通}

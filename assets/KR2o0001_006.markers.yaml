  - {type: variant, offset: 660, length: 2, content: 朽爲, krp: 麗質而非野使人味其滋㫖懐其徳音三復忘疲百遍無斁自非作者曰聖其孰能與於此乎昔聖人之述作也上自堯典下終獲麟是為屬詞比事之言䟽通知逺之㫖子夏曰書之論事也昭昭然若日月之代明楊雄有云說事者莫辨於書說理者莫辯乎春秋然則意復深奥誥訓成義微顯闡幽婉而成章雖殊途異轍亦各有美焉諒以師範億載䂓模萬古為述者之冠冕實後來之龜鑑既而馬遷史記班固漢書繼聖而作抑其次也故世之學者皆先曰五經次云三史故經史之目於此分焉甞試言之曰經猶日也史猶星也夫杲日流景則列星寢耀桑榆既夕而辰象粲然故史記之文當乎尚書春秋之世也則其言淺俗涉乎委巷垂趐不舉懘籥無聞逮於戰國已降去聖彌逺然後能露其鋒頴倜儻不羈故知人才有殊相去若是校其優劣詎可同年自漢已降㡬将千載作者相繼非復一家求其善者盖亦無㡬矣夫班馬執簡既五經之罪人而晉宋殺青又三史之不若譬夫王覇有别粹駁相懸才}

  - {type: variant, offset: 663, length: 2, content: 蓋爲, WYG: 不其甚乎然則人之著述雖同自一手自一作出其間則有善惡不均精麄非類若史記蘇張蔡澤等傳是其美者至於三五本紀日者太倉公龜䇿傳固無所取焉又漢書之帝紀陳項諸篇是其最也至於淮南王司馬相如東方朔傳又安足道哉豈繪事以丹素成妍帝京以山水為助故言媸者其史亦拙事美者其書亦工必時乏異聞世無竒事英雄不作賢雋不生區區碌碌抑惟恒理而責史臣顯其良直之體申其微婉之才葢亦難矣故揚子有云虞夏之書渾渾爾商書灝灝爾周書噩噩爾下周者其書憔悴乎觀丘明之記事也當桓文作霸晉楚更盟則能飾彼詞句成其文雅及王室大壊事益縱横則春秋美詞㡬乎翳矣觀子長之叙事也自周已往言所不該其文濶畧無復體統自秦漢已下條貫有倫則煥炳可觀有足稱者至若荀恱漢紀其才盡於十帝陳夀魏書其美窮於三祖觸類而長他皆若斯夫識寳者稀知音葢寡近有裴子野宋畧王邵齊志此二家者並長於叙事無愧古人而世人議者皆雷同譽裴而共詆王氏夫江左事雅裴筆所以専工申原跡穢王文由其屢鄙且㡬原務飾虚詞君懋志存實録此美惡所以為異也設使丘明重出子長再生記言於賀六渾之朝書事於士尼干之代將恐輟毫栖牘無所施其徳音而作者安可以今方古一概而論得失夫叙事之體其流甚多非復片言所能覼縷今輒區分類聚定為三篇列之于下右叙事篇序夫國史之美者以叙事為工而叙事之工者以簡要為主簡之時義大矣哉歴觀自古作者權輿尚書發蹤所載務於寡事春秋變體其言貴於省文斯葢澆淳殊致前後異跡然則文約而事豐此述作之尤美者也始自兩漢迄乎三國國史之文日傷煩富逮晉已降流宕逾逺必尋其冗句摘其煩詞一行之間必謬增數字尺紙之内恒虚費數行夫聚蚊成雷羣輕折軸況於章句不節言詞莫限載之兼兩曷足道哉葢叙事之體其别有四有直紀其才行者有唯書其事跡者有因言語而可知者有假讚論而自見者至如古文尚書稱帝堯之徳標以允恭克讓春秋左傳言子太叔之狀目以美秀而文所稱如此更無他說所謂直紀其才行者又如左氏載申生為驪姬所讚自縊而亡班史稱紀信為項籍所圍代君而死此則不言其節操而忠孝自彰所謂唯書其事跡者又如尚書稱武王之罪紂也其誓曰焚炙忠良刳剔孕婦左傳記隨㑹之論楚也其詞曰蓽簵藍􅘚以啓山林此則才行事跡莫不闕如而言有關涉事便顯露所謂因言語而可知者又如史記衛青傳後太史公曰蘇建甞責大將軍不薦賢待士漢書孝文紀末其讚曰吳王詐病不朝賜以杖几此則紀之與傳並所不書而史臣發言别出其事所謂假讚論而自見者然則才行事跡言語讚論凡此四者皆不相須若兼而畢書則其費尤廣近史紀傳欲言人居哀毁損則先云至性純孝欲言人晝夜觀書則先云篤志好學欲言人赴敵不顧則先云武藝絶倫欲言人下筆成篇則先云文章敏速此則既述才行又彰事跡也如穀梁傳曰驪姬以酖為酒藥脯以毒獻公曰奚來驪姬曰世子以祀故致福在君將食之驪姬讒曰食自外來者不可不試也覆酒於地而地墳以脯與犬犬斃驪姬下堂而啼曰天乎天乎吾君之國子之國也子何遲於為君又禮記云晉將伐宋使覘之見陽門之介夫死子罕哭之甚哀歸而語人曰陽門之介夫死子罕哭之甚哀不可伐也此則既載事跡又載言語也又近代諸史人有行事美惡者皆已具其紀傳中續以贊論重述前事此則近有事跡紀傳已書贊論又載公梁傳新序說苑戰國䇿楚漢春秋史記迄于皇家所撰五代史皆有之但自古經史通多此類能獲免者葢十無一二唯左丘明裴子野王邵無}

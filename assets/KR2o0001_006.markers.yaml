  - {type: variant, offset: 623, length: 2, content: 游談, WYG: 沮渠乞伏儒雅比於元封拓跋宇文徳音同於正始華而失實過莫大焉唯王宋著書叙元髙時事王謂王邵也宋謂宋孝王也邵撰齊志孝王撰關東風俗傳也抗詞正筆務存直道方言世語由此畢彰而今之學}
  - {type: variant, offset: 626, length: 2, content: 靡徵, WYG: 皆尢二子以言多滓穢語傷淺俗夫本質如此而推過史臣猶鑒者見嫫母多媸而歸罪於明鏡也又世之議者咸以北朝衆作周史為工葢賞其記言之體多同於古故也夫以枉飾虚言都損實事便號以良直師其模楷至如周太祖實名黑獺魏本索頭故當時有童謡曰狐非狐貉非貉焦梨狗子嚙斷索又曰獾獾頭團欒河中狗子破爾苑又西帝下詔罵齊神武數其罪廿諸如此事難可棄遺而周史以}

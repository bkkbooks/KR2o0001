  - {type: variant, offset: 37, length: 230, content: 經列事者錄人臣之行狀猶春秋之傳春秋則傳以解經史漢則傳以釋紀尋茲例草創始自子長而朴略猶存區分未盡如項王宜傳而以本紀爲名非惟羽僭之盜不可同於天子且推其序事皆作傳言求謂之紀不可得也或曰遷紀五帝夏殷亦皆列事而已子曾不之怪何獨尤於項紀哉對曰不然夫五帝之與夏殷也正朔相承子孫遞及雖無年可著紀亦何傷如項羽者事起秦餘身終漢始殊夏氏之后羿似黃帝之蚩尤譬諸閏位容可列紀方之騈拇難以成編且夏殷之紀不引他事夷齊諫周實當紂日而㭊爲列傳不入殷篇項紀則上下同載君臣交雜紀名傳體所以成嗤夫紀傳, SBCK: 逓改知歳時}
  - {type: variant, offset: 37, length: 131, content: 經列事者錄人臣之行狀猶春秋之傳春秋則傳以解經史漢則傳以釋紀尋茲例草創始自子長而朴略猶存區分未盡如項王宜傳而以本紀爲名非惟羽僭之盜不可同於天子且推其序事皆作傳言求謂之紀不可得也或曰遷紀五帝夏殷亦皆列事而已子曾不之怪何獨尤於項紀哉對曰不然夫五帝之與夏殷也正朔相承子孫, WYG: ''}

  - {type: variant, offset: 630, length: 2, content: 講習, WYG: 非雅畧而不載賴君懋編録故得權聞於後其事不傳於北齊因而埋没不盡亦多矣是以董狐南史舉目可求班固華嶠比肩皆是}
  - {type: variant, offset: 630, length: 2, content: 講習, krp: 不傳扵北齊因而埋弃遺而周史以爲其事非雅略而不載頼君懋亦多矣没}
  - {type: variant, offset: 633, length: 2, content: 罕記, SBCK: 盖是以董狐南史齊目可求班固華嶠比肩皆是者矣近有燉煌張太素中山郎餘令並稱述者自負史才郎著孝傳張著隋後略凢􅀁撰人語皆依倣舊辭若選言可以効古而書雜類者則忽而不取料}

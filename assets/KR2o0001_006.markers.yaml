  - {type: variant, offset: 654, length: 0, content: '', SBCK: 盖江芊罵商臣曰呼役夫宜君王廢汝而立職漢王怒酈生曰竪儒㡬敗乃公事單固謂稽康曰老奴汝死自其分樂廣歎衛玠曰誰家生得寧馨兒斯並當時侮嫚之詞流俗鄙俚之說必播以唇吻傳諸諷誦而世人皆以爲上之二言不失清雅而下之兩句殊爲魯朴者何哉盖楚漢世隔事已成古魏晉年近言猶類今已古者即謂其文猶今者乃驚其質夫天地乆長風俗無恒後之視今亦猶今之視昔而作者皆怯書今語勇効昔言不其惑乎茍紀事則約附五經載語則依憑二史是春秋之俗戰國之風亘兩儀而並存經千載而如一奚以今來古徃質文之屢變者哉盖善爲政者不擇人而理故俗無精麄咸被其化工爲史者不選事而書故言無羙惡盡傳于後若事皆不謬言必近真庶㡬可與}

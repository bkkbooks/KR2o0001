  - {type: variant, offset: 3, length: 1, content: 六, WYG: 二十葢樞機之發榮辱之主言之不文行之不逺則知飾詞専對古之所重也}
  - {type: xml-element, offset: 4, content: '', id: KR2o0001_tls_006-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR2o0001_tls_006-1a.1}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 内篇言語浮辭敘事言語篇二十蓋樞機之發榮辱之主言之不文行之不逺則知飾詞専對古之所重也}
  - {type: variant, offset: 4, length: 0, content: '', krp: 内篇言語浮辭敘事言語篇二十蓋樞機之發榮辱之主言之不文行之不逺則知飾詞専對古之所重也}
  - {type: variant, offset: 5, length: 1, content: 紀, SBCK: 上古之世人惟朴畧言語難曉訓釋方通是以尋理則事簡而意深考文則詞難而義釋若尚書載伊尹立訓臯陶之謨洛誥康誥牧誓泰誓是也周監於二代郁郁乎文大夫行人尤重詞命語微婉而多切言流靡而不淫若春秋載呂相絶秦子産献捷臧孫諫君納􅂦魏絳對戮揚干是也戰國虎爭馳說雲湧人持弄瓦之辯家挾飛鉗之術劇談者以譎誑爲宗利口者以寓言爲主若史記載蘇秦合從張儀連衡范雎反間以相秦魯連解紛而全趙是也逮漢魏已降周隋而徃世皆尚文時無専對運籌畫䇿自具於章表献可替否總歸於筆札宰我子貢之道不行蘇秦張儀之業遂廢矣假有忠言切諫答戯解嘲其可稱者若朱雲折檻以抗憤張綱埋輪而獻直秦宓之酬吳客王融之答虜使比之小辯曾何足云是以歴選載言而布諸方冊自漢已下無足觀焉尋夫戰國已前其言皆可諷詠非但筆削所致良用體質素美何以覈諸至如鶉賁鸜鵒童竪之謡也山木轉車時俗之諺也皤腹棄甲城者之謳也原田是謀輿人之誦也斯皆芻詞鄙句猶能温潤若此況乎束帶立朝之士加以多聞博古之說者哉則知時人出言史官入記雖有討論潤色終不失梗槩者也夫三}

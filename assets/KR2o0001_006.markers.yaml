  - {type: variant, offset: 657, length: 1, content: 沒, SBCK: 伊惟夫盖發語之端也焉哉矣兮斷句之助也去之則言語不足加之則章句獲全而史之敘事亦有時類此故將述晉靈公厚斂彫牆則且以不君爲稱欲云司馬安四至九卿而先以巧宦摽目􅀁謂說事之端也又書重耳伐原示信而續以一戰而覇文之教也載匈奴為偶人象郅都令馳射莫能中則云其見憚如此􅀁謂論事之助也昔尼父裁經義在褒貶明如日月特用不刋而史傳􅀁書貴乎􅀓録而已至於本事之外時寄抑揚此乃得失稟於片言是非由於一句談何容易可不慎歟但近代作者溺於煩富則有發言失中加字不愼遂令後之覽者難以取信盖史記世家有云趙鞅諸子無恤最賢夫賢者當以仁恕為先禮讓居本至如僞㑹隣國進計行伐俾同氣女兄摩笄引决此則詐而安忍貪而無親鯨鯢是儔犬豕不若焉得謂之賢哉又漢書云蕭何知韓信賢按賢者處世夷險若一不隕穫於貧賤不充詘於富貴又傳曰知進退存亡者其唯聖人乎如淮陰初在仄微墮業無行後居榮貴滿盈速禍躳爲逆臣名􅀠惡徒周身之防靡聞知足之情安在美其善將呼爲才畧則可矣必以賢爲目不其謬乎又云嚴延年精悍敏捷雖子貢冉有通於政事不能絶也夫以編名酷吏列號屠伯而輙比孔門達者豈其倫哉且以春秋至漢多歴年􅀁必言貌取人耳目不接又焉知其才術相類錙銖無爽而云不能絶乎盖古之記事也􅂉先經張本􅂉後傳終言分布雖踈錯綜逾密今之記事也則不然􅂉隔卷異篇遽相矛盾􅂉連行接句頓成乖角是以齊史之論魏收良直邪曲三說各異有産竊恐未挹髙論又云足以入相李伯藥齊書序論魏收云若使子孫云收受暢財賄今故為榮傳多其惡是謂三說各異如之室游尼父之門志存實録抵訐私於爾朱暢傳又周書之評太祖寛仁好殺二理不同周書傳稱令狐徳棻徳棻周書傳稱文如歸命盡種誅夷雖出權道文帝不害諸元則云太祖天縱寛仁世故令狐是謂二理不同而用乖於徳教非惟言無準的固亦事成首鼠者矣夫人有一而史辭再三良以好發蕪音不求讜理而言之反覆觀者惑焉亦有開國承家美惡昭露皎如星漢非磨涅􅀁移而輕事塵㸃曲加粉飾求諸近史此􅀋尤多如魏書稱登國以鳥名官則云好尚淳朴逺師少皥述道武結婚蕃落則曰招携荒服追慕漢髙自餘􅀁說多類於此按魏氏始興邊朔少識典墳作儷蠻夷抑惟秦晉而鳥官創置豈關郯子之言髦頭而偶奚假奉春之䇿奢言無限何甚厚顔又周史稱元行恭因齊滅得回􅁃信贈其詩曰虢亡垂棘滅齊平寳鼎歸陳周􅀪正來聘在舘贈韋敻詩曰徳星猶未動直車詎肯來其爲信􅀪正􅀁重如此夫文以害意自古而然擬非其倫由來尚矣必以􅁃周􅀁作皆爲實録則其􅀁褒貶非止一人咸宜取其指歸何止採其四句而已若乃題目不定首尾相違則伯藥令徳棻是也史齊史令狐徳棻所撰也魏收李伯藥􅀁撰周心挾愛憎詞多出没則魏收牛􅀪是也行恭等此本牛􅀪􅀁撰也魏史魏收􅀁撰周史載元斯皆鑒裁非逺智識不周而輕弄筆端肆情髙下故彌縫雖洽而厥跡更彰取惑無知見嗤有識夫詞寡者出一言而已周才蕪者須數句而方浹按左傳稱絳父論甲子隠言於趙孟班書述楚老哭龔生莫識其名氏茍舉斯一事則觸類可知至嵇康皇甫謐撰髙士記名爲二叟立傳仝採左班之録而其傳論云二叟隠徳容身不求名利避逺亂害安於賤役夫探揣古意而廣足子音反愈新言此猶子建之詠三良延年之歌秋婦至於臨宂淚下閨中長歎雖語多本傳而事無異說盖鳬脛雖短續之則悲史文雖約增之返累加減前哲豈容易哉昔夫子斷唐虞已下迄於周剪截浮詞撮其機要故帝王之道坦然明白嗟乎自去聖日逺史籍逾多得失是非孰能刋定假有才堪釐革而以人廢言此繞朝所謂勿謂秦無人吾謀適不用者也叙事第二十二并序條簡要隱晦妄飾揔三夫史之稱美者以敘事爲先至若書功過記善惡文}

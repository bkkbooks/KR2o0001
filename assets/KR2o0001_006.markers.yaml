  - {type: variant, offset: 613, length: 3, content: 生無令, SBCK: 妄益文彩虛加風物援引詩書憲章史漢遂使且渠乞伏儒雅比於元封拓跋宇文徳音同於正始華而失實過莫大焉唯王宋著書敘元髙時也謂宋孝王也邵王謂王邵也宋􅀜東風俗傳也􅁧齊志孝王􅁧抗詞正筆務存直道方言世語由此畢彰而今之學者皆尤二子以言多滓穢語傷淺俗夫本質如此而推過史臣猶鑑者見嫫姆多媸而歸罪於明鏡也又世之議者咸以北朝衆作周史爲工盖賞其記言之體多同於古故也夫以枉飾虚言都損實事便號以良直師其模楷時有童謡曰狐非狐貉非貉燋犁狗至如周太祖實名􅆩魏本索頭故當又西帝下詔罵齊神武數其罪甘諸如此事難可子嚙斷索又曰獾獾頭圑栾河中狗子破介范編錄故得􅁠}

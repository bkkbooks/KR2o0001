  - {type: variant, offset: 757, length: 1, content: 謂, SBCK: 在秦者為劉氏乃漢室􅀁宜推先但取恱當時殊無足採又按桓譚新論曰左氏傳扵經猶衣之表裏而東觀漢記陳元奏云光武興立左氏而桓譚衛宏並共詆訾故中道而廢班固藝文志云丘明與孔子觀魯史記而作春秋有􅀁貶損事形扵傳懼罹時難故􅀮其書末世口􅀃流行遂有公羊穀梁鄒氏夾氏諸傳而於固集復有難左氏九條三評等科夫以一家之言一人之說而參差相背前後}

  - {type: variant, offset: 752, length: 1, content: 歷, SBCK: 子之修春秋也盖他􅀖之簒賊其君者有三解扵上謂齊鄭楚巳本國之殺逐其君者有五君被弑昭哀一主被有隱閔般惡視此五也逐莫不缺而靡録使其有逃名者而孟子云孔子成春秋亂臣賊子懼無乃烏有之談歟其虛美三也其十六條又按春秋之文雖有成例或事同書異理殊書一故太史公曰孔氏著春秋隱桓之間則彰至定哀之際則㣲為其切當世之文而亡褒諱之辭也斯則危行言遜吐剛茹柔推避以求全依違以免禍而孟子云孔子曰知我者其惟春秋乎罪我者其惟春秋乎其虛美四也其十七條按趙穿殺君而稱宣子之弑江乙亡布而稱令尹所盗此則春秋之世有識之士莫不㣲婉其辭隱晦其􅀃斯盖當時之􅁪事習俗所常行而固云仲尼殁而㣲言絶}
  - {type: page-break, offset: 752, content: '', id: KR2o0001_SBCK_014-9a}
  - {type: variant, offset: 752, length: 1, content: 歷, WYG: 子之修春秋也盖他邦之簒賊其君者有三謂齊鄭楚已解於上本國之殺逐其君者有七隱閔般惡視五君被弑昭哀二主被逐也莫不缺而靡録使其有逃名者而孟子云孔子成春秋亂臣賊子懼無乃烏有之談歟其虛美三也其十七條又按春秋之文雖有成例或事同書異理殊書一故太史公曰孔氏著春秋隱桓之間則彰至定哀之際則㣲為其切當世之文而亡褒諱之辭也斯則危行言遜吐剛茹柔推避以求全依違以免禍而孟子云孔子曰知我者其惟春秋乎罪我者其惟春秋乎其虛美四也其十八條按趙穿殺君而稱宣子之弑江乙亡布而稱令尹所盜此則春秋之世有識之士莫不㣲婉其辭隱晦其說斯盖當時之恒事習俗所常行而固云仲尼沒而㣲言絶}

  - {type: variant, offset: 15, length: 699, content: 又曰名不正則言不順必也正名乎是知名之折中君子所急況復列之篇籍傳之不朽者邪昔夫子修春秋吳楚稱王而仍舊曰子此則褒貶之大體爲前修之楷式也馬遷撰史記項羽僭盜而紀之曰王此則真僞莫分爲後來所惑者也自茲已降訛謬相因名諱所施輕重莫等至如更始中興漢室光武所臣雖事業不成而歷數終在班范二史皆以劉玄爲目不其慢乎古者二國爭盟晉楚並稱侯伯七雄力戰齊秦俱曰帝王其間雖勝負有殊大小不類未聞勢窮者即爲匹庶爲屈者乃成寇賊也至於近古則不然當漢氏云亡天下鼎峙論王道則曹逆而劉順語國祚則魏促而吳長但以地處函夏人傳正朔度長絜短魏實居多二方之於上國亦猶秦繆楚莊與文襄而並霸蜀昭烈帝可比秦繆公吳大帝可比楚莊王逮作者之書事也乃沒吳蜀號謚呼權備姓名謂魚豢孫盛等方於魏邦懸隔頓爾懲惡勸善其義安歸續以金行版蕩戎羯稱制各有國家實同王者晉世臣子黨附君親嫉彼亂華比諸羣盜此皆茍徇私忿忘夫至公自非坦懷愛憎無以定其得失至蕭方等始存諸國名謚僭帝者皆稱之以王此則趙猶人君加以主號杞用夷禮貶同子爵變通其理事在合宜小道可觀見於蕭氏者矣古者天子廟號祖有功而宗有德始自三代迄於兩漢名實相允今古共傳降及曹氏祖名多濫必無愧德其唯武王故陳壽國志獨呼武曰祖至於文明但稱帝而已自晉已還竊號者非一如成穆兩帝劉蕭二明梁簡文兄弟兼言孝元帝也齊武成昆季兼文宣孝昭也斯或承家之僻王或亡國之庸主不謚靈繆爲幸已多猶曰祖宗孰云其可而史臣載削曾無辨明每有所書必存廟號何以申勸沮之義杜渝濫之源者乎又位乃人臣迹參王者如周之亶父季歷晉之仲達師昭追尊建名此諸天子可也必若當塗所出宦官攜養帝號徒加人望不愜故國志所錄無異匹夫應書其人直云皇之祖考也而已至如元氏起於邊朔其君乃一部之酋之長耳道武追崇所及凡二十八君自開闢, WYG: ''}

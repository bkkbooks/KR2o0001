  - {type: variant, offset: 934, length: 1, content: 撰, WYG: 短三也按二傳雖以釋經為主其缺漏不可殫論如經云薨而左傳云公子圍所殺及公羊作傳重述經文無所發明依違而已其短四也漢書載成方遂詐稱戾太子至於闕下雋不疑曰昔衛蒯瞶得罪於先君將入國太子輙拒而不納春秋是之遂命執以屬吏霍光由是始重儒學按雋生所引乃公羊正文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國梟獍為曹禮法不容名教同嫉而公羊釋義反以衛輙為賢是違夫子之教失聖人之㫖奬進惡徒疑誤後學其短五也若以彼三長校兹五短勝負之理為主而於内則為國隱惡於外則承赴而書求其本事大半失實已於疑經篇載之詳矣尋斯義之作也盖是周禮之故事魯國之遺文夫子因而修之亦存舊制而已至於實録付之丘明用使善惡必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉盖語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲盖而彰求名而亡善人勸焉淫人懼焉尋春秋所書實乖此義而左傳所録無媿斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉杜預釋例曰凡諸侯無加民之惡而稱人以執皆時之赴吿欲重而罪以加民為辭國史承以書於䇿而簡牘之記具存夫子因示虛實故左傳隨實而著本狀以明其得失也案杜氏此釋實得經傳之情者也儒者茍譏左氏作傳多敘經外别事如楚鄭與齊三國之賊弑隱桓昭襄四君之簒逐其外則承吿如彼其内則隱諱如此若無左氏立傳其事無由獲知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當晉景行覇公室方强而云韓氏攻趙有程嬰杵臼之事出史記趙世家魯侯禦宋得雋乘丘而云莊公敗績有馬驚流矢之禍楚晉相遇唯在邲役而云二國交戰置師於兩堂出賈誼新書子罕相國宋睦於晉而云晉將伐宋覘其哭陽門蜀本哭下有於字宋本無介夫乃止出禮記魯師滅項晉止僖公而云項實齊桓所滅春秋為賢者諱出公羊傳襄年再盟君臣和叶而云諸侯失政大夫皆執國權出穀梁傳其記時也盖秦穆居春秋之始而云其女為荆昭夫人出列女傳韓}

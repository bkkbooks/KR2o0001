  - {type: variant, offset: 754, length: 0, content: '', krp: 㣲言之作豈獨宣父者耶其虛美五也其十八條考兹衆美徵其本源良由達者相承儒敎傳授既欲神其事故談過其實語曰衆善焉必察之孟子曰堯舜不勝其美桀紂不勝其惡尋世之言春秋者得非覩衆善而不察同堯舜之多美者乎其十九條昔王充說論有問孔之篇雖論語群言多見指擿而春秋雜義曾未發明是用廣彼舊疑增其新覺將來學者幸為詳之其二十條申左第五古之人言春秋三傳者多矣戰國之世其事罕聞當前漢專用公羊宣皇已降穀梁又立扵學至成帝世劉歆始重左氏而書不列學官大抵}

  - {type: variant, offset: 1205, length: 3, content: 編目敍, krp: 短五也若以彼三長校兹五短勝負之理為主而於内則為國隱惡於外則承赴而書求其本}
  - {type: variant, offset: 1209, length: 10, content: 皆謂蜀先主爲昭烈皇帝, SBCK: 太半失實已於疑經篇載之詳矣尋斯義之作也盖是周禮之故事魯國之遺文夫子因而修之亦存舊制而已}

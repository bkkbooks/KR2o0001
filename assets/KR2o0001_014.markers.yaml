  - {type: 'tls:seg', offset: 756, content: '', id: KR2o0001_tls_014-7a.2}
  - {type: variant, offset: 756, length: 0, content: '', SBCK: 重兩傳而輕左氏者固非一家美左氏而議兩傳者亦非一族互相攻擊各自朋黨聒籠紛竸是非莫分然則儒者之學苟以專精為主其扵治章句通訓釋斯則可也至扵論大躰舉宏綱則言罕兼統理無要害故使今古疑滯莫得而申者焉必揚㩁而論之言傳者固當以左氏為首但自古學左氏者談之又不得其情如賈逵撰左氏長義}
  - {type: page-break, offset: 756, content: '', id: KR2o0001_SBCK_014-10b}

  - {type: variant, offset: 721, length: 0, content: '', krp: 已㦲嗟夫古今世殊師授路隔恨不得親膺洒掃陪五尺之童躬奉德音撫四科之友而徒以硏尋蠧簡穿鑿遺文菁華乆謝糟粕為偶遂使理有未達無由質疑是用握卷躊躇揮毫悱憤儻梁木斯壞魂而有靈敢効接輿之歌輙同林放之問但孔氏之立言行事刪詩讃易其義旣廣難以具論今惟摭其史文評之扵後按夫子所修之史是曰春秋切詳春秋之義其所未諭者有十二何者趙孟以無辭伐國貶號為人𣏌伯以夷來朝降爵稱子虞班晉上惡貪賄而先書楚長晉盟譏無信而後列此則人倫臧否在我筆端直道而行夫何所讓奚為齊鄭及楚國有弑君各以疾赴遂皆書卒年鄭子駟弑其君僖公十年齊人昭元年公子圍弑其君郟敖襄七子麋卒鄭伯頑卒齊侯陽生卒弑其君悼公而春秋但書云楚夫臣弑其君子弑其父凡在含識皆知恥懼苟欺而可免則誰不願然且官為正卿返不討賊地居冡嫡藥不親嘗遂皆被以惡名播諸來葉必以彼三逆方兹二弑躬為梟獍則漏網遺名跡涉瓜李乃擬指顯録嫉惡之情豈其若是其所未諭一也其一條又案齊乞野幕之弑事起陽生楚靈乾谿之縊禍由常夀而春秋捐其首謀捨其親弑陳乞比乞謂齊比也楚公子亦何異魯酒薄而邯鄲圍城門火而魚池及必如是則邾之閽者私憾射姑以其君急而好潔可行欺以激怒遂傾瓶水沃庭俾廢爐而爛卒斯亦罪之大者曷不書弑乎弑邾子宜書云閽其所未諭二也其二條蓋明鏡之照物也妍媸必露不以毛嬙之靣或有疵瑕而寢其鑒也虚空之傳嚮也清濁必聞不以綿駒之歌時有娛曲而輟其應也夫史官執簡宜類扵斯苟愛而知其醜憎而知其善善惡必書斯為實録觀夫子修春秋也多為賢者諱狄實㓕衞因桓恥而不書河陽召王成文羙而稱狩斯則情兼向背志懷彼我苟書法其如是也豈不使夫君子靡憚憲章雖玷白圭無慙良史乎其所未諭三也其三條哀八年及十三年公再與吳盟而皆不書注云八年云盟不書何恥之故不録也不書盟恥吳夷也十二年注桓二年公及戎盟戎實豺狼非我族類夫非所諱而仍諱謂當恥而無恥求之折衷未見其宜其所未諭四也其四條諸國臣子非卿不書必以地来奔則雖賤亦志斯豈非國之大事不可限以常流者耶如陽虎盗入于讙擁陽關而外叛傳具其事經獨無聞何哉且弓玉云亡猶獲顯記城邑失守反不沾書略大存小理乖懲勸其所未諭五也其五條按諸侯世嫡嗣業居䘮旣未成君不避其諱此春秋之例也何為般野之殁皆書以名而惡視之殂直云子卒其所未諭六也其六條凡在人倫不得其死者邦君已上皆謂之弑卿士已上通謂之殺此又春秋之例也按桓二年書曰宋督弑其君與夷及其大夫孔父僖十年又曰晉里克弑其君卓及其大夫荀息夫臣當為殺而稱及與君弑同科苟弑殺不分則君臣靡别者矣義之故難通既未釋此疑共編於未諭公羊傳曰及者何累也雖有此釋其此也他放其所未諭七也其七條夫臣子所書君父是黨雖事乖正直而理合名教如魯之隱桓戕弑昭哀放逐姜氏淫奔子般夭酷斯則邦之孔醜諱之可也如公送晉葬公與吳盟為齊所止為邾所敗盟而不至㑹而後期並諱而不書豈非煩碎之甚且按汲冡竹書與晉春秋及紀年之載事也如重耳出奔惠公見獲書其本國皆無所隱唯魯春秋之記其國也則不然何者國家之事無大無小苟涉嫌疑動稱恥諱厚誣來世奚獨多乎其所未諭八也其八條案昭十二年齊納北燕伯傳于陽者何公子陽生也杜注云陽即唐燕之别邑左傳曰納北燕伯欵于唐子曰齊之事我乃知之矣在側者曰子苟知之何以不革曰如爾所不知何夫如是夫子之修春秋皆遵彼乖僻習其訛謬凡所編次不加刋改者矣何為其間則一褒一貶時有弛張或㳂或革曾無定體其所未諭九也其九條又書事之法其理宜明使讀者求一家之廢興則前後相㑹討一人之出入則始末可尋如定六年書鄭㓕許以許男斯歸而哀元年書許男與楚圍蔡夫許既㓕矣君執家亡能重列諸侯舉兵圍國者何哉盖其間行事必當有說經既不書傳又闕載鈌畧如此尋繹難知其所未諭十也其十條按晉自魯閔公已前未通於上國至僖二年滅下陽已降漸見於春秋盖始命行人自達於魯也而瑣語晉春秋載魯國閔公時事言之甚詳斯則聞事必書無假相赴者也盖當時國史它皆倣此至於夫子所脩也則不然凡書異國皆取來吿苟有所吿雖小必書如無其吿雖大亦闕故宋飛六鷁小事也以有吿而書之晉滅三邦大事也}
  - {type: variant, offset: 722, length: 0, content: '', SBCK: 㓕霍也謂㓕耿滅以無吿而闕之用使巨細不均繁省失中尋兹例之作也盖因周禮舊法比夫諸國史記奚事獨為踈濶成文魯䇿夫子既撰不刋之}
  - {type: page-break, offset: 722, content: '', id: KR2o0001_SBCK_014-6b}
  - {type: variant, offset: 722, length: 0, content: '', WYG: 滅霍也以無吿而闕之用使巨細不均繁省失中比夫諸國史記奚事獨為疎闊尋兹例之作也蓋因周禮舊法魯䇿成文夫子既撰不刋之}
  - {type: variant, offset: 722, length: 0, content: '', krp: 㓕霍也謂㓕耿滅以無吿而闕之用使巨細不均繁省失中尋兹例之作也盖因周禮舊法比夫諸國史記奚事獨為踈濶成文魯䇿夫子既撰不刋之}
  - {type: punctuation, offset: 723, content: ‧, id: KR2o0001_tls_014-bkkpn165}
  - {type: variant, offset: 723, length: 1, content: 序, SBCK: 為後王之則豈可仍其過失而不中規矩乎其所未諭十一也一條其十盖君子以愽聞多識為工良史以實錄直書為貴而春秋記他國之事必憑來者之辭而來者所言多非其實或兵敗而不以敗吿君弑而不以弑稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋塟而以冬赴皆承其所說而書遂使眞偽莫分是非相亂其所未諭十二也其十二條凡所未諭其類􅀹多静言思之莫䆒所以豈夫子之墻數仞不得其門者歟將丘也幸苟有過人必知之者歟如其與奪請謝不敏其十三條又世人以夫子固天所縱將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫之指實㩁而為論其虚美者有五焉按古者國有史官具列時事觀汲冢所記皆與魯史符同至如周之東遷其說稍備隱桓已上難得而詳此其煩省皆與春秋不别又􅀗君曰止誅臣曰刺殺其大夫曰殺執我行人鄭弃其師隕石于宋五弃師出􅃈語􅀳春秋也其事並出竹書}
  - {type: page-break, offset: 723, content: '', id: KR2o0001_SBCK_014-7a}
  - {type: page-break, offset: 723, content: '', id: KR2o0001_SBCK_014-7b}
  - {type: variant, offset: 723, length: 3, content: 序紀襲, WYG: 為後王之則豈可仍其過失而不中規矩者乎其所未諭十一也其十二條蓋君子以博聞多識為工良史以實録直書為貴而春秋記他國之事必憑來者之辭而來者所言多非其實或兵敗而不以敗吿君弑而不以弑稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋葬而以冬赴皆承其所説而書遂使眞偽莫分是非相亂其所未諭十二也其十三條凡所未諭其類尤多静而思之莫究所以豈夫子之牆數仞不得其門者歟將丘也幸茍有過人必知之者歟如其與奪請謝不敏其十四條又世人以夫子固天攸縦將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫知指實㩁而為論}
  - {type: page-break, offset: 723, content: '', id: KR2o0001_WYG_013-16a, image: WYG0685/WYG0685-0106a.png}
  - {type: page-break, offset: 723, content: '', id: KR2o0001_WYG_013-16b, image: WYG0685/WYG0685-0106b.png}
  - {type: variant, offset: 723, length: 1, content: 序, krp: 為後王之則豈可仍其過失而不中規矩乎其所未諭十一也一條其十盖君子以愽聞多識為工良史以實錄直書為貴而春秋記他國之事必憑來者之辭而來者所言多非其實或兵敗而不以敗吿君弑而不以弑稱或宜以名而不以名或應以氏而不以氏或春崩而以夏聞或秋塟而以冬赴皆承其所說而書遂使眞偽莫分是非相亂其所未諭十二也其十二條凡所未諭其類尤多静言思之莫䆒所以豈夫子之墻數仞不得其門者歟將丘也幸苟有過人必知之者歟如其與奪請謝不敏其十三條又世人以夫子固天所縱將聖多能便謂所著春秋善無不備而審形者少隨聲者多相與雷同莫之指實㩁而為論其虚美者有五焉按古者國有史官具列時事觀汲冢所記皆與魯史符同至如周之東遷其說稍備隱桓已上難得而詳此其煩省皆與春秋不别又獲君曰止誅臣曰刺殺其大夫曰殺執我行人鄭弃其師隕石于宋五弃師出瑣語晉春秋也其事並出竹書}
  - {type: punctuation, offset: 725, content: 》, id: KR2o0001_tls_014-bkkpn166}

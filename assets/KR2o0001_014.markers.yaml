  - {type: 'tls:seg', offset: 725, content: '', id: KR2o0001_tls_014-6a.24}
  - {type: variant, offset: 725, length: 1, content: 襲, SBCK: 年唯鄭諸如此句多是古史全文則知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史䇿有闕文時月有失次皆存而不正無所用心斯又不可能而殫􅀃而太史公云夫子為春秋筆則筆削則削子夏之徒不能賛一辭其虚美一也其十四條又案宋襄公執滕子而誣之以得罪楚靈王弑郟敖而赴之以疾亡春秋皆承吿而書曾無變革是則無􅇳者反加以罪有罪者得隱其􅇳求諸勸戒其義安在而左丘明論春秋之義云或求名而不得或欲盖而彌彰善人勸焉􅁋人懼焉}
  - {type: page-break, offset: 725, content: '', id: KR2o0001_SBCK_014-8a}
  - {type: variant, offset: 725, length: 1, content: 襲, krp: 年唯鄭諸如此句多是古史全文則知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史䇿有闕文時月有失次皆存而不正無所用心斯又不可能而殫說而太史公云夫子為春秋筆則筆削則削子夏之徒不能賛一辭其虚美一也其十四條又案宋襄公執滕子而誣之以得罪楚靈王弑郟敖而赴之以疾亡春秋皆承吿而書曾無變革是則無辜者反加以罪有罪者得隱其辜求諸勸戒其義安在而左丘明論春秋之義云或求名而不得或欲盖而彌彰善人勸焉淫人懼焉}
  - {type: variant, offset: 728, length: 2, content: 號生, SBCK: 美二也其十五條又春秋之􅀁書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌盻習扵春秋至扵董狐書法而不隱南史執簡而累進又寗殖出君而卒自憂名在䇿書故知當時史臣各懷直筆斯}
  - {type: page-break, offset: 728, content: '', id: KR2o0001_SBCK_014-8b}
  - {type: variant, offset: 728, length: 2, content: 號生, WYG: 美者有五焉按古者國有史官具列時事觀汲墳所記墳一作冢皆與魯史符同至如周之東遷其説稍備隱桓已上難得而詳此之煩省皆與春秋不别又獲君曰止誅臣曰刺殺其大夫曰執我行人鄭棄其師隕石于宋五其事並出竹書紀年唯鄭棄師出瑣語晉春秋也諸如此句多是古史全文}
  - {type: page-break, offset: 728, content: '', id: KR2o0001_WYG_013-17a, image: WYG0685/WYG0685-0106c.png}
  - {type: variant, offset: 728, length: 2, content: 號生, krp: 美二也其十五條又春秋之所書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌盻習扵春秋至扵董狐書法而不隱南史執簡而累進又寗殖出君而卒自憂名在䇿書故知當時史臣各懷直筆斯}

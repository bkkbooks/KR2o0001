  - {type: punctuation, offset: 1219, content: ，, id: KR2o0001_tls_014-bkkpn279}
  - {type: variant, offset: 1221, length: 0, content: '', SBCK: 實錄付之丘明用使善惡必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉盖語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲盖而彰求名而亡善人勸焉淫人懼焉尋春秋所書實乖此義而左傳所錄無媿斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉侯無加民之惡而杜預釋例曰凡諸國史承以書於䇿而簡牘之記具有失得因示無人以執皆時之赴吿欲重其罪以加民為辭失也按杜氏此釋實得經傳之情者也虛實故左傳隨實而著本狀以明其得儒者苟譏左氏作傳多敘經外别事如楚鄭與齊三國之賊隱桓昭襄四君之簒逐其外則承吿如彼其内則隱諱如此若無左氏立傳其事無由􅀗知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當􅀳景行覇公室方强而云韓氏攻趙有程嬰杵臼之事趙世家出史記魯侯禦宋得雋乗丘而云莊公敗績有馬驚流矢之禍楚􅀳相遇唯在邲役而云二國交戰置師於兩堂新書出賈誼子罕相國宋睦於􅀳而云􅀳將伐宋覘其哭於陽門介夫乃止記出禮魯師㓕項􅀳止僖公而云項實齊桓所滅春秋為賢諱羊傳出公襄年再盟君臣和叶而云諸侯失正大夫皆執國權梁傳出穀其記時也盖秦穆居春秋之始而云其女為荆昭夫人女傳出烈韓魏處戰國之時而云其君陪楚莊王葬焉滑稽傳出史記列子書}
  - {type: page-break, offset: 1221, content: '', id: KR2o0001_SBCK_014-15a}
  - {type: page-break, offset: 1221, content: '', id: KR2o0001_SBCK_014-15b}
  - {type: page-break, offset: 1221, content: '', id: KR2o0001_SBCK_014-16a}
  - {type: variant, offset: 1221, length: 0, content: '', krp: 實錄付之丘明用使善惡必彰真偽盡露向使孔經獨用左傳不作則當代行事安得而詳者哉盖語曰仲尼修春秋逆臣賊子懼又曰春秋之義也欲盖而彰求名而亡善人勸焉淫人懼焉尋春秋所書實乖此義而左傳所錄無媿斯言此則傳之與經其猶一體廢一不可相須而成如謂不然則何者稱為勸戒者哉侯無加民之惡而杜預釋例曰凡諸國史承以書於䇿而簡牘之記具有失得因示無人以執皆時之赴吿欲重其罪以加民為辭失也按杜氏此釋實得經傳之情者也虛實故左傳隨實而著本狀以明其得儒者苟譏左氏作傳多敘經外别事如楚鄭與齊三國之賊隱桓昭襄四君之簒逐其外則承吿如彼其内則隱諱如此若無左氏立傳其事無由獲知然設使世人習春秋而唯取兩傳也則當其時二百四十年行事茫然闕如俾後來學者代成聾瞽者矣且當秦漢之世左氏未行遂使五經雜史百家諸子其言河漢無所遵憑故其記事也當晉景行覇公室方强而云韓氏攻趙有程嬰杵臼之事趙世家出史記魯侯禦宋得雋乗丘而云莊公敗績有馬驚流矢之禍楚晉相遇唯在邲役而云二國交戰置師於兩堂新書出賈誼子罕相國宋睦於晉而云晉將伐宋覘其哭於陽門介夫乃止記出禮魯師㓕項晉止僖公而云項實齊桓所滅春秋為賢諱羊傳出公襄年再盟君臣和叶而云諸侯失正大夫皆執國權梁傳出穀其記時也盖秦穆居春秋之始而云其女為荆昭夫人女傳出烈韓魏處戰國之時而云其君陪楚莊王葬焉滑稽傳出史記列子書}
  - {type: variant, offset: 1222, length: 0, content: '', SBCK: 尼父而云生在鄭穆之年七錄出劉向扁鵲醫療虢公而云時當趙簡子之日扁鵲傳出史記欒書仕於周而云以􅀳文如獵犯顏直言新序出劉向荀息死於奚齊而云觀􅀳靈作臺累碁申誡說苑出劉向或以先為後或以後為先日月顛倒上下翻覆古來君子曾無所疑及左傳既行而其失自顯語其弘益不亦多乎而世之學者猶未之悟所謂忘我大德日用而不知者焉然自丘明之後迄及魏滅年將千祀其書􅃦廢至􅀳太康年}
  - {type: page-break, offset: 1222, content: '', id: KR2o0001_SBCK_014-16b}
  - {type: variant, offset: 1222, length: 0, content: '', krp: 尼父而云生在鄭穆之年七錄出劉向扁鵲醫療虢公而云時當趙簡子之日扁鵲傳出史記欒書仕於周而云以晉文如獵犯顏直言新序出劉向荀息死於奚齊而云觀晉靈作臺累碁申誡說苑出劉向或以先為後或以後為先日月顛倒上下翻覆古來君子曾無所疑及左傳既行而其失自顯語其弘益不亦多乎而世之學者猶未之悟所謂忘我大德日用而不知者焉然自丘明之後迄及魏滅年將千祀其書寢廢至晉太康年}
  - {type: variant, offset: 1223, length: 0, content: '', SBCK: 汲􅃁􅀗書全同左氏書尋亦亡汲􅃁所得秋時事與左氏同師春多載春秋時筮者繇辭逸今惟紀年􅃈}
  - {type: variant, offset: 1223, length: 0, content: '', krp: 汲冡獲書全同左氏書尋亦亡汲冡所得秋時事與左氏同師春多載春秋時筮者繇辭逸今惟紀年瑣}
  - {type: variant, offset: 1224, length: 0, content: '', SBCK: 師春在焉按紀年􅃈語載春無一字差舛將左氏相校遂故束晳云若使此書出於漢世劉歆不作五原太守矣於是摯虞束晳引其義以相明王接荀顗取其文以相證杜預申以注釋釋謂釋例注謂注解于寳籍為􅀳紀紀敘例中事具于寳􅀳由是世稱實錄不復言非其書漸行物無異議故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曾子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其㫖傳所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋夫學者苟徵此二􅀃以考三傳亦足以定是非明真偽者矣何必觀汲􅃁而後信者乎以此而言}
  - {type: page-break, offset: 1224, content: '', id: KR2o0001_SBCK_014-17a}
  - {type: variant, offset: 1224, length: 0, content: '', krp: 師春在焉按紀年瑣語載春無一字差舛將左氏相校遂故束晳云若使此書出於漢世劉歆不作五原太守矣於是摯虞束晳引其義以相明王接荀顗取其文以相證杜預申以注釋釋謂釋例注謂注解于寳籍為晉紀紀敘例中事具于寳晉由是世稱實錄不復言非其書漸行物無異議故孔子曰吾志在春秋行在孝經於是授春秋於丘明授孝經於曾子史記云孔子西觀周室論史記舊聞次春秋七十子之徒口授其㫖傳所刺譏褒諱之文不可以書見也魯君子左丘明懼弟子人各異端失其真意故因孔氏史記具論其語成左氏春秋夫學者苟徵此二說以考三傳亦足以定是非明真偽者矣何必觀汲冡而後信者乎以此而言}

  - {type: variant, offset: 731, length: 1, content: 謂, SBCK: 有}
  - {type: variant, offset: 731, length: 0, content: '', WYG: 知夫子之所修者但因其成事就加雕飾仍舊而已有何力哉加以史䇿有闕文時月有失次皆存而不正無所用心斯又不可能而殫説矣而太史公云夫子為春秋筆則筆削則削子夏之徒不能贊一辭其虛美一也其十五條又案宋襄公執滕子而誣之以得罪楚靈王弑郟敖而赴之以疾亡春秋皆承吿而書曾無變革是則無辜者反加以罪有罪者得隱其辜求諸勸戒其義安在而左丘明論春秋之義云或求名而不得或欲盖而名彰善人勸焉淫人懼焉其虛美二也其十六條又春秋之所書本以褒貶為主故國語晉司馬侯對其君悼公曰以其善行以其惡戒可}

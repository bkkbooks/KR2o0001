  - {type: variant, offset: 1128, length: 184, content: 類是也有匹夫而不名者若步兵彭澤之類是也史論立言理當雅正如班述之敍聖卿也而曰董公惟亮范贊之言季孟也至曰隗王得士習談漢主則謂昭烈爲玄德習氏漢晉春秋以蜀爲正統其編目敍事皆謂蜀先主爲昭烈皇帝至於論中語則呼爲玄德裴引魏室則目文帝爲曹丕夫以淫亂之臣忽隱其諱正朔之后反呼其名意好奇而輒爲文逐韻而便作班固哀紀述曰宛孌董公惟亮天功隗囂公孫述傳贊曰公孫習吏隗王得士用捨之道其例無恆但近代爲, WYG: 優劣見矣}

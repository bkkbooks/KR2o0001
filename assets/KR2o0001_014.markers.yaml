  - {type: variant, offset: 720, length: 0, content: '', krp: 故使三千弟子七十門人鑚仰不及請益無倦然則尺有所短寸有所長其間切磋酬對頗亦互聞得失何者覩仲由之不悅則矢天厭以自明答言偃之絃歌則稱戯言以釋難斯則聖人之設教其理含弘或援誓以表心或稱非以受屈豈與夫庸儒末學文過飾非使夫問者緘辭杜口懷疑不展若斯}

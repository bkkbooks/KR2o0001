  - {type: variant, offset: 857, length: 1, content: 出, SBCK: 詳其長二也論語子曰左丘明耻之丘亦耻之夫以同聖之才而膺授經之托加以達者七十弟子三千逺自四方同在一國於是上詢夫子下訪其徒凡所採摭實廣聞見其長三也如穀梁公羊者生於異國長自後來語地則與魯史相違論時則與宣尼不接安得以傳聞之􅀃而與親見者爭先乎譬猶近世漢之太史􅀳之著作撰成國典時號正言既而先賢􅂄舊益部􅂄舊傳襄陽􅂄舊傳等書謂楚國先賢傳汝南先賢行狀語林世􅀃竟造異端强書他事夫以傳自委巷而將班馬抗衡訪書古老而與子孫並列斯則難矣彼二傳之方左氏亦奚異於此哉其短一也左氏述臧哀伯諌桓納鼎周内史美其讜言王子朝吿于諸侯閔馬父嘉其辨􅀃凡如此類其數實多斯盖}

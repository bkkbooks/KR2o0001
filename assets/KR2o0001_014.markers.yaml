  - {type: variant, offset: 1203, length: 1, content: 統, SBCK: 文如論語冉有曰夫子為衛君乎子貢曰夫子不為也何則父子爭國梟獍為曹禮法不容名教同嫉而公羊釋義反以衛輒為賢是違夫子之教失聖人之㫖奬進惡徒疑誤後學}

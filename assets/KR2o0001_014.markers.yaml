  - {type: variant, offset: 1131, length: 0, content: '', SBCK: 鼎季札觀樂而談國風其所述逺古則委曲如存舜舉八元八凱魏絳荅􅀳悼公引虞人之箴如郯子聘魯言少昊以鳥名官季孫行父稱其事明白非是厚誣之類子革諷楚靈王誦祈招之詞徴近代則循環可覆􅀳用􅀳士渥濁諌殺荀林父說文公敗楚於如呂相絶秦述兩國世􅂩聲子班荆稱楚材食析骸以釁猶無城下之盟祝他稱踐土盟􅀳城濮}
  - {type: variant, offset: 1131, length: 0, content: '', krp: 鼎季札觀樂而談國風其所述逺古則委曲如存舜舉八元八凱魏絳荅晉悼公引虞人之箴如郯子聘魯言少昊以鳥名官季孫行父稱其事明白非是厚誣之類子革諷楚靈王誦祈招之詞徴近代則循環可覆晉用晉士渥濁諌殺荀林父說文公敗楚於如呂相絶秦述兩國世隙聲子班荆稱楚材食析骸以釁猶無城下之盟祝他稱踐土盟晉城濮}
  - {type: variant, offset: 1132, length: 1, content: 匹, SBCK: 憂色子服景伯謂呉云楚圍宋易子而甲午之類也重耳魯申蔡必料其功用厚薄指意深淺諒非經營草創出自一時琢磨潤色獨成一手斯盖當時國史已有成文丘明但編而次之配經稱傳而已也如二傳者記言載事失彼菁華尋源討本取諸胷臆}

  - {type: variant, offset: 1049, length: 0, content: '', WYG: 榛蕪若此豈所謂非言之難而行之難乎其十五條漢書龔遂傳曰上遣使者徵遂議曹王生請從功曹以為王生每嗜酒亡節度不可從遂不聽從至京師王生日飲酒不視太守㑹遂引入宫王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之德非小臣之力}
  - {type: page-break, offset: 1049, content: '', id: KR2o0001_WYG_015-11b, image: WYG0685/WYG0685-0117b.png}
  - {type: punctuation, offset: 1050, content: ，, id: KR2o0001_tls_015-bkkpn278}
  - {type: 'tls:seg', offset: 1050, content: '', id: KR2o0001_tls_015-8a.4}
  - {type: variant, offset: 1050, length: 5, content: 殷周已往採, WYG: 遂受其言既至前上果問以治狀遂對如王生天子悅其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹敎戒臣也云云上以議曹王生為水衡丞除八十四字其十六條新晉書袁宏傳曰袁宏有逸才文章絶美曾為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乘月率爾與左右微服泛江㑹宏在舫中諷其所作詠史詩詠聲既清詞又藻麗遂駐聽久之遣問焉答曰是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之談論申旦不寐自此名譽日茂云云從桓温北伐作北征賦其文之髙者嘗與王珣伏滔同在桓温坐温令滔讀其北征賦至聞所傳於相傳云獲麟於北野誕靈物以瑞德奚受體於虞者疚尼父之慟泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韻珣云此賦方傳千載無容率爾今於天下之後便改移韻從事然於寫送之致似為未盡滔云得益寫韻一句或為小勝宏應聲答曰感不絶於予心愬流風而獨寫云云謝安嘗賞其機對辨速後安為揚州刺史自吏部郎出為東陽郡乃祖道於冶亭時賢皆集謝安欲以卒迫試之臨别執其手顧就左右以一扇而授之曰聊以贈行宏應聲答曰輙當奉揚仁風慰}

  - {type: punctuation, offset: 755, content: 「, id: KR2o0001_tls_015-bkkpn208}
  - {type: variant, offset: 756, length: 373, content: 儁始自會稽典錄潁川八龍出於荀氏家傳而修晉漢史者皆徵彼虛譽定爲實錄茍不加以研覈何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盜嫂翟義不死諸葛猶存此皆得之於行路傳之於衆口儻無明白其誰曰然故蜀相薨於渭濱晉書稱嘔血而死魏君崩於馬圈齊史云中矢而亡沈炯罵書河北以爲王偉魏收草檄關西謂之邢邵夫同說一事而分爲兩家蓋言之者彼此有殊故書之者是非無定況古今路阻視聽壤隔談者或以前爲後或以有爲無涇渭一亂莫之能辨而後來穿鑿喜出異同不憑國史別訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉夔唯一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈此之乖濫往往有旃故作者惡道聽途說之違理街談巷議之損實觀夫子長之撰史記也殷周已往採彼家人安國之述陽秋也梁益舊事訪諸故老夫以芻堯鄙說刊爲竹帛正言而輒欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作冥漠九泉毀譽所加遠誣千載異辭疑事學者宜善思之, SBCK: ''}

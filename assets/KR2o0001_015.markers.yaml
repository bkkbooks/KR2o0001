  - {type: variant, offset: 11, length: 0, content: '', WYG: 舉天下明隂陽灾異者各三人自餘抄撮他皆倣此近則天朝諸撰史者凡有制誥一字不遺唯去詔首稱門下詔尾云主者施行而已時武承嗣監修國史見}

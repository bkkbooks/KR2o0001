  - {type: 'tls:seg', offset: 46, content: '', id: KR2o0001_tls_015-1a.8}
  - {type: punctuation, offset: 53, content: 。, id: KR2o0001_tls_015-bkkpn10}
  - {type: 'tls:seg', offset: 53, content: '', id: KR2o0001_tls_015-1a.9}
  - {type: punctuation, offset: 61, content: ，, id: KR2o0001_tls_015-bkkpn11}
  - {type: 'tls:seg', offset: 61, content: '', id: KR2o0001_tls_015-1a.10}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 也適㑹魏公子無忌奪晉鄙軍以救趙撃秦軍遂引而去於是平原君欲封魯連辭謝者三終不肯受平原君乃致酒酒酣前起以千金為魯連壽云云除三百七十五字加七字其十二條屈原傳漢有賈生為長沙王太傅過湘水投書以弔屈原賈生名誼洛陽人也謫賈生為長沙王太傅賈生既辭往聞長沙卑濕自以為壽不得長又以謫去意不自得及渡湘水為賦以弔屈原其詞曰云云賈生為長沙傅二年有鴞飛入賈生舍止於坐隅楚人命鴞曰鵩賈生既以謫居長沙長沙卑濕自恐壽不得長傷悼之乃為賦以自廣其詞曰云云}
  - {type: page-break, offset: 61, content: '', id: KR2o0001_WYG_015-9a, image: WYG0685/WYG0685-0116a.png}
  - {type: variant, offset: 62, length: 3, content: 鉛握槧, WYG: 王騎墮馬而死無後賈生自傷無狀歲亦死時年三十三矣除七十六字加三字其十三條扁鵲倉公傳曰太倉公者齊太倉長臨淄人也姓淳于氏名意少而喜醫方術高后八年更受師同郡公里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方與}
  - {type: page-break, offset: 62, content: '', id: KR2o0001_WYG_015-9b, image: WYG0685/WYG0685-0116b.png}
  - {type: variant, offset: 66, length: 1, content: 客, WYG: 傳黄帝扁鵲之脉書五色診病知人死生多驗詔問所為治病死生驗者幾}
  - {type: punctuation, offset: 67, content: ，, id: KR2o0001_tls_015-bkkpn12}
  - {type: 'tls:seg', offset: 67, content: '', id: KR2o0001_tls_015-1a.11}
  - {type: variant, offset: 68, length: 0, content: '', WYG: 人主名為誰詔問故太倉長臣意方􅇊所長及所能治病有其書無有皆安受學受學幾何歲}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 有所驗何縣里人也何病醫藥與其病之狀皆何如其悉以對臣意對曰自意少時喜藥醫方試之多}
  - {type: page-break, offset: 69, content: '', id: KR2o0001_WYG_015-10a, image: WYG0685/WYG0685-0116c.png}
  - {type: variant, offset: 70, length: 7, content: 徵求異說採摭羣, WYG: 驗者至髙皇后八年中得見師臨淄元里公乘陽慶已年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黄帝扁鵲之脉書五色診病知人死生決嫌疑定可治及藥書甚精我家給富心愛公欲盡以我禁方書悉敎公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脉書上下經五色診竒咳術揆度隂陽外變藥論石神接隂陽禁書受讀解驗之可一年明歲即驗然尚未精也要事之三年所常以為人診病決死生有驗精良今慶已死十年臣意年盡三十九也齊侍史成自}
  - {type: page-break, offset: 70, content: '', id: KR2o0001_WYG_015-10b, image: WYG0685/WYG0685-0116d.png}
  - {type: punctuation, offset: 74, content: ，, id: KR2o0001_tls_015-bkkpn13}
  - {type: 'tls:seg', offset: 74, content: '', id: KR2o0001_tls_015-1a.12}
  - {type: punctuation, offset: 78, content: ，, id: KR2o0001_tls_015-bkkpn14}
  - {type: 'tls:seg', offset: 78, content: '', id: KR2o0001_tls_015-1a.13}
  - {type: variant, offset: 78, length: 4, content: 然後能成, WYG: 病也臣意診其脉吿曰君之病惡不可言也已下皆述}
  - {type: variant, offset: 83, length: 0, content: '', WYG: 生醫療効驗事除二百九十五字其十四條宋世}
  - {type: punctuation, offset: 84, content: ，, id: KR2o0001_tls_015-bkkpn15}
  - {type: 'tls:seg', offset: 84, content: '', id: KR2o0001_tls_015-1a.14}
  - {type: variant, offset: 84, length: 0, content: '', WYG: 初云襄公嗣位仍謂為宋襄公不去宋襄二字吳世家云闔閭越世家云勾踐每於其號上加吳王越王字句句未嘗捨之孟嘗君}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 曰馮公形容狀貌甚辨按形容狀貌同是一説而敷演重出分為四言凡如此流不可勝載其十二}
  - {type: page-break, offset: 85, content: '', id: KR2o0001_WYG_015-11a, image: WYG0685/WYG0685-0117a.png}
  - {type: variant, offset: 86, length: 44, content: 不朽觀夫丘明受經立傳廣包諸國蓋當時有周志晉乘楚杌等篇遂乃聚而編之混成一錄向使專憑魯策獨詢, WYG: 侯表曰}

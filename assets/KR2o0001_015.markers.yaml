  - {type: variant, offset: 5, length: 0, content: '', SBCK: 外篇􅀧繁第六十一條夫史之繁文已扵敘事篇言之詳矣然凡俗難曉下愚不移雖七卷成言而三隅莫反盖語曰百聞不如一見是以聚米為谷賊虜之虛實可知畫地成圖山川之形勢易悉昔陶隱居本草藥有冷􅀬味者朱墨􅀧其名阮孝緒七録書有文悳殿丹筆寫其字由是區分有别品􅁼可知今輙擬其事鈔自古史傳文有繁者皆以筆􅀧其上雌黄並得其􅀧用朱粉凡字經􅀧者盡宜去之如其間有文句􅃜缺者細書側注於其右用朱粉雄其側書亦注者用朱黄以此為則黄等如正行用粉則别􅂉囘易數字􅂉加足片言俾分布得􅀁彌縫無闕庻觀者易悟其失自彰知必摭實而談是非苟誣前哲孔子家語曰魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年矣一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今果如期而亡夫子何以知然四字除二十家語曰􅀳將伐宋使覘之宋陽門之介夫死司城子罕哭之哀覘者反言於􅀳侯曰宋陽門之介夫死司城子罕哭之哀民咸悅矣宋殆未可伐也字移三字除二十一史記五帝本紀曰諸侯之朝覲者不之丹朱而之舜百姓之獄訟者不之丹朱而之舜謳謌者不之丹朱而謳謌舜舜年二十以孝聞三十而帝堯問可用者云云堯舉之加七字除二十九夏本紀曰禹之父曰鯀鯀之父曰帝顓帝顓之父曰昌意昌意之父曰黄帝禹者黄帝之玄孫而顓頊之孫也禹之曾大父曰昌意及父鯀皆不得在帝位為人臣五除頊祖矣此篇下云禹是顓頊孫則其上不得更十七字加五字按顓頊紀中已具云黄帝是顓則於下文不當復云為人臣今就於朱㸃之中言黄帝之玄孫既上云昌意父鯀不得在帝位筆削庸可盡乎復有此重復造次項羽本紀曰項籍者下相人也字羽起時年二十四其季父項梁梁父楚將項燕為秦將王翦所殺者也項氏世世楚將封於項故姓項氏四字􅁵革其次序除三十字加二十呂氏本紀曰呂太后者高祖㣲時妃也生孝惠帝魯元公王及高祖為漢王得定陶戚􅁎愛幸生趙隱王如意高祖嫌孝惠為人仁弱高祖以為不類我常欲廢太子立戚􅁎子如意類我又戚􅁎幸常獨從上之關東日夜泣涕欲立其子如意以代太子呂后年長常留守希見上益踈如意立為趙王後幾代太子者數矣頼大臣諍之及留侯䇿太子得無廢良等傳過為重矣今又見於呂后紀此事見高惠二紀及諸王叔孫通張十五字加十二字固可畧而不言除七宋世家曰初元公之孫紏景公殺之景公卒紏之公子特攻殺太子而自立是為昭公昭公父公孫紏紏父褍秦即元公少子也景公殺昭公父紏故昭公怨殺太子而自立加十三字除三十六字三王世家曰大司馬臣去病昩死再拜上䟽皇帝陛下陛下過聽使臣去病待罪行間宜專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子頼天能勝衣趨拜至今無號位師傳官陛下恭讓不恤群臣􅀻望不敢越職而言臣切不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察臣去病昧死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央制曰下御史六年三月戊申朔乙亥御史臣光尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣􅂶大行令臣息太子少傅臣安行宗正事昧死上言大司馬臣去病上䟽曰陛下過聽使臣去病待罪行間宜專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀怜百姓以自忘虧膳貶樂損郎貟皇子頼天能勝衣趍拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣切不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察制曰下御史臣與中二千石臣賀等議曰古者裂地立國並建諸侯以承天子所以尊宗廟重社稷也今臣去病上䟽不忘其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有􅃅位臣青翟臣湯等昧死請立皇子臣閎臣旦臣胥為諸侯王昧死請􅀁立􅀦名除一百八十四字加一字已上有言語相重者今畧􅀧廢如此但此一篇􅀁記全宜削除今輙具列扵斯籍為鑒戒者爾凡為史者􅀦有詔誥十分不當取其一焉故漢元帝詔曰蓋聞安民之道本由隂陽間者隂陽錯謬風雨不時朕之不德庶㡬羣公有敢言朕之過者今則不然媮合苟從未肯極言朕甚閔焉永惟蒸庶之饑寒逺離父母妻子勞扵非業之作衛扵不居之宫恐非􅀁以佐隂陽之道也其罷甘泉建章宮衛士各令就農百官各省費條奏毋有􅀁諱有司勉之母犯四時之禁丞相御史舉天下明隂陽灾異者各三人及荀恱撰漢紀略其文曰朕惟衆庶之飢寒逺離父母妻子勞扵非業之作衛扵不居之宮其罷甘泉建章宮衛士各令就農丞相御史舉天下明隂陽灾異者各三人自餘抄撮佗皆倣此近則天朝諸撰史者凡有制誥一字不遺唯去詔首稱門下詔尾云主者施行而已時武承嗣監修􅀦史見之大怒謂史官曰公軰是何人而敢輙减詔書自是史官寫詔書雖門下賛詔亦録後予聞此􅀃每唱嘆而已必以三王世家相比其煩碎則又甚扵斯是知史官之愚其来尚矣今之作者何獨笑武承嗣而已哉魏公子傳曰髙祖始㣲少時數聞公子賢及即天子位每過大梁常祠公子髙祖十二年從撃黥布還為公子置守􅃁五家世世􅀊以四時奉祠公子太史公曰吾過大梁之墟求問其􅀁謂夷門以徵信陵君故事􅀃者云當戰􅀦之時夷門者城之東門也天下諸公子亦有嘉士者矣然而信陵君之接岩穴􅀮者不恥下交名􅃣諸侯有以也高祖每過之祠奉不絶十除十字五字加魯仲連傳曰仲連好竒偉倜儻之畫而不肯仕官任職好持髙節遊扵趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦遂東圍邯鄲趙王恐諸侯之救兵莫敢撃秦魏安􅁵王使將軍􅀳鄙救趙畏秦止扵蕩隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所以急圍趙者前與齊涽王争強為帝已而復歸帝號今齊涽王已益弱今惟秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原君猶豫未有􅀁決此時魯連􅃴逰趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又内圍邯鄲而不去魏王使客將軍新垣衍令趙帝秦今其人在此勝也何敢言事魯連曰吾始以君爲天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請爲君責而歸之平原君曰勝請爲紹介而見之於先生平原君遂見新垣􅄛曰東􅀦有魯連先生者今其人在此勝請爲紹介交之扵將軍新垣􅄛曰吾聞魯連先生齊之髙士也􅄛人臣也使事有職吾不願見魯連先生平原君曰勝已洩之矣新垣􅄛許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中皆有求平原君者也今吾觀先生之玉貌非有所求扵平原君者也曷居此重圍之中而不去魯連云云梁未觀秦稱帝之害也使梁觀秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害何如魯連曰云云吾將使秦王烹􅊽梁王新垣衍怏然不恱曰嘻亦甚矣先生之言也先生又焉能使秦王烹􅊽梁王魯連曰固矣吾將言之今秦萬乘之􅀦也梁亦萬乘之國也俱據萬乘之國各有稱王之名睹其一戰而勝欲從而帝之云云扵是新垣衍􅁸再拜而謝曰始以先生為庸人吾乃今日知先生為天下之士也適㑹魏公子無忌奪晉鄙軍以救趙撃秦軍遂引而去扵是平原君欲封魯連辭謝者三終不肯受平原君乃致酒酒酣起前以千金為魯連夀七十五字加七字云云除三百屈原傳漢有賈生為長沙王大􅀓過湘水投書以吊屈原賈生名誼洛陽人也謫賈生為長沙王太傅賈生既辭徃聞長沙卑濕自以為夀不得長又以謫去意不自得及渡湘水為賦以吊屈原其詞曰云云賈生為長沙傳三年有鴞飛入賈生舎止扵坐隅楚人命鴞曰鵩賈生既以謫居長沙卑濕自恐夀不得長傷悼之乃為賦以自廣其詞曰云云懷王騎墮馬而死無後賈生自傷無状􅀊餘亦死時年三十二矣字加三字除七十六扁鵲倉公傳曰太倉公者齊太倉長臨淄人也姓淳于名意少而喜醫方術高后八年更受師同郡元里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方與之傳黃帝扁鵲之脉書五色診病知人死生多驗詔問所爲治病死生驗者幾何人主名爲誰詔問故太倉長臣意方伎所長及所能治病有其書無有皆安受學受學㡬何􅀊嘗有􅀁驗何縣里人也何病醫藥與其病之状皆何如其悉以對臣意對曰自意少時喜藥醫方試之多不驗者至髙皇后八年中得見師臨淄元里公乘陽慶已年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黄帝扁鵲之脉書五色診病知人死生決嫌疑定可治及藥書甚精我家給富心愛公欲盡以我禁方書悉教公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脉書上下經五色診奇咳術揆度隂陽外變藥論石神接隂陽禁書受讀解驗之可一年明􅀊即驗然尚未精也要事之三年所常以為人診病决死生有驗精良今慶已死十年臣意年盡三十九也齊侍史成自言病頭痛臣意診其脈吿曰君之病惡不可言也驗事除二百九十五字已上皆述一生醫療効宋世家初云襄公嗣位仍謂為宋襄公不去宋襄公二字呉世家云闔閭越世家云勾踐每扵其號上加呉王越王字句句未嘗捨之孟嘗君傳曰馮公形容状貌甚辨按形容状貌同是一􅀃而敷演重出分為四言凡如此流不可勝載其十二諸侯表曰孔子次春秋約其辭文去其煩重又屈原傳曰其文約其辭㣲觀子長此言實有深鑒及自撰史記榛蕪若此豈所謂非言之難而行之難乎漢書龔遂傳曰上遣使者徵遂議曹王生請從功曹以為王生每嗜酒亡節度不可從遂不聽從至京師王生日飲酒不視太守㑹遂引入官王生醉從後呼曰明府且止願有􅀁白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對冝曰皆聖主之德非小臣之力也遂受其言既至前上果問以治状遂對如王生天子悅其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹敎戒臣也云云上以議曹王生為水衡丞四字除八十新􅀳書􅀽宏傳曰􅀽宏有逸才文章絶美曾為詠史詩是其風情􅀁􅀉少孤貧以運租自業謝尚時鎭牛渚秋夜乗月率爾與左右㣲服泛江㑹宏在舫中諷其所作詠史詩詠聲既清亮詞又藻麗遂駐聽乆之遣問焉答云是􅀽臨汝所誦詩即其詠史之作也尚頃率有勝致即迎升舟與之談論申旦不􅄰自此名譽日茂云云從桓温北伐作北征賦其文之髙者甞與王珣伏滔同在桓温坐温令滔讀其北征賦至聞所傳扵相傳云獲麟扵此野誕靈物以瑞德奚受體於虞者疚尼父之慟泣似實慟而非假豈一性之足傷乃致傷扵天下其本至此便改韻珣云此賦方傳千載無容率爾今扵天下之後便改移韻從事然扵寫送之致似為未盡滔云得益寫韻一句或為小勝宏應聲答曰感不絶扵予心愬流風而獨寫云云謝安甞賞其機對辨速後安為楊州刺史自吏部郎出為東陽郡乃祖道扵冶亭時賢皆集謝安欲以卒迫試之臨别執其手願就左右以一扇而授之曰􅂓以贈行宏應聲答曰􅂺當奉揚仁風慰彼􅀺庶顧者無不歎服時人歎其卒而能要焉􅀃除一百一十四字加一十九字此事出檀道鸞晉陽秋及劉義慶世十六國春秋曰郭瑀有女始笄妙選良偶有心於劉昞遂别設一席於座前謂諸弟}

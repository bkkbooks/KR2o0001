  - {type: variant, offset: 12, length: 743, content: 闕文是知史文有闕其來尚矣自非博雅君子何以補其遺逸者哉蓋珍裘以衆腋成溫廣廈以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異說採摭羣言然後能成一家傳諸不朽觀夫丘明受經立傳廣包諸國蓋當時有周志晉乘楚杌等篇遂乃聚而編之混成一錄向使專憑魯策獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採世本國語戰國策楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序說苑七略之辭此並當代雅言事無邪僻故能取信一時擅名千載但中世作者其流日煩雖國有策書殺青不暇而百家諸子私存撰錄寸有所長實廣聞見其失之者則有茍出異端虛益新事至如禹生啟石伊產空桑海客乘槎以登漢姮娥竊藥以奔月如斯踳駁不可殫論固難以汙南董之片簡霑班華之寸札而嵇康高士傳好聚七國寓言玄晏帝王紀多採六經圖讖引書之誤其萌於此矣至范曄增損東漢一代自謂無愧良直而王喬鳧履出於風俗通左慈羊鳴傳於抱朴子朱紫不別穢莫大焉沈氏著書好誣先代於晉則故造奇說在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國承其詭妄重以加諸遂云馬叡出於牛金王劭曰沈約晉書造奇說云瑯琊國姓牛者與夏侯妃私通生中宗因遠敍宣帝以毒酒殺牛金符證其狀收承此言乃云司馬叡晉將牛金之子也宋孝王曰收以叡爲金子計其年全不相干案前史尚如此誤況後史編錄者耶劉駿上淫路氏沈約宋書曰孝武於路太后處寢息時人多有異議魏書因云駿烝其母路氏醜聲播於甌越也可謂助桀爲虐幸人之災尋其生絕胤嗣死遭剖斵蓋亦陰過之所致也晉世雜書諒非一族若語林世說幽明錄搜神記之徒其所載或恢諧小辯或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語皇朝新撰晉史多採以爲書夫以干鄧之所糞除王虞之所糠秕持爲逸史用補前傳此何異魏朝之撰皇覽梁世之修徧略務多爲美聚博爲功雖取說於小人終見嗤於君子矣夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其真偽者乎至如江東, SBCK: 十}
  - {type: variant, offset: 12, length: 2, content: 闕文, WYG: 大怒謂史官曰公輩是何人而敢輙減詔書自是史官寫詔書雖門下贊詔亦録後予聞此説每唱噱而已必以三王世家相比其煩碎則又甚於斯}
  - {type: variant, offset: 12, length: 743, content: 闕文是知史文有闕其來尚矣自非博雅君子何以補其遺逸者哉蓋珍裘以衆腋成溫廣廈以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異說採摭羣言然後能成一家傳諸不朽觀夫丘明受經立傳廣包諸國蓋當時有周志晉乘楚杌等篇遂乃聚而編之混成一錄向使專憑魯策獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採世本國語戰國策楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序說苑七略之辭此並當代雅言事無邪僻故能取信一時擅名千載但中世作者其流日煩雖國有策書殺青不暇而百家諸子私存撰錄寸有所長實廣聞見其失之者則有茍出異端虛益新事至如禹生啟石伊產空桑海客乘槎以登漢姮娥竊藥以奔月如斯踳駁不可殫論固難以汙南董之片簡霑班華之寸札而嵇康高士傳好聚七國寓言玄晏帝王紀多採六經圖讖引書之誤其萌於此矣至范曄增損東漢一代自謂無愧良直而王喬鳧履出於風俗通左慈羊鳴傳於抱朴子朱紫不別穢莫大焉沈氏著書好誣先代於晉則故造奇說在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國承其詭妄重以加諸遂云馬叡出於牛金王劭曰沈約晉書造奇說云瑯琊國姓牛者與夏侯妃私通生中宗因遠敍宣帝以毒酒殺牛金符證其狀收承此言乃云司馬叡晉將牛金之子也宋孝王曰收以叡爲金子計其年全不相干案前史尚如此誤況後史編錄者耶劉駿上淫路氏沈約宋書曰孝武於路太后處寢息時人多有異議魏書因云駿烝其母路氏醜聲播於甌越也可謂助桀爲虐幸人之災尋其生絕胤嗣死遭剖斵蓋亦陰過之所致也晉世雜書諒非一族若語林世說幽明錄搜神記之徒其所載或恢諧小辯或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語皇朝新撰晉史多採以爲書夫以干鄧之所糞除王虞之所糠秕持爲逸史用補前傳此何異魏朝之撰皇覽梁世之修徧略務多爲美聚博爲功雖取說於小人終見嗤於君子矣夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其真偽者乎至如江東, krp: 十}

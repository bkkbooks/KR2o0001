  - {type: 'tls:seg', offset: 24, content: '', id: KR2o0001_tls_015-1a.5}
  - {type: variant, offset: 24, length: 1, content: 自, WYG: 今之作者何獨笑武承嗣而已哉其十條魏公子傳髙祖始微少時數聞公子賢及即天子位每過大梁常祠公子髙祖十二年從撃黥布還為公子置守冢五家世世歲以四時奉祠公子太史公曰吾過大梁之墟求問其所謂夷門以徵信陵君故事說者云當戰國之時夷門者城之東門也天下諸公子亦有嘉士者矣然而信陵君之接岩穴隱者不恥下交名冠諸侯有以也高祖每過之祠奉不絶除十五字加二十字其十一條魯仲連傳曰仲連好竒偉倜儻之畫而不肯仕宦任職好持髙節遊於趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦遂東圍邯鄲趙王恐諸侯之救兵莫敢撃秦魏安釐王使將軍晉鄙救趙畏秦止於湯隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所以急圍趙者前與齊涽王爭强為帝已而復歸帝號今齊涽王已益弱今唯秦雄天下此}
  - {type: page-break, offset: 24, content: '', id: KR2o0001_WYG_015-6b, image: WYG0685/WYG0685-0114d.png}
  - {type: page-break, offset: 24, content: '', id: KR2o0001_WYG_015-7a, image: WYG0685/WYG0685-0115a.png}
  - {type: variant, offset: 26, length: 2, content: 博雅, WYG: 必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原}
  - {type: page-break, offset: 26, content: '', id: KR2o0001_WYG_015-7b, image: WYG0685/WYG0685-0115b.png}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 猶豫未有所決此時魯連適遊趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又内圍邯鄲而不去魏王使客將軍新垣衍令趙帝秦今其人在此勝也何敢言事魯連曰吾始以君為天下之賢公}
  - {type: punctuation, offset: 30, content: ，, id: KR2o0001_tls_015-bkkpn7}
  - {type: 'tls:seg', offset: 30, content: '', id: KR2o0001_tls_015-1a.6}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯連先生者今其人在此勝請為紹介交之於將軍新垣衍曰吾聞魯連先生齊之髙士也衍人臣也使事有職吾不願見魯連先生平原君曰勝已洩之矣新垣衍許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中皆有求平原君者也今吾觀先生之玉貌非有所求於平原君者也曷居此重圍之中而不去魯連云云梁未觀秦稱帝之害也使梁觀秦稱帝之害則必助趙矣新垣衍曰稱秦帝之害}
  - {type: page-break, offset: 30, content: '', id: KR2o0001_WYG_015-8a, image: WYG0685/WYG0685-0115c.png}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 如魯連曰云云吾將使秦王烹醢梁王新垣衍怏然不悅也嘻亦甚矣先生之言也先生又焉能使秦王烹醢梁王魯連曰固矣吾將言之今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交有稱王之名睹其一戰而勝欲從而帝之云云於是新垣衍起再拜而謝曰始}
  - {type: page-break, offset: 31, content: '', id: KR2o0001_WYG_015-8b, image: WYG0685/WYG0685-0115d.png}
  - {type: variant, offset: 32, length: 27, content: 補其遺逸者哉蓋珍裘以衆腋成溫廣廈以羣材合構自古探穴藏山, WYG: 先生為庸人吾乃今日知先生為天下}
  - {type: punctuation, offset: 38, content: ？, id: KR2o0001_tls_015-bkkpn8}
  - {type: 'tls:seg', offset: 38, content: '', id: KR2o0001_tls_015-1a.7}

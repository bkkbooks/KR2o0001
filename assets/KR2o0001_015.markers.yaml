  - {type: variant, offset: 8, length: 2, content: 猶及, krp: 有一女年向成長欲覔一快女婿誰坐此席者吾當婿焉昞遂奮衣來坐神志湛然曰向聞先生欲求怏女婿其人也除二十三字}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 荀悅撰漢紀略其文曰朕惟衆庶之饑寒逺離父母妻子勞於非業之作衞於不居之宫其罷甘泉建章宫衛士各令就農丞相御}

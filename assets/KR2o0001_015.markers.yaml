  - {type: variant, offset: 0, length: 3, content: 採撰第, WYG: 文已於敘事篇言之詳矣然凡俗難曉下愚不移雖七卷成言而三隅莫反盖語曰百聞不如一見是以聚米為谷賊虜之虛實可知畫地成圖山川之形勢易悉昔陶隱居本草藥有冷熱味者朱墨㸃其名阮孝緒七録書有文惪殿者丹筆寫其字由是區分有别品類可知今輙擬其事鈔自古史傳文有煩者皆以筆㸃其上其㸃用朱粉雌黄並得凡字經㸃者盡宜去之如其間有文句虧缺者細書側注於其右其側書亦用朱粉雌黄等如正行用粉則别注者用朱黄以此為别或囘易數字或加足片言俾分布得所彌縫無闕庶觀者易悟其失自彰如我摭實而談是非茍誣前哲其一條孔子家語曰魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年必亡矣一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今果如期而亡夫子何以知然除二十四字其二條家語曰晉將伐宋使覘之宋陽門之介夫死司城子罕哭之哀覘者反言於晉侯曰宋陽門之介夫死而司城子罕哭之哀民咸悦矣宋殆未可伐也除三十一字移三字其三條史記五帝本紀曰諸侯之朝覲者不之丹朱而之舜百姓之獄訟者不之丹朱而之舜謳歌者皆不謳謌丹朱而謳謌舜舜年二十以孝聞三十而帝堯問可用者云云舜年二十以孝聞三十堯舉之除二十九字加七字其四條夏本紀曰禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黄帝禹者黄帝之𤣥孫而顓頊之孫也禹之曾大父曰昌意及父鯀皆不得在帝位為人臣除五十七字加五字案顓頊紀中已具云黄帝是顓頊祖矣此篇下云禹是顓頊孫則其上不得更言黄帝之𤣥孫既上云昌意及鯀不得在帝位則於下文不當復云為人臣今就於朱㸃之中復有此重復造次筆削庸可盡乎其五條項羽本紀曰項籍者下相人也字羽起時年二十四其季父項梁梁父楚將項燕為秦將王翦所殺者也項氏世世楚將封於項故姓項氏除三十字加二十四字釐革其次序其六條呂氏本紀曰呂太后者高祖微時妃也生孝惠帝魯元公主及高祖為漢王得定陶戚姬愛幸生趙隱王如意高祖嫌孝惠為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意類我又戚姬幸常獨從上之關東日夜泣涕欲立其子如意以代太子呂后年長常留守希見上益疎如意立為趙王後幾代太子者數矣賴大臣諍之及留侯䇿太子得無廢此事見高惠二紀及諸王叔孫通張良等傳過為重疊矣今又見於呂后紀固可略而不言除七}

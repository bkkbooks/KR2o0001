  - {type: variant, offset: 3016, length: 155, content: 許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨舍諸深所未曉歷觀衆史諸志列名或前略而後詳或古無而今有雖遞補所闕各自以爲工榷而論之皆未得其最蓋可以爲志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬戶兆庶仰其威神虎踞龍蹯帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則, WYG: 乃}

  - {type: variant, offset: 2849, length: 1151, content: 所欲知也四支六府痾瘵所纏茍詳其孔穴則砭灼無誤此養生之尤急也且身名並列親疏自明豈可近昧形骸而遠求辰象既天文有志何不爲人形志乎茫茫九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣被且事當炎運尤相關涉爾雅釋物非無往例既藝文有志何不爲方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七略因人成事其目遂多至若許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨舍諸深所未曉歷觀衆史諸志列名或前略而後詳或古無而今有雖遞補所闕各自以爲工榷而論之皆未得其最蓋可以爲志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬戶兆庶仰其威神虎踞龍蹯帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宮闕制度朝廷軌儀前王所爲後王取則故齊府肇建誦魏都以立宮代國初遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晉宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏遠名號非一凡爲國史者宜各撰都邑志列於輿服之上金石草木縞紵絲枲之流鳥獸蟲魚齒革羽毛之類或百蠻攸稅或萬國是供夏書則編於禹貢周書則託於王會亦有圖形九牧之鼎列狀四荒之經觀之者擅其博聞學之者騁其多識自漢氏拓境無國不賓則有邛竹傳節蒟醬流味大宛獻其善馬條支致其巨雀爰及魏晉迄於周隋咸亦遐邇來王任土作貢異物歸於計吏奇名顯於職方凡爲國史者宜各撰方物志列於食貨之首帝王苗裔公侯子孫餘慶所鍾百世無絕能言吾祖郯子見師於孔公不議其先籍談取誚於姬后故周撰世本式辨諸宗楚置三閭實掌王族逮於晚葉譜學尤煩用之於官可以品藻士庶施之於國可以甄別華夷自劉曹受命雍豫爲宅世胄相承子孫蕃衍及永嘉東渡流寓揚越代氏南遷革夷從夏於是中朝江左南北混淆華壤邊民虜漢相雜隋有天下文軌大同江外山東人物殷湊其間高門素族非復一家郡正州都世掌其任凡爲國史者宜各撰氏族志列於百官之下蓋自都邑以降氏族而往實爲志者所宜先而諸史竟無其錄如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急爲務曾何足云惟此數條粗加商略得失利害從可知矣庶乎後來作者擇其善而行之或問曰子以都邑氏族方物宜各纂次以志名編夫史之有志多憑舊說茍世無其錄則闕而不編此都邑之流所以不果列志也對曰案帝王建國本無恆所作者記事亦在相時遠則漢有三輔典近則隋有東都記於南則有宋南徐州記晉宮闕名於北則有洛陽伽藍記鄴都故事蓋都邑之事盡在是矣譜牒之作盛於中古漢有趙岐三輔決錄晉有摯虞族姓記江左有兩王百家譜中原有方司殿格蓋氏族之事盡在事矣自沈瑩著臨海水土周處撰陽羨風土厥類衆多諒非一族是以地理爲書陸澄集而難盡水經加注酈元編而不窮蓋方物之事盡在是矣凡此諸書代不乏作必聚而爲志奚患無文譬夫涉海求魚登山採木至於鱗介修短柯條巨細蓋在擇之而已茍爲魚人匠者何慮山海之貧罄哉卷三內篇卷四, SBCK: 第八}

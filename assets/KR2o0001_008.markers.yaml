  - {type: variant, offset: 75, length: 0, content: '', SBCK: 也論國體則飾朝闕而折忠臣叙世敎則貴取容而賤直節述時務則謹辭章而略事實此其所失也尋班馬二史咸擅一家而各自彈射逓相瘡痏夫雖自卜者審而自見為難可謂笑他人之未工忘已事之已拙上知猶其若此而況庸庸者哉茍自前哲之指蹤校後來之所失若王沉孫盛之伍伯􅁸徳棻之流論王業則黨悖逆而誣忠義叙國家則抑正順而褒簒奪述風俗則矜夷狄而陋華夏此其大較也必伸以純擿窮其負累雖擢髪而數庸可盡邪子}
  - {type: page-break, offset: 75, content: '', id: KR2o0001_SBCK_008-8b}
  - {type: variant, offset: 75, length: 0, content: '', krp: 也論國體則飾朝闕而折忠臣叙世敎則貴取容而賤直節述時務則謹辭章而略事實此其所失也尋班馬二史咸擅一家而各自彈射逓相瘡痏夫雖自卜者審而自見為難可謂笑他人之未工忘已事之已拙上知猶其若此而況庸庸者哉茍自前哲之指蹤校後來之所失若王沉孫盛之伍伯𧺫徳棻之流論王業則黨悖逆而誣忠義叙國家則抑正順而褒簒奪述風俗則矜夷狄而陋華夏此其大較也必伸以純擿窮其負累雖擢髪而數庸可盡邪子}
  - {type: variant, offset: 76, length: 13, content: 志蔡邕曰意華嶠曰典張勃曰錄, SBCK: 於予何誅於數家見之矣抑又聞之恠力亂神宣尼不語而事鬼求福墨生􅀁信故聖人於其間若存若亡而已若吞燕卵而啇生啓龍漦而周滅厲壊門以禍􅀳鬼謀社而亡曹江使返璧於秦皇圯橋授書於漢相此則事􅀜軍國理涉興亡有而書之以彰靈驗可也而王隠}
  - {type: variant, offset: 76, length: 108, content: 志蔡邕曰意華嶠曰典張勃曰錄何法盛曰說名目雖異體統不殊亦猶楚謂之梼杌晉謂之乘魯謂之春秋其義一也於其編目則有前曰平準後云食貨古號河渠今稱溝洫析郊祀爲宗廟分禮樂爲威儀懸象出於天文郡國生於地理如斯變革不可勝計或名非而物是或小, WYG: 貌}
  - {type: variant, offset: 76, length: 13, content: 志蔡邕曰意華嶠曰典張勃曰錄, krp: 於予何誅於數家見之矣抑又聞之恠力亂神宣尼不語而事鬼求福墨生所信故聖人於其間若存若亡而已若吞燕卵而啇生啓龍漦而周滅厲壊門以禍晉鬼謀社而亡曹江使返璧於秦皇圯橋授書於漢相此則事關軍國理涉興亡有而書之以彰靈驗可也而王隠}

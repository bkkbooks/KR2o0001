  - {type: variant, offset: 34, length: 0, content: '', SBCK: 􅂉未盡則先舉其始後詳其末前後相會隔越取同若左氏成七年鄭獲楚鍾儀以獻晉至九年晉歸鍾儀於楚以求平其類是也至裴子野宋略叙索虜臨江太子劭使力士排徐湛於江湛僵仆於是始與劭有隙其後三年有徐湛為元凶所殺事以此而擬左氏亦所謂貌異而心同也凡列姓名罕兼其字茍前後互舉則觀者自知如左傳上言羊斟則下曰子臧前稱子産則次見國僑其類是也至裴子野宋略亦然何者上書桓􅀇則下有敬道後叙殷鐡則先著景仁以此而擬左氏又所謂貌異而心同也左氏與論語有叙人酬􅍟茍非煩辭積句但是往復唯諾而已則連續而說去其對曰問曰等字如裴子野宋略云李孝伯問張暢卿何姓曰姓張張長史乎以此而擬左氏論語又所謂貌異而心同也善人君子功業不書見於應􅍟附彰其美如左傳稱楚武王􅁒伐隋熊率且比曰季梁在何益至蕭方三十國春秋說朝廷聞慕容雋死曰中原可圖矣桓温曰慕容恪在其憂方大以此而擬左氏又所謂貌異而心同也夫將叙其事必預張其本彌縫混說無取􅔔言如左傳稱叔輙聞日蝕而哭昭子曰子叔其將死乎秋八月叔輙卒至王邵齊志稱張伯徳夢山上掛絲占者曰其為幽州乎秋七月拜為幽州刺史以此而擬左氏又所謂貌異而心同也盖文雖缺畧理甚昭著此丘明之體也至如敘晉敗於邲先濟者賞而云上軍下軍爭舟舟中之指可掬夫不言攀舟亂以力斷指而但曰舟指可掬則讀者自覩其事矣至王邵齊志述髙季式破敵於韓陵追奔逐北而云夜半方歸槊血滿袖夫不言奮槊深入撃刺甚}

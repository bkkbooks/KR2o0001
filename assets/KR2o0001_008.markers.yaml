  - {type: variant, offset: 3181, length: 1, content: 勸, WYG: 示}
  - {type: variant, offset: 3183, length: 0, content: '', WYG: 而死之日名無得而聞焉是誰之過歟盖史官之責也觀夫文籍肇剏史有尚書柔逺疎通網羅歴代至如有虞進賢時宗元凱夏氏中㣲國傳寒浞殷之亡也是生飛廉惡來周之興也實有散宜閎天若斯人者或為惡縦暴其罪滔天或累仁積徳其名盖世雖時淳俗質言約義簡此而不載闕誰大焉洎夫子修春秋記二百年行事三傳並作史道勃興若秦之由余百里奚越之范蠡大夫種魯之曹沬公儀休齊之寗戚田穰苴斯並命代大才一作命世天才挺生傑出或陳力就列功冠一時或殺身成仁聲聞四海茍師其徳業可以治國字人慕其風範可以激貪勵俗此而不書無乃太簡又子長著史記也馳騖窮古今上下數千載至如臯陶伊尹傳說仲山甫之流並列經誥名存子史功烈尤顯事跡居多盍各採而編之以為列傳之始而斷以夷齊居首何齷齪之甚乎既而孟堅勒成漢書牢籠一代至於人倫大事亦云備矣其間若薄昭楊僕顔駟史岑之徒其事所以見遺者盖略小而存大耳夫雖逐麋之犬不復顧兎而雞肋是棄能無惜乎當三國異朝兩晉殊宅若元則仲景時才重於許洛何禎許詢文雅髙於揚豫而陳壽國志王隠晉史廣列諸傳而遺此不編斯亦網漏吞舟過為迂闊者觀東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩毁形不嫁哀慟傷生此則才徳兼美}

  - {type: variant, offset: 1294, length: 4, content: 有旱雩舛, WYG: 孫皓暴虐人不聊生晉師是討後予相怨而干寳晉紀云吳國既滅江外忘亡豈江外安典午之善政同歸命之未滅乎以此而擬左氏又所謂貌同而心異也春秋諸國皆用夏正魯以行天子禮樂故獨用周家正朔至如書元年春王正月者年則魯君之年月則周王之月考竹書紀年始達此義而自古說春秋者皆妄為解釋也如曹馬受命躬為帝王非是以諸}

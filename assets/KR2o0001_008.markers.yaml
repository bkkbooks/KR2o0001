  - {type: variant, offset: 1292, length: 0, content: '', WYG: 國直云我而已如金行握紀海内大同君靡客主之殊臣無彼此之異而干寳􅁧晉紀至天子既葬必云葬我某皇帝且無二君何我之有以此而擬春秋又所謂貌同而心異也狄滅二國君死城屠齊桓行覇興亡繼絶左傳云邢遷如歸衛國忘亡言上下安堵不失舊物}

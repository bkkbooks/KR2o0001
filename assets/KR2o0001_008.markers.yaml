  - {type: variant, offset: 754, length: 424, content: 水濟水誰能飲之者乎且漢書之志天文藝文也蓋欲廣列篇名示存書體而已文字既少披閱易周故雖乖節文而未甚穢累既而後來繼述其流日廣天文則星占月會渾圖周髀之流藝文則四部七錄中經秘閣之輩莫不各逾三篋自成一家史臣所書宜其輟簡而近世有著隋書者乃廣包衆作勒成二志騁其繁富百倍前修非唯循覆車而重軌亦復加闊眉以半額者矣但自史之立志非復一門其理有不安多從沿革唯藝文一體古今是同詳求厥義未見其可愚謂凡撰志者宜除此篇必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其所錄皆鄴下文儒之士讎校之司所列書名唯取當時撰者習茲楷則庶免譏嫌語曰雖有絲麻無棄菅蒯於宋生得之矣夫災祥之作以表吉凶此理昭昭不易誣也然則麒麟鬬而日月蝕鯨鯢死而彗星出河變應於千年山崩由於朽壤又語曰太歲在酉乞漿得酒太歲在巳販妻鬻子則知吉凶遞代如盈縮循環此乃關諸天道不復繫乎人事且周王決疑龜焦蓍折宋皇誓衆竿壞幡亡梟止涼師之營鵩集賈生之舍斯皆妖災著象而福祿來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故, WYG: ''}

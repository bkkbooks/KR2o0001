  - {type: variant, offset: 9, length: 4, content: 風土山川, SBCK: 故獨用周家正朔至如書元年春王正月者年則魯君之年月則周王之月古說春秋者皆妄為解釋也考竹書紀年始達此義而自如曹馬受命躬為帝王非是以諸侯守藩行天子班曆而孫盛魏晉二陽秋每書年首必云某年春帝正月夫年既編帝紀而月又列帝名以此而擬春秋又所謂貌同而心異也五始所作是曰春秋三傳並興各釋經義如公羊傳屡云何以書記其事也此則先引經語而繼以釋辭勢使之然非史體也如吳均齊春秋每書災變亦曰何以書記異也夫事無他議言從已出輙自問而自答者豈是敘事之理者邪以此而擬公羊又所謂貌同而心異也且史漢每於列傳首書人名字至傳内有呼字處則於傳首已詳如漢書李陵傳稱隴西任立政陵字立政曰呼其字師古曰少公歸易耳夫上不言立政之字而輙言字立政曰少公者此省文從可知也至令狐徳棻周書於伊婁穆傳首云伊婁穆字奴干既而續云太祖字之曰奴干作儀同靣向我也夫上書其字而下復曰字豈是事従簡易文去重􅃨者邪以此而擬漢書又所謂貌同而心異也昔謝承家語有云蒼梧人嘗娶妻而美以讓其兄雖其為讓非讓道也又楊子法言曰有姓孔字仲尼其文是也其質非也如向之諸子所擬古作其殆蒼梧之讓姓孔字仲尼者歟蓋語曰世異則事異事異則治異必以先王之道持今世之民此韓子􅀁以著五􅗜之篇稱宋人有守株之說也世之述者銳志好竒喜編次古文􅁧叙今事巍然自謂五經再生三史重出多見其無識者矣惟夫明識之士則不然何則其􅀁擬者非如圖􅀞之寫真鎔鑄之象物以此而似彼其􅀁以為似者取其道術相會義理亦同若斯而已亦猶孔父賤為匹夫栖惶放逐而能祖述堯舜憲章文武亦何必居九五之位處南靣之尊然後謂之速肖者哉蓋左氏為書叙事之最自晉已降景慕者多有類效顰彌益其醜然}

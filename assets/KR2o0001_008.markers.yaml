  - {type: variant, offset: 2778, length: 0, content: '', WYG: 載楚王囂等來朝宋書載檀道濟等來朝之類是也夫臣謁其君子覲其父抑惟恒理非復異聞載之簡䇿一何辭費其煩二也乃若百職遷除千官黜免其可以書名本紀者葢惟槐鼎而已故西京撰史唯編丞相大夫東觀著書止列司徒太尉而近世自三公已下一命已上茍沾厚祿莫不備書且一人之身兼預數職或加其號而闕其位或無其實而有其名贊唱為之口勞題署由其力倦具之史牘夫何足觀其煩三也夫人之有傳也盖唯書其邑里而已其有開國承家世祿不墜積仁累徳良弓無改項籍之先世為楚將石建之後廉謹相承此則其事尤異略書於傳可也其失之者則有父官令長子秩丞郎聲不著於一鄉行無聞於十室乃敘其名位一二無遺此實家牒非闗國史其煩四也於是考兹四事以觀今古足驗積習忘返流宕不歸乖作者之規模違哲人之準的也孔子曰吾黨之小子狂簡斐然成章不知}

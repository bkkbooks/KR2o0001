  - {type: variant, offset: 1418, length: 890, content: 集解卷才三十則知其言所略蓋亦多矣而漢代儒者羅災眚於二百年外討符會於三十卷中安知事有不應於人應而人失其事何得茍有變而必知其兆者哉若乃採前文而改易其說謂王札子之作亂在彼成年春秋成公元年二月無冰董仲舒以爲其時王札子殺召伯毛伯案今春秋經札子殺毛伯事在宣十五年非成公時夏徵舒之構逆當夫昭代春秋昭公九年陳災董仲舒以爲楚嚴王爲陳討夏徵舒因滅陳陳之臣子毒恨故致火災案楚嚴王之滅陳在宣十一年如昭九年所滅者乃楚靈王時且莊王卒恭王立恭王卒康王立康王卒夾敖立夾敖卒靈王立相去凡五世楚嚴作霸荊國始僭稱王春秋桓公三年日有食之既京房易傳以爲後楚嚴稱王兼地千里案自武王始僭號歷文成穆三王始至於嚴然則楚之稱王已四世矣何得言嚴始稱哉又魯桓薨後世歷嚴閔釐文宣凡五君而楚嚴作霸安有桓三年日食而應之邪高宗諒陰亳都實生桑穀書序曰伊陟相太戊亳有桑穀共生劉向以爲殷道衰高宗承弊而起盡諒陰之哀天下應之既獲顯榮枲於政事而國將危亡故桑穀之異見案太戊崩其後嗣有仲丁河亶甲祖乙盤庚凡歷五世始至武丁即高宗是也桑穀自太戊時生非高宗事高宗又本不都於亳晉悼臨國六卿專政以君事臣董仲舒以爲十七年六月甲戌朔日有食之時宿在畢晉國象也晉厲公誅四大夫四大夫欲殺厲公後莫敢責大夫六卿遂相與比周專晉國君還事之案春秋成公十二月丁巳朔日食非是六月魯僖末年三桓世官殺嫡立庶春秋釐公三十三年十二月隕霜不殺草劉向以爲是時公子遂專權三桓始世官向又曰嗣君微失秉事之象也又釐公二十九年秋大雨雹劉向以爲釐公末年信用公子遂專權自恣至於殺君故陰脅陽之象見釐公不悟遂終專權後二年殺子赤立宣公案此事乃文公末世不是釐公時也遂即東門襄仲赤文公太子即惡也斯皆不憑章句直取胸懷或以前爲後以虛爲實移的就箭曲取相諧掩耳盜鐘自云無覺詎知後生可畏來者難誣者邪又品藻羣流題目庶類謂莒爲大國菽爲強草鶖著青色負蠜非中國之蟲春秋嚴公二十九年有蜰劉歆以爲蜰負蠜也劉向以爲非中國所有南越盛暑男女同川浴淫風所生是時嚴公取齊淫女爲夫人既入淫於兩叔故蜰至案負蠜中國所生不獨出南越鸜鵒爲夷狄之鳥春秋昭公二十五年鸜鵒來巢劉向以爲夷狄之禽案鸜鵒中國皆有唯不逾濟水耳事見周官如斯詭妄不可殫論而班固就加纂次曾靡銓擇因以五行編而爲志, SBCK: ''}

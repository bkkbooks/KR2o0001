  - {type: variant, offset: 861, length: 0, content: '', SBCK: 尚書知逺踈通網羅歴代至如有虞進賢時宗元凱夏氏中㣲國傳寒浞殷之亡也是生飛廉惡來周之興也實有散宜閎夭若斯人者􅂉為惡縦暴其罪滔天􅂉累仁積徳其名蓋世雖時淳俗質言約義簡此而不載闕誰大焉洎夫子修春秋記二百年行事三傳並作史道勃興若秦之由余百里奚越之范蠡大夫種魯之曹沬公儀休齊之寗戚田穰苴斯並命世大才挺生傑出􅂉陳力就列功􅃣一時或殺身成仁聲聞四海茍師其徳業可以治國字人慕其風範可以激貪勵俗此而不書無乃太簡又子長}

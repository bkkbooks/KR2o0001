  - {type: variant, offset: 1392, length: 0, content: '', WYG: 此而擬左氏又所謂貌異而心同也夫當時所記或未盡則先舉其始後詳其末前後相會隔越取同若左氏成七年鄭獲楚鍾儀以獻晉至九年晉歸鍾儀於楚以求平其類是也至裴子野宋略敘索虜臨江太子劭使力士排徐湛江湛僵仆於是始與劭有隙其後三年有徐江為元凶所殺事以此而擬左氏又所謂貌異而心同也凡列姓名罕兼其字茍前後互舉則觀者自知如左傳上言羊斟則下曰子臧前稱子産則次見國僑其類是也至裴子野宋略亦然何者上書桓𤣥則下有敬道後敘殷鐵則先著景仁以此而擬左氏又所謂貌異而心同也左氏與論}
  - {type: page-break, offset: 1392, content: '', id: KR2o0001_WYG_008-5a, image: WYG0685/WYG0685-0065c.png}
  - {type: variant, offset: 1393, length: 3, content: 錄況彼, WYG: 有敘人酬對茍非煩辭積句但是往復唯諾而已則連續而說去其對曰問曰等字如裴子野宋略云李孝伯問張暢卿何姓曰姓張張長史乎以此而擬左氏論語又所謂貌異而心同也善人君子功業不書見於應對附彰其美如左傳稱楚武王欲伐隨熊率且比曰季梁在何益至蕭方三十國}

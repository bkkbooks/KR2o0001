  - {type: variant, offset: 986, length: 201, content: 名唯取當時撰者習茲楷則庶免譏嫌語曰雖有絲麻無棄菅蒯於宋生得之矣夫災祥之作以表吉凶此理昭昭不易誣也然則麒麟鬬而日月蝕鯨鯢死而彗星出河變應於千年山崩由於朽壤又語曰太歲在酉乞漿得酒太歲在巳販妻鬻子則知吉凶遞代如盈縮循環此乃關諸天道不復繫乎人事且周王決疑龜焦蓍折宋皇誓衆竿壞幡亡梟止涼師之營鵩集賈生之舍斯皆妖災著象而福祿來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故諸侯相赴有異不爲災, SBCK: 三叛}

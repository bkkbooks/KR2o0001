  - {type: variant, offset: 5, length: 2, content: 刑法, krp: 述者相効自古而然故列禦宼之言理也則憑李叟楊子雲之草玄也全師孔公關朗則比跡於莊周范曄則參蹤於賈誼況史臣注記其言浩慱若不仰範前哲何以貽厥後來蓋模擬之體厥途有二一曰貌同而心異二曰貌異而心同何以言之蓋一者列國命官卿與大夫為别必於國史所記則卿亦呼為大夫此春秋之例也當秦有天下地廣殷周變諸侯為帝王目宰輔為丞相而譙周撰古史思欲擯抑馬記師放孔經其書李斯之棄市也乃云秦殺其大夫以諸侯之大夫名天子之丞相以此而擬春秋所謂貌同而心異也當春秋之世列國甚多每書他邦皆顯其號至於魯國直云我而已如金行握紀海内大同君靡客主之殊臣無彼此之異而于寳撰晉紀至天子之葬必云葬我某皇帝且無二君何我之有以此而擬春秋又所謂貌同而心異也狄滅二國君死城屠齊桓行覇興亡繼絶左傳云邢遷如歸衛國忘亡言上下安堵不失舊物也如孫皓暴虐人不聊生晉師是討後無相怨而于寳晉紀云吳國既滅江外忘亡豈江外𬒳典午之善政同歸命之滅亡乎以此而擬左氏又所謂貌同而心異也春秋諸國皆用夏正魯以行天子}

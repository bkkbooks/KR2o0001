  - {type: variant, offset: 66, length: 1, content: 原, krp: 貌同而心異者摸擬之下也然人皆好貌同而心異不尚貌異而心同者何哉盖鑒識不明嗜愛多僻悅}
  - {type: variant, offset: 68, length: 0, content: '', SBCK: 似史而憎夫真史此張子所以致譏於魯侯有葉公好龍之喻也袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也夫擬古而不類此乃難之極者何為獨闕其目乎嗚呼自子長已還似皆未覩斯義後來明達其鑒之哉書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勲五曰表賢能于寳之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子真婦之節則書之文誥専對之辭則書之才力伎藝殊異則書之於是採二家之所議徵五志之所取蓋記言之所網羅書事之所總括粗得於兹矣然必謂故無遺恨猶恐未盡者乎今更廣以三科用増前目一曰叙㳂革二曰明罪惡三曰旌恠異何者禮儀用捨節文升降則書之君臣邪僻國家䘮亂則書之幽明感應禍福萌兆則書之於是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯但古作者鮮能無病茍書而不法則何以示後蓋班固之譏}
  - {type: page-break, offset: 68, content: '', id: KR2o0001_SBCK_008-7a}
  - {type: page-break, offset: 68, content: '', id: KR2o0001_SBCK_008-7b}
  - {type: variant, offset: 68, length: 0, content: '', krp: 似史而憎夫真史此張子所以致譏於魯侯有葉公好龍之喻也袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也夫擬古而不類此乃難之極者何為獨闕其目乎嗚呼自子長已還似皆未覩斯義後來明達其鑒之哉書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勲五曰表賢能于寳之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子真婦之節則書之文誥専對之辭則書之才力伎藝殊異則書之於是採二家之所議徵五志之所取蓋記言之所網羅書事之所總括粗得於兹矣然必謂故無遺恨猶恐未盡者乎今更廣以三科用増前目一曰叙㳂革二曰明罪惡三曰旌恠異何者禮儀用捨節文升降則書之君臣邪僻國家䘮亂則書之幽明感應禍福萌兆則書之於是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯但古作者鮮能無病茍書而不法則何以示後蓋班固之譏}
  - {type: variant, offset: 71, length: 2, content: 曰書, SBCK: 也論大道則先黄老而後六經序游俠則退處士而進姧雄述貨殖則崇勢利而羞賤貧此其所蔽也又􅀓􅀇之貶}
  - {type: page-break, offset: 71, content: '', id: KR2o0001_SBCK_008-8a}
  - {type: variant, offset: 71, length: 2, content: 曰書, krp: 也論大道則先黄老而後六經序游俠則退處士而進姧雄述貨殖則崇勢利而羞賤貧此其所蔽也又傳玄之貶}

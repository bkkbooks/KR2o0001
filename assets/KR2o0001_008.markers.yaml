  - {type: variant, offset: 2312, length: 339, content: 且每有敍一災推一怪董京之說前後相反向歆之解父子不同桓公三年日有食之董仲舒劉向以爲魯宋殺君易許田劉歆以爲晉曲沃莊伯殺晉侯京房以爲後楚嚴稱王兼地千里也又嚴公七年夜中星隕如雨劉向以爲夜中者即中國也劉歆以爲晝象中國夜象夷狄劉向又以爲蜮生南越劉歆以爲盛暑蜮所生非自越來也遂乃雙載其文兩存厥理言無準的事益煩費豈所謂撮其機要收彼菁華者哉自漢中興已還迄於宋齊其間司馬彪臧榮緒沈約蕭子顯相承載筆競志五行雖未能盡善而大較多實何者如彪之徒皆自以名慚漢儒才劣班史凡所辯論務守常途既動遵繩墨故理絕河漢兼以古書從略求徵應者難該近史尚繁考祥符者易洽此昔人所以言有乖越後進所以事反精審也然則天道遼遠裨竈焉知日蝕不常文伯所對至如梓慎之占星象趙達之明風角單颺識魏祚於黃龍董養徵晉亂於蒼鳥斯皆肇彰先覺取驗將來言必有中, SBCK: ''}

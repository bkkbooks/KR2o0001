  - {type: variant, offset: 2829, length: 18, content: 足含靈受氣吉凶形於相皃貴賤彰於骨法生, WYG: 五經而有殘馬遷所書比三傳而多别裴松補陳壽之闕謝綽拾沈約之遺斯又言滿五車事逾三篋者矣夫記事之體欲簡而且詳疎而不漏若煩則盡取省則都捐此乃忘折中之宜失均平之理惟夫博雅君子知其利害者焉人物第三十夫}

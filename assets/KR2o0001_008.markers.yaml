  - {type: variant, offset: 2767, length: 9, content: 或以爲天文藝文雖非, WYG: 當春秋之時諸侯力爭各擅雄伯自相君長經書某使來聘某君來朝者盖明和好所通盛徳所及此皆國之大事不可闕如而自史漢已還相承繼作至於呼韓入侍肅慎來廷如此之流書可也若乃藩王岳牧朝會京師必也書之本紀則異乎春秋之義若}

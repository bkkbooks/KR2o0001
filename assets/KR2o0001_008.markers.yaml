  - {type: variant, offset: 2748, length: 100, content: 談何容易駟不及舌無爲強著一書受嗤千載也或以爲天文藝文雖非漢書所宜取而可廣聞見難爲删削也對曰茍事非其限而越理成書自可觸類而長於何不錄又有要於此者今可得而言焉夫圓首方足含靈受氣吉凶形於相皃貴賤彰於骨法生人, SBCK: 史通卷}
  - {type: page-break, offset: 2748, content: '', id: KR2o0001_SBCK_008-15b}
  - {type: variant, offset: 2748, length: 1, content: 談, WYG: 書事第二十九昔荀悅有云立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勲五曰表賢能干寳之釋五志也體國經野之言則書之用兵征伐之權則書之忠臣烈士孝子貞婦之節則書之文誥専對之辭則書之才力技藝殊異則書之於是採二家之所議徵五志之所取盖記言之所網羅書事之所總括粗得於兹矣然必謂故無遺恨猶恐未盡者乎今更廣以三科用増前目一曰敘㳂革二曰明罪惡三曰旌怪異}
  - {type: page-break, offset: 2748, content: '', id: KR2o0001_WYG_008-7a, image: WYG0685/WYG0685-0066c.png}
  - {type: page-break, offset: 2748, content: '', id: KR2o0001_WYG_008-7b, image: WYG0685/WYG0685-0066d.png}
  - {type: variant, offset: 2748, length: 100, content: 談何容易駟不及舌無爲強著一書受嗤千載也或以爲天文藝文雖非漢書所宜取而可廣聞見難爲删削也對曰茍事非其限而越理成書自可觸類而長於何不錄又有要於此者今可得而言焉夫圓首方足含靈受氣吉凶形於相皃貴賤彰於骨法生人, krp: 史通卷}
  - {type: variant, offset: 2750, length: 0, content: '', WYG: 者禮儀用舍節文升降則書之君臣邪僻國家喪亂則書之幽明感應禍福萌兆則書之於是以此三科參諸五志則史氏所載庶幾無闕求諸筆削何莫由斯但古作者鮮能無病茍書而不法則何以示後盖班固之譏司馬遷也論大道則先黄老而後六經序游俠則退處士而進姧雄述貨殖則崇勢利而羞賤貧此其所蔽也又傳𤣥之貶班固也論國體則飾主闕而折忠臣敘世敎則貴取}
  - {type: variant, offset: 2751, length: 2, content: 易駟, WYG: 而賤直節述時務則謹辭章而略事實此其所失也尋班馬二史咸擅一家而各自彈射遞相瘡痏夫雖自卜者審而自見為難可謂笑前人之未工忘已事之已拙上知猶其若此而況庸庸者哉茍自前哲之指蹤校後來之所失若王沉孫盛之伍伯起徳棻之流論王業則黨悖逆而誣忠義敘國家則抑正順而褒簒奪述風俗則矜夷狄而陋華夏此其大較也必伸以糺擿窮其負累雖擢髪而數庸可盡邪子曰於予何誅於數家見之矣抑又聞之怪力亂神宣尼}
  - {type: page-break, offset: 2751, content: '', id: KR2o0001_WYG_008-8a, image: WYG0685/WYG0685-0067a.png}
  - {type: page-break, offset: 2751, content: '', id: KR2o0001_WYG_008-8b, image: WYG0685/WYG0685-0067b.png}
  - {type: punctuation, offset: 2752, content: ，, id: KR2o0001_tls_008-bkkpn674}
  - {type: 'tls:seg', offset: 2752, content: '', id: KR2o0001_tls_008-21a.15}
  - {type: variant, offset: 2754, length: 0, content: '', WYG: 語而事鬼求福墨生所信故聖人於其間若存若亡而已若吞燕卵而商生啟龍漦而周滅厲壊門以禍晉鬼謀社而亡曹江使返璧於秦皇圯橋授書於漢相此則事闗軍國理涉興亡有而書之以彰靈驗可也而王隠何法盛之徒所􅁧晉史乃専訪州閭細事委巷瑣言聚而編之目為鬼神傳錄其事非要其言不經異乎三史之所書五經之所載也范曄博採衆書裁成漢典觀其所取頗有竒工至於方術篇}
  - {type: page-break, offset: 2754, content: '', id: KR2o0001_WYG_008-9a, image: WYG0685/WYG0685-0067c.png}
  - {type: variant, offset: 2755, length: 1, content: 舌, WYG: 諸蠻夷傳乃錄王喬左慈禀君槃瓠言唯迂誕事多詭越可謂美玉之瑕白圭之玷惜哉}
  - {type: punctuation, offset: 2756, content: ，, id: KR2o0001_tls_008-bkkpn675}
  - {type: 'tls:seg', offset: 2756, content: '', id: KR2o0001_tls_008-21a.16}
  - {type: variant, offset: 2757, length: 2, content: 爲強, WYG: 是可也又自魏晉已降}
  - {type: substitution, offset: 2757, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 2760, length: 0, content: '', WYG: 述多門語林笑林世說俗說皆喜載啁謔小辨嗤鄙異聞雖為有識所譏頗為無知所悅而斯風}
  - {type: variant, offset: 2761, length: 0, content: '', WYG: 扇國史多同至如王思狂躁起驅蠅而踐筆畢卓沉湎左持螯而右杯劉邕榜吏以膳痂齡石戲舅而傷贅其事蕪穢其辭猥雜而歴代正史持為雅言茍使讀之者為之解頥聞之者為之撫抃固異乎記功}
  - {type: punctuation, offset: 2762, content: ，, id: KR2o0001_tls_008-bkkpn676}
  - {type: 'tls:seg', offset: 2762, content: '', id: KR2o0001_tls_008-21a.17}
  - {type: variant, offset: 2762, length: 2, content: 受嗤, WYG: 過彰善癉惡者也大抵近代史筆敘事為煩㩁而論之其尤甚者有四夫祥瑞者所以發揮盛徳幽贊明王至如鳳皇來儀嘉禾入獻秦得若雉魯獲如麕求諸尚書春秋上下數}
  - {type: page-break, offset: 2762, content: '', id: KR2o0001_WYG_008-9b, image: WYG0685/WYG0685-0067d.png}
  - {type: variant, offset: 2766, length: 0, content: '', WYG: 其可得言者盖不過一二而已爰及近古則不然凡祥瑞之出非闗理亂盖主上所惑臣下相欺故徳彌少而祥彌多政逾劣而瑞逾盛是以桓靈受祉比文景而為豐劉石應符比曹馬而益倍而史官徵其謬說錄彼邪言真偽莫分是非無别其煩一}

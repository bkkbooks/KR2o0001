  - {type: variant, offset: 874, length: 1, content: 騁, SBCK: 王隠晉史廣列諸傳而遺此不編斯亦網漏吞舟過為迃闊者觀東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩毁形不嫁哀慟傷生此則才徳兼美者也董祀妻蔡氏載誕胡子受辱虜庭文詞有餘節槩不足此則言行相乖者也至蔚宗後漢傳標列女徐淑不齒而蔡琰見書欲使彤管所載將安凖的裴幾原刪略宋史時稱簡要至如張禕隂受君命將賊零陵乃宗通不移飲鴆而絶雖古之鉏麑義烈何以加諸鮑昭文宗學府馳名海内方於漢代褒朔之流事皆闕如何以申}

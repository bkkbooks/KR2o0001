  - {type: variant, offset: 1845, length: 255, content: 太戊時生非高宗事高宗又本不都於亳晉悼臨國六卿專政以君事臣董仲舒以爲十七年六月甲戌朔日有食之時宿在畢晉國象也晉厲公誅四大夫四大夫欲殺厲公後莫敢責大夫六卿遂相與比周專晉國君還事之案春秋成公十二月丁巳朔日食非是六月魯僖末年三桓世官殺嫡立庶春秋釐公三十三年十二月隕霜不殺草劉向以爲是時公子遂專權三桓始世官向又曰嗣君微失秉事之象也又釐公二十九年秋大雨雹劉向以爲釐公末年信用公子遂專權自恣至於殺君故陰脅陽之象見釐公不悟遂終專權後二年殺子赤立宣公案此事乃文公末世不是釐公時也遂即東門襄仲赤文公太子即惡也斯皆不憑章句直取胸懷或, WYG: 魏}

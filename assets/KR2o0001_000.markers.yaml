  - {type: variant, offset: 0, length: 1, content: 原, SBCK: 續校史通}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_000-1a}
  - {type: variant, offset: 0, length: 371, content: 原序長安二年武后臨朝第十九年至此十六改元余以著作佐郎兼修國史尋遷左史於門下撰起居注會轉中書舍人暫停史任俄兼領其職今上即位除著作郎太子中允率更令其兼舊脫兼字修史皆如故兼修史以領職言脫兼字則非又屬大駕還京以留後在東舊脫東字都無幾驛徵入京專知史事仍遷秘書少監首叙歷官即自叙篇所謂三為史臣再入東觀也其注云今之史館即古之東觀自惟歷事二主從宦一作官兩京遍居司籍之曹久處載言之職昔馬融三入東觀漢代稱榮張華再典史官晉朝稱美嗟予小子兼而有之是用職思舊誤作司其憂不遑啟處此總上歷官拈合當職撰史事即以引起史通之作嘗以載削餘暇商榷一作確史篇下筆不休遂盈筐篋於是區分類聚編而次之此六句暗罷史通昔漢世諸儒集論經傳定之於白虎閣因名曰白虎通予既在史館而成此書故便以史通爲目且漢求司馬遷後封爲史通子是知史之稱通其來自久博采衆議爰定茲名此層明點史通兩引古史古事以見命名所本凡爲廿, WYG: ''}
  - {type: variant, offset: 0, length: 1, content: 原, krp: 續校史通}
  - {type: xml-element, offset: 2, content: '', id: KR2o0001_tls_000-bkkxmlele1}
  - {type: 'tls:seg', offset: 2, content: '', id: KR2o0001_tls_000-35a.1}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 唐長安景龍間劉子玄在東觀商榷諸史著史通二十卷傳刻弗廣余家有抄本齊六趙肖十居一二以故宦轍所至必先購求復得二三抄本雖各有舛譌而叅稽互正庶幾可讀兹承乏江臬同寀諸公一時士望聚會之間縱言至於史方伯莆田吳公曰此有史通太史陸儼山氏守藩時刻也子其讎之余念儼山先生才雄學博其于是刻用心良勤然恨無别本叅對若有望于後人余豈敢辭因岀篋中本更爲校勘篇章有應合應岐者合之岐之書名有應刪應益應定者刪之益之定之曲筆篇爲增四百卅餘字鍳識篇增三百餘字而去其自它篇羼者六十餘字因習上卷巳亡刻中數行宜削而不削者愼之也它無可㨿者姑仍其舊校竣竊喟然曰嗟乎史職之難久矣左史以降作者比肩靡不自謂鞭撻狐南睥睨游夏而子玄横加訶詆所與完璧者僅王君懋一人而巳由斯以談柳子厚之不就豈無見乎然子玄身秉史筆不自成家龍姿美業未聞光闡鷄晨穢德未聞昭戒至其論史則信􅃁書而疑墳典譏堯舜訾湯文誹周孔不少顧忌故宋子京有工拙之譏柳炤之有析微之論刻之不廣大率爲此要以序體法朙典要爲作史者凖繩則是書亦豈可少哉夫其上自唐虞下及陳隋網羅千禩貫穿百家雖謂前無古人可矣此徐堅所以有座右之許也觀所上蕭至忠書雖苦積薪與􅁞室然讀白首有期汗青無日之語其志有足諒者余深悲之故于兹編三致意焉萬曆壬寅冬十月榖旦後學長洲張􅂦思譔史通序錄唐劉子玄知㡬撰}

  - {type: variant, offset: 837, length: 366, content: 文心雕龍之例注焉歷八月訖功然此二書譌處甚多嗣從信陽王思延得華亭張玄超本其文心不能加他本史通本大善有數處極快人者故書之校視文心為愈往見李濟翁資暇錄云李善注文選有初注再注以至五注者蘇子由注老子亦自言晚年於舊注多所改定今余此書曷敢以為盡是聊以備遺忘為他日削纂之資耳河南王惟儉序書以通名如白虎通風俗通之類義同箋故漢封司馬遷後為史通子史通之稱見焉劉知幾博論前史摭掇利病作史通內外篇蓋兼取兩義云馬貴與經籍考從文史類中摘出論史者為史評首列是書本傳謂知幾幼時受古文尚書業不進聰講春秋左氏則心開異攷同一學問之事而胎性中各有著根處不自知其所以然後來領國史三十年卒以史學垂名豈所謂性也有命焉者耶觀其議論如老吏斷獄難更平反如夷人嗅金暗識高下如神醫眼照垣一方洞見五藏癥結間有過執己見以裁量往古泥定體而少變通如謂尚書為例不純史論淡薄無味之類然其薈萃搜擇鈎爪排擊, SBCK: ''}

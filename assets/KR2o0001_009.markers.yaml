  - {type: variant, offset: 45, length: 3, content: 觀曰序, SBCK: 南地僻遠於諸戎人罕通於上國故載其行事多有闕如且其書自宣成已前三紀而成一卷至昭襄已下數年各占一篇是知國阻隔者記事不詳年淺近者􅁧錄多備者二百四十九宣公已下亦六公杜預釋例云文公已上六公書國此逺遺落不與近同也是則儒者注書已見之書國者四百三十二計年數畧同而國數加倍矣左丘明隨聞見而成傳何有故為簡約者哉及漢時之有天下也普天率土無思不服會計之吏嵗奏於朝廷輶軒之使日馳於郡國作者俱於京兆府徵事於四方用使夷夏必聞逺近無隔故漢氏之史所以倍増於春秋也降及東京作者彌衆至如名邦大都地富才良髙門甲族世多髦俊邑老鄉賢競為别錄家譜宗譜各成私傳於是筆削所採聞見益多此中興之史所以又廣於前漢也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以}
  - {type: page-break, offset: 45, content: '', id: KR2o0001_SBCK_009-7b}
  - {type: variant, offset: 45, length: 3, content: 觀曰序, WYG: 南地僻界於諸戎人罕通於上國故載其行事多有闕如且其書自宣成已前三紀而成一卷至昭襄已下數年而占一篇是知國阻隔者記載不詳年淺近者􅁧錄多備杜預釋例云文公已上書日者二百四十九宣公已下亦俱六公書日者四百三十二計年數略同而日數加備此亦乆逺遺落不與近同也是則儒者注書已見之矣此邱明隨聞見而成傳何有故為簡約者哉及漢氏之有天下也普天率土無思不服會計之吏嵗奏於闕廷輶軒之使月馳於郡國作者居於京兆府徵事於四方用使夷夏必聞逺近無隔故漢氏之史所以倍増於春秋也降及東京作者彌衆至如名邦大都地富才良髙門甲族世多髦俊邑老鄉賢競為别錄家牒宗譜各成私傳於是筆削所採聞見益多此中興之史所以又廣於前漢也夫英賢所出何國而無書之則與日月長懸不書則與煙塵永滅是以}

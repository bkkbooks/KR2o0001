  - {type: variant, offset: 427, length: 63, content: 修晉書作者皆當代詞人遠棄史班近宗徐庾夫以飾彼輕薄之句而編爲史籍之文無異加粉黛於壯夫服綺紈於高士者矣史之有論也蓋欲事無重出文省可, WYG: 劉}
  - {type: punctuation, offset: 428, content: 《, id: KR2o0001_tls_009-bkkpn98}

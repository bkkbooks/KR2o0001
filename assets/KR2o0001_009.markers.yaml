  - {type: variant, offset: 178, length: 2, content: 實萌, SBCK: 邪由斯而言則史之煩省不中從可知矣又古今有殊澆淳不等帝堯則天稱大書惟一篇周武觀兵孟津言成三誓伏犧止畫八卦文王加以繫辭俱為大聖行事若一其豐儉不類懸隔如斯必以古方今持彼喻此如􅃖尤黄帝交戰阪泉施}

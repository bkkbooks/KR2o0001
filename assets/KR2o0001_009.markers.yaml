  - {type: variant, offset: 44, length: 0, content: '', SBCK: 之何者當春秋之時諸矦力爭各閉境相拒關梁不通其有吉凶大事見知於他國者或因假道而方聞或以通盟而始赴茍異於是則無得稱魯史所書實用此道至如秦燕之據有西北楚越之大啓}
  - {type: page-break, offset: 44, content: '', id: KR2o0001_SBCK_009-7a}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 之何者當春秋之時諸侯力爭各閉境相拒闗梁不通其有吉凶大事見知於他國者或因假道而方聞或以同盟而始赴茍異於是則無得而稱魯史所書實用此道至如秦燕之據有西北楚越之大啟}

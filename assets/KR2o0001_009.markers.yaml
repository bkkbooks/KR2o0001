  - {type: punctuation, offset: 437, content: ，, id: KR2o0001_tls_009-bkkpn101}
  - {type: 'tls:seg', offset: 437, content: '', id: KR2o0001_tls_009-3a.38}
  - {type: punctuation, offset: 440, content: 、, id: KR2o0001_tls_009-bkkpn102}
  - {type: variant, offset: 440, length: 308, content: 班近宗徐庾夫以飾彼輕薄之句而編爲史籍之文無異加粉黛於壯夫服綺紈於高士者矣史之有論也蓋欲事無重出文省可知如太史公曰觀張良貌如美婦人項羽重瞳豈舜苗裔此則別加他語以補書中所謂事無重出者也又如班固贊曰石建之浣衣君子非之楊王孫裸葬賢於秦始皇遠矣此則片言如約而諸義甚備所謂文省可知者也及後來贊語之作多錄紀傳之言其有所異唯加文飾而已至於甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒爲再列馬遷自序傳後歷寫諸篇各敍其意既而班固變爲詩體號之曰述范曄改彼述名呼之以贊尋述贊爲例篇有一章事多者則約之使少理寡者則張之令大名實多爽詳略不同且欲觀人之善惡史之褒貶蓋無假於此也然固之總述合在一篇使其條貫有序歷然可閱蔚宗後書實同班氏乃各附本事書於, SBCK: 通}

  - {type: punctuation, offset: 4, content: 《, id: KR2o0001_tls_009-bkkpn1}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 内篇覈才序傳煩省覈才第三十一夫史才之難其難甚矣晉令云國史之任委之著作每著作郎初至必撰名目傳一人斯蓋察其所由茍非其才則不可叨居史任歴觀古之作者若蔡邕劉孝標徐陵劉炫之徒各自謂長於著書達於史體然侏儒一節而他事可知按伯喈於方朔上書謂宜廣班氏天文志夫天文之於漢史實附贅之尤甚者也必欲申以掎摭但當鋤而去之安可仍其過失而益其蕪累亦奚異觀河傾之患而不過以隄防方欲䟽而導之用速懐襄之害述史如此将非練達者歟孝標持論柝理誠為絶倫而自叙一篇過為煩碎山西一志直論文章諒難以偶跡遷固比肩陳范者也孝穆在齊有志於梁史及還江左而書竟不成嗟乎以徐公文體而施諸史傳亦猶㶚上兒戲異乎真将軍幸而量力不為可謂自卜者審矣光伯以洪儒碩學而迍邅不遇其鋭情自叙欲以垂示将來而言皆淺俗理無要害豈所謂誦詩三百雖多亦奚以為者乎昔尼父有言文勝質則史蓋史者當時之文也然朴散淳銷時移世異文之與史較然異轍故以張衡之文而不閑於史以陳壽之史而不習於文其有賦述兩都詩裁八詠而能編次漢冊勒成宋典若斯人者其流幾何是以略觀近代有齒跡文章而兼修史傳其為式也羅含謝客宛為謌頌之文蕭繹江淹直成銘賛之序温子昇尤喜複語盧思道雅好麗詞江總猖獗以沉迷􅁃信輕薄而流宕此其大較也然向之數子所撰者蓋不過偏記雜說小卷短書而已猶且乖濫踏駮一至於斯而況責之以刋勒一家彌綸一代使其始末圓備表裏無咎蓋亦難矣但自世重文藻詞宗麗􅁋於是沮誦失路靈均當軸每西省虚職東觀佇才凢所拜授必推文士遂使握管懐鈆多無銓綜之職連章累牘罕逢㣲婉之言而舉俗共為能事當時莫之敢侮假令間有術同彪嶠才若班荀懐獨見之明負不刋之業而皆取窘於流俗見嗤於朋黨遂乃哺糟歠醨俯同妄作被褐懐玉無由自陳此管仲所謂用君子而以小人參之害覇之道者昔傳􅀇有觀孟堅漢書實命代竒作及與陳宗尹敏杜撫馬嚴􅁧中興紀傳其文曾不足觀豈拘於時乎不然何不類之甚者也是後劉珍朱穆盧植楊彪之徒又繼而成之豈亦各拘於時而不得自盡乎何其益陋也嗟乎拘時之患其來尚矣斯則自古之􅀁歎豈獨當今者㢤序傳第三十二蓋作者自叙其流出於中古按屈原離騷經其首章上陳氏族下列祖考先述厥生次顯名字自叙發跡實基於此降及司馬相如始以自敘為傳然其所叙者但記自少及長立身行事而已逮於祖先所出則蔑尔無聞至馬遷又徵三閭之故事倣文園之近作模楷二家勒成一卷於是揚雄遵其舊轍班固酌其餘波自叙之篇實煩於代雖屬辭有異而兹體無易尋馬遷史記上自軒轅下窮漢武彊宇修闊道路綿長故其自敘始於氏出重黎終於身為太史雖上下馳騁終不越史記之年班固漢書止叙西京二百年事耳其自叙也則逺徵令尹􅁸楚文王之世近錄賔戯當漢明帝之朝苞括所聞踰於本書逺矣而後來叙傳非止一家競學孟堅從風而靡施於家譜猶或可通列於國史每見其失者矣然自叙之為義也茍能隠已之短稱其所長斯言不謬即為實錄而相如自序反記其客逰臨卭竊妻卓氏以}

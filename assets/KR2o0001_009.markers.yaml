  - {type: variant, offset: 6, length: 0, content: '', SBCK: 所諱持為美談雖事或非虚而理無可取載之於傳不其愧乎又王充論衡之自紀也述其父祖不肖為州閭所鄙而已荅以瞽頑舜神鯀惡禹聖夫自叙而言家世固當以揚名顯親為主茍無其人闕之可也至若盛矜於已而厚辱其先此何異證父攘羊學子名母必責以名敎實三千之罪人也夫自媒自衒士女之醜行然則人莫我知君子所耻按孔氏論語有云十室之邑必有忠信不如丘之好學也又曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎又曰文王既沒文不在兹乎又曰昔者吾友嘗從事於斯矣則聖達立言也時亦揚露巳才或託諷以見其情􅂉巽辭以顯其跡終不旴衡自伐攘袂公言且命諸門人各見尔志由也不讓見嗤無禮歴觀揚雄已降其自叙也始以誇尚為宗至魏文帝􅀓􅀇陶梅葛洪之徒則又踰於此者矣何則身兼片善行有㣲能皆剖析具言一二必載豈所謂憲章前聖謙以自牧者歟又近古人倫喜稱閥閱其蓽門寒族百代無聞而騂角挺生一朝暴貴無不追述本系妄承先哲至若儀父振鐸並為曹氏之初淳維李陵俱称拓㧞之始河南馬祖遷彪之說不同吳興沈約先後之序有異斯皆不因真律無假寧楹直據經史自成矛盾則知楊姓之寓西蜀班門之雄朔野或胄纂伯僑或家傳熊繹恐自我作古失之彌逺者矣蓋諂祭非鬼神所不歆致敬他親人斯悖徳凢為叙傳宜詳此理不知則闕亦何傷乎煩省第三十二昔荀卿有云錄遠略近則知史之詳略不均其為患者乆矣及于令昇昇晉人寳字令史議歴詆諸家而獨歸美左傳云丘明能以三十卷之約括囊二百四十年之事靡有孑遺斯蓋立言之髙標著作之良模也又張世偉世偉輔字著班馬優劣論云遷叙三千年事五十萬言固叙一百四十年事八十萬言是班不如馬也然則自古論史之煩省者咸以}

  - {type: variant, offset: 638, length: 280, content: 各敍其意既而班固變爲詩體號之曰述范曄改彼述名呼之以贊尋述贊爲例篇有一章事多者則約之使少理寡者則張之令大名實多爽詳略不同且欲觀人之善惡史之褒貶蓋無假於此也然固之總述合在一篇使其條貫有序歷然可閱蔚宗後書實同班氏乃各附本事書於卷末篇目相離斷絕失次而後生作者不悟其非如蕭李南北齊史大唐新修晉史皆依范書誤本篇終有贊夫每卷立論其煩已多而嗣論以贊爲黷彌甚亦猶文士制碑序終而續以銘曰釋氏演法義盡而宣以偈言茍撰史若斯難以議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈誼范曄之虛美隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故略陳梗概一言以蔽之, WYG: ''}

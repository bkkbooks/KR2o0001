  - {type: variant, offset: 175, length: 0, content: '', SBCK: 兼採衆書補注其闕由是世言三國之志者以裴注為本焉右􅀃三國志􅀳史洛京時著作郎陸機始撰三祖紀佐著作郎束晢又撰十志㑹中朝䘮亂其書不存先是歷陽令陳留王鈐有著述才每􅀻録晉書及功臣行狀未就而卒子隱愽學多聞受父遺業西都事跡多所詳䆒過江為著作郎受詔撰􅀳史為其同僚虞預􅀁斥坐事免官家貧無資書未遂就乃依征西將軍􅁃亮扵武昌鎮亮給其紙墨由是􅀗成凡為􅀳書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆鈐􅀁修章句混漫者必隱所作時尚書郎領國史于寶亦撰晉紀自宣訖愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱晉江左史自鄧粲孫盛王韶之檀道鸞已下相次􅁇作逺則編}

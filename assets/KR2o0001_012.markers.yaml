  - {type: 'tls:seg', offset: 22, content: '', id: KR2o0001_tls_012-1a.4}
  - {type: variant, offset: 22, length: 0, content: '', SBCK: 謂馬融鄭咸疑其繆古文尚書者即孔惠之􅀁藏科斗之文字也魯恭王壞孔子舊宅始得之扵壁中博士孔安􅀦}
  - {type: page-break, offset: 22, content: '', id: KR2o0001_SBCK_012-2b}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 咸疑其繆古文尚書者即孔惠之所藏科斗之文字也魯恭壞孔子舊宅始得之於壁中博士孔安國}
  - {type: variant, offset: 22, length: 0, content: '', krp: 謂馬融鄭咸疑其繆古文尚書者即孔惠之所藏科斗之文字也魯恭王壞孔子舊宅始得之扵壁中博士孔安國}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 校伏生􅀁誦增多二十五篇更以古文字寫之編為四十六卷司馬屢採其事故遷多有古􅀃安􅀦又受詔為之訓傳値武帝末巫蠱事起經籍道息不獲奏上藏諸􅀻家劉向取校歐陽大小夏侯三家經文脫誤甚衆至扵後漢孔氏之本遂絶其有見扵經典者諸儒皆謂之逸書玄杜預馬融鄭也王肅亦注今文尚書而大與古文孔傳相類􅂉肅􅀻見其本而獨秘之乎晉元帝時豫章王内史梅頥始以孔傳奏上而缺}
  - {type: page-break, offset: 23, content: '', id: KR2o0001_SBCK_012-3a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 校伏生所誦增多二十五篇更以𨽻古字寫之編為四十六卷司馬屢採其事故遷多有古説安國又受詔為之訓傳値武帝末巫蠱事起經籍道息不獲奏上藏諸私家劉向取校歐陽大小夏侯三家經文脱誤甚衆至於後漢孔氏之本遂絶其有見於經典者諸儒皆謂之逸書馬融鄭𤣥杜預也王肅亦注今文尚書而大與古文孔傳相類或肅私見其本而獨秘之乎晉元帝時豫章内史梅􅄨始以孔傳奏上而缺}
  - {type: page-break, offset: 23, content: '', id: KR2o0001_WYG_012-3a, image: WYG0685/WYG0685-0088a.png}
  - {type: variant, offset: 23, length: 0, content: '', krp: 校伏生所誦增多二十五篇更以古文字寫之編為四十六卷司馬屢採其事故遷多有古說安國又受詔為之訓傳値武帝末巫蠱事起經籍道息不獲奏上藏諸私家劉向取校歐陽大小夏侯三家經文脫誤甚衆至扵後漢孔氏之本遂絶其有見扵經典者諸儒皆謂之逸書玄杜預馬融鄭也王肅亦注今文尚書而大與古文孔傳相類或肅私見其本而獨秘之乎晉元帝時豫章王内史梅頥始以孔傳奏上而缺}
  - {type: variant, offset: 24, length: 2, content: 爲始, SBCK: 典一篇乃取肅之堯典從愼徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭玄王肅諸注廢}
  - {type: variant, offset: 24, length: 2, content: 爲始, WYG: 典一篇乃取肅之堯典從慎徽以下分為舜典以續之自是歐陽大小夏侯家等學馬融鄭𤣥王肅諸注廢}

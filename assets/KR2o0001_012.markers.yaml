  - {type: variant, offset: 166, length: 0, content: '', SBCK: 更勑􅅊曜周昭薛營梁廣華覈訪求徃事相與記述並作之中曜營為首當歸命矦時廣昭先亡曜營徙黜史官乆闕書遂無聞覈表請曜營續成前史其後曜獨終其書定為五十五卷至􅀳受命海内大同著作陳夀乃集三􅀦史撰為􅀦志凡六十五篇夏侯湛時亦著魏書見夀所作便壞己草而罷及夀卒梁州大中正范頵表言􅀦志明乎得失辭多勸誡}

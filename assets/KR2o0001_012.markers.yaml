  - {type: variant, offset: 876, length: 1, content: 若, SBCK: 起居注杜輔全錄以為燕紀後建興元年董統受詔草創後書著本紀并佐命功臣王公列傳合三十卷慕容垂稱其敘事富贍足成一家之言但褒述過美有慙董史之直其後申秀范享各取前後二燕合成一史南燕有趙郡王景暉嘗事德超撰二主起居注超亡仕}

  - {type: variant, offset: 160, length: 0, content: '', SBCK: 僕射劉珍及諌議大夫李􅂶雜作紀表名臣節士儒林外戚諸傳起自建武訖乎永初事業垂竟而珍等繼卒復命侍中伏無忌與諌議大夫黃景作諸王王子功臣恩澤侯表南單于西羗傳地里志至元年復令大中大夫邉韶大軍營司馬崔寔議郎朱穆曹壽雜作孝穆崇二皇及順烈皇后傳又増外戚傳入安思等后儒林傳入崔􅂐諸人寔壽又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢記嘉平中光禄大夫馬日磾議郎蔡邕楊彪盧植著作東觀接續紀傳之可成者而邕别作朝㑹車服二志後坐事徙朔方上書求還續成十志㑹董卓作亂西遷史臣廢弃舊文散逸在許都楊彪頗存注記至於名賢君子自本初已下闕續魏黃初中唯著先賢表故記殘缺至晉無成大始中秘書丞司馬彪始討論衆作綴其􅀁聞起于光武終于孝獻録世十二編年二百通綜上下旁引庻事為紀志傳凡一十三篇號曰續漢書又散􅀐常侍華嶠刪定東觀記為漢後書帝}
  - {type: page-break, offset: 160, content: '', id: KR2o0001_SBCK_012-7b}

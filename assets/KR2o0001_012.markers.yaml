  - {type: punctuation, offset: 28, content: 「, id: KR2o0001_tls_012-bkkpn7}
  - {type: variant, offset: 28, length: 1, content: 粵, SBCK: 扵大航購得詣闕以獻舉朝集議咸以為非蓋文句相連􅀁以或合舜典必有曰}
  - {type: variant, offset: 28, length: 1, content: 粵, WYG: 於大航購得詣闕以獻舉朝集議咸以為非梁武帝時為博士議曰孔敘稱伏生誤合五篇蓋文句相連所以或令舜典必有曰}
  - {type: variant, offset: 28, length: 1, content: 粵, krp: 扵大航購得詣闕以獻舉朝集議咸以為非蓋文句相連所以或合舜典必有曰}
  - {type: variant, offset: 32, length: 0, content: '', SBCK: 伏梁武}
  - {type: variant, offset: 32, length: 2, content: 帝堯, WYG: 伏生雖云昏耄何容由是遂不見用也及江陵版蕩其文入北中原學者得而異之隋學士劉炫遂取此一篇列諸本第故今人所習尚書舜典元出於姚氏者焉右説尚書當周室微弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左}
  - {type: page-break, offset: 32, content: '', id: KR2o0001_WYG_012-3b, image: WYG0685/WYG0685-0088b.png}
  - {type: variant, offset: 32, length: 0, content: '', krp: 伏梁武}
  - {type: variant, offset: 33, length: 1, content: 堯, SBCK: 時為􅀶士議曰孔叙穪伏生誤合五篇由是遂不見用也生雖云昏耄何容及江陵板蕩其文入北中原學者得而異之隋學士劉炫遂取此一篇列諸本第故今人􅀁習尚書舜典元出扵姚氏者焉右􅀃尚書當周室㣲弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左}
  - {type: page-break, offset: 33, content: '', id: KR2o0001_SBCK_012-3b}
  - {type: variant, offset: 33, length: 1, content: 堯, krp: 時為博士議曰孔叙穪伏生誤合五篇由是遂不見用也生雖云昏耄何容及江陵板蕩其文入北中原學者得而異之隋學士劉炫遂取此一篇列諸本第故今人所習尚書舜典元出扵姚氏者焉右說尚書當周室㣲弱諸侯力爭孔子應聘不遇自衛而歸乃與魯君子左}
  - {type: punctuation, offset: 34, content: 」, id: KR2o0001_tls_012-bkkpn8}
  - {type: punctuation, offset: 34, content: ；, id: KR2o0001_tls_012-bkkpn9}
  - {type: 'tls:seg', offset: 34, content: '', id: KR2o0001_tls_012-1a.6}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 觀書扵太史氏因魯史記而作春秋上遵周公遺制下明將来之法自􅀮及哀十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言􅀃經也春秋􅀁貶當世君臣其事實皆形扵傳故􅀮其書而不宣􅀁以免時難也及末世口􅀃流形故有公羊穀梁鄒夾}
  - {type: page-break, offset: 36, content: '', id: KR2o0001_SBCK_012-4a}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 觀書於太史氏因魯史記而作春秋上遵周公遺制下明將來之法自隱及哀盡十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言説經也春秋所貶當世君臣其事實皆形於傳故隱其書而不宣所以免時難也及末世口説流行故有公羊穀梁鄒夾}
  - {type: page-break, offset: 36, content: '', id: KR2o0001_WYG_012-4a, image: WYG0685/WYG0685-0088c.png}
  - {type: variant, offset: 36, length: 0, content: '', krp: 觀書扵太史氏因魯史記而作春秋上遵周公遺制下明將来之法自隱及哀十二公行事經成以授弟子弟子退而異言丘明恐失其真故論本事而為傳明夫子不以空言說經也春秋所貶當世君臣其事實皆形扵傳故隱其書而不宣所以免時難也及末世口說流形故有公羊穀梁鄒夾}
  - {type: variant, offset: 38, length: 0, content: '', SBCK: 鄒氏无師夾氏有録無書故不顯扵世漢興董仲舒公孫弘並治公羊其傳習者有嚴頴二家之學宣帝即位聞衛太子􅀻好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮扵後漢儒者數廷毁之㑹博士李封卒遂不復用逮和帝元興十一年鄭興父子奏請重立扵學官至魏晉其書漸行而二傳亦廢今􅀁用左氏本即杜預􅀁注者右􅀃春秋又當春秋之世諸侯􅀦自有史故孔子求衆家史記而得百二十􅀦書如楚之書鄭之志}
  - {type: page-break, offset: 38, content: '', id: KR2o0001_SBCK_012-4b}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 鄒氏無師夾氏有録無書故不顯於世漢興董仲舒公孫𢎞並治公羊其傳習者有嚴頴二家之學宣帝即位聞衛太子私好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮於後漢儒者數廷毁之㑹博士李封卒遂不復補一作用至和帝元興十一年鄭興父子奏請重立於學官至魏晉其書漸行而二傳亦廢今所用左氏本即杜預所注者右説春秋又當春秋之世諸侯國自有史故孔子求衆家史記而得百二十國書如楚之書鄭之志}
  - {type: page-break, offset: 38, content: '', id: KR2o0001_WYG_012-4b, image: WYG0685/WYG0685-0088d.png}
  - {type: variant, offset: 38, length: 0, content: '', krp: 鄒氏无師夾氏有録無書故不顯扵世漢興董仲舒公孫弘並治公羊其傳習者有嚴頴二家之學宣帝即位聞衛太子私好穀梁乃召名儒蔡千秋蕭望之等大議殿中因置博士平帝初立左氏逮扵後漢儒者數廷毁之㑹博士李封卒遂不復用逮和帝元興十一年鄭興父子奏請重立扵學官至魏晉其書漸行而二傳亦廢今所用左氏本即杜預所注者右說春秋又當春秋之世諸侯國自有史故孔子求衆家史記而得百二十國書如楚之書鄭之志}
  - {type: variant, offset: 39, length: 0, content: '', SBCK: 之春秋魏之紀年此其可得言者左丘明旣配經立傳又撰諸異同􅃅曰外傳􅀦語二十一篇斯蓋採書志等文非唯魯之}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 之春秋魏之紀年此其可得言者左丘明既配經立傳又撰諸異同號曰外傳國語二十一篇斯蓋採書志等文非唯魯之}
  - {type: variant, offset: 39, length: 0, content: '', krp: 之春秋魏之紀年此其可得言者左丘明旣配經立傳又撰諸異同號曰外傳國語二十一篇斯蓋採書志等文非唯魯之}
  - {type: variant, offset: 40, length: 0, content: '', SBCK: 記而已楚漢之際有好事者録自古帝王公侯卿大夫之世終乎秦襄􅃅曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰􅀦䇿三十三篇漢興太中大夫陸賈紀録時政作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳􅀦語刪世本戰􅀦䇿據楚漢列時事上自黃帝下訖麟趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記恊厥六經異傳整齊百家雜語藏諸名山副在京師以俟後聖君子至宣帝時遷外孫楊惲祖述其書遂宣布焉而十篇未成有録而已殁後亡失此􅀃非}
  - {type: page-break, offset: 40, content: '', id: KR2o0001_SBCK_012-5a}
  - {type: page-break, offset: 40, content: '', id: KR2o0001_SBCK_012-5b}
  - {type: variant, offset: 40, length: 1, content: 也, WYG: 記而已楚漢之際有好事者録自古帝王公侯鄉大夫之世終乎秦末號曰世本十五篇春秋之後七雄並爭秦并諸侯則有戰國策三十三篇漢興太中大夫陸賈紀録時功作楚漢春秋九篇孝武之世太史公司馬談欲錯綜古今勒成一史其意未就而卒子遷乃述父遺志採左傳國語刪世本戰國策據楚漢列時事上自黄帝下訖麟趾作十二本紀十表八書三十世家七十列傳凡百三十篇都謂之史記厥協六經異傳整齊百家雜語藏諸名山副在京師}

  - {type: variant, offset: 875, length: 0, content: '', SBCK: 淩修譛其訕謗先帝聰怒而誅之劉曜時平輿子和苞譔趙記十篇事止當年不終曜㓕後趙石勒命其臣徐光宗􅍓傅暢郭愔等撰上黨國記起居注趙書其後又令王蘭陳宴程隂徐機等相次撰述至石虎並令刋削使勒功業不傳其後燕太傅長史田融宋尚書庫部郎郭仲産北中郎叅軍王度追撰石事集鄴都記趙記等書前燕}

  - {type: variant, offset: 931, length: 2, content: 歷選, krp: 書侍郎顔師古給事中孔頴達共撰成隋書五十五卷與新撰周史並行扵時初太宗以梁陳及齊周隋氏並未有書仍命學士分修事具扵上仍使秘書監魏徵總知其務凡有讃論徵多預焉始以貞觀三年創造至十八年方就起功多於諸史一嵗唯姚思亷貞觀二年合為五代紀傳并目録凡二百五十二卷書成不入史閤唯有十志㫁為三十卷尋擬續奏未有其文又詔左僕射于志寧太史令李淳風著作郎韋安仁符璽郎李延夀同撰其先撰史人唯令狐德棻重預其事太宗崩後刋勒始成其篇第雖編入隋書其實别行俗呼為五代史志右說隋書惟大唐之受命也義寧武德間工部尚書温大雅首撰創業𧺫居注三篇自是司空房元齡給事中許敬宗著作佐郎敬播相與自立編年體號為實録迄乎三帝世有其書貞觀初姚思㢘始撰紀傳粗成三十卷至顯慶元年太尉長孫無忌與于志寧令狐德棻著作郎劉㣧之楊仁卿𧺫居郎顧㣧等因其舊作綴以後事復為五十卷雖云繁雜時有可觀龍朔中敬宗又以太子少卿總統史任更増作傳混成百卷如高宗本紀及永徽名臣四夷等傳多是其所造又起草十志未半而終敬宗所作紀傳或曲希時㫖或猥釋私憾凡有毁譽多非實録必方諸魏伯𧺫亦猶張衡之蔡邕焉其後左史李仁實續撰于志寕許敬宗李義府等傳載言紀事見推直筆惜其短歳功業未終至長夀中春官侍郎牛鳯及又㫁自武德終于弘道撰爲唐書百有十卷鳯及以喑聾不才而輒議一代大典凡所纂錄皆素貴私家行状而世人叙事罕能自達或言皆比興全類咏謌或語多鄙樸實同文案而總入編次了無釐革其有出自胸臆申其機杼彂言則嗤鄙怪誕叙事則參差倒錯故閱其篇第豈謂可觀披其章句不識所以既而悉收姚許諸本𣣔使其書獨行由是皇家舊事殘缺殆盡長安中余與正諌大夫朱敬則司封郎中徐堅左拾遺吳兢奉詔更撰唐書勒成八十卷神龍元年又與兢等重修則天實録編為二十卷夫舊史之壞其亂如繩錯綜艱難朞月方畢雖言無可擇事多遺恨庶將來削藁猶有憑焉大抵}

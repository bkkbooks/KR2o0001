  - {type: variant, offset: 167, length: 7, content: 限斯極固既分遷, SBCK: 益風化願多採録扵是詔下河南尹就家寫其書先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰呉録異聞錯出其流㝡多宋文帝以􅀦志載紀傷扵簡略乃命中書郎裴松}
  - {type: page-break, offset: 167, content: '', id: KR2o0001_SBCK_012-10a}
  - {type: variant, offset: 167, length: 7, content: 限斯極固既分遷, WYG: 益風化願垂採録於是詔下河南尹就家寫其書先是魏時京兆魚豢私撰魏略事止明帝其後孫盛撰魏氏春秋王隱撰蜀記張勃撰吳録異聞間出蜀本作錯宋本作間其流最多宋文帝以國志載事傷於簡略乃命中書郎裴松兼採衆書補注其闕由是世言三國志者以裴注為本焉右說三國志晉史洛京時著作郎陸機始撰三祖紀佐著作郎束晢又撰十志㑹中朝䘮亂其書不存先是厯陽令陳郡王鈐有著述才每私録晉書及功臣行狀未就而卒子隱博學多聞受父遺業西都事跡多所詳究過江為著作郎受詔撰晉史為其同僚虞預所斥坐事免官家貧無資書未遂就乃依征西將軍庾亮於武昌鎮亮給其紙墨由是獲成凡為晉書八十九卷咸康六年始詣闕奏上隱雖好述作而辭拙才鈍其書編次有序者皆鈐所修章句混漫者必隱所作時尚書郎領國史干寶亦撰晉紀自宣訖愍七帝五十三年凡二十二卷其書簡略直而能婉甚為當時所稱晉江左史官自鄧粲孫盛王韶}

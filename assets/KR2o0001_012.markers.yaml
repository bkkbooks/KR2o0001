  - {type: 'tls:seg', offset: 879, content: '', id: KR2o0001_tls_012-7a.20}
  - {type: variant, offset: 879, length: 3, content: 茍濫引, SBCK: 矣齊天寳二年勅秘書監魏收愽採舊聞勒成一史又令刁柔辛元植方延祐睦仲讓裴昻之髙孝幹等助其編次收􅀁取史官懼相凌忽故刁辛諸子並乏史才唯以髣髴學流憑附得進扵是大徵百家譜狀斟酌以成魏書上自道武下終孝靖紀傳與志凡百三十卷收謟齊氏扵魏室多不平旣黨北朝又厚誣江左性憎勝己喜念舊惡甲門盛德與之有怨者莫不被以醜言没其善事遷怒􅀁至毁及髙曾書成始奏詔收扵尚書省與諸家論討前後列訴者百有餘人時尚書令楊遵彦一代貴臣勢傾朝野收撰其家傳甚羙是以深被黨援諸訟史者皆獲重罰或斃扵獄中群怨謗聲不息孝昭世勑收更加研審然後宣布扵外書成嘗訪諸群臣猶云不實又令治改其所變易甚多由是世薄其書號為􅁾史至隋開皇勑著作郎魏淡與顔之推辛德源更撰魏書矯正收失淡以西魏為真東魏為偽故文恭列紀孝靖稱傳合紀傳論例總九十二篇煬帝以澹書猶未能善又勑左僕射楊素别撰學士潘徽褚亮歐陽詢等佐之㑹素薨而止今世稱魏史者猶以收本為主焉右􅀃後魏書髙齊史天統初太常少卿祖孝徵述獻武起居名曰黃初傳天録時中書侍郎陸元規常從文宣征討著皇帝實録惟記行師不載}

  - {type: variant, offset: 160, length: 0, content: '', WYG: 僕射劉珍及諫議大夫李充雜作紀表名臣節士儒林外戚諸傳起自建武訖乎永初事業垂竟而珍充繼卒復命侍中伏無忌與諫議大夫黄景作諸王王子功臣恩澤侯表南單于西羌傳地理志至元嘉元年復令太中大夫邉韶大軍營司馬崔寔議郎朱穆曹壽雜作孝穆崇二皇及順烈皇后傳又増外戚傳入安思等后儒林列傳入崔篆諸人寔壽又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢紀嘉平中光禄大夫馬日磾議郎蔡邕楊彪盧植著作東觀接續紀傳之可成者而邕别作朝㑹車服二志後坐事徙朔方上書求還續成十志㑹董卓作亂大駕西遷史臣廢棄舊文散逸及在許都楊彪頗存注記至於名賢君子自本初已下闕續魏黄初中唯著先賢表故記殘缺至晉不成大始中秘書丞司馬彪始討論衆說一作作綴其所聞起元光武終於孝獻録世十二編年二百通綜上下旁引庻事為紀志傳凡一十三篇號曰續漢書又散騎常侍華嶠刪定東觀記為後漢書帝}

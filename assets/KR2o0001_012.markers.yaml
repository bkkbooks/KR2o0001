  - {type: variant, offset: 876, length: 1, content: 若, WYG: 起居注杜輔全録以為燕紀後燕建興元年董統受詔草創後書著本紀并佐命功臣王公列傳合三十卷慕容垂稱其敘事富贍足成一家之言但褒述過美有慙董史之直其後申秀范享各取前後二燕合成一史南燕有趙郡王景暉嘗事德超撰二主起居注超亡仕於馮氏官至中書令仍撰南燕録六卷蜀初號曰成後改稱漢李勢散騎常侍常璩撰漢書十卷後入晉秘閤改為蜀李書璩又撰華陽國志具記李氏滅前涼張駿十五年命其西曹邊瀏集内外事以付秀才索綏作涼國春秋五十卷又張重華䕶軍參軍劉慶在東苑專修國史二十餘年著涼記十二卷建康太守索暉從事中郎劉昞又各著涼書前秦史官初有趙淵車敬梁熙韋譚相繼著述苻堅嘗取而觀之見茍太后幸李威事怒而焚滅其本後著作郎董誼追録舊語十不一存及宋武帝入關曾訪秦國事又命梁州刺史吉翰問諸仇池並無所獲先是秦秘書郎趙整參撰國史值秦滅隱於南洛山著書不輟有馮翊車頻助其經始一作費整卒翰乃啓頻纂成其書以元嘉九年起至二十八年方罷定為三卷而年月失次首尾不倫河東裴景仁又正其訛僻刪為秦記十一篇後秦扶風馬僧䖍河東衛隆景並著秦史及姚氏之滅殘缺者多泓從弟和都仕魏為左民尚書又追撰秦紀十卷夏天水趙思群北地張淵於真興承光之世並受命著其國書及統萬之亡多見焚燒西涼與西秦北燕其史或當代所書或他邦所録叚龜龍記吕氏宗欽記秃髮氏韓顯宗記吕馮氏唯此三者可知自餘不詳誰作魏世黄門侍郎崔鴻乃考覈衆家辨其同異除煩補闕錯綜綱紀易其國書曰録主紀曰傳都謂之十六國春秋鴻始以景明之初求諸國逸史逮至始元年鳩集㡬備而以猶闕蜀事不果成書推求十有五年始於江東購獲乃増其篇目勒為十卷鴻沒後永安中其子繕寫奏上請藏諸秘閣由是偽史宣布大行於時右說十六國春秋元魏史道武時始令鄧淵著國記為十卷而條例未成暨乎元明廢而不述神嘉二年又詔集諸文士崔浩浩弟覽髙閭鄧頴􅄯維范亨黄輔等撰國書為十卷又特命浩總監史任務從實録復以中書郎髙允散騎侍郎張偉並參著作續成前史書敘述國事無隱惡而刋石寫之以示行路浩坐此夷三族同作死者百二十八人自是遂廢史官至文成帝和平元年始復其職而以高允典著作修國記允年已九十手目俱衰時有校書郎中劉模長於緝綴乃令執筆而口占授之如是者五六歲所成篇卷模有力焉初國記自鄧崔以下皆相承作編年體至孝文大和十一年詔秘書丞李彪著作郎崔光始分為紀傳異科宣武時命邢巒追撰孝文起居注既而崔光遵業補續下説孝明之世温子昇復修孝武紀濟隂王暉業撰辨宗室録魏史官私所撰盡}

  body:
  - {type: variant, offset: 4, length: 0, content: '', WYG: 八條易曰上古結繩以理後世聖人易之以書􅆻儒者云伏犧氏始畫八卦造書契以代結繩之政由是文籍生焉又曰伏犧神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也春秋傳載楚左史能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五典策至於春秋之時猶大行於世爰及後世其書不傳惟唐虞已降可得言者然自堯而往聖賢猶述求其一}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_012-1b, image: WYG0685/WYG0685-0087b.png}
  - {type: xml-element, offset: 5, content: '', id: KR2o0001_tls_012-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR2o0001_tls_012-1a.1}
  - {type: variant, offset: 5, length: 1, content: 夫, SBCK: 外篇古今正史第二緫十八條易曰上古結繩以理後世聖人易之以}
  - {type: variant, offset: 5, length: 1, content: 夫, WYG: 髣髴存焉而後來諸子廣造竒説其語不經其}
  - {type: variant, offset: 5, length: 1, content: 夫, krp: 外篇古今正史第二緫十八條易曰上古結繩以理後世聖人易之以}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 契儒者云伏犧氏始畫八卦造書契以代結繩}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊}
  - {type: variant, offset: 7, length: 0, content: '', krp: 契儒者云伏犧氏始畫八卦造書契以代結繩}
  - {type: variant, offset: 8, length: 2, content: 立約, SBCK: 政由是文籍生焉又曰伏犧神農黃帝之書謂之三墳言大道也少昊顓頊髙􅉝唐虞之書謂之五典言常道也春秋傳載楚左史能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五典䇿至扵春秋之時猶大行扵世爰及後世}
  - {type: page-break, offset: 8, content: '', id: KR2o0001_SBCK_012-1b}
  - {type: variant, offset: 8, length: 2, content: 立約, WYG: 事未可明也斯則墳典所記無得而稱者焉右説三墳五典堯舜相承已見墳典周監二代各有書籍至孔子討論}
  - {type: page-break, offset: 8, content: '', id: KR2o0001_WYG_012-2a, image: WYG0685/WYG0685-0087c.png}
  - {type: variant, offset: 8, length: 2, content: 立約, krp: 政由是文籍生焉又曰伏犧神農黃帝之書謂之三墳言大道也少昊顓頊髙􅉝唐虞之書謂之五典言常道也春秋傳載楚左史能讀三墳五典禮記曰外史掌三皇五帝之書由斯而言則墳典文義三五典䇿至扵春秋之時猶大行扵世爰及後世}
  - {type: punctuation, offset: 10, content: ，, id: KR2o0001_tls_012-bkkpn1}
  - {type: 'tls:seg', offset: 10, content: '', id: KR2o0001_tls_012-1a.2}
  - {type: variant, offset: 11, length: 1, content: 來, SBCK: 書不傳惟唐虞已降可得言者然自堯而徃聖賢猶述求其一二髣髴存焉而後来諸子廣造竒􅀃其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典􅀁記無得而稱者焉右􅀃三墳五典堯舜相承己見墳典周監二代各有書籍至孔子討論其議刪為}
  - {type: variant, offset: 11, length: 1, content: 來, WYG: 義刪為}
  - {type: variant, offset: 11, length: 1, content: 來, krp: 書不傳惟唐虞已降可得言者然自堯而徃聖賢猶述求其一二髣髴存焉而後来諸子廣造竒說其語不經其書非聖故馬遷有言神農已前吾不知矣班固亦曰顓頊之事未可明也斯則墳典所記無得而稱者焉右說三墳五典堯舜相承己見墳典周監二代各有書籍至孔子討論其議刪為}
  - {type: variant, offset: 13, length: 4, content: 矣如尼父, SBCK: 書始自唐堯下終秦繆其言百篇而各為}

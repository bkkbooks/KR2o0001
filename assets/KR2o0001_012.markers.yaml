  - {type: variant, offset: 163, length: 0, content: '', SBCK: 皇后紀七十三譜十典列傳七十總九十二篇其十典竟不成而卒自斯已後作者相􅁇為編年者四族創紀傳者五家推其所長華氏居㝡而遭􅀳室東徙三惟一存至宋宣城太守范曄乃廣集學徒窮覧舊籍刪煩補略作後漢書凡十紀十志八十列傳合為百篇㑹曄以罪被收其十志亦未成而死先是􅀳東陽太守袁宏抄撮漢氏後書依荀恱體著後漢紀十三篇世言漢中興史者唯范􅀽二家而已右􅀃後漢書魏史黃初太和中始命尚書衞紀繆襲草創紀傳累載不成又命侍中􅅊誕應璩秘書王沉大將軍從事中郎阮籍司徒右長史孫該司􅀠校尉傅玄等復共撰定其後王沉獨就其業勒成魏書四十四卷其書多為時諱殊非實録呉大}
  - {type: page-break, offset: 163, content: '', id: KR2o0001_SBCK_012-9a}
  - {type: variant, offset: 163, length: 0, content: '', WYG: 皇后紀二三譜十典列傳七十總九十七篇其十典竟不成而卒自斯已後作者相繼為編年者四族創紀傳者五家推其所長華氏居最而遭晉室東徙三惟一存至宋宣城太守范曄乃廣集學徒窮覽舊籍刪煩補畧作後漢書凡十紀十志八十列傳合為百篇㑹曄以罪被收其十志亦未成而死先是晉東陽太守袁宏抄撮漢氏後書依荀悅體著後漢紀十三篇世言漢中興史者唯范袁二家而已右說後漢書魏史黄初太和中始命尚書衛覬繆襲草創紀傳累載不成又命侍中韋誕應璩秘書監王沈大將軍從事中郎阮籍司徒右長史孫該司𨽻校尉傅元等復共撰定其後王沈獨就其業勒成魏書四十四卷其書多為時諱殊非實録吳大}

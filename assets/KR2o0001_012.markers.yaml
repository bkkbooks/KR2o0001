  - {type: variant, offset: 21, length: 0, content: '', SBCK: 漢室龍興旁求儒雅聞故秦愽士伏勝能傳其業詔太常使掌故晁錯受焉時伏生年且百嵗言不可曉口授其書纔二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河内女子得㤗誓一篇獻之與伏生􅀁誦合三十篇行之扵世其篇􅀁載年月不與序相符㑹又與左傳􅀦語孟子所引㤗誓不同故漢魏諸儒玄王肅}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 漢室龍興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故􅄯錯受焉時伏生年且百歲言不可曉口授其書纔二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河内女子得㤗誓一篇獻之與伏生所誦合三十篇行之於世其篇所載年月不與序相符㑹又與左傳國語孟子所引泰誓不同故漢魏諸儒謂馬融鄭𤣥王肅}
  - {type: page-break, offset: 21, content: '', id: KR2o0001_WYG_012-2b, image: WYG0685/WYG0685-0087d.png}
  - {type: variant, offset: 21, length: 0, content: '', krp: 漢室龍興旁求儒雅聞故秦愽士伏勝能傳其業詔太常使掌故晁錯受焉時伏生年且百嵗言不可曉口授其書纔二十九篇自是傳其學者有歐陽氏大小夏侯宣帝時復有河内女子得㤗誓一篇獻之與伏生所誦合三十篇行之扵世其篇所載年月不與序相符㑹又與左傳國語孟子所引㤗誓不同故漢魏諸儒玄王肅}

  - {type: variant, offset: 109, length: 1, content: 立, krp: 間㑹稽禇先生更𥙷其缺作武帝紀三王世家龜䇿日者辭多鄙陋非遷本意也晉散騎常侍巴西譙周以遷書周秦已上或采家人諸子不專據正經扵是作古史考二十五篇皆慿舊典以糺其繆今則與史記並行扵代焉右說史記史記所書年止漢武太初已後闕而不録其後劉向向子歆及諸好事者若馮商衛衡楊雄史岑梁審肆仁晉馮叚肅金丹馮衍韋融蕭奮劉恂等相次撰續迄于哀平間猶名史記至建武中司徒掾班彪以為其言鄙俗不足以踵前史又雄歆褒美偽薪誤後惑衆不當垂之後代者也扵是採其舊事旁觀異聞作後傳六十五篇其子固以父所撰未盡一家乃𧺫元髙皇終乎王莽十有二世二百三十年綜其行事上下通洽為漢書紀}

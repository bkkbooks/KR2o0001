  - {type: variant, offset: 159, length: 0, content: '', SBCK: 在漢中興明帝始詔班固與睢陽令陳宗長陵令尹敏司􅀠從事􅺖冀作世祖本紀幷撰功臣及新市平林公孫述事作列傳載記二十八篇自是以来春秋世亦以煥炳而忠臣義士莫之撰勒扵是又詔史官謁}

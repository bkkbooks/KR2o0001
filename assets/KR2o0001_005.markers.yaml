  - {type: variant, offset: 414, length: 2, content: 封荊, SBCK: 陳郡言杜則係之京邑姓卯金者咸曰彭城氏禾女者皆云鉅鹿書其邑里必云隴西趙郡夫以假姓猶且如斯今有姓邴者姓弘者以犯國諱皆改為李氏如及卑者如加五等爵或稱平原公或號東平子則真姓者斷可知矣又今西域胡人多有姓明夷雜種尚竊美名則諸夏士流固無慚徳也為明氏出於平原卑氏出於東平故也夫邉在諸史傳多與同風人也本姓原氏至於它篇所如隋史牛弘傳云安定鶉觚庫汗氏續謂之陳郡謝􅅯並其􅀋也引皆謂之西牛弘唐史謝􅅯傳云本姓此乃尋流俗之常談志著書之舊體矣又近世有班秩不著姓者始以州壤自摽若}

  - {type: variant, offset: 9, length: 1, content: 置, SBCK: 稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此􅀁謂厚顔也古者詔命皆人主􅀁為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見决矣至扵近古則不然凢有詔􅃙皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻􅀮之渥恩叙憂勤之至意其君雖有反道敗德惟頑與􅁀觀其政令則辛癸不如讀其詔誥則勛華再出此􅀁謂假手也天子無􅃧言苟言之有失則取􅀹天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰}
  - {type: page-break, offset: 9, content: '', id: KR2o0001_SBCK_005-6b}
  - {type: variant, offset: 9, length: 1, content: 置, krp: 稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顔也古者詔命皆人主所為故漢光武時第五倫為督鑄錢掾見詔書而歎曰此聖主也一見决矣至扵近古則不然凢有詔敕皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隱之渥恩叙憂勤之至意其君雖有反道敗德惟頑與暴觀其政令則辛癸不如讀其詔誥則勛華再出此所謂假手也天子無戲言苟言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰}
  - {type: variant, offset: 11, length: 1, content: 侯, SBCK: 君得無笑朕乎是知褒貶之言哲王􅀁愼至扵近古則不然凢百具寮王公卿士始有褒崇則謂其珪璋特逹善無可加旋有貶黜則比之斗筲下才罪不容責夫同為一士之行同取一君之言愚智生扵倐忽是非變扵俄頃帝心不一皇鍳無恒此􅀁謂自戾也夫國有否泰世有汚􅂭作者形言本無定凖故觀猗歟之頌而驗有殷方興覩魚藻之刺而知宗周將殞至扵近代則不然夫談主上之聖明則君盡三五述宰相之英偉則臣皆二八國止方隅而言併吞六合福不盈時而稱感致百靈雖人事屢攺而文理無昜故善之與惡其􅀃不殊欲令觀者疇爲凖的此􅀁謂一槩也扵是考兹五失以尋文義雖事皆形似而言必憑虛夫鏤氷爲璧不可得而用也􅀞地爲餅不可得而食也是以行之扵世則上下相䝉傳之扵後則世人不信而世之作者復不之察聚彼虚􅀃編而次之剙自起居成扵國史連章畢録一字無廢非復史書更成文集若乃􅀋選衆作求其穢累王沉魚豢是其甚焉裴子野何之元抑其次也陳壽于寳頗從簡約猶時載浮訛罔盡機要唯王邵撰齊隋二史其􅀁取也文皆諳實理多可信至扵悠悠餙詞皆不之取此實得去邪從正之理􅂢華摭實之義也蓋山有木工則度之况舉世文章豈無其選但苦作者書之不讀耳至如詩有韋孟諷諫賦有趙壹嫉邪篇則賈􅁩過秦論則班彪王命張華述箴扵女史張載題銘扵劍閣諸葛表主以出師王昶書家以誡子劉向谷永之上䟽晁錯李固之􅍟䇿荀伯子之彈文山巨源之啓事此皆言成軌則為世􅀛鏡求諸歷代徃往而有苟書之竹帛持之不刋則其文可與三代同風其事可與五經齊}

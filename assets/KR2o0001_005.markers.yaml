  - {type: variant, offset: 13, length: 0, content: '', SBCK: 古猶今也何逺近之有哉昔夫子修春秋别是非申黜陟而賊臣逆子懼凢今為史而載文也茍􅀎撥浮華採眞實亦可使夫彫䖝小技者聞義而知徙矣此乃禁􅁋之隄防持雅之管轄凢為載削者可不務乎􅀘註第十七昔詩書旣成而毛孔立傳傳之時義}

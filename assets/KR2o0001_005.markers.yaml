  - {type: variant, offset: 51, length: 0, content: '', SBCK: 書若乃此缺一言彼增半句皆採摘成注標為異􅀃有昬耳目難以披覽切惟范曄之刪後漢也簡而且周踈而不漏蓋云備矣而劉昭採其􅀁捐以今稱之皇甫謐全録斯語載於髙士傳夫孟堅士安年代懸隔至今之􅀃豈可同云夫班之習馬其非旣如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉隗録稱其議獄事具刑法志依檢志内了無其􅀃旣而􅆇氏晉書梁朝通史扵大連之傳並有斯言志亦無文傳仍虚述此又不精之咎同扵玄晏也尋班馬之列傳皆具編其人姓名如行狀􅀹相似者則共歸一稱若刺客日者儒林循吏是也范曄旣移題目扵傳首歷姓名扵卷中而猶扵列傳之下注爲列女髙􅀮等目茍姓名旣書題目又顯是鄧禹宼恂之首當署為公輔者矣岑彭吴漢之前當摽為將帥者矣觸􅀋而長實繁其徒何止列女孝子髙􅀮獨行而已魏􅀵著書標牓南國桓劉諸族咸曰島夷是則自江東西盡為卉服之地至扵劉昶沈文秀等傳叙其爵里則不異諸華人也沈文秀等傳則劉􅁉等傳皆云丹徒武康人云吴興豈有君臣共國父子同姓闔閭季札便致土風之殊孫䇿虞翻仍成夷夏之隔求諸徃例􅀁未聞也當晉宅江淮實膺正朔嫉彼羣雄稱爲僣盗故阮氏七録以田范裴叚諸}

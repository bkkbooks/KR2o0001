  - {type: 'tls:seg', offset: 167, content: '', id: KR2o0001_tls_005-3a.2}
  - {type: variant, offset: 167, length: 0, content: '', WYG: 曰卒故左氏傳稱楚鄧曼曰王薨於行國之福也又鄭子産曰文襄之伯君薨大夫弔即其證也按夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外别内之旨也馬遷史記西伯以下與諸列國王侯凡有薨者同加卒稱此豈略外别内耶何貶薨而書卒也葢著魯史者不謂其邦為魯國撰周書者不呼其主曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為累也班氏既分裂史記定名漢書至於述高祖為公王之時皆不除沛漢之字凡有異方降欵者以歸漢為文肇自班書首為此失迄于仲豫仍踵厥非積習相傳曾無先覺者矣又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文按遷之言今實孝武之世也固之言今當孝明之世也事出百年語同一理即如是豈陳氏苖裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至今稱之皇甫謐全録斯語載於高士傳夫孟堅士安年代懸隔至今之說豈可同云夫班之習馬其非既如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉魏録稱其議獄事具刑法志依檢志内了無其說既而臧氏晉書梁朝通史於大連之傳並有斯言志亦無文傳乃虚述此又不精之咎同於𤣥晏也尋班馬之列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄既移題目於傳首歴姓名於卷中而猶於列傳之下注為列女高隠等目茍姓名既書題目又顯是鄧禹㓂恂之首當署為公輔者矣岑彭呉漢之前當標為將帥者矣觸類而長實繁其徒何止列女孝子高隠獨行而已魏収著書摽牓南國桓劉諸族咸曰島夷是則自江東而盡為卉服之地至於劉昶沈文秀等傳叙其爵里則不異諸華劉裕等傳皆云丹徒楚人也沈文秀等傳則云吳興武康人豈有君臣共國父子同姓闔閭季札便致土風之殊孫策虞翻仍成夷夏之隔求諸往例所未聞也當晉宅江淮實膺正朔嫉彼羣雄稱為僣盜故阮氏七録以田范裴段諸記劉石苻姚等書别剙一名題為偽史及隋氏受命海内為}

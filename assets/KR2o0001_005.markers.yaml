  - {type: variant, offset: 328, length: 0, content: '', SBCK: 而作者為人立傳每云某􅀁人也其地皆取􅃇􅃅施之于今氏傳曰隴西成紀人之􅀋也非唯王李近代史為王氏傳云瑯琊臨沂人為李郡縣皆是晉魏已前􅃇名號二族乆離本郡亦自當時無此欲求實録不亦難乎且人無定􅀁因地而化生于荆者言皆成楚居于晉者齒便從黃涉魏而東已經七葉歷江而左非唯一世而猶以本國為是此鄉為非是則孔父里于平昌隂氏家于新野而系纂㣲子源承管仲乃為齊宋之人非曰魯鄧之士求諸自古其義無聞家于魏州昌樂已經三代因時修國史予􅀍配纂李義琰史體遂依李氏舊望攺為隴西成紀人既言不云義琰魏州昌樂人也監修者大笑以為深乖有此說見從故且自世重髙門人輕寒族竟以}

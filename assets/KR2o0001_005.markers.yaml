  - {type: 'tls:seg', offset: 4, content: '', id: KR2o0001_tls_005-1a.1}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 内篇採撰載文􅀘注因習上因習下採撰第十五子曰吾猶及史之闕文是知史文有缺其來尚矣}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 倫為督鑄錢掾見詔書而歎曰此聖主也一見決矣至於近古則不然凡有詔勅皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隠之渥恩叙憂勤之至意其君雖有返道敗徳惟頑與㬥觀其政令則辛癸不如讀其詔誥則勛華再出此所謂假手也葢天子無戲言茍言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所愼至於近古則不然凡百具寮王公卿士始有褒崇則謂其珪璋特達善無可加旋有貶黜則比斗筲下才罪不容責夫同為一士之行同取一君之言愚智生於倐忽是非變於俄頃帝心不一皇鑒無恒此所謂}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_005-6b, image: WYG0685/WYG0685-0038b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 内篇採撰載文𥙷注因習上因習下採撰第十五子曰吾猶及史之闕文是知史文有缺其來尚矣}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 非慱雅君子何以􅀘其遺逸者哉蓋珍裘以衆腋成温廣厦以羣材合構自古探穴藏山之士懷鈆握槧之客何嘗不徴求異􅀃採摭羣言然後􅀎成一家傳諸不朽觀夫丘明授經立傳廣包諸國蓋當時}
  - {type: page-break, offset: 5, content: '', id: KR2o0001_SBCK_005-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 戾也夫國}
  - {type: variant, offset: 5, length: 0, content: '', krp: 非慱雅君子何以𥙷其遺逸者哉蓋珍裘以衆腋成温廣厦以羣材合構自古探穴藏山之士懷鈆握槧之客何嘗不徴求異說採摭羣言然後能成一家傳諸不朽觀夫丘明授經立傳廣包諸國蓋當時}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 周志晉乗鄭書楚杌等篇遂乃聚而編之混成一録向使專慿魯䇿獨詢孔氏何以􅀎殫見洽聞若斯之慱也馬遷史記採世本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序􅀃苑七畧之辭此皆當代雅言事無邪僻故􅀎取信一時擅名千載但中古作者其流日煩雖國有册書殺青不暇而百家諸子􅀻存撰録寸有􅀁長實廣聞見其失之者則有茍出異端虗益新事至如禹生啓石伊産空桑海客乗槎以登漢姮娥竊藥以犇月如斯踳駮不可殫論固難以汙南董之片簡霑班曄之寸札而嵇康髙士傳好聚七國寓言玄晏帝}
  - {type: page-break, offset: 6, content: '', id: KR2o0001_SBCK_005-2a}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 否泰世有汚隆作者形言本無定凖故觀猗歟之頌而驗有殷方興覩魚藻之刺而知宗周將殞至於近代則不然夫談主上之聖明則君盡三五述宰相之英偉則臣皆二八國止方隅而言幷吞六合福不盈眥而稱感致百靈雖人事屢改而文理無昜故善之與惡其說不殊欲令觀者疇為凖的此所謂一槩也於是考茲五失以尋文義雖事皆形似而言必憑虛夫鏤氷為璧不可得而用也畫地為餅不可得而食之是以行之於世則上下相䝉傳之於後則示人不信而世之作者復不之察聚彼虚說編而次之剙自起居成於國史連章疏録蜀本作畢宋本作疏一字無廢非復史書更成文集若乃歴選衆作求其穢累}
  - {type: page-break, offset: 6, content: '', id: KR2o0001_WYG_005-7a, image: WYG0685/WYG0685-0038c.png}
  - {type: page-break, offset: 6, content: '', id: KR2o0001_WYG_005-7b, image: WYG0685/WYG0685-0038d.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 周志晉乗鄭書楚杌等篇遂乃聚而編之混成一録向使專慿魯䇿獨詢孔氏何以能殫見洽聞若斯之慱也馬遷史記採世本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序說苑七畧之辭此皆當代雅言事無邪僻故能取信一時擅名千載但中古作者其流日煩雖國有册書殺青不暇而百家諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虗益新事至如禹生啓石伊産空桑海客乗槎以登漢姮娥竊藥以犇月如斯踳駮不可殫論固難以汙南董之片簡霑班曄之寸札而嵇康髙士傳好聚七國寓言玄晏帝}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 紀多採六經圗䜟引書之誤其萌始扵此矣至范曄増損東漢一代自謂無慙良直而王喬鳬􅂂出扵風俗通左慈羊鳴傳扵抱朴子朱紫不别穢莫大焉沈氏著書好誣先代扵晉則故造竒􅀃在宋則多出謗言前史􅀁載已譏其謬矣而魏􅀵黨附北朝􅀹甚南國承其詭妄重加誣語遂云司馬叡出扵牛金}
  - {type: page-break, offset: 7, content: '', id: KR2o0001_SBCK_005-2b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 沉魚豢是其甚焉裴子野何之元抑其次也陳壽干寶頗從簡約猶時載浮訛未盡機要未一作罔惟王邵撰齊隋二史其所取也文皆詣實理多可信至於悠悠飾詞皆不之取此實得去邪從正之理捐華摭實之義也葢山有木工則度之況舉世文章豈無其選但苦作}
  - {type: page-break, offset: 7, content: '', id: KR2o0001_WYG_005-8a, image: WYG0685/WYG0685-0039a.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 紀多採六經圗䜟引書之誤其萌始扵此矣至范曄増損東漢一代自謂無慙良直而王喬鳬履出扵風俗通左慈羊鳴傳扵抱朴子朱紫不别穢莫大焉沈氏著書好誣先代扵晉則故造竒說在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤甚南國承其詭妄重加誣語遂云司馬叡出扵牛金}

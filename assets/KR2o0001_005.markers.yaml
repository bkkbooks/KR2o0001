  - {type: variant, offset: 59, length: 0, content: '', WYG: 核棄藥之滓而愚者乃重加捃拾潔以登薦持此為工多見其無識也孝標善於攻謬博而且精固以察及泉魚辨窮河豖嗟乎以峻之才識足堪逺大而不能探􅄨彪嶠網羅班馬方復留情於委巷小說銳思於流俗短書可謂勞而無功費而無當者矣自茲以降其失逾甚若蕭楊之璅雜王宋之鄙碎言殊揀金事比雞肋異}

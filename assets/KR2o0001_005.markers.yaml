markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 世家, SBCK: 史通卷}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_005-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 採撰第十五子曰吾猶及史之闕文是知史文有闕其來尚矣自非博雅君子何以𥙷其遺逸者哉葢珍裘以衆腋成温廣厦以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異説採摭羣言然後能成一家傳諸不朽觀夫邱明授經立傳廣包諸國葢當時有周志晉乗鄭書楚杌等篇遂乃聚而編之混成一録向使專慿魯䇿獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_WYG_005-1b, image: WYG0685/WYG0685-0035d.png}
  - {type: variant, offset: 0, length: 2, content: 世家, krp: 史通卷}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 本國語戰國䇿楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序説苑七略之辭此皆當代雅言事無邪僻故能取信一時擅名千載但中古作者其流日煩雖國有册書殺青不暇而百}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虛益新事至如禹生啟石伊産空桑海客乗查以登漢姮娥竊藥以犇月如斯踳駁不可殫論固難以汗南董之片簡霑班華之寸札而嵇康高士傳好聚七國寓言𤣥晏帝王紀多採六經圖讖引書之誤其萌始於此矣至范曄増損東漢一代自謂無慙良直而王喬鳬履出於風俗通左慈羊鳴傳於抱朴子朱紫不别穢莫大焉沈氏著書好誣先代於晉則故造竒説在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國蜀本作甚宋本作苦承其詭妄重加誣語遂云司馬叡出於牛金王邵沈約晉書造竒説云瑯琊國姓牛者與夏侯妃私通生中宗因逺叙宣帝以毒酒殺牛金符證其狀収因此乃云司馬叡晉將牛金子也宋孝王曰收以叡為金子計其年全不相干按前史尚如此誤况後史編録者耶劉駿上滛路氏沈約宋書曰孝武於路太后處寢息時人多有議魏書因云駿烝其母路氏醜聲播於甌越也可謂助桀為虐幸人之災尋其生絶𦙍嗣死遭剖斵葢亦隂過之所致也晉世雜書諒非一族若語林世説幽明録搜神記之徒其所載或恢諧小辨或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語唐朝所撰晉史多採以為書夫以干鄧之所糞除王虞之所糠粃持為逸史用補前傳此何異魏朝之撰皇覽梁世之修遍略務多為美聚博為功雖取恱小人終見􅅓於君子矣夫郡國之記譜牒之書務欲矜其州里誇其氏族讀之者安可不練其得失明其眞偽者乎至如江東五雋始自㑹稽典録潁川八龍出於荀氏家傳而修晉漢史者皆徵彼虚譽定為實録茍不别加研覈何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盜嫂翟義不死諸葛猶存此皆得之於行路傳之於衆口儻無明白其誰曰然故蜀相薨於渭濱晉書稱嘔血而死魏君崩於馬圈齊史云中矢而亡沈炯罵書河北以為王韋魏収草檄關西謂之邢邵夫同說一事而分為兩家葢言之者彼此有殊故書之者是非無定况古今路阻視聽壤隔而談者或以前為後或以有為無涇渭一亂莫之能辨而後來穿鑿喜出異同不慿國史别訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉䕫唯一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈此之乖濫往往有旃故作者惡道聽途說之違理街談巷議之損實觀夫子長之譔史記也殷周已徃採彼家人安國之述陽秋也梁益舊事訪諸故老夫以芻蕘鄙說刋為竹帛正言而輒欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作冥漠九泉毁譽所加逺誣千載異辭疑事學者宜善思之載文第十六夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其美載於周詩懷襄不道其惡存於楚賦讀者不以吉甫奚斯為諂屈平宋玉為謗者何也葢不虚美不隱惡故也是則文之將史其流一焉固可以方駕南董俱稱良直者矣爰洎中葉文體大變樹理者多以詭妄為本飾辭者務以滛麗為宗譬以女工之有綺縠音樂之有鄭衞葢語曰不作無益害有益至如史氏所書固當以正為主是以虞帝思理夏后失邦一作御尚書載其元首禽荒之歌鄭莊至孝晉獻不明春秋録其大隧狐裘之什其理讜而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虚上林揚雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無裨奬􅂆有長奸詐而前後史漢皆書諸列傳不其謬乎且漢代詞賦雖云虚矯自餘他文大扺猶實至於魏晉已下則偽繆雷同㩁而論之其失有五一曰虚設二曰厚顔三曰假手四曰自戾五曰一槩何者昔大道為公以能而授故堯咨爾舜舜以命禹自曹馬以降其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓跡實同於莽卓言乃類於虞夏且始自納陛迄於登壇彤弓盧矢新君膺九命之錫白馬侯服舊主䝉三恪之禮徒有其文竟無其事此所謂虚設也古者兩軍為敵二國爭雄自相稱述言無所隠何者國之得喪如日月之食焉非由飾辭矯說所能掩蔽也逮於近古則不然至如曹公歎蜀主之英略曰劉備吾儔周帝美齊宣之強盛云高歡不死或移都以避其鋒或斵氷以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧𤣥黄列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顔也古者國有詔命皆人主所為故漢光武時}

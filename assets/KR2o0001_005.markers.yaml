  - {type: variant, offset: 14, length: 5, content: 五等疏爲萬, krp: 訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注蓋傳者轉也轉授扵無窮注者流也流通而靡絶惟此二名其歸一揆如韓戴服鄭鑚仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗旣而史傳小書人物雜記若贄虞之三輔决録陳壽之季漢輔臣周處之陽羡土風常據之華陽士女文言羙辭列扵章句委曲叙事存扵細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力㣲不能自逹庶慿驥尾千里絶羣遂乃掇衆史之異詞𥙷前書之所闕若裴松之三}
  - {type: variant, offset: 15, length: 4, content: 等疏爲萬, WYG: 經齊列古猶今也何逺近之有哉昔夫子修春秋别是非申黜陟而賊臣逆子懼凡今之為史而載文也茍能撥浮華採眞實亦可使夫彫蟲小伎者聞義而知徙矣此乃禁淫之隄防持雅之管轄凡為載削者可不務乎補註第十七昔詩書既成而毛孔立傳傳之時義以訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注葢傳者轉也轉授於無窮注者流也流通而靡絶惟此二名其歸一揆如韓戴服鄭鑚仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗既而史傳小書人物雜記若趙岐之三輔決録陳夀之季漢輔臣周處之陽羨土風常璩之華陽士女文言美辭列於章句委曲叙事存於細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力微不能自達庶憑驥尾千里絶羣遂乃掇衆史之異詞補前書之所闕若裴松之三}

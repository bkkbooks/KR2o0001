  - {type: variant, offset: 8, length: 0, content: '', SBCK: 與夏侯妃􅀻通生中宗因逺敘宣帝王邵沈約晋書造竒􅀃云瑯琊國姓牛晉將牛金子也宋孝王曰􅀵以叡為金子計其以毒酒煞牛金符證其狀􅀵因此乃云司馬叡此誤况後史編録者耶年全不相干按前史尚如劉駿上滛路氏宋書沈約書因云駿蒸其母路氏醜聲播扵甌越也曰孝武扵路太后處􅃦息時人多有議魏可謂􅂇桀為虐幸人之災尋其生絶㣧嗣死遭割㫁蓋亦隂過之􅀁致也晉世雜書諒非一族若語林世􅀃幽明録搜神記之徒其􅀁載􅂉恢諧小辨􅂉神􅀑恠物其事非聖楊雄􅀁不觀其言亂神宣尼􅀁不語唐朝􅀁撰晉史多採以為書夫以于鄧之􅀁糞除王虞之􅀁糠粃以為逸史用􅀘前傳此何異魏朝之撰皇覽梁世之修遍畧務多為羙聚慱為功雖取恱小人終見嗤扵君子矣夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其眞偽者乎至如江東五雋始自會稽典録頴川八龍出扵荀氏家傳而修晉漢史者皆徴彼虚譽定為實録苟不别加研覈何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盗嫂翟義不死諸葛猶存此皆得之扵行路傳之扵衆口儻無明白其誰曰然故蜀相薨扵渭濵晉書稱嘔血而死魏君崩扵馬圈齊史云中矢而亡沈烱薦書河北以為王韋魏􅀵草檄關西謂之邢邵夫同􅀃一事而分為兩家蓋言之者彼此有殊故書之者是非無定况古今路阻視聼壤隔而談者或以前為後􅂉以有為無涇渭一亂莫之􅀎辨而後来穿鑿喜出異同不慿國史别訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉䕫唯一足烏白馬角救燕丹而免禍犬吠鷄鳴逐劉安以高蹈此之乖濫徃徃有􅏧故作者惡道聽途􅀃之違理街談巷議之損實觀夫子長之撰史記也殷周已徃採彼家人安國之述陽秋也梁益􅃇事訪諸故老夫以蒭蕘鄙􅀃刋為竹帛正言而輙欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作㝠漠九泉毁譽􅀁加逺誣千載異辭疑事學者宜善思之載文第十六夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其羙載扵周詩懷襄不道其惡存扵楚賦讀者不以吉甫奚斯為謟屈平宋玉為謗者何也蓋不虚羙不􅀮惡故也是則文之將史其流一焉固可以方駕南董俱稱良直者矣爰洎中葉文體大變􅀣理者多以詭妄為本飾辭者務以滛麗為宗譬以女工之有綺縠音樂之有鄭衛蓋語曰不作無益害有益至如史氏􅀁書固當以正為主是以虞帝思理夏后失御尚書載其元首禽荒之歌鄭莊至孝晉献不明春秋録其大隧狐䘮之什其理儻而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虚上林楊雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無禆勸奬有長奸詐而前後史漢皆書列傳不其謬乎且漢代詞賦雖云虚矯自餘它文大抵猶實至扵魏晉已下則偽繆雷同㩁而論之其失有五一曰虚設二曰厚顔三曰假手四曰自戾五曰一槩何者大道爲公以􅀎而授故堯咨尔舜舜以命禹自曹馬已䧏其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓跡實同扵莽卓言乃􅀋扵虞夏且始自納陛迄于豋壇彤弓盧矢新君膺九命之錫白馬侯服􅃇主䝉三恪之禮徒有其文竟無其事􅀁謂虚設也古者兩軍為敵二國爭雄自相稱述言無􅀁􅀮何者國之得䘮如日月之蝕焉非由飾辭矯􅀃􅀁􅀎掩蔽也逮扵近古則不然至如曹公歎蜀主之英畧曰劉備吾儔周帝羙齊宣之強盛云髙歡不死􅂉移都以避其鋒或斵氷以防其渡及其申誥誓降移檄}

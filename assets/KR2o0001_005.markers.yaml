  - {type: variant, offset: 169, length: 0, content: '', WYG: 靡愛憎人無彼我而世有撰隋書之經籍志者其流别羣書還同阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧為附庸之主而揚雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是偽書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王室將崩霸圖云構必有忠臣義士捐生殉節若乃韋耿謀誅曹武誅一作討欽誕問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於莽靖之末王謙尉逈玉折於宇文之季而李刋齊史顏述隋篇時無逼畏事須矯枉而皆仍舊不改謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盜葛龔所作而進之既具録他文不知改易名姓時人謂之曰作奏雖工宜去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歴觀自古此類尤多其有宜去而不去者豈真葛龔而已何事於斯獨致解頥之誚也凡為史者茍能識事詳審措辭精宻舉一隅以三隅反吿諸往而知諸來斯庶幾可以無大過矣因習下第十九亦曰邑里昔五經諸子廣書人物雖世族可驗而邑里難詳逮太史公始革茲體惟有列傳先述}

  - {type: variant, offset: 51, length: 3, content: 記諸國, WYG: 書若乃此缺一言彼增半句皆採摘成注標為異說有昏耳目難為披覽蜀本作搜宋本作披竊惟范曄之刪後漢}
  - {type: page-break, offset: 51, content: '', id: KR2o0001_WYG_005-10a, image: WYG0685/WYG0685-0040a.png}
  - {type: variant, offset: 51, length: 0, content: '', krp: 書若乃此缺一言彼增半句皆採摘成注標為異說有昬耳目難以披覽切惟范曄之刪後漢也簡而且周踈而不漏蓋云備矣而劉昭採其所捐以今稱之皇甫謐全録斯語載於髙士傳夫孟堅士安年代懸隔至今之說豈可同云夫班之習馬其非旣如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉隗録稱其議獄事具刑法志依檢志内了無其說旣而臧氏晉書梁朝通史扵大連之傳並有斯言志亦無文傳仍虚述此又不精之咎同扵玄晏也尋班馬之列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄旣移題目扵傳首歷姓名扵卷中而猶扵列傳之下注爲列女髙隱等目茍姓名旣書題目又顯是鄧禹宼恂之首當署為公輔者矣岑彭吴漢之前當摽為將帥者矣觸類而長實繁其徒何止列女孝子髙隱獨行而已魏收著書標牓南國桓劉諸族咸曰島夷是則自江東西盡為卉服之地至扵劉昶沈文秀等傳叙其爵里則不異諸華人也沈文秀等傳則劉𥙿等傳皆云丹徒武康人云吴興豈有君臣共國父子同姓闔閭季札便致土風之殊孫䇿虞翻仍成夷夏之隔求諸徃例所未聞也當晉宅江淮實膺正朔嫉彼羣雄稱爲僣盗故阮氏七録以田范裴叚諸}
  - {type: variant, offset: 52, length: 0, content: '', SBCK: 劉石符姚等書别剏一名題爲偽史及隋氏受命海内爲家國靡愛憎人無彼我而世有撰隋書之經籍志者其流别羣書還同阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建􅂦峙之業蕭詧爲附庸之主而楊雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可􅀋聚相從合成一部何止取東晉一世十有六家而已乎夫王氏將崩覇國云搆必有忠臣義士捐生殉節若乃韋耿謀討曹武欽誔問罪馬文而魏􅀳史臣書之曰賊此乃迫於當世難以直言至如苟濟元瑾蘭摧於李靖之末王謙尉廻玉折扵宇文之季而季刋齊史顔述隋篇時無逼畏事湏矯在而皆仍舊不攺謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盗葛龔所作而進之旣具録它文不知攺易名姓時人謂之曰作奏雖工冝去葛龔及邯鄲氏撰􅀏林載之以為口實嗟乎歴觀自古此􅁼􅀹多其有冝去而不去者豈直葛龔而已何事於斯獨致解頥之誚也凢為史者茍􅀎識事詳審措辭精宻舉一偶以三隅反告}
  - {type: page-break, offset: 52, content: '', id: KR2o0001_SBCK_005-12a}
  - {type: page-break, offset: 52, content: '', id: KR2o0001_SBCK_005-12b}
  - {type: variant, offset: 52, length: 0, content: '', krp: 劉石符姚等書别剏一名題爲偽史及隋氏受命海内爲家國靡愛憎人無彼我而世有撰隋書之經籍志者其流别羣書還同阮録按國之有偽其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧爲附庸之主而楊雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王氏將崩覇國云搆必有忠臣義士捐生殉節若乃韋耿謀討曹武欽誔問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如苟濟元瑾蘭摧於李靖之末王謙尉廻玉折扵宇文之季而季刋齊史顔述隋篇時無逼畏事湏矯在而皆仍舊不攺謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盗葛龔所作而進之旣具録它文不知攺易名姓時人謂之曰作奏雖工冝去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歴觀自古此類尤多其有冝去而不去者豈直葛龔而已何事於斯獨致解頥之誚也凢為史者茍能識事詳審措辭精宻舉一偶以三隅反告}

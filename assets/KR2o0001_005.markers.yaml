  - {type: variant, offset: 14, length: 5, content: 五等疏爲萬, SBCK: 訓詁為主亦猶春秋之傳配經而行也降及中古始名傳曰注蓋傳者轉也轉授扵無窮注者流也流通而靡絶惟此二名其歸一揆如韓戴服鄭鑚仰六經裴李應晉訓解三史開導後學發明先義古今傳授是曰儒宗旣而史傳小書人物雜記若贄虞之三輔决録陳壽之季漢輔臣周處之陽羡􅁟風常據之華陽士女文言羙辭列扵章句委曲叙事存扵細書此之注釋異夫儒士者矣次有好事之子思廣異聞而才短力㣲不􅀎自逹庶慿驥尾千里絶羣遂乃掇衆史之異詞􅀘前書之􅀁闕若裴松之三}

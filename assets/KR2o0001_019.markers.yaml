  - {type: variant, offset: 6, length: 1, content: 五, WYG: 人同罪矛盾自已始末相違豈其甚邪此所謂輕持善政用配妖禍者也志云孝昭元鳯三年太山有大石立眭孟以為當有庶人為天子者京房易傳云太山之石顛而下聖人受命人君虜又曰石立於山同姓為天下雄按此當是孝宣皇帝即位之祥也夫宣帝出自閭閻坐登宸極所謂庶人受命者也以曾孫血屬上纂皇統所謂同姓之雄者也昌邑見廢謫居逺方所謂人君虜者也班書載此徵祥雖具有剖析而求諸後應曾不縷陳叙事之宜豈其若是茍文有所闕則何以成言者哉此所謂但申解釋不顯符應也志云成帝建始三年小女陳持弓年九嵗走入未央宮又云綏和二年男子王褒入北司馬門上前殿班志雖已有證據言多疎闊今聊演而申之按女子九嵗者九則陽數之極也男子王褒者王則巨君之姓也入北司馬門上前殿者王莽始為大司馬至哀帝時就國帝崩後仍此官因以簒位夫入司馬門而上殿亦由從司馬而升極災祥示兆其事甚明忽而不書為略何甚此所謂解釋雖讜義理非精也志云哀帝建平四年山陽女子田無嗇懐妊三月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘土收養尋本志雖述此妖災而了無解釋按人從胞至育含靈受氣始末有恒數前後有定準至在孕甫爾遽發啼聲者亦由物有基業未彰而形象已兆即王氏簒國之徵生而不舉葬而不死者亦猶物有期運已定非誅剪所平即王氏受命之應也又案班志以小女陳持弓者陳即莽之所出如女子田無嗇者田故莽之本宗事既同占言無一槩豈非唯知其一而不知其二者乎此所謂妖祥可知寢嘿無說也當春秋之時諸國賢俊多矣如沙麓其壊梁山云崩鶂退蜚於宋都龍交鬭於鄭水或伯宗子産具述其非妖或卜偃史過盛言其必應葢于時有識君子以為美談故左氏書之不刋貽厥來裔既而古今路阻聞見壤隔至漢代儒者董仲舒劉向之徒始别搆異聞輔申他說以兹後學凌彼先賢葢今諺所謂季與厥昆爭知嫂諱者也今諺云弟與兄爭嫂字以其名鄙故稍文釋之而班志尚捨長用短捐舊習新茍出異同自矜魁博多見其無識者矣此所謂不循}

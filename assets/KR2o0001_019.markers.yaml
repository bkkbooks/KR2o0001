  - {type: variant, offset: 468, length: 269, content: 說且自世重高門人輕寒族上竝下見以姓望所出邑里相矜若仲遠之尋鄭玄先云汝南應劭文舉之對曹操自謂魯國孔融是也爰及近古其言多僞至於碑頌所勒茅土定名虛引他邦冒爲己邑若乃稱袁則飾之陳郡言杜則係之京邑姓卯金者咸曰彭城氏禾女者皆云鉅鹿今有姓邴者姓弘者以犯國諱皆改爲李氏如書其邑里必曰隴西趙郡夫以假姓猶且如斯則真姓者斷可知矣又今西域胡人多有姓明及卑者如加五等爵或稱平原公或號東平子爲明氏出於平原卑氏出於東平故也夫邊夷雜種尚竊美名則諸夏士流固無慚德也在諸史傳多與同風如隋史牛弘傳云安定鶉觚人也本姓尞氏至它篇所引皆謂之隴西牛弘唐史謝偃傳本姓庫汗氏續謂陳郡謝偃並, SBCK: 事}

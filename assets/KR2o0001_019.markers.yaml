  - {type: variant, offset: 8, length: 0, content: '', SBCK: 典自任胷懐也第四科古學不精者其流有三一曰博引前書網羅不盡二曰兼採左氏遺逸甚多三曰屢舉舊事不知􅀁出志云庶徵之恒風劉向以為春秋無其應劉歆以為釐十六年左氏傳釋六鷁退飛是也案舊史稱劉向學榖梁歆學左氏既祖習各異而聞見不同信矣而周木斯拔鄭車僨濟風之為害被於尚書春秋向則略而不言歆則知而不傳又詳言衆恠歴叙群妖述兩㲠為災而不録趙毛生地書異鳥相育而不載宋雀生鸇斯皆見小忘大舉輕略重葢學有不同識無通鑑故也且當炎漢之代厥異尤竒若景帝承平赤風如血于公在職亢陽為旱在紀與傳各具其祥在於志中獨無其說者何哉所謂博引前書網羅不盡也左傳云宋人逐猰狗華臣出奔陳又云宋公子它有白馬景公奪而朱其尾鬛它弟辰以蕭叛班志書此二事以為犬馬之禍自釋非引}

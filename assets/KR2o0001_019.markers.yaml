  - {type: variant, offset: 930, length: 0, content: '', krp: 春秋成公五年梁山崩七年鼷鼠食郊牛角襄公十五年日有蝕之董仲舒劉向皆以為自此後晉為雞澤之㑹諸侯盟大夫又盟後為溴梁之㑹諸侯不在而大夫獨相與盟君若綴旒不得舉手又襄公十六年五月地震劉向以為是嵗三月大夫盟於溴梁而五月地震矣又其二十八年春無冰班固以為天下異也襄公時天下諸侯之大夫皆執國權君不能制漸將日甚侯失政大夫盟政在大夫大夫之不臣也榖梁云諸侯始失政大夫執國權又曰諸按春秋諸國權臣可得言者如三相六卿田氏而已如雞澤之㑹溴梁之盟其臣豈有若向之所說者邪然而榖梁謂大夫不臣諸侯失政譏其無禮自擅在兹一舉而已非是如政由甯氏祭則寡人相承世官遂移國柄若斯之失也若董劉之徒不窺左氏直憑二傳遂廣為它說多肆侈言仍云君若綴旒臣將日甚何其妄也春秋昭十七年六月日有蝕之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失衆心以弑死後莫敢復責其大夫六卿遂相與比周専晉國晉君還事之按晉厲公所尸唯三郤耳何得云誅四大夫者哉又州滿既死本皆作州蒲今春秋左氏見王邵續書志誤也當為州滿事悼公嗣立選六官者皆獲其事逐七人者盡當其罪以辱及揚于將誅魏絳覽書後悟引愆授職此則生煞在已寵辱自由故能申五利以和戎馳三駕以挫楚威行夷夏覇復文襄而云不復責大夫何厚誣之甚也自昭公已降晉政多門如以君事臣居下僭上者此乃因昭之失漸至陵夷匪由懲厲之弑自取淪辱也豈可輒持彼後事用誣先代者乎哀公十三年十一月有星孛東方董仲舒劉向以為周之十一月夏九月日在氐出東方者軫角亢也或曰角亢大國之象為齊晉也其後田氏簒齊六卿分晉按星孛之後二年春秋之經盡矣又十一年左氏之傳盡矣自傳盡後八十二年齊康公為田和所滅又七年晉靜公為韓魏趙所滅上去星孛之嵗皆出百餘年辰象所纒氛祲所指若相感應何太疎闊者哉且當春秋既終之後左傳未盡之前其間衛弑君越滅吳魯遜越云云賊臣逆子破家亡國多矣此正得東方之象大國之徵何故捨而不述逺求他代者乎又范與中行早從殄滅智入戰國繼踵云亡輒與三晉連名總以六卿為目殊為謬也尋斯失所起可以意測何者二傳所引事終西狩獲麟左氏所書語連趙襄滅智漢代學者唯讀二傳不觀左氏故事有不周言多脫略且春秋之後戰國之時史官闕書年祀難記而學者遂疑簒齊分晉時與魯史相鄰故輕引災祥用相符㑹白珪之玷何其甚歟春秋釐公三十三年十二月隕霜不殺草成公五年梁山崩七年鼷鼠食郊牛角劉向以其後三家逐魯昭公卒死於外之象按乾侯之出事由季氏孟叔二孫本所不預況昭子以納君不遂發憤而卒論其義烈道貫幽明定為忠臣猶且無愧編諸逆黨何乃厚誣夫以罪申一家而兼云二族以此題目何其濫歟左氏傳昭公十九年龍鬭於鄭時門之外洧淵劉向以為近龍孽也鄭小國攝乎晉楚之間重以强吳鄭當其衝不能修徳將鬭三國以自危亡是時子産任政内惠於民外善辭令以交三國鄭卒亡患此能以徳銷灾之道也按昭之十九年晉楚連盟干戈不作吳雖强暴未擾諸華鄭無外虞非子産之力也又吳為逺國僻在江干必畧中原當以楚宋為始鄭居河潁地匪夷庚謂當要衝殊為乖角求諸地理不其爽歟春秋昭公十五年六月日有蝕之董仲舒以為時宿在畢晉國象也云云日比再蝕其事在春秋後故不載於經按自昭十四年迄于獲麟之嵗其間日蝕復有七焉事列本經披文立驗安得云再蝕而已又在春秋之後也且觀班志編此七蝕其六皆載董生所占復不得言董以事後春秋故不存編録再思其語三覆所由斯盖孟堅之誤非仲舒之罪也春秋昭公九年陳火劉向以為先是陳侯之弟招殺陳太子偃師楚因滅陳春秋不與蠻夷滅中國故復書陳火也按楚縣中國以為邑者多矣如邑有宜見於經者豈可不以楚為名者哉盖當斯時陳雖暫亡尋復舊國故仍取陳號不假楚名獨不見鄭禆竈之說斯灾也曰五年陳將復封封五十二年而遂亡自斯而後若顓頊之墟宛丘之地如有應書於國史豈可復謂之陳乎史通}

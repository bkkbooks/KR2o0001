  - {type: variant, offset: 5, length: 0, content: '', SBCK: 外篇漢書五行志錯誤第十班氏著志牴牾者多在於五行蕪累尤甚今輒條其錯繆定為四科一曰引書失宜二曰叙事乖理三曰釋災多濫四曰古學不精又於四科之中疏為雜志類聚區分編之如后第一科引書失宜者其流有四一曰史記左氏交錯相併二曰春秋史記雜亂難别三曰屢舉春秋言無定體四曰書名去取所記不同其志叙言之不從也先稱史記周單襄公告魯成公曰晉將有亂又稱宣公六年鄭公孫曼滿與王子伯廖語欲為卿按宣公六年自左傳所載也夫上論單襄則持史記以標首下列曼滿則遺左氏而無言遂令讀者疑此宣公上出史記而不云魯后莫定何邦是非難悟進退無準此所謂史記左氏交錯相併也志云史記成公十六年公㑹齊侯于周按成公者即魯侯也班氏凡說魯之某公皆以春秋為冠何則春秋者魯史之號言春秋則知公是魯公今引史記居先成公在下書非魯史而公捨魯名膠柱不移守株何甚此其所謂春秋史記雜亂難别也按班書為志本以漢為主在於漢時直記其帝號諡耳至於他代則云某書某國君此其大例也至如叙火不灾上具春秋桓公十四年次敘稼穡不成直云嚴公二十八年而已夫以火稼之間别書漢莽之事年代已隔去魯尤疎洎乎改說異端仍取春秋為始而於嚴公之上不復以春秋建名遂使漢帝魯公同歸一揆必為永例理亦可容在諸異科事又不爾求之畫一其例無常此所謂屢舉春秋言無定體也按本志叙漢已前事多略其書名至如服妖章初云晉獻公使太子率師佩之金玦續云鄭子威好為聚鷸之冠此二事之上每加左氏為首夫一言可悉而再列其名省則都捐繁則太甚此所謂書名去取所記之不同也第二科叙事乖理者其流有五一曰徒發首端不副徵驗二曰虚編古語討事不終三曰直引時談竟無他述四曰科條不整尋繹難知五曰標舉年號詳略無准志曰左氏昭公十五年晉籍談如周葬穆后既除喪而燕宴叔向曰王其不終乎吾聞之所樂必卒焉今王一嵗而有三年之喪二焉於是乎與喪賔燕樂憂甚矣禮王之大經也一動而失二禮無大經矣將安用之按其後七年王室終如羊舌所說此即其効也而班氏了不言之此所謂徒發首端不副徵驗也志云左氏襄公二十九年晉女齊語智伯曰齊髙子容宋司徒皆將不免子容専司徒侈皆亡子之主也専則速及侈則將以力斃九月髙止出奔北燕所載至此更無他說按左氏昭公二十年宋司徒奔陳而班氏採諸本傳直寫片言閱彼全書唯徵半事遂令學者疑丘明之說有是有非女齊之言或得或失此所謂虚編古語討事不終也志云成帝於鴻嘉永始之載好為微行置私田於民間谷永諫曰諸侯夢得田占為失國而況王者畜私田財物為庶人之事乎已下弗云成帝悛與不悛谷永言効與不効諫詞雖具而事闕如此所謂直引時談竟無佗述者也其述庶徵之恒寒也先云釐公十年冬大雨雹隨載劉向之占次云公羊經曰大雨雹續書董生之解按公羊所說與上奚殊而再列其辭俱云大雨雹而入此科又言大雪與雹繼言殞霜殺草起自春秋訖乎漢代其事既盡仍重叙雹災分散相離斷絶無趣夫同是一類而限成二條首尾紛挐章句錯糅此所謂科條不整尋繹難知者也夫人君改元肇自劉氏史官所録須存凡例按斯志之記異也首列元封年號不詳漢代何君次言地節河平具述宣成二帝成帝河平二年宣帝地節四年􅃅如此其紀年武稱元鼎每嵗皆書續云元鼎三年按始云元鼎二年鼎之號也三年宜除元哀曰建平同年必録平三年續後始云哀帝建云是嵗而已不當言重言事也云哀帝建平三年按同是一年宜此所謂標舉年號詳略無準者也第三科釋災多濫其流有八一曰商㩁前世全違故實二曰影響不接牽引相㑹三曰敷演多端準的無主四曰輕持善政用配妖禍五曰但伸解釋不顯符應六曰考覈雖讜義理非精七曰妖祥可知寢嘿無說八曰不循經典自任胷懐志云史記周威烈王二十三年九鼎震是嵗韓魏趙簒晉而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣按周當戰國之世微弱尤甚故君疑竊斧臺名逃責正比夫泗上諸侯附庸小國者耳至如三晉跋扈欲為諸侯雖假王命實由已出譬夫近代莽稱安漢匪平帝之至誠卓􅃅太師豈献皇之本願而作者茍責威烈以妄施爵賞坐貽妖㜸謂得人之情偽盡知之者乎此􅀁謂商㩁前世全違故實也志云昭公十六年九月大雩先是昭母夫人歸氏薨昭不戚而蒐于比蒲又曰定公十一年九月大雩先是公自侵鄭歸而城中城二大夫圍鄆按大夫蒐于比蒲昭之十一年城中城圍鄆定之六年也其二役去雩皆非一載夫以國家常事而坐延灾􅌌嵗月既遥而方聞響應斯豈非烏有成說扣寂為辝者㢤此􅀁謂影響不按牽引相㑹也志云嚴公明帝諱故改曰嚴嚴公謂荘公也漢避七年秋大水董仲舒劉向以為嚴母姜與兄齊侯淫共殺桓公嚴釋公讎復娶齊女未入而先與之淫一年再出㑹於道逆亂臣下賤之應也又云十一年秋宋大水董仲舒以為時魯宋比年有乘丘鄑之戰百姓愁怨陰氣盛故二國俱水水今年宋大謂七年魯大也水按此說有三失焉何者嚴公十年十一年公敗宋師於乘丘及鄑夫以制勝克敵䇿勲命賞可祈榮降福而反愁怨貽災邪其失一也且先是數年嚴遭大水十一年亦謂校其時月殊在戰前而云與宋交兵故二國大水其失二也況於七年之内已釋水災始以齊女為辭終以宋師為應前後靡定向背何倚其失三也夫以一災示眚而三說競興此所謂敷演多端準的無主者也其釋厥咎舒厥罰恒燠以為其政弛慢失在舒緩故罰之以燠冬而世冰尋其解春秋之無冰也皆主内失黎庶外失諸侯不事誅賞不明善惡蠻夷猾夏天子不能討大夫擅權邦君不能制若斯而已矣次至武帝元封六年冬亡冰而云先是遣衛霍二將軍竆追單于斬首十餘萬級歸而大行慶賞上又閔恤勤勞遣使巡行天下存賜鰥寡假貸與之困舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞於是天下咸喜按漢帝其武功文徳也如彼其先猛後寛也如此豈是有懦弱凌遲之失而無刑罰戡定之功哉何得茍以無冰示災便謂與}

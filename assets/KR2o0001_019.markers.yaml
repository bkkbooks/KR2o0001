  - {type: variant, offset: 29, length: 0, content: '', SBCK: 書自春秋已前所有國家灾眚賢哲占候皆出於左氏國語者也今班志所引上自周之幽厲下終魯之定哀而不云國語唯稱史記豈非忘本徇末逐近棄逺者乎此所謂屢舉舊事不知所出也所定多目凡二十九種但其失既衆不可殫論故每目之中或時舉一事庶觸類而長他皆可知又按斯志之作也本欲明吉凶釋休咎懲惡勸善以誡將來至如春秋已還漢代而往其間日蝕地震石隕山崩雨雹雨魚大旱大水鷄豕為禍桃李冬花直叙其灾而不言其應時日蝕載春秋十不言其應又惠帝二年武帝征和二年宣帝三十六而二不言其應漢時日蝕五十三而四石凡四十總不言其應又皇后二年武都山崩本}

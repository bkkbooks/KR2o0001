  - {type: variant, offset: 4, length: 0, content: '', WYG: 班氏著志牴牾者多在於五行蕪累尤甚今輒條其錯繆定為四科一曰引書失宜二曰叙事乖理三曰釋災多濫四曰古學不精又於四科之中疏為雜目類聚區分編之如后第一科引書失宜者其流有四一曰史記左氏交錯相併二曰春秋史記雜亂難别三曰屢舉春秋言無定體四曰書名去取所記不同其志叙言之不從也先稱史記周單襄公告魯成公曰晉將有亂又稱宣公六年鄭公孫曼蒲與王子伯廖語欲為卿按宣公六年自左傳所載也夫上論單襄則持史記以標首下列曼蒲則遺左氏而無言遂令讀者疑此宣公上出史記而不云魯后莫定何邦是非難悟進退無準此所謂史記左氏交錯相併也志云史記成公十六年公㑹齊侯于周按成公者即魯侯也班氏凡說魯之某公皆以春秋為冠何則春秋者魯史之號言春秋則知公是魯君今引史記居先成公在下書非魯史而公捨魯名膠柱不移守株何甚此所謂春秋史記雜亂難别也按班書為志本以漢為主在於漢時直記其帝號諡耳至於他代則云某書某國君此其大例也至如叙火不炎上具春秋桓公十四年次叙稼穡不成直云莊公二十八年而已夫以火稼之間别書漢莽之事年代已隔去魯尤疎洎乎改說異端仍取春秋為始而於莊公之上不復以春秋建名遂使漢帝魯公同歸一揆必為永例理亦可容在諸異科事又不爾求之畫一其例無常此所謂屢舉春秋言無定體也按本志叙漢已前事多略其書名至如服妖章初云晉獻公使太子率師佩之金玦續云鄭子臧好為聚鷸之冠此二事之上每加左氏為首夫一言可悉而再列其名省則都捐繁則太甚此所謂書名去取所記不同也第二科叙事乖理者其流有五一曰徒發首端不副徵驗二曰虚編古語討事不終三曰直引時談竟無他述四曰科條不整尋繹難知五曰標舉年號詳略無準志曰左氏昭公十五年晉籍談如周葬穆后既除喪而燕叔向曰王其不終乎吾聞之所樂必卒焉今王一嵗而有三年之喪二焉於是乎以喪賔燕樂憂甚矣禮王之大經也一動而失二禮無大經矣將安用之按其後七年王室終如羊舌所說此即其效也而班氏了不言之此所謂徒發首端不副徵驗也志云左氏襄公二十}

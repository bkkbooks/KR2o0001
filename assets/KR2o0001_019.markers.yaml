  - {type: page-break, offset: 926, content: '', id: KR2o0001_WYG_019-14b, image: WYG0685/WYG0685-0144b.png}
  - {type: variant, offset: 926, length: 0, content: '', krp: 若是也春秋成公元年無冰班氏以為其時王子札殺召伯毛伯按今春秋經子札殺毛召事在宣十五年而此言成公時未達其說下云無冰凡有三載春秋昭公九年陳火董仲舒以為陳夏徵舒殺君楚嚴王書不改其字下同嚴即莊也皆依本託欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極陰生陽故致火灾按楚嚴王之入陳乃宣十一年事也始有蹊田之謗取譏隗叔終有封國之恩見賢尼父毒恨尤甚其理未聞按陳前後爲楚所滅者三始宣十一年爲楚嚴王所滅次昭八年爲楚靈王所滅後哀十七年爲楚惠王所滅今董生誤以陳亡之役是楚始滅之時遂妄有占候虚辨物色尋昭之上去於宣魯易四公嚴之下至於靈楚經五代雖懸隔頓别而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉春秋桓公三年日有蝕之既京房易傳以為後楚嚴始稱王兼地千里按楚自武王僭號鄧盟是懼荆尸又歴文成繆三王方至於嚴是則楚之為王已四世矣何}
  - {type: variant, offset: 927, length: 0, content: '', SBCK: 言嚴始稱之者哉又魯桓公薨後歴嚴閔釐文宣不改其字已下同釐即僖皆依本書凡五公而楚嚴始作霸安有桓三年日蝕而已應之者邪非唯叙事有違亦占候}
  - {type: variant, offset: 927, length: 0, content: '', WYG: 言莊始稱之者哉又魯桓公薨後歴莊閔釐文宣釐即僖依本書不改其字下同凡五公而楚莊始作霸安有桓三年日食而已應之者邪非唯叙事有違亦自占候}
  - {type: variant, offset: 927, length: 0, content: '', krp: 言嚴始稱之者哉又魯桓公薨後歴嚴閔釐文宣不改其字已下同釐即僖皆依本書凡五公而楚嚴始作霸安有桓三年日蝕而已應之者邪非唯叙事有違亦占候}
  - {type: variant, offset: 928, length: 0, content: '', SBCK: 中者矣春秋釐公二十九年秋大雨雹劉向以為釐公末年公子遂専權自恣至於弑君陰脅陽之象見釐公不悟遂後二年殺公子赤立宣公按遂之立宣殺子赤也此乃文公末代輒謂僖公暮年是世懸殊言何倒錯春秋釐公十二年日有蝕之劉向以為是時莒滅杞􅁵十四年諸侯城縁陵公羊傳曰曷為城杞滅之孰滅之盖徐莒也如中壘所釋當以公羊為本爾然則公羊所說不如左氏之詳左氏襄公二十九年􅀳平公時杞尚在云云春秋文公元年日有蝕之劉向以為後􅀳滅江按本經書文四年楚人滅江今云􅀳滅其說無取且江居南裔與楚為隣􅀳處北方去江殊逺稱􅀳所滅其理難通左氏傳魯襄公時宋有生女子赤而毛棄之堤下宋平公母共􅁎之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣戾讒太子痤而殺之十六年事在襄二先是大夫華元出奔􅀳十五年事在成華合比奔衛六年事在昭劉向以為時則有火災赤眚之明應也按灾祥之作將應後來事跡之彰用符前兆如華元奔晉在成十五年㕘諸棄堤實難符㑹又合比奔衛在昭六年而與華元奔晉俱云先是惟前與後事並相違}
  - {type: page-break, offset: 928, content: '', id: KR2o0001_SBCK_019-15a}
  - {type: page-break, offset: 928, content: '', id: KR2o0001_SBCK_019-15b}
  - {type: page-break, offset: 928, content: '', id: KR2o0001_SBCK_019-16a}
  - {type: variant, offset: 928, length: 0, content: '', WYG: 中者矣其三條春秋釐公二十九年秋大雨雹劉向以為釐公末年公子遂専權自恣至於弑君陰脅陽之象見釐公不悟遂後二年殺公子赤立宣公按遂之立宣殺子赤也此乃文公末代輒謂僖公暮年世實懸殊言何倒錯其四條春秋釐公十二年日有食之劉向以為是時莒滅杞案十四年諸侯城縁陵公羊傳曰曷為城杞滅之孰滅之葢徐莒也如中壘所釋當以公羊為本爾然則公羊所說不如左氏之詳左氏襄公二十九年晉平公時杞尚存云云其五條春秋文公元年日有食之劉向以為後晉滅江按本經書文四年楚人滅江今云晉滅其說無取且江居南裔與楚為隣晉處北方去江殊逺稱晉所滅其理難通其六條左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之事在襄二十六年先是大夫華元出奔晉事在成十五年華合比奔衛事在昭六年劉向以為時則有火災赤眚之明應也按災祥之作將應後來事蹟之彰用符前兆如華元奔晉在成十五年㕘諸棄隄實難符㑹又合比奔衛在昭六年而與華元奔晉俱云先是惟前與後事並相違}

  - {type: variant, offset: 925, length: 0, content: '', SBCK: 焉五行志雜駁第十一總十五條春秋時事違誤最多魯文公二年不雨班氏以為自文即位天子使叔服㑹葬毛伯賜命又㑹晉侯于戚上得天子外得諸侯沛然自大故致亢陽之禍按周之東遷日以微弱故鄭取温陵射王中肩楚絶苞茅觀兵問鼎事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽求諸人事理必不然天髙聽卑豈}
  - {type: page-break, offset: 925, content: '', id: KR2o0001_SBCK_019-13b}
  - {type: variant, offset: 925, length: 0, content: '', WYG: 焉漢書五行志雜駁第十一春秋時事違誤最多總十五條魯文公二年不雨班氏以為自文即位天子使叔服㑹葬毛伯錫命又㑹晉侯于戚上得天子外得諸侯沛然自大故致亢陽之禍按周之東遷日以微弱故鄭取温麥射王中肩楚絶苞茅觀兵問鼎事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽為怪求諸人事理必不然天髙聽卑豈}
  - {type: page-break, offset: 925, content: '', id: KR2o0001_WYG_019-13b, image: WYG0685/WYG0685-0143d.png}
  - {type: variant, offset: 925, length: 0, content: '', krp: 焉五行志雜駁第十一總十五條春秋時事違誤最多魯文公二年不雨班氏以為自文即位天子使叔服㑹葬毛伯賜命又㑹晉侯于戚上得天子外得諸侯沛然自大故致亢陽之禍按周之東遷日以微弱故鄭取温陵射王中肩楚絶苞茅觀兵問鼎事同列國變雅為風如魯者方大邦不足比小國有餘安有暫降衰周使臣遽以驕矜自恃坐招厥罰亢陽求諸人事理必不然天髙聽卑豈}
  - {type: variant, offset: 926, length: 0, content: '', SBCK: 若是也春秋成公元年無冰班氏以為其時王子札殺召伯毛伯按今春秋經子札殺毛召事在宣十五年而此言成公時未達其說下云無冰凡有三載春秋昭公九年陳火董仲舒以為陳夏徵舒殺君楚嚴王書不改其字下同嚴即莊也皆依本託欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極陰生陽故致火灾按楚嚴王之入陳乃宣十一年事也始有蹊田之謗取譏隗叔終有封國之恩見賢尼父毒恨尤甚其理未聞按陳前後爲楚所滅者三始宣十一年爲楚嚴王所滅次昭八年爲楚靈王所滅後哀十七年爲楚惠王所滅今董生誤以陳亡之役是楚始滅之時遂妄有占候虚辨物色尋昭之上去於宣魯易四公嚴之下至於靈楚經五代雖懸隔頓别而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉春秋桓公三年日有蝕之既京房易傳以為後楚嚴始稱王兼地千里按楚自武王僭號鄧盟是懼荆尸又歴文成繆三王方至於嚴是則楚之為王已四世矣何}
  - {type: page-break, offset: 926, content: '', id: KR2o0001_SBCK_019-14a}
  - {type: page-break, offset: 926, content: '', id: KR2o0001_SBCK_019-14b}
  - {type: variant, offset: 926, length: 0, content: '', WYG: 若是也其一條春秋成公元年無冰班氏以為其時王札子殺召伯毛伯按今春秋經札子殺毛召事在宣十五年而此言成公時未達其說下去無冰凡有三載春秋昭公九年陳火董仲舒以為陳夏徵舒殺君楚嚴王嚴即莊也皆依本書不改其事下同託欲為陳討賊陳國闢門而待之因滅陳陳之臣子毒恨尤甚極陰生陽故致火災按楚嚴王之入陳乃宣十一年事也始有蹊田之謗取愧叔時愧一作譏終有封國之恩見賢尼父毒恨尤甚其理未聞按陳前後為楚所滅者三始宣十一年為楚嚴王所滅次昭八年為楚靈王所滅後哀十七年為楚惠王所滅今董生誤以陳次亡之役是楚始滅之時遂妄有占候虚辨物色尋昭之上去於宣魯易四主嚴之下至於靈楚經五代雖懸隔頓别而混雜無分嗟乎下帷三年誠則勤矣差之千里何其闊哉其二條春秋桓公三年日有食之既京房易傳以為後楚莊始稱王兼地千里按楚自武王僭號鄧盟是懼荆戸又歴文成繆三王方至於莊是則楚之為王已四世矣何}

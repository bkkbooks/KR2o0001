  - {type: variant, offset: 784, length: 0, content: '', SBCK: 載言第三古者言為尚書事為春秋左右二史分尸其職盖桓文作覇紏合同盟春秋之時事之大者也而尚書闕紀秦師敗績繆公誡誓尚書之中言之大者也而春秋靡録此則言事有别斷可知矣逮左氏為書不遵古法言之與事同在傳中然而言事相兼煩省合理故使讀者尋繹不倦覽諷忘疲至扵史漢則不然凡􅀁包舉務存恢慱文辭之記繁富為多是以賈􅁩晁錯董仲舒東方朔等傳唯尚錄言罕逢載事夫方述一事得其綱紀而隔以大篇分其序叙遂令披閱之者有􅀁懵然後史相承不攺其輙交錯紛擾古今是同按遷固列君臣扵紀傳統遺逸扵表志雖篇名甚廣而言獨無錄愚謂凢為史者冝扵表志之外更立一書若人主之制册誥令群臣之章表移撽􅀵之紀傳悉入書部題為制册章表書以􅀋區别他皆放此亦猶志之有禮樂志刑法志又詩人之什自成一家故風雅比興非三傳􅀁取自六義不作文章生焉若韋孟諷諫之詩楊雄出師之頌馬卿之書封禪賈􅁩之論過秦諸如此文皆施紀傳切謂冝從古詩例斷入書中亦猶舜典列元首之歌夏書包五子之詠者也夫能使史體如是庻㡬春秋尚書之道備矣􅀳于寳議撰晋史以為冝准左丘明其臣下委曲仍為譜注于時議者莫不宗之故前史之􅀁未安後史之􅀁冝革是用敢同有識爰立茲篇庻世之作者覩其利害如謂不然請俟來哲本紀第四昔汲冢竹書是曰紀年吕氏春秋肇立紀號盖紀者綱紀庶品網羅萬物考篇目之大者其莫過扵此乎及司馬遷之著史記也又列天子行事以本紀名篇後世因之守而勿失譬夫行夏時之正朔服孔門之教義者雖地遷陵谷時變質文而此道常行終莫之能易也然遷之以天子為本紀諸侯為世家斯誠讜矣但區域旣定而疆理不分遂令後之學者罕詳其義按姬自后稷至扵西伯嬴自伯翳至扵莊王爵乃諸侯而名􅀠本紀若以西伯莊王以上别作周秦世家持殷紂以對武王㧞秦繆以承周赧使帝王傳授昭然有别豈不善乎必以西伯以前其事簡約别加一目不足成篇則伯翳之至莊王其書先成一卷而不共世家等列輒與本紀同編此尤可恠也項羽僣盗而死未得成君求之扵古則齊無知衛州吁之􅀋也安得諱其名字呼之曰王者乎春秋吳楚僣擬書如列國假使羽􅀼帝名正可抑同羣盗况其名曰西楚號止霸王者乎霸王者即當時諸侯諸侯而稱本紀求名責實再三乖繆盖紀之為體猶春秋之經繋日月以成歳時書君上以顯國統曹武雖曰人臣實同王者以未登帝位國不建元陳志權假漢年編作魏紀亦猶兩漢書首列秦莽之正朔也後來作者宜准扵斯而陸機晉書列紀三祖􅈂序其事竟不編年年旣不編何紀之有夫位終北面一㮣人臣儻追加大號止入傳阼是以弘嗣其史不紀孫和緬求故實非無往例逮伯起之次魏乃編景穆扵本紀以戾國虚謚間厠武昭􅁒使百世之中若為魚貫又紀者旣以編年為主唯敘天子一人有大事可書者則見之扵年月其書事委曲付之列傳此其義也如近代述者魏著作李安平之徒其撰魏齊二史彦魏百藥撰北齊書淵撰後魏書李扵諸帝篇􅂉雜載臣下􅂉兼言他事巨細畢書洪纎備錄之捷百藥帝紀述淮如彦淵帝紀載沙苑是也南之敗全為傳體有異紀文迷而不悟無乃太甚世之讀者幸為詳焉世家第五自有王者便置諸侯列以五等䟽為萬國周之東遷王室大壞扵是禮樂征伐自諸侯出迄乎秦世分為七雄司馬遷之記諸國也其編次之體與本紀不殊盖􅁒抑彼諸侯異乎天子故假以他稱名為世家其為義也豈不以開國承家世代相續至扵陳勝起自群盗稱王六月而死子孫不嗣社稷靡聞無世可傳無家可宅而以世家為稱豈當然乎夫史之篇目皆遷􅀁創豈以自我作古而名實無凖且諸侯大夫家國本别三晉之與田氏自未為君而前齒列陪臣屈身藩后而前後一統俱歸世家使君臣相雜升降失序何以責季孫之八佾舞庭管氏之三歸反坫又列號東帝抗衡西秦地方千里髙視六國而没其本􅃅唯以田完制名世家也謂田完求之人情孰謂其可當漢氏之有天下也其諸侯與古不同夫古者諸侯皆即位建元專制一國綿綿􅀲瓞卜世長乆至扵漢代則不然其宗子稱王者皆受制亰邑自同州郡異姓封侯者必從官天朝不臨方域􅂉傳國唯止一身􅂉襲爵才經􅂾世雖名班爵胙土而禮異人君必編為世家實同列傳而馬遷强加别錄以􅀋相從雖得畫一之冝詎識隨時之義盖班漢知其若是􅁵革前非至如蕭曹茅􅁟之封荆楚葭莩之屬並一槩稱傳無復世家事􅀔當然非矯枉也自茲已降年將四百及魏有中夏而楊益不賔終亦受屈中朝見稱偽主為史者必題之以紀則上通帝王牓之以傳則下同臣妾梁主􅃙撰通史定為吳蜀世家持彼僣君比諸列國去太去甚其得折中之䂓乎次有子顯齊書北編魏虜牛弘周史南記蕭詧考其傳體宜曰世家但今古著書通無此稱用使馬遷之册湮没不行班固之名相傳靡易者矣列傳第六夫紀傳之興肇扵史漢盖紀者編年也傳者列事也編年者曆帝王之歳月猶春秋之經列事者錄人臣之行狀猶春秋之傳春秋則傳以觧經史漢則傳以釋紀尋茲例草創始自子長而朴略猶存區分未盡如項王立傳而以本紀為名非唯羽之僣盗不可同扵天子且推其序皆作傳言求謂之紀不可得也􅂉曰遷紀不可得也􅂉曰遷紀五帝夏殷亦皆列事而已子曽不之恠何獨􅀹扵項紀㦲對曰不然夫五帝之與殷夏也正朔相承子孫逓及雖無年可著紀亦何傷如項羽者事起秦餘身終漢始殊夏氏之后羿似皇帝之蚩􅀹譬諸閠位容可列紀方之駢胟難以成編且夏殷之紀不引他事夷齊諫周實當紂日而扸為列傳不入殷篇項紀則上下同載君臣交雜紀名傳體􅀁以成媸夫傳紀之不同猶詩賦之有别而後來􅁇作亦多􅀁未詳按范曄漢書紀后妃六宫其實傳也而謂之為紀陳夀國志載孫劉二帝其實紀也而呼之曰傳考􅂾家之􅀁作其未逹紀傳之情乎苟上智猶且若斯則中庸故可知矣又傳之為體大抵相同而述者多方有時而異耳如二人行事首尾相隨則有一傳兼書包括令盡若陳餘張耳合體成篇陳勝吳廣相叅並錄是也亦有事跡雖寡名行可崇􅀉在他篇為其摽冠若啇山四皓事列王陽之首廬江毛義名在劉平之上是也自兹已後史氏相承述作雖多斯道多廢其同扵古者惟有附出而已尋附出之為義攀列傳以垂名若紀季之入齊顓臾之事魯皆附庸自託得厠扵朋流然世之求名者咸以附出為小盖以其因人成事不足稱多故也竊以書名竹素豈限詳略但問其事竟如何耳借如邵平紀信沮授陳容或運一異謀􅀣一竒節並能傳之不朽人到于今稱之豈假編名作傳然後播其遺烈也嗟乎自班馬以來􅀗書扵國史者多矣其間則有生無令問􅂮無遺跡用使㳺談者靡徴其事講習者罕記其名而虚班史傳妄占篇目若斯人者可勝紀㦲古人以没而不杇為難盖為此也史通卷第二}

  - {type: variant, offset: 860, length: 502, content: 典墳作儷蠻夷抑惟秦晉而鳥官創置豈關郯子之言髦頭而偶奚假奉春之策奢言無限何其厚顏又周史稱元行恭因齊滅得回庾信贈其詩曰虢亡垂棘反齊平寶鼎歸陳周弘正來聘在館贈韋敻詩曰德星猶未動真車詎肯來其爲信弘正所重如此夫文以害意自古而然擬非其倫由來尚矣必以庾周所作皆爲實錄則其所褒貶非止一人咸宜取其指歸何止採其四句而已若乃題目不定首尾相違則百藥德棻是也齊史李百藥所撰周史令狐德棻所撰也心挾愛憎詞多出沒則魏收牛弘是也魏書魏收所撰周史載元行恭等此本牛弘所撰也斯皆鑒裁非遠智識不周而輕弄筆端肆情高下故彌縫雖洽而厥迹更彰取惑無知見嗤有識夫詞寡者出一言而已周才蕪者資數句而方浹案左傳稱絳父論甲子隱言於趙孟班書述楚老哭龔生莫識其名氏茍舉斯一事則觸類可知至嵇康皇甫謐撰高士記各爲二叟立傳全採左班之錄而其傳論云二叟隱德容身不求名利避遠亂害安於賤役夫探揣古意而廣足子愈反新言此猶子建之詠三良延年之歌秋婦至於臨穴淚下閨中長歎雖語多本傳而事無異說蓋鳧脛雖短續之則悲史文雖約增之反累加減前哲豈容易哉昔夫子斷唐虞以下迄於周翦截浮詞撮其機要故帝王之道坦然明白嗟乎自去聖日遠史籍逾多得夫是非孰能刊定假有才堪釐革而以人廢言此繞朝所謂勿謂秦無人吾謀適不用者也, SBCK: ''}

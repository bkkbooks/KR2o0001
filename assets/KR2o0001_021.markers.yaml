  - {type: variant, offset: 2, length: 2, content: 第二, SBCK: 冗意心頗疑之掩卷而思展卷而玩莫可為懐者矣儼山先生帥蜀之初乃取而正之篇章㫖趣各循其􅁤意怄而文順事核而理瑩自是始爲完書此無他蓋先生以江南鉅儒養之翰苑復三}
  - {type: page-break, offset: 2, content: '', id: KR2o0001_SBCK_021-1b}
  - {type: variant, offset: 2, length: 2, content: 第二, krp: 冗意心頗疑之掩卷而思展卷而玩莫可為懐者矣儼山先生帥蜀之初乃取而正之篇章㫖趣各循其軌意怄而文順事核而理瑩自是始爲完書此無他蓋先生以江南鉅儒養之翰苑復三}
  - {type: variant, offset: 5, length: 18, content: 一夫人樞機之發亹亹不窮必有徐音足句爲, SBCK: 餘年}
  - {type: variant, offset: 5, length: 1357, content: 一夫人樞機之發亹亹不窮必有徐音足句爲其始末是以伊惟夫蓋發語之端也焉哉矣兮斷句之助也去之則言語不足加之則章句獲全而史之敍事亦有時類此故將述晉靈公厚斂雕墻則且以不君爲稱欲云司馬安四至九卿而先以巧宦標目所謂說事之端也又書重耳伐原示信而續以一戰而霸文之教也載匈奴爲偶人象郅都令馳射莫能中則云其見憚如此所謂論事之助也此猶句助昔尼父裁經義在褒貶明如日月持用不刊而史傳所書貴乎博錄而已至於本事之外時寄抑揚此乃得失稟於片言是非由於一句談何容易可不慎歟但近代作者溺於煩富則有發言失中加字不愜遂令後之覽者難以取信蓋史記世家有云趙鞅諸子無恤最賢夫賢者當以仁恕爲先禮讓居本至如僞會鄰國進計行戕俾同氣女兄摩笄引決此則詐而安忍貪而無親鯨鯢是儔犬豕不若焉得謂之賢哉又漢書云蕭何知韓信賢案賢者處世夷險若一不隕穫於貧賤不充詘於富貴易傳曰知進退存亡者其唯聖人乎如淮陰初在仄微墮業無行後居榮貴滿盈速禍躬爲逆上名隸惡徒周身之防靡聞知足之情安在美其善將呼爲才略則可矣必以賢爲目不其謬乎又云嚴延年精悍敏捷雖子貢冉有通於政事不能絕也夫以編名酷吏列號屠伯而輒比孔門達者豈其倫哉且以春秋至漢多歷年所必言貌取人耳目不接又焉知其才術相類錙銖無爽而云不能絕乎蓋古之記事也或先經張本或後傳終言分布雖疏錯綜逾密今之記事也則不然或隔卷異篇遽相矛盾或連行接句頓成乖角是以齊史之論魏收良直邪曲三說各異李百藥齊書序論魏收云若使子孫有靈竊恐未挹高論至收傳論又云足以入相如之室游尼父之門但志存實錄好抵陰私於爾朱暢傳又云收受暢財賄故爲榮傳多減其惡是謂三說各異周書之評太祖寬仁好殺二理不同令狐德棻周書元偉傳稱文帝不害諸元則云太祖天縱寬仁性罕猜忌於本紀論又云渚宮制勝闔城拏戮茹茹歸命盡種誅夷雖事出權道而用乖於德教是二理不同非惟言無準的固亦事成首鼠者矣夫人有一言而史辭再三良以好發蕪音不求讜理而言之反覆觀者惑焉亦有開國承家美惡昭露皎如星漢非靡沮所移而輕事塵點曲加粉飾求諸近史此纇尤多如魏書稱登國以鳥名官則云好尚淳樸遠師少皞述道武結婚蕃落則曰招擕荒服追慕漢高自餘所說多類於此案魏氏始興邊朔少識典墳作儷蠻夷抑惟秦晉而鳥官創置豈關郯子之言髦頭而偶奚假奉春之策奢言無限何其厚顏又周史稱元行恭因齊滅得回庾信贈其詩曰虢亡垂棘反齊平寶鼎歸陳周弘正來聘在館贈韋敻詩曰德星猶未動真車詎肯來其爲信弘正所重如此夫文以害意自古而然擬非其倫由來尚矣必以庾周所作皆爲實錄則其所褒貶非止一人咸宜取其指歸何止採其四句而已若乃題目不定首尾相違則百藥德棻是也齊史李百藥所撰周史令狐德棻所撰也心挾愛憎詞多出沒則魏收牛弘是也魏書魏收所撰周史載元行恭等此本牛弘所撰也斯皆鑒裁非遠智識不周而輕弄筆端肆情高下故彌縫雖洽而厥迹更彰取惑無知見嗤有識夫詞寡者出一言而已周才蕪者資數句而方浹案左傳稱絳父論甲子隱言於趙孟班書述楚老哭龔生莫識其名氏茍舉斯一事則觸類可知至嵇康皇甫謐撰高士記各爲二叟立傳全採左班之錄而其傳論云二叟隱德容身不求名利避遠亂害安於賤役夫探揣古意而廣足子愈反新言此猶子建之詠三良延年之歌秋婦至於臨穴淚下閨中長歎雖語多本傳而事無異說蓋鳧脛雖短續之則悲史文雖約增之反累加減前哲豈容易哉昔夫子斷唐虞以下迄於周翦截浮詞撮其機要故帝王之道坦然明白嗟乎自去聖日遠史籍逾多得夫是非孰能刊定假有才堪釐革而以人廢言此繞朝所謂勿謂秦無人吾謀適不用者也, WYG: ''}

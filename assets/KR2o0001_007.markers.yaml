  - {type: variant, offset: 385, length: 20, content: 物以羣分使善惡相從先後爲次何藉而爲表乎且, WYG: 成春秋}
  - {type: variant, offset: 387, length: 0, content: '', SBCK: 群分薰蕕不同器梟鸞不比翼若乃商臣冐頓南蠻北狄萬里之殊也伊尹霍光殷年漢日千載之隔也而世之稱悖逆則云商冐論忠順則曰伊霍者何哉盖厥跡相符則雖隔越為偶奚必差肩步武方稱連類者乎史氏自遷固作傳始以品彚相從然其中或以年世迫促􅂉以人物寡鮮求其具體必同不可多得是以韓非老子共在一篇董卓袁紹無聞二録豈非韓老俱稱述者書有子名袁董並曰英雄生當漢末用此為斷粗得其倫亦有厥類衆夥宜為流别而不能定其同科申其異品用使蘭艾相雜朱紫不分是誰之過歟盖史官之責也按班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列奚不類於其叙哉若孔門達者顔稱殆庶至於他子難為等差今乃先伯牛而後曾參進仲弓而退冉有等曾參冉有並在第伯牛仲弓並在第二也三等求諸折中厥理無聞又楚王過鄧三甥騅甥聃甥甥養欲殺之鄧侯不許卒亡鄧國今定鄧侯入下愚之上七等即第夫寧人負我為善獲戾持此致尤將何勸善如謂小不忍亂大謀失於用權故加其罪是則三甥見㡬而作決在未萌自當髙立標格寘諸雲漢何得止與鄧侯鄰伍列在中庸下流第六等三甥皆在而已哉又其叙晉文之臣佐也舟之僑為上陽處父次之士㑹為下苐三等陽舟之僑在㑹在弟五等處父在四等士其述燕之賔客也髙漸離居首荆軻亞之秦武陽居末在第六等秦武陽在第髙漸離在第五等荆軻等六斯並是非瞀亂善惡紛拏或珍瓴甋而賤璠璵或䇿駑駘而捨騏􅂹以兹為監􅁒誰欺乎又江充息夫躬讒謟惑上使禍延儲后毒及忠良論其奸凶過於石顯逺矣而固叙之不列佞幸揚王孫裸葬悖禮狂狷之徒考其一生更無他事而與朱雲同列冠之傳首不其穢歟若乃旁求别録側窺雜傳諸如此繆其累實多按劉向列女傳載魯之秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同於古冶殉節異於曹娥此乃凶險之頑人强梁之悍婦輙與眞烈為伍有乖其實者焉又嵇康髙士傳其􅀁載者廣矣而顔回􅕋瑗獨不見書蓋以二子雖樂道遺榮安貧守志而拘忌名教未免流俗也正如董仲舒楊子雲亦鑽仰四科驅馳六籍漸孔門之教義服魯國之儒風與此何殊而並可甄録夫回瑗是棄而楊董獲升可謂識二五而不知十百也爰及近代史臣所書求其乖失亦往往而有借如陽瓚効節邊城捐軀􅂮敵當有宋之代抑劉卜之徒歟卜謂天與劉謂劉康祖而沈氏竟不别加標牓唯寄編於索虜篇内紀僧珎砥節礪行終始無瑕而蕭氏乃與}

seq: 7
markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 表曆, SBCK: 史通卷之七内篇品藻直言曲筆鍳識探頥品藻}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_007-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 分薰蕕不同器梟鸞不比翼若乃商臣冒頓南蠻北狄萬里之殊也伊尹霍光殷年漢日千載之隔也而世之稱悖逆則云商冒論忠順則曰伊霍者何哉葢厥跡相符則雖隔越為偶奚必差形步武方稱連類者乎史氏自遷固作傳始以品彚相從然其中或以年世迫促或以人物寡鮮求其具體必同不可多得是以韓非老子共在一篇董卓袁紹無聞二録豈非韓老俱稱述者書有子名袁董並曰英雄生當漢末用此為斷粗得其倫亦有厥類衆夥宜為流别而不能定其同科申其異品用使蘭艾相雜朱紫不分是誰之過歟葢史官之責也官一作者按班書古今人}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_WYG_007-1b, image: WYG0685/WYG0685-0054d.png}
  - {type: variant, offset: 0, length: 2, content: 表曆, krp: 史通卷之七内篇品藻直言曲筆鍳識探頥品藻}
  body:
  - {type: variant, offset: 1, length: 1, content: 曆, WYG: 仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列奚不類於其叙哉若孔門達者顔稱殆庶至於他子難為等衰一作差今乃先伯牛而後曾參進仲弓而退冉有伯牛仲弓並在第一等曾參冉有並在第三等也求諸折中厥理無聞又楚王過鄧過一作如三甥欲殺之耼甥騅甥養甥鄧侯不許卒亡鄧國今定鄧侯入下愚之上即}
  - {type: page-break, offset: 1, content: '', id: KR2o0001_WYG_007-2a, image: WYG0685/WYG0685-0055a.png}
  - {type: variant, offset: 3, length: 1, content: 七, SBCK: 二十三}
  - {type: variant, offset: 3, length: 1, content: 七, krp: 二十三}
  - {type: xml-element, offset: 4, content: '', id: KR2o0001_tls_007-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR2o0001_tls_007-1a.1}
  - {type: variant, offset: 4, length: 2, content: 蓋譜, WYG: 等夫寧人負我為善獲戾持此致尤將何勸善如謂小不忍亂大謀失於用權故加其罪是則三甥見㡬而作決在未萌自可髙立標格可一作當寘諸雲漢何得止與鄧侯鄰伍列在中庸下流而已哉三甥皆在第六等又其叙晉文}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_007-2b, image: WYG0685/WYG0685-0055b.png}
  - {type: variant, offset: 5, length: 376, content: 譜之建名起於周代表之所作因譜象形故桓君山有云太史公三代世表旁行邪上並效周譜此其證歟夫以表爲文用述時事施彼譜牒容或可取載諸史傳未見其宜何者易以六爻窮變化經以一字成褒貶傳包五始詩含六義故知文尚簡要語惡煩蕪何必款曲重沓方稱周備觀馬遷史記則不然矣夫天子有本紀諸侯有世家公卿以下有列傳至於祖孫昭穆年月職官各在其篇具有其說用相考覈居然可知而重列之以表成其煩費豈非謬乎且表次在篇第編諸卷軸得之不爲益失之不爲損用使讀者莫不先看本紀越至世家表在其間緘而不視語其無用可勝道哉既而班東二史東謂東觀漢記各相祖述迷而不悟無異逐狂必曲爲銓擇強加引進則列國年表或可存焉何者當春秋戰國之時天下無主羣雄錯峙各自年表若申之於表以統其時則諸國分年一時盡見如兩漢御曆四海成家公卿既爲臣子王侯才比郡縣何用表其年數以別於天子者哉又有甚於斯者異哉班氏之人表也區別九品網羅千載論世則異時語姓則他族自可, SBCK: 聞}
  - {type: variant, offset: 5, length: 376, content: 譜之建名起於周代表之所作因譜象形故桓君山有云太史公三代世表旁行邪上並效周譜此其證歟夫以表爲文用述時事施彼譜牒容或可取載諸史傳未見其宜何者易以六爻窮變化經以一字成褒貶傳包五始詩含六義故知文尚簡要語惡煩蕪何必款曲重沓方稱周備觀馬遷史記則不然矣夫天子有本紀諸侯有世家公卿以下有列傳至於祖孫昭穆年月職官各在其篇具有其說用相考覈居然可知而重列之以表成其煩費豈非謬乎且表次在篇第編諸卷軸得之不爲益失之不爲損用使讀者莫不先看本紀越至世家表在其間緘而不視語其無用可勝道哉既而班東二史東謂東觀漢記各相祖述迷而不悟無異逐狂必曲爲銓擇強加引進則列國年表或可存焉何者當春秋戰國之時天下無主羣雄錯峙各自年表若申之於表以統其時則諸國分年一時盡見如兩漢御曆四海成家公卿既爲臣子王侯才比郡縣何用表其年數以別於天子者哉又有甚於斯者異哉班氏之人表也區別九品網羅千載論世則異時語姓則他族自可, krp: 聞}
  - {type: variant, offset: 7, length: 1, content: 建, WYG: 臣佐也舟之僑為上陽處父次之士㑹為下舟之僑在第三等陽處父在第四等士㑹在第五等其述燕丹之賔客也髙漸離居首荆軻亞之秦武陽居末髙漸離在第五等荆軻在第六等秦武陽在第七等斯並是非瞀亂善惡紛挐或珍瓴甋而賤璠璵或䇿駑駘而捨騏驥以兹為監欲誰欺乎又江充息夫躬讒謟惑上使禍延儲后毒及忠良論其奸凶過於石顯逺矣而固叙之不列佞幸楊王孫裸葬悖禮狂狷之徒考其一生更無他事而與朱雲同列仍冠之傳首不其穢歟若乃旁求别録側窺雜傳諸如此繆其累實多按劉向列女傳載魯之秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同於古冶殉節異於曹娥此乃凶險之頑人强梁之悍婦輒與貞烈為伍有乖其實者焉又嵇康髙士傳其所載者廣矣而顔回蘧瑗獨不見書葢以二子雖樂道遺榮安貧守志而拘忌}
  - {type: page-break, offset: 7, content: '', id: KR2o0001_WYG_007-3a, image: WYG0685/WYG0685-0055c.png}
  - {type: punctuation, offset: 9, content: ，, id: KR2o0001_tls_007-bkkpn1}
  - {type: 'tls:seg', offset: 9, content: '', id: KR2o0001_tls_007-1a.2}
  - {type: variant, offset: 9, length: 1, content: 起, WYG: 教未免流俗也正如董仲舒揚子雲亦鑽仰四科驅馳六籍漸孔門之教義服魯國之儒風與此何殊而並可甄録夫回瑗是棄而揚董獲升可謂識二五而不知十者也爰及近代史臣所書求其乖失亦往往而有借如陽瓚効節邊城捐軀死敵當有宋之代抑劉卜之徒歟劉謂劉康祖卜謂卜天與而沈氏竟不别加標牓唯寄編}
  - {type: page-break, offset: 9, content: '', id: KR2o0001_WYG_007-3b, image: WYG0685/WYG0685-0055d.png}
  - {type: variant, offset: 11, length: 3, content: 周代表, WYG: 索虜篇内紀僧珍砥節礪行終始無瑕而蕭氏乃與羣小混書都以恩幸為目王頗文章不足武藝居多躬詣戚藩首階逆亂撰隋史者如不能與梟感並列隋世皆謂楊𤣥感為梟感即宜附出楊諒傳中輒與詞人共編隋書列王頗在文苑傳也吉士為伍凡斯纂録豈其類乎子曰以貌取人失之子羽以言取人失之宰予光武則受誤於龎萌曹公則見欺於張邈列在方書惟善與惡昭然可見不假許郭之深鑒裴王之妙􅊫而作者存諸簡牘不能使善惡區分故曰誰之過歟史官之責也夫能申藻鏡區别流品使小人君子臭味得明上智中庸等差有叙則懲惡勸善永肅將來激濁揚清鬱為不朽者矣直言第二十四夫人稟五常士兼百行邪正有别曲直不同若邪曲者人}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_WYG_007-4a, image: WYG0685/WYG0685-0056a.png}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_WYG_007-4b, image: WYG0685/WYG0685-0056b.png}
  - {type: punctuation, offset: 13, content: ，, id: KR2o0001_tls_007-bkkpn2}
  - {type: 'tls:seg', offset: 13, content: '', id: KR2o0001_tls_007-1a.3}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 賤而小人之道也正直者人之所貴而君子之徳也然世多趨邪而棄正不踐君子之跡而行曲自陷小人者何哉語曰直如弦死道邊曲如鈎反封侯故能順從以保吉不違忤以受害也況史之為務申以勸戒樹之風聲其有賊臣逆子淫君亂主茍直書其事不掩其瑕則穢跡彰於一朝惡名被於千載言之若是吁可畏乎夫為於可為之時則從為於不可為之時則凶如董狐之書法不隠趙盾之為法受屈彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弑馬遷之述漢非韋昭仗正於吳朝崔浩犯諱於魏國或身膏斧鉞取笑於當時或書填坑窖無聞於後代夫世事如此而責史臣不能申其强項之風勵其匪躬之節葢亦難矣是以張儼發憤私存嘿記之文孫盛不平竊撰遼東之本以兹避禍幸而獲全是以驗世途之多隘知實録之難遇耳然則歴考前史徵諸直詞雖古人糟粕真偽相亂而披沙揀金有時獲寳按金行在歴史氏尤多當宣景開基之始曹馬搆紛之際或列營渭曲見屈武侯或發仗雲臺取傷成濟陳夀王隠咸杜口而無言干寳虞預各栖毫而靡述至習鑿齒乃申以死葛走生達之說抽戈犯蹕之言歴代厚誣一朝始雪考斯人之書事葢近古之遺直者歟次有宋孝王風俗傳王邵齊志其叙述當時亦務在審實按于時河朔王公箕裘未隕鄴城將相薪搆仍存而二子書其所諱曾無憚色剛亦不吐其斯之謂歟葢烈士殉名壯夫重氣寧為蘭摧玉折不為瓦礫長存若南董之仗氣直書不避强禦韋崔之肆情奮筆無所阿容雖周身之防有所不足而遺芳餘烈人到于今稱之與夫王沈魏書假回邪以竊位董統燕史持諂媚以偷榮貫三光而洞九泉曾未足喻其髙下也曲筆第二十五肇有人倫是稱家國父父子子君君臣臣親疎既辨等差有别葢子為父隠直在其中論語之順也略外别内掩惡揚善春秋之義也自兹已降率由舊章史氏有事涉君親必言多隠諱雖直道不足而名教存焉其有舞詞弄札飾非文過若王隠虞預毁辱相凌子野休文釋紛相謝用捨由乎臆說威福行於筆端斯乃}

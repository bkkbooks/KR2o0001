  - {type: variant, offset: 392, length: 0, content: '', krp: 區分故曰誰之過歟史官之責也夫能申藻鏡區别流品使小人君子臭味得朋上智中庸等差有叙則懲惡勸善永肅將來激濁揚清鬱為不朽者矣直言第二十四夫人禀五常士兼百行邪正有别曲直不同若邪曲者人之所賤而小人之道也正直者人之所貴而君子之徳也然世多趍邪而棄正不踐君子之跡而行由小人者何哉語曰直如弦死道邊曲如鈎反封侯故寧順從以保吉不違忤以受害也況史之為務申以勸誡樹之風聲其有賊臣逆子滛君亂主茍直書其事不掩其瑕則穢跡彰於一朝惡名被於千古言之若是吁可畏乎夫為於可為之時則從為於不可為之時則㐫如董狐之書法不隠趙盾之為法受屈彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弑馬遷之述漢非韋昭仗正於吳朝崔浩犯諱於魏國或身膏斧鉞取笑於當時或書填坑窖無聞於後代夫世事如此而責史臣不能申其强項之風勵其匪躬之節蓋亦難矣是以張儼發憤私存嘿記之文孫盛不平竊撰遼東之本以兹避禍幸獲而全是以驗世途之多隘知實録之難遇耳然則歴考前史徵諸直詞雖古人糟粕真偽}
  - {type: variant, offset: 393, length: 0, content: '', SBCK: 亂而披沙揀金有時獲寳按金行在暦史氏尤多當宣景開基之始曹馬搆紛之際或列營渭曲見屈武侯或發仗雲臺取傷成濟陳夀王隠咸杜口而無言于寳虞預各栖毫而靡述至習鑿齒乃申以死葛走生達之說抽戈犯蹕之言歴代厚誣一朝始雪考斯人之書事盖近古之遺直歟次有宋孝王風俗傳王邵齊志其叙述當時亦務在審實按于時河朔王公箕裘未隕鄴城將相薪搆仍存而二子書其所諱曾無憚色剛亦不吐其斯人歟盖烈士殉名壯夫重氣寧為蘭摧玉折不為瓦礫長存若南董之仗氣直書不避强禦韋崔之肆情􅁬筆無所阿容雖周身之防有所不足而遺芳餘烈人到于今稱之與夫王沉魏書假回邪以竊位蕭統燕史持諂媚以偷榮貫三光而洞九泉曾未足喻其髙下也曲筆第二十五肇有人倫是稱家國父父子子君君臣臣親踈既辯等差有别蓋子為父隠直在其中論語之順也畧外别内掩惡揚善春秋之義也自兹已降率由舊章史氏有事涉君親必言多隠諱雖直道不足而名教存焉其有舞詞弄札飾非文過若王隠虞預毁辱相凌子野休文釋紛相謝用捨由乎臆說威福行於筆端斯乃作者之醜行人倫所同疾也亦有事每憑虚詞多烏有或假人之美籍為私惠或誣人之惡持報已讐若王沉魏録濫述貶甄之詔陸機晉史虚張拒葛之鋒班固受金而始書陳夀借米而方傳此又記言之奸賊載筆之凶人雖肆諸市朝投畀豺虎可也然則史之不直代有其書茍其事以彰則今無所取其有往賢之所未察來者之所不知今畧廣異聞用標先覺按後漢書更始傳稱其懦弱也其初即位南靣立朝羣臣羞愧流汗刮席不敢視夫以聖公身在微賤已能結客報讎避難綠林名為豪傑安有貴為人主而反至於斯者乎將作者曲筆阿時獨成光武之美䛕言媚主用雪伯升之怨也且中興之史出於東觀或明帝所定或馬后攸刋而炎祚靈長簡書莫改遂使他姓追撰空傳偽録者矣陳氏國志劉後主傳云蜀無史職故災祥靡聞按黄氣見於秭歸羣鳥墮於江水成都言有景星出益州言無宰相氣若史官不置此事何}

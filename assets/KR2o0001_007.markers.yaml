  - {type: variant, offset: 406, length: 80, content: 書上自庖犧下窮嬴氏不言漢事而編入漢書鳩居鵲巢蔦施松上附生疣贅不知翦截何斷而爲限乎至法盛書載中興改表爲注名目雖巧蕪累亦多當晉氏播遷南據揚越魏宗勃起北雄燕代其間諸僞, WYG: 所列者}

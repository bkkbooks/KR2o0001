  - {type: variant, offset: 421, length: 1, content: 入, SBCK: 次斯則理之常也烏可恠乎必謂子長以善而無報推為傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒􅂉行仁而不遇或盡忠而受戮何不求其品􅁼簡在一科而乃異其篇目各分為卷又遷之紕繆其流甚多夫陳勝之為世家既云無據項羽之稱本紀何必有慿必謂遭彼腐刑怨刺孝武故書為凢例志存激切若先黄老而後六經進奸雄而退處士此之乖刺復何為乎隋内史李徳林著論稱陳夀蜀人其撰國志黨蜀而抑魏刋之國史以為格言按曹公之創王業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良踈忌骨肉而夀評皆依違其事無所措言劉主地居}

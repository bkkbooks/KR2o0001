  - {type: 'tls:seg', offset: 287, content: '', id: KR2o0001_tls_007-4a.11}
  - {type: variant, offset: 287, length: 1, content: 羣, WYG: 呂宗稱制故借其嵗月寄以編年而埜雞行事自具外戚譬夫成為孺子史刋攝政之年厲亡流彘厯紀共和之日而周邵二公各世家有傳班氏式遵曩例殊合事宜豈謂雖濬發於巧心反受嗤於拙目也劉祥撰宋書序録歴說諸家晉史其略云法盛中興荒拙少氣王隠徐廣淪溺罕華夫史之叙事也當辨而不華質而不俚其文直其事該一作核若斯而已可矣必令同文舉之含異等公幹之有逸如子雲之含章類長卿之飛藻此乃綺揚繡合彫章縟綵欲稱實録其可得乎以此詆訶知其妄施彈射矣夫史之曲筆蕪書蜀本作偽宋本作蕪不過一二語其負罪為失已多而魏收雜以寓言殆將過半固以知倉頡已降罕見其流而李氏齊書稱為實録者何也葢以重規亡考未達伯起以公輔相加字出大名事同元歎既無徳不報故以虚美相酬然必謂昭公知禮吾不信也語曰明其為賊敵乃可服如王邵之抗詞不撓可以方駕古人而魏收持論激揚稱其有慚正直夫不彰其罪而輕肆其誅此所謂兵起無名難為制勝者尋此論之作葢由君懋書法不隠取咎當時或有假手史臣以復私門之恥不然何惡直醜正盜憎主人之甚乎夫人廢興時也窮達命也而書之為用亦復如是葢尚書古文六經之冠冕也春秋左氏三傳之}

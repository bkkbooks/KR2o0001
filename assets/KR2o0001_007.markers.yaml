  - {type: variant, offset: 388, length: 1, content: 分, SBCK: 小混書都以恩幸為目王頗文章不足武藝居多躳詣戚藩首階逆亂撰隋史者如不能與梟感並列世隋感為梟感皆謂楊􅀇即宜附出楊諒傳中輙與詞人共編在文苑傳也隋書列王頗吉士為伍凡斯纂録豈其類乎子曰以貌取人失之子羽以言取人失之宰我光武則受誤於龎萌曹公則見欺於徐邈列在方書惟善與惡昭然可見不假許郭之深鑒裴王之妙􅊫而作者存諸簡牘不能}
  - {type: page-break, offset: 388, content: '', id: KR2o0001_SBCK_007-4a}
  - {type: variant, offset: 388, length: 1, content: 分, krp: 小混書都以恩幸為目王頗文章不足武藝居多躳詣戚藩首階逆亂撰隋史者如不能與梟感並列世隋感為梟感皆謂楊玄即宜附出楊諒傳中輙與詞人共編在文苑傳也隋書列王頗吉士為伍凡斯纂録豈其類乎子曰以貌取人失之子羽以言取人失之宰我光武則受誤於龎萌曹公則見欺於徐邈列在方書惟善與惡昭然可見不假許郭之深鑒裴王之妙察而作者存諸簡牘不能}
  - {type: punctuation, offset: 389, content: ，, id: KR2o0001_tls_007-bkkpn100}
  - {type: 'tls:seg', offset: 389, content: '', id: KR2o0001_tls_007-5a.10}
  - {type: variant, offset: 392, length: 0, content: '', SBCK: 區分故曰誰之過歟史官之責也夫能申藻鏡區别流品使小人君子臭味得朋上智中庸等差有叙則懲惡勸善永肅將來激濁揚清鬱為不朽者矣直言第二十四夫人禀五常士兼百行邪正有别曲直不同若邪曲者人之所賤而小人之道也正直者人之所貴而君子之徳也然世多趍邪而棄正不踐君子之跡而行由小人者何哉語曰直如􅁌􅂮道邊曲如鈎反封侯故寧順從以保吉不違忤以受害也況史之為務申以勸誡樹之風聲其有賊臣逆子滛君亂主茍直書其事不掩其瑕則穢跡彰於一朝惡名被於千古言之若是吁可畏乎夫為於可為之時則從為於不可為之時則㐫如董狐之書法不隠趙盾之為法受屈彼我無忤行之不疑然後能成其良直擅名今古至若齊史之書崔弑馬遷之述漢非韋昭仗正於吳朝崔浩犯諱於魏國或身膏斧鉞取笑於當時或書填坑窖無聞於後代夫世事如此而責史臣不能申其强項之風勵其匪躬之節蓋亦難矣是以張儼發憤私存嘿記之文孫盛不平竊撰遼東之本以兹避禍幸獲而全是以驗世途之多隘知實録之難遇耳然則歴考前史徵諸直詞雖古人糟粕真偽}

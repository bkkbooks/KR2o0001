  - {type: variant, offset: 421, length: 1, content: 入, krp: 次斯則理之常也烏可恠乎必謂子長以善而無報推為傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類簡在一科而乃異其篇目各分為卷又遷之紕繆其流甚多夫陳勝之為世家既云無據項羽之稱本紀何必有慿必謂遭彼腐刑怨刺孝武故書為凢例志存激切若先黄老而後六經進奸雄而退處士此之乖刺復何為乎隋内史李徳林著論稱陳夀蜀人其撰國志黨蜀而抑魏刋之國史以為格言按曹公之創王業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良踈忌骨肉而夀評皆依違其事無所措言劉主地居}
  - {type: punctuation, offset: 422, content: 《, id: KR2o0001_tls_007-bkkpn107}
  - {type: variant, offset: 423, length: 0, content: '', SBCK: 宗仗順而􅁸夷險不撓終始無瑕方諸帝王可比少康光武譬以侯伯冝輩秦繆楚莊而夀評抑其所長攻其所短是則以魏為正朔之國典午攸承蜀乃僣偽之君中朝所嫉故典稱曹美而虚說劉非安有背曹而向劉踈魏而親蜀也云陛下邁蹤古聖蕩陳夀上}
  - {type: page-break, offset: 423, content: '', id: KR2o0001_SBCK_007-16b}
  - {type: variant, offset: 423, length: 0, content: '', krp: 宗仗順而𧺫夷險不撓終始無瑕方諸帝王可比少康光武譬以侯伯冝輩秦繆楚莊而夀評抑其所長攻其所短是則以魏為正朔之國典午攸承蜀乃僣偽之君中朝所嫉故典稱曹美而虚說劉非安有背曹而向劉踈魏而親蜀也云陛下邁蹤古聖蕩陳夀上}

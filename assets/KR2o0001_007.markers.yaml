  - {type: 'tls:seg', offset: 21, content: '', id: KR2o0001_tls_007-1a.5}
  - {type: variant, offset: 22, length: 1, content: 桓, WYG: 灾祥靡聞案黄氣見於秭歸羣鳥墮於江水成都言有景星出益州言無宰相氣若史官不置此事從何而書葢由父辱受髠故加兹謗議者也古者諸侯並爭勝負無恒而他善必稱已惡不諱逮乎近世無聞至公國自稱為我長家相謂為彼短而魏收以元氏出於邊裔見侮諸華遂髙自標舉比桑乾於姬漢之國曲加排抑同建業於蠻貊之邦夫以敵國相讐交兵結怨載諸移檄用可致誣列諸緗素難為妄說茍未達此義安可言於史邪葢霜雪交下始見真松之操國家喪亂方騐忠臣之節若漢末之董承耿紀晉初之諸葛毌丘毌音貫齊興而有劉康袁粲周滅而有王謙尉迥斯皆破家殉國視死猶生而歴代諸史皆書之曰逆將何以激揚名教以勸事}
  - {type: page-break, offset: 22, content: '', id: KR2o0001_WYG_007-8a, image: WYG0685/WYG0685-0058a.png}
  - {type: variant, offset: 24, length: 1, content: 山, WYG: 者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董}
  - {type: page-break, offset: 24, content: '', id: KR2o0001_WYG_007-8b, image: WYG0685/WYG0685-0058b.png}
  - {type: variant, offset: 26, length: 1, content: 云, WYG: 靈必切齒於九泉之下矣自梁陳已降隋周而往者史皆貞觀年中羣公所撰近古易悉情偽可求至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實昔秦人不死驗苻生之厚誣蜀老猶存知葛亮之多枉斯則自古所歎豈獨於今哉葢史之為用也記功司過彰善癉惡得失一朝榮辱千載茍違斯法豈曰能官但古來唯聞以直筆見誅不聞以曲詞獲罪是以隠侯宋書多妄蕭武知而勿尤伯起魏史不平齊宣覽而無譴故令史臣得愛憎由已髙下在心進不憚於公憲退無媿於私室欲求實録不亦難乎嗚呼此亦有國家者所宜懲革也鑒識第二十六夫人識有通塞神有晦明毁譽以之不同愛憎由其各異葢三王之受謗也值魯連而獲申五霸之擅名也逢孔宣而見詆斯則物有恒準而鑒無定識欲求銓覈得中其惟千載一遇乎況史傳為文淵浩廣博學者茍不能探賾索隠致逺鈎深烏足以辨其利害明其善惡觀左氏之書為傳之最而時經漢魏竟不列於學官儒者皆折此一家而盛推二傳夫以丘明躬為魯史受經仲尼語世則竝生論才則同恥蜀本作體宋本作恥彼二家者師孔氏之弟子預達者之門人才識體殊年代又隔安得持彼傳說比兹親受者乎加以二傳理有乖僻言多鄙野方諸左氏不可同年故知膏肓墨守乃腐儒之妄述賣餅太官誠智士之明鑒也逮史漢繼作踵武相承王充著書既甲班而乙馬張輔持論又劣固而優遷王充謂彪文義浹備紀事詳贍觀者以為甲以}

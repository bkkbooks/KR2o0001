  - {type: 'tls:seg', offset: 424, content: '', id: KR2o0001_tls_007-5a.17}
  - {type: variant, offset: 424, length: 0, content: '', SBCK: 諸葛亮集咸肆其辭而無所革也然無忌故雖誹謗之言夫無其文而有其說不亦憑虚亡是者邪習鑿齒之撰漢􅀳春秋以劉爲偽國者此蓋定邪正之途明逆順之理尔而擅道鸞稱其當桓氏執政故撰此書􅁒以絶彼瞻烏防兹逐鹿歴觀古之學士爲文以諷其上者多矣若齊倫失徳豪士於焉作賦賈后無道女史由之獻箴斯皆短什小篇可俯而就也安有變三國之體統改五行之正朔勒成一史傳諸千載而藉其權以濟物取誡當時豈非勞而無功愽而非要與夫班彪王命一何異乎求之人情理不當耳自二京板蕩五胡稱制崔鴻}
  - {type: page-break, offset: 424, content: '', id: KR2o0001_SBCK_007-17a}
  - {type: variant, offset: 424, length: 0, content: '', krp: 諸葛亮集咸肆其辭而無所革也然無忌故雖誹謗之言夫無其文而有其說不亦憑虚亡是者邪習鑿齒之撰漢晉春秋以劉爲偽國者此蓋定邪正之途明逆順之理尔而擅道鸞稱其當桓氏執政故撰此書𣣔以絶彼瞻烏防兹逐鹿歴觀古之學士爲文以諷其上者多矣若齊倫失徳豪士於焉作賦賈后無道女史由之獻箴斯皆短什小篇可俯而就也安有變三國之體統改五行之正朔勒成一史傳諸千載而藉其權以濟物取誡當時豈非勞而無功愽而非要與夫班彪王命一何異乎求之人情理不當耳自二京板蕩五胡稱制崔鴻}

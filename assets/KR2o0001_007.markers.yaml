  - {type: variant, offset: 289, length: 0, content: '', WYG: 霸也而自秦至晉年踰五百其書隠没不行於世既而梅氏冩獻杜侯訓釋然後見重一時擅名千古乃老經撰於周日莊子成於楚年遭文景而始傳值嵇阮而方貴若斯流者可勝紀哉故曰廢興時也窮達命也適使時無識寳世缺知音若論衡之未遇伯喈太𤣥之不逢平子逝將煙燼火滅泥沈雨絶安有殁而不朽揚名於後世者乎探賾第二十七古之述者豈徒然哉或以取捨難明或以是非相亂由是書編典誥宣父辨其流詩列風雅卜商通其義夫前哲所作後來是觀茍失其指歸則難以傳授而或有妄生穿鑿輕究本源是乖作者之深㫖誤生人之後學其為繆也不亦宜乎昔夫子之作魯史學者以為感麟而作按子思有云吾祖厄於陳蔡夫以彼聿修傳諸貽厥欲求實録難為爽誤事則義包微婉因攫苺而剙詞時逢西狩乃泣麟而絶筆儒者徒知其一而未知其二以為自反袂拭面稱吾道窮然後追論五始定名三叛此豈非獨學無友孤陋寡聞之所致邪孫盛稱左氏春秋書吳楚則略荀恱漢紀述匈奴則簡葢所以賤夷狄而貴諸夏也按春秋之時諸國}

  - {type: variant, offset: 17, length: 4, content: 因譜象形, WYG: 者之醜行人倫所同疾也亦有事每憑虚詞多烏有或假人之美藉為私惠或誣人之惡持報已讐若王沈魏録濫述貶甄之詔陸機晉史虚張拒葛之鋒班固受金而始書陳夀借米而方傳此又記言之奸賊載筆之凶人雖肆諸市朝投畀豺虎可也然則史之不直代有其書茍其事已彰則今無所取其有往賢之所未察來者之所不知今略廣異聞用標先覺按後漢書更始傳稱𤣥之懦弱也其初即位南面立朝羣臣羞愧流汗刮席不敢視夫以聖公身在微賤已能結客報仇一作讐避難綠林名為豪傑安有貴為人主而反至於斯者乎將作者曲筆阿時獨成光武之美諛言媚主用雪伯升之怨也且中興之史出於東觀或明帝所定或馬后攸刋而炎祚靈長簡書莫改遂使他姓追撰空傳偽録者矣陳氏國志劉後主傳云蜀無史職}
  - {type: page-break, offset: 17, content: '', id: KR2o0001_WYG_007-7a, image: WYG0685/WYG0685-0057c.png}
  - {type: page-break, offset: 17, content: '', id: KR2o0001_WYG_007-7b, image: WYG0685/WYG0685-0057d.png}

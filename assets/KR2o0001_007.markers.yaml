  - {type: variant, offset: 348, length: 0, content: '', WYG: 荀氏著書抄撮班史其取事也中外一槩夷夏皆均非是獨簡胡鄉蜀本作略宋本作簡而偏詳漢室盛既疑丘明之擯吳楚遂誣仲豫之抑匈奴可謂强奏庸音特為足曲者也葢明月之珠不能無瑕夜光之璧不能無纇故作者著書或}
  - {type: variant, offset: 349, length: 0, content: '', WYG: 病累而後生不能詆訶其過又更文飾其非遂推而廣之强為其說者葢亦多矣如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非關有徳也按史之於書也有其事則記無其事則闕尋遷之馳騖今古上下數千載春秋已往得其遺事者葢惟首陽山之二子而已然適使夷齊生於秦氏死於漢日而乃升諸傳首庸謂有情今者考其先後隨而編次斯則理之常也烏可怪乎必謂子長以善而無報推其傳始若伍子胥大夫種孟軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類同在一科而乃異其篇目分為數卷也又遷之紕繆其流}
  - {type: page-break, offset: 349, content: '', id: KR2o0001_WYG_007-14a, image: WYG0685/WYG0685-0061a.png}
  - {type: page-break, offset: 349, content: '', id: KR2o0001_WYG_007-14b, image: WYG0685/WYG0685-0061b.png}
  - {type: variant, offset: 350, length: 0, content: '', WYG: 多夫陳勝之為世家既云無據項羽之稱本紀何必有憑必謂遭彼腐刑怨刺孝武故書違凡例志存激切若先黄老而後六經進奸雄而退處士此之乖刺復何為乎隋内史李徳林著論稱陳夀蜀人其撰國志黨蜀而抑魏刋之國史以為格言按曹公之創王業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良疎忌骨肉而夀評皆依違其事無所措言劉主地居漢宗仗順而起夷險不撓終始無瑕方諸帝王可比少康光武譬以侯伯宜輩秦繆楚莊而夀評抑其所長攻其所短是則以魏為正朔之國典午攸承蜀乃僭偽之君中朝所嫉故典稱曹美而虚說劉非安有背曹而向劉疎魏而親蜀也陳夀上書諸葛亮集云陛下邁蹤古聖蕩然無忌故雖誹謗之言咸肆其辭而無所革也夫無其文而有其說不亦憑虚亡是者邪習鑿齒之撰漢晉春秋以魏為偽國者此葢定邪正之途明逆順之理爾而檀道鸞稱其當桓氏執政故撰此書欲以絶彼瞻烏防兹逐鹿歴觀古之學士為文以諷其上者多矣若齊倫失徳豪士}

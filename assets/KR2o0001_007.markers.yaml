  - {type: 'tls:seg', offset: 394, content: '', id: KR2o0001_tls_007-5a.11}
  - {type: variant, offset: 394, length: 0, content: '', SBCK: 而書之盖由父辱受髠故加兹謗議者也古者諸侯並争勝負無恒而他善必稱已惡不諱逮乎近世無聞至公國自謂為我長家相謂為彼短而魏收以元氏出於邊裔見侮諸華遂髙自標舉比桑乾於􅁎漢之國曲加排抑同建業於蠻貊之邦夫以敵國相讎交兵結怨載諸移檄用可致誣列諸緗素難為妄說茍未達此義安可言於史邪盖霜雪交下始見貞松之操國家喪亂方騐忠臣之節若漢末之董承耿紀晉初之諸葛母丘齊興而有劉康袁粲周滅而有王謙尉逈斯皆破家殉國視死猶生而􅍓代諸史皆書之曰逆將何以激揚名教以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董有靈必切齒於九泉之下矣自梁陳已降隋周而往者史皆貞觀年中羣公所撰近古易悉情偽可求至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實昔秦人不死驗符生之厚誣蜀老猶存知葛亮之多枉斯則自古所歎豈獨於今哉盖史之為用也記功司過彰善癉惡得失一朝榮辱千載茍違斯法豈曰能官但古來唯聞以直筆見誅不聞以曲詞獲罪是以隠侯宋書多妄蕭武知而勿尤伯起魏史不平齊宣覽而無譴故令史臣得愛憎由已髙下在心進不憚於公憲退無媿於私室欲求實録不亦難乎嗚呼此亦有國家者所宜懲革也鑒識第二十六夫人識有通塞神有晦明毁譽以之不同愛憎由其各異盖三王之受謗也值魯連而獲申五覇之擅名也逢孔宣而見詆斯則物有恒准而鑒無定識欲求銓覈得中其惟千載一遇乎況史傳為文淵源廣博學者茍不能探􅄨索隠致逺鈎深焉足以辯其利害明其善惡觀左氏之書為傳之最而時經漢魏竟不列於學官儒者皆折此一家而盛推二傳夫以丘明躬為魯史受經仲尼語世則並生論才則同體彼二家者師孔氏之弟子預達者之門人才識永殊年代又隔安得持彼傳說比兹親受者乎加以二傳理有乖僻言多鄙野方諸左氏不可同年故知膏肓墨守乃腐儒之志述賣餅太官誠智士之明鑒也逮史漢繼作踵武相承王􅂶著書既甲班而乙馬張輔持論又劣固而優遷文義浹備王克謂彪士優劣論曰士人評馬遷班固之才優劣多以紀事詳悉觀者以為甲於太史公也張輔名固二百年事八十萬言煩省不敵固之不如遷固為勝余以為史遷叙三千年事五十萬言班矣必然此二書雖互有脩短逓聞得失而大抵同風可為連類張晏云遷殁後亡龜䇿日者傳褚先生補其缺言詞鄙陋非遷本意按遷所撰五帝本紀七十列傳稱虞舜見阨遂匿空而出宣尼既殂門人推奉有若其言為鄙又甚於兹安得獨罪􅀘生而全宗馬氏也劉􅁤思啇㩁漢史雅重班才惟譏其本紀不列少帝而輙編髙后按弘非劉氏而竊養漢宮時天下無君呂宗稱制故借其嵗月寄以編年而野鷄行事自具外戚譬夫成爲孺子史刋攝正之年厲亡流􅮿暦紀共和之日而周邵二公各世家有傳班氏式遵曩例殊合事宜豈謂雖濬發於巧心反受嗤於拙目也劉祥撰宋書序録􅍓說諸家晉史其畧云法盛中興荒拙少氣王隠徐廣淪溺罕華夫史之敘事也當辯而不華質而不俚其文直其事核若斯而已可矣必令同文舉之含異等公幹之有逸如子雲之含章類長卿之飛藻此乃綺揚繡合雕章縟彩欲稱實録其可得乎以此詆訶知其妄施彈射矣夫史之曲筆誣書不過一二語其負罪為失已多而魏收雜以寓言殆將過半固以蒼頡已降罕見其流而李氏齊書稱為實録者何也盖以重規亡考未逹伯起以公輔相加字出大若事同元歎既無徳不報故以虚美相酧然必謂昭公知禮吾不信也語曰明其為賊敵乃可服如王邵之抗詞不撓可以方駕古人而魏收持論激揚稱其有慚正直夫不彰其罪而輕肆其誅此所謂兵起無名難為制勝者尋此論之作盖由君懋書法不隠取名當時或有假手史臣以復私門之耻不然何惡直醜正盜憎主人之甚乎夫以廢興時也窮達命也而書之為用亦復如是盖尚書古文六經之冠冕也春秋左氏三傳之雄覇也而自秦至晉年踰五百其書隠没不行於世既而梅氏寫獻杜侯訓釋然後見重一時擅名千古老經撰於周日莊子成於楚年遭文景而始傳值􅄞阮而方貴若斯流者可勝紀哉故曰廢興時也窮達命也適使時無識寳世缺知音若論衡之未遇伯喈太玄之不逢平子逝將煙盡火滅泥沉雨絶安有殁而不朽揚名於後世者乎按曲筆篇流汗刮席下便寫至如朝廷止言多爽實凡三十七字盖史之為用也上絶不屬鑒識篇不可同年下云故知割席不敢視云云割席疑承刮席為文逮漢史繼作上亦不屬其後文多雜亂難為章句始知其爲錯簡因加訂正如此此書外篇别有􅀧煩云回易數字加足片言分布得所彌􅒌無闕寔公言也故敢如例云爾是嵗嘉靖乙未秋七月既望雲間陸􅀷謹識探頥第二十七古之述者豈徒然哉或以取捨難明或以是非相亂由是書編典誥宣父辨其流詩列風雅卜啇通其義夫前哲所作後來是觀茍失其指歸則難以傳授而􅂉有妄生穿鑿輕究本源是乖作者之深㫖誤生人之後學其為繆也不亦甚乎昔夫子之作魯史學者以為感麟而作按子思有云吾祖厄於陳蔡夫以彼聿脩傳諸貽厥欲求實録難為爽誤事則義包微婉因攫苺而剙詞時逢西狩乃泣麟而絶筆儒者徒知其一而未知其二以為自反袂拭面稱吾道窮然後追論五始定名三叛此豈非獨學無友孤陋寡聞之所致邪孫盛稱左氏春秋書吳楚則略荀恱漢紀述匈奴則簡盖所以賤夷狄而貴諸夏也按春秋之時諸國錯峙關梁不通史官所書罕能周悉異乎炎漢之世四海一家馬遷垂傳以來自古遺文而州郡上計皆先集太史若斯之備也況彼吳楚者僻居南裔地隔江山去彼魯邦尤為迂闊丘明所録安能備諸且必以蠻夷而固略也若駒支預於􅀳㑹長狄埋於魯門葛盧之辨牛鳴郯子之知鳥職斯皆邊隅小國人品最微猶復收其瑣事見於方冊安有主盟上國勢迫宗周爭長諸華威陵强晉而可遺之者哉又荀氏著書抄撮班史其取事也中外一槩夷夏皆均非是獨略胡郷而徧詳漢室盛既疑丘明之擯吳楚遂誣仲豫之抑匈奴可謂强奏庸音特為足曲者也盖明月之珠不能無瑕夜光之璧不能無纇故作者著書或有病累而後生不能詆訶其過又更文飾其非遂推而廣之强為其說者蓋亦多矣如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列於本紀以為居髙位者非關有徳也按史之於書也有其事則記無其事則闕馬遷之馳騖今古上下數千載春秋已往得其遺事者盖惟首陽山二子而已然適使夷齊生於秦氏􅂮於漢日而乃升諸傳首庸謂有情今者考其}

  - {type: variant, offset: 24, length: 4, content: 綱紀庶品, SBCK: 咸習其迷宋史則上括魏朝隋書則仰包梁代求其􅀁書之事得十一扵千百一成其例莫之敢移永言其理可為歎息當魏武乗時撥亂電掃羣雄鋒鏑之􅀁交}
  - {type: page-break, offset: 24, content: '', id: KR2o0001_SBCK_004-10a}
  - {type: variant, offset: 24, length: 10, content: 綱紀庶品網羅萬物考篇, WYG: 莫之遵効逮新晉始以十六國主持載記表名可謂擇善而行巧於師古者矣觀夫舊史列傳題卷靡恒文少者則具出姓名若司馬相如東方朔是也字煩者惟書姓氏若毋將葢陳衞諸葛傳是也必人多而姓同者則結定其數若二袁四張二公孫傳是也如此摽格足為詳審至范曄舉例始全錄姓名歴短行於卷中叢細字於摽外其子孫附出者注於祖先之下乃類俗之文桉孔}

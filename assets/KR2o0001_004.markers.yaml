  - {type: variant, offset: 12, length: 2, content: 年呂, WYG: 今編同列傳以戒牝雞之晨切惟録皇后者既為傳體自不可加以紀名二史之以后為傳雖云允惬而解釋非理成其偶中所謂畫蛇而加足反失杯中之酒也至於題目失據褒貶多違斯並散在諸篇此可得而略矣題目第十一上古之書有三墳五典八索九邱其次有春秋尚書檮杌志乘自漢已下其流漸繁大扺史名多以書記紀略為主後生祖述各從所好沿革相因循環遞習葢區域有限莫踰於此焉至孫盛有魏}
  - {type: page-break, offset: 12, content: '', id: KR2o0001_WYG_004-6b, image: WYG0685/WYG0685-0029b.png}
  - {type: variant, offset: 12, length: 0, content: '', krp: 傳之言其有所異唯加文飾而已至扵甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷序傳後歷冩諸篇各叙其意旣而班固變為詩體號之曰述范曄攺徃述名呼之以賛尋述賛為例篇有一章事多者則約之以使少理小者則張之以令大名實多爽詳畧不同且欲觀人之善惡史之褒貶蓋無假扵此然固之緫述合在一篇使其條貫有序歷然可閱蔚宗後書實同班氏乃各附本事書扵卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北史李百藥蕭子顯大唐新修晉史皆依范書誤本篇終有賛夫每卷立論其煩已多而嗣論以賛為黷彌甚亦猶文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言苟撰史若斯難與議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈誼范曄之虚羙隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故畧陳梗槩一言以蔽之序例第十孔安國有云序者所以序作者之意也竊以書列典謨詩含比興若不先叙其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事為宗至扵表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相叅風雅齊列矣迨華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以四皓為始也嶠言辭簡質叙致温雅味其宗㫖亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜衒文彩後來所作他皆若斯扵是遷固之道怱諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史所有而我書獨無世之作者以為恥愧故上自晉宋下及陳隋每書必序課成其數蓋為史之道以古傳今古旣有之今何為者濫觴肇跡容或可觀累屋重起無乃太甚譬夫方朔始為客難續以賔戯觧嘲枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者所厭聞老生之恒說也夫史之有例猶國之有法國之無法則上下靡定史之無例則是非莫官蓋夫子作經始發凡例左氏立傳顯其區域科條之辯彪炳可觀降及戰國迄乎有晉}

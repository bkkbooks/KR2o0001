  - {type: variant, offset: 52, length: 0, content: '', WYG: 則無宜重述故子嬰降沛其詳取驗於秦紀伯符死漢其事斷入於呉書沈録金行上覊劉主魏刋水運下列高王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左既承正朔斥彼魏胡故氐羌有録索虜成傳魏本出於雜種竊亦自號真君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比於羣盜盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之於傳何厚顔之甚邪又張李諸姓據有涼蜀其於魏}

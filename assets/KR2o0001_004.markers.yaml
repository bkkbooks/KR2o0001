  - {type: variant, offset: 38, length: 0, content: '', SBCK: 蓋惟二􅀽劉呂而已各進鴆行弑燃臍就戮揔關王室不涉覇圗而陳壽國志引居傳首夫漢之有董卓猶秦之有趙高昔東令之誅旣不列于漢史何太師之斃遂獨刋扵魏書乎兼復􅆇洪陶謙劉虞孫讃生扵季末自相吞噬}
  - {type: variant, offset: 38, length: 0, content: '', krp: 蓋惟二袁劉呂而已各進鴆行弑燃臍就戮揔關王室不涉覇圗而陳壽國志引居傳首夫漢之有董卓猶秦之有趙高昔東令之誅旣不列于漢史何太師之斃遂獨刋扵魏書乎兼復臧洪陶謙劉虞孫讃生扵季末自相吞噬}
  - {type: variant, offset: 39, length: 3, content: 莫過於, SBCK: 扵曹氏也非唯理異犬牙固亦事同風馬漢典􅀁具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見它記則無宜重述故子嬰降沛其詳取驗扵秦紀伯符死漢其事斷入扵呉書沈錄金行上覊劉主魏刋水運下列高王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左旣承正􅃋斥彼魏胡故互相有錄索虜成傳魏本出扵雜種竊亦自􅃅眞君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比扵群盗盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之扵傳何厚顔之甚耶又張李諸姓據有凉蜀其扵魏也校年則前後不接論地則參商有殊何預魏氏而横加編載夫尚書者七經之􅃣冕百氏之襟䄂凢學者必先精}
  - {type: page-break, offset: 39, content: '', id: KR2o0001_SBCK_004-10b}

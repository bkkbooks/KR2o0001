  - {type: variant, offset: 418, length: 0, content: '', WYG: 而魏書序紀襲其虚號生則謂之帝死則謂之崩何異沐猴而冠腐鼠稱璞者矣夫歴觀自古稱謂不同縁情而作本無定凖至若諸侯無諡者戰國已上謂之今王天子見黜者漢魏以後謂之少帝周衰有共和之相楚殺有夾敖之主趙他而曰尉他英布而曰黥布豪傑則平林新市冦賊則黄巾赤眉園綺友朋共云四皓奮建父子都稱萬石凡此諸名皆出於當代史臣編録無復弛張葢取叶隨時不藉稽古及}

  - {type: 'tls:seg', offset: 21, content: '', id: KR2o0001_tls_004-1a.3}
  - {type: variant, offset: 21, length: 0, content: '', SBCK: 改書為志義在反文而何氏中興易志為記此則貴於革舊未見其能取新夫戰爭方殷雄雌未决則有不奉正朔自相君長必國史為傳宜别立科條至如陳項諸雄􅀉篇漢籍董袁羣賊附列魏志既同臣子之例孰辨彼此之殊惟東觀以平林下江諸人列為載記顧後來作者莫之遵効逮新􅀳始以十六國主特載記表名可謂擇善而行巧扵師古者矣觀夫􅃇史列傳題卷靡恒文少者則具出姓名若司馬相如東方朔是也字煩者惟書姓氏若母將盖陳衛諸葛傳是也必人多而姓同者則結定其數若二􅀽四張二公孫傳是也如此標格足為詳審至范曄舉例始全録姓名歴短行扵卷中叢細字扵標外其子孫附出者注扵祖先之下乃􅀋俗之文按孔目藥艸經方煩碎之至孰過扵此切以周易六爻義存象内春秋萬國事具傳中讀者研尋篇終自曉何必開帙觧帶便令照肰滿目也自兹已降多師蔚宗魏收因之則又甚矣其有魏世隣國編扵魏史者扵其人姓名之上又列之以􅀖域申之以職官至如江東帝王則云僣晉司馬叡島夷劉􅁉河西酋長則云􅀻置涼州牧張寔􅀻署凉王李暠此皆篇中􅀁具又扵卷首具列必如收意使其撰兩漢書三國志題諸盗賊傳亦當云僣西楚覇王項羽偽寧朔王隗囂自餘陳涉張歩劉璋􅀽術其位􅃅皆一一具言無􅀁不盡也}

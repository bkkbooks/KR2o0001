  - {type: punctuation, offset: 17, content: 》, id: KR2o0001_tls_004-bkkpn5}
  - {type: variant, offset: 17, length: 1, content: 肇, SBCK: 孔衍有隋尚書陳壽王邵曰志何之元劉璠曰典此又好竒猒俗習􅃇􅂢新雖得稽古之宜未逹從時之義㩁而論之其編年月日者謂之紀列記傳者謂之書取順於時斯為最也夫名以定體為實之賔苟失其途有乖至瑰按吕陸二氏賈不韋各著一書惟次篇章不繫時月此乃子書雜記而皆號曰春秋魚豢姚察著魏梁二史巨細畢載蕪累甚多而俱牓之以畧考名責實奚其䘮歟若乃史傳雜篇區分􅀋聚隨事}

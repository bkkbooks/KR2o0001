  - {type: variant, offset: 84, length: 1, content: 敎, SBCK: 中興也更始升壇攺元寒暑三易世祖稱臣北靣誠節不􅉻旣而兵敗長安祚歸高邑兄亡弟及歷數相承作者乃抑聖公扵傳内登文叔扵紀首事等躋僖位先不窋夫東觀秉筆容􅂉謟扵當時後来􅀁修理當刋革者也蓋逐免爭捷瞻烏靡定群雄僣盗為我駈除是以史傳􅀁分眞偽有别陳勝項籍見編扵高祖之後隗囂孫述不列扵光武之前而陳壽蜀書首摽二牧次列先主以􅁇焉璋豈以蜀是偽朝遂乃不遵恒例但鵬鷃一也何大小之異哉春秋嗣子諒闇未踰年而廢者旣不成君故不别加篇目是以魯公十二惡視不預其流及秦之子嬰漢之昌邑咸亦因胡亥而得記附孝昭而􅀗聞而呉均齊春秋乃以欝林為紀事不師古何滋章之甚與觀梁唐二朝撰齊隋兩史東昏猶在而遽列和年煬帝未終而已編㳟紀原其意㫖豈不以和為梁王􅀁立㳟乃唐氏􅀁承􅀁以黜永元而尊中興顕}

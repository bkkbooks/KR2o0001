  - {type: punctuation, offset: 50, content: 《, id: KR2o0001_tls_004-bkkpn12}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 則上括魏朝隋書則仰包梁代求其所書之事得十一於千百一成其例莫之敢移永言其理可為歎息當魏武乘時撥亂電掃羣雄鋒鏑之所交網羅之所及者葢惟二袁劉呂而已卓進鴆行弑燃臍就戮總關王室不涉覇圖而陳夀國志引居傳首夫漢之有董卓猶秦之有趙高昔車令之誅既不列漢史何太師之斃遂獨刋於魏書乎兼復臧洪陶謙劉虞孫讃生於季末自相吞噬其於曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見他}
  - {type: page-break, offset: 51, content: '', id: KR2o0001_WYG_004-10a, image: WYG0685/WYG0685-0031a.png}

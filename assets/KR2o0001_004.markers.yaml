  - {type: variant, offset: 407, length: 0, content: '', krp: 人君加以王號𣏌用夷禮貶同子爵變通其理事在合宜小道可觀見扵蕭氏者矣古者天子廟號祖有功而宗有德始自三代迄于}
  - {type: punctuation, offset: 408, content: 《, id: KR2o0001_tls_004-bkkpn88}
  - {type: variant, offset: 409, length: 0, content: '', SBCK: 名實相允今古共傳降及曹氏祖名多濫必無慚德其惟武王故陳夀國志獨呼武曰祖至扵文明但稱帝而已自晉已還竊􅃅者非一如康穆兩帝劉蕭二朝梁簡文兄弟元帝也兼為孝齊武成昆季孝昭也兼言宣斯􅂉承家之僻王或王國之庸主不謚虚謬為幸巳多猶曰祖宗孰云其可而史臣載削曾無辨明每有􅀁}
  - {type: page-break, offset: 409, content: '', id: KR2o0001_SBCK_004-16b}
  - {type: variant, offset: 409, length: 0, content: '', WYG: 名實相允今古共傳降及曹氏祖名多濫必無慚徳其為武王故陳夀志獨呼武曰祖至於文明但稱帝而已自晉以還竊號者非一如康穆兩帝劉蕭二明梁簡文兄弟兼謂孝元帝也齊武成昆季兼言宣孝昭也斯或承家之僻王或亡國之庸主不諡靈謬為幸巳多猶曰祖宗孰云其可而史臣載削曾無辨明每有所}
  - {type: variant, offset: 409, length: 0, content: '', krp: 名實相允今古共傳降及曹氏祖名多濫必無慚德其惟武王故陳夀國志獨呼武曰祖至扵文明但稱帝而已自晉已還竊號者非一如康穆兩帝劉蕭二朝梁簡文兄弟元帝也兼為孝齊武成昆季孝昭也兼言宣斯或承家之僻王或王國之庸主不謚虚謬為幸巳多猶曰祖宗孰云其可而史臣載削曾無辨明每有所}

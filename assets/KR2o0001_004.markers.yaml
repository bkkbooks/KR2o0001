  - {type: punctuation, offset: 413, content: 、, id: KR2o0001_tls_004-bkkpn90}
  - {type: variant, offset: 415, length: 0, content: '', SBCK: 義杜偷濫之源者乎又位乃人臣跡參王者如周之亶父季歷晉之仲逹師昭追尊建名比諸天子可也必若當􅂗所出宦官携飬帝􅃅徒加人望不愜故國志所録無異匹夫應書其人直云皇之祖考而已至如元氏􅁸於沙朔其君乃一部之酋長耳道武追崇􅀁及凡二十八君自開闢以來未之有也而魏書序紀襲其虚􅃅生則謂之帝死則謂之崩何異沭猴而冠腐鼠稱璞者矣夫歷觀自古稱謂不同縁情而作本無定凖至若諸侯無謚者戰國已上謂之今王天子見出者漢魏已後謂之少帝周衰有共和之相楚殺有郟敖之主趙佗而曰尉佗英布而曰黥布豪傑則平林新市宼賊則黃巾赤眉園綺友朋共云四皓奮建父子都稱萬石皆出於當代史臣編録無復弛張蓋取叶隨時不藉稽古及後来作者頗繤斯流亦時採新名務成篇題第音若王晉之處士寒雋沈宋之二凶索虜即其事也唯魏收逺不師古近非因俗自我作故無􅀁憲章其撰書也乃以平陽王為出帝司馬氏為僣晉桓劉已下通曰島夷夫其謟齊則輕抑􅀜右黨魏則􅀷誣江外愛憎出於方寸與奪由其筆端語必不經名惟駭物昔漢世原涉大修墳墓乃開道立表署曰南陽阡欲以繼跡京兆齊聲曹尹而人莫之肯從但云原氏阡而已故知事非􅁢當難以遵行如􅀵之苟立詭名不依故實難復形諸竹帛終罕傳於諷誦也抑又聞之帝王受命厯數相承雖舊君已沒而致敬無攺豈可等之凡庶便書之以名者乎近代文章實同兒戲有天子而稱諱者若􅁎滿劉莊之􅀋是也有匹夫而不名者若歩兵彭澤之􅀋是也史論立言理當雅正如班述之叙聖卿也而曰董公惟亮范賛之言季孟也曰隗王得士習談漢王則謂昭烈為玄徳以蜀為正綂其習氏漢􅀳春秋帝至於論中語則呼為玄徳編叙事皆謂蜀先主為昭烈裴引魏室則目文帝為曹丕夫以淫亂之臣揔隱其諱亂謂隗囂淫謂董賢}

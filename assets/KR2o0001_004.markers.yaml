  - {type: variant, offset: 22, length: 0, content: '', krp: 法令滋章古人所愼若范魏之裁篇目可謂滋章之甚者乎苟忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣斷限第十二夫書之立約其来尚矣如尼父之定虞書也以舜為始而云粤若稽古帝堯丘明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有㳂革遂相交互事勢當然非為濫軼也過此已徃可謂狂簡不知所裁者焉夫子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴所出起乎司馬氏按馬記以史制名班書持漢摽目史記者載數千年之事無所不容漢書者}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 十二帝之時有限斯極固旣分遷之記判其去取紀傳􅀁存惟留漢目表志􅀁錄乃盡犧年舉一反三豈其若是膠柱調瑟不亦繆歟但固之􅐲駮旣往不諫而後之作}
  - {type: variant, offset: 23, length: 0, content: '', krp: 十二帝之時有限斯極固旣分遷之記判其去取紀傳所存惟留漢目表志所錄乃盡犧年舉一反三豈其若是膠柱調瑟不亦繆歟但固之踳駮旣往不諫而後之作}

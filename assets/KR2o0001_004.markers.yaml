  - {type: variant, offset: 22, length: 0, content: '', SBCK: 法令滋章古人􅀁愼若范魏之裁篇目可謂滋章之甚者乎苟忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣斷限第十二夫書之立約其来尚矣如尼父之定虞書也以舜為始而云粤若稽古帝堯丘明之傳魯史也以􅀮為先而云惠公元妃孟子此皆正其疆里開其首端因有㳂革遂相交互事􅀔當然非為濫軼也過此已徃可謂狂簡不知􅀁裁者焉夫子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴􅀁出起乎司馬氏按馬記以史制名班書持漢摽目史記者載數千年之事無􅀁不容漢書者}

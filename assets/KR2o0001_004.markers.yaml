  - {type: variant, offset: 47, length: 0, content: '', WYG: 叡島夷劉裕河西酋長則云私置涼州牧張實私署涼王李暠此皆篇中所具又於卷首具列必如收意使其撰兩漢書三國志題諸盜賊傳亦當云僣西楚項羽偽寧朔王隗囂自餘陳涉張步劉璋袁術其位號一二具言無所不盡也葢法令滋章古人所愼若范魏之裁篇目可謂滋章之甚者乎茍忘彼大體好茲小數難與議夫婉而成章一字以為褒貶者矣斷限第十二夫書之立約其來尚矣如尼父之定虞書也以舜為始而云粤若稽古帝堯邱明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有沿革遂相交互事勢當然非為濫軼也過此已徃可謂狂簡不知所裁者焉又子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴所出起乎司馬氏按馬記以史制名班書持漢標目史記者載數千年之事無所不容漢書者紀十二帝之時有限斯極固既分}

  - {type: variant, offset: 75, length: 0, content: '', WYG: 不由徑非所聞焉修國史者若旁採異聞用成博物斯則可矣如班書地理志首遂全寫禹貢一篇降為後書持續前史葢以水濟水牀上施牀徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏所載惟録其章名如地理為書論自古風俗至於}

  - {type: variant, offset: 75, length: 0, content: '', SBCK: 不由徑非􅀁聞焉修國史者若旁採異聞用成慱物斯則可矣如班書地理志首遂全冩禹貢一篇降為後書持續前史蓋以水濟水床上施床徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏􅀁載惟録其章名如地理為書論自古風俗至扵}

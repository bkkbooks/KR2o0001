  - {type: variant, offset: 76, length: 1, content: 時, WYG: 世宜云禹貢已詳何必重述古文益其辭費也若夷狄本係種落所興北貊起自淳維南蠻出於槃瓠高句麗以鱉橋獲濟吐谷渾因馬鬭徙居諸如此說者求之歴代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無改葢駢指在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引他事豐其部帙以此稱博異乎吾黨之所聞陸士衡有云雖有愛而必捐善哉斯言可謂達作者之致矣夫能明彼斷限定其折中歴選自古惟蕭子顯近諸然必謂都無其累則吾未之許也編次第十三昔尚書記言春秋記事以日月為逺近年世為前後用使閱之者雁行魚貫皎然可尋至馬遷始錯綜成篇區分類聚班固踵武仍加祖述於其間則有統體不一名目相違朱紫以之混淆冠屨於焉顛倒葢可得而言者矣尋子長之列傳也其所編者惟人而已矣至於龜筴異物不類肖形而輒與黔首同科俱謂之傳不其怪乎且龜筴所記全為志體向若與八書齊列而定以書名庶幾物得其朋同聲相應者矣孟堅每一姓有傳多附出餘親其事跡尤異者則分入他部故博陸去病昆弟非復一篇外戚元后婦姑分為二録至如元王受封於楚至孫戊而亡按其行事所載甚寡而能獨載一卷者實由向歆之助耳但交封漢始地起列藩向居劉末職纔卿士昭穆既疎家國又别適使分楚王子孫於高惠之世與荆代並編析劉向父子於元成之間與王京共列方於諸傳不亦類乎又自古王室雖微天命未改故臺名逃債尚曰周王君未繫頸且云秦國況神璽在握火徳猶存而居攝建年不編平紀之末孺子主祭咸書莽傳之中遂令漢餘數歳湮没無覩求}

  - {type: variant, offset: 75, length: 0, content: '', krp: 不由徑非所聞焉修國史者若旁採異聞用成慱物斯則可矣如班書地理志首遂全冩禹貢一篇降為後書持續前史蓋以水濟水床上施床徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏所載惟録其章名如地理為書論自古風俗至扵}
  - {type: variant, offset: 76, length: 1, content: 時, SBCK: 世宜云禹貢已詳何必重述古文益其辭費也若夷狄本係種落􅀁興北貊起自淳維南蠻出扵盤瓠高句麗以鱉橋􅀗濟􅄍谷渾因馬闘徙居諸如此􅀃者求之歷代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無攺蓋駢指在手不加力扵千鈞附贅居身非廣形扵七尺為史之體有若扵斯苟濫引它事豐其部帙以此稱慱異乎吾黨之􅀁聞陸士衡有云雖有愛而必捐善㦲斯言可謂達作者之致矣夫􅀎明彼斷限定其折中歷選自古惟蕭子顯近諸然必謂都無其累則吾未許也編次第十二昔尚書記言春秋記事以日月為逺近年世為前後用使閱之者鴈行魚貫皎然可尋至馬遷始錯綜成篇區分􅀋聚班固踵武仍加祖述扵其間則有統體不一名目相違朱紫以之混淆􅃣􅋰扵焉顛倒盖可得而言者矣尋子長之列傳也其􅀁編者惟人而已矣至扵龜筴異物不􅀋肖形而輙與黔首同科俱謂之傳不其恠乎且龜筴􅀁記全為志體向若與八書齊列而定以書名庶㡬物得其朋同聲相應者矣孟堅每一姓有傳多出附餘􅀚其事跡􅀹異者則分入它部故慱陸去病昆弟非復一篇外戚元后婦姑分為二録至如元王受封扵楚至孫戊而亡按其行事􅀁載甚寡而􅀎獨載一卷者實由向歆之助耳但交封漢始地啔列藩向居劉末職才卿士昭穆旣踈家國又别適使分楚王子孫扵高惠之世與夫荆代並編析劉向父子扵元成之間與王京共列方扵諸傳不亦􅀋乎又自古王室雖㣲天命未攺故䑓名逃債尚書周王君未繫頸且云秦國况神壐在握火德猶存而居攝建年不編平紀之末孺子主祭咸書莾傳之中遂令漢餘數􅀊湮沒無覩求}

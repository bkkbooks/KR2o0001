  - {type: variant, offset: 0, length: 2, content: 本紀, SBCK: 史通卷}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_004-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 論贊第九春秋左氏傳每有發論假君子以稱之二傳云公羊子榖梁子史記云太史公既而班固曰讚荀恱曰論東觀曰序謝承曰詮陳夀曰評王隱曰議何法盛曰述揚雄曰譔劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號史官所撰通稱史臣其名萬殊其義一揆必取便於時則總歸論焉夫論者所以辯疑惑釋凝滯若愚智共了固無俟商㩁邱明君子曰者其義實在於斯司馬遷始限以篇終各書一論必理有非要則強生其文史論之煩實萌於此夫擬春秋以成史持論尤宜闊略其有}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_WYG_004-1b, image: WYG0685/WYG0685-0026b.png}
  - {type: variant, offset: 0, length: 2, content: 本紀, krp: 史通卷}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 無疑事輒設論以裁之此皆徇筆端茍􅃷文彩嘉辭美句寄諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡泊無味承祚懦緩不切賢才間出隔世同科孟堅辭惟温雅理多愜當其尤美者有典誥之風翩翩弈弈良可詠也仲豫義理雖長失在繁富自茲以降流宕忘返大扺皆華多於實理少於文鼓其雄辭誇其儷事必擇其善者則干寳范曄裴子野是其最也沈約臧榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若袁彦伯之務飾𤣥言謝靈運之虚張高論玉巵無當曽何足云王邵志在簡直言兼鄙野茍得其理遂忘其文觀過知仁斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛於壯夫服綺紈於高士者矣史之有論也蓋欲事無重出省文可知如太史公曰觀張良貌如美婦人耳項羽重瞳豈舜苗裔此則别加他語以補書中所謂事無重出者也又如班固贊曰萬石君之為父浣衣君子非之楊王孫袒葬賢於秦始皇逺矣此則片言如約而諸義甚備所謂省文可知也及後來讚語之作多録}
  - {type: page-break, offset: 1, content: '', id: KR2o0001_WYG_004-2a, image: WYG0685/WYG0685-0027a.png}
  - {type: page-break, offset: 1, content: '', id: KR2o0001_WYG_004-2b, image: WYG0685/WYG0685-0027b.png}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 傳之言其有所異唯加文飾而已至於甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷序傳後歴寫諸篇各叙其意既而班固變為詩體號之曰述范曄改彼述名呼之以贊尋述贊為例篇有一章事多者則約之以使少理小者則張之以令大名實多爽詳略不同且欲觀人之善惡史之褒貶葢無假於此也然固之總述合在一篇使其條貫有序歴然可閱蔚宗後書實同班氏乃各附本事書於卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北史蕭子顯李百藥大唐新修晉史皆依范書誤本篇終有贊夫每卷立論其煩已多而嗣論以贊為黷彌甚亦有文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言茍撰史若斯難與議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈誼范曄之虚美隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故略陳梗槩一言以蔽之序例}
  - {type: page-break, offset: 2, content: '', id: KR2o0001_WYG_004-3a, image: WYG0685/WYG0685-0027c.png}
  - {type: page-break, offset: 2, content: '', id: KR2o0001_WYG_004-3b, image: WYG0685/WYG0685-0027d.png}
  - {type: page-break, offset: 2, content: '', id: KR2o0001_WYG_004-4a, image: WYG0685/WYG0685-0028a.png}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 十孔安國有云序者所以序作者之意也竊以書列典謨詩含比興若不先序其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事為宗至於表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相叅風雅齊列矣逮華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以}
  - {type: xml-element, offset: 4, content: '', id: KR2o0001_tls_004-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR2o0001_tls_004-1a.1}
  - {type: variant, offset: 4, length: 4, content: 昔汲冢竹, SBCK: 内篇論賛序例題目斷限編次稱謂論賛第九春秋左氏傳每有發論假君子以稱之二傳云公羊子􅂖梁子史記云太史公旣而班固曰讃荀恱曰論東觀曰序謝承曰詮陳壽曰評王􅀮曰議何法盛曰述楊雄曰譔劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其􅀁􅃅史官􅀁撰通稱史臣其名萬殊其義一揆必取便扵時者則揔歸論著􅀁以辯疑惑釋凝滯若愚智共了固無俟商㩁丘明君子曰者其義實在扵斯司馬遷始限以篇終各}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_SBCK_004-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 皓為始也嶠言辭簡質叙致温雅味其宗㫖亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜􅃷文彩後來所作他皆若斯於是遷固之道忽諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史所有而我書獨無世之作者以為耻愧故上自晉宋下及陳隋每書必序課成其數葢為史之道以古傳今古既有之今何為者濫觴肇跡容或可觀累屋重架無乃太甚譬夫方朔始為客難續以賓戲解嘲枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者所厭聞老生之恒說也夫史之有例猶國之有法國之無法則上下靡定史之無例則是非莫凖}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_004-4b, image: WYG0685/WYG0685-0028b.png}
  - {type: page-break, offset: 4, content: '', id: KR2o0001_WYG_004-5a, image: WYG0685/WYG0685-0028c.png}
  - {type: variant, offset: 4, length: 4, content: 昔汲冢竹, krp: 内篇論賛序例題目斷限編次稱謂論賛第九春秋左氏傳每有發論假君子以稱之二傳云公羊子糓梁子史記云太史公旣而班固曰讃荀恱曰論東觀曰序謝承曰詮陳壽曰評王隱曰議何法盛曰述楊雄曰譔劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號史官所撰通稱史臣其名萬殊其義一揆必取便扵時者則揔歸論著所以辯疑惑釋凝滯若愚智共了固無俟商㩁丘明君子曰者其義實在扵斯司馬遷始限以篇終各}
  - {type: variant, offset: 5, length: 3, content: 汲冢竹, WYG: 夫子修經始發凡例左氏立傳顯其區域科條一辨彪炳可觀降及戰國迄乎有晉年逾五百史不乏才雖其體屢變而斯文終絶唯令昇先覺逺述邱明重立凡例勒成晉紀鄧孫已下遂躡其蹤史例中興於斯為盛若沈宋之志序蕭齊之序録雖皆以序為名其實例也必定其臧否徵其善惡干寳范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文傷蹇躓而義甚優長斯一二家皆序例之美者夫事不師古匪說攸聞茍模楷曩賢理非可諱而魏収作例全取蔚宗貪天之功以為已力異夫范依叔駿班習子長攘袂公行不䧟穿窬之罪也葢凡例既立當與紀傳相符按唐朝晉}
  - {type: page-break, offset: 5, content: '', id: KR2o0001_WYG_004-5b, image: WYG0685/WYG0685-0028d.png}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 一論必理有非要則強生其文史論之煩實萌扵此夫擬春秋以成史持論􅀹宜闊畧其有本無疑事輙誤論以裁之此皆􅀻徇筆端苟􅃷文彩嘉辭羙句􅀉諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡薄無味承祚懦緩不切賢才間出隔世同科􅺖堅辭惟温雅理多愜當其􅀹羙者有典誥之風翩翩弈弈良可詠也仲豫義理雖長失在繁富自茲已降流宕忘返大扺皆華多扵實理少扵文鼓其雄辭誇其儷事必擇其善者則于寳范曄裴子野}
  - {type: page-break, offset: 9, content: '', id: KR2o0001_SBCK_004-2a}
  - {type: variant, offset: 9, length: 1, content: 是, WYG: 例云凡天子廟號惟書於卷末依撿孝武崩後竟不言廟}
  - {type: variant, offset: 9, length: 0, content: '', krp: 一論必理有非要則強生其文史論之煩實萌扵此夫擬春秋以成史持論尤宜闊畧其有本無疑事輙誤論以裁之此皆私徇筆端苟衒文彩嘉辭羙句寄諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡薄無味承祚懦緩不切賢才間出隔世同科􅺖堅辭惟温雅理多愜當其尤羙者有典誥之風翩翩弈弈良可詠也仲豫義理雖長失在繁富自茲已降流宕忘返大扺皆華多扵實理少扵文鼓其雄辭誇其儷事必擇其善者則于寳范曄裴子野}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 其最也沈約􅆇榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若􅀽彦伯之務歸玄言謝靈運之虚張髙論玉巵無當曾何足云王邵志在簡􅈂言兼鄙野苟得其理遂忘其文觀過知人斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛扵壯夫服綺紈扵髙士者矣史之有論也蓋欲事無重出省文可知如太史公}
  - {type: page-break, offset: 10, content: '', id: KR2o0001_SBCK_004-2b}
  - {type: variant, offset: 10, length: 0, content: '', krp: 其最也沈約臧榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若袁彦伯之務歸玄言謝靈運之虚張髙論玉巵無當曾何足云王邵志在簡直言兼鄙野苟得其理遂忘其文觀過知人斯之謂矣大唐修晉書作者皆當代詞人逺棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛扵壯夫服綺紈扵髙士者矣史之有論也蓋欲事無重出省文可知如太史公}
  - {type: punctuation, offset: 11, content: 《, id: KR2o0001_tls_004-bkkpn1}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 觀張良貌如羙婦人耳項羽重瞳豈舜苖裔此則别加他語以􅀘書中􅀁謂事無重出者也又如班固賛曰萬石君之為父浣衣君子非之楊王孫祼葬賢扵秦始皇逺矣此則片言如約而諸義甚備􅀁謂省文可知也及後来讚語之作多録}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_SBCK_004-3a}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 烈宗又按百藥齊書例云人有本字行者今並書其名依撿如高愼斛律光之徒多所仍舊謂之仲宻明月此並非言之難行之難也及晉齊史例皆云坤道卑柔中宮不可為}
  - {type: page-break, offset: 11, content: '', id: KR2o0001_WYG_004-6a, image: WYG0685/WYG0685-0029a.png}
  - {type: variant, offset: 11, length: 0, content: '', krp: 觀張良貌如羙婦人耳項羽重瞳豈舜苖裔此則别加他語以𥙷書中所謂事無重出者也又如班固賛曰萬石君之為父浣衣君子非之楊王孫祼葬賢扵秦始皇逺矣此則片言如約而諸義甚備所謂省文可知也及後来讚語之作多録}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 傳之言其有􅀁異唯加文飾而已至扵甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷序傳後歷冩諸篇各叙其意旣而班固變為詩體􅃅之曰述范曄攺徃述名呼之以賛尋述賛為例篇有一章事多者則約之以使少理小者則張之以令大名實多爽詳畧不同且欲觀人之善惡史之褒貶蓋無假扵此然固之緫述合在一篇使其條貫有序歷然可閱蔚宗後書實同班氏乃各附本事書扵卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北史李百藥蕭子顯大唐新修晉史皆依范書誤本篇終有賛夫每卷立論其煩已多而嗣論以賛為黷彌甚亦猶文士製碑序終而續以銘曰釋氏演法義盡而宣以偈言苟撰史若斯難與議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈􅁩范曄之虚羙隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍􅂉言傷其實或擬非其倫必備加擊難則五車難盡故畧陳梗槩一言以蔽之序例第十孔安國有云序者􅀁以序作者之意也竊以書列典謨詩含比興􅀂不先叙其意難以曲得其情故每篇有序敷暢厥義降逮史漢以記事為宗至扵表志雜傳亦時復立序文兼史體狀若子書然可與誥誓相叅風雅齊列矣迨華嶠後漢多同班氏如劉平江革等傳其序先言孝道次述毛義養親此則前漢王貢傳體其篇以四皓為始也嶠言辭簡質叙致温雅味其宗㫖亦孟堅之亞歟爰洎范曄始革其流遺棄史才矜􅃷文彩後來􅀁作他皆若斯扵是遷固之道怱諸微婉之風替矣若乃后妃列女文苑儒林凡此之流范氏莫不列序夫前史􅀁有而我書獨無世之作者以為恥愧故上自晉宋下及陳隋每書必序課成其數蓋為史之道以古傳今古旣有之今何為者濫觴肇跡容􅂉可觀累屋重起無乃太甚譬夫方朔始為客難續以賔戯觧嘲枚乘首唱七發加以七章七辨音辭雖異㫖趣皆同此乃讀者􅀁厭聞老生之恒􅀃也夫史之有例猶國之有法國之無法則上下靡定史之無例則是非莫官蓋夫子作經始發凡例左氏立傳顯其區域科條之辯彪炳可觀降及戰國迄乎有晉}

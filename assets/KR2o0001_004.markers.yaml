  - {type: variant, offset: 39, length: 3, content: 莫過於, krp: 扵曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見它記則無宜重述故子嬰降沛其詳取驗扵秦紀伯符死漢其事斷入扵呉書沈錄金行上覊劉主魏刋水運下列高王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左旣承正朔斥彼魏胡故互相有錄索虜成傳魏本出扵雜種竊亦自號眞君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比扵群盗盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之扵傳何厚顔之甚耶又張李諸姓據有凉蜀其扵魏也校年則前後不接論地則參商有殊何預魏氏而横加編載夫尚書者七經之冠冕百氏之襟䄂凢學者必先精}
  - {type: variant, offset: 43, length: 29, content: 乎及司馬遷之著史記也又列天子行事以本紀名篇後世因之守而勿失, SBCK: 書次覽羣籍}
  - {type: variant, offset: 43, length: 2, content: 乎及, WYG: 切以周易六爻義存象内春秋萬國事具傳中讀者硏尋篇終自曉何必開帙解帶便令昭然滿目也自茲以降多師蔚宗魏収因之則又甚矣其有魏世隣國編於魏史者於其人姓名之上又列之以邦域申之以職官至如江東帝王則云僣晉}

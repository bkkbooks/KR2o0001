  - {type: variant, offset: 13, length: 1, content: 呂, SBCK: 逾五百史豈乏才雖其體屡變而斯文終絶惟令升先覺逺述丘明重立凢例勒成晉紀鄧孫已下遂躡其蹤史例中興於斯為盛若沈宋之志序蕭齊之序録雖皆以序為名其實例也必定其臧否徴其善惡于寳范曄理切而多功鄧粲道鸞詞煩而寡要子顯雖文塲蹇躓而義甚優長斯一二家皆序例之羙者夫事不師古匪􅀃攸聞苟摸楷曩賢理非可諱而魏収作例全取蔚宗貪天之功以為已力異夫范依政駿班習子長攘袂公行不䧟穿窬之罪也蓋凡例旣立當與紀傳相符按唐朝晉書例云凡天子廟􅃅惟書扵卷末依檢孝武崩後竟不言廟曰烈宗又按百藥齊書例云人有本字行者今並書其名依撿如高愼斛律光之徒多􅀁仍􅃇謂之仲宻明月此並非言之難行之難也及晉齊史例皆云坤道卑柔中宮不可為紀今編同列傳以戒牝雞之晨切惟録皇后者旣為傳體自不可加以紀名二史之以后為傳雖云允惬而解釋非理成其偶中􅀁謂􅀞蛇而加足反失杯中之酒也至扵題目失據褒貶多違斯並散在諸篇此可得而略矣題目第十一上古之書有三墳五典八索九丘其次有春秋尚書檮杌志乗自漢已下其流漸繁大抵史名多以書記紀略為主後生祖述各從􅀁好㳂革相因循環逓習蓋區域有限莫踰扵此焉至孫盛有魏}

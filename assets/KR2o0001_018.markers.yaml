  - {type: variant, offset: 13, length: 1, content: 帝, krp: 行及新序説苑列女神仙諸傳而皆廣陳虚事多搆偽辭非其識不周而才不足盖以世人都可欺故也嗚呼後生可畏何代無人而輙輕忽若斯者哉夫傳聞失真書事失實盖事有不獲巳人所不能免也至於故為異説以惑後來則過之尤甚者矣按蘇秦荅燕易王稱有婦人将殺夫令妾進其藥酒妾佯僵而覆之又甘茂謂蘇氏云貧人女與富人女㑹績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用蘇氏之説為二婦人立傳定其邦國加其姓氏以彼烏有特為指實何其妄哉又有甚於此者至如伯竒化鳥對吉甫以哀鳴宿瘤隱形干齊王而作后此則不附於物理者矣復有懷嬴失節目為貞女劉安覆族定以登仙立言如是豈顧丘明之有傳孟堅之有史哉楊雄法言好論司馬遷而不及左丘明常稱左氏傳惟有品藻二言而已是其鍳物有所不明者也且雄哂子長愛竒多雜又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦則云鞭宓妃云云劉勰文心已議之矣然則文章小道無足致嗤觀其蜀主本紀稱杜魄化而為䳌荆屍變而為鱉其言如是何其鄙哉所謂非言之難而行之難也夫十室之邑必有忠信欲求不朽弘之在人何者交阯遠居南裔越裳之俗也燉煌僻處西域昆戎之鄉也求諸人物自古闕載盖由地居下國路絶上京史官注記所不能及也既而士燮著録劉炳裁書則磊落英才粲然盈瞩者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知著述之功其力大矣豈與夫詩賦小技校其優劣者哉自戰國已下詞人屬文皆偽立客主假相詶荅至於屈原離騷辭稱遇漢父於江渚宋玉高唐賦云夢神女於陽臺夫言並文章句結音韻以兹敘事足驗憑虚而司馬遷習鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚邪必如是則馬卿遊梁枚乘讃其顔色曹植至洛宓妃覩於岩畔撰魏史者亦宜編為實録矣嵇康撰高士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假説而定為實録斯以謬矣況此二漁父者較年則前後别時論地則南北殊壤而輙併之為一豈非惑哉茍如是則蘇代所言雙禽蚌鷸此亦漁父之一事何}

  - {type: variant, offset: 767, length: 114, content: 及隋氏受命海內爲家國靡愛憎人無彼我而世有撰隋書經籍志者其流別羣書還依阮錄案國之有僞其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧爲附庸之主而揚雄撰蜀紀子貢著越絕虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可類聚相從合成一部何止取東晉一世, SBCK: 通卷第}

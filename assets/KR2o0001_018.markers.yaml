  - {type: variant, offset: 7, length: 0, content: '', krp: 必矜其美辭愛而不棄則宜㣲有改易列於百官公卿表後庶尋文究理頗相附㑹以兹編録不猶愈乎又沈侯謝靈運傳論全説文躰備言音律此正可為翰林之補亡流别之總説耳虞撰文章流别集季充撰翰林論摯如次諸史傳實為乖越陸士衡有云離之則雙羙合之則兩傷信矣哉其有事可書而不書者不應書而書者至如班固敘事㣲小必書至高祖破項垓下斬首八萬曽不渉言李齊扵後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以伐奚於邊疆小冦無不畢紀如司馬消難擁數州之地以叛曽不挂言略大舉小其流非一昔劉勰有云自卿雲已前多役才而不課學向雄已後頗引書以助天然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典麗良由才乏天然故事資虚飾者矣按宋書稱武帝入闗以鎮惡不伐遠方馮異於渭濵遊覧追想太公夫以宋祖無學愚智所委安能援引古事以詶荅羣臣者乎斯不然矣更有甚於此者覩周齊二國俱出隂山必言類互鄉則宇文尤甚漢兒夫以献武普嗣未變胡俗按王邵齊志宇文公呼高祖曰以華夏則知其言不逮於齊遠矣王宋所載其鄙甚多矣周帝仍因之而牛弘王邵並掌䇿書其載齊言也則淺俗如彼其載周言也則文雅若此夫如是何哉非兩邦有夷夏之殊由二史有虚實之異故也夫以記宇文之言而動遵經典多依史漢帝曰蕭繹可謂天之周史述太祖論梁元太祖怒曰何為間我骨肉生此貝錦此並六經所廢誰能興之者乎又宇文則為汾州或譖之}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 國志之辭也其餘言皆如此豈是宇文之語之言也又曰榮權吉士也寡人與之言無二此魏長孫儉謂宇文曰}
  - {type: variant, offset: 8, length: 0, content: '', krp: 國志之辭也其餘言皆如此豈是宇文之語之言也又曰榮權吉士也寡人與之言無二此魏長孫儉謂宇文曰}
  - {type: variant, offset: 9, length: 1, content: 各, SBCK: 琛眼睛全不轉公曰瞎耶又按裴政大梁太清實録稱元帝使王琛聘相類可謂真宇文之言無愧於實録矣收使癡人來豈得怨我此言與王宗所載此何}
  - {type: variant, offset: 9, length: 1, content: 各, krp: 琛眼睛全不轉公曰瞎耶又按裴政大梁太清實録稱元帝使王琛聘相類可謂真宇文之言無愧於實録矣收使癡人來豈得怨我此言與王宗所載此何}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 荘子述鮒魚之對而辨類蘇張賈生敘鵩鳥之辭而文同屈宋施於寓言則可求諸實録則否矣世稱近史編語之語也謂言語惟周多美辭夫以博採古文而聚成今説是則俗之所傳有鷄九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而其事悉虚無豈可便謂南董之才宜居班馬之職也自梁室云季雕䖝道長已後謂太清平頭上尾尤忌於時對語麗辭盛行於俗始自江外被於洛中而史之載言亦同於此曰文叔得王郎降而隗囂滅安何之元梁典稱議納侯景高祖盜梁主必不捨其諡號呼以姓名此由湏對語世用羊祜之言而孫皓平夫漢晉之君事殊僣在予不及子孫知復何恨夫變我稱予互文成儷故也又姚最梁畧稱高祖曰得旣在我失亦又蕭韶太清記曰云云温子昇永安故事言帝句求諸人語理必不然此由避平頭上尾故也苦之極下傷人理此語皆非簡要而徒積字成朱世隆之攻没建州也怨痛之響上徹天閽酸靡或字湏偶對此之為害其流甚多文並由避聲對之為患也或聲從流假有辨如酈叟吃若周昌子羽修飾而言仲由率爾而對莫不拘以文禁一槩而書必求實録多見其妄矣夫晉宋已前帝王傳授始自錫命終於登極其間牋疏欵曲詔䇿頻煩雖事皆偽迹言並飾譲猶能備其威儀陳其文物俾}

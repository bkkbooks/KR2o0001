  - {type: variant, offset: 0, length: 2, content: 因習, SBCK: 史通卷}
  - {type: page-break, offset: 0, content: '', id: KR2o0001_SBCK_018-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 諸史六條夫盛服飾者以珠翠為先工繢事者以丹青為主至若錯綜乖所分布失宜則綵絢雖多巧妙不足者矣其一條觀班氏公孫𢎞傳賛直言漢之得人盛於武宣二代至於平津善惡寂滅無覩持論如是其義靡聞必矜其美辭愛而不棄則宜㣲有改易列於百官公卿表後庶尋文究理頗相附㑹以兹編録不猶愈乎其二條又沈侯謝靈運傳論全説文體偹言音律此正可為翰林之補亡流别之總説耳季充撰翰林論摯虞撰文章流别集如次諸史傳實為乖越陸士衡有云離之則雙美合之則兩傷信矣哉其有事可書而不書者不應書而書者至如班固敘事㣲小必書至高祖破項垓下斬首八萬曽不渉言李齊與後主紀則書幸於侍中穆提婆第於孝昭紀則不言親戎以伐奚於邊疆小冦無不畢紀如司馬消難擁數州之地以叛曽不挂言略大舉小其流非一昔劉勰有云自卿雲已前多役才而不課學向雄已後頗引書以助文然近史所載亦多如是故雖有王平所識僅通十字霍光無學不知一經而述其言語必稱典誥良由才乏天然故事資虚飾者矣其三條按宋書稱武帝入闗以鎮惡不伐遠方馮異於渭濵遊覧追想太公夫以宋祖無學愚智所委安能援引古事以詶荅羣臣者乎斯不然矣更有甚於此者覩周齊二國俱出隂山必言類互鄉則宇文尤甚按王邵齊志宇文公呼高祖曰漢兒夫以獻武普嗣未變胡俗王宋所載其鄙甚多矣周帝仍}

  - {type: variant, offset: 0, length: 2, content: 因習, krp: 史通卷}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 之以華夏則知其言不逮於齊遠矣而牛𢎞王邵並掌䇿書其載齊言也則淺俗如彼其載周言也則文雅若此夫如是何哉非兩邦有夷夏之殊由二史有虚實之異故也夫以記宇文之言而動遵經典多依史漢周史述太祖論梁元帝而曰蕭繹可謂天之所廢誰能興之者乎又宇文測為汾州或譛之太祖怒曰何謂間我骨肉生此貝錦此並六經之言也又曰榮權吉士也寡人與之言無二此三國志之辭也其餘言皆如此豈是宇文之語耶又按裴政梁太清實録稱元帝使王琛聘魏長孫儉謂宇文曰王琛眼睛全不轉公曰瞎奴使癡人來豈得怨我此言與王宗所載相類可謂真宇文之言無愧於實録矣此何異荘子述鮒魚之對而辨類蘇張賈生敘鵩鳥之辭而文同屈宋施於寓言則可求諸實録則否矣其四條世稱近史編語謂言語之語也惟周多美辭夫以博採古文而聚成今説是則俗之所傳有雞九錫酒孝經房中志醉鄉記或師範五經或規模三史雖文皆雅正而其事悉虚無諸本作在字宋本作其字豈可便謂南董之才宜居班馬之職也自梁室云季雕蟲道長謂太清已後平頭上尾尤忌於時對語麗辭盛行於俗始自江外被於洛中而史之載言亦同於此何之元梁典稱議納侯景高祖曰文叔得王郎降而隗囂滅安世用羊祜之言而孫皓平夫漢晉之君事殊僣盜梁主必不捨其諡號呼以姓名此由湏對語麗辭故也又姚最梁略稱高祖曰得旣在我失亦在予不及子孫知復何恨夫變我稱予互文成句求諸人語理必不然此由避平頭上尾故也又蕭韶太清記曰云云温子昇永安故事言爾朱世隆之攻没建州日怨痛之響上徹青天酸苦痛極下傷人理此語皆非簡要而徒積字成文並由避聲對之為患也或聲從流靡或語湏偶對此之為害其流甚多假有辨如酈叟吃若周昌子羽修飾而言仲由率爾而對莫不拘以文禁一槩而書必求實録多見其妄矣其五條夫晉宋已前帝王傳授始自錫命終於登極其間牋疏欵曲詔䇿頻煩雖事皆偽迹言並飾譲猶能偹其威儀陳其文物俾禮容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荆州假稱宣德之令江陵之建業地濶􅁆千餘里宣德皇后下令旬日必至以此而言其偽可見或書成并部虚云孝靖之勑凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要剪截浮辭者哉但二蕭陳隋諸史通多失此晉魏及宋自創業後稱公王即帝位皆􅁆十年間事耳夫功德日盛稍進累遷足驗禮容不欺揖遜無失自齊梁已降稱王公及即帝位皆不出旬月之中耳夫以廹促如是則於禮儀何有者哉又按北齊文宣帝将受魏禪宻撰錫遜勸進㫁表又詔入奏請注一時頓盡則始知無前後節文等差降殺惟王邵所撰齊志獨無是焉夫以累易古人以為嗤如彦淵之改魏收也以非易非彌見其失矣而撰隋文史者稱澹大矯收失者何哉且以澹置書方於君懋豈惟其間可容􅁆人而已史臣美澹而譏邵者隋史每論皆云史臣曰今故因其成事呼為史臣豈所謂通鍳乎語曰蝉翼為重千鈞為輕其斯之謂矣其六條别傳九條劉向列女傳云夏姬再為夫人三為王后夫為夫人則難以驗也為王后則㫁可知矣按其時諸國稱王惟楚而已如巫臣諫荘將納姬氏不言曽入楚宫則其為后當在周室蓋周德雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於吴謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其闕如雜記曰夫人之不命於天子自魯昭公始也又以女子一身而作嬪三代求諸人事理必不然尋夫春秋之後國稱王者有七蓋由向誤以夏姬之生當夫戰國之世稱三為王后者謂厯嬪七國諸王校以年代殊為􅆾剌至於他篇兹例甚衆故論楚也則昭王與秦穆同時言齊也則晏嬰居宋景之後列女傳曰齊傷槐女景公時人謂晏子曰昔景公之時大旱三年夫謂宋景為昔即居其後今粗舉一二其流可知其一條觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鍳者矣及自造洪範五行及新序説苑列女神仙諸傳而皆廣陳虚事多搆偽辭非其識不周而才不足蓋以世人都可欺故也嗚呼後生可畏何代無人而輙輕忽若斯者哉夫傳聞失真書事失實蓋事有不獲巳人所不能免也至於故為異説以惑後來則過之尤甚者矣其二條按蘇秦荅燕易王稱有婦人将殺夫令妾進其藥酒妾佯僵而覆之又甘茂謂蘇氏云貧人女與富人女㑹績曰無以買燭而子之光有餘子可分我餘光無損子明此並戰國之時遊説之士寓言設理以相比興及向之著書也乃用蘇氏之説為二婦人立傳定其邦國加其姓氏以彼烏有持為指實何其妄哉又有甚於此者至如伯竒化鳥對吉甫以哀鳴宿瘤隱形干齊王而作后此則不附於物理者矣復有懷嬴失節目為貞女劉安覆族定以登仙夫言如是豈顧邱明之有傳孟堅之有史哉其三條揚雄法言好論司馬遷而不及左邱明常稱左氏傳惟有品藻二言而已是其鍳物有所不明者也且雄哂子長愛竒多雜又曰不依仲尼之筆非書也自序又云不讀非聖之書然其撰甘泉賦則云鞭宓妃云云劉勰文心已議之矣然則文章小道無足致嗤觀其蜀主本紀稱相魄化而為䳌荆屍變而為鱉其言如是何其鄙哉所謂非言之難而行之難也其四條夫十室之邑必有忠信欲求不朽𢎞之在人何者交趾遠居南裔越裳之俗也燉煌僻處西域昆戎之鄉也求諸人物自古闕載蓋由地居下國路絶上京史官注記所不能及也既而士燮著録劉炳裁書則磊落英才粲然盈矚者矣向使兩賢不出二郡無記彼邊隅之君子何以取聞於後世乎是知著述之功其力大矣豈與夫詩賦小技校其優劣者哉其五條自戰國已下詞人屬文皆偽立客主假相詶荅至於屈原離騷辭稱遇漢父於江渚宋玉高唐賦云夢神女於陽臺夫言並文章句結音韻以兹敘事足驗憑虚而司馬遷}

  - {type: variant, offset: 12, length: 0, content: '', SBCK: 容可識朝野具瞻逮於近古我則不暇至如梁武之居江陵齊宣之在晉陽或文出荆州假稱德宣之令之建江陵旬日必至以此而言其偽可見業地濶􅁆千餘里德宣皇后下令或書成并部虚云孝靖之勅凡此文誥本不施行必也載之起居編之國史豈所謂撮其機要剪截浮辭者哉但二蕭陳隋諸史通多失此業後稱公王即晉魏及宋自創足驗也禮容不欺揖遜無失自齊梁已降稱王帝位皆􅁆十年間事耳夫功德日盛秩進累遷是則於禮儀何有者哉又按北齊文宣帝将受公及即帝位皆不出旬月之中耳夫以廹促如頓盡則始知無前後節文等差降殺也魏禪宻撰錫遜勸進㫁表文詔入奏請注一時唯王邵所撰齊志獨無是焉夫以累易古人以為辭如彦淵之改魏收也以非易非彌見其失矣而撰隋文史者稱澹大矯收失者何哉且以澹著書方於君懋豈唯其間可容􅁆人而已史臣美澹而譏劭者因其成事呼為史臣隋史每論皆云史臣今故豈所謂通鍳乎語曰蝉翼為重千鈞為輕其斯之謂矣别傳九條劉向列女傳云夏姬再為夫人三為王后夫為夫人則難以驗也為王后則㫁可知矣按其時諸國稱王惟楚而已如巫臣諫荘將納姬氏不言曽入楚宫則其為后當在周室盖周惪雖衰猶稱秉禮豈可族稱姬氏而妻厥同姓者乎且魯娶於吴謂之孟子聚麀之誚起自昭公未聞其先已有斯事禮之所載何其缺如人之不命雜記曰夫魯昭公也於天子自又以女子一身而作嬪三代求諸人事理必不然尋夫春秋之後國稱王者有七盖由向悮以夏姬之生當夫戰國之世稱三為王后者謂歴嬪七國諸王校以年代殊為􅆾剌至於他篇兹例甚衆故論楚也則昭王與秦穆同時言齊也則晏嬰居宋景之後槐女景公時人列女傳曰齊傷年夫謂宋景為昔即居其後謂晏子曰昔景公時大旱三今粗舉一二其流可知觀劉向對成帝稱武宣行事世傳失實事具風俗通其言可謂明鍳者矣及自造洪範}

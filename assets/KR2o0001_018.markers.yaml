  - {type: variant, offset: 882, length: 248, content: 有六家而已乎夫王室將崩霸圖云構必有忠臣義士捐生殉節若乃韋耿謀誅曹武欽誕問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於孝靖之末王謙尉迥玉折於宇文之季而李刊齊史顏述隋篇時無逼畏事須矯枉而皆仍舊不改謂數君爲叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盜葛龔所作而進之既具錄他文不知改易名姓時人謂之曰作奏雖工宜去葛龔及邯鄲氏撰笑林載之以爲口實嗟乎歷觀自古此類尤多其有宜去而不去者豈直葛龔而已何事於斯獨致解頤之誚也凡爲史者茍能識事詳審措辭精密舉一隅以三隅反告諸往而知諸來斯庶幾可以無大過矣, SBCK: 八}

  - {type: variant, offset: 2, length: 12, content: 第十八蓋聞三王各異禮五帝, WYG: 鑿齒之徒皆採為逸事編諸史籍疑誤後學不其甚耶必如是則馬卿遊梁枚乘讃其好色曹植至洛宓妃覩於巖畔撰魏史者亦宜編為實録矣其六條嵇康撰高士傳取莊子楚辭二漁父事合成一篇夫以園吏之寓言騷人之假説而定為實録斯已謬矣況此二漁父者校年則前後别時論地則南北殊壤而輙併之為一豈非惑哉茍如是則蘇代所言雙禽蚌鷸此亦漁父之一事何}

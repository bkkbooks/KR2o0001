  - {type: variant, offset: 19, length: 0, content: '', krp: 乎必惟取褕裌緇帷之林濯纓滄浪之水彌見其未學也胥所遇渡水蘆中斯並蘇代所言雙禽鷸􅑕伍濯纓滄浪之水若斯而已也漁父善事亦可同歸二録何止䄖裌緇帷之林莊周著書以寓言為主嵇康述高士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相憐鷽鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記並可引為真事矣夫識理如此何為而薄周孔哉杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也李陵集有與蘇武書詞彩壮麗音句流靡觀其文體不類西漢人殆後來所為假}
  - {type: variant, offset: 20, length: 2, content: 因俗, SBCK: 陵作也遷史缺而不載良有以焉雜説十條夫自古之學者談稱多矣精於公羊者尤憎左氏習於太史者則偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣觀世之學者或躭翫一經或專精一史談春秋者則不知宗周既殞而人有六雄論史漢者則不悮劉氏云亡而地分三國亦猶武陵隱士遁迹桃源當此晉年猶謂􅁀秦之地也假有學窮千載書總五車見良直而不覺其善逢牴牾而不知其失葛洪所謂藏書之箱篋五經之主人而夫子有云雖多亦安用為其斯之謂也夫鄒好長纓齊珍紫服斯皆一時所尚非百王不}
  - {type: page-break, offset: 20, content: '', id: KR2o0001_SBCK_018-9b}
  - {type: page-break, offset: 20, content: '', id: KR2o0001_SBCK_018-10a}
  - {type: variant, offset: 20, length: 2, content: 因俗, WYG: 陵作也缺而不載良有以焉遷史編於李傳中斯為繆矣遷史李傳無此書恐誤記耳其九條雜説十條夫自古之學者談稱多矣精於公羊者尤憎左氏習於太史者則偏嫉孟堅夫能以彼所長而攻此所短持此之是而述彼之非兼善者鮮矣其一條又觀世之學者或躭翫一經或專精一史談春秋者則不知宗周既殞而人有六雄論史漢者則不悟劉氏云亡而地分三國亦有武陵隱士滅迹桃源滅一作遁當此晉年猶謂㬥秦之地也假有學窮千載書總五車見良直而不覺其善逢抵捂而不知其失葛洪所謂藏書之箱篋五經之主人而夫子有云雖多亦安用為其斯之謂也其二條夫鄒好長纓齊珍紫服斯皆一時所尚非百王不}

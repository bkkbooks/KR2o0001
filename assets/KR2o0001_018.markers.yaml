  - {type: variant, offset: 788, length: 184, content: 隋書經籍志者其流別羣書還依阮錄案國之有僞其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭詧爲附庸之主而揚雄撰蜀紀子貢著越絕虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王室將崩霸圖云構必有忠臣義士捐生殉節若乃韋耿謀誅曹武欽誕問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於孝靖之末王謙尉迥玉折於宇文之季而李刊齊史顏述隋, WYG: 外}

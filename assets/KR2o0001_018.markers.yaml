  - {type: variant, offset: 19, length: 0, content: '', SBCK: 乎必惟取褕裌緇帷之林濯纓滄浪之水彌見其未學也胥所遇渡水蘆中斯並蘇代所言雙禽鷸􅑕伍濯纓滄浪之水若斯而已也漁父善事亦可同歸二録何止䄖裌緇帷之林莊周著書以寓言為主嵇康述高士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相憐鷽鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記並可引為真事矣夫識理如此何為而薄周孔哉杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也李陵集有與蘇武書詞彩壮麗音句流靡觀其文體不類西漢人殆後來所為假}
  - {type: page-break, offset: 19, content: '', id: KR2o0001_SBCK_018-9a}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 乎必惟取褕袟緇帷之林濯纓滄浪之水彌見其末學也蘇代所言雙禽鷸畔伍胥所遇渡水蘆中斯並漁父善事亦可同歸一録何止褕袟緇帷之林濯纓滄浪之水若斯而已也莊周著書以寓言為主嵇康述高士傳多引其虚辭至若神有混沌編諸首録茍以此為實則其流甚多至如蛙鱉競長蚿蛇相憐鷽鳩笑而後言鮒魚忿以作色向使康撰幽明録齊諧記並可引為真事矣夫識理如此何為而薄周孔哉其七條杜元凱撰列女記博採經籍前史顯録古老明言而事有可疑猶闕而不載斯豈非理存雅正心嫉邪僻者乎君子哉若人也長者哉若人也其八條李陵集有與蘇武書詞彩壮麗音句流靡觀其文體不類西漢人殆後來所為假}

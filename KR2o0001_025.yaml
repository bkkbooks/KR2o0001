body:
  text: 曲筆第二十五肇有人倫是稱家國父父子子君君臣臣親疏既辨等差有別蓋子為父隱直在其中論語之順也略外別內掩惡揚善春秋之義也自茲已降率由舊章史氏有事涉君親必言多隱諱雖直道不足而名教存焉其有舞詞弄札飾非文過若王隱虞預毀辱相凌子野休文釋紛相謝一作射誤用舍由乎臆說威福行乎筆端斯乃作者之丑行人倫所同疾也亦有事每憑虛詞多烏有或假人之美藉為私惠或誣人之惡持報己仇若王沈魏録濫述貶甄之詔陸機晉史虛張拒葛之鋒班固受金而始書陳壽借米而方傳此又記言之奸賊載筆之凶人下字忒狠雖肆諸市朝投畀豺虎可也然則史之不直代有其收書茍其事已彰則今無所取謂前人說過其有往賢之所未察來者之所不知今略廣異聞用標先覺案后漢書更始傳稱其懦弱也其初即位南面立朝群臣羞愧流汗刮席不敢視夫以聖公身在微賤已能結客報仇避難緑林名為豪杰安有貴為人主而反至于斯者乎將作者曲筆阿時獨成光武之美諛言媚主用雪伯升之怨也且中興之史出自東觀或明皇即明帚所定或馬后攸刊而炎祚靈長簡書莫改遂使他姓追撰空傳僞録者矣陳氏國志劉后主傳云蜀無史職故災祥靡聞案黃氣見于姊歸群鳥墮于江水成都言有景星出益州言無宰相氣若史官不置此事從何一作何從而書一多之字蓋由父辱受髡故加茲謗議者也古者諸侯并爭勝負無恆而他善必稱已惡不諱逮乎近古一作世無聞至公國自稱一作謂為我長家相謂為彼短而魏收以元氏出于邊裔見侮諸華遂高自標舉比桑乾元魏開國處于姬漢之國曲加排抑同建鄴于蠻貊之邦夫以敵國相仇交兵結怨載諸移檄庸可致誣列諸緗素謂史難為妄說茍未達此義安可言于史邪夫史之曲筆誣書句不過一二句語其罪負一作負罪為失已多而魏收雜以寓言殆將過半固以王本作知倉頡已降罕見其流而李氏齊書稱為實録者何也蓋以重規李百藥字亡考未達伯起以公輔相加字出大名一誤作若事同元嘆既無德不報故舊多以字虛美相酬然必謂昭公知禮吾不信也語曰明其為賊敵乃可服如王劭之抗詞不撓可以方駕古人而魏書持論激揚稱其有慚正直夫不彰其罪謂于劭所著諸史無所指實而輕肆其誅此所謂兵起無名難為制勝者尋此論之作蓋由君懋書法不隱取咎當時或有假手史臣以復私門之恥不然何惡直丑正盜憎主人之甚乎蓋霜雪交下始見貞松之操國家喪亂方驗忠臣之節若漢末之董承耿紀曲在魏晉初之諸葛毋一作毌音貫丘曲在晉齊興而有劉秉一訛作康袁粲曲在齊周滅而有王謙尉迥曲在隋斯皆破家殉國視死猶生而歷代諸史皆書之曰逆將何以激揚名教以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董有靈必切齒于九泉之下矣自梁陳已降隋周而往諸史皆貞觀年中群公所撰近古易悉情僞可求至如朝廷貴臣必父祖有傳考其行事皆子孫所為而訪彼流俗詢諸故老事有不同言多爽實昔秦人不死驗苻生之厚誣蜀老猶存知葛亮之多枉斯則自古所嘆豈獨于今哉蓋史之為用也記功司過彰善疸惡得失一朝榮辱千載茍違斯法豈曰能官但古來唯聞以直筆見誅不聞以曲詞獲罪是以隱侯沈約宋書多妄蕭武梁武知而勿尤伯起魏史不平齊宣覽而無遺故令史臣得愛憎由己高下在心進不憚于公憲退無愧于私室欲求實録不亦難乎嗚呼此亦有國家者所宜懲革也篇末歸到功罪失平勸懲倒置斯為探本深言益透前篇寄慨隱衷

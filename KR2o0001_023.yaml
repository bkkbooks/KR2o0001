body:
  text: 品藻第二十三蓋聞方以類聚物以群分薰蕕不同器梟鸞不比翼若乃商臣冒頓南蠻北狄萬里之殊也伊尹霍光殷年漢日千載之隔也而世之稱悖逆則云商冒論忠順則曰伊霍者何哉蓋厥迹相符則雖隔越為偶奚必差肩接一作步武方稱連類者乎史氏自遷固作傳始以品匯相從然其中或以年世迫促或以人物寡鮮求其具體必同不可多得是以韓非老子共在一篇董卓袁紹無聞二録豈非韓老俱稱述者書有子名韓非子老子袁董并曰英雄生當漢末用此為斷粗得其倫亦有厥類衆夥宜為流別而不能定其同科申其異品用使蘭艾相雜朱紫不分是誰之過歟蓋史宮之責也案班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚高其義甚愜及至篇中所列奚不類于其敘哉若孔門達者顏稱殆庶至于他子難為等衰通差今乃先伯牛而后曾參進仲弓而退冉有原注伯牛仲弓并在第二等曾參冉有并在第三等求諸折中厥理無聞又楚王楚武王子文王過鄧三甥聃甥騅甥養甥請一作欲殺之鄧侯不許卒亡鄧國莊六今定鄧侯入下愚之上原注即第七等夫寧人負我為善獲戾持此致尤將何勸善如謂小不忍亂大謀失于用權故加其罪是則三甥見幾而作決在未萌自當高立標格置諸云漢何礙止與鄧侯鄰伍列在中庸下流而已哉原注三甥皆在第六等又其敘晉文之臣佐也舟之僑為上陽處父次之士會為下原注舟之僑在第三等陽處父在第四等士會在第五等其述燕丹一脫丹字之賓客也高漸離居首荊軻亞之秦舞陽居末原注高漸離在第四等荊軻在第五等秦舞陽在第六等事詳史記刺客傳斯并是非瞀亂善惡紛拏或珍瓴甋而賤璠璵或策駑駘而舍騏驥以茲為監欲誰欺乎又江充息夫躬讒陷惑上使禍延儲后毒及忠良論其姦凶過于石顯遠矣而固敘之不列佞幸楊王孫裸葬悖禮狂猖之徒考其一生更無他事而與朱云同列一有仍字冠之傳首不其穢歟若乃旁求別録側窺雜傳諸如此謬其纍實多案劉向列女傳載魯之秋胡妻者尋其始末了無才行可稱直以怨懟厥夫投川而死輕生同于古冶殉節異于曹娥此乃凶險之頑人強梁之悍婦兩言罪過輒與貞烈為伍有乖其實者焉又嵇康高士傳其所載者廣矣而顏回蘧瑗獨不見書蓋以二子雖樂道遺榮安貧守志而拘忌名教未免流俗也揣薄周孔者之意正如董仲舒揚子云亦鉆仰四科馳驅六籍漸孔門之教義服魯國之儒風亦是誦述禮法者與此何殊而并可甄録夫回瑗可棄而揚董獲升可謂識二五而不知十者一本誤作百字也爰及近代史臣所書求其乖失亦往往而有借如陽瓚效節邊城捐軀死敵當有宋之代抑劉卜之徒歟原注劉謂劉康祖卜謂卜天與而沈氏竟不別加標榜唯寄編于索虜篇內紀僧珍南齊書及南史并作僧真砥節礪行終始無瑕而蕭氏乃與群小混書都以恩幸為目王頍文章不足武藝居多躬詣戚藩首階逆亂撰隋史者如不能與梟感并列原注隋世皆以楊玄感為梟感即宜附出楊諒傳中輒與詞人共編吉士為伍原注隋書列王頍在文苑傳也凡斯纂録豈其類乎子曰以貌取人失之子羽以言取人失之宰我光武則受誤于龐萌曹公則見欺于張邈事一無事字列在方書句有脫字惟善與惡昭然可見不假許郭之深鑒裴王之妙察而作者存諸簡牘不能使善惡區分故曰誰之過歟史官之責也夫一作矣能申藻鏡一多區字別流品使小人君子臭味得朋上智中庸等差有敘則懲惡勸善永肅將來激濁揚清郁為不朽者矣

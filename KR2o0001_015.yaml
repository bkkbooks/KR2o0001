body:
  text: 採撰第十五子曰吾猶及史之闕文是知史文有闕其來尚矣自非博雅君子何以補其遺逸者哉蓋珍裘以衆腋成溫廣廈以羣材合構自古探穴藏山之士懷鉛握槧之客何嘗不徵求異説採托羣言然後能成一家傳諸不朽觀夫丘明受經立傳廣包諸國蓋當時有周志晉乘楚杌等篇遂乃聚而編之混成一録向使專憑魯策獨詢孔氏何以能殫見洽聞若斯之博也馬遷史記採世本國語戰國策楚漢春秋至班固漢書則全同太史自太初已後又雜引劉氏新序説苑七略之辭此並當代雅言事無邪僻故能取信一時擅名千載但中世作者其流日煩雖國有策書殺青不暇而百家諸子私存撰録寸有所長實廣聞見其失之者則有茍出異端虛益新事至如禹生啓石伊産空桑海客乘槎以登漢姮娥竊藥以奔月如斯踳駁不可殫論固難以汙南董之片簡霑班華之寸札而嵇康高士傳好聚七國寓言玄晏帝王紀多採六經圖讖引書之誤其萌於此矣至范曄增損東漢一代自謂無愧良直而王喬鳧履出於風俗通左慈羊鳴傳於抱朴子朱紫不別穢莫大焉沈氏著書好誣先代於晉則故造奇説在宋則多出謗言前史所載已譏其謬矣而魏收黨附北朝尤苦南國承其詭妄重以加諸遂云馬睿出於牛金王劭曰沈約晉書造奇説云琅琊國姓牛者與夏侯妃私通生中宗因遠敘宣帝以毒酒殺牛金符證其狀收承此言乃云司馬睿晉將牛金之子也宋孝王曰收以睿為金子計其年全不相干案前史尚如此誤況後史編録者耶劉駿上淫路氏沈約宋書曰孝武於路太后處寢息時人多有異議魏書因云駿蒸其母路氏醜聲播於甌越也可謂助桀為虐幸人之災尋其生絶胤嗣死遭剖斫蓋亦陰過之所致也晉世雜書諒非一族若語林世説幽明録搜神記之徒其所載或恢諧小辨或神鬼怪物其事非聖揚雄所不觀其言亂神宣尼所不語皇朝新撰晉史多採以為書夫以干鄧之所糞除王虞之所粳秕持為逸史用補前傳此何異魏朝之撰皇覽梁世之修遍略務多為美聚博為功雖取説於小人終見嗤於君子矣夫郡國之記譜諜之書務欲矜其州里誇其氏族讀之者安可不練其得失明其真偽者乎至如江東五俊始自會稽典録潁川八龍出於荀氏家傳而修晉漢史者皆徵彼虛譽定為實録茍不加以研核何以詳其是非又訛言難信傳聞多失至如曾參殺人不疑盜嫂翟義不死諸葛猶存此皆得之於行路傳之於衆口儻無明白其誰曰然故蜀相薨於渭濱晉書稱嘔血而死魏君崩於馬圈齊史云中矢而亡沈炯罵書河北以為王偉魏收草檄關西謂之邢邵夫同説一事而分為兩家蓋言之者彼此有殊故書之者是非無定況古今路阻視聽壤隔談者或以前為後或以有為無涇渭一亂莫之能辨而後來穿鑿喜出異同不憑國史別訊流俗及其記事也則有師曠將軒轅並世公明與方朔同時堯有八眉夔唯一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈此之乖濫往往有旃故作者惡道聽途説之違理街談巷議之損實觀夫子長之撰史記也殷周已往採彼家人安國之述陽秋也梁益舊事訪諸故老夫以芻堯鄙説刊為竹帛正言而輒欲與五經方駕三志競爽斯亦難矣嗚呼逝者不作冥漠九泉毀譽所加遠誣千載異辭疑事學者宜善思之

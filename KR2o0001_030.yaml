body:
  text: 人物第三十夫人之生也有賢不肖焉若乃其惡可以誡世其善可以示后而死之日名無得而聞焉是誰之過歟蓋史官之責也觀夫文籍肇創史有尚書知遠疏通網羅歷代至如有虞進賢時宗元凱夏氏中微國傳寒浞殷之亡也是生飛廉惡來周之興也實有散宜閎夭若斯人者或為惡縱暴其罪滔天或纍仁積德其名蓋世雖時淳俗質言約義簡此而不載闕孰甚焉洎夫子修春秋記二百年行事三傳并作史道勃興若秦之由余百里奚越之范蠡大夫種魯之曹沫公儀休齊之寧戚田穰苴斯并命代亦作世大才挺生杰出或陳力就列功冠一時或殺身成仁聲聞四海茍師其德業可以治國字人慕其風范可以激貪勵俗此而不書無乃太簡又子長著史記也馳騖窮古今上下數千載至如皋陶伊尹傅說仲山甫之流并列經浩名存子史功烈尤顯事跡居多盍各采而編之以為列傳之始而斷以夷齊居首何齷齪之甚乎其言與探賾篇不相顧既而孟堅勒成漢書牢籠一代至于人倫大事亦云備矣其間若薄昭楊仆顏駟史岑之徒其一脫其字事所以見遺者蓋略小而存大耳夫雖逐麋之犬不復顧兔而雞肋是棄能無惜乎當三國異朝兩晉殊宅若元則仲景時才重于許洛何楨許詢文雅高于揚豫而陳壽國志王隱晉史廣列諸傳而遺此不編此亦網漏吞舟過為迂闊者觀東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩毀形不嫁哀慟傷生此則才德兼美者也董祀妻蔡氏載誕胡子受辱虜廷文詞有余節概不足此則言行相乖者也至蔚宗后漢傳標列女徐淑不齒而蔡琰見書欲使彤管所載將安準的裴幾原刪略宋史時稱簡要至如張褘陰受君命戕賊零陵乃守舊作宗道一作通不移飲鴆而絶雖古之鉏麑義烈宣二何以加諸鮑昭文宗學府馳名海內方于漢代褒朔之流事皆闕如何以申其褒獎夫天下善人少而惡人多其一有有字書名竹帛者蓋唯記善而已故太史公有云自獲麟以來四百余年明主一無明主二字賢君忠臣死義之士廢而不載余甚懼焉即其義也至如四凶列于尚書三叛見于春秋西漢之紀江充石顯東京之載梁冀董卓此皆干紀亂常存滅興亡所系一本此三句中干作千無亂字滅字既有關時政故不可闕書但近史所刊有異于是至如不才之子群小之徒或陰情丑行或素餐尸祿其惡不足以曝揚其罪不足以懲戒莫不搜其鄙事聚而為録不其穢乎抑又聞之十室之邑必有忠信而斗筲之才何足算也若漢傳之有傅寬靳歙蜀志之有許慈宋書之虞丘進魏史之王憲若斯數子者或才非拔萃或行不逸群徒以片善取知微功見識闕之不足為少書之唯益其纍而史臣皆責其譜狀征其爵里課虛成有裁為列傳不亦煩乎語曰君子于其所不知蓋闕如也故賢良可記而簡牘無聞斯乃察所不該謂明不能遍理無足咎至若愚智畢載妍媸靡擇此則燕石妄珍齊竽混吹者矣夫名刊史冊自古攸難事列春秋哲人所重筆削之士其慎之哉卷八內篇卷九

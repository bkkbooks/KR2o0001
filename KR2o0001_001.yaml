body:
  text: 六家第一自古帝王編述文籍外篇言之備矣古往今來質文遞變諸史之作不恆厥體榷而為論其流有六一曰尚書家二曰春秋家三曰左傳家四曰國語家五曰史記家六曰漢書家今略陳其義列之於後尚書家者其先出於太古易曰河出圖洛出書聖人則之故知書之所起遠矣至孔子觀書於周室得虞夏商周四代之典乃删其善者定為尚書百篇孔安國曰以其上古之書謂之尚書尚書璇璣鈐曰尚者上也上天垂文𤊱布節度如天行也王肅曰上所言下為史所書故曰尚書也推此三說其義不同蓋書之所主本於號令所以宣王道之正義發話言於臣下故其所載皆典謨訓誥誓命之文至如堯舜二典直序人事禹貢一篇唯言地理洪範總述災祥顧命都陳喪禮茲亦為例不純者也又有周書者與尚書相類即孔氏刊約百篇之外凡為七十一章上自文武下終靈景甚有明允篤誠典雅高義時亦有淺末恆說滓穢相參殆似後之好事者所增益也至若職方之言與周官無異時訓之說比月令多同斯百王之正書五經之別録者也自宗周既殞書體遂廢迄乎漢魏無能繼者至晉廣陵相魯國孔衍以為國史所以表言行昭法式至於人理常事不足備列乃删漢魏諸史取其美詞典言足為龜鏡者定以篇第纂成一家由是有漢尚書後漢尚書漢魏尚書凡為二十六卷至隋祕書監太原王劭又録開皇仁壽時事編而次之以類相從各為其目勒成隋書八十卷尋其義例皆準尚書原夫尚書之所記也若君臣相對詞旨可稱則一時之言纍篇咸載如言無足紀語無可述若此故事雖有脫略而觀者不以為非爰逮中葉文籍大備必翦截今文摸擬古法事非改轍理涉守株故舒元所撰漢魏等書不行於代也若乃帝王無紀公卿缺傳則年月失序爵里難詳斯並昔之所忽而今之所要如君懋隋書雖欲祖述商周憲章虞夏觀其所述乃似孔子家語臨川世說謂畫虎不成反類犬也故其書受嗤當代良有以焉春秋家者其先出於三代案汲冢瑣語太丁時事且為夏殷春秋孔子曰疏通知遠書教也屬辭比事春秋之教也知春秋始作與尚書同時瑣語又有晉春秋記獻公十七年事國語雲晉羊舌肸習於春秋悼公使傳其太子左傳昭二年晉韓宣子來聘見魯春秋曰周禮盡在魯矣斯則春秋之目事匪一家至於隱沒無聞者不可勝載又案竹書紀年其所紀事皆與魯春秋同孟子曰晉謂之乘楚謂之檮杌而魯謂之春秋其實一也然則乘與紀年檮杌其皆春秋之別名者乎故墨子曰吾見百國春秋蓋皆指此也逮仲尼之修春秋也乃觀周禮之舊法遵魯史之遺文據行事仍人道就敗以明罰因興以立功假日月而定曆數籍朝聘而正禮樂微婉其說志晦其文為不刊之言著將來之法故能彌歷千載而其書獨行又案儒者之說春秋也以事繫日以日繫月言春以包夏舉秋以兼冬年有四時故錯舉以為所記之名也茍如是則晏子虞卿呂氏陸賈其書篇第本無年月而亦謂之春秋蓋有異於此者也至太史公著史記始以天子為本紀考其宗旨如法春秋自是為國史者皆用斯法然時移世異體式不同其所書之事也皆言罕褒諱事無黜陟故馬遷所謂整齊故事耳安得比於春秋哉左傳家者其先出於左丘明孔子既著春秋而丘明受經作傳蓋傳者轉也轉受經旨以授後人或曰傳者傳平也所以傳示來世案孔安國注尚書亦謂之傳斯則傳者亦訓釋之義乎觀左傳之釋經也言見經文而事詳傳內或傳無而經有或經闕而傳存其言簡而要其事詳而博信聖人之才羽翮而述者之冠冕也逮孔子云沒經傳不作於時文籍唯有戰國策及太史公書而已至晉著作郎魯國樂資乃追採二史撰為春秋後傳其書始以周貞王續前傳魯哀公後至王𧹞入秦又以秦文王之繼周終於二世之滅合成三十卷當漢代史書以遷固為主而紀傳㸦出表志相重於文為煩頗難周覽至孝獻帝始命荀悅撮其書為編年體依左傳著漢紀三十篇自是每代國史皆有斯作起自後漢至於高齊如張璠孫盛干寶徐廣裴子野吳均何之元王劭等其所著書或謂之春秋或謂之紀或謂之略或謂之典或謂之志雖名各異大抵皆依左傳以為的準焉國語家者其先亦出於左丘明既為春秋內傳又稽其逸文纂其別說分周魯齊晉鄭楚吳越八國事起自周穆王終於魯悼公別為春秋外傳國語合為二十一篇其文以方內傳或重出而小異然自古名儒賈逵王肅虞翻韋曜之徒並申以注釋治其章句此亦六經之流三傳之亞也暨縱橫互起力戰爭雄秦兼天下而著戰國策其篇有東西二周秦齊燕楚三晉宋衛中山合十二國分為三十三卷夫謂之策者蓋録而不序故即簡以為名或云漢代劉向以戰國游士為之策謀因謂之戰國策至孔衍又以戰國策所書未為盡善乃引太史公所記參其異同删彼二家聚為一録號為春秋後語除二周及宋衛中山其所留者七國而已始自秦孝公終於楚漢之際比於春秋亦盡二百三十餘年行事始衍撰春秋時國語復撰春秋後語勒成二書各為十卷今行於世者唯後語存焉按其書序云雖左氏莫能加世人皆尤其不量力不度德尋衍之此義自比於丘明者當謂國語非春秋傳也必方以類聚豈多嗤乎當漢氏失馭英雄角力司馬彪又録其行事因為九州春秋州為一篇合為九卷尋其體統亦近代之國語也自魏都許洛三方鼎峙晉宅江淮四海幅裂其君雖號同王者而地實諸侯所在史官記其國事為紀傳者則規模班馬創編年者則議擬荀袁於是史漢之體大行而國語之風替矣史記家者其先出於司馬遷自五經間行百家競列事迹錯糅前後乖舛至遷乃鳩集國史採訪家人上起黃帝下窮漢武紀傳以統君臣書表以譜年爵合百三十卷因魯史舊名目之曰史記自是漢世史官所續皆以史記為名迄乎東京著書猶稱漢記至梁武帝又敕其羣臣上自太初下終齊室撰成通史六百二十卷其書自秦以上皆以史記為本而別採他說以廣異聞至兩漢已還則全録當時紀傳而上下通達臭味相依又吳蜀二主皆入世家五胡及拓拔氏列於夷狄傳大抵其體皆如史記其所為異者唯無表而已其後元魏濟陰王暉又著科録二百七十卷其斷限亦起自上古而終於宋年其編次多依於放通史而取其行事尤相似者共為一科故以科録為號皇家顯慶中符璽郎隴西李延壽抄撮近代諸史南起自宋終於陳北始自魏卒於隋合一百八十篇號曰南北史其君臣流別紀傳羣分皆以類相從各附於本國凡此諸作皆史記之流也尋史記疆宇遼闊年月遐長而分以紀傳散以書表每論國家一政而胡越相懸敍君臣一時而參商是隔此其為體之失者也兼其所載多聚舊記時採雜言故使覽之者事罕異聞而語饒重出此撰録之煩者也況通史以降蕪纍尤深遂使學者寧習本書而怠窺新録且撰次無幾而殘缺遽多可謂勞而無功述者所宜深誡也漢書家者其先出於班固馬遷撰史記終於今上自太初已下闕而不録班彪因之演成後記以續前編至子固乃斷自高祖盡於王莽為十二紀十志八表七十列傳勒成一史目為漢書昔虞夏之典商周之誥孔氏所撰皆謂之書夫以書為名亦稽古之偉稱尋其創造皆準子長但不為世家改書曰志而已自東漢以後作者相仍皆襲其名號無所變革唯東觀曰記三國曰志然稱謂雖別而體制皆同歷觀自古史之所載也尚書記周事終秦穆春秋述魯文止哀公紀年不逮於魏亡史記唯論於漢始如漢書者究西都之首末窮劉氏之廢興包舉一代撰成一書言皆精煉事甚該密故學者尋討易為其功自爾迄今無改斯道於是考茲六家商榷千載蓋史之流品亦窮之於此矣而朴散淳銷時移世異尚書等四家其體久廢所可祖述者唯左氏及漢書二家而已卷一內篇卷二

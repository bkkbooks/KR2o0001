body:
  text: 鑒識第二十六夫人識有通塞神有晦明毀譽以之不同愛憎由其各異蓋三王之受謗也值魯連而獲申五霸之擅名也逢孔宣而見詆斯則物有恆準而鑒無定識欲求銓核得中其唯千載一遇乎況史傳為文淵浩一作源廣博學者茍不能探賾索隱致遠鉤深烏一作焉足以辨其利害明其善惡觀左氏之書為傳之最而時經漢魏竟不列于學官儒者皆折此一家而盛推二傳夫以丘明躬為魯史受經仲尼語世則并生論才則同恥一作體非彼二家者師孔氏之弟子預達者之門人才識本殊年代又隔安得持彼傳説比茲親受者乎加以二傳理有乖僻言多鄙野方諸左氏不可同年故知膏育墨守乃腐儒之妄述賣餅太官誠智士之明鑒也逮史漢繼作踵武相承王充著書既甲班而乙馬張輔持論又劣固而優遷原注王充謂彪文義浹備紀事詳贍觀者以為甲以太史公為乙也張輔名士優劣論曰世人稱司馬遷班固之才優劣多以班為勝余以為史遷敘三千年事五十萬言班固敘二百年事八十萬言煩省不敵固之不如遷必矣然此二書雖互有修短遞聞一作有得失而大抵同風可為連類張晏云遷歿后亡龜策日者傳褚先生補其所一無所字缺言詞鄙陋非遷本意案遷所撰五帝本紀七十列傳稱虞舜見陋遂匿空而出宣尼既殂門人推奉有若此二事又于暗惑篇論之其言之鄙又甚于茲安得獨罪褚生而全宗馬氏也劉軌思商榷漢史雅重班才惟譏其本紀不列少帝而輒編高后案弘非劉氏而竊養漢宮時天下無主一作君呂宗稱制故借其歲月寄以編年而野雞行事自具外戚譬夫成周成王為孺子史刊攝政一作正之年厲亡流彘歷紀共和之日而周召二公各世家有傳句必有誤詳此句當云各有世家班氏式遵曩例殊合事宜豈謂雖浚發于巧心反受嗤于拙目也劉祥撰宋書序一脫序字録歷説一作序諸家晉史其略云法盛中興荒莊草盛貌一作拙少氣王隱徐廣淪溺罕華夫史之敘事也當辨而不華質而不俚其文直其事核若斯而已可也一作矣必令同文舉之含異疑當作末異等公干之有逸如子云之含章類長卿之飛藻此乃綺揚繡合雕章縟彩欲稱實録其可得乎以此詆訶知其妄施彈射矣夫人廢興時也窮達命也而書之為用亦復如是蓋尚書古文六一作七經之冠冕也春秋左氏三傳之雄霸也而自秦至晉年逾五百其書隱沒不行干世既而梅氏寫獻一作狀杜侯訓釋然后見重一時擅名千古若乃一無若乃二字一止有乃字老經撰于周日莊子成于楚年遭文景而始傳值嵇阮而方貴若斯流者可勝紀哉故曰廢興時也窮達命也適使時無識寶世缺知音若論衡之未遇伯喈太玄之不逢平子逝將煙盡火滅泥沉雨絶安有歿而不朽揚名于后世者乎

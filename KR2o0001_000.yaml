front:
  text: 原序長安二年武后臨朝第十九年至此十六改元余以著作佐郎兼修國史尋遷左史於門下撰起居注會轉中書舍人暫停史任俄兼領其職今上即位除著作郎太子中允率更令其兼舊脫兼字修史皆如故兼修史以領職言脫兼字則非又屬大駕還京以留後在東舊脫東字都無幾驛徵入京專知史事仍遷祕書少監首敘歷官即自敘篇所謂三為史臣再入東觀也其注云今之史館即古之東觀自惟歷事二主從宦一作官兩京遍居司籍之曹久處載言之職昔馬融三入東觀漢代稱榮張華再典史官晉朝稱美嗟豫小子兼而有之是用職思舊誤作司其憂不遑啓處此總上歷官拈合當職撰史事即以引起史通之作嘗以載削餘暇商榷一作確史篇下筆不休遂盈筐篋於是區分類聚編而次之此六句暗罷史通昔漢世諸儒集論經傳定之於白虎閣因名曰白虎通豫既在史館而成此書故便以史通為目且漢求司馬遷後封為史通子是知史之稱通其來自久博采衆議爰定茲名此層明點史通兩引古史古事以見命名所本凡為草卷列之如左合若干言除所闕篇凡八萬三千三百五十二字注五千四百九十八字按字數今不可定姑仍舊本存之于時歲次庚戌景龍四年中宗元是時復辟六年矣仲春之月也張睿父先生再刻陸太史校定劉子玄史通於豫章竣寄家君黔中張先生手校為增七百三十餘字去六十餘字而曲筆因習二篇增補缺略已成全書家君讀而喜以新刻寄延曰張先生為觀察而手不釋書猶諸生也爾曹為諸生乃不諸生也間取蜀本吳本再校之刻中如干寶之子揚雄之揚邢劭之卲常璩之據符堅之符當是寫誤可發舊本細為校之延循環校閲再加芟正篇中史官姓名如左氏遷固古今共推者可以無勢自孔衍荀悅以下俱為著其爵里間以已意為之評論雖未必合作者之意祇承嚴命終陸張二先生功耳約而言之考究精核義例嚴整文字簡古議論慨慷史通之長也薄堯禹而貸操丕惑春秋而信汲冢訶馬遷而沒其長愛王劭而忘其佞高自標榜前無賢哲史通之短也然則徐堅所云當置座右者以義例言良非虛譽而宋祁所云工訶古人者以誇詡言亦非誣善矣西江郭延年序余既注文心雕龍畢因念黃太史有雲論文則文心雕龍評史則史通二書不可不觀實有益於後學復欲取史通注之中年張林宗年兄以江右郭氏史通評釋相示讀之與余意多不合乃以向注文心雕龍之例注焉歷八月訖功然此二書訛處甚多嗣從信陽王思延得華亭張玄超本其文心不能加他本史通本大善有數處極快人者故書之校視文心為愈往見李濟翁資暇録云李善注文選有初注再注以至五注者蘇子由注老子亦自言晚年於舊注多所改定今余此書曷敢以為盡是聊以備遺忘為他日削纂之資耳河南王惟儉序書以通名如白虎通風俗通之類義同箋故漢封司馬遷後為史通子史通之稱見焉劉知幾博論前史托掇利病作史通內外篇蓋兼取兩義云馬貴與經籍考從文史類中摘出論史者為史評首列是書本傳謂知幾幼時受古文尚書業不進聰講春秋左氏則心開異考同一學問之事而胎性中各有著根處不自知其所以然後來領國史三十年卒以史學垂名豈所謂性也有命焉者耶觀其議論如老吏斷獄難更平反如夷人嗅金暗識高下如神醫眼照垣一方洞見五藏癥結間有過執己見以裁量往古泥定體而少變通如謂尚書為例不純史論淡薄無味之類然其薈萃搜擇鈎爪排擊上下數千年貫穿數萬卷心細而眼明舌長而筆辣雖馬班亦有不能自解免者何況其餘書在文史類中允與劉彥和之雕龍相匹徐堅謂史氏宜置座右信也綜練淵博其中瑣詞僻事非注不顯注家王楨仲本為善林居多暇竊為刪繁補遺重梓行世使當時自比楊雄擬易以為必覆醬瓿者千餘年後復紙貴於蘭臺石室間亦嗜古之士所欣慰也北平黃叔琳序原序內篇卷一

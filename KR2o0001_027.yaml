body:
  text: 探賾第二十七古之述者豈徒然哉或以取舍難明或以是非相亂由是書編典浩宣父辨其流詩列風雅卜商通其義夫前哲所作后來是觀茍失其指歸則難以傳授而或有妄生穿鑿輕究本源是乖作者之深旨誤生人之后學其為謬也不亦甚乎其夫子之刊一作作魯史學者以為感麟而作案子思有言吾祖厄于陳蔡始作春秋此四字舊脫今補夫以彼聿修傳諸詒厥欲求實録難為爽誤是一訛事則義包微婉因攫莓莓一作莓皆誤當作煤而創詞時逢西狩乃泣麟而絶筆傳者傳者集內凡三見并作儒者當由書傭訛傳作口故徒知其一而未知其二以為自反袂拭面稱吾道窮然后追論五始定名三叛此豈非獨學無友孤陋寡聞之所致耶孫盛稱左氏春秋書吳楚則略荀悅漢紀述胸奴則簡蓋所以賤夷狄而一無而字貴諸夏也案春秋之時諸國錯峙關梁不通史官所書罕能周悉傳本不略此但據時勢折之耳異乎炎漢之世四海一家馬遷乘傳舊多以字求自古遺文而州郡上計皆先集太史若斯之備也況彼吳楚者僻居南裔地隔江山去彼魯邦尤為迂闊丘明所録安能備諸且必以蠻夷而固略也若駒支預于晉會長狄埋于魯門葛盧之辨牛鳴郯子之知鳥職斯皆邊隅小國人品最微猶復收其瑣事見于方册安有主盟上國勢迫宗周爭長諸華威陵一作凌強晉而可遺之者哉傳書楚事甚多正辨在此又荀氏著書抄撮班史其取事也中外一概夷夏皆均非是獨簡一作略胡鄉而偏詳漢室盛既疑丘明之擯吳楚遂誣仲豫之抑胸奴可謂強奏庸音持為足曲者也蓋明月之珠不能無瑕夜光之壁不能無颣故作者著書或有病纍而后生不能詆訶其過又更文飾其非遂推而廣之強為其説者蓋亦多矣如葛洪有云司馬遷發憤作史記百三十篇伯夷居列傳之首以為善而無報也項羽列于本紀以為居高位者非關有德也案史之于一作所書也有其事則記無其事則闕尋一作馬遷之馳騖今古上下數千載春秋已往得其遺事者蓋唯首陽之一作山二子而已然適使夷齊生于秦代一作氏死于漢日而乃升之傳首庸謂有情言如此或可云發憤之故今者考其先后隨而編次斯則理之恆一作常也烏可怪乎必謂子長以善而無報推為傳目若伍子胥大夫種盂軻墨翟賈誼屈原之徒或行仁而不遇或盡忠而受戮何不求其品類簡一作同在一科而乃異其篇目各分為卷一作分為數卷也又遷之紕繆其流甚多夫陳勝之為世家既云無據項羽之稱本紀何必有憑必謂遭彼腐刑怨刺孝武故書違一訛作為凡例志存激切若先黃老而后六經進姦雄而退處士此之乖刺復何為乎言此等乃為被刑而發耳若項紀豈關怨刺乎隋內史李德林著論稱陳壽蜀人其撰國志黨蜀而抑魏刊之國史以為格言案曹公之創工業也賊殺母后幽逼主上罪百田常禍千王莽文帝臨戎不武為國好奢忍害賢良疏忌骨肉而壽評皆依違其事無所措言是未嘗抑魏者劉主地謂門地居漢宗仗順而起夷險不撓終始無瑕方諸帝王可比少康光武以宗室言譬以侯伯宜輩秦繆楚莊以功烈言而壽評抑其所長攻其所短亦不似黨蜀者是則壽之意以魏為正朔之國典午攸承蜀乃僭偽之君中朝所嫉故曲稱曹美而虛説劉非安有背曹而向劉疏魏而親蜀也此下舊有注引陳壽上諸葛集表語殊無取義去之夫無其文而有其説不亦憑虛亡是者耶習鑿齒之撰漢晉春秋以魏為偽國者此蓋定邪正之途明順逆之理耳而檀道鸞稱其當桓氏執政故撰此書欲以絶彼瞻烏防茲逐鹿歷觀古之學士為文以諷其上者多矣若齊冏一作趙失德豪士于焉作賦賈后無道女史由其一作之獻針斯皆短什小篇可率爾此二字一作俯字而就也借諷之作只有短篇從無巨帙安有變三國之體統改五行之正朔勒成一史傳諸千載而藉以權濟物議此六字舊作藉其權以濟物取誡當時豈非勞而無功博而非要與夫班彪王命一向異乎王命論亦止一篇非如習書大部也求之人情理不當爾理不當然也或訛爾作耳非自二京板蕩五胡稱制崔鴻鳩諸偽史聚成春秋其所列者十有六家而已魏收云鴻世仕江左故不録司馬劉蕭之書又恐識者尤之未敢出行于外以上并收語見鴻本傳案于時中原乏主海內橫流逖彼東南更平為正朔適使素王再出南史重生終不能別有異同忤非其議安得以偽或作魏書無録而猶罪歸彥鸞者乎且必以崔氏祖宦一作官吳朝故情私南國必如是則其先徙居廣固委質慕容何得書彼南燕而與群胡并列愛憎之道豈若是邪且觀鴻書之紀綱皆以晉為主亦猶班書之載吳項必系漢年陳志之述孫劉皆宗魏世何止獨遺其事不取其書而已哉但伯起躬為魏史傳列島夷不欲使中國著書推崇江表所以輒假言崔志用紓魏羞追出訶鴻心曲且東晉之書宋齊一脫此四字之史考其所載幾三百篇而偽邦墳籍僅盈百卷若使收矯鴻之失南北混書斯則四分有三事歸江外非唯肥瘠非類衆寡不均兼以東南國史皆須紀傳區別茲又體統不純難為編次者矣收之矯妄其可盡言乎于是考衆家之異説參作者之本意或出自胸懷枉申探賾此云探賾貼論史者説或妄加向背輒有異同而流俗腐儒后來末學習其狂狷成其詿誤自謂見所未見聞所未岡銘諸舌端以為口實唯智者不惑無所疑焉卷七內篇卷八

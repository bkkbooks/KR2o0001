body:
  text: 論贊第九春秋左氏傳每有發論假君子以稱之二傳云公羊子穀梁子史記云太史公既而班固曰贊荀悅曰論東觀曰序謝承曰詮陳壽曰評王隱曰議何法盛曰述揚雄曰撰劉昞曰奏袁宏裴子野自顯姓名皇甫謐葛洪列其所號史官所撰通稱史臣其名萬殊其義一揆必取便於時者則總歸論贊焉夫論者所以辨疑惑釋凝滯若愚智共了固無俟商榷丘明君子曰者其義實在於斯司馬遷始限以篇終各書一論必理有非要則強生其文史論之煩實萌於此夫擬春秋成史持論尤宜闊略其有本無疑事輒設論以裁之此皆私徇筆端茍衒文彩嘉辭美句寄諸簡册豈知史書之大體載削之指歸者哉必尋其得失考其異同子長淡泊無味承祚偄緩不切賢才間出隔世同科孟堅辭惟溫雅理多愜當其尤美者有典誥之風翩翩奕奕良可詠也仲豫義理雖長失在繁富自茲以降流宕忘返大抵皆華多於實理少於文鼓其雄辭誇其儷事必擇其善者則干寶范曄裴子野是其最也沈約臧榮緒蕭子顯抑其次也孫安國都無足採習鑿齒時有可觀若袁彥伯之務飾玄言謝靈運之虛張高論玉巵無當曾何足云王劭志在簡直言兼鄙野茍得其理遂忘其文觀過知仁斯之謂矣大唐修晉書作者皆當代詞人遠棄史班近宗徐庾夫以飾彼輕薄之句而編為史籍之文無異加粉黛於壯夫服綺紈於高士者矣史之有論也蓋欲事無重出文省可知如太史公曰觀張良貌如美婦人項羽重瞳豈舜苗裔此則別加他語以補書中所謂事無重出者也又如班固贊曰石建之浣衣君子非之楊王孫裸葬賢於秦始皇遠矣此則片言如約而諸義甚備所謂文省可知者也及後來贊語之作多録紀傳之言其有所異唯加文飾而已至於甚者則天子操行具諸紀末繼以論曰接武前修紀論不殊徒為再列馬遷自序傳後歷寫諸篇各敍其意既而班固變為詩體號之曰述范曄改彼述名呼之以贊尋述贊為例篇有一章事多者則約之使少理寡者則張之令大名實多爽詳略不同且欲觀人之善惡史之褒貶蓋無假於此也然固之總述合在一篇使其條貫有序歷然可閲蔚宗後書實同班氏乃各附本事書於卷末篇目相離斷絶失次而後生作者不悟其非如蕭李南北齊史大唐新修晉史皆依范書誤本篇終有贊夫每卷立論其煩已多而嗣論以贊為黷彌甚亦猶文士制碑序終而續以銘曰釋氏演法義盡而宣以偈言茍撰史若斯難以議夫簡要者矣至若與奪乖宜是非失中如班固之深排賈誼范曄之虛美隗囂陳壽謂諸葛不逮管蕭魏收稱爾朱可方伊霍或言傷其實或擬非其倫必備加擊難則五車難盡故略陳梗概一言以蔽之

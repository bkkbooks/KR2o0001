body:
  text: 史官建置第一夫人寓形天地其生也若蜉蝣之在世如白駒之過隙發端庸淺猶且恥當年而功不立疾沒世而名不聞上起帝王下窮匹庶近則朝廷之士遠則山林之客涼其於功也名也莫不汲汲焉孜孜焉夫如是者何哉皆以圖不朽之事也何者而稱不朽乎蓋書名竹帛而已向使世無竹帛時闕史官雖堯舜之與桀紂伊周之與莽卓夷惠之與跖礄商冒俱弒父者之與曾閔但一作俱一從物化墳土未幹則善惡不分妍媸永滅者矣茍史官不絕竹帛長存則其人已亡音成空寂而其事如在皎同星漢用使後之學者坐披囊篋而神交萬古不出戶庭而窮覽千載見賢而恩齊見不賢而內自省若乃春秋成而逆子懼南史至而賊臣書其記事載言也則如彼其勸善懲惡也又如此由斯而言則史之為用其利甚博乃生人之急務為國家之要道有國有家者其可缺之哉故備陳其事編之於後蓋史之建官其來尚矣昔軒轅氏受命倉頡沮誦實居其職至於三代其數漸繁案周官禮記有太史小史內史外史左史右史之名太史掌國之六典小史掌邦國之志內史掌書王命外史掌書使乎四方左史記言右史記事曲禮曰史載筆大事書之於策小事簡牘而已大戴禮曰太子既冠成人免於保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也斯則史官之作肇自黃帝備於周室名目既多職務咸異至於諸侯列國亦各有史官求其位號一同王者至如孔甲尹逸名重夏殷史佚倚相譽高周楚晉則伯黶司籍魯則丘明受經此並歷代史臣之可得言者降及戰國史氏無廢蓋一無蓋字趙鞅晉之一大夫爾一有猶字有直臣書過操簡筆於門下田文齊之一公子爾每坐對賓客侍史記於屏風至若秦趙二主澠池交會各命其御史書某年某月鼓瑟鼓缶此則春秋君舉必書之一本之字重二義也然則作然而用官雖無闕而書尚有遺故史臣等差莫辨其序案呂氏春秋曰夏太史終古見桀惑亂載其圖法出奔商商太呂覽作內史向摯依呂覽作向摯舊本作高摯誤見紂迷亂載其圖法出奔周晉太史屠黍見晉之亂亦以其圖法歸周又春秋晉齊太史書趙宣二崔襄二十五之弒鄭公孫黑強與於盟使太史書其名且曰七子昭二年上文所引皆不書年此三字疑衍晉韓宣子來聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣然則諸史之任太史其最優乎至秦有天下太史令胡母敬作博學章此則自夏迄秦斯職無改者矣漢興之世武帝又置太史公位在丞相上以司馬談為之漢法天下計書先上太史副上丞相敘事如春秋及談卒子遷嗣遷卒宣帝以其官為令行太史公文書而已尋自古太史之職雖以一無以字著述為宗而兼掌歷象日月陰陽管窺天器一作度數司馬遷既歿後之續史記者若褚先生劉向馮商揚雄之徒並以別職來知史務於是太史之署非復記言之司故張衡單颺王立高堂隆等其當官見稱唯知占候而已當王莽代漢改置柱下五史秩如御史聽事侍傍記跡言行蓋效古者動則左史書之當有言則右史書之六字今缺此其義也漢氏中興明帝以班固為蘭臺令史詔撰光武本紀及諸列傳載記又楊子山為郡上計吏獻所作哀牢傳為帝所異徵詣蘭臺斯則蘭臺之職一有者字蓋當時著述之所也自章和已後圖籍盛於東觀凡撰漢記此當有者字相繼在乎其中而都為舊訛謂著作任著作之務也時未立著作之名故謂字誤竟無它稱當魏太和中始置著作郎職隸中書其官即周之左史也晉元康初又職隸秘書著作郎一人謂之大著作專掌史任又置佐著作郎八人宋齊已來以佐名施於作下原注改佐著作郎為著作佐郎舊事佐郎職知博採正郎資以草傳如正佐有失則秘監職思舊訛作司其憂其有才堪撰述學綜文史雖居他官或兼領著作亦有雖為秘書監而仍領著作郎者若中朝曹魏西晉之華僑陳壽陸機束晳江左專稱東晉之王隱虞預干寶孫盛宋之徐愛蘇寶生梁之沈約裴子野斯並史官之尤美著作之妙選也而齊梁二代又置修隋志作撰史學士陳氏因循無所變革若劉陟一作涉誤謝昊顧野王許善心之類是也至若偏隅僭國夷狄偽朝求其史官亦有可言者案蜀志稱王崇補東觀許蓋掌禮儀又郤正為秘書郎廣求益部書籍斯則典校無闕屬辭有所矣而陳壽評云蜀不置史官者得非厚誣諸葛乎別有曲筆篇內篇第二十五言之詳矣吳歸命侯舊脫侯字時有左右二國史之職薛瑩為其左華核為其右又周處自左國史遷東觀令以斯考察則其班秩可知偽漢嘉平初劉聰年號公師或以太中大夫領左國史撰其國君臣紀傳前涼張駿時劉慶遷儒林郎中常侍在東苑撰其國書蜀李義門訂本有李字他本無與西涼二一作三非朝記事委之門下南涼主烏孤舊作孫誤初定霸基欲造國紀以其參軍郭舊作郎恐訛韶為國紀祭酒使撰錄時事自餘偽主一訛作事多置著作官若前趙之和苞後燕之董統是也元魏初稱制即有史臣雜取他官不恆或作常厥職故如崔浩高閭之徒唯知知如御史知雜之知著述而未列名號其後始於秘書置著作局正郎二人佐郎四人其佐三史者三史一作參史下同未詳不過一二而已普泰前廢帝元或訛作晉秦以來三史稍替別置修史局其職有六人當代都之時史臣每上奉王言下詢國俗兼取工於翻譯者來直或訛置史曹及洛京之末孝文遷洛朝議又以為國史當專任代人謂部人不宜歸之漢士於是以穀纂郭本注以纂俊易之山偉更主文籍凡經二十餘年其事闕而不載斯蓋猶秉夷禮有互鄉之風者焉高齊及周迄於隋氏其史官以大臣統領者謂之監修國史自領則近循魏代遠效江南參雜其間變通而已唯周建六官改著作之正郎為上士佐郎為下士名謚當作號雖易而班秩不殊如魏收之擅名河朔高齊柳虯之獨步關右字文周王劭魏澹展效於開皇之朝諸葛穎劉炫宣功於大業之世亦各一時也暨皇家之建國也乃別置史館通籍禁門西京則與鸞渚為鄰東部則與鳳池相接而一無而字館宇華麗酒饌豐厚得廁其流者實一時之美事至咸亨年以職司多濫高宗喟然而稱曰朕甚懵焉乃命所司曲加推擇如有居其職而闕其才者皆不得預於修撰原注詔曰修撰國史義存典實自非操履忠正識量該通才學有聞難堪斯任如聞近日以來但居此職即知修撰非唯編輯訛舛亦恐洩漏史事自今宜遣史司精簡堪修史人灼然為眾所推者錄名進內自餘雖居史職不得輒聞見所修史籍及未行用國史等之事由是史臣拜職多取外司著作一曹殆一作始成虛設此四句即制詔中雖居史職不得輒聞見所修等句之意凡有筆削畢歸於餘館語意不甚清豁恐有訛字始自武德迄乎長壽其間若李仁實以直辭見憚敬播以敘事椎工許敬宗之矯妄牛鳳及之狂惑此其善惡尤著者也又案晉令韋名著作郎掌起居集注匯集而注記之撰錄諸言行勛伐舊載史籍者元魏置起居令史每行幸宴會則在御左右記一作紀錄帝言及賓客酬對後別置修起居注二人多以餘官兼掌至隋以吏部散宮及校書正字閑於述注者修之納言監領其事煬帝以為古有內史外史今既有著作是外史宜立起居是內史遂置起居舍人二員職隸中書省如庾自直崔浚祖虞世南蔡允恭等咸居其職時謂得人皇家因之又加置起居郎二員職與舍人同此之舍人亦曰起居舍人每天子臨軒侍立於玉階之下郎居其左舍人居其右人主有命則逼階延首而聽之退而編錄以為起居注龍朔中改名左史右史今上即位仍從國初之號焉高祖太宗時有令狐德棻呂才蕭鈞褚遂良上官儀高宗則天時有李安期顧胤高智周張太素凌季友斯並當時得名朝廷所屬者一無者字也夫起居注者編次甲子之書至於策命章奏封拜薨免莫不隨事記錄言惟二字恐當作載言詳審凡欲撰帝紀者皆恐是藉字之訛王本作因之以成功即依義門訂本一無即字一誤作命字今為載筆之別曹立言之貳職故略述其事附於斯篇又按詩邶風靜女之三章君子取其彤管夫彤管者女史記事規海之所執也古者人君外朝則有國史內朝則有女史內之與外其任皆同故晉獻惑亂驪姬夜泣床第之私房中之事不得掩焉楚昭王宴游蔡姬對以其願王顧謂史書之此十二字舊木無之必是脫文無此十二字不成語矣蔡姬許從孤死矣夫宴私而有書事之冊蓋受命者即女史之流乎至漢武帝時有禁中起居注明德馬皇后撰明帝起居注凡斯著述似出宮中求其職司未聞位號隋世王劭上疏請依古法復置女史之班具錄內儀付於外省周禮宮人女史之職掌於天官此疏猶存此意文帝不許遂不施行大抵自古史官其沿革廢置如此夫仲尼修春秋公羊高疑脫穀梁赤作傳漢魏之陸賈魚豢晉宋之張璠范曄雖身非史職而私撰國書若斯人者有異於是故不復詳而錄之夫為史之道其流有二何者書事記言出自當時之簡勒成刪定歸於後來之筆然則當時草創者資乎博聞實錄若董狐南史是也後來經始者貴乎俊識通才若班固陳壽是也必論其事業前後不同然相須而成其歸一揆本音上聲觀夫周秦已往史官之取人其詳不可得而聞也至於漢魏已降則可得而言然多竊虛號有聲無實案劉後漢曹魏志二史皆當代所撰能成其事者蓋唯劉珍蔡邕王沈魚豢之徒耳而舊史載其同作非止一家如王逸阮籍亦預其列一訛作例且叔師研尋章句儒生之腐者也嗣宗沉湎曲蘗酒徒之狂者也斯豈能錯綜一作措置時事裁成國典乎而近代趨競之士尤喜居於史職至於措辭下筆者十無一二焉既而書成繕寫則署名同獻爵賞既行則攘袂爭受遂使是非無準真偽相雜是非真偽指列名言生則厚誣當時死則致惑來代而書之譜傳借一作以為美談載之碑碣增其壯觀舊本既而自歷行事稱其所長則云某代著某書某年成某史加封若干戶獲賜若干段諸如此說往往而有遂使讀者皆以為名實相符功嘗相副昔魏帝有言一脫言字舜禹之事吾知之矣此其舊作則效歟卷十一外篇卷十二姊妹计划数据项

body:
  text: 點煩第六夫史之煩文已於敘事篇言之詳矣舊有然凡俗難曉下愚不移九字可厭宜削雖七敘事篇在六卷疑當作六卷成言而三隅莫反蓋語曰百聞不如一見是以聚米為谷賊虜之虛實此二字一止作居字可知畫地成圖山川之形勢一少勢字易悉昔陶隱居本草藥有冷熱味者朱墨點其名阮孝緒七録書有文德殿者丹筆寫其字由是區分有別品類可知今輒擬其事抄自古史傳文有煩者皆以筆點其煩一無煩字上原注其點用朱粉雌黃並得凡字經點者盡宜去之如其間有文句虧缺者細書側注於其右原注其側書亦用朱粉雌黃等如正行用粉則側注者用朱黃以此為別或回易數字或加足片言俾分布得所彌縫無闕庶觀者易悟其失自彰知一作如我托實而談非是一作是非茍誣前哲孔子家語曰魯公索氏將祭而忘其牲孔子聞之曰公索氏不及二年一有必亡二字矣一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今果如期而亡夫子何以知然右除二十四字家語曰晉將代未使覘之宋陽門之介夫死司城子罕哭之哀艦者反言於晉侯曰宋陽門之介夫死而郭無而字司城子罕哭之哀民咸悅矣宋殆未可伐也右除二十一字加三字加一作移史記五帝本紀曰諸侯之史無之字朝覲者不之丹朱而之舜百姓之史無此三字獄訟者不之丹朱而之舜謳歌者皆古本有皆字史內無皆字不漚歌此二字一作之字丹朱而謳歌舜已上堯紀舜年二十以孝聞三十而帝堯間可用者云云舜年二十以孝聞年舊脫年字三十舜年以下等字古本有俗本削堯舉之已上舜記右除二十九字加七字夏本紀曰禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝禹者黃帝之玄孫而帝帝字熙史補顓頊之孫也禹之曾大父舊衍曰字昌意及父鯀皆不得在帝位為人臣右除五十七字加五字除數太多恐有誤項羽本紀曰項籍者下相人也字羽初初字照史補起時年二十四其季父項梁梁父即即字照史補楚將項燕為秦將王翦所殺史作戮者也項氏世世史有為字楚將封於項故姓項氏右除三十二字加二十四字釐革其次序呂后郭誤作氏本紀曰呂太后者高祖微時妃也生孝惠帝史有女字魯元公主及高祖為漢王得定陶戚姬愛幸生趙隱玉如意高租嫌史無此三字孝惠為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意郭脫如意二字類我又史無又字戚姬幸常獨史無獨字從上之關東日夜啼位欲立其子如意以上無此三字代太子呂后年長常留守希見上益疏如意立為趙王後幾代太子者數矣賴大臣讒史作爭之及留侯策太子得無廢原注此事見高惠二紀及諸王叔孫通張良等傳過為重疊矣今又見於呂后傳國可略而不言劉意蓋謂並可不點矣而史既有之姑就其文點之右除七十五字加十字據文止加八字宋世家曰初元公之孫糾景公殺之史無此十字皆細書混入者景公卒糾之此二字史作宋公據上易糾之字則此公字亦宜省子特攻殺太子而自立是為昭公昭公者此下史有元公之曾庶孫也昭公九字父公孫糾糾父公子郭脫此二字揣秦史疊褍秦二字即元公少子也景公殺昭公父糾故昭公怨殺太子而自立據節首所加則自昭公者以下大半皆在所點除也右除三十六字加十三字掂文止加十二字三王世家曰大司馬臣去病昧死再拜上疏皇帝陛下陛下過聽使臣去病待罪行間宜專邊塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤群臣私望不敢越職而言臣竊不勝犬馬之史無之字下同心昧死願陛下詔有司因盛夏吉時定皇子位惟陛下幸察臣去病昧死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央宮郭脫宮字制曰下御史六年三月戊申朔乙亥御史臣光守郭脫守字尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少傅臣安行宗正事昧死上言大司馬臣去病上疏曰陛下過聽使臣去病待罪行間宜專邊塞之思慮暴骸中野無以報乃敢惟他議以於用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤群臣私望不敢越職而言臣竊不勝大馬之心昧死願陛下詔有司因盛夏吉時定皇子位惟陛下幸察制曰下御史巨謹謹字照史補與中二千石二千石疊三字照史補臣賀等議曰史無曰字古者裂地立國並建諸侯以承天下所以尊宗廟重社稷也今臣去病上疏不忘其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有號位臣青翟臣湯等宜奉義遵職愚蠢史作憧音義同不逮事方今盛夏吉時臣青翟臣湯等郭本此上脫二十二字昧死請立皇子臣閎臣旦臣肯為諸侯王昧死請所立國名右除一百八十四字加一字據文加三字已上有言語相重者今略點廢如此但此一篇所記全宜削除今輒具列於斯藉為鑒戒者爾凡為史者國有詔誥十分不當取其一焉句意過當有誤故漢元帝詔曰蓋聞安民之道本由陰陽間者陰陽錯謬風雨不時朕之不德庶幾群公有敢言朕之過者今則不然偷合茍從未肯極言朕甚憫焉永惟蒸庶之飢寒遠離父母妻子勞於非業之作衛於不居之宮恐非所以佐陰陽之道也其罷甘泉建章宮衛士各令就農百官各省費條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明陰陽災異者各三人及荀悅撰漢紀略其文曰朕惟衆庶之飢寒遠離父母妻子勞於非業之作衛於不屠之官其罷甘泉建章宮衛士各令就農丞相御史舉天下明陰陽災異者各三人自餘抄撮他皆仿此近則天朝諸撰史者凡有制誥一字不遺唯去詔首稱門下詔尾去諸本作雲誤主者施行而已時武承嗣監修國史見之大怒謂史官曰公輩是何人而敢輒減詔書自是史官寫詔書雖門下贊詔亦録後豫聞此説每嗢噱或作唱嘆或作唱噱並誤而已必以三王世家相比其煩碎則又甚於斯是知史官之愚其來尚矣今之作者何獨笑武承嗣而已哉魏公子傳曰高祖始微少時數聞公子賢及即天子位每過大梁常祠公子高祖十二年從擊黥布還為公子置守冢五家世世歲以四時奉祠公子大史公曰吾過大梁之墟求問其所謂夷門以徵信陵君故事説者云當戰國之時史無以征以下十五字夷門者城之東門也天下諸公子亦有喜照史改舊誤作嘉土者矣然而信陵君之接巖穴隱者不恥下交名冠諸侯有以也此七字史作有以也名冠諸侯不虛耳高祖每過之奉祠二字照史刊正郭王本並倒不絶也舊脫也字右除十五字加二十字加數亦不合魯仲連傳曰仲連好奇偉倜史作俶音義同儻之畫史有策字而不肯仕官王訛作宦任職好持高節遊於趙趙照史疊趙字孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦史有兵字遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍軍字照史補亦作兵魏安釐王使將軍晉鄙救趙畏秦止於蕩陰不進魏王使客將軍新垣衍問人邯鄲因平原君謂趙王曰秦所為或作以急圍趙者前與齊湣史衍下同王爭強為帝已而復歸帝號史無號字今齊湣王已益弱方或脫方字今惟秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭史衍王為帝秦必喜罷兵王衍而字去平原君猶豫未有所決此時魯史有仲字下同連適遊趙會秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又內圍邯鄲而不能能字照史補去魏王使客將軍新垣衍令趙帝秦今其人在此史作是勝也何敢言事魯連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請史作且為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯連先生者今其人在此勝請為紹介而交之於將軍新垣衍曰吾聞魯連先生齊史有國字之高士也衍人臣也使享有職吾不願見魯連先生平原君曰勝史有既字已泄之矣新垣衍許諾魯仲連見新垣衍而無言新垣衍曰吾視居此圍城之中者者字照史補皆有求平原君者也今吾觀先生之玉貌非有所求於平原君者也曷為一脫為字史又有久字居此重圍重圍史作圍城之中而不去魯連雲云梁未睹秦稱帝之害故耳此二字一作也使粱睹秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害奈何魯連曰雲云吾將使秦王烹酸梁王新垣衍快然不悅曰嘻史作噫噫亦太一脫太字甚矣先生之言也先生又烏一作焉能使秦王烹醢梁王魯連曰固也誤作矣吾將言之雲云依例當有雲云字舊脫今秦萬乘之國也梁亦萬乘之國也俱據萬乘之國交史作各有稱王之名睹其一戰而勝欲從而帝之雲云於是新垣衍起再拜舊多而字謝曰始以先生為庸人吾乃今日知先生為天下之士也雲云雲云字亦舊脫適會魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍舊脫秦軍二字遂引而去於是平原君欲封魯連魯連照史疊魯連二字諸本脫辭謝者三此四字史作辭讓使者三終不肯受平原君乃置舊訛致酒酒酣起前以千金為魯連壽云云右除二百七十五字加七字二百一作三百屈原賈生二字舊脫傳曰依例當有曰字今補漢有賈生為長沙王太傅過湘水投書以吊屈原賈生名誼洛陽人也云云二字亦依例補謫謫字史作乃以二字賈生為長沙王太傅賈生既辭往史有行字聞長沙卑濕自以為史無為字壽不得長又以謫去意不自得及渡湘水為賦以吊屈原其詞曰雲云賈生為長沙史有王太二字傅三年有梟飛入賈生舍止於坐隅楚人命梟曰口賈主既以謫居長沙長沙一脫長沙疊字卑濕自恐恐字史作以為二字壽不得長傷悼之乃為賦以自廣其詞曰雲云懷王騎墮馬而死無後賈生自傷為傅二字脫照史補無狀哭泣二字脫照史補歲餘亦死時年三十三舊訛二矣右除七十六字加三字扁鵲倉公傳曰太倉公者齊太倉長臨淄人也姓淳于氏一脫氏字名意少而喜醫方術高後八年更受師同郡元里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方與之傳黃帝扁鵲之脈書五色診病知人死生決嫌疑定可治及藥論甚精受之三年為人治病決死生決嫌疑以下六句古本有俗削多驗云云二字亦依例補詔召召字照史補問所為治痛死生驗者幾何人主名為誰詔問故太倉長臣意方伎所長及所能治病者者字照史補有其書無有皆安受學受學幾問歲嘗有所驗何縣裏人也何病醫藥已訛作與照史改其病之狀皆何如具一作其悉而一作以對臣意對曰自意少時喜醫藥史疊醫藥二字方試之多不驗者至高皇皇字史脫後八年舊多中字得見師臨淄元里公乘陽慶慶諸本慶字作已字年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黃帝扁鵲之脈書五色診病知人死生決嫌疑定可治及藥論論字補書甚精我家給宮心愛公欲盡以我禁方書悉教公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脈書上下經五色診奇史音羈咳術揆度陰陽外變藥論石神接陰陽禁書受讀解驗之可一年史有所字明歲即驗之有驗之有驗三字脫照史補然尚未精也要事之三年所即嘗諸本脫即字嘗作常以為人史有治字診病決死生有驗精良今慶已死十年史有所字臣意年盡三年二字脫照史補三十九歲一脫歲字也齊侍禦御字脫照史補史成自言病頭痛頭痛或誤作也或誤作邪臣意診其脈告曰君之病惡不可言也原注己下皆述一生醫療效驗事此十一字諸木皆與標數並寫愚意移作尾注為是右除二百九十五字宋世家初云襄公嗣立一訛位後詳文義當有後字諸本脫仍謂為宋襄公不去宋襄一多公字非二字吳世家云闔閭越世家云勾踐每於其號上加吳王越王字句句未嘗舍之孟嘗君傳曰馮公形容狀貌甚辨案形容狀貌同是一説而敷演重出分為四言凡如此流不可勝載其十二諸侯表曰孔子次春秋約其辭文去其煩重又屈原傳曰其文約其辭微觀子長此言實有深鑒及自撰史記榛蕪若此豈所謂非言之難而行之難乎漢書龔遂傳曰上遣使者徵遂議曹王生請史作願從功曹以為王生素諸本作每照史改嗜酒亡節度不可使諸本作從照史改遂不聽聽字史作忍逆二字從至京師王生日飲酒不視太守會遂引入宮王生醉從後呼曰明府且止願有所白遂還間其故王生曰天子即間君何以治渤海君不可有所郭脫所字陳對宜曰皆聖主之德非小匣之力也遂受其言既至前上果問以治狀遂對如王生史有言字天子悅其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也雲云上以議曹王生為水衡丞右除八十四字新晉書袁宏傳曰袁宏有逸才文章絶美曾為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乘月率爾與左右微服泛江會宏在舫中諷其所作詠史詩史無此六字詳下文有即其詠史句不應此處先提恐是羡文詠聲既清會會字照史補詞又藻麗史作拔遂駐聽久之遣問焉答云是袁臨汝郎誦詩即其詠史之作也尚傾諸本訛頃照史改率有勝致即迎升舟與之談論申旦不寐自此名譽日茂云云從桓溫北伐史作征作北征賦皆皆字照史補其文之高者嘗與王珣伏滔同在舊衍桓字溫坐溫令滔讀其北征賦至聞所傳於相傳云獲麟於此或訛北野誕靈物以瑞德奚授或訛受體於虞者疚尼父之慟泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韻殉云此賦方傳千載無容率爾今於天下之後諸本衍便改二字不成語移韻徒諸本訛從照史改事然於寫送之致似為未盡滔云得益寫韻一句或為小勝史有溫曰卿思益之六字宏應聲答曰感不絶於豫心訴流風而獨寫雲云謝安嘗賞其機對辨速後安為揚州刺史宏郭脫宏字自吏部郎出為東陽郡乃祖道於治舊訛治亭時賢皆集謝安欲卒迫試之臨別執其手顧郭訛願就左右取諸本作以照史改一扇而授之曰聊以贈行宏應聲答曰輒當奉揚仁風慰彼黎庶觀者無不嘆眼史無此六字而嘆字下復重出亦恐羡文時人嘆其率或作卒而能要焉原注此事出檀道鸞晉陽秋及劉義慶世説右除一百一十四字加十九字十六國春秋曰郭璃有女始笄妙選良偶有心於劉昺遂別設一席於座前謂諸弟子郭本作子弟非凡在坐者皆瑀之及門也曰吾有一女年向成長欲覓一快女壻一作鞏即古壻字誰坐此席者吾當婚或作壻焉昺遂奮衣來坐神志湛魏書作肅不如湛字勝然曰向聞先生欲求快女壻昺郭脫昺字其人也右除二十二字卷十五外篇卷十六姊妹計划數據項

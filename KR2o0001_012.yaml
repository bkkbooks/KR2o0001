body:
  text: 斷限第十二夫書之立約其來尚矣如尼父之定虞書也以舜為始而云粵若稽古帝堯丘明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有沿革遂相交㸦事勢當然非為濫軼也過此已往可謂狂簡不知所裁者焉夫子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴所出起於司馬氏案馬記以史制名班書持漢標目史記者載數千年之事無所不容漢書者紀十二帝之時有限斯極固既分遷之記判其去取紀傳所存唯留漢日表志所録乃盡犧年舉一反三豈宜若是膠柱調瑟不亦謬歟但固之踳駁既往不諫而後之作者咸習其迷宋史則上括魏朝隋書則仰包梁代求其所書之事得十一於千百一成其例莫之敢移永言其理可為歎息當魏武乘時撥亂電掃羣雄鋒鏑之所交網羅之所及者蓋唯二袁劉呂而已若進鴆行弒燃臍就戮總關王室不涉霸圖而陳壽國志引居傳首夫漢之董卓猶秦之趙高昔車令之誅既不列於漢史何太師之斃遂刊於魏書乎兼復臧洪陶謙劉虞孫瓚生於季末自相吞噬其於曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見它記則無宜重述故子嬰降沛其詳取驗於秦紀伯符死漢其事斷入於吳書沈録金行上羈劉主魏刊水運下列高王唯蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左既承正朔斥彼魏胡故氐羌有録索虜成傳魏本出於雜種竊亦自號真君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比於羣盜盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之於傳何厚顏之甚邪又張李諸姓據有涼蜀其於魏也校年則前後不接論地則參商有殊何與魏氏而橫加編載夫尚書者七經之冠冕百氏之襟袖凡學者必先精此書次覽羣籍譬夫行不由徑非所聞焉修國史者若旁採異聞用成博物斯則可矣如班書地理志首全寫禹貢一篇降為後書持續前史蓋以水濟水床上施床徒有其煩竟無其用豈非惑乎昔春秋諸國賦詩見意左氏所載唯録章名如地理為書論自古風俗至於夏世宜云禹貢已詳何必重述古文益其辭費也若夷狄本系種落所興北貊起自淳維南蠻出於槃瓠高句麗以鱉橋獲濟吐谷渾因馬鬬徙居諸如此説求之歷代何書不有而作之者曾不知前撰已著後修宜輟遂乃百世相傳一字無改蓋駢指在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引它事豐其部帙以此稱博異乎吾黨所聞陸士衡有云雖有愛而必捐善哉斯言可謂達作者之致矣夫能明彼斷限定其折中歷選自古唯蕭子顯近諸然必謂都無其纍則吾未之許也

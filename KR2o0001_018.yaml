body:
  text: 因習第十八蓋聞三王各異禮五帝不同樂故傳稱因俗易貴隨時況史書者記事之言耳夫事有貿遷而言無變革此所謂膠柱而調瑟刻船以求劍也古者諸侯曰薨卿大夫曰卒故左氏傳稱楚鄧曼曰王薨於行國之福也又鄭子産曰文襄之伯君薨大夫弔即其證也案夫子修春秋實用斯義而諸國皆卒魯獨稱薨者此略外別內之旨也馬遷史記西伯以下與諸列國王侯凡有薨者同加卒稱此豈略外別內邪何貶薨而書卒也蓋著魯史者不謂其邦為魯國撰周書者不呼其王曰周王如史記者事總古今勢無主客故言及漢祖多為漢王斯亦未為纍也班氏既分裂史記定名漢書至於述高祖為公王之時皆不除沛漢之字凡有異方降款者以歸漢為文肇自班書首為此失迄於仲豫仍踵厥非積習相傳曾無先覺者矣又史記陳涉世家稱其子孫至今血食漢書復有涉傳乃具載遷文案遷之言今實孝武之世也固之言今當孝明之世也事出百年語同一理即如是豈陳氏苗裔祚流東京者乎斯必不然漢書又云嚴君平既卒蜀人至今稱之皇甫謐全録斯語載於高士傳夫孟堅士安年代懸隔至今之說豈可同云夫班之習焉其非既如彼謐之承固其失又如此迷而不悟奚其甚乎何法盛中興書劉隗録稱其議獄事具刑法說依檢志內了無其說既而臧氏晉書梁朝通史於大連之傳並有斯言志亦無文傳仍虛述此又不精之咎同於玄晏也尋班馬之為列傳皆具編其人姓名如行狀尤相似者則共歸一稱若刺客日者儒林循吏是也范曄既移題目於傳首列姓名於傳中而猶於列傳之下注為列女高隱等目茍姓名既書題目又顯是則鄧禹寇恂之首當署為公輔者矣岑彭吳漢之前當標為將帥者矣觸類而長實繁其徒何止列女孝子高隱獨行而已魏收著書標榜南國桓劉諸族咸曰島夷是則自江而東盡為卉服之地至於劉昶沈文秀等傳敍其爵里則不異諸華劉昶等傳皆云丹徒縣人也沈文秀等傳則云吳興武康人豈有君臣共國父子同姓闔閭季札便致土風之殊孫策虞翻乃成夷夏之隔求諸往例所未聞也當晉宅江淮實膺正朔嫉彼羣雄稱為僭盜故阮氏七録以田范裴段諸記劉石符姚等書別創一名題為僞史及隋氏受命海內為家國靡愛憎人無彼我而世有撰隋書經籍志者其流別羣書還依阮録案國之有僞其來尚矣如杜宇作帝勾踐稱王孫權建鼎峙之業蕭察為附庸之主而揚雄撰蜀紀子貢著越絶虞裁江表傳蔡述後梁史考斯衆作咸是僞書自可類聚相從合成一部何止取東晉一世十有六家而已乎夫王室將崩霸圖云構必有忠臣義士捐生殉節若乃韋耿謀誅曹武欽誕問罪馬文而魏晉史臣書之曰賊此乃迫於當世難以直言至如荀濟元瑾蘭摧於孝靖之末王謙尉迥玉折於宇文之季而李刊齊史顏述隋篇時無逼畏事須矯枉而皆仍舊不改謂數君為叛逆書事如此褒貶何施昔漢代有修奏記於其府者遂盜葛龔所作而進之既具録他文不知改易名姓時人謂之曰作奏雖工宜去葛龔及邯鄲氏撰笑林載之以為口實嗟乎歷觀自古此類尤多其有宜去而不去者豈直葛龔而已何事於斯獨致解頤之誚也凡為史者茍能識事詳審措辭精密舉一隅以三隅反告諸往而知諸來斯庶幾可以無大過矣

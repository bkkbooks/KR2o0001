body:
  text: 書志第八夫刑法禮樂風土山川求諸文籍出於三禮及班馬著史別裁書志考其所記多效禮經且紀傳之外有所不盡隻字片文於斯備録語其通博信作者之淵海也原夫司馬遷曰書班固曰志蔡雍曰意華嶠曰典張勃曰録何法盛曰説名目雖異體統不殊亦猶楚謂之檮杌晉謂之乘魯謂之春秋其義一也於其編目則有前曰平準後云食貨古號河渠今稱溝洫析郊祀為宗廟分禮樂為威儀懸象出於天文郡國生於地理如斯變革不可勝計或名非而物是或小異而大同但作者愛奇恥於仍舊必尋源討本其歸一揆也若乃五行藝文班補子長之闕百官輿服謝拾孟堅之遺王隱後來加以瑞異魏收晚進弘以釋老斯則自我作故出乎胸臆求諸歷代不過一二者焉大抵志之為篇其流十五六家而已其間則有妄入編次虛張部帙而積習已久不悟其非亦有事應可書宜別標一題而古來作者曾未覺察今略陳其義列於下云夫兩曜百星麗於玄象非如九州萬國廢置無恆故海田可變而景緯無易古之天猶今之天也今之天即古之天也必欲刊之國史施於何代不可也但史記包括所及區域綿長故書有天官讀者竟忘其誤榷而為論未見其宜班固因循復以天文作志志無漢事而隸入漢書尋篇考限覩其乖越者矣降及有晉迄於隋氏或地止一隅或年才二世而彼蒼列志其篇倍多流宕忘歸不知紀極方於漢史又孟堅之罪人也竊以國史所書宜述當時之事必為志而論天象也但載其時彗孛氛祲薄食晦明裨竈梓慎之所占京房李郃之所候至如熒惑退舍宋公延齡中台告坼晉相速禍星集潁川而賢人聚月犯少微而處士亡如斯之類志之可也若乃體分濛澒色著青蒼丹曦素魄之躔次黃道紫宮之分野既不預於人事輒編之於策書故曰刊之國史施於何代不可也其間唯有袁山松沈約蕭子顯魏收等數家頗覺其非不遵舊例凡所記録多合事宜寸有所長賢於班馬遠矣伏羲已降文籍始備逮於戰國其書五車傳之無窮是曰不朽夫古之所制我有何力而班漢定其流別編為藝文志論其妄載事等上篇續漢已還祖述不暇夫前志已録而後志仍書篇目如舊頻煩互出何異以水濟水誰能飲之者乎且漢書之志天文藝文也蓋欲廣列篇名示存書體而已文字既少披閲易周故雖乖節文而未甚穢纍既而後來繼述其流日廣天文則星占月會渾圖周髀之流藝文則四部七録中經祕閣之輩莫不各逾三篋自成一家史臣所書宜其輟簡而近世有著隋書者乃廣包衆作勒成二志騁其繁富百倍前修非唯循覆車而重軌亦復加闊眉以半額者矣但自史之立志非復一門其理有不安多從沿革唯藝文一體古今是同詳求厥義未見其可愚謂凡撰志者宜除此篇必不能去當變其體近者宋孝王關東風俗傳亦有墳籍志其所録皆鄴下文儒之士讎校之司所列書名唯取當時撰者習茲楷則庶免譏嫌語曰雖有絲麻無棄菅蒯於宋生得之矣夫災祥之作以表吉凶此理昭昭不易誣也然則麒麟鬬而日月蝕鯨鯢死而彗星出河變應於千年山崩由於朽壤又語曰太歲在酉乞漿得酒太歲在巳販妻鬻子則知吉凶遞代如盈縮循環此乃關諸天道不復繫乎人事且周王決疑龜焦蓍折宋皇誓衆竿壞幡亡梟止涼師之營鵩集賈生之舍斯皆妖災著象而福祿來鍾愚智不能知晦明莫之測也然而古之國史聞異則書未必皆審其休咎詳其美惡也故諸侯相赴有異不為災見於春秋其事非一洎漢興儒者乃考洪範以釋陰陽其事也如江璧傳於鄭客遠應始皇臥柳植於上林近符宣帝門樞白髮元后之祥桂樹黃雀新都之讖舉夫一二良有可稱至於蜚蜮蝝螽震食崩坼隕霜雨雹大水無冰其所證明實皆迂闊故當春秋之世其在於魯也如有旱雩舛侯螟螣傷苗之屬是時或秦人歸襚或毛伯賜命或滕邾入朝或晉楚來聘皆持此恆事應彼咎徵昊穹垂謫厥罰安在探賾索隱其可略諸且史之記載難以周悉近者宋氏年唯五紀地只江淮書滿百篇號為繁富作者猶廣之以拾遣加之以語録況彼春秋之所記也二百四十年行事夷夏之國盡書而經傳集解卷才三十則知其言所略蓋亦多矣而漢代儒者羅災眚於二百年外討符會於三十卷中安知事有不應於人應而人失其事何得茍有變而必知其兆者哉若乃採前文而改易其説謂王札子之作亂在彼成年春秋成公元年二月無冰董仲舒以為其時王札子殺召伯毛伯案今春秋經札子殺毛伯事在宣十五年非成公時夏徵舒之構逆當夫昭代春秋昭公九年陳災董仲舒以為楚嚴王為陳討夏徵舒因滅陳陳之臣子毒恨故致火災案楚嚴王之滅陳在宣十一年如昭九年所滅者乃楚靈王時且莊王卒恭王立恭王卒康王立康王卒夾敖立夾敖卒靈王立相去凡五世楚嚴作霸荊國始僭稱王春秋桓公三年日有食之既京房易傳以為後楚嚴稱王兼地千里案自武王始僭號歷文成穆三王始至於嚴然則楚之稱王已四世矣何得言嚴始稱哉又魯桓薨後世歷嚴閔釐文宣凡五君而楚嚴作霸安有桓三年日食而應之邪高宗諒陰亳都實生桑穀書序曰伊陟相太戊亳有桑穀共生劉向以為殷道衰高宗承弊而起盡諒陰之哀天下應之既獲顯榮枲於政事而國將危亡故桑穀之異見案太戊崩其後嗣有仲丁河亶甲祖乙盤庚凡歷五世始至武丁即高宗是也桑穀自太戊時生非高宗事高宗又本不都於亳晉悼臨國六卿專政以君事臣董仲舒以為十七年六月甲戌朔日有食之時宿在畢晉國象也晉厲公誅四大夫四大夫欲殺厲公後莫敢責大夫六卿遂相與比周專晉國君還事之案春秋成公十二月丁巳朔日食非是六月魯僖末年三桓世官殺嫡立庶春秋釐公三十三年十二月隕霜不殺草劉向以為是時公子遂專權三桓始世官向又曰嗣君微失秉事之象也又釐公二十九年秋大雨雹劉向以為釐公末年信用公子遂專權自恣至於殺君故陰脅陽之象見釐公不悟遂終專權後二年殺子赤立宣公案此事乃文公末世不是釐公時也遂即東門襄仲赤文公太子即惡也斯皆不憑章句直取胸懷或以前為後以虛為實移的就箭曲取相諧掩耳盜鐘自云無覺詎知後生可畏來者難誣者邪又品藻羣流題目庶類謂莒為大國菽為強草鶖著青色負蠜非中國之蟲春秋嚴公二十九年有蜰劉歆以為蜰負蠜也劉向以為非中國所有南越盛暑男女同川浴淫風所生是時嚴公取齊淫女為夫人既入淫於兩叔故蜰至案負蠜中國所生不獨出南越鸜鵒為夷狄之鳥春秋昭公二十五年鸜鵒來巢劉向以為夷狄之禽案鸜鵒中國皆有唯不逾濟水耳事見周官如斯詭妄不可殫論而班固就加纂次曾靡銓擇因以五行編而為志不亦惑乎且每有敘一災推一怪董京之説前後相反向歆之解父子不同桓公三年日有食之董仲舒劉向以為魯宋殺君易許田劉歆以為晉曲沃莊伯殺晉侯京房以為後楚嚴稱王兼地千里也又嚴公七年夜中星隕如雨劉向以為夜中者即中國也劉歆以為晝象中國夜象夷狄劉向又以為蜮生南越劉歆以為盛暑蜮所生非自越來也遂乃雙載其文兩存厥理言無準的事益煩費豈所謂撮其機要收彼菁華者哉自漢中興已還迄於宋齊其間司馬彪臧榮緒沈約蕭子顯相承載筆競志五行雖未能盡善而大較多實何者如彪之徒皆自以名慚漢儒才劣班史凡所辨論務守常途既動遵繩墨故理絶河漢兼以古書從略求徵應者難該近史尚繁考祥符者易洽此昔人所以言有乖越後進所以事反精審也然則天道遼遠裨竈焉知日蝕不常文伯所對至如梓慎之占星象趙達之明風角單揚識魏祚於黃龍董養徵晉亂於蒼鳥斯皆肇彰先覺取驗將來言必有中語無虛發茍志之竹帛其誰曰不然若乃前事已往後來追證課彼虛説成此遊詞多見其老生常談徒煩翰墨者矣子曰蓋有不知而作之者我無是也又曰君子於其所不知蓋闕如也又曰知之為知之不知為不知是知也嗚呼世之作者其鑒之哉談何容易駟不及舌無為強著一書受嗤千載也或以為天文藝文雖非漢書所宜取而可廣聞見難為刪削也對曰茍事非其限而越理成書自可觸類而長於何不録又有要於此者今可得而言焉夫圓首方足含靈受氣吉凶形於相貌貴賤彰於骨法生人之所欲知也四支六府痾瘵所纏茍詳其孔穴則砭灼無誤此養生之尤急也且身名並列親疏自明豈可近昧形骸而遠求辰象既天文有志何不為人形志乎茫茫九州言語各異大漢輶軒之使譯導而通足以驗風俗之不同示皇威之廣被且事當炎運尤相關涉爾雅釋物非無往例既藝文有志何不為方言志乎但班固綴孫卿之詞以序刑法探孟軻之語用裁食貨五行出劉向洪範藝文取劉歆七略因人成事其目遂多至若許負相經揚雄方言並當時所重見傳流俗若加以二志幸有其書何獨舍諸深所未曉歷觀衆史諸志列名或前略而後詳或古無而今有雖遞補所闕各自以為工榷而論之皆未得其最蓋可以為志者其道有三焉一曰都邑志二曰氏族志三曰方物志何者京邑翼翼四方是則千門萬戶兆庶仰其威神虎踞龍蹯帝王表其尊極兼復土階卑室好約者所以安人阿房未央窮奢者由其敗國此則其惡可以誡世其善可以勸後者也且宮闕制度朝廷軌儀前王所為後王取則故齊府肇建誦魏都以立宮代國初遷寫吳京而樹闕故知經始之義卜揆之功經百王而不易無一日而可廢也至如兩漢之都咸洛晉宋之宅金陵魏徙伊瀍齊居漳滏隋氏二世分置兩都此並規模宏遠名號非一凡為國史者宜各撰都邑志列於輿服之上金石草木縞紵絲枲之流鳥獸蟲魚齒革羽毛之類或百蠻攸稅或萬國是供夏書則編於禹貢周書則託於王會亦有圖形九牧之鼎列狀四荒之經觀之者擅其博聞學之者騁其多識自漢氏拓境無國不賓則有邛竹傳節蒟醬流味大宛獻其善馬條支致其巨雀爰及魏晉迄於周隋咸亦遐邇來王任土作貢異物歸於計吏奇名顯於職方凡為國史者宜各撰方物志列於食貨之首帝王苗裔公侯子孫餘慶所鍾百世無絶能言吾祖郯子見師於孔公不議其先籍談取誚於姬后故周撰世本式辨諸宗楚置三閭實掌王族逮於晚葉譜學尤煩用之於官可以品藻士庶施之於國可以甄別華夷自劉曹受命雍豫為宅世胄相承子孫蕃衍及永嘉東渡流寓揚越代氏南遷革夷從夏於是中朝江左南北混淆華壤邊民虜漢相雜隋有天下文軌大同江外山東人物殷湊其間高門素族非復一家郡正州都世掌其任凡為國史者宜各撰氏族志列於百官之下蓋自都邑以降氏族而往實為志者所宜先而諸史竟無其録如休文宋籍廣以符瑞伯起魏篇加之釋老徒以不急為務曾何足云惟此數條粗加商略得失利害從可知矣庶乎後來作者擇其善而行之或問曰子以都邑氏族方物宜各纂次以志名編夫史之有志多憑舊説茍世無其録則闕而不編此都邑之流所以不果列志也對曰案帝王建國本無恆所作者記事亦在相時遠則漢有三輔典近則隋有東都記於南則有宋南徐州記晉宮闕名於北則有洛陽伽藍記鄴都故事蓋都邑之事盡在是矣譜牒之作盛於中古漢有趙岐三輔決録晉有摯虞族姓記江左有兩王百家譜中原有方司殿格蓋氏族之事盡在事矣自沈瑩著臨海水土周處撰陽羡風土厥類衆多諒非一族是以地理為書陸澄集而難盡水經加注酈元編而不窮蓋方物之事盡在是矣凡此諸書代不乏作必聚而為志奚患無文譬夫涉海求魚登山採木至於鱗介修短柯條巨細蓋在擇之而已茍為魚人匠者何慮山海之貧罄哉卷三內篇卷四
